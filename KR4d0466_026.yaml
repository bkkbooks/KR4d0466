body:
  text: 雪樓集卷二十六元程文海撰詩次韻趙方塘并序積雨為沴方塘待制出長篇訟風伯憂愛之誠溢乎筆墨之外不鄙賜教顧某何足以知此耶厚意不可虛辱輒次韻一資捧腹書生雙眉幾時開憂憤填腹長殷雷愆陽前日勢暴橫六合幾欲焮為灰天瓢一滴不可得望望幾送日西頽盂水青楊類兒戲搜索旱鬼到禍胎生物斬絶有足念天意似為斯人回三日滂沱勢破竹羣情慰恱渴望梅龍休雲歸能事畢神功收斂何待催如何轉慣驕子態來不受挽去難推陽光一線時滲漏隂騎千陳相排豗禾頭生耳黍穗黑終嵗勤動良可哀玉堂仙人訟風伯謂不肆力掃滌來嗟嗟風伯信可罪前者致旱何雄哉天下降兮澤上氣爾乃飄颶鼓黃埃厥令隂霾蔽天地爾乃瑟縮不殘摧安得皇天立梯磴封詞直上訴九垓蒼生到頭不蘇息浸淫之虐猶燔煨要知風兮亦何罪羣隂黨互為妖災斟酌元氣本在上願天一正北斗魁又并序洊拜長篇之貺上下古今世變寫一念仁愛之真伏讀再四發我深省韻嚴步窘自合閣筆而老天劃然開霽至誠感神矣某敢不拜謹載𢋫以謝煤炲滿空撥不開老虬鞭風駕百雷暘烏旬日受掩翳團團一鏡埋寒灰黃流亂注山嶽暗凛凛天地就傾頽晨興劃然玉宇淨火龍珠飛出蚌胎賾哉神機速旋斡豈伊人力能挽回誰知仙筆驅造化詩壇自著今歐梅卬首奉辭呌閶闔一章未報一章催時乎震霆轟復止意者有物尼其推時乎癡雲聚復散意者有物排其豗安知天帝不下耳聞之惻然為興哀亦曰斯民生已久一脈肇自開闢來九潦七旱亦勞止五風十雨安在哉好生自是天職分忍使變滅隨煙埃鯫生因此重有感歷閲今古心為摧彼蒼仁愛靡不至胡乃光霽靳九垓欣欣熙熙能幾見憂愁嘆恨半煎煨是豈天兮不悔禍抑亦人也自作災安得君詩見諸事毋負老天生傑魁題蓮葉舟圖如此風波惡舟中坐晏如此時不經濟借問讀何書送顔北城歸漳州出山未了便還山見見聞聞定不凡此去人間呼處士曽來天上換頭銜簞瓢活計仍顔巷霖雨蒼生自傅岩我亦征塵袍袴滿眼穿江上理歸帆送八畨安撫司趙僉事功名成邂逅此事正多端車取富民易班封定逺難蠻荒今甸服吾子昔儒冠我欲歌黃鵠誰憐范叔寒送人赴浙東木綿提舉曽歷金華三洞天風流歷歷記山川桕林白綻梅花小柿實紅垂橘彈圎訪古但聞羊化石因君又喜木生綿霜風渾似當時峭愁絶雙溪八韻篇趙菊山挽詞九月四日卒菊花今嵗失重陽應為先生減妙香市駿千金惟骨在嗟麟一角與詩亡無人去問病摩詰有客來干死孟嘗我奉蒲輪猶昨日忍看丹旐逺還鄉送茶藥與唐靜卿三首珍重家人寄藥心將來康濟自家身自家性命么麼甚送與蓬萊頂上人榖雨前期收雀舌立冬三日到燕城不關天上春風晚要趂先生雪水烹冬來羈旅無家夜雪下官人禁酒時虧殺粗踈黨太尉銷金帳裏飲羔兒己丑送趙縣丞世賞入官之任父號肯堂肯堂生此肯堂兒五葉崇蘭第一枝世賞法應為邑長縣丞亷不厭官卑遙知浙水扶笻老定説尊公衣繡時是處甘棠有遺愛郎君勉力繼前規己丑除夜留逺齋十絶無尋子美千間處且管相如四壁休風雨震凌都過了一年直為逺齋留無奈星翁苦見尤嵗君己丑我何仇殷勤欲且留君住街鼓無端送土牛排行弟妹捧椒盤應説癡兒未了官昨日有人江外去家書只寫道平安去嵗金陵坊裏住踈梅的皪兩三花今年閏後花開早定到墻隂蕚緑華老大庭闈在盱水漂零兒女落秦淮感時懷抱思親甚料得吾兒説逺齋何年呼得竈為君鼻是煙窗耳是鐺深夜乞靈余不會但令分我膠牙錫鍾馗曾是開元見從此人間鬼日多明是將無來作有撑眉努目奈人何今年悟得修真訣巷栁園桃一併無却笑塵緣終未斷杜詩韓集當麻姑都無柏酒與椒盤止有年華上鬢端一盞油燈充蠟炬夜深炯炯寸心丹十載班行沐異恩歸來未望屬車塵沍隂明日東風動萬嵗聲中拜聖人題劉須溪徐容齋所贈按達拉吉琳御史名字説後謹嚴書法須溪筆説到容齋渾渾哉名字而今俱典雅只消功業上雲臺辛卯九月行臺解組西歸十四日泰州教授適齋胡先生送别真州是日乃先生初度滿江風雨太多情送了重陽送我行祖帳逺來慚弟子壽觴初度喜先生功名千古文章印師友平生父子盟遮莫蓴鱸堪久戀雞豚只合社吳城草一日過建康送朱野翁教授當塗男兒自合致青雲天上何須問故人選部四年無力挽除書萬里待身親司文鄭校官寧冷迎侍潘輿地却鄰去去新篇定驚我采江月夜有詩神草四日偕包鼎新吳岩翁登蛾眉亭牛渚磯頭看落暉亭荒檻折怕慿危江山欲暮涵元氣舟楫無風玩小兒百怪可堪重出世雙蛾安得暫開眉酒澆不到青山土應笑新詩有許悲天門山萬里瀰漫地天門據要衝乾坤大開闢江漢此朝宗往事空多壘千年只二峯舟人亦癡絶遙認兩眉濃連日飽飫嘉魚示包吳二君及陳孟實寧志道江行日日侣漁郎風味中含翰墨香巨口細鱗蘇赤壁槎頭縮項孟襄陽杯盤喜具雙魚美詩賦慙無一字長賴得此身逃吏責素餐只是欠文章十月四日過兩孤山兩山相望幾曽孤應是髙峯不可梯千載何人廟雙姥我評只合祀夷齊過湖口瞬息風帆湖口縣山川便自帶鄉情孤峯蒼翠嬋姢老二水青紅螮蝀明江自西來尤可愛波隨東下直能清吳城見説明朝到山下青青是祖塋風帆迅甚今夜徑宿楮溪渡有孤鼎新遊匡廬清興詩以解之清逰有約到廬山到得廬山風作難三老狡謀捎楮渡雙帆盡意度揚瀾紫煙斜日空相照白鹿他年許再看世事心容輒相左請君方寸與君安六日到吳城山過家上冢一留連風景依依故可憐自嘆蒼顔如此樹偶逢老父使之年趙灘緑是幾時長廬阜青還萬古鮮却恐錢郎笑寒乞只將詩句裹山川贈汪郎中此老今年八十三江濱獨擅漢衣冠文書銜袖龍蛇字鬚髮如霜熊豹顔耆舊于今足塵土典刑留此重家山醴牢略具髙年禮萬一神丹乞九還余解官歸省舟過吳城山下耆舊雕落有慨其嘆忽老人厖眉皓髮衣冠偉然惠詩一卷使之年曰八十三矣復遺瓜三枚不一語而去余意其異人也坐有潘俊卿謂余曰此盧潭老人汪郎中也屬余西泝未暇細論令人餽之羊酒將以此詩至元二十八年龍集辛卯十月十日至洪王肯堂治書見示芙蓉詩次韻二首春風歇桃李秋雨深莓苔蕭然公館間得此竒種栽九天清露零一道紅雲開勾牽緑衣隊酣宴瑶池杯穠粧月鑑懸麗服霜刀裁瑞蓮湧平地妙色分五臺暫陪飛仙遊偏稱幽人懷終疑閬苑去嘉會何時諧此日眼雙明臨風漫低回長當歌楚騷招得花神來幽居有佳人頳顔暈紅玉飽承仙掌露晞沐蠆髮曲一望西風塵倚竹翠袖拂間臨清水照靜對逺山矗向來涉江人見謂江成陸楚楚靈均裳貯麗為誰鬻惟應妙手畫挂壁薄夫肅后皇植衆芳艷艷列金屋詎知漆室憂不在春睡足結言遺吾相髙舉郢書燭徐容齋參政王安野治書更倡迭和飲酒止酒各極其趣次韻二首推篷誦公詩窺豹乍披霧信知醉鄉後一一克自樹向來胸塊磊澆灌不停駐至今傳衣記燈燈續前炷時因太和湯繅出繭絲句從教馬為牛而况作與馵至人全於天此是酒中趣吾家伊川翁言行極稽慮當時半醺意所得各有處欲辨言已忘公眠我姑去右飲酒為安野公賦渾家醉眠時孤城黯酸霧十年江左恨遺曲傳玉樹從公淮海上弔古馬遙駐夜歸證前史繞几黃雲炷朅來髙士州止酒誦佳句方此尋歸途短褐困騏馵諸公羅爼豆排日得深趣靦余乏剛制肆口弛防慮三復童羖章放心有歸處秫田亦何須淵明故山去右止酒為容齋公賦題九方臯相馬圖後并序至元辛卯秋杭張師道寄余此卷是嵗十月會安野侍御于洪臨岐出此以當贈䇿就題草字萬里出市駿九京誰作歅多因毛色似誤殺眼明人家園見梅有懷疇昔同僚諸君子因成草六韻奉寄徐容齋王肯堂趙元讓暨正父文瑞諸公往時姑射仙夜墮江南村江南冨嘉植梅花衆中尊九地閟玄凝先天占春暄的皪氷雪姿不受風塵昏孤清愜幽意賸馥醒吟魂愛之玩不斁冥契終無言羅浮本幻境前夢覺已諼蹇蹄滯京華倦翼棲淮垣後先青雲士表裏白玉溫我形自覺穢交道久逾敦貞節保松柏芳心共蘭蓀信知嵗寒友何異連枝昆獨賢天所矜家山問雞豚歸來適仲冬平旦窺荒園依依故人面竟日對傾樽清池踈蘂影淡月新梢痕冷然絶埃壒恍若逰崑崙忽憶如花人髙談霏露繁眼中不可見思纛風翩翻頗慙標致似逺近殊託根洪鈞轉嚴令青皇畀新恩坐看佳實長適口塞衆喧遍遺實中仁生意彌乾坤平生識賞心皎潔明朝暾凌寒折一枝殷勤寄王孫又恐逺莫致作詩當重論壽吳幼清母夫人十一月草五日清時冨貴亦易得吳子甘心卧草廬慈母自能安菽水髙年忍使倚門閭此時為壽奉巵酒豈必間居要板輿却笑毛家兒子俗區區喜色動除書送前玉隆副宫嶽麓劉蒼雲官已我方來問道道成子却去為官出山不為功名在有眼要知天地寬定力千年衡嶽峻浮生一葦洞庭寒玉函只在遊帷近何日歸舟覔剩丹余秋山憲使挽詞薦稿因君重古靈官銜何事上銘旌西山大學曽經進涑水深衣儼若生江右澄清方有意長沙卑濕竟無情韓公賴得門人在文集千年以序行試傅崇陽墨二首三生筆硯有良緣與子交遊四十年吾亦少恩忘子報安排佳語傅陳玄商家良相命三篇學字真開萬世先雒誦長謳傳不泯客卿有藝更光前刻字熊生精藝令人注意深斯文百世得追尋伏經口授終非古周鼓體訛猶至今子已萬言歸一默誰知隻字抵千金鉛刀可是傳心具有畫無心畫是心三十六代天師挽詞二首雞犬曽聞舐鼎餘一朝形化豈神俱千年漢日王章在萬里燕雲錫命殊政此天仙司下土遽之帝所宴清都嗣師入侍金壚側生死榮哀近代無龍虎山齊浩劫灰胡然夜半失崔嵬有言白鶴東歸者何許青牛西度哉騎氣一朝成獨往吹笙千載尚同來拍肩挹袂噫難再逺托長風送一哀送留道士樂得清間了此生青鞋布襪尚探尋岩巒謾寄孤雲影霄漢常懸野鶴心幸破樊籠天廣大豈無泉石地幽深他年心迹雙清了更覓新詩為子吟題趙仲逺伏生授書圖龍鍾九十餘猶及漢三葉哀哉窮獨叟有女幸傳業授數才四七錯歸已德色遂令讀書人終古猜梅賾送王子厚并序王子厚以醫名家六世矣與余家聮姻婭在郢同居里去郢同寓里别二十年余將造朝過吳城為仲父宣慰謀醫鄉人合而言曰有名醫在都昌亟命舟迎致則吾子厚也切脈如見用藥如神信乎名不虛得臨别賦此髙談稷契不謀身作計岐黃自活人六世名家孫肖祖萬金良藥衆疑神傳來白雪千年調散作青雲五老春若遇無形可憂處未須驚走且逡巡次韻肯堂學士冬日紅梨花二首黃菊卧階雨六花舞天風壁凍室生白手僵肉作紅秀句忽墮前光怪侵簾櫳至人宴坐處元氣含沖融無情及枯株嫣然為修容坐令玉華君來從蘂珠宫麗粧凝祥雲明眸轉驚鴻豈非散花手試君情所鍾老我嗜好淡空詩亦雷同秪願酌花時毋忘北鄰翁傾蓋幾何年黟黑俄半雪寧有結願香復此共朝闕去年賦芙蓉佳句動江浙我時增意氣未覺老衰歇新詩出懷錦酒酗劇眼纈今晨豈玄冬草木爭簡潔東闌别種花紅芳忽漏泄天工變化手誰能料時節要是文字祥因緣為君結開樽當嚼之和露餐玉屑典衣勿踟蹰無花嘆空折題肯堂學士遂慵軒東皋記醉非真醉安野標慵豈必慵頗憶吾家伯淳語間來無事不從容樂山劉東崖學士為唐承旨立號不受東華一點塵青青靜閲幾畨春朋儕欲表公心事只有西山象得真覃懷宋氏義門東崖作序清朝恩渥新旌表玉署詩文互發揮從此義門聲價大兒孫莫遣古風微送趙月卿教授江州六館才名三十年冷官還取舊青氊不辭越水逺千里要看廬山障百川栗里風流今在否濓溪源委故淵然乾坤生物無窮盡解有鸞膠續斷絃送三山陳格山教授髙郵師儒不比他官職太息難逢本色人覆盎一城如斗大皋比重席得儒真宗門况味從來冷近日詩書漸可珍淮海秦郎天下士試尋恐有再來身富州教授馮君茂叔蜀珍也將之官出涪翁所書隱求二字索賦身隱何求更入思山人解有出山期君民位置耕莘日禮樂規模陋巷時逺志不為安石小北山一任德璋移冷官未必埋藏得定有龍光出劍池送月浦鄭貴道教授揚州衆芳搖落士林嗟喜見先生兩鬢華問道曾為諸老客亢宗元是廣文家典刑四柏亭前樹聲譽蕃禧觀裏花玉署即今重人物冷官何得久天涯瘍醫三茅蔣法師輦路逢醫捴上醫到頭誰與問瘡痍隱居昔住茅君洞靈藥新傳蔣法師術妙鵲針投血脈衆疑獺髓補膚肌藥錢不辦將詩凖詩病依然欠事治送陳笠峯并序笠峯陳君教授紹興有聲秩滿謁選僅得舒州教授以歸士論稱屈笠峯怡然曰是豈不可為哉將行養蒙送之以序盡之矣廣平程某故永歌之笠峯前在會稽時教授堪為教授師弦誦幾曽一朝廢宦情頓起百年衰丈夫得志是行已亷士居官不厭卑去去舒州寧久滯玉堂學士印心知輔正臣按察使挽詞中原耆舊今餘幾天奪任南有底忙閩嶠淚碑生叔子孔堂尸祝死庚桑公言從古出鄉校輿誦傷心入些章福善依然銖兩定照人丹桂一枝芳送程萬里尹曲江縣尹官卑亦名宰曲江邑弊尚堪為溪頭香水有佛性江上青山似舜時韶石鳴琴應古淡禪關得句定新竒是中人物多名世試問張余今有誰吳進學挽詞二首己恨相知晚如何忽棄豫十年只私第一剡始公車知為人才計遑思功令書可驚生世短揮涕重踟蹰所謂溫如玉于今有此人家庭三代意襟度四時春幾月文園病何方圎澤身欲求難再得西望暗傷神送景星山長吳此民謁選古今通顯途十五戾契致嗟余就衰懦羡子方猛鋭手提青冥靶欲厲黃河水明時急需材諸老虛席俟寫真吳若水畫手吳生妙如今豈後身知人古未易下筆爾能親顔貌隨年運風流落世塵若為傳不朽千載會如新送胡適齋先生教授瑞州大冶平生鑄金手干莫鼎彛隨質就蕭騷霜鬢海陵風兩眼眵昏數科斗陋邦文采貍豹變潮永他年説韓柳天官銓材定銖寸還我耆儒善江右髙安道院士素淳近來與化移易否安定傳家教條在培植嘉生待薪槱莫言冷官只文字錢榖簿書更紛糾幾何出入漫不省詭對未冝師户牖韋編一束當韋佩大耐規模當大受此日沙頭一杯酒先生東下僕南首坐看安定門人多四海同風軼嘉祐和王寅夫郎中元日立春二首馬蹄塵裏度芳辰帶得陽和到七閩山翠倚天迎好客風光滿地屬吟身髙情古柳仍青眼時態夭桃自絳唇從此不憂江海逺春官袖有十分春聖德如天氣序調立春元日兩相遭陽和忽送千林喜天闕遙瞻萬里髙詩酒風流憶諸老簿書塵土愧吾曹焚香覓句多間雅旅思絲棼得孟勞寅夫惠顧公宇適有倉庾氏之役不得晤語明日武仲經知事擕示寅夫登樓佳句用韻以謝不敏皇皇使節下青冥談詠登樓尚典刑人物山川增壯觀文章河嶽炳英靈浮雲過眼紛紛白逺樹涵窗隱隱青我亦登臨興不淺此時應是避文星倉中兀坐憶寅夫雨夜佳篇用韻呈似唱籌聲裏過新元凖擬崇墉大有年午夜淋漓聽雨響炎方枯稿解民懸老梅謝事留青子稚麥乘時漲緑煙佳句聮翩與春競幾宵諷詠不能眠日與寅夫約登鼓山二月十一日竟獨往而不我告繼聞是日乃寅夫初度即事為壽朝天笏拄西山頥忽此來窺南海竒平生亦有觀山癖已約同題石鼓詩誰知青雀㗸桃至竟著先鞭了不知東望蓬萊半明滅想應獨受長生訣天風海濤萬里寒髙人題扁知未漫眼中定有驚人句我今想像何能賦佛成靈運誰後先重期一指蓬山路題武仲經知事獅貓畫卷金絲色軟坐常溫飽食深宫錦作墩若使爰書無法吏詩人應嘆鼠翻盆獅貓蓋舊時禁中所養好潔善饞而不捕鼠吁養貓所以捕鼠也以捕鼠為職則目不停伺爪不停攫庶幾無負所養者是貓也褥溫而坐安毛澤而體肥養之者至矣而淡乎若無營焉所職何如哉豈無崔祐甫乎將執筆以議次踈堂中丞詩韻并序潘景梁出示中丞踈堂公贈言細讀之有味哉仁人之言也紙末見及深佩不遐遺之盛心因風敢次韻以謝漆園物外人是非一槩齊冥心兩忘辨玩世鄰滑稽淫辭懸崖險一陷莫可躋吾徒自潔白粲粲毛與西庶以厲頑薄勿俾傷孩提廓然公好惡於斯見天倪清談寖成風可否幾謬迷飢溺不關心誰其拯顛隮哀哉延頸民萬目徒睽睽有嚴踈堂公淡約甘朝虀贈言教戒備居要磨有臍潘侯持示余溫潤獲琬圭維彼不比鍾左右殊髙低徇激等一偏詎可航且梯蹇余惕瘝曠凛若臨深溪公言真菽粟致逺終當齎投身暫炎燠每憶寒風凄公能隨器使儻似蹣跚奚次徐亷使贈潘僉事詩韻却寄徐公持節南閩逺帝庭每懷東魯舊儀刑讀書至老眼如月憂世常多鬢轉星興到湖邉增漲緑詩來物外見空青于喁有唱不易和小知間間愧大寧寅夫惠教逰鼓山四詩細讀如在屴崱杖屨間想像追和用堅重遊之約城市林泉隔幾關半生幽興欠閩山久聞屴崱髙寒處一望蓬萊縹眇間有約同看紅日上無端獨占白雲間錦囊收拾竒觀了物色分留肯破慳足力猶堪敵瘦笻擬乘寺頂最髙峯杯吞東海一勺水鞭起南湫久卧龍佛界須臾三萬劫神仙杳靄幾千重煩公更泚如椽筆摹寫雲天不盡容炎方春淺未如焚花木迷人意欲曛福地同逰勝獨往中天一覽破千聞于今難擬髙唐賦何日重開衡嶽雲眼底流求彈丸耳樓船曾見漢家軍去天萬里此相遭攬轡無功敢告勞賸貯氷霜消瘴厲尚疑風雨隔清髙一年花事成佳蔭二月春江息怒濤細嚼公詩如橄欖挽回塵俗入風騷禊前一日西齋小酌立道有詩次韻奉酬誰解愔愔誦德音樽前喜識舊纓簮頗矜此客吾能有一見交情如許深久耐好看青荔色旋栽未展緑蕉心醉中狂語疑多謬記録何堪託彥霖次韻寄謝建昌監郡京國歸來嵗告成使君一再及前榮每聞美譽中心喜况見可人雙眼明公事餘間詩味永要官雅淡俗流驚遄驅頗覺從容少千里緘辭續短行次韻寄謝盱守學道生平慕廣成過家將旨若為榮曾憂霜後堅冰漸得遇雲間皎日明人事變遷終有定吾心寵辱本無驚風流太守情何厚飲至渠渠更贈行次韻寄謝盱江學院諸先輩半生事業竟何成冷笑猶然愧宋榮日逐黃塵雙袂暗夢回緑幕一燈明交情欵欵知君厚佳句翩翩使我驚皓首相期崇令德殷勤逺寄白絲行呼喇美御史還臺索詩二絶為别曾此觀風慣土風老榕能識舊花􅍡如何又踏秦淮月不待炎州荔子紅耆碩堂堂集柏端定應問俗及閩山為言部使無功狀減却吟詩一半間寅夫示再登鼓山四詩僕雖不獲同遊然來詩不可虛辱次韻奉謝且致歸班之餞大壑崖邉覆小舟摩挲舟腹得舒憂山神何意回吾駕客子逢春負此遊靈運一時遺鴈蕩少陵千古擅牛頭且看平地亦不惡暖日晴風麥隴秋勝處心知只耳聞却因君句得竒芬海天昏黑龍行雨樓閣青紅蜃吐雲仙境煙霞從痼疾詩家風月要平分悠然佳興誰能敗俗吏當前自糾紛眼前培塿足縈纒去去瀛洲大洞天一息南溟能幾月再行東海定何年江淮巨浪千堆雪榆栁中原萬里煙解視歸裝還不俗有詩曾酌瘴鄉泉我亦修持不動尊少曾一迹印空門居然慧力照法界即此深心報佛恩有道臨民只清靜無塵到慮儘囂喧公餘更得新詩和洗盡人間種種煩四月之六日是為遂良經歷初度乃避客于聖泉寺寅夫有詩因賦五言為壽此君真益友爾吏得嚴師松柏羣稱壽莪蒿獨廢詩聖泉尋淡味佛界受清規我亦代説法修行在勿欺建寧醫工提領虞益之謁豫三山出館閣諸公詩文欲得豫語為賦五言絡從兩馬去帶取五禽還何意求榮逹微身備險艱為齊太倉令入漢玉門關會有憐君者田園復故山次韻寅夫晚涼感事初夏微風作嫩涼傷春一夜鬢毛蒼紅芳寂歷午隂緑白晝須臾晚照黃濺淚露葵空滴滴鎖愁煙柳自行行絶憐熠耀倉庚羽曾帶千門麗日光生綃團扇十將以五十六字奉餞談公植提學謁告暫歸君留南嶠兩經春愧我兹遊落後陳今夏相期同食荔先秋何事忽思蓴團團明月隨歸路處處清風認故人休戀小山幽桂好重來要及菊花新次韻韓明仲教諭日力縻三尺風聲繫百司中年勞作吏纍月懶吟詩衮衮只如此悠悠何所之可人佳句在每誦輒移時羅山長用曾留耕僉事二詩韻見貽次韻奉答半嵗觀風熟越山頗驚機事等黃間昏昏書牘煩填委落落詩筒缺往還郢曲髙低渾欲忘越人喜戚正相關只應拙默差強巧不厭天孫賦授慳此士堂堂早覺竒品題合入外孫碑都亭司馬羅居城外今容與湖海元龍舊夢思一世才名終有實千年事業可無詩古人羇旅猶堪忍會見鳴機織素絲鼓山閩之望湧泉寺之勝有二美焉寅夫凡三遊而僕未一至每遊賦詩必四不鄙下教祇益吾愧次韻奉酬不辭使節滯甌蠻贏得期程飽看山成佛誰教遜靈運上人今復遇髙間詩盟未冷宜尋載禪鑰雖嚴許叩關到底內觀更竒絶只消面壁了區寰貯來胸次爾多春詩境長隨眼界新氣至再盈渾未竭計成三顧不為頻雲間屢宿犬能識海上熟觀鷗亦馴豈是逃禪忘歸意定應法喜賽如賔韓公嶺海杜夔州轉覺篇章興味幽試問何人聽白雪敢教此客卧朱樓寅夫時寓朱府樓借用對眼花自眩蘭苕翠心地不驚稊稗秋頗恨南音尚啁哳期君邉幅制橫流薰風景候雨冥冥壬癸居然勝丙丁五日尋常賜衣節三人瀟灑望州亭亦思竒觀供吟筆苦泥清齋隱內屏却把來詩容易和二分聲響八分聽次韻趙𢎞道僉事見寄熙朝新渥及癃疲臣子孤忠誓不移千載清風留瘴海一心皎日報明時已嗟聮事相逢晚要乞間身更願遲君獨行勞吾坐嘯多慙民瘼未周知奉餞寅夫使歸王君世儒雅不厭州縣勞一持秋霜簡徑署春官曹平生風月懷筆勢江海濤青冥使節下跋履閩嶠髙兀鞍了古今滿目餘詩騷盤桓無諸城嵗月驚滔滔寒梅昔飛花暗柳今鳴蜩繼明瞻日馭歸覲馳星軺愾余定交晚傾蓋如久要君行勿遲留耆俊方盈朝行省賈掾母劉以貞節表門閭寅夫有詩因題其後婦人謹三從生死不二天鄘風風已變而有共薑賢去古益以遼卓行同貞堅清朝厲薄俗令子貴俱傳柏舟二千年吾作刪後篇次韻張道判有客遊方外從容問所如口哦五字句手授一編書為看東溟水潛回西極車蓋公經濟略應笑賈生踈次韻奉餞傅岩甫歸院别後流聲落耳間炎風何許駐旌干種花往日洛陽句食荔今朝海上山舊事見前如泡影新詩向老更波瀾多君修得鑾坡福倘有餘丹乞大還久晴方欲禱祈仲經知事出平逺亭途間遇雨之作次韻二首海田將陸擬箋天海水何知有旱年帝念民貧欠蘇息一時風雨散飛錢海陵黃尋家先貧困大風雨散飛錢至其家後富至數千萬辨獄無寃可動天真卿事業在他年顔真卿為監察御史使河隴時五原有寃獄久不決天且旱真卿辨獄而雨人呼御史雨此時避暑山亭意應笑岑公眼見錢岑丈本山亭避暑有人叩門云上清童子元寶冠青圎角冠衣淺青衣問其冠服答曰僕外服圎而心方正上清五銖服也言訖出門去至墻下忽不見岑使人掘之一古墓中得一古文錢雪樓集卷二十六
