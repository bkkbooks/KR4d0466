body:
  text: 雪樓集卷六元程文海撰玉堂類藳敕賜碑大元國學先聖廟碑皇慶二年春皇帝若曰我元胤百聖之統建萬民之極誕受厥命作之君師世祖混一區宇亟修文教成宗建廟學武宗追尊孔子所以崇化育材也朕纂丕圖監前人成憲期底于治可樹碑於廟詞臣文之臣某拜手稽首奉詔言曰臣聞邃古之初惟民生厚風氣漸靡聖人憂之越有庠序學校之制天下之治胥此焉出中統二年以儒臣許衡為國子祭酒選朝臣子弟充弟子員至元四年作都城畫地宫城之東為廟學基二十四年備置監學官元貞元年詔立先聖廟久未集大德三年春丞相臣哈喇哈遜達爾罕大懼無以祗德意乃身任之飭五材鳩衆工責成工部郎中臣賈馴馴心計指授晨夕匪懈工師用勸十年秋廟成謀樹國子學御史臺臣復以為請制可至大元年冬學成廟度地頃之半殿四阿崇尺六十有五廣倍之深視崇之尺加十焉配享有位從祀有列重門修廊齋廬庖庫為楹四百七十有八學在廟西地遜於廟者十之二中國子監東西六館自堂徂門環列鱗比通教養之區為間百六十有七制加孔子大成之號祠以太牢贊釋奠雅樂江南復户四十肄之春秋二祀先期必命大臣攝事皇帝御極升先儒周敦頥程皓程頥司馬光張載邵雍朱熹張栻吕祖謙許衡從祀廣弟子員為三百進庶民子弟之俊秀相觀而善業精行成者歲舉從政又詔天下三歲一大比興賢能於是崇宇峻陛陳器服冕聖師巍然如在其上教有業息有居親師樂友諸生各安其學咸曰大哉天子之仁至哉相臣之賢工曹之勤其知政治之本源矣臣竊謂天地至神非風雨霜露罔成其功斯道至大非聖君賢相罔致其化人性至善非詩書禮樂罔就其器列聖相承謂天下可以武定不可以武治所以尊夫子建辟雍復科舉誠欲人人被服儒行為天下國家用耳然則黎民於變時雍顧不在兹乎於戲隆哉臣某謹拜手稽首而獻頌曰皇元受命誕惟作京以撫萬邦既訖武功載修文教登其俊良於穆宣聖垂範罔極首尊而彰曰爾胄子弗典于學曷風四方學以聚之廪以餼之日就月將大德嗣服乃建孔廟乃經辟雍考制程材審時相宜遹成厥功辟雍洋洋冕服皇皇群士景從聖道既明渙號既加我皇御天執道之中軌物牖民翼翼乾乾帝學益宏庶政惟和我化用宣躋祀儒師賔興群材丕紹厥先相古盛時訏謨逺猶罔不由賢天錫皇祖神聖文武以有萬國威何不加令何不行求何不獲惟學是務惟才是育下民允迪越厥左右咸有一德以匡乃辟惟帝時憲惟臣克念濟濟茂碩禮明樂備永作神主播頌無斁林國武宣公神道碑世祖皇帝有天下將帥用命士卒效死謀無遺䇿戰無堅敵以成混一之功敻掩前古而非偶然之故也威足以服其強武足以賈其勇知足以竭其謀仁足以結其心功必賞過必罰六者皆任將帥之具惟帝兼之此其無敵於天下哉逮夫聖子神孫繼志述事懋延之恩交於忠良之裔崇報之詔集於勳舊之門所以勸賢勵能報本反始之道亦未有如今日者若林國武宣公拔迹行陳列功帝室生都顯官沒胙大國君臣之際胥盡矣皇慶二年冬天子復命臣某表其世系詮其行事揭諸墓道以著功臣之思於戲何其盛耶臣昔待罪行御史臺識武宣於揚州嚴威篤實偉人也臣今幸得執筆史官奉明詔雖甚朽鈍不敢辭讓謹按公諱旺扎勒圗巴圖爾欽察人自丙辰歲以材武從軍己未扈從攻武昌先登中統三年從諸王噶必齊征逆璮於濟南再合戰再破之至元四年略地荆南至襄陽與宋師遇戰勝之洎攻襄樊水陸大戰凡四連勝之遂梯樊城焚樓櫓勇冠軍幕府上功授武略將軍新軍千户從丞相巴延丞相阿珠破沙洋新城繇沙武渡江功多賜金符十二年春與宋將孫虎臣戰丁家洲敗之改武義將軍夏戰楊子橋秋戰焦山冬破常州明年夏攻泰州新城功尤多江南平䇿勳賜虎符遷信武將軍管軍總管髙郵軍逹嚕噶齊軍升路仍達嚕噶齊進懷逺大將軍加昭勇大將軍十八年閩賊陳弔眼亂詔以鎮國上將軍福建等處征蠻都元帥往討之賊據三饒千壁嶺明年破其營擒之至漳州斬以徇又明年加管軍萬戶兼高郵路達嚕噶齊又明年改高郵萬户府達嚕噶齊二十三年入朝進驍騎衛上將軍江浙等處行中書省左丞兼管本萬户軍未幾行省遷揚州置宣慰司浙西以中書左丞行浙西宣慰使初江淮行樞密按塔哈出征日本難其代有司以公奏上深然之未行而院革會福建置行省復奏公為左丞上方倚公以逺不許遄有江浙之命二十五年遙授尚書左丞兼管本萬户軍馬宣慰如故復行省于杭立淮東宣慰司于揚州行淮東宣慰使二十七年改資德大夫江西等處行樞密副使兼廣東宣慰使元貞元年入覲拜榮祿大夫江浙等處行中書省平章政事大德元年閏十二月八日以官薨年五十九明年二月二日葬于高郵城西十五里茆塘之原至大元年制贈效忠宣力定逺功臣開府儀同三司太尉上柱國追封林國公諡武宣配某氏追封林國夫人最公前後以功被賞者凡八白金以兩計者六百成器者一楮幣以緍計二千四百有九十織金服一襲馬一匹鞍轡弓矢各一副公自荷戈戎行摧堅挫鋭小大十七戰戰輒勝及為高郵興學勸農政平訟理年穀豐熟人無夭札四方之民襁負而至郡有虎手格殺之生致其二人為立生祠浙盜猖蹶煮海為鹽為公私害公下車收捕籍為軍民以無事烏乎諡法折衝禦侮曰武宣力四方曰宣易名武宣不亦宜乎此固天授聖主然非世祖知人之明當天下方興之運雖有超世之姿拔俗之材孰能樹功立業若此哉矧當軍旅用事而治民獨懇懇焉如古循吏抑又難矣臣又聞有同人郭萬戶者援公例求虎符上謂參知政事特穆爾曰彼戰勝攻取若之乎輸忠竭力若之乎所至無不合朕心若之乎所授無不如朕志若之乎彼胡可比旺扎勒圖巴圖爾樞密院量其功賞可也方至元入見時公感疾敕太醫往視尚方賜飲膳又數數賜問疾未間則憂小差則喜及其愈也賜醫者楮幣萬緍烏乎待臣若此而有不盡忠者乎公誠千一之遇矣曾大父某大父某父某子男十四人長特穆爾特古斯襲髙郵上萬戶府達嚕噶齊遷資德大夫遙授右丞淮東淮西道宣慰使兼管本萬戶軍馬次伯勒齊固圖繇江浙行省左丞為資善大夫燕南河北道肅政亷訪使次婁圖武德將軍常州路無錫州達嚕噶齊次布哈次伯勒齊武略將軍湖州路長興州達嚕噶齊次察爾特穆爾忠顯校尉髙郵打捕屯田提舉曰達嚕噶齊次拜布哈次成格勒次徹伯爾琨為浮屠氏次巴拉次赫赫次察察爾次佛保次華善女四人長適昭勇大將軍户部尚書且實勒次適司徒洪塔喇海次適張托音次適揚州路泰興縣丞遊德宣孫男二十三人長曰錫桑襲明威將軍鎮守揚州高郵上萬户府達嚕噶齊女十三人曽孫男一人女一人銘曰桓桓武宣奮自戎伍精鋭霆行猷謀神與始從王師江漢之滸山東俶擾奪其旗鼓我師載南洸洸虎旅方城失險淮海遄沮城必先登戰莫能禦豈惟天命亦以公武何以報之綰符疊組蹈江躒閩跨吳兼楚以蕃以宣爰遏爰撫賊授其首鹽無私煮㕓有歸頑野有遺黍嚴嚴生祠穹碑翊翊惟公之疾憂勞聖主惟疾之愈喜形當寧惟帝之知惟功之敘云胡不憗摧我梁柱何以贈之大爵廣土我思世祖光宅海宇知人善任相照肺腑寒者煦之清風其暑夙興夜寐如覿堯禹我瞻武宣高原膴膴平生之言永隔幽阻天子聖仁德嫓皇祖勒銘貞石式憲千古武都智敏王述德之碑有元延祐元年春閏月癸未晦上御嘉禧殿詔賜大司徒瑪努勒父武都王述德之碑命平章政事翰林學士承旨秦國公孟諭詞臣為文夫褒功崇德無逺弗録以勸百工弼成孝治者天子之事也追求往牒論撰世美播之金石勒示永久者史臣之職也臣幸得待罪太史敢以穢陋辭謹按武都王諱默色斯伯什巴里人世出輝和爾族大父諱巴拉瑪妣曰伊德根父諱阿爾齊蘇為本部都統妣曰巴噶呼圖克王幼負竒質年十五盡通本國書太祖聞其名徴至闕下一見大恱曰此兒目中有火他日可大用授之睿宗俾視顯懿莊聖皇后邑入會計愜當復事世祖日見親用憲宗賔天王首勸進曰皇帝奄棄臣民神器不可以久曠太祖嫡孫惟大王最長且賢宜即皇帝位諸王塔齊爾額森格哈丹等咸韙其言乞從所請世祖踐阼眷賚益隆會立中書省平章政事王文統奏以為相不拜南征時與近臣布扎爾為斷事官及諸王阿哩克布克叛相距漠北布扎爾有二心王知之奏徙中都親監以往上以為忠數命收召豪俊罔羅側陋使車所至凡所引薦皆極其選詔與安圖並拜為丞相又固辭上語丞相安圖丞相巴延御史大夫伊囉勒諾延等曰賢哉默色斯求之彼族誠鮮矣夫王剛嚴闓敏周慎端信早居帷幄謀謨密勿世莫得聞方倚之鈞陶天下柱石廊廟謂宜銘功象鼎圖形麟閣竟以至元四年四月六日薨年六十二三宫震悼庶尹流涕曰奪我良臣昭睿順聖皇后出內帑買地京城之西高良河之上以禮葬焉特諡敏惠公武宗繼聖追念先猷制贈推忠同德佐理功臣太師開府儀同三司上柱國追封武都王改諡智敏配輝和爾氏曰布色穆爾翁吉喇特氏曰齊逹勒並追封武都王夫人布色穆爾生子四托音榮祿大夫宣政院使太府卿特穆爾布哈通奉大夫翰林學士承旨賽音哲爾朝列大夫安西路同知總管府事伊德爾平梁府逹嚕噶齊女二長適平章政事廉某次適輝和爾氏齊逹勒順聖皇后諸妹也生子五瑪努勒今開府儀同三司大司徒章佩卿阿實特穆爾終翰林學士承旨金紫光祿大夫領太常禮儀院事贈推誠保德濟美功臣開府儀同三司上柱國追封武都王諡忠簡竒塔特布哈早世舒克丹懷逺大將軍吉州路逹嚕噶齊額古爾布哈資善大夫中書左丞女二長適輝和爾氏次適杭州總管劉紹慶他姬子二和尼齊雲南都元帥唐古特中奉大夫四川等處宣慰司副都元帥孫男二十四女三托音子曰察罕雅遜資德大夫四川等處行中書省左丞僧家努行大司農少卿布尼雅錫哩同知澧州路總管府事烏舍唐州逹嚕噶齊塔納錫哩宿衛士瑪努勒子曰阿勒坦早世多爾濟巴勒翰林侍讀學士女長適都水監卿特穆爾格次適翰林待制王哈喇布哈次適大司徒阿僧格阿實特穆爾子曰拜特穆爾廬州路達嚕噶齊呼圖克真州達嚕噶齊科綽太常少卿和尼宿衛士伊埒布哈子曰格爾檀州達嚕噶齊長安特穆爾布哈子曰哈噶德福托里布哈長夀伊德爾子曰阿斯蘭開成路達嚕噶齊和尼齊子曰舒蘇布哈唐古特子曰多爾濟嘉琿伊伯格勒長尚巴延徹爾曽孫男琳沁巴勒女二人皆大司徒孫也竊惟太祖皇帝仁聖神武聞一介童孺之賢即萬里徴聘而不疑卒能收功帝室垂裕後昆前古帝王所未嘗有武都王生遺華要沒享榮名慶流子孫光輔纍聖聯輝竹帛襲迹王侯非天之所啓耶銘曰殷湯聘莘周文獵渭賢知斯立遐邈誰棄於赫太祖高視曠世暨暨武都拔自童稚萬里就徴罔敢或二聖子神孫男女大器目光爛爛出類拔萃儲精槧牘䇿足委積謀猷帷帳摧堅拉鋭翼戴功成再辭相位聯姻戚畹身忘其貴海內延頸思圖至治云胡一不憗埋忠九地載鍾賢嗣克述克繼夙夜在公鞠躬盡瘁群公列卿分符析瑞中朝讓能遐壤懷惠河山啓土如帶如礪光融奕葉期且千祀豐碑有辭天子錫類海雲簡和尚塔碑達摩以襌宗倡南海上六傳為大鑒又五傳為臨濟又十六傳而為佛日圓明海雲大宗師師歷事太祖太宗憲宗世祖為天下襌門之首沒後五十八年改元延祐春三月丁未集賢大學士臣皓昭文館大學士臣明埒棟阿奉詔加諡光天普照佛日圓明海雲祐聖國師修其塔命翰林學士承旨臣某為文刻石臣某謹按師名印簡宋姓嵐谷寧逺人七歲授孝經開卷問開者何宗明者何義父母竒之俾從浮屠顔公祝髮明年師沼公授經論通講説居嵐州廣惠寺日乞食以養餘即為粥以食餓者金宣宗聞之賜號通玄廣惠大師天兵破嵐州以師及沼公歸賜號寂照英悟大師稱之曰小長老沼沒弟章公住燕之慶壽寺有名往依之章昔夢師來即請為記室又思沼沒時屬師有賀八十之語心獨喜年十九住興州仁智寺歷燕之慶壽竹林易之興國興安之永慶昌平之開元真定之臨濟雲中之龍官華嚴諸大剎而主永慶者二慶壽者三放浪遼海上手刺血和金泥書大乘三聚戒本十有六部布之天下為國祝釐焉四方賂遺洎纍朝賜豫金帛珍寶巨萬惟以之建寺齋僧振貧乏而已凡主大會七度弟子千餘名王才侯受戒律者百數士民奔走依向者以千萬計皇太后尤深敬禮纍號燕趙國大禪師佑聖安國大襌師光天鎮國大士丁巳四月三日趣畫天風海濤飛雲之狀于華嚴之西壁詰朝而逝年五十六喪車行諸主鉢納合等秉爐前導火舉有黃金梵相飛出白鶴羣舞于上煙燼所泊皆成舍利五色或大如彈丸還葬慶壽之西南隅賜諡佛日圓明大宗師諸大弟子分舍利葬秦趙間者為塔七始師由山西來燕夜宿松鋪岩下因擊火大悟復參一公玄公章公諸碩師道大顯白與公卿大臣言必語以輔國安民時相夏里之徒方事嚴刻師勸以平政息役以弭災蝗體仁本恕以正刑賞選俊乂罷遊獵以養國體孔孟之道萬世帝王法程宜加表樹以興學校世祖在潛邸數延問佛法之要在家出家異同對曰佛性被一切處非染非靜非生非滅何有同異殿下親為皇弟重任藩寄宜稽古審得失舉賢錯枉以尊主庇民為務佛法之要孰大於此會朝廷將試天下僧丞相以問師曰山僧元不看經一字不識固問師曰國家先務節用愛民鉏姦立善以保天命我輩烏足計哉上聞而嘉之裕皇始生師摩頂訓之名壬子夏授以銀章領天下宗教事非所樂也以其徒朗公輩攝之是年新大興之普濟禪寺特更賜額海雲至元四年城京都有司定基正直師塔命遷三十步許環之唯師之道高廣洞達慈濟篤實儒言而佛歸其道易知其化易行所以致褒寵於列聖揚休光於奕世非偶然也有語録曰雜毒海行于世銘曰粵若達摩肇迹南海草有七傳至師而大惟師生知默識頓悟秉時鍾運歸我聖祖少躋講肆長歷璮場孔艱且勤厥道用光智而弗作惠而弗有彌虛而塞彌靜而久雷行四朝風動九壤飛琛走貨雲謝電往濟濟王侯揔揔學人問法指心求治以身德教並流內外揔統弗合弗離弗滌弗壅汝懸我解汝溺我援泮渙萬流忽為一源惟師之道倬爾有煒寺標海雲塔遷城址惟明天子是信是尊渙號孔嘉宜爾萬年靳同知墓碑天子治隆海內仁周天下閔勞恤善罔有內外言朝以入恩夕以出榮生哀死達于顯幽聖人之德至矣哉延祐二年春正月己巳上御嘉禧殿集賢大學士臣皓言在昔金季平陽人靳和能識帝王之真率衆三千歸我太宗皇帝太宗嘉之錫以虎符官以鎮南大元帥俾擊葛伯鰲背彈平青龍諸寨拔之壬辰秋復從破河南授絳州軍民長官以死其子用服勤州縣出入臺憲民懷其惠吏畏其威者五十餘年今天不憗遺奄然死矣父子忠藎未及大用臣實悲之冡上之刻惟陛下幸焉於是詔翰林學士承旨臣某撰文臣賡篆額集賢侍讀學士臣倜書丹臣某謹按府君諱用字佑之漢汾陽侯強之後世為平陽曲沃人父和勇而好義以乙酉歸國甲寅致仕至元二年秋八月朔年六十七終府君六嵗學於張理之日誦數百言十六見諸王拔都命長平陽工人遷曲沃翼城令有能聲至元六年改榮河尹奉法循理勸農興學賦役平允人用大和十二年移汲汲當南北衝民鮮事夥會江南新破餉給繁重吏多引去府君曰君命也我不可以效之乃發倉廪以賑匱乏開東道以便輸役悉視民之利病而罷行之歲中墾田至七百餘頃部使者王博文郡太守董文用察舉廉能尹襄陵居數月入為右警巡副使事至立斷豪貴側目二十二年拜監察御史二十四年僉陜西漢中道提刑按察司事二十八年僉嶺北湖南道肅政廉訪司事所向風動而湖南地控嶺海郴桂之間部使罕至吏暴民困寇盜時作府君入境招徠逃散震斥頑獷民賴至今大德改元知解州解人多藉煮鹽怙威凌冒發其姦狀盡繩以法使府却立莫敢抗八年擢嶽州路治中會建寺五臺山詔選可任本寺規運所提點者有司以君應詔到官期月廪庫充溢乃上言乞骸骨歸里以朝列大夫同知晉寧路揔管府事致仕日與山僧野老彈琴詠詩以樂餘齡皇慶二年十有一月某日乃始生之旦家人以次上壽畢坐而言曰吾壽命已終永訣于此言訖而沒春秋七十有六越五日權厝宅之西園送者數千人嗚呼惟府君公忠廉愛剛直謹簡故能臨民以德執法不阿所至立祠敕頌不忘厥懿而揚歷五十餘年十九在外不獲密邇清光大展厥猷為可憾爾嘗聞府君為御史時御史大夫伊埒諾延引至上前適有獻白海青者上顧曰卿為御史摧姦擊暴亦如此禽乃不負耳府君拜曰敢不欽承天子威命嗟夫君臣之間一見之頃遇物相戒如此而有不治者乎今上雖弗及親用其人猶以臣皓一言追褒前美不遺踈逖群臣於此得無感於心乎至矣哉聖人之德也府君娶賈氏有子六人德政進義校尉邳州判官德仁早世德信將仕郎泗州等處打捕屯田提舉德謙德淵禁直宿衛德昌好學善屬文將以某年某月某日葬府君於某處銘曰在帝太宗握符御乾天威所加鳥駭獸遷仡仡鎮南其徒三千歸于有仁金虎是懸功不待竟去不待年孰成其忠大夫翩翩煦之春陽濯之秋鮮野有禾稼邑有誦弦才長景促南陌東阡逖逖晉郊洋洋平川彼高者丘懷哉此賢鷙鳥之喻其言如天有詔勒辭過者下焉雲國公楊氏世德碑𢎞農楊氏自太尉震有功烈於漢重休襲嘉達于我朝益烜其光皇帝嗣位之二年夏六月制開府儀同三司壽國公燕京閭為雲國公明年詔以馴象五曳豐碑樹先塋命詞臣撰文大顯楊氏嗚呼楊氏之先其盛德矣乎其有忠孝之節匡濟之志而不克究施乃大啓于今乎將水不積不深德不積不昌衍大熾盛固自有時乎謹按雲國公五世祖諱興隆始居汴事金章宗為軍帥年三十八而卒生子諱永昌值金亂湛浮井邑以壽終有子諱福一諱阿里慷愾多大略年十六襲祖父官國亡率衆來歸從憲宗攻潼川將炮卒萬餘戰釣魚山死之子諱德榮年幼失怙徙家大同輕財好義有鄉曲之譽是為雲國公之父中統五年外祖母魏國慶育夫人巴氏薦其名裕宗召至京師命給事順宗邸至元二十二年某月某日卒葬京城北之狼冡夫人富察氏陳氏祔是歲雲國公夫人李氏入宫為今上乳母大德十一年春三月雲國公佐上平內難武宗即位立上為皇太子録阿保翼戴之勞封壽國公李氏為壽國夫人至大元年正月授開府儀同三司四年秋閏月追贈曾祖父資德大夫中書右丞上護軍諡安惠祖父儀同三司大司徒柱國諡武莊父開府儀同三司太傅上柱國諡康懿並追封壽國公曾祖妣富察氏祖妣陳氏妣陳氏富察氏並追封壽國夫人李夫人以受封之秋卒祔葬先塋惟雲國公自世祖以來歷事纍朝咸被顯寵前後受賜金幣竒服重器不可勝計皇帝御天下皇太后受天下養眷遇益隆恩賞益厚遂封兩國贈先世賜甲第官其子安寧典寶大監弟篤思繇中議大夫太子右庶子起家遍歷清要九轉為資善大夫領北等處行中書省左丞妻張氏封𢎞農郡夫人蓋楊氏數世願忠而不假以命願孝而不遂其志積慶浚澤以底于今一旦聯圭而朝列鼎而祭高爵厚祿榮及祖孫乃基于慶育之一言而以李夫人興豈非天之所命耶昔漢東武侯母嘗養武帝被恩穠渥貴重一時而其子孫奴從者弗率幾危於讒賴帝慈仁獲守富貴若楊氏父子兄弟事上克勤遇下克恭難不顧身寵不忘危其能保功名垂竹帛光祖宗刻金石也宜哉抑其先固建之以德耶李夫人乃不少延悲夫銘曰茫茫陜郊逖矣𢎞農太尉興漢代侯世公金流大梁乃樹元戎材與時違齎志以終受命天朝魚山繼忠太傅忠厚起家大同竟闢雲土大開厥逢婉婉淑媛養帝九重英英伯仲執事東宫出入艱勤夷險匪躬翼聖扶危載纘武功群蒙褰披日升于中列爵既疏茅土是封胡在先世德盛而窮胡在今日位高而豐匪善之埤曷報之隆惟帝之德惟臣之恭作此銘詩式示顯融袁州大仰山重建太平興國禪寺碑皇元有天下佛法益尊大天下名山思致崇極以稱德意皇慶元年袁州大仰山重建太平興國禪寺成有司圖上其事詔加刲開山祖師小釋迦曰慧慈靈感昭應大通正覺禪師二神曰顯德仁聖忠佑靈濟廣慶王曰福德聖仁忠衛康濟順慶王命詞臣發揚烈休勒垂堅珉臣某謹按唐宰相陸公希聲塔銘師名慧寂世韶州族葉氏文宗朝從溈山大圓師悟曹溪心地直指之奧又從國師志和尚得玄機境智之妙又按宜春圖經會昌元年師來自郴遇二白衣神指其地居之蓋方是時國正侮蔑佛法學徒陵遲幾不自立而師應七葉之運龍縱此山歷歲數百其道大暴於天下斯亦竒矣神蕭姓伯大分次隆初宅水上遊忽夜半風雨遷廟于堵田漢晉以來或淖高原為田或助官軍弭盜禦災捍患神怪不可度已迄今水旱疾疫之禱輒響應廟而祀者幾半天下非聰明正直能致然耶神得師而化乃宏師得神而道益彰故合祠于師之室封秩必俱大德癸卯冬十有二月乙亥寺災明年長老希陵圖復厥宇冰涉暑陟不懈輸幣薦貨者川至為殿閣各四樓亭各二堂六祠一若方丈衆寮若門廡軒庭若庾庫庖湢以區計草有八丹碧煥燦制度宏密廣員倍于舊而加美焉攢峰突嶂靈潭健瀑風景不改于昔而增勝焉十方來者莫不驚異讃歎惝恍四顧而忘歸又建棲隱禪院于城南門為出入祝釐之所噫勤矣陵何氏世以儒顯金華去為釋嗣雪嵓欽師之學為臨濟十八葉孫外𢎞而內峻學禪而行律故施諸其徒則尊嚴整齊而學成者衆示諸行事則感動聽信而業樹者隆凡三錫命曰大圓佛鑑禪師於戲是道也藏用於體則靜無不為推體而用則動無不虛慧慈以之承六祖開名山二神以之輔有道惠四方佛鑑以之廓教基宏法緒其致顯纍朝宣光聖代北儕泰華南友衡廬巋乎大江之右微而著毁而完豈徒然哉繫之辭曰惟大仰山周八百里據楚之袁昔有神人伯仲赫靈廟食其間在唐武宗粵小釋迦至自郴山歷澗絶谷神獻異境瓶鉢以安躪危躒難道喪不悖既固既完湜湜曹溪益澽而疏流為大川畎滌澮決廣治混冥會于一源道得其正地得其勝來學日繁後五百年室燬徒墮適啓聖元莫盛匪今莫高匪禪或鐫而刓乾乾佛鑑統一儒釋有光厥先揚溈激濟惡衣糲食以示學人學人若林直指其心有覺有聞表正失惑遐邇丕變順風駿奔崇構拓址高朗博碩如祇陀園青山為城白雲為屯翼翼言言由甲底壬克潰厥成孔勩且勤職司上言天子嘉之景命攸敦於赫慧慈洎于大神鼎峙齊尊靈宫既抗休號允鑠尚迪恩綸天清地寧保有無疆壽我聖君太史稽首播頌萬億永殿山門雪樓集卷六
