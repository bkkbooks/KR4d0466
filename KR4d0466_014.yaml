body:
  text: 雪樓集卷十四元程文海撰序引王寅夫詩序詩所以觀民風凡五方九州十二野如禹貢職方司馬遷貨殖班固地理之所載其風不一也而一於詩見之古者至於是邦也必觀其詩觀其詩則是邦之土物習俗可知已故曰詩可以觀當時所謂詩蓋民間所作也陳靈以後無風則民間不復詩矣民不復詩而欲知四方之風者其何觀風再變而為騷騷固楚大夫之作而非民間詩也然九歌可以觀楚俗之鬼天問可以觀楚祀之淫芳草嘉植楚産之名于山海經草木疏者觀之騷十而七八也則夫民間不復有詩之後士大夫之詩雖欲不作可乎哉繼風騷而詩者莫昌於子美秦蜀紀行等篇山川風景一一如畫逮今猶可想見他詩所詠亦無非一時事物之實謂之詩史信然後之才氣筆力可以追蹤子美馳騁躪藉而不困憊在宋惟子瞻一人其平生逰覽經行及海南諸詩使讀之者真能知當時土風之為何如詩之可以觀未有過於二公者也今禮部王君寅夫酷嗜坡詩噫甚似而幾矣去年冬被命繇京師渡江而南履越之絶徼走數千里足之所經目之所見滂沛衍溢而為詩不能自禁也天時地氣民俗物宜靡不曲盡未數月而成帙好事者將以刻之梓閩人邵光大以豫嘗與寅夫相倡和也請為之序引豫方觀風於閩閩之土物習俗惟懼夫知之有未悉得寅夫詩則雖未適閩亦可知其概也喜而為之書抑古者六詩九夏豳雅豳頌凡詩皆掌於禮官之屬民間詩無復可采也久矣寅夫歸以其所自作藏諸禮官之府他日陳而觀之其亦可以補閩風之闕至元甲午立夏廣平程某序上賜特穆爾參政海青詩序聖天子嗣位之二年詔以丞相東平公之子萬户公參福建等處行中書省政事賜海東青二勸忠也七閩為東平公賜履之地錫命象賢纘戎南服報功也欽惟世祖皇帝英明神武混一六合時則有若先正左右宅師帝嘉乃績開省江淮賜海東青四翰苑諸公播之歌頌亦越參政公追配于前人光以今所賜合而圖之侈上恩昭世美曠代之榮也在昔諸侯宣力王室彤弓盧矢錫盾雕戈以旌寵賚未有以精剛擊搏之禽比德而況功者少皥氏以爽鳩名官方斯劣焉惟世祖皇帝嘉惠勳臣惟大德天子祗遹先志亦惟東平公一家父子之懿實當是賜天地貞觀明良相逢猗歟盛哉小臣程某謹拜手稽首而作詩曰煌煌先正殿南邦有子重來憩舊棠鐵劵丹書藏漢府介圭赤舄啓韓疆鷙禽軒翥歸圖畫好爵駢蕃拜寵光却笑磻溪慳遇合馘黃項稿始鷹揚楊彥寬御史心逺堂詩序僕遭際天朝得以末技出入清邃去家數千里而逺客京師築室於北城之北又逺焉因名其齋曰逺及來閩望逺齋則逺益甚監察御史黎丘楊君彥寬將旨詳讞弭節之暇名其所居之堂曰心逺俾書扁且徴鄙語請問其義君曰吾驅馳王事燕雲之北嶺海之南閩粵之陬皆至焉非逺乎他日歸偃息堂上感念平生逰歷一一在目將為書識之名曰四逺志庶幾太史公自敘之意云爾抑此其迹也若夫周行而心閭閻一室而心萬里今人與居而神逰千載之上是則吾之所謂逺者然而閭閻萬里念之即到聖賢千載想之斯存則又見其為近何也余矍然曰子不云乎未之思也夫何逺之有君言近旨逺犂然有當於余心者遂敘其事繫之以詩諗於三山校官潘景大與諸生共賦之端居對爐熏宇宙腔子裏皇皇求仁義直面隔千里名堂意云何輾轉生議擬飛鴻碧天外我夢方隱几平生所周逰北戒達南紀山川渺無際歷歷在馬箠作書志四逺壁上挂雙履客來勿與言請自喻其旨感君語超詣我意亦復爾班荆談未了王事趍行李坡陀路漫漫霜霰寒靡靡念君何當從推枕夕九起相期在千載室逺人伊邇送黃濟川序數十年來士大夫以標致自高以文雅相尚無意乎事功之實文儒輕介胄高科厭州縣清流耻錢榖滔滔晉清談之風頽靡壞爛至於宋之季極矣窮則變敝則新固然之理也國朝合衆智羣力一宇內自管庫達於宰輔莫不以實才能立實事功而清談無所用於時若吾盱江黃君濟川以殷之士而用於周其通才修能有今之實無昔之虛所謂應時而特起者也始為盱江書院長當路者竒之俾攝郡文學設施注措異於腐儒識者固知君之才非可以間官散職拘也未幾剡上尹武岡新寧縣新寧俗雜猺獠寬縱羈縻猶不易治況徴令之嚴乎弛者不能以奉上刻者不能以安下往往而敗也君至官之日進其民與之約上命茍如是必如是應它一毫不汝動民感其誠唯唯而退後竟如約官民兩不相背質事無不辦集民無不歡悅者視君如慈父母信惠既於下而孚公勤亦於上而著觀風者入境讃誦洋溢願借留者雜沓至遏之莫可於是聲實旁流譽者交口薦者交章省臺以君政績為邑課最秩滿咸謂君且踐華要赴部乃取龍興征官以歸六典之經邦國大學之平天下於理財一事甚諄悉也而士大夫顧不屑為直度其不能而不敢耳詭曰清流以掩其不才之羞此清談之所以誤晉尚忍言之哉近制錢榖官與司民社者一概選而加優焉勸人以事功之實如此也而為之者猶或不得已其能洗濯自奮慨慷自試如君者幾何夫宰千室之邑與百乘之家一以治民一以理財聖門蓋難其人新寧之民非止千室之庶也會府之財非止百乘之富也君前於治民而可則今於理財吾知其可也而君之才豈但於治民理財為可哉試於其小固將試於其大君行矣吾又當有以贈君虛口談仁義通儒固所羞是間惟爾可劵外豈豫求出淤紅蓮淨經寒翠竹修朂哉須逺業古有濟川舟盧疏齋江東藁引疏翁意尚清拔深造絶詣犖犖不羈故其匠旨輯辭往往隔千載與古人相見向者遣教余以其詩文一編曰江東藁挹其風味如在疏齋時也余擕以自隨泛舟江漢相與卧起噫孰使余欣然於風波之上者非此藁也耶詩不古久矣自非情其情而味其味則東籬南山衆家物色森戟凝香尋常富貴於陶韋乎何取疏翁於此殊不疏今又弭節騷國抑尚有起豫者乎藁還因以訊之嵗寒亭詩序大德四年秋余之官沙羡既至得老屋數楹於黃鵠山下以居居數日旁出而後望則莽焉坡陀糞壤椔翳之叢雙柏出其中如弟昆如古丈夫冠服並立若有所待余意升高可以見逺而未暇也風霜益清使事益有緒退食之餘試命僮奴剗除蕪穢求一徑以上則江湖湛然雲煙在下凡西南可覽者無不獻狀自是亭與心目謀矣然既月而址始平又月而茅竹僅集烏銜鵲構未就而天大雪起視則卉木無小大方僵立受雪獨雙柏意韻沈雄蒼顔點白相對增媚嫵亭既成柏亦謖謖有喜氣余戲語坐客曰黃鶴歸於此乎欵當名欵鶴客延目久之曰無鶴有柏耳之二柏者待公已久亭又成於雪中語不云乎嵗寒然後知松柏之後凋嵗寒何如余喟然曰善雖然無此君無以相之遂益種以竹而題其顔曰嵗寒噫雨露亦勤矣其閲歷之久近余不得而知之有所待與否余亦不得而知之獨念其蔚乎相扶於朝菌之墟貫四時而不改又幸斧斤之屢逃得至於長以老乃一邂逅於余是亦可念已余既念之深又念吾亭草創不數弓材工弗良覆又不以瓦其能與爾相夀於無窮耶噫亭柏不可相無也繕完封殖後日誰非嵗寒亭長乎是又不得而知之系之以詩曰會心不在遠數步江漢明開荒豈不勞我僕汗且頳把酒酬天風雙柏遹有聲峥嶸首陽姿愧此盡瘁情念爾亦苦心紅紫聊合并時拚一日費買植數寸萌芳菲信可玩搖落亦足驚不如翳把茅隱几觀平生徘徊能幾何王事固有程尚堅嵗寒意永與雙眼青他時兩蒼龍相見白玉京吾詩亦贅耳此君在前榮十二月十八日廣平程某書是日也乃立春積雪滿庭揭曼碩詩引臨川以二謝故為詩鄉往或為余言東溪甘君者善鳴豐城壤與撫接多師甘君豫識其言久今年坐暑黃鵠山有示豫詩一編曰豐城揭曼碩作也豫聞為豐城人因憶前語為停箑讀數解清風與俱喜曰人言蓋不妄夫一技一能雖甚鄙且賤亦皆有所本亦必疲精力涉嵗月乃能精而况古者列六經之文乎未可以一技一能小之然或專志於是而忘其身或務以驕人至喪心自敗則又一技一能之不若揭君其慎之哉非豫喜弗及此言其戒之哉或曰揭故廣昌徙也豫又喜送陸如山歸青田創先祠序青田陸氏異時名聞江南義居五世而象山文安公出焉名遂聞天下家益蕃熾幾五百房又五世而燬於鄰寇火三日不滅凡異時遙瞻仰指敬嘆不容口者一旦如雲收氣散莫可追摹獨石刻道義里與表堠故在至元二十三年豫將旨東南因喻有司以先賢之里宜加崇祀然具文書而已於是子孫或徙或亡其猶環居故址者飢寒顛沛不能皆賢象山之基幾易姓矣不謂飢寒顛沛之中有如山父子者猶能自奮於義不肯委之無可奈何且謀建祠堂以杜豪奪之想建孔廟以嗣絃誦之音力甚弱而事甚難抑其志可尚已重趼來鄂求書其顔於是進而告之曰議論多而事功少儒者之通患也豫蓋以南陽之屋知之夫南陽子所見也豈悠悠且且調筆墨所能成哉今子以匹夫而欲謀百堵之室片楮而欲集不資之財余深懼其議論多而事功少也雖然義路也惟君子能由是路使子能修禮以親之陳義以告之皇皇然恤恤然其將無惻然而慨然者乎使又能勤篤如布福之長者堅忍如發願之沙門弗為則已弗成弗止文安有靈亦必曰豫有後弗棄基夫如是斯謂之為人子孫也已謂之大賢之後也已然則議論多而事功少未可謂通患也他日東歸當酌酒新祠且謝豫言之過雙峯先生文集序書者修齊治平之方也聖作明述昭昭具存猶之於醫定標本察虛實按而用之無難焉而猶云方多效少者非方之罪也理學至伊洛而大明逮考亭而益精學者家庋其書歸而求之有餘矣而拘者束章句虛者掠聲稱專門户以為高遊辭説以為達若存亡愚智交病雙峯饒先生最晚出徒得從其高第弟子遊乃獨泳澤窮源抉根披枝共𣲖而分流異出而同歸廓然煥然於此也僕不肖少獲事徽庵程先生知雙峯之學為詳蓋二先生之志同其造詣亦同今觀雙峯之於言抑何其富也大道之不明非書之不多若雙峯之書政患其未多耳其子轍抱以示豫凡若干卷且求言以發夫雙峯之書顧待豫而發哉獨念前輩典刑漸落後生聞見之外誦詩讀書而不知其人可乎因為序其梗概蓋雙峯慕學甚早力棄場屋尋師取友刻意斯文故卒成一家之學如此嗟夫士誠不可不尚志也後生可畏詎不信然好德之士有能刋而布之四方則後之學者雖不幸而不遇親發藥焉而得是書讀之其亦庶乎不終病也已南陽智夫人劉氏貞節詩序豫既為南陽智君仲謙書其旌表十二字曰貞節坊曰節婦智夫人劉氏之家清苑郭君安道又為求豫言夫人者仲謙之母也少而嫠居仲謙甫髫齔夫人杜門教以詩書長而宦學有聞家日以盛今仲謙年踰強仕而夫人夀康安輿就祿欣欣融融無逺弗屆仲謙之孝四十年如一日而夫人之愛猶髫齔時也當路諸公敬而慕之為請於朝乃命旌表其門於是中書報外省下屬城俾從事如律夫夫夫婦婦人道之常故曰彛倫又曰天倫是以古之王者建國君民教學為先誠以人得於天而為人者在是也載籍備矣易象論家人獨首曰利女貞爻義取於正家有嘻嘻失節之戒蓋謂梱內者一家興衰所係而必修身以為之本焉耳故世有寧蹈水火而不肯踐二姓之庭者其心豈異於人哉夫人之夫蚤世豫不得而知之然因夫人之節疑其平生修身以道相敬如賔所以刑于家者有素故沒雖不盡其年而存者政未艾也則夫夫人之德固有所本而然歟雖然彼背義失身者豈必待其人之身後哉今也不以一死一生異其心乃出於血氣未定之女子可不謂貞乎貞正也正位乎內之常道也豈無他人而傳之與否是乂在子之何如嗟夫使不幸而短折者得配如夫人何必托孤於其友幸而有子如仲謙則立身揚名以顯父母生者怡愈於高堂逝者亦無憾於九京矣豫蓋為之三嘆因又為詩一章以遺仲謙請歌以為太夫人夀三從義甚明千載事殊少南陽智夫人此志獨能了當其秉節初遺孤一何藐緬思身世事前路極繚繞煢煢高復下竟得出深窈清風梧竹間鸞鵠正輕矯扶迎上潘輿日月光皎皎斑衣北堂春金章公府曉皇心在美化有命建華表恩重子孫榮門高嵩華小獨慚吾筆弱嫋嫋如風篠升堂仍未卜佳氣瞻縹眇請夀太夫人新詩當清醥送向省吾序古郢向丈省之者余季父內翰西渠公乙卯同貢進士也襄陽歸國朝君攝其郡文學掾裒拾爼豆整比書詩三招諸生而三沐熏之以事夫子於垝垣眢井之間居十七年而殘者完無者有廢者舉峴榖之下若緇帷之林然由是諸公貴人閔其勤敬其志交口薦之得新喻州博士道經沙羡不鄙左顧噫君故儒冠乎僕毁齒時識君名氏於榜帖既壯識君譽處於西南士大夫而季父捐館舍二十有一年矣及來荆部訪問乙卯同升諸君落落一二意謂如君者進之則已結駟橫金既貴且富退之亦不失乘下澤稱循良而今故儒冠乎夫君不難於襄顧難於新喻乎今人幼而學之壯而弗得行則太息其誤耳甚則裂而棄之耳孰有能如君者乎曾子以傳不習日省其身如君者可謂能傳而能習之矣使人人如君固夫子所望於天下後世者然則其忠於為人信於交友蓋不占有孚也故因君之字而敬易君之號曰省吾且為詩一章以代縞帶鄉先輩楚山王君率同文諸公詠歌以壯其行俾豫為序夫新喻文獻之鄉也倫魁所寄先生巋然為今夀俊其為問訊焉嫋嫋風生楚户砧幾年相望愧相尋君家大耐留真譜吾道多艱見盛心定有諸生碑峴首政須名士樹薌林耆英幸甚倫魁在鄉校胡寧金玉音送范晉教授江陵序至元丁亥余以侍御史奉詔求賢馳驛至杭衆言范君晞文之賢余因薦於朝時范君諸子侍父旦暮來逰麟角鳳毛雍雍詵詵皆不失家法余既入奏范君由是連佐憲府自爾契闊不四三年而聞范君沒雍雍詵詵者未知何如也大德壬寅孟夏之月余方坐雨黃鵠山下乃有二士踵門俾僮奴問焉曰杭范也延之而望之長身顒昻接武以進豫驚曰藥莊固在乎曰其仲子也年若何四十一矣斯為誰仲子之子也二十二矣嘻豫至杭時范君未老仲子弱冠其孫甫勝衣别半世而未老者不復可見可見者駸駸中嵗幼者亦挺然成人余之齒髮蓋可知己人生真能幾何窮達短長皆聽命於造物而造物又不足恃其可恃者政在我而或者又捨而不為則雖生世千百載亦復何有今范君有子若孫如此亦足覘其平生矣蓋范君起家儒業博謇好修好交四方名士又能束諸子以詩禮故身雖沒而猶存諸子皆為郡博士而見余於武昌者江陵教授晉也晉字誠之綽有父風故余初見而驚以為藥莊不死夫死不死不必計也茍生者不能生其生則死者誠死矣荆州古稱多士麗澤之藪也慎擇而淡交博聞而約取尚友千載問津聖賢異時余再見之豈止曰藥莊猶在哉送僉憲郭安道遷部江西序沙羡當江漢之匯四顧平臯曼衍積水空曠山則借於江北曰大别招於湖外曰八分皆草木荒寒來無因而去無繼黃鵠雖朝夕近眼然亦伯仲也突兀穹隆岌為郡脊城郭宫府蟻附之憲府獨坐其脅豫與清苑郭君安道間嘗相語以為山者仁人之所樂而或者以為人物風俗之基也今沙羡之山若此君嵗時將指以出若鼎辰沅澧沔嶽之山亦異於此乎未幾安道以奉使稱職遷部江西夫江西固山水之聚豫郢人也適彼土雖有年而官牒驅馳席未暖輒去登臨遊觀之事甚鮮然聞談山水清麗秀偉者咸曰西江今安道乘軺褰帷轍環所部所謂清麗秀偉者當悉獻狀豫固欲因安道而覘人言之信否也且彼自南州高士而下至於歐曾王黃書聲至今不絶果清麗秀偉者基之乎登臨遊觀雖非使者事亦惟山巔水涯杖屨幽隱乃得近民而悉其疾苦江西往往皆山安道不憚遐且險而幸一至焉庸非父老之所願望羅列所見參伍所聞其亦有以教我哉抑又聞之山若增而高水若闢而廣信斯言也是山川政有待於人今顧以人物風俗責之可乎安道於此既已大稱厥職矣移之於彼直易易焉耳豫固未暇為山川賀且將為人物風俗賀也麻源第三谷有書室焉豫又寄聲為山靈賀送虞德常序一畝之宫必嚴祀典一卷之書必崇師道夫子之道可謂達矣然道不能以自達而達之在人今國家郡邑凡幾千百所逢掖凡幾千萬人一旦拔而立於一州羣士之上匡坐而臨之北面而事之是可謂身之達而未可謂道之達也古者政教不分今則各有攸職言政者或不及教言教者未始一日可無政也政者正也身非一學之正乎德常家有相譜義方之訓素明不患無以教亦不患無以為學之政惟毋以易心處之斯可矣且吾聞龍陽昔有木奴頭千其人爭相傳以治生為俗以治生為俗則既庶且富教之有其基矣在吾所以達其道者何如耳今學校之弊滋甚豫常言之子常聞之尚其懋戒之哉送朱芾序書吏有朱芾者從余湖右三年矣承臺命將舉而進之察院袖巨軸願序其顛將以謁諸公贈行之詩余謂有詩而後有序序先詩非古也子其求詩序無難者乃再拜曰芾之事公也非若世之吏於官也以其嘗從事於章甫逢掖之後也辱教而誨之今兹有行蘄一言以終身非以為夸也余曰嘻子吏也誠有意於儒者之事歟余何愛一言昔在西都厭馬上而刀筆刀筆厭而儒生盡罷百家之言獨與儒者共治卒之多文少質為天下笑不得已求篤行孝謹如萬石君者得其二子焉尊顯之以風中外雖齊魯質行諸儒亦自以為不及也而儒者自是絀矣夫孝謹天下之善行儒者之常事而未足以盡儒者也儒者不及而他人及之儒者有餘責矣然而西都所用而可笑者果儒者乎嗟夫世之非儒也舊矣吏之不儒也久矣吏不儒吾無責於吏也儒而吏吏幸也茍祿俸纍月日隨羣而入逐隊而趨儒乎儒乎如斯而已乎夫儒者之功用未易以一言盡顧子方抱文書事朱墨子而能盡儒者乎抑子既號為儒矣踰職分行胸臆作威福常吏之所可虞者吾不虞子矣其佐而長其共而職至一所遇一事則必參以平日之所以學者謀及乃心曰此公也此私也此理也此法也某利某害某可某否止者必止行者必行長未知則告之告而未信則宛曲而道之期於合吾之所以學者而后已則雖未有以究夫大用之儒其不有以稍别於尋常之吏哉豫將觀子矣其母為篤行孝謹者所勝則幸甚豫素餐之尤者也念無以進子者因子之求其言也書此以贈送續好古赴監察御史序大德六年冬中除湖廣行省都事續君為監察御史聞之者咸曰真御史也古有所謂真御史矣或批逆鱗或鋤大姦衆不敢為而獨為之故莫不犁然心服而謂之曰真御史今朝廷之命續君也人初聞之而君亦始受之咸言然者何廣平程某曰然是可以為御史矣抑豈獨御史哉世有德不足以居才不足以行而徒位民上是皆非所宜得與私取而隂據之者無異也故臧文仲為魯大夫夫子猶謂之竊位人心雖如其面而是非則公識與不識如出一人焉有非內交要譽而得之者吾聞續君掾於臺無異言掾於省無貶論簉於宰屬聽聽焉蓋其明足以照而不炫清足以肅而不激記有之博聞強識而讓敦善行而不怠續君其庶幾乎凡百執事舉能其官而況乎御史御史於事當無所不通故於事亦無所不言言者御史所得專也行其言非御史所得專也噫其不必行而不言豈稱位者哉續君字好古吾知其自期於古之真御史矣將鳴朝陽豫亦喜而不寐於其行書以識别送憲幕仇信卿赴臺掾序孔子曰仕而優則學豫觀仇君信卿其優而能學者歟信卿出入風憲垂二十年豫承乏南臺時已有誦其材者厥既此來幕得賢佐精神意慮之所至無不悃悃盡心焉退食相從則必以攻過為請豫初不見信卿之過而信卿必欲自知其過夫喜聞過仲由也幸人之知己過夫子也然則信卿可不謂之優而能學者哉臺聞其賢選任為掾行有日適豫痁作而伏即卧內求豫規警尤力夫昏昏而使人昭昭孟氏所笑信卿志則美矣而獨求豫規則誤矣昔者衛武公九十入相猶切切求人之針已故詩人歌之曰如圭如璧如金如錫圭璧之與金錫非不善也亦必磨礲鎔範而後其器亦成故又頌之曰如切如磋如琢如磨瑟兮僴兮赫兮喧兮今信卿年方強仕小心篤志其造於衛武公之地不難世之仕者計嵗月以爭品級早夜屈其指朵其頥薰然於其心又何暇省已分內事而信卿勤於公篤於學如此弗可及已惜乎豫方病而無以答其善意也且方資信卿以政豫失而居吾上者顧奪之以去又惜乎無以止其此行也然則其可終無一言以贈之乎曰甘受和白受采君子以虛受人大德重刋元豐類藁序南豐先生之故里本邑也異時邑於盱民猶以汲汲告進而郡焉汲汲可知已故長於斯者循簿書期會之文而無害己謂之能已足以獲乎下今郡猶故也簿書期會未之有改也而能刋先生之文於校官此其於民必有裕之者矣不然夫子適衛之言獨非為政之大方乎先生之文天下之文也而於鄉校顧無之非無也有於斗齋黃令君而無於燬今復有矣欲余序其顛夫文之有無不繫於板板之有無不繫於序而惟民之有無實繫於守令故豫於文不待贊而贊為州者之能裕民焉為州者誰乎東平丁君德謙也昔先生為齊州齊劇郡也頑悍凶盜之訟無虛日至未幾而郡中肅然然則觀先生之文當觀先生之實此又讀元豐類藁所當知者大德八年嵗在甲辰夏五廣平程某序段郁文詩序始余承乏臺端郁文為掾朝夕從事於簿書相識而未相知者蓋久逮歸江右聞憲府照磨段君名聲籍甚既見則吾郁文也於是始知其政抵舍與舊友吳幼清夜語因及當途學士大夫幼清語余曰方今段郁文其人也幼清介士少許可言蓋不妄余於是又知其學恨余方里居而郁文有公事不得接膝劇談又恨余知之不蚤也洎客武昌聞湘部從事段君日與其長屬諤諤相可否聲流東南問之又吾郁文也噫人有一異已穎然自出於羣何郁文之多耶今豫謁告來西郁文已謝病棄去乃擕詩二帙過我高者不讓古人下亦不與無病而學呻吟者同調蓋寫心之辭正而真即物之作幽而絢也余讀之數過太息曰余識郁文年數不為不多對面不為不數至于今而后又知其工於詩人果未易知乎抑知人固未易也為之悵然移晷則又嘆曰郁文非求人知者固不以豫為過然有文學政事如郁文而不為人所知者世豈少哉若郁文之文學政事而如豫之屢知深知者又豈少哉郁文其行乎朝之公卿士之孫陽也郁文其行乎然則豫之知不知誠不足計耳姑識豫慨送曹仲堅主閩縣簿序仲堅自建安郡博士調閩縣墨曹將之官豫酌酒與别相與言曰政教一事也以教為政上不怒而下不殘不知道者返此決裂疲曵不能相勝而上下之情暌猶以加損於鞭朴為仁求詳於情偽為智嗟夫循吏之風不其逺而則陽名家軌轍殫見洽聞欲求吏治之宜求之家譜足矣然仲堅以文學掾而選為邑官是責之以教為政甚審行矣勉之仲堅曰唯唯然吾之身一而已職又最下且繁彼居吾上者若是衆也又若是尊也吾懼吾志之不得遂也豫曰不然今下之事上也謹而若不敢惰勞而若不敢怨仰瞻俯聽遙立側趨惟戒令期會之是從猶懼或失之若此者滔滔也然語之政體而不能知問之便宜而不能對者亦滔滔也是故上之人或以奴𨽻畜之狗馬使之而猶且伸於衆人之上以遂其志今仲堅昻然雞羣一舉足之間固有驚顧而改視者初不必為前之滔滔又豈不先於後之滔滔者而遂其志乎仲堅笑而不言其不言也謙而不敢居耶抑未能信吾言也因書於方以為異日一笑之具送王謙道逺逰序王謙道弱冠逰四方行不輟足今老矣而志不衰一日告豫曰曩者足目所及海之北江淮之南而止耳幸甚遭時盛明車書萬里而身猶局局然守一隅殆將抱恨沒齒明年將問津度淮由徐兗歷青齊放覽趙魏之郊翹首神臯一觀上國之光天不尼我又將出居庸望遼東西緣古塞涉安西北庭東入陽關下隴坂訪秦漢之故迹或首商於或徑斜谷首商於則沿漢沔徑斜谷則下荆門歸而把酒骨肉族談亦足以樂此我之志也而行無可聚之糧居無可託之友其將如何我志殆已矣乎不可也其將奈何豫曰以君才器充朗且挾竒能又將之以無心不忌故所至若歸者四十年有餘矣夫在物者雖無窮而終定也在君者無虧而益進也以益進而待終定則無窮者乃在我而何志之不可遂哉且所欲遂者觀覽之志耳非有世好之競而齗齗之爭也其相宅既工其詩文又組織華妙言論土苴亦足以悅可衆耳不棘其喉殆見所至必有傾蓋留連執𬒮繾綣使不得以乍來而徑過其未得亟遂所志者或以此耳他何庸慮雖然人固未知謙道之志也君其升車吾當推轂送王敬甫都事歸省詩序觀春暉而興吟望孤雲而延想人子之於其親也聽於無聲視於無形曷嘗一日而忘之哉王君敬甫杞人也而仕於燕身雖燕而夢無夕不杞也蓋其父母家居年皆七十鶴髮相對諒其心之於子亦猶子之念父母也然敬甫方以材敏博通上下之所倚愛雖欲一日置身於親側而無由然人之父母之愛其子也將使之晨昏膝下雍雍怡怡為鄉曲之人乎抑將使之行其志昌其身以安其親與其家以及天下後世乎為人父母者其必知所擇矣然則敬甫身雖燕而實杞也庸何傷大德十年清明謁告歸杞且省其親春日遲遲花柳迎路樂矣哉敬甫之心歟上堂起居內外交賀樂矣哉敬甫二親之心歟世無善畫孰能寫其形容學士承旨靜軒先生率同僚賦詩以餞之而俾廣平程某序之解安卿父八十賀章後序有養而貧弗得弗仕古之人恆言之今之人亦恆言之故令甲曰八十者一子若孫侍所以通人情隆天經也然嘗遡沿而觀之身貴而親存十一存而安榮十一而父在者堇堇也於是彭涓之學旁聒曰尚弗信吾道耶噫試數之誠然矣今渤海解君安卿都膴仕而親年若釣璜之叟是可賀已持吾中菴翁之序以歸升堂再拜乃稱彼兕觥出諸袖中而讀之又奚必舂容要渺之金石也耶既而為吾前曰有廣平程某之説若此其然歟倘以為然當叶之宫商嵗嵗為老先生夀送楊彥寬謝事東歸序黎丘楊彥寬健吏也父任入官以巡檢獲盜遷尉平原又獲賊四十餘伍凡百五十餘人遷禹城主簿政聲流聞辟大都警巡判官公亷自立不茍不回有執偽劵奴良民者有司信之閲六七年不決彥寬至而辨其偽言於政事堂遂得釋上下翕然譽之薦為威州判官會有旨建行御史臺於雲南選為御史益展其能得隱盜金榖以萬計匿户五百有竒梁王旌以錦衣遷江南行臺某將指閩中彥寬來讞囚相從甚樂既别常思之繼聞以亷訪僉事行蜀部表表愈偉深稱厥官安西王復有金衣之錫今年會於京師則曰吾老矣得謝東歸矣蓋彥寬讀書通古今天􅐾明介方雅可以仕則仕非茍祿以自營可以止則止亦非為名高以自異進退綽乎有餘裕彥寬有焉公卿大夫之子孫孰不仕祿有能若彥寬之能其官者乎居則曰不吾知也如或知爾則何以哉若彥寬者誠可謂搢紳之羽儀學仕者之矩矱也已矣彥寬生平周行四方馬足所至幾百千萬里嘗紀所歷山川風土為書表於所居之堂而榜曰心逺今者冥鴻高舉於是心與身俱逺矣雖欲從之末由也已烏得無言以抒吾思乎别酒既酣因述所知彥寬者如此至其所以持身抗志與世周旋者余也又何足以知之驪駒在門毋庸歸之聲猶寂寂也誰能永歌倡豫和汝送蕭從周序進身非士之急務也然幼學壯行之道浸以無實韋布憂飢寒膏粱顧家世自有不得不急者矣於不得不急之中而乃有不屑屑焉者若則平氏之子是已則平廬陵蕭氏之望也早以英妙卓越見知諸達尊東平徐公子方知之尤者也故則平出為時用垂二十年不幸無祿英妙卓越又集於其子大德十年冬識於京師守之以粹溫表之以端謹余知則平氏有不亡者存凡識則平者咸曰幸哉有子如此是誠可幸也已未幾别余而南問之則曰觀禮樂必之魯觀天下必升岱宗觀止矣僕之事畢矣仕乎曰俟有知已此非僕所得急也余為之喟然曰子方與余僚好甚深子方所知者豫皆知之以子方知則平而則平名聞於時今豫非不知子而子猶棲遲於逆旅子雖不屑屑焉余獨不愧子方乎雖然余聞匠石之入山林也自柤杙以至於拱把未始留視焉何則俟之也今子歸其亦勉之乎人且有俟子者矣謝伯琰親年八十詩引中書謝掾伯琰介特士也余嘗識之聞其敏而勤貧而有守其曹甚劇行不暇正履坐不得安席轇轕終日而治之沛然獨以親年八十不獲就養為念每思貽親歡而無繇余心嘉之古之述孝子之事者曰思貽父母令名必果以今所聞伯琰其貽令名者歟豈惟父母雖州閭鄉黨莫不與焉然則欲貽親歡孰有加於此者且中書天下之則也人秉是心從事其間顧不式哉余既嘉所聞又覩此卷因欲堅其志以安其悅親之心且為凡仕者勉用書其端送毛淵巨源知沔陽府序方城以南雲夢之藪也川澤阻奧地曠而人稀更散迭聚往往非有恆心之民智力稍異已足稱雄其間而漢南之俗非復百年之舊矣彼之杞梓之材羽毛齒革之用凡地之所有國之所資者若未始不逮於古實則莫之能偕也況所謂楚材晉用者乎家本郢也高曾之墳墓在焉故不能不致意於彼蓋嘗感歎而思曰毋乃山川之改而風氣之異耶抑化之未宣作之不興生而無以成之也邂逅彼之良守令其試以是問而告之今年秋自帝所還燕故人毛君相勞苦則知既受左符為竟陵行有日矣殊為君喜君又嘗官漢南彼之民情吏治甚習今往而設張蓋必有甚愜者余又為彼之父老喜也況方地千里有民有社非若向之有所從而弗得專又況君之敦惠開敏老於從政然則彼之良守非君其誰佘於是為之纍喜且自喜將得所問焉然君之去彼土也二十年有餘矣山川風氣之不改與否余雖欲問之君而君必未之或知也然則君其行乎化之宣否他日余將問之來自竟陵者送喬達之守東平序剖尺寸之符分方千里之地多者屬城數十少或半之朱轓皂蓋四馬加騑雙旌前引千騎所至長吏鞠躬將迎於數百步外老幼扶擕夾道相與攀肩翹首如望神明皆以一見顔貌為慰當是時軒車高大使君匡坐其中張髯直視意氣拂雲賞則賞刑則刑未知古六國諸侯與我何先也則二千石亦貴重矣然自非久直承明及朝廷高選與郡國殊最當遷不得為也至未半嵗或璽書勞問奏課高者至入為三公故為之者大抵高材美器足以承流宣化父母斯民西京以降益分益削至於近代名雖郡古一小縣耳官曰守一令長耳授受之間皆有易心而上下交病矣今則不然名城大邦通名曰路所統城邑母慮數十牧守之任恆擬朝廷達官蓋與古制合吾故人喬君達之由翰林學士出守東平達之文采風流高材美器亦不在古良二千石下而東平詩書郡多秀民其文者師友之野者父母之又從而勞來安集之方今治體惟古之循吾見達之入而在槐棘之間不難矣不得不為達之喜且為東平得良二千石賀也或曰達之在朝廷久視官如家遊公卿間如親戚典章文物間習優甚所向吻然而合耳郡國專民社之責一語一默政之臧否民之休戚繫焉而郡又有所攝率不得直遂達之高明英邁固無所擇而或非所樂也曰不然大丈夫之仕也豈為己哉達之必不其然王成增户而得賜爵次公為相名減於治郡時吾知達之不為前之增亦不為後之減也麾節在門僕夫整駕諸君得無言以贈之乎宗鏡録詳節序蓋聞學以離言説為宗心以了空相為鏡然尋宗詣學捨言無示學之方而即鏡觀心執相乃非心之體是以五千四十八卷敷演未周十方三世諸尊究竟何在喻如分江浸月一己為多縛缶度軍萬猶云少良由根塵有利鈍悟解有淺深翠竹黃花元非議擬赤髭白足亦假因緣是故靖菴剪裁古記披祴須提正紐伐木先削旁枝信手拈來皆是隨身之鼓笛回頭蹉過别無徑路之津梁莫憑逐客書空且對癡兒説夢偉哉龍象幸甚人天續彼篇章述余讃歎云爾至大二年重九日翰林學士正奉大夫知制誥同修國史商議中書省事程某撰并書雪樓集卷十四
