body:
  text: 雪樓集卷十九元程文海撰碑銘趙國公田府君神道碑銘世祖皇帝肇造九有海內忠智藝能之士咸徴至京師循名索實寸善必録人亦莫敢為欺至元南征聞中山田公善易召問宋平之期對曰丙子已而果然上大恱欲官之公拜曰臣言偶中陛下幸官臣臣福淺必嗇臣壽固辭賜束帛官其子忠良留侍中纍遷太常卿火德末群凶搆邪謀危社稷太常力爭之不屈今上入平內難迎立武宗録功拜大司徒至大二年秋七月有旨錫公光祿大夫大司徒趙國公公聞遽謂二子曰亟廣廳事吾將死吾不及拜命矣命下而薨是月二十有五日也年八十七而廳事之工甫畢賔親臨弔得以成禮某年某月某日歸葬中山翟城鄉王吕杉東原先塋又四年大司徒以狀來請曰忠良與子列周行接燕好三十有八年矣知先世莫若子幸奮子之筆揭德墓門以惠我子孫某不得讓謹按公諱閏字閏之其先平陽趙縣人曽大父官裕州因家焉再世以亂離居中山遂為中山人大父諱嗣叔字起宗讀書務知大義不為章句儒有至性事親孝嘗侍疾衣不解帶者四十餘日歲出金幣易粟貸貧民負不能償者焚其劵河北亂人爭來依計口給食人安如歸盜賊四起郡縣不能制乃聚衆自保聞天兵且至縱令自便曰爾等宜自逃生母為我慮衆感泣曰去將安之遂與二子率衆二百餘人間道詣睿宗行在所賜金符弓矢拜千夫長漢人降者𨽻焉為軍前鋒申裕獨樹原良鳯岡數戰皆有功號敢死軍焉黃陂之役金兵大合率敢死數百搗其中軍金兵大亂俄而復發倉卒為流矢所中二子馳殺射者創甚猶戒子以忠孝語絶而卒年若干父諱子成字成之勇悍多智略事父母守家法少好兵書善騎射裕州盜日衆兵禁尚嚴乃置長竿植利錐其上長尺有半又作袖矢之法盜聚南山中日索食閭井即預給米為粥以食之唯不敢入田氏門坐五十步外傳言往來既月欲去來需金帛故怒罵辱之忿而退料必復來勞衆設伏以待旦果大至袖矢斃其酋長伏俱發大敗之奪其巢壘輦金帛悉送官由是知名辟聘交至皆不就隨父攻城破柵常為士卒先説其帥田鎮海曰俘多百工有技藝冝存之備任使鎮海言之上上以為然命閲實未幾餉不繼將盡屠老弱及無技能者復進言今之兵為民拯焚溺也臨陳降者尚不可殺已為民而殺之可乎散之河北使自食其力足以結人心從之活二千餘家號種田户上命兄子實為總管領之子成佩父金符為人匠總管詣𢎞州久之引疾上所佩符南還聞河南蕩析留中山前河北種田者亦來相依所居成聚幸流轉生還計將終焉屏絶人事日具酒肴速親友酣歌道舊為樂人欲延致即欣然而往或連旬不返婆娑嬉遊年七十終無子以子實之子為之後公也孝友篤實力農務學不樂仕進嘗憩桑下得遺槖滿貯金也守弗去頃之二人踉蹌來揖公曰見吾金耶驗之信悉還其主請以半遺公曰我欲之而待子耶曰願報公德公曰金子之金何德之報尤嗜醫卜之書讀醫書三年悟曰醫不可為也夫人之血氣衰盛隂陽薄戰其道猶可知若微陽伏於盛隂之下微隂潛於極陽之中毫釐不辨生死懸絶而可輕哉棄不學研精於易及六壬之説逮被徴而還技益進復潛心釋典常教二子勤學親師取友以身率之既而曰占筮之學易大難士雖未學可習而能苐用之冝得其道耳至是父子身被國恩榮及先世祖贈昭文館大學士中奉大夫諡忠毅父贈資德大夫尚書左丞諡武康並追封趙國公夫人信陽吳安撫之女慈順儉勤為婦為母儀于族姻先公卒與祖妣曹氏妣陳氏並追封趙國夫人子男三司徒居長次忠亮為臨沂巡檢卒次澍翰林國史院司直孫男五天澤翰林侍講學士從規國子生蚤世從矩從鈞從義皆力學女九六為士人妻餘未行曽孫女二某竊謂皇元建國世祖混一之盛自古鮮及非偶然也以誠待物故盡物之情以寬御衆故衆樂為用爵賞當功不求備於人故小大任職而天下以勸知公之志而不強之以祿卒享期頥之年受大國之封知司徒之賢而留以遺後果能立功社稷顯名天下君臣之道胥盡矣嗚呼家世孝弟慈惠而未食其報忠智才勇而未盡其用源蓄本冨以有今日天道果逺哉易曰積善之家必有餘慶又曰知進退存亡而不失其正田氏有焉銘曰綿綿有媯陳後啓齊條流布濩漢綬唐圭伊祁之墟厥胤攸棲揚英掞華世載典彛金運波流去家裕州羣盜滿山禁我戈矛揭竿袖矢馘醜斃酋倣徨四顧何地可休率衆間關來趨輦下父子兄弟驅馳戎馬或攻而城或戰而野父中流矢子殺射者欲活爾俘慷慨陳謨殺降不祥民何罪辜于農于工各總爾徒工處于𢎞河北農居翩其南還冥鴻拂天顧瞻河南莽無人煙息駕中山吾將老焉酣歌暢詠以樂餘年悃悃光祿克承克似羲圖孔傳洞洽超詣優優進退灼灼興廢聖恩孔嘉臣分知止有子侍中𢎞毅恪恭身為國維心與天通職在奉常蟊賊內訌以斥羣翳捧日太空趙邦恢恢山明水映維忠與孝世篤其慶有髙者阡松茂柏盛我作銘詩過者起敬故綏寧令王君墓表豐城王氏居槎溪上者八世至綏寧君諱義端字元剛受易於廬陵歐陽先生守道與兄義山俱有名義山字元髙擢宋淳祐壬戌第官于朝君以叔祖泉澤入仕試進士四與計偕不第以恩監江陵白水鎮辟江州武平令攝吉州吉水令佐江西提倉幕遷武岡綏寧令纍階文林郎天兵渡江江上諸郡不守德祐元年文丞相起兵江西熟知君智略辟與幕議君仰天嘆曰天乎事已至此去將安歸涕泣而謝之自是終其身不出其在吉也冨民葉殺人賄吏以縊聞君當聚撿致錢三百萬拒之抵葉死豪商奪民地事歷臺部連歲不決逮死者數人下君治得白黔商而還民地有趙鋹者與弟有隙嗾家僮七十餘人焚弟廪憲怒欲盡殺之君詣府力爭乃論如律大兵且至同辟地于贛者四十餘家艤舟城下夜半叛卒內外起黎明操戈逼舟衆惶恐君奮入賊中執其渠手諭以禍福率錢帛分勞之衆賴以安誘其渠詣憲府謝密語憲曰能斬即斬之不能亟安反側憲慰而遣之同里鄢氏女未嫁而侍婢病死仇訐于吏吏詰以姦殺婢滅口求賂君白守事以辨周三者殺人委塗而自為證言之令周伏辜其亷直好義類如此晚嵗杜門窮經教子郡守部使者時從訪問亹亹竟日惟以忠孝為言人或勸君仕曰我不能死可復仕乎論著有經疑十五篇史論四十八篇經邦讜論二十四卷雜著若干卷大德丙午九月一日卒年八十七自為之志十二月丙辰葬里之東穰嘉之原曽大父某大父某父某妣聶氏娶趙無子先三十三年卒子男三胡出也希文蚤世揆今為潮州路儒學教授葵吉安路黃茅鎮巡檢女五皇慶二年余承乏禁林揆來謁泣且拜曰先子力學守貞不幸棄諸孤葬已八載而墓上之碑未立先伯父與公季父侍讀公為同年進士揆又辱遊公門幸哀而賜之言余觀綏寧之才之學不如何人其知己又皆賢公卿而卒不得一第蓋有不幸焉者矣然嗜仁如膾炙赴義如骨肉以明哲而保其身獨非幸也耶即使君為狀元為宰相棲遲末路為士者恥之其幸不幸又何如也於乎文信公亦知人哉銘曰嗟嗟綏寧才豈不足以決科智豈不足以立功而竟然耶不賢而逹余孰少多賢而不逹命也奈何有德有年有子承家若綏寧者我又何嗟寧求已夫人章氏墓志銘夫人諱福順姓章氏世家南城遷綏里父履坦博學豪宕好遊冇聲蜀漢間為外祖包文肅公恢所知鄉先生吳某居家教授學者數百人元塘先生寧君求已最後至諸生盡傾人人自謂出其下章方擇壻遂以女妻之後果登宋景定壬戌進士第仕轉為文林郎某官夫人幼失所恃事祖母孝謹祖母愛之不忍違離挽元塘贅其家元塘之父某魁碩剛鯁寡言笑少許可人得其一言不啻重璧夫人始歸一日祀先夙興執冡婦禮周旋肅給如世族大家驚曰吾家其興乎家本寒儒夫人蠶繅組紉以供養祭節縮衣食以植田廬尊上禮下絶甘分少以厚姻族撫孤拯弱給贍産蓐以篤鄉黨相其君子佐洪升杭三大府逺官嶺外所至號稱能官婦道之盡人用模楷元塘初為洪理囚飯必呈官請嘗官不在庭亦唱呼過庭下夫人聞則遣取親嘗又日視庖有餘食命老奴飯囚之羸疾者杭有慈幼局收養棄孩官出錢帛乳哺願子之者給衣食三年吏卒乳母輩或殘之而以己子代之或以己子冒之夫人密呼乳嫗亷得實以白姦用禁止其在橫浦衣冠辟地者來依元塘延納於外夫人供給於內至者如歸别去莫不涕泗謂元塘如父夫人如母携家還里道路猶榛梗日語女婦輩曰萬有不幸吾與若赴水而已毋辱人手卒幸全夫人識量明恕臨事周慎動有禮法每謂某人今然後當然其事今爾後必爾無不中元塘居官亷介疾惡少顧望常從容諷諌式協于中子弟成人出必戒以小心謹恪毋負知己毋忝先人元塘晚歲杜門謝世事賓友過從論新道舊觴豆無虛日亂世遺老優遊閭巷十餘年而卒為完人內助有力焉皇慶元年六月二日以疾終年八十五子男二立大材器頴異先二十二年卒成大博洽沉敏嘗佐湖北憲以夫人年老棄歸女二長適同里吳逵次適廬陵朱煒幼嫁而夭孫男二世良世元女三曽孫四將以某年月日葬雅俗鄉新安里某原其孤成大以書介信豐令吳越所為狀抵京師請銘余父子叔侄與元塘相知久余於成大又獨深聞夫人之行懿信且詳銘非余其誰冝於呼君子之得成其政保其名後嗣之得浚其學逹其志豈非有賢婦賢母哉若夫人者可謂賢矣銘曰藹兮蔚柔而一于嗟千年仰維則謝元禮墓志銘南城謝元禮先生以至大四年八月八日卒年八十四將以皇慶二年某月某日葬太平鄉金塘之原其友潮陽尹趙艮塘等十人為書介其子升孫所次行實來京師請銘其墓嗟斯人之不作感友道之猶存勿銘得乎君諱炎元禮其字也幼孤母孔適盧冒盧姓長通六經長於易前輩老生皆折節與之遊盧甚賢之兄天鍚死一男二女皆幼稚君憂曰謝氏絶矣日夜號泣乞歸謝盧不許踰年乃許歸則撫遺孤開門授徒以給衣食嫁娶毋喪哀毁致疾終不御酒肉疾殆夢神人為方授之而愈恤盧之後尤極恩意亡友傅氏子窮餓不能自存輟食以飯之不足又營度儲偫以給之傅日來取米如寄數嵗傅死乃己平居見子姪及親故之子行修學進喜形於色不則戚然以憂雖屢空未嘗千於人太守趙時稼聞其賢館之郡齋或訟于郡弗直覬君一言君終不言有賣炭者過門君售之既償直頃復還其餘賣者怪焉君曰汝適言若干今踰若干以還汝不受強必與之其臨財若此所遇雖極貪濁暴抗莫忍欺君學者相從不逺千里往往擢髙科登膴仕君再賦于鄉而已宋亡郡有盱江書院居西城之外當兵衝白于郡遷之城中身經理之既成郡檄君為長亦不就晚病目稍讀佛書卒之日方與升孫劇論圓覺金剛經倐然而逝有觀易若干卷藏于家曽祖鼎祖榮父起祖妻左氏先卒子男二長升孫慎修好學次謙孫蚤世女嫁崔萬有孫男二皆生九年而夭余嘗聞賣炭事好為人道之輒掩口盧胡以為闊迂嗟夫世復有闊迂若謝元禮者乎薄物細故而不欺若此世之紛紛為奪為盜者聞君之風亦可少愧矣余識君踰四十年乃今銘其墓於萬里外南望慨然銘曰神明通孝之隆恤孤窮義之從窮約耿介有李泰伯吕灌園之遺風嗚呼維公大慈化禪寺大藏經碑佛以慈濟為善教人以布施為善果施之善莫大於經經者佛傳心設教之具也而其為書繁多世鮮能備亦莫能以是施儀天興聖慈仁昭懿壽元皇太后命刻大藏經板于武昌既成輦至京師印本流傳天下名山巨剎則賜之皇帝即位之三載為皇慶二年夏四月袁州南泉山大慈化禪寺住持普蓮宗主明照慧覺大師慈昱以是請乃命有司具舟車函載驛置即其寺而賜焉寺乃普菴寂感妙濟真覺昭貺大德惠慶禪師道場也昱屬其徒嗣皓來京師請某文以志其事以侈上賜某竊惟佛有教以來纍朝崇尚之至四海感化之普未有盛於今日者皇太后以佛慈濟為任刻經布施俾天下之人聞經悟法興善逺過臻于休明其功德𢎞逺矣夫經精粗隱顯無可鏬漏隨感而觸無間賢愚昔普菴一讀華嚴合論汗流被體直透上乘遂基數百年香火而其教漸被于四方四方之人懷金負貨衝衢溢陌所祈必應如食得飽寺無釡庾之田日飯數千之衆功用明焯如此可不敬哉普菴本末具載諸碑昱其嫡嗣也行卓量𢎞寺再焚再建益雄麗環袁之境陸之榛險者闢而夷水之阻絶者梁而通有以利衆竭智畢力師蓋守普菴之教者而皇太后心佛之心果益修教益彰冝矣經以某月某日至袁官僚稚耋迓于境上鐃鼓幢纛雲合雷奮動蕩心目如親普菴如見諸佛遂以是日宣旨安奉于寺之大藏云謹再拜而獻文曰佛之設教彌亘千葉出言為經經以寓法法如朗日髙懸太空向之者明背之者蒙赫赫我朝崇佛尊經宣其惠和天下謐寧惟皇太后心與佛會勒經布施周被四海南泉之盤大禪所安其居桓桓登降照爛朝集千車暮攢萬鞅惟禪是依維佛是仰琅函瓊笈降自天宫迷者倐見聵者頓聰萬衆歡呼百靈鼓舞戴以巨鼇天龍為護凡誦是經及聞經者願如普菴一語汗下遍恆河沙皆被佛力成是功德以報皇國法輪團團聖壽如天奉我太后彌億萬年魏郡伯申公神道碑太常申卿之父卒之四十四年天子推恩贈中議大夫上騎都尉追封魏郡伯母追封魏郡太君明年將伐石表墓以文屬余申古薑姓之國於周為伯爵其後以封為氏宋徽宗時有諱天祿者居汴善為方供奉掖庭門懸金斗以識號金斗申家兵亂徙秦州之社樹坪是生良輔良輔娶馮生仲庚字西叔是為中議公皆世其業中議公好仁樂義智勇過人年弱冠天兵下河南身馳戎馬陕虢申裕間盧氏縣守將約囉君總管馬君聞其賢拔置戲下舉族往依焉宋遊騎突至獲約囉殺於熊耳嶺公率敢死數十人赴之誓不得尸不返果得尸以歸事定秦州舊業無復存者顧申土而樂之曰吾申人也今至此非天欲復其始乎筮之吉因家焉訪姻族之在者惟得姨母之夫于申女之叔于穰皆養之終身嵗具善藥以備鄉之有疾而貧者若窮途逆旅無所歸者必躬自調護又裹糧槖金俾逹其所止無問邑里姓名有冨民夫婦暴疾垂絶公以方匕起之約酬兼金良焉不果酬鄉人誚之公一不問常教其子曰人與天地為三天地以生生為心而人不能推而擴之猶謂之人乎昔人以醫比相良有以也敢不勗哉至元己巳六月十有八日卒年六十七逺近聞者如聞父兄之喪夫人京兆宋氏柔順端凝不妄言笑有為婦為母之道後公八年卒年七十一合葬南陽縣東泓河之薛家原子男六人政郡監酒教河渠使敬太常也整亦監酒敦蚤世敏提舉江陵醫籍孫男八人克莊克柔克實克溫克強克恭克毅克亷嗟夫世常謂善之不可為天道之不可信誣矣哉豫觀天之於不善人常若厚然而一朝之敗如摧枯拉朽如燎毛洪爐何其易耶於善人常若薄然而傳世數十彌逺而光逾久而昌又何篤耶申氏由汴而申四世矣太常君始能結知世祖出入供奉未嘗不稱旨每候上問進苦口之言未嘗不嘉納至有身不滿七尺而辨雄萬夫之稱被玉帶白金之錫服勤四朝眷賚如一歷御藥院使祕書丞祕書監大常卿致仕通顯矣而考妣享茅土之榮兄弟子姪有鄉里之譽居申之吉斯其徴乎謂善之不可為謂天道之不可信果誣矣哉銘曰為善之方莫醫之良天地之德鬼神所藏昔有金斗式顯于梁徙秦而申四世彌昌其系維申始封維伯家復于國封復于爵伊善之崇其始其復洋洋魏邦勿替攸蓄莘縣楊氏先塋碑左司都事楊君升士允孝友人也皇慶二年秋遷江西行省左右司郎中喟然來謂余曰升之先自曽大父始居莘曽未四世散而之四方者有矣吉凶之禮廢緩急之義闕親者益踈而踈者益逺今茍無述焉將何以考訓于後按家牒訪遺老得曽大父之槩附以系次之略敢請以銘乃詳而敘之楊之裔出漢太尉震世居𢎞農之華隂至諱陶者徙汴事宋徽宗為易州儀曹金拔燕死焉大定間子登朝贈朝請大夫朝請生通奉大夫永定軍節度使邦基詩畫妙一時嘗為祕書監有名生奉直大夫郊社令皓奉直以上皆居燕死皆葬燕城西南十里赤村之原奉直生歸德監酒庭直字端卿是為升之曽大父弱冠以澤補承奉班祗候一日內直忽暴疾若癎舁及家而瘳居纍年自謂分薄不復出貞祐南遷思名臣之後強起監嵩州酒復監歸德酒金亂隱居嵩山習射獵壬辰北渡遂家于莘以詩禮訓子孫而性嚴重善容儀燕不惰行不趨衣食喪祭動適豐儉邑人化之尤博涉典故每談歷歷如畫晚潛心養生之道年近八十猶能細書作行春秋薦獻齋明盛服拜俯進退不少怠以大定辛丑十月二十三日生于燕某年戊午九月十四日卒于莘葬縣西南三里西亷之原娶賈氏先卒有子曰某小字解愁少落魄好遊俠女蘭英適汴梁張某玉英適河南都監史某繼戴氏先八年卒年六十九有子曰澧字瑞之沉毅慎介少與父居嵩孝養無違禮號長者年七十二卒淵字澄之嘗任百夫長卒于碭山某小字泰安金亂與長兄解愁皆失所在女秀英適潞州馮某惠英適易州王某澧有兄曰滋字榮之他姫賈氏生也孫男八人滋娶李氏生子三居仁字子靜仕江淮間為漕運押綱官居謙字子益歷考城等縣典史居中字子庸澧娶張氏生子二居寬字子裕為國朝名臣纍遷中奉大夫參知政事至元二十四年以剛直忤權姦死于位年五十五居簡字子敬年十八試吏從世祖南渡積勞凡九遷至奉訓大夫知唐州所至號能官後以訴其兄寃還所籍入復官其二孫為人所稱元貞𥘉卒于官年五十七贈大中大夫大司農卿上輕車都尉追封𢎞農郡侯諡正惠配梁氏追封𢎞農郡夫人淵娶孫氏生子三居貞字子正居義字子冝慶元路定海縣主簿居信字子誠曽孫男二十有一人居仁子昆居謙子昻昺居中子晏昌易炅居寬子朂景勗為集賢學士奉直大夫卒居簡子升左司也嘗歷監察御史禮部郎中有盛名曼濮州觀城尉居貞子昶居義子暹旻晟曇晃昱居信子忭杲旦女若干人惟勗景昆逮事歸德君玄孫男二人元鈞同知冠州事元鐸濟寧録事判官皆景之子今居仁之後家汶居謙之後家太康居中之後家息淵之後皆家鎮江餘在莘凡敘歸德而下書卒而不地者皆在莘書卒而不年不名者闕也於呼古今喪亂以來強宗大姓崩離蕩析淪胥澌盡者可勝計哉有敬先敦後懇懇焉若左司者乎由太尉以至於今蓋千數百餘歲矣猶赫然為天下望族其所蓄豈不深固哉後之子孫茍推左司之意則自莘而上孰非追思永慕之地而何踈間之患耶傳曰慎終追逺民德歸厚矣楊氏其庶乎銘曰維歸德肇於莘紹𢎞農期永延裕之忠敬之恭澤滂流沛溶溶繄左司祖之思悼厥支逖以離纂前聞訊後昆揭玄珉耀景文巋峩峩莘之墟千萬年念厥𥘉彭城郡獻穆侯劉府君神道碑銘上𥘉即位定封贈之制秩二品者恩及祖父於是河南江北等處行中書省參知政事敏中之祖贈嘉議大夫禮部尚書追封彭成郡侯諡獻穆配馮氏趙氏並追封彭城郡夫人公諱鼎字漢寶姓劉氏濟南章丘人美鬚髯有器度語音如鐘博聞強記不事舉子業臨機制變才智捷出時人方之管樂云公生有異質方嵗許母欲立之地弗下席焉乃下再試復然人亦竒之年十五父當之官顧公曰汝了家事否公對曰苐去勿憂也及父代歸資産倍去時鄉人為之語曰劉五郎可謂男兒十五奪父志矣金季喪亂民多失業公慨然曰明昌𥘉歲大旱吾大父發廪以濟民泰和間自冬至春大雪吾父日為粥于門以食過者祖父遺我以厚吾可獨薄乎且緩急人之所常有也坐而視之仁者不為乃推財發廩賑乏食飢逺近踈戚皆賴焉已而寇盜四起骨肉不相保有壯士五十人來從公願為守衛問之乃嘗所賙恤者故終喪亂之世家無一日之憂者五十人力也頃有盜柵歷城南山中為民患郡邑不能制公獨從一二人直登其柵喻以福禍賊􅌚從公降以功授忠顯校尉歷城令境有大澤號遙墻濼豪民李據其地為姦徴令不行公一日往濼中伏壯士道傍以一老蹩者自隨至其門門者識公趨入公隨以入李方袒跣卧堂上使一女子扇見公愕然公徐曰適以公事過此故來相訪李喜起迎勞命酒酒飲設食食盡極歡而罷握手以出語且行公屢顧示將密語者李麾左右去復行至前伏起執之以歸杕殺之金之亡諸侯分制各郡濟南張侯聞公賢召以自佐及歸國朝侯行省山東公授廣武將軍益都總判兼安撫濟南淄德軍民勸農使行左右司郎中事時庶務草創翕張施置一以倚公泛應曲當動為成式益都李全聽讒分三道舉兵攻濟南侯大怒謀悉師拒之公方久疾曰彼衆我寡將若何扶憊入見侯曰侯毋怒侯苐入老夫為侯却之公立遣四使致書李全及其三帥三帥得書勒兵待命全發書撫掌大笑曰我固言之矣此老在何益趣罷兵修好如故壬辰正月二十九日以疾卒春秋五十一葬邑東南五里繡江東南壖廣平之原先人兆次先世葬邑之錦川至公始自大父而下遷于今塋大父諱照有才學以資雄鄉里不居賤得之貨不徴難償之責號為長者父諱珂嘗喪兄不御酒肉三年終長清豐齊稅監公再娶皆有賢德馮夫人年六十二卒生女一適馮趙夫人年七十三卒生子四長景石歷濟南總府山東轉運經歷濵州教授贈正奉大夫參知政事追封彭城郡公諡文靖次晟章丘令次昱次昺女適韓孫男七人女五人景石子曰敏中今翰林學士承旨榮祿大夫知制誥兼修國史曰乙早世長女適魏次適常晟一女適霍昺之子曰大醜曰某皆早卒曰敏政曰某某長女適韓次適曹曽孫男若干人女若干人蓋公死後三十餘年天下統一至今君子猶悼之曰向以劉將軍雄才贍智使得遇世祖以驅馳卿相豈足道哉惜也天不假之以年命矣夫皇慶二年秋翰林君追述祖德疏上恩屬銘其墓道乃撰次而銘之銘曰昔在金季中原雲擾諸侯擁衆保其城堡羣盜滿山野無青草洸洸廣武奮自儒門或執或誘盜潰以奔遂佐濟南歸我聖元既有旌旄亦贊省垣飛書却敵如魯仲連國有能臣民有慈父胡不憖遺仰及世祖坐籌帷幄折衝尊俎管樂雖賢猶愧于古生不盡用死有餘榮千載盤盤觀我彭城清州髙氏先德之碑清州守髙從簡以集賢學士王君德淵所狀先德介集賢大學士陳君皓謀不朽於余謹按髙氏齊公子髙之後從簡五世祖居河間有子五人勝用誠敬恭敬仕金至泗州通判恭遼東縣尹用娶張氏生三男慶進祿金之亂天兵略地河朔携家往依信安張侯侯營寨固守父子常在行間貞祐南播舉家渡河客陳蔡間金亡北還販粥於冀居南宫復遷靜海卒葬獨流村慶尋徙東安後家清州慶字伯福倜儻仁愛好學樂施在東安時日浮舟往來逐鹽盬之利嘗遇盜亡其劵盜敗獲劵召驗辭以未嘗遇盜人怪之曰彼窮餓迫耳我言吏殺之矣在清州嵗飢糴于大名舟次宋家口老稚數百遮拜曰不食數日矣幸全活散其半而去娶蔡氏生五男通信仁義仲一女曰壽仁字濟川年十二失怙母教之學日誦千言長習律令喟然嘆曰為吏受賕獲罪辱先守亷奉公衣食弗給長蘆當燕齊之交天下之要區也鹽盬之利半中州之賦豪商大賈車擊舟連可廢著為業乃從張運使徙居焉中市而立權天下之貨四方販負日受指畫操其要因其勢豫其時審其地人什常貧我五常冨故言利者以髙氏為師而好仁急義有父之遺風焉嘗早行得遺物一囊物色其主還之留其半為謝竟不受友人姚仁甫私以鹽引五百寄之賣買疾病無子曰我死寡妻願托命焉無一言及所寄姚死給其家三年屬兄弟異財乃悉以所寄歸之又贖里中臧獲之良為齊民者二家嫁娶族子姪之貧者十餘仲兄居兩舍外死而孤寡無所養割私産以厚之籍在軍伍命從簡於河西搆屋數十間僦以給其役不以及諸昆弟母疾衣不解帶母戒之就寢曰兒幼失父不知侍養嘗自誓遇人患難必相扶持而况母乎居喪哀幾於毁仲父季父皆久疾且死湯藥葬送咸竭其誠歲丙寅遷其母及二父喪葬清州河東之上管村踰四十年髙岸為谷大德丁酉復舉三喪洎親族未葬者一十七喪營於長蘆之郭家寨環植松柏千餘株明年放逋責三十五萬緡有竒五月二十九日卒年六十八六月十有五日葬于郭家寨之先塋送者干餘人娶褚氏子男一從簡也以吏起家由清鹽司判官九轉而知清州積階奉訓大夫孫二曰興宗曰朝宗夫自太公有勞于周封于齊冨國畜民桓公以霸而子髙之後世載史氏豈非有積德耶河間數世遭值喪亂用鹽盬起卒大于清州亦以長者然耶清州之先數有天幸曽大父避地信安孫通俘于兵事定復還南渡既登舟追騎奄至子慶弗及投水就舟獲全其祖父所友多天下名士伯福之友曰竇文正公默濟川之友曰馬右丞紹李少傅謙夾谷尚書濟吉耶律祭酒有尚髙都水仲淵其尤著者銘曰營丘始封富用魚鹽九府既修桓景具瞻子傒之相命氏以髙𣲖逺條敷載籍彌昭降及河間蕩流懋遷伯福操舟濟川居廛擅利天下馳聲諸侯濟衆遺恩棄盜忘仇人言貴冨禮義乃生茍非其人色變豆羹國富保民家富睦親積流成淵積行成仁藹藹清州碩膚以完揭德先塋千載攸觀揚州重建玄妙觀碑至元中詔賜天下天慶觀額曰玄妙凡省臣守臣軍府外署在其治者嵗時朔望咸集而祝釐焉他觀莫得與比故天下玄妙觀宏壯嚴飭罔敢怠荒惟揚州嵗久弗治薈蔚圯委狐伏鼠竄列像弗蔽贊拜無所風雨驟至折撓相枕藉大宗師過而見之曰是吾責也選道士領之得馮道原任以修復之效未幾馮死時凝和沖妙崇正法師教門髙士九江雷希復創通真觀于真州曰是可任即命以揚州道場攝觀事董其役至則料材用之實十無二三焉乃謁寓公巨家賈市商舶量錙最銖以聚之不足又割通真之贏以佐之寓材于江伐石于山徴工役徒畚糞壤正表位早作而夕息恱使而勤省悉新之廣殿崇陛重門修廊會者在堂燕者在室庖廪廄庫各安其次鼓有嘉響鐘無厲音神示顧享倪耋嗟嘆鳴呼盛矣惟天大建元德啓大宗師懋宣玄化光翼四朝流聲布烈充軼內外授賢任能敷弼𢎞教一起髙士赫然揚土不亦賢乎而昔者老聃氏之去周也徘徊關吏豈有意嚴尸祝而雄棟宇哉然自古聖主名臣功烈之及民者咸秩而祀之矧兹道德之隆乎而余竊有感焉一土木未足多也非知人善任則百年之廢猶故也况其大者耶是役也經始於至大戊申之冬落成於庚戌之夏贊其言者葆和純素持正法師揚州路道判上官與齡皇慶元年夏大宗師以聞降璽書護持雷希復本觀住持提點明年秋屬廣平程某為刻辭辭曰道以體求鴻荒寂寥道以用著神人景昭盤盤廣陵淮海攸經翼翼靈宫既廢而興惟大宗師手攬玄樞握隂抱陽贊我聖符顧瞻海邦雨潤風飛有弗軌儀為教之疵矧彼玄關通都廣㕓顛而不扶咎孰執焉既獲其人纘兹戎功崴巍廓深臣民具恭匪授罔受匪承罔成惟師之明惟雷之能施於有政一是此心曷績弗凝曷土弗欽真源綿綿帝壽如天刻此好辭垂之萬年洞陽萬壽宫碑聖天子承熙洽尚清靜天下之崇老氏號為宫為觀者廢而興微而著可數已臨江新淦之東二十里有地曰洞陽有山曰皇人之山相傳晉許旌陽所遊憩有觀曰洞陽之觀不知始何代傳次住持道士郭務玄居之郭君秀朗邁越好道術文章大德六年謁余武昌東遊龍虎山見三十八代天師天師奇之授龍興玉隆萬壽宫講師三年改惠州道判未幾遷臨江至大四年詔天師入朝郭君白言弟子所居洞陽地敻産薄宋淳祐間幾廢賴住持朱可道力振之今幸遭聖代非大有建樹能終保無他乎性師留意即日更定觀額曰洞陽萬壽宫取道經天真皇人之語名其山曰天真福地以告玄教嗣師師曰宜如天師命皇慶元年上之集賢以聞特降璽書授務玄宏道通真崇教法師洞陽萬壽宫住持提點是年秋八月開宫布職一如玉隆故事官屬虔恭稚耋讃歎咸韙上之賜嘉君之勤君又曰是徒美其名耳非壯其棟宇無以稱上恩非廣其田疇無以接四方而豐屋大厦賢人逹士聞而效財效壤者不謀而旁集遂盡撤其屋而新之其中曰金闕寥陽之殿東曰開天之樓西曰錦惟之閣亢以重門翼以修廊會有堂燕有室寮次廣邃庖廪宏固榜其關曰都仙之府凡為屋若干礎費若干緡經始於某年某月落成於某年某月闢田若干畝曰萬仙莊居養並舉報稱兼至山峙然以大水溔然以浚人于于然而來矣衆益喜君之志有成曰不可以不識乃謁文於豫豫觀老氏書其言理身治人之道詳矣類非今所為者若旌陽則世所謂列仙之流然其功於人甚大施之秩祀也固宜郭君儒者誠能去巫覡之末求清靜之本俾天下皭然知老氏之為道如此則是宫也將必以君故名天下亘萬世又奚止如今日之觀哉重為之辭曰迢迢洞陽巍巍髙山上有玄雲下有流泉洋洋新宫內明外映昔也何衰今也何盛郭當其世𥘉實病之其師為言天子命之載經載營亦既勤止來遊來憩以養以食我觀世間孰不可為曷成匪公曷敗匪私道以人𢎞地以人勝我未克正物孰克繇正既新爾宫爾田亦豐繄古有言擇善而從晨鍾杳杳夕鼓考考以祝聖人之壽莫若有道呼役神物訶厲譴慝以徇世人之欲莫若有德維道維德可以上佐天子躋天下於仁壽之域咨爾洞陽罔有弗欽此非豫之言乃老聃氏之心雪樓集卷十九
