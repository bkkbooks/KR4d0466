body:
  text: 雪樓集附録元史本傳程巨夫名文海避武宗廟諱以字行其先自徽州徙郢州京山後家建昌叔父飛卿仕宋通判建昌世祖時以城降巨夫入為質子授宣武將軍管軍千户他日召見問賈似道何如人巨夫條對甚悉帝說給筆扎書之乃書二十餘幅以進帝大竒之因問今居何官以千户對帝謂近臣曰朕觀此人相貌已應貴顯及聽其言論誠聰明有識人也可置之翰林丞相和爾郭斯傳㫖至翰林以其年少奏為應奉翰林文字帝曰自今國家政事得失及朝臣邪正宜皆為朕言之巨夫頓首謝曰臣本疏逺之臣蒙陛下知遇敢不竭力以報尋進翰林修撰屢遷集賢直學士兼祕書少監至元十九年奏陳五事一曰取㑹江南仕籍二曰通南北之選三曰立考功歷四曰置貪贓籍五曰給江南官吏俸朝廷多采行之賜地京師安貞門以築居室二十年加翰林集賢直學士同領㑹同館事二十三年見帝首陳興建國學乞遣使江南搜訪遺逸御史臺按察司並宜參用南北之人帝嘉納之二十四年立尚書省詔以為參知政事巨夫固辭又命為御史中丞臺臣言巨夫南人且年少帝大怒曰汝未用南人何以知南人不可用自今省部臺院必參用南人遂以巨夫仍為集賢直學士拜侍御史行御史臺事奉詔求賢於江南初詔令皆用蒙古字帝特命以漢字書之帝素聞趙孟藡葉李名巨夫當臨行帝密諭必致此二人巨夫又薦趙孟俯余恁萬一鶚張伯淳胡夢魁曾晞顔孔洙曾冲子凌時中包鑄等二十餘人帝皆擢置臺憲及文學之職還朝陳民間利病五事拜集賢學士仍還行臺二十六年時相僧格專政法令苛急四方騷動巨夫入朝上疏曰臣聞天子之職莫大於擇相宰相之職莫大於進賢茍不以進賢為急而惟以殖貨為心非為上為德為下為民之意也昔漢文帝以决獄及錢穀問丞相周勃勃不能對陳平進曰陛下問决獄責廷尉問錢穀責治粟內史宰相上理隂陽下遂萬物之宜外鎮撫四夷內親附百姓觀其所言可謂知宰相之職矣今權姦用事立尚書省鈎考錢穀以剝害生民為務所委任者率皆貪叨徼利之人江南盜賊竊發良有以也臣竊以為宜清尚書之政損行省之權罷言利之官行恤民之事於國為便僧格大怒羈留京師不遣奏請殺之凡六奏帝皆不許巨夫既還行臺二十九年又召巨夫與胡祇遹姚燧王惲雷膺陳天祥楊恭懿髙凝陳儼趙居信十人赴闕賜對三十年出為福建閩海道肅政亷訪使興學明教吏民甚畏愛之大德四年遷江南湖北道肅政亷訪使至官首治行省平章家奴為民害者上下肅然八年召拜翰林學士商議中書省事十年以亢旱暴風星變巨夫應詔陳弭災之策其目有五曰敬天曰尊祖曰清心曰持體曰更化帝皆然之雲南省臣言世祖親平雲南民願刻石㸃蒼山以紀功德詔巨夫撰其文十一年拜山南江北道肅政亷訪使復留為翰林學士至大元年修成宗實録二年召至上都三年復拜山南江北道肅政亷訪使四年與李謙尚文等十六人同赴闕賜對便殿拜浙東海右道肅政亷訪使復留為翰林學士承㫖皇慶元年修武宗實録二年旱巨夫應詔陳桑林六事忤時宰意明日帝遣近臣賜上尊勞之曰中書集議惟卿言甚當後臨事其極言之於是詔巨夫偕平章政事李孟參知政事許師敬議行貢舉法巨夫建言經學當祖程頥朱熹傳注文章宜革唐宋宿弊命巨夫草詔行之三年以病乞骸骨歸田里不允命尚醫給藥官其子大本郊祀署令以便侍養時令近臣撫視且勞之曰卿世祖舊臣惟忠惟貞其勉加饔粥少留京師以副朕心巨夫請去益堅特授光祿大夫賜上尊命廷臣以下飲餞於齊化門外給驛南還敕行省及有司常加存問居三年而卒年七十泰定二年贈大司徒柱國追封楚國公諡文憲
