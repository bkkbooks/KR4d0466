body:
  text: 雪樓集卷二十七元程文海撰詩徐君允諧以長篇將荔枝為貺草草二絶奉謝風雨作秋西齋兀坐細讀來章念不可不報遂又次韻荔支樓下繡衣譜授記傳来却到予得見伊家玉樹種絶勝展翫樂天圖何人日啖三百顆輕缷霓裳見玉妃自得君詩氷雪味不知世上有甘肥我行炎方見子都粟肌皻面身橛株中蔵至美不自露風姿皎皎隱煆爐土人謂此玉樹貴兵間幸不供樵蘇李生五品竟汝遺太冲竊取夸全吳不材㪚木神所扶有果可食終剥膚君不見深山毛羣絢文彩織毳寜免充􅖯毹大枝小枝折泄餘空留碧葉冬不枯塩蒸蜜漬意可逺盛之寒露清氷壺廟朝豈諳草野味猥以櫻實當醍醐蜀珍曾被真妃汙此事頗近寗子愚東閩猶是山澤臞遼遼道里懸中區倘經薦進亦爾耳始信禍福相乗除嶺南酸薄同黔驢香山只作巴峽圖莫嗤齊人識管晏知己賴有東家謨殊鄉殊嗜多受誣朔南酪茗更相奴詭名好化赤松子甘液下注根豐腴漳境向治流逋四歸𢎞道有詩次韻志喜按臨建邵總稱賢又復深深入瘴烟自古清名能化暴及今赤子得安眠如雲冠盖誰曽識帶雨犂鋤爾自田従此海瀕霑聖化吾曺逭責樂餘年寄賀𢎞道僉事改除江西聖明初服選掄新易地觀風着此人會見西江民吐氣久聞南嶠政如神只今寮寀情何極恵我鄉邦事亦均說與山中吳處士清時錫汝保閒身畏獨恵中秋詩次韻邀月共發一粲萬里隂晴此夜秋天容竟日故幽幽要教好月特然霽蹔遣癡雲凝不収隱隱清光上東海堂堂勝賞賽南樓作詩合共閩人翫早放髯劉出一頭夜深邀月不至悵然而睡再讀來詩次韻以謝天上人間各自秋姮娥不管下方幽暗陳瓜果充籩實冷聽梧桐觸井収已至三更仍抹漆空餘逸興欲登樓夢中桂影成金粟癡絶前身顧虎頭暇日偕行臺唐古特御史登九仙山蹔停驄馬共㝷幽倚杖鼇峯頂上頭海浄潮平萬里眼風光月霽一天秋九仙定有重來約三島寜無可去舟古字苔深半明滅新詩聊復記曽逰送𢎞道僉事之官江西趙侯丰骨氷千層入眼壁立清且熒烏府當年小盛却崇䑓獵獵寒颼生清問顛崖辛苦急我亦直指江南行雲龍上下逐東野讜論感激令人驚别来不作揚州夢獨想豸角摇風聲浮雲聚㪚抑何定王事靡盬無留停去年驅車下閩嶠驄馬却在西南坰闗山明月長耿耿逺欲見之悵未能邇来傾倒連床夜議論頗覺深逃形書囊無底談未了一札又促飛鴻冥江山共恨留不住私喜桑梓䕃餘清萱近北堂春日榮白雲望望雙眼明我家有老且望八倘許錫類遺君羮霜風飄飄榕葉鳴酒餞江頭須滿傾願言努力鋤荆棘浩歌天保荅升平次劉雲卿御史同達勒達御史逰鼓山詩韻并序屴崱峯距城二十里而近欲一往未能也去嵗禮部王君寅夫獨逰辱寄詩盛談雲夢之樂僕亦想像髙唐以對今𢎞毅雲卿二御史暇日登髙覽勝紀之扵叙冩之扵詩使人心曠神馳恨不並轡横翔排埃壒而出廖廓也率爾用韻登臨有約堕鴻㝠拄笏㸔雲空復情笑我北山文久勒輸君南岳記先成林深谷窈車聲轉海闊天髙筆興生何日得將塵俗耳倚欄同聽澗泉鳴再次韻呈𢎞毅御史驄馬行行出杳冥笑擕僚屬叙幽情隂森竹樹芟夷去軒豁江山指顧成坐石傳杯懸瀑濺倚嵓扶杖亂雲生何時共卧超凡閣月滿空林翠浪鳴寄賀盱江張監郡初上帝錫盱城保障哉朱轓皂盖凂雄才濟南書許人間見博望槎従天上来聞道門庭清似水不愁田里冷扵灰同寅太守今劉寵努力驅車共輓推送蘭與盱守劉東厓結綬年時白玉京只今江海若為情蕭蕭六轡馳荒徼赫赫雙旌擁大城桑梓何時容我住蕙蘭微意况君清黄金横帶渾餘事千載相期不朽名郭梅西息齋隂向秀葽測陽従小雪㸔千年啓龜蟄六月養鵬摶隱几天機熟閉門人境寛悠悠八十返静處得竒觀題趙仲逺所蔵趙大年鵝鴨圖鵝鴨池邉畫作䦨輸他鳬鴈意幽閒王孫下筆厭覊束移在長汀短渚間題仲經知事家蔵錢舜舉折枝花鳥徐黄死不傳筆端那得許清妍錢郎狡獪老猶在字畫翻騰作少年題採蓮舟杯攀翻葉上露釀作杯中酒可能君不醉負此摻摻手題仲經所蔵馬圖食之三品芻豆飾以千金轡環誰能解棄徽纆縦渠汧渭中間題仲經家江貫道瀟湘八景圖八首平沙落鴈翩翩數行下灘磧俯蒼波此處稻粱好人問矰繳多烟寺晚鐘僧定鐘聲緩依稀聽不真渡頭風正急喚醒未歸人洞庭秋月萬頃玻瓈上輝輝玉一環望中青似粟約莫是君山瀟湘夜雨昏昏風浪裏瑟瑟打篷聲騷客千年恨靈妃萬古情漁村夕照落日寒潭静西風黄葉鳴鱸魚新出網分我一杯羮山市晴嵐旂亭新酒熟下馬試従容頗勝老兵對夕陽三两峯江天暮雪六月三山底城中似甑中客来開短軸亂雪舞江風逺浦帆歸八景瀟湘妙歸舟更色絲招招煩小住我賦式微詩題歸去来圖春晴苦旱心如醉暑雨妨農鬢欲斑眼底家山歸去好吾生端的幾時閒送李副使赴行䑓治書侍御史暑風㪚霖霪宇宙一清快青驄金盤陀夙駕趣行邁先聲所震薄已被江浙外两年七閩裏赤手理彫瘵髙明副縝宻通綽主剛介清時簡賢哲美績先奏最崇䑓借君重横榻政非泰蹇余忝嘗僚朝夕得箴誨瞠其塵埃中矯首飛霞佩男兒附青雲肯掇䑕壌嘬浮榮一瞬息醜好有千載期君天下寳玉雪善自愛魏知事求樂閒字謾與一絶人人忙裏羡人閒到得閒時樂最難會着此心真樂處山林朝市一般㸔九日宿璜坑重陽天借登臨便北上岡巒歩歩髙馳傳觀風忘路險無功及物愧民勞山深氣象涵千古風静塵埃絶一毫萸菊旅中無覔處明年何許約遊遨十日山行午炊冲頭上山竹輿下山行據鞍穩坐須路平豈惟人力欲調適馬有肺腑亦求生閩山叢叢石壁立一嶺未了一嶺迎峯回路轉蹊徑小上如登天下如傾隙中梯齒度田畆亦有流水濺濺鳴老農終嵗營一飽大熟龠合論収成我来行縣當九月風髙雲朗氣適清平生心地一平直見此巇險魂為驚僕痡馬瘏亦良苦未必原隰周隱情箋天夜半借霹靂盡削磊磈除縦横皇皇大道坦然共四通八達朝瑶京十一日浯畬登舟十絶天開圖畫作歩障連日山行已大竒換得漁舟更竒絶大年小景少游詩﨑嶇複嶺到江津倒卧舟中静閱人山上行人昨日我我思昨日始傷神瀨頭流水緑如油急取春芽試一甌揚子江心堪伯仲茶經従此合重修頗厭山蹊百險艱輕舠暫借一隅安灘頭力盡不得上行路人間是處難江清照見石粼粼貌得逰魚態度真說與長年輕蕩漿放他深處着潛鱗上頭石壁下驚湍一似龍蟠一虎耽幽獨莫教方士見山靈怕喚小仙嵓石壁一帶類龍虎仙嵓重陽落在萬山中物色黄花杳不逢天恐詩人要題目江邉木末出芙蓉山容彷彿似盱江亦有人家占夕陽陸走舟行方未了晨飡何日奉髙堂桑田滄海兩茫茫一道清流自久長定有幽人在空谷說仙說佛說文章說仙說佛説文章自是山林不耐閒試數聖賢名世者話頭那有許多般又五言一首斷岸刀裁出清湍磬折流山尖微見樹石罅劣容舟羣鷺驚人起雙鳬盡意浮哦詩忘行色征騎又江頭板橋午食縣郭二十里板橋三五家西風熟禾黍陸地富桑麻去嵗遭洪水髙林帶舊槎他鄉豈不好無奈此生涯十里頭夾道驩迎盡古松龍吟虎嘯滿天風吟詩未就人攔馬落向荒煙莽蒼中次郭珙留逺大卿韻二首鏟彩韜光幾嵗寒深叢依舊炳斑斑心如止水絶㸃滓屋與閒雲分半間蹤跡久踈客城府篇章聊復主溪山後生不識龍鍾老少日聲名播九寰閱人多似粤中山客有可人千一難驚見貞元朝士在敢同絳縣老人㸔珠蔵大澤祗自媚木卧空山不受寒朱墨沉埋無好語和篇首首出衷肝次韻王蘭思月露精神入筆端泠然雅韻洗髦蠻知章清味鑑湖水𢎞景髙標句曲山炊黍功名随舊夢種蘭嵗月自蒼顔何時乞得身無事分取閒雲一半間百蝶圖政爾翩翩去其如栩栩何夢中千億化未覺百身多張萱唐宫搗練圖月杵輕揮快似飛霜䊵熨帖浄輝輝詩人不識書師意微詠周南澣濯衣書月樓長年南北事馳驅閒却西樓架上書削迹市朝専静退羡君事業付乗除神光清夜照千古素魄中秋朗太虚我欲借眠還肯否靈明回向此心初次韻張仲豪御史見寄荔支熟後與君違羅髻猩紅又及期官冗不知為客倦詩豪猶足起吾衰田園亹亹生歸興江海悠悠感舊知千里相思無以贈明時行道復奚疑荅王魯山江海交㳺白髮新眼明猶及識斯人縉雲氏接三皇舊鳬繹山蔵萬古春舉世誰能客毛遂髙風今始見元賔秋光未老黄花徤把酒相期萬里身荅張仲豪御史山川相望風烟隔寒夜時時夢見君焜燿繡衣浮紫氣峥嶸椽筆倚青雲月随淮水明千里春減江城凍幾分老我三年閩粤國無才何以稱斯文韓孔恵孝廉挽詞杜門三十載辟世抑何嚴身隱一時屈民彝萬古瞻徵君宋康節處士晋陶潛題墓真無媿三山韓孝廉寄題李總管効忠堂恭惟湯武師仗義行以仁阿衡相鳴條尚父翼盟津霆聲纔一鼓六合皆陽春後来用武者草菅視其民功成荷圭爵萬骨随荒燐懐哉平江南時有臣如彬焚香對士卒誓不戮一人至今青史上厚徳誰與鄰天朝大一統皇靈被無垠桓桓巴延公秉鉞兵如神舟揚有澄波矢落無驚塵策勲談笑間視彬亦其倫誰歟賛籌幄李侯兩經綸拔鍪起襄樊一掃雲雷屯論功冠戎幙蚤合登要津胡然二十載尚爾朱兩輪皦如一寸忠寝飯常書紳為堂識不忘巨扁髙嶙峋邇來又遷轡三載建水濱清譽播海隅最聲徹嚴宸我聞忠之報豈止在一身斯堂貽子孫千古長如新髙門矗霄漢華屋如魚鱗金珠醉夢中歌舞紛前陳誰持芹曝心惓惓到君親感兹名堂意肝膽増輪囷窮為畎畝士達作廊廟臣功名儻來耳命義當自珍我語如可采庶幾附堅珉次韻張仲豪御史世塗九事八欺謾安得春風處處懽人徯銓衡孚物論我知玉雪在臺端心游肯綮屠牛易眼著驪黄相馬難紙尾不為子木署要留選格與人㸔宋以蔡廓為吏部尚書廓謂傅亮曰選事悉以見付不然不能拜也亮以語録尚書徐羡之羡之曰黄㪚以下悉以相委廓曰我不能為徐子木署紙尾為曺仲堅題漁父圖風烟浩𣺌浪拍天百㠶齊開争一先輕舠蕩漾自来去詩人曽賞古漁父山圍别浦樹參差水浄沙明人迹稀大罾小罟較得失魴鱮暗作枯魚泣直針為鈎餌亦無烟波不見真釣徒林中茅屋是誰子袖手無言方隱几李憲甫敦好堂如許聲華重情知計未能臨池思靖節愛石讓平泉此事凌千古斯文繫數椽相逢敦友好心誦大夫賢書郭将軍墓銘後不用汾陽拜将軍閱世深虎頭當日相馬革老年心穎自囊問出詩留槊外吟能文欣有子安得過山林送余率翁秩滿謁選并寄容齋承㫖肯堂學士江南四月梅子黄衣袖已試荷風香出門有客欲萬里使我憶得西山蒼西山何處雲半髮夜深斗極回寒芒磴泉自紅澗自碧樓倚白雪歌滄浪容齋遂慵兩相好劍氣耿耿龍騰驤我曽握手極千古逢之滿腹生琳琅曉天一笑江水長燕鳴岸雨催牙檣别余琅山教授憶昔京華别誰知碧澗来一杯春事老两度冷官回喜色迎椿樹明時仗杞材可能𤓰熟巧綵袖照蓬萊皮充齋挽詞宦籍公侯貴鄉評齒徳尊卷舒民寄命生死客填門美譽空遐想遺文欠細論傳家詩禮在賸馥茂蘭孫送黄友章過南浦并寄蕭許二提舉咫尺朱簾外梅黄正釀酸谷雲雙井濕江月一天寒懸榻留徐穉開帆借子安斯文有宗主慎勿歎儒冠上官秋旦挽詞二首妙年植門户壮志就功名汲汲尊倫紀諄諄似老成文功同武事茂實發英聲太息天何逺摧殘到紫荆黄金䑓畔路文彩憶鵷鸞大雅淡無語諸公争欲官可憐蒼黛色不及雪霜寒賴有新詩在江湖興未闌題趙雲趣梅圖燭龍一歩九徘徊便恐昆明焮作灰避熱雪樓無去處天留半樹補之梅題傅雨岩所蔵蕭臺二賢與雞山賡和墨跡蕭臺二妙競當年下筆曽期百世傳不是傅家敦世好只今誰與拾遺編題傅雨岩所蔵劉龍洲與牧庵賡和墨跡四海龍洲客三生杜牧之篇章唐大厯人物宋淳熈雅道還諸老風流自一竒雨岩寳遺墨先友百年思黄有山挽詞江右多文獻夫君獨槩量一官相始末十載了存亡夜月閩闗黒秋風盱樹黄有兒終大事百世此桐鄉曾寄䆫千户挽詞家有元豐稾逢時又六韜水鳶従霧潦鞍馬尚風騷王府竒斯士皇恩選爾勞中營妖石隕新塜戢畬髙次韻王楚山見寄二首嵗寒特立憶長松陡覺龍蛇落眼中學問青箱傳嫡𣲖詞華白雪尚鄉風田園到底還元亮城府曾先識徳公矯首詩筒頻餉我草書元不碍匆匆江山信美重登樓嵗嵗年年客裏留逺景記成懐蜀里孤雲望斷感邠州白鷗江上天連水黄鶴磯頭月滿洲厯厯楚山青不老㡬時握手話曾遊送黄隆吉司獄兩辭有生死司獄定初情慎勿卑官職徒然記姓名如君自良吏佐邑著能聲章貢修何行行㸔獄市平送嚴春山不是春山無釣磯要將喜色動慈闈一官豈為蘇洵冗百里欣同季路歸椒酒儘堪為夀獻梅簷趂得未花飛斯文衡鑑明公在千仞岡頭試振衣陳中方挽詞秋風蟻戰萬人㸔回首真成半夢間博得風流歸泮水任將文物起賢闗青衫纔著陵遷谷紫紼重来日薄山阡送南陽家咫尺梅花寒絶淚潸潸鴈塔李君擕草廬記来索詩戯題二絶看了除書損道心浮屠何事著虚名華山處士多閒管記得麻衣三字評君来喚醒少年狂淡墨春風鴈幾行塔頂夜寒星斗近尚堪為我說文昌曽勁節恵梅二首任他桃李滿人間千載心期托嵗寒儘有江頭佳實在不妨身作老龍蟠癯仙歡舞送春来醉我新篘白玉醅索笑花前誰與共一尊合為主人開趙安宇恵梅二首何必園林欲雪天問渠交友已忘年尊前一笑成珠玉知是詩仙是酒仙誰遣飛虬下九天人間小住却千年秪應標格孤山似肯與移來配水仙曽勁節挽詞愁絶寒蓬對此君尚疑月夜有歸魂黄粱夢裏常平粟晚節香中獨樂園養志従来誇有子問安誰復辨諸孫千年馬鬛知何許不盡春風淚一樽題靖夫弟畫屏折枝十二首紫牡丹豪貴說長安争先紫牡丹我無池舘地畫與子孫看梨花神清體綽約雲淡月朦朧道是玉環似輸渠林下風雞冠瑶臺欹綘幘秪欠一聲啼獨立西風裏由人喚木雞月桂本是堯蓂莢翻為月月紅殷勤煩好手移向玉除東碧桃紺髪緑毛冠瓊裾縹碧衫人間何處着除是補陀岩黄蜀葵玉杯蒸栗色那得許精神稽首黄金相天然妙色身櫻桃雨洗紅珠重香浮乳酪寒筠籃風味在消得赤瑛盤来禽翡翠圓成彈臙脂與㸃腮園丁休盡採怕有衆禽来梨子滿面黄金粟盈科白玉漿可能燒二顆口腹累君王石榴朱房含玉醴玳殻錯金鈿不枉煩符節﨑嶇十八年木𤓰珍重宣城貢瓊瑶直得詩霜餘風韻在細字冩臙脂枇杷翠葆擎珠琲金丸貯蔗漿雪中記髙樹花發傲羣芳跋叚立夫詩卷并序予初識叚君立夫扵南臺持憲嶺南甚有聲予使閩嶠不相聞五六載矣問之則曰寓武昌也自閩還盱君適来佐盱郡以一道清澄之才行千里牧養之政一府之視聽為之新予寓扵是而官扵是者得見如斯人焉如之何不喜暇時輙相従意謂可以忘老也而予又被命有湖右之役君舉酒為别且出示武昌一時名人送行詩卷學士姚公端夫叙實居其首予行匆匆不能悉已然君之不讋不戚不待端夫言而後知之也方今聖君賢相在上用人必當其才如君英英豈久沉郡僚底哉將欲為盱民借君一年恐不可得繫二詩扵卷末以識别後之思云君從武昌来我又武昌去南樓秋月髙永夜望盱母君如霜後鶻縶此轅下駒借留亦我意匪朝有除書夀萬媪九十八嵗康强九十八嵗夀四子一女俱耋耆身見曾𤣥共五世一門二十四男兒阿誰積此善者慶萬母鄭姓家青綏此誠希有合旌異有未省録徴吾詩送白敬父赴江西理問斯人官此孰能知江漢天成一叚竒南國樹能思召伯西風塵豈為元規相㸔未穏渾疑夢一笑無何又别離好泝澄江吾所飲思君還讀寓齋詩題張知事所蔵王黄華墨竹姚雪齋詩卷二首黄華不見見琅玕蒼雪紛紛六月寒盡日摇毫描不就若為持與墨君㸔軒髯猶記雪齋老筆法詩情兩入㣲莫怪再三開卷軸近来耆舊眼中稀送蕭深可尹溆浦就呈分司郭西埜僉事荒服今州縣提封古子男瀘溪遺愛在溆浦去程諳尚續台衡八何妨令尹三林宗方問俗氣象故渾涵題雪寺歸僧圖石頭元路滑更着雪皚皚不敢辭辛苦諸方應供来奉餞學舟老先生之武陵疾風吹雲雲不裂南紀酣酣三日雪辰陽冷掾故不冷破㡌棕鞵来作别先生自是我輩人錦袍丹紱曾青春黄金築臺不肯上水晶宫中一角麟一朝忽着儒冠起泛宅浮家五千里繫船花岸茹蒸霞為展皋比說詩禮仲尼未始三年淹我亦鳴榔下湘水蕭雲曹志上所知銓量當遣教五溪先生行止無不可瓜期况爾来遲遲問君此行何所之武陵思我還當歸是間少長致足樂采花食實薪桃枝落日天低洞庭野木葉蕭蕭風上下留君小住君掉頭前有十槳先饋者蒼蒼烟水解迷人莫倚川原物色新漢家會有蒲輪使珍重脩程穩致身燕五峯右丞用安總管雪詩韻見貽次韻二首開門鷺羽舞僊僊時序峥嶸又一年萬象好㸔俱幻處兩儀渾似未分先挿空粉筆誰供畫散路銀盃不直錢狐兔只今難遁跡長弓俊鶻快三田五老峯頭不老僊詩来喜雪兆明年閒吟公自如忠獻懶讀吾方似孝先杯酒賸思澆磊磈街泥猶惜濺連錢斯時雅稱官居冷㡌擬僧伽衣稻田燕五峯詩附比見諸名勝所賡安侯雪詩病中偶成兩章録呈一笑疑是瓊樓上界仙㪚花布地又年年玉龍松老猶擎重翠羽梅寒敢占先甲胄戍邊思挾纊貂裘換酒不論錢舊家風味都休說預喜豐年賦大田銀潢剪水出天仙此瑞今無二十年南紀歡騰三白後北枝春遜六花先此時沙漠應如席曩日京都屢賜錢臣子願豐無補報負丞祇恐愧藍田再用韻敬謝佳句之辱凡花頃刻未為仙天上瓊花占大年鑱斸黄精憐我老詩成白戰覺君先吟忩祇想銀河瀑凍屋空驚玉蝶錢稽首君恩同一飽明年我亦賦歸田髙寒驄馬自神仙氅玉風標見盛年梁苑賦成驚嵗晏郢樓曲好占春先爐灰我愧懶殘芋茶沸君髙陸羽錢忽憶西江擕手去漁簑江上看瓊田次韻奉酬趙儀吉并柬問嘉會陳孟實雪灑溪藤卷復開雙魚能為故人來一官水國家千里三谷山房夢幾回安得清逰繼韓孟喜聞白戰起歐梅嵗寒亭下春初折試嚼君詩嚥一杯又題嵗寒亭吾廬不暇理且復理斯亭風雨従渠破雲山送我青蒼龍千嵗質黄鶴九霄翎相與成三友今年聚徳星題廖克讓所蔵喜酸圖啄木畫卷二首甕天従蚋集駢首欲何為倘使真知味應無浪皺眉山禽啄木響野客抱琴㸔我有芳春調無人為一彈送禮部侍郎喬元朗使安南一士賢扵萬甲兵文星兩兩使星明林箐北户迎霜雪江漢西風送斾旌道路只今如咫尺男兒従此見生平經行賸着奚嚢貯更恐驩州有貢英唐賢相安公日南貢士也寄閻子静唐静卿二翰長故人天上近何如白玉堂中足寳書燭徹宫蓮三鼓後露漙仙掌九秋初江湖政共丹心老魚鴈全如緑鬂踈西北闌干天咫尺欲乗黄鶴却躊躇因羅冲夫行寄臧魯山二首夢裏西江潑眼青隔林遥見繡衣明覺来得句無人寄恰有新秋鴈一聲兩鬂清秋半席風歸装無物有詩窮南樓那似西山好十二珠簾捲雨中確齋侍御見寄方鏡新篇奉和二首老我平生坐惡圓又因秦鏡得新篇一方明月恰如此幾載磨磚竟炯然不必䖝魚銘表裏定無麞䑕鑑媸妍憑君穩著髙䑓上為助清光照大千挂壁従教鬼魅驚誤随書劔又江城神光内照初無用仙藥重磨漫有情此日容顔誰老大向来肝膽自分明蕭蕭萬象秋經眼安得同㸔更細傾與郭西埜并序家有小犀帶一相傳寳晉齋故物得之有自宜不妄也敬歸之西埜主人共服玩之萬一雖元章或未足嫓盛美而是物遷徙去来每不失所托政可為此帶賀乃詩以送之書畫船中物文犀獨未銷通天従過眼辟惡且圍腰尤物今何幸伊人故自超願君勤結束早晚立清朝次韻寄謝譚梅屋四首盡日馳驅尚自强得詩題案復題墻梅花正繞深深屋不記麄官薛許昌寒溪對月影成三千里相思北斗南石白窪尊無限意譚君殊憶共君譚平生吾亦愛吾廬松桂成行蔽芾初料得山中人笑我豈無熊掌去求魚洞簫聽遍韻能和小為諸君更倚歌須信新詩如白髮一畨離别一畨多次韻寄謝郭梅心三首劭農摩壘誰如此敵强平生屈賈為君忙已尊詩律今功父更識交情古子桑甘棠池上羊角峯前水墨池嵗寒心事幾南枝可憐獨見荼䕷面又值春酲未解時社日詩課無聊謾日供不如初震醒羣聾武昌樊口春寒夜夢嚼梅邉雪片鬆耒陽譚子實出少陵祠古今題詠求詩就題其後金粟無人酹夕陽耒江行客奠椒漿風騷何與乾坤事山水長涵姓字香蘭畹大夫空浦溆錦官丞相有祠堂遥知一一忠魂在來往乗雲共帝鄉用従周學士韻奉題竹岡二首淡墨重㸔帶路塵去年今日正行春不知誰有千竿玉我欲林中著此身江湖滿眼嘆殊鄉寒碧沉沉華子岡輸與咸寧吴令尹此君長伴兩相忘餞詹御史相知不在早所貴得此心馳驅三十年見此玉樹林蒼蒼古顔色蔽芾喬木隂豈無雪與霜獨覺春意深懸知棟梁具不受寒暑侵髙枝有逸響聊以驚凡禽誰云節目多正直神所欽清風為我彈明月為我斟非酒味已長無絃浩知音我欲罄一歡回首千雲岑願共千嵗期昻霄政駸駸寄尚參政黄鶴山前舊使星十年今在泰階明西江紫氣南樓夜長凭闌干到五更江天暮景圖昏鴉零亂掩荆扉烟樹㣲茫水四圍我願卜鄰還要否門前恰有釣魚磯題段郁文所蔵錢舜舉畫二首梨花一枝寒食兩落紙不沾濡他日成秋實還能寄我無白菊黄中雖正色潔白見芳心折得無人把何如晚逕深雪樓集卷二十七
