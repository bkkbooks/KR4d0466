body:
  text: 雪樓集卷二十七元程文海撰詩徐君允諧以長篇將荔枝為貺草草二絶奉謝風雨作秋西齊兀坐細讀來章念不可不報遂又次韻荔支樓下繡衣譜授記傳來却到豫得見伊家玉樹種絶勝展玩樂天圖何人日啖三百顆輕缷霓裳見玉妃自得君詩氷雪味不知世上有甘肥我行炎方見子都粟肌皻面身橛株中藏至美不自露風姿皎皎隱煆爐土人謂此玉樹貴兵間幸不供樵蘇李生五品竟汝遺太冲竊取夸全吳不材散木神所扶有果可食終剝膚君不見深山毛羣絢文彩織毳寧免充􅖯毹大枝小枝折泄餘空留碧葉冬不枯鹽蒸蜜漬意可逺盛之寒露清氷壺廟朝豈諳草野味猥以櫻實當醍醐蜀珍曾被真妃汙此事頗近寧子愚東閩猶是山澤臞遼遼道里懸中區倘經薦進亦爾耳始信禍福相乘除嶺南酸薄同黔驢香山只作巴峽圖莫嗤齊人識管晏知己賴有東家謨殊鄉殊嗜多受誣朔南酪茗更相奴詭名好化赤松子甘液下注根豐腴漳境向治流逋四歸𢎞道有詩次韻志喜按臨建邵總稱賢又復深深入瘴烟自古清名能化暴及今赤子得安眠如雲冠蓋誰曽識帶雨犂鋤爾自田從此海瀕霑聖化吾曺逭責樂餘年寄賀𢎞道僉事改除江西聖明初服選掄新易地觀風著此人會見西江民吐氣久聞南嶠政如神只今寮寀情何極惠我鄉邦事亦均說與山中吳處士清時錫汝保閒身畏獨惠中秋詩次韻邀月共發一粲萬里隂晴此夜秋天容竟日故幽幽要教好月特然霽暫遣癡雲凝不收隱隱清光上東海堂堂勝賞賽南樓作詩合共閩人玩早放髯劉出一頭夜深邀月不至悵然而睡再讀來詩次韻以謝天上人間各自秋姮娥不管下方幽暗陳瓜果充籩實冷聽梧桐觸井收已至三更仍抹漆空餘逸興欲登樓夢中桂影成金粟癡絶前身顧虎頭暇日偕行臺唐古特御史登九仙山暫停驄馬共尋幽倚杖鼇峯頂上頭海淨潮平萬里眼風光月霽一天秋九仙定有重來約三島寧無可去舟古字苔深半明滅新詩聊復記曽逰送𢎞道僉事之官江西趙侯丰骨氷千層入眼壁立清且熒烏府當年小盛却崇臺獵獵寒颼生清問顛崖辛苦急我亦直指江南行雲龍上下逐東野讜論感激令人驚别來不作揚州夢獨想豸角搖風聲浮雲聚散抑何定王事靡盬無留停去年驅車下閩嶠驄馬却在西南坰關山明月長耿耿逺欲見之悵未能邇來傾倒連床夜議論頗覺深逃形書囊無底談未了一札又促飛鴻冥江山共恨留不住私喜桑梓䕃餘清萱近北堂春日榮白雲望望雙眼明我家有老且望八倘許錫類遺君羮霜風飄飄榕葉鳴酒餞江頭須滿傾願言努力鋤荆棘浩歌天保答升平次劉雲卿御史同達勒達御史逰鼓山詩韻并序屴崱峯距城二十里而近欲一往未能也去嵗禮部王君寅夫獨逰辱寄詩盛談雲夢之樂僕亦想像髙唐以對今𢎞毅雲卿二御史暇日登髙覽勝紀之于叙寫之于詩使人心曠神馳恨不並轡橫翔排埃壒而出廖廓也率爾用韻登臨有約墮鴻冥拄笏看雲空復情笑我北山文久勒輸君南嶽記先成林深谷窈車聲轉海闊天髙筆興生何日得將塵俗耳倚欄同聽澗泉鳴再次韻呈𢎞毅御史驄馬行行出杳冥笑擕僚屬叙幽情隂森竹樹芟夷去軒豁江山指顧成坐石傳杯懸瀑濺倚嵓扶杖亂雲生何時共卧超凡閣月滿空林翠浪鳴寄賀盱江張監郡初上帝錫盱城保障哉朱轓皂蓋凂雄才濟南書許人間見博望槎從天上來聞道門庭清似水不愁田里冷于灰同寅太守今劉寵努力驅車共挽推送蘭與盱守劉東崖結綬年時白玉京只今江海若為情蕭蕭六轡馳荒徼赫赫雙旌擁大城桑梓何時容我住蕙蘭微意况君清黃金橫帶渾餘事千載相期不朽名郭梅西息齊隂向秀葽測陽從小雪看千年啓龜蟄六月養鵬摶隱几天機熟閉門人境寬悠悠八十返靜處得竒觀題趙仲逺所藏趙大年鵝鴨圖鵝鴨池邉畫作䦨輸他鳬鴈意幽閒王孫下筆厭羈束移在長汀短渚間題仲經知事家藏錢舜舉折枝花鳥徐黃死不傳筆端那得許清妍錢郎狡獪老猶在字畫翻騰作少年題採蓮舟杯攀翻葉上露釀作杯中酒可能君不醉負此摻摻手題仲經所藏馬圖食之三品芻豆飾以千金轡環誰能解棄徽纆縱渠汧渭中間題仲經家江貫道瀟湘八景圖八首平沙落鴈翩翩數行下灘磧俯蒼波此處稻粱好人問矰繳多烟寺晚鐘僧定鐘聲緩依稀聽不真渡頭風正急喚醒未歸人洞庭秋月萬頃玻瓈上輝輝玉一環望中青似粟約莫是君山瀟湘夜雨昏昏風浪裏瑟瑟打篷聲騷客千年恨靈妃萬古情漁村夕照落日寒潭靜西風黃葉鳴鱸魚新出網分我一杯羮山市晴嵐旗亭新酒熟下馬試從容頗勝老兵對夕陽三兩峯江天暮雪六月三山底城中似甑中客來開短軸亂雪舞江風逺浦帆歸八景瀟湘妙歸舟更色絲招招煩小住我賦式微詩題歸去來圖春晴苦旱心如醉暑雨妨農鬢欲斑眼底家山歸去好吾生端的幾時閒送李副使赴行臺治書侍御史暑風散霖霪宇宙一清快青驄金盤陀夙駕趣行邁先聲所震薄已被江浙外兩年七閩裏赤手理雕瘵髙明副縝密通綽主剛介清時簡賢哲美績先奏最崇臺借君重橫榻政非泰蹇余忝嘗僚朝夕得針誨瞪其塵埃中矯首飛霞佩男兒附青雲肯掇鼠壤嘬浮榮一瞬息醜好有千載期君天下寶玉雪善自愛魏知事求樂閒字謾與一絶人人忙裏羡人閒到得閒時樂最難會著此心真樂處山林朝市一般看九日宿璜坑重陽天借登臨便北上岡巒步步髙馳傳觀風忘路險無功及物愧民勞山深氣象涵千古風靜塵埃絶一毫萸菊旅中無覔處明年何許約遊遨十日山行午炊冲頭上山竹輿下山行據鞍穩坐須路平豈惟人力欲調適馬有肺腑亦求生閩山叢叢石壁立一嶺未了一嶺迎峯回路轉蹊徑小上如登天下如傾隙中梯齒度田畝亦有流水濺濺鳴老農終嵗營一飽大熟籥合論收成我來行縣當九月風髙雲朗氣適清平生心地一平直見此巇險魂為驚僕痡馬瘏亦良苦未必原隰周隱情箋天夜半借霹靂盡削磊磈除縱橫皇皇大道坦然共四通八達朝瑶京十一日浯畬登舟十絶天開圖畫作步障連日山行已大竒換得漁舟更竒絶大年小景少游詩﨑嶇復嶺到江津倒卧舟中靜閲人山上行人昨日我我思昨日始傷神瀨頭流水緑如油急取春芽試一甌揚子江心堪伯仲茶經從此合重修頗厭山蹊百險艱輕舠暫借一隅安灘頭力盡不得上行路人間是處難江清照見石粼粼貌得逰魚態度真說與長年輕蕩漿放他深處著潛鱗上頭石壁下驚湍一似龍蟠一虎耽幽獨莫教方士見山靈怕喚小仙嵓石壁一帶類龍虎仙嵓重陽落在萬山中物色黃花杳不逢天恐詩人要題目江邉木末出芙蓉山容倣佛似盱江亦有人家占夕陽陸走舟行方未了晨餐何日奉髙堂桑田滄海兩茫茫一道清流自久長定有幽人在空谷說仙說佛說文章說仙說佛說文章自是山林不耐閒試數聖賢名世者話頭那有許多般又五言一首斷岸刀裁出清湍磬折流山尖微見樹石罅劣容舟羣鷺驚人起雙鳬盡意浮哦詩忘行色征騎又江頭板橋午食縣郭二十里板橋三五家西風熟禾黍陸地富桑麻去嵗遭洪水髙林帶舊槎他鄉豈不好無奈此生涯十里頭夾道歡迎盡古松龍吟虎嘯滿天風吟詩未就人攔馬落向荒煙莽蒼中次郭珙留逺大卿韻二首鏟彩韜光幾嵗寒深叢依舊炳斑斑心如止水絶㸃滓屋與閒雲分半間蹤跡久踈客城府篇章聊復主溪山後生不識龍鍾老少日聲名播九寰閲人多似粵中山客有可人千一難驚見貞元朝士在敢同絳縣老人看珠藏大澤祗自媚木卧空山不受寒朱墨沉埋無好語和篇首首出衷肝次韻王蘭思月露精神入筆端泠然雅韻洗髦蠻知章清味鑑湖水𢎞景髙標句曲山炊黍功名隨舊夢種蘭嵗月自蒼顔何時乞得身無事分取閒雲一半間百蝶圖政爾翩翩去其如栩栩何夢中千億化未覺百身多張萱唐宫搗練圖月杵輕揮快似飛霜䊵尉帖淨輝輝詩人不識書師意微詠周南浣濯衣書月樓長年南北事馳驅閒却西樓架上書削迹市朝専靜退羡君事業付乘除神光清夜照千古素魄中秋朗太虛我欲借眠還肯否靈明回向此心初次韻張仲豪御史見寄荔支熟後與君違羅髻猩紅又及期官冗不知為客倦詩豪猶足起吾衰田園亹亹生歸興江海悠悠感舊知千里相思無以贈明時行道復奚疑答王魯山江海交遊白髮新眼明猶及識斯人縉雲氏接三皇舊鳬繹山藏萬古春舉世誰能客毛遂髙風今始見元賔秋光未老黃花健把酒相期萬里身答張仲豪御史山川相望風烟隔寒夜時時夢見君焜耀繡衣浮紫氣峥嶸椽筆倚青雲月隨淮水明千里春減江城凍幾分老我三年閩粵國無才何以稱斯文韓孔惠孝廉挽詞杜門三十載辟世抑何嚴身隱一時屈民彝萬古瞻徵君宋康節處士晋陶潛題墓真無愧三山韓孝廉寄題李總管效忠堂恭惟湯武師仗義行以仁阿衡相鳴條尚父翼盟津霆聲才一鼓六合皆陽春後來用武者草菅視其民功成荷圭爵萬骨隨荒燐懷哉平江南時有臣如彬焚香對士卒誓不戮一人至今青史上厚德誰與鄰天朝大一統皇靈被無垠桓桓巴延公秉鉞兵如神舟揚有澄波矢落無驚塵策勳談笑間視彬亦其倫誰歟贊籌幄李侯兩經綸拔鍪起襄樊一掃雲雷屯論功冠戎幕蚤合登要津胡然二十載尚爾朱兩輪皎如一寸忠寢飯常書紳為堂識不忘巨扁髙嶙峋邇來又遷轡三載建水濱清譽播海隅最聲徹嚴宸我聞忠之報豈止在一身斯堂貽子孫千古長如新髙門矗霄漢華屋如魚鱗金珠醉夢中歌舞紛前陳誰持芹曝心惓惓到君親感兹名堂意肝膽增輪囷窮為畎畝士達作廊廟臣功名儻來耳命義當自珍我語如可采庶幾附堅珉次韻張仲豪御史世塗九事八欺謾安得春風處處歡人徯銓衡孚物論我知玉雪在臺端心游肯綮屠牛易眼著驪黃相馬難紙尾不為子木署要留選格與人看宋以蔡廓為吏部尚書廓謂傅亮曰選事悉以見付不然不能拜也亮以語録尚書徐羡之羡之曰黃散以下悉以相委廓曰我不能為徐子木署紙尾為曺仲堅題漁父圖風烟浩渺浪拍天百帆齊開爭一先輕舠蕩漾自來去詩人曽賞古漁父山圍别浦樹參差水淨沙明人迹稀大罾小罟較得失魴鱮暗作枯魚泣直針為鈎餌亦無烟波不見真釣徒林中茅屋是誰子袖手無言方隱几李憲甫敦好堂如許聲華重情知計未能臨池思靖節愛石讓平泉此事凌千古斯文繫數椽相逢敦友好心誦大夫賢書郭將軍墓銘後不用汾陽拜將軍閲世深虎頭當日相馬革老年心穎自囊問出詩留槊外吟能文欣有子安得過山林送余率翁秩滿謁選并寄容齊承㫖肯堂學士江南四月梅子黃衣袖已試荷風香出門有客欲萬里使我憶得西山蒼西山何處雲半髮夜深斗極回寒芒磴泉自紅澗自碧樓倚白雪歌滄浪容齊遂慵兩相好劍氣耿耿龍騰驤我曽握手極千古逢之滿腹生琳琅曉天一笑江水長燕鳴岸雨催牙檣别余琅山教授憶昔京華别誰知碧澗來一杯春事老兩度冷官回喜色迎椿樹明時仗杞材可能瓜熟巧綵袖照蓬萊皮充齊挽詞宦籍公侯貴鄉評齒德尊卷舒民寄命生死客填門美譽空遐想遺文缺細論傳家詩禮在賸馥茂蘭孫送黃友章過南浦并寄蕭許二提舉咫尺朱簾外梅黃正釀酸谷雲雙井濕江月一天寒懸榻留徐稚開帆借子安斯文有宗主慎勿歎儒冠上官秋旦挽詞二首妙年植門户壯志就功名汲汲尊倫紀諄諄似老成文功同武事茂實發英聲太息天何逺摧殘到紫荆黃金臺畔路文彩憶鵷鸞大雅淡無語諸公爭欲官可憐蒼黛色不及雪霜寒賴有新詩在江湖興未闌題趙雲趣梅圖燭龍一步九徘徊便恐昆明焮作灰避熱雪樓無去處天留半樹補之梅題傅雨岩所藏蕭臺二賢與雞山賡和墨跡蕭臺二妙競當年下筆曽期百世傳不是傅家敦世好只今誰與拾遺編題傅雨岩所藏劉龍洲與牧庵賡和墨跡四海龍洲客三生杜牧之篇章唐大厯人物宋淳熙雅道還諸老風流自一竒雨岩寶遺墨先友百年思黃有山挽詞江右多文獻夫君獨槩量一官相始末十載了存亡夜月閩關黑秋風盱樹黃有兒終大事百世此桐鄉曾寄窗千户挽詞家有元豐稿逢時又六韜水鳶從霧潦鞍馬尚風騷王府竒斯士皇恩選爾勞中營妖石隕新塜戢畬髙次韻王楚山見寄二首嵗寒特立憶長松陡覺龍蛇落眼中學問青箱傳嫡𣲖詞華白雪尚鄉風田園到底還元亮城府曾先識德公矯首詩筒頻餉我草書元不礙匆匆江山信美重登樓嵗嵗年年客裏留逺景記成懷蜀里孤雲望斷感邠州白鷗江上天連水黃鶴磯頭月滿洲厯厯楚山青不老幾時握手話曾遊送黃隆吉司獄兩辭有生死司獄定初情慎勿卑官職徒然記姓名如君自良吏佐邑著能聲章貢修何行行看獄市平送嚴春山不是春山無釣磯要將喜色動慈闈一官豈為蘇洵冗百里欣同季路歸椒酒儘堪為夀獻梅簷趂得未花飛斯文衡鑑明公在千仞岡頭試振衣陳中方挽詞秋風蟻戰萬人看回首真成半夢間博得風流歸泮水任將文物起賢關青衫才著陵遷谷紫紼重來日薄山阡送南陽家咫尺梅花寒絶淚潸潸鴈塔李君擕草廬記來索詩戲題二絶看了除書損道心浮屠何事著虛名華山處士多閒管記得麻衣三字評君來喚醒少年狂淡墨春風鴈幾行塔頂夜寒星斗近尚堪為我說文昌曽徑節惠梅二首任他桃李滿人間千載心期托嵗寒儘有江頭佳實在不妨身作老龍蟠癯仙歡舞送春來醉我新篘白玉醅索笑花前誰與共一尊合為主人開趙安宇惠梅二首何必園林欲雪天問渠交友已忘年尊前一笑成珠玉知是詩仙是酒仙誰遣飛虬下九天人間小住却千年秪應標格孤山似肯與移來配水仙曽徑節挽詞愁絶寒蓬對此君尚疑月夜有歸魂黃粱夢裏常平粟晚節香中獨樂園養志從來誇有子問安誰復辨諸孫千年馬鬛知何許不盡春風淚一樽題靖夫弟畫屏折枝十二首紫牡丹豪貴說長安爭先紫牡丹我無池館地畫與子孫看梨花神清體綽約雲淡月朦朧道是玉環似輸渠林下風雞冠瑶臺欹綘幘秪缺一聲啼獨立西風裏由人喚木雞月桂本是堯蓂莢翻為月月紅殷勤煩好手移向玉除東碧桃紺髮緑毛冠瓊裾縹碧衫人間何處著除是補陀岩黃蜀葵玉杯蒸栗色那得許精神稽首黃金相天然妙色身櫻桃雨洗紅珠重香浮乳酪寒筠籃風味在消得赤瑛盤來禽翡翠圓成彈胭脂與㸃腮園丁休盡採怕有衆禽來梨子滿面黃金粟盈科白玉漿可能燒二顆口腹纍君王石榴朱房含玉醴玳殼錯金鈿不枉煩符節﨑嶇十八年木瓜珍重宣城貢瓊瑶直得詩霜餘風韻在細字寫胭脂枇杷翠葆擎珠琲金丸貯蔗漿雪中記髙樹花發傲羣芳跋假立夫詩卷并序豫初識假君立夫于南臺持憲嶺南甚有聲豫使閩嶠不相聞五六載矣問之則曰寓武昌也自閩還盱君適來佐盱郡以一道清澄之才行千里牧養之政一府之視聽為之新豫寓于是而官于是者得見如斯人焉如之何不喜暇時輒相從意謂可以忘老也而豫又被命有湖右之役君舉酒為别且出示武昌一時名人送行詩卷學士姚公端夫叙實居其首豫行匆匆不能悉已然君之不讋不戚不待端夫言而後知之也方今聖君賢相在上用人必當其才如君英英豈久沉郡僚底哉將欲為盱民借君一年恐不可得繫二詩于卷末以識别後之思云君從武昌來我又武昌去南樓秋月髙永夜望盱母君如霜後鶻縶此轅下駒借留亦我意匪朝有除書夀萬媪九十八嵗康强九十八嵗夀四子一女俱耋耆身見曾𤣥共五世一門二十四男兒阿誰積此善者慶萬母鄭姓家青綏此誠希有合旌異有未省録徴吾詩送白敬父赴江西理問斯人官此孰能知江漢天成一假竒南國樹能思召伯西風塵豈為元規相看未穩渾疑夢一笑無何又别離好泝澄江吾所飲思君還讀寓齊詩題張知事所藏王黃華墨竹姚雪齊詩卷二首黃華不見見琅玕蒼雪紛紛六月寒盡日搖毫描不就若為持與墨君看軒髯猶記雪齊老筆法詩情兩入微莫怪再三開卷軸近來耆舊眼中稀送蕭深可尹溆浦就呈分司郭西野僉事荒服今州縣提封古子男瀘溪遺愛在溆浦去程諳尚續台衡八何妨令尹三林宗方問俗氣象故渾涵題雪寺歸僧圖石頭元路滑更著雪皚皚不敢辭辛苦諸方應供來奉餞學舟老先生之武陵疾風吹雲雲不裂南紀酣酣三日雪辰陽冷掾故不冷破帽棕鞋來作别先生自是我輩人錦袍丹紱曾青春黃金築臺不肯上水晶宫中一角麟一朝忽著儒冠起泛宅浮家五千里繫船花岸茹蒸霞為展皋比說詩禮仲尼未始三年淹我亦鳴榔下湘水蕭雲曹志上所知銓量當遣教五溪先生行止無不可瓜期况爾來遲遲問君此行何所之武陵思我還當歸是間少長致足樂采花食實薪桃枝落日天低洞庭野木葉蕭蕭風上下留君小住君掉頭前有十槳先饋者蒼蒼烟水解迷人莫倚川原物色新漢家會有蒲輪使珍重修程穩致身燕五峯右丞用安總管雪詩韻見貽次韻二首開門鷺羽舞仙仙時序峥嶸又一年萬象好看俱幻處兩儀渾似未分先插空粉筆誰供畫散路銀杯不直錢狐兔只今難遁跡長弓俊鶻快三田五老峯頭不老仙詩來喜雪兆明年閒吟公自如忠獻懶讀吾方似孝先杯酒賸思澆磊磈街泥猶惜濺連錢斯時雅稱官居冷帽擬僧伽衣稻田燕五峯詩附比見諸名勝所賡安侯雪詩病中偶成兩章録呈一笑疑是瓊樓上界仙散花布地又年年玉龍松老猶擎重翠羽梅寒敢占先甲胄戍邊思挾纊貂裘換酒不論錢舊家風味都休說預喜豐年賦大田銀潢剪水出天仙此瑞今無二十年南紀歡騰三白後北枝春遜六花先此時沙漠應如席曩日京都屢賜錢臣子願豐無補報負丞祇恐愧藍田再用韻敬謝佳句之辱凡花頃刻未為仙天上瓊花占大年鑱斸黃精憐我老詩成白戰覺君先吟忩祇想銀河瀑凍屋空驚玉蝶錢稽首君恩同一飽明年我亦賦歸田髙寒驄馬自神仙氅玉風標見盛年梁苑賦成驚嵗晏郢樓曲好占春先爐灰我愧懶殘芋茶沸君髙陸羽錢忽憶西江擕手去漁簑江上看瓊田次韻奉酬趙儀吉并柬問嘉會陳孟實雪灑溪藤卷復開雙魚能為故人來一官水國家千里三谷山房夢幾回安得清逰繼韓孟喜聞白戰起歐梅嵗寒亭下春初折試嚼君詩咽一杯又題嵗寒亭吾廬不暇理且復理斯亭風雨從渠破雲山送我青蒼龍千嵗質黃鶴九霄翎相與成三友今年聚德星題廖克讓所藏喜酸圖啄木畫卷二首甕天從蚋集駢首欲何為倘使真知味應無浪皺眉山禽啄木響野客抱琴看我有芳春調無人為一彈送禮部侍郎喬元朗使安南一士賢于萬甲兵文星兩兩使星明林箐北户迎霜雪江漢西風送斾旌道路只今如咫尺男兒從此見生平經行賸著奚囊貯更恐歡州有貢英唐賢相安公日南貢士也寄閻子靜唐靜卿二翰長故人天上近何如白玉堂中足寶書燭徹宫蓮三鼓後露漙仙掌九秋初江湖政共丹心老魚鴈全如緑鬢踈西北闌干天咫尺欲乘黃鶴却躊躇因羅冲夫行寄臧魯山二首夢裏西江潑眼青隔林遙見繡衣明覺來得句無人寄恰有新秋鴈一聲兩鬢清秋半席風歸裝無物有詩窮南樓那似西山好十二珠簾捲雨中確齊侍御見寄方鏡新篇奉和二首老我平生坐惡圓又因秦鏡得新篇一方明月恰如此幾載磨磚竟炯然不必蟲魚銘表裏定無麞鼠鑑媸妍憑君穩著髙臺上為助清光照大千挂壁從教鬼魅驚誤隨書劔又江城神光內照初無用仙藥重磨漫有情此日容顔誰老大向來肝膽自分明蕭蕭萬象秋經眼安得同看更細傾與郭西野并序家有小犀帶一相傳寶晉齊故物得之有自宜不妄也敬歸之西野主人共服玩之萬一雖元章或未足嫓盛美而是物遷徙去來每不失所托政可為此帶賀乃詩以送之書畫船中物文犀獨未銷通天從過眼辟惡且圍腰尤物今何幸伊人故自超願君勤結束早晚立清朝次韻寄謝談梅屋四首盡日馳驅尚自强得詩題案復題墻梅花正繞深深屋不記粗官薛許昌寒溪對月影成三千里相思北斗南石白窪尊無限意談君殊憶共君談平生吾亦愛吾廬松桂成行蔽芾初料得山中人笑我豈無熊掌去求魚洞簫聽遍韻能和小為諸君更倚歌須信新詩如白髮一畨離别一畨多次韻寄謝郭梅心三首劭農摩壘誰如此敵强平生屈賈為君忙已尊詩律今功父更識交情古子桑甘棠池上羊角峯前水墨池嵗寒心事幾南枝可憐獨見荼䕷面又值春酲未解時社日詩課無聊謾日供不如初震醒羣聾武昌樊口春寒夜夢嚼梅邉雪片鬆耒陽談子實出少陵祠古今題詠求詩就題其後金粟無人酹夕陽耒江行客奠椒漿風騷何與乾坤事山水長涵姓字香蘭畹大夫空浦溆錦官丞相有祠堂遙知一一忠魂在來往乘雲共帝鄉用從周學士韻奉題竹岡二首淡墨重看帶路塵去年今日正行春不知誰有千竿玉我欲林中著此身江湖滿眼嘆殊鄉寒碧沉沉華子岡輸與咸寧吳令尹此君長伴兩相忘餞詹御史相知不在早所貴得此心馳驅三十年見此玉樹林蒼蒼古顔色蔽芾喬木隂豈無雪與霜獨覺春意深懸知棟梁具不受寒暑侵髙枝有逸響聊以驚凡禽誰云節目多正直神所欽清風為我彈明月為我斟非酒味已長無絃浩知音我欲罄一歡回首千雲岑願共千嵗期昻霄政駸駸寄尚參政黃鶴山前舊使星十年今在泰階明西江紫氣南樓夜長憑闌干到五更江天暮景圖昏鴉零亂掩荆扉烟樹微茫水四圍我願卜鄰還要否門前恰有釣魚磯題段郁文所藏錢舜舉畫二首梨花一枝寒食兩落紙不沾濡他日成秋實還能寄我無白菊黃中雖正色潔白見芳心折得無人把何如晚徑深雪樓集卷二十七
