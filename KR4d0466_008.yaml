body:
  text: 雪樓集卷八元程文海撰玉堂類槀敕賜碑梁國何文正公神道碑延祐三年春三月丁卯太保庫楚丞相舒古言故平章政事何瑋蒙恩追錫寵章已極尊顯而墓碑未建惟陛下矜念之敢昧死請詔曰可其命臣某文之臣謹按何氏世家易之淶水至處士國清之後始大處士之孫葬易縣之貯梁原因徙家焉處士娶湯氏生淵終易州太守以孫貴特贈推誠宣力功臣銀青榮祿大夫大司徒追封易國公諡武宣娶鄧氏追封易國夫人生伯祥為易州等處行軍千戶兼軍民揔管從世祖渡江死鄂州贈推忠保節功臣太保儀同三司上柱國追封易國公諡忠毅三娶曰楊氏郭氏並追封易國夫人曰葉氏封易國太夫人楊夫人生子瑛瑛子德陸俱為千戶死軍中太夫人生公諱瑋字仲韞年十六從張蔡公柔見世祖世祖感其父之沒授易州太守兄子繼死泣曰我先世功其墮乎乞解印綬從軍遂改行軍千戶鎮亳丞相巴延南征署帳前都鎮撫遷管軍揔管江南平轉太平路安撫司達嚕噶齊進户部尚書行兩淮都轉運使阿哈瑪特用事謝病歸阿哈瑪特敗召參謀中書出為江南浙西道提刑按察使大名路揔管湖南道宣慰使以參知政事召不拜除侍御史又以母疾辭改御史中丞尋兼領侍儀司大德十一年命為中書右丞固辭武宗即位聞公名遣使賜白金五十兩曰以識也拜太子副詹事加遙授平章政事議中書事賜玊帶衛率府立拜太子詹事兼率更復為中書左丞進右丞遄以子德嚴代為衛率使拜公河南江北等處行中書省平章政事提調屯田事賜錦衣貂裘尚書省建復以為行尚書省平章政事纍官至榮祿大夫惟公之用兵也鎮亳時國家悉賦事襄樊宋將夏貴帥師乘虛至城下公先保城東北扼其衝貴縱兵燒北關進趣東北萬户托歡布哈統軍賈文備登城呼公引避公怒奮兵出戰宋師大敗南征丞相巴延令軍中敵我者屠之多殺戮公首諫丞相伐罪弔民以不殺為本丞相善其言涉溧過郢克黃家灣沙洋新城三障命公入撫則沙洋已屠矣進攻楊羅堡夏貴盛舟師上下援江丞相遣將先武磯以分其力搗虛渡江上流明日會楊羅公將其軍為先鋒與平章阿珠泝四十里至青山磯夜半接戰江中黎明亂流衝之抵南岸揚旗先登大兵悉渡貴敗走丁家洲之戰公首奪戰艦千餘宋師數十萬皆北公之為政也易民負先世錢者悉焚其券在太平破貪將之謀保三湖民不為亂為參議極言征交趾括民田選民間女子非計不用竟去浙西捕賊黃華俘良民三千餘下車治俘者還其民又致豪民十虎罪民大安大名民祠神儀衛弗度坐法公以愚無知釋之湖南大豪朱揔管奪民田訟有司久弗决公至立服公曰何不辨跽曰公拔浙西寃民三千餘人我死不敢欺參政之召以政府貟冗願汰自已始不拜為中丞剛直無顧護陳十事以紓民力制國用備荒政重吏祿開賢路為急務且曰丞相安圖甚賢而相業前後異者蓋初則有史丞相廉平章許左丞輩為之佐復相則諸老去矣成宗深然之地震上疏咎在大臣明日政府洪楚實勒茂巴爾斯阿喇卜丹皆罷逐臣薩達克齊巴特瑪新等復召連劾不報忿之欲更亷訪司為觀察司公辨而止監察御史郭章劾一郎中前在樞府受賕既抵罪忤權貴奏捕治章公入言曰陛下殺郭章如祖宗法度何上意解復陳十三事首曰信賞罰定律令和大臣杜僥幸未幾以議南郊不合去趣還臺太子德夀成宗繼賔天公言於御史大夫圖齊公社稷大臣盍亟言定大計圖齊尋卒中宫召議成宗祔廟事公曰國朝舊典惟宗藩親王得與此非臣敢知左丞相阿固岱變色以則天為言公曰彼有廬陵王何可同也出以勸右丞相達爾罕及中丞塔斯布哈急白今上及太后早為之所既而羣奸伏誅武宗至自上都問孰為何中丞及見諭曰聞卿忠藎其竭力匡輔無有所隱進十四策以擇相為先諸王圖列封越欲自賦置吏托克托等議建尚書省易幣法皆奏格之及來河南尚書省竟立河南無賴業掠賣良民悉捕治之行屯田至揚州民負鎮南王府錢舉家入傭歲滿沒為奴白王釋之王府又以民易田不可奪之田白王還之妄人趙萬兒造妖言覺連黃南陽歸德汝汴數百家驗問皆農商萬兒伏辜增河南屯田米十七萬石又經理荆湖屯田廢地歲可出粟百餘萬所至尤以興學薦賢崇孝弟長恩信恤孤寡為任嘗奏請割田千九百畝入大名校官出御史臺錢五十萬建國學以地三千畝立書院于南陽祠忠武侯三千畝入揚州三皇廟又請置洪澤芍陂屯田萬戶府儒學教授自太平還購書數萬卷迎劉因先生為師參議中書薦劉宣等十餘人晚年數以母疾謝事天子感動賜尚醖嵗給十日侍養姻族不能自存者養之不能婚嫁葬送教育者資之正喪祭之禮嚴內外之分明本末之要審經權之義故入為孝子出為忠臣嗚呼賢哉以至大三年九月五日薨于官年六十六十月三日葬貯梁原以夫人張氏祔夫人參知政事容實勒之女貞靜慈孝儀于九族有子三德嚴嘉議大夫衛率使德巽早世德溫武略將軍副萬戶女一適張彥敏夫人之姪也夫人趙氏有子二德讓德謙孫二長曰杲武略將軍副萬戶次曰景皇慶某年某月贈推忠佐理同德功臣太傅開府儀同三司上柱國追封梁國公諡曰文正臣既奉詔撰次因竊伏念聖君賢臣一時遇會者有之矣至論其終始一致或罕能之若文正公言議風旨益逺而在益思而不可忘沒已久矣而恩顧之勤不憖若此嗚呼凡百君子得無勗哉謹為之銘曰叔虞啓韓韓别為何司空相漢寖逺而波千幾百祀乃振于淶培深積隆紹挺雄材武宣起家専城以居忠毅奮忠星隕江蒲洸洸梁公投筆從戎我先孔勞我功曷終既存亳師遂涉大江于蕃于宣樹弱蹶彊風厲湘壖雷輥吳陬躍義踴仁威信澤流再入黃扉一陟霜臺襲和抑乖揚嘉斥回言雖寡由舌不可移卒開聖明弼我丕基雍容承華心膂股肱苗豈不治羣螟復興乃殿雄邦于浚之都梁熙楚懷我黍與與其功孔多其命則那惟帝念功可頌可歌諡美封崇易水淵淵貯梁之原永矢弗諼秦國昭宣公神道碑翰林學士承旨塔海既以忠勤左右天子為賢公卿延祐二年詔特贈其曽大父察克圖資德大夫中書右丞上護軍追封隴西郡公妣某氏追封隴西郡夫人大父琳沁光祿大夫中書平章政事柱國追封秦國公諡安僖妣濟默䝉郭勒氏追封秦國夫人父哈答孫推忠效義佐理功臣太傅開府儀同三司上柱國追封秦國公諡昭宣母伊埒哈瑪爾氏封秦國太夫人次徹辰氏追封秦國夫人明年春上復思太傅之勞命詞臣某文之碑以休顯之謹按太傳公蒙古人世居關中憲宗時安僖府君扈從至和林家焉公十五宿衛世祖藩邸號稱謹篤眷遇有加中統初命掌玊食至元二十年以昭信校尉為生料庫提㸃後四年納延叛從征有功加武略將軍又二年從至杭海元貞元年遷明威將軍宣德雲州銀埸都提舉大德改元升懷逺大將軍淮東淮西屯田打捕揔管武宗即位進鎮國上將軍淮東淮西道宣慰使至大四年盜起四明賜三珠虎符拜資德大夫中書右丞浙東道宣慰使都元帥往捕之驅以入海因感瘴癘以某月某日薨于位年六十五以某年月日還葬京城太師莊之先塋有子五人長即塔海娶塔海德濟氏蚤世追封秦國夫人有子曰托克托穆爾繼伊木圖氏封秦國夫人有子曰塔海呼圖克曰巴延布哈女五人珠克娶納雅珍氏有子曰都訥曰巴咱爾巴尼女一人拜珠娶托克托鼐氏有子曰六十二女二人埒里娶伊蘇楞氏有女一人鼎珠娶托里氏有子曰達欣公之子皆賢而塔海尤為纍朝所器重方數歲世祖一見竒之命肄業國子學十六繼父內職從至杭海及事成宗為樞密院斷事官天德之末輔立武宗轉同僉樞密院事升副使尋為大司農遷同知宣徽院事今上在東宫或建言立黑軍衛帥府力諫止之由是寄以心膂知無不為及上踐阼歷集賢大學士太醫宣徽院使遂為翰林學士承旨知制誥兼修國史纍階自太中大夫五遷為榮祿大夫益見親幸推恩錫類爰及其先焉臣嘗謂國朝用人頗類漢初懷一藝抱一能莫不畢效其長立功當世故能成一統之業開萬世之基然功臣之後其盛且大者又必由先世積纍之厚所致觀於秦公可見已夫自安僖以世族起關陜北事憲宗固知所歸矣一傳至太傅遂握藩維之寄分茅土之封豈無故而然耶杭海之役值歲飢凶人無生氣公請於上賑之不足又出私帑相之全活不可勝計四明之亂一方騷然公驅除安集奮不顧身民用相保而病則危矣簡在上心終受顯服蓋先既栽之後益培之宜再傳以有今日嗚呼天道福善其可誣哉銘曰上古邈矣爰徴有元列聖垂裳百辟聨軒位事惟能建官必賢幽遐並興矧此連根懷哉安僖鞭弭櫜鞬策足門右晞光日邊備艱載勞乃啓昭宣幼事世皇屬于天官夙夜在公忠篤貞堅執豆贊祭如臨于淵再從北征厥功茂焉草賦既成來旬來宣成宗武宗蓋著其勤髙牙大纛東甌是藩厥聞載馳遣車已還齒嗇于德誰執誰專惟子克承有隕自天奕奕衮裳我寶以桓二華八川國之以秦何以報之爾子爾孫何以表之隧石有文嵩山少林寺裕和尚碑皇慶元年春制贈少林開山住持光宗正法大禪師裕司空開府儀同三司追封晉國公命詞臣文之碑臣某奉職惟謹佛法相傳有信具至達摩持以渡江梁武帝問語不契去之魏隱於嵩山少林寺面壁九年為禪宗初祖六傳而至惠能曰大鑒師為曹溪祖裕所居達摩處也其宗以湛然當寂為真空洞不虛為實廣大不蕩為際其教人亦惟曰性善其論曰推一而適萬則事無非真混萬而歸一則真無非事曰當仁又曰能仁陰有以心而贊格君皇猷未嘗以福田利益嘐嘐語人而慈雲法雨陰覆陽被歷代帝主意欲清心靜治使萬姓蒙福謂浮屠言可底行奉之罙至歲乙已時世祖居潜邸命師以明年於少林大作資戒㑹戊申太宗詔住和林興國辛亥憲宗召至北庭行在所居纍月其言上當帝心洎世祖即阼命揔教門事賜號光宗正法俾建精舍於故里曰報恩給田若物以飯衆師去世若干年今上皇帝寵以贈典言行而道大也皇帝若曰洪惟世祖神武不殺本仁祖義以一天下朕欲昭我祖德持盈守成唯爾克紹乃初祖永孚于仁以宏濟我兆民顧先哲其逝朕弗克見于茲邈焉雖去來夢幻無得而名而封贈哀榮豈不在我其尊爾官隆爾爵以寄豫思以迪後人以永譽於萬世師之住世也三閲藏經而成誦誘掖後學無倦色通羣書善翰墨吟詠提唱普說幾十萬言播在叢林而師未始以為能事幼遭世變㷀然無依道逢老比丘勸以學佛曰能誦法華經足矣師曰佛法止是乎比丘異之與偕謁古佛於仙岩曰此龍象種當為大器即為祝髮授具與雙溪廣公同執事者七年遊方來燕親炙報恩萬松師者又十年道益隆學者益廣其住少林也萬松海雲二老實為之主屬少林煨燼之餘暫憩緱氏之永慶已而興仆起廢訓走說法施者如丘山來者如歸市嵩陽諸剎金碧一新洛陽白馬經筵不輟皆師力也而師瞑目燕坐張寂而默若無與焉至元八年春詔天下釋子大集于京師師之學徒居三之一嗚呼盛哉師剛果强毅公勤廉明平居風神閒敞襟度夷曠復嵩山如祖師再出世倡道垂教於天壤間如鼓雷霆而揭日月所謂大善知識標凖斯世存而不朽者與字好問人以雪庭稱之太原文水張氏子九齡入學日了千言鄉閭曰聖小兒方娠母有異夢及生家有吉徴其說法也洄池出泉古殿有光諸瑞非一云者其徒詳之矣此載其大者銘曰佛以仁傳聖以仁治其仁伊何此心而已混未嘗混照徹大地推未嘗推淵澄止水梁皇有為不諧其㫖誰直其原曹溪東逝逮我裕公道還北矣師少不凡見稱州里休林古佛真源指示至老游參持戒律已萬松海雲合辭招致參從渡河幾三百指緇俗趨走營施山委嵩陽諸剎金碧翬跂洛陽大講經嵗不弛二百冊區羣廢盡起僧無徭役大衆歡喜曰一佛出世遇明天子其人已滅其道不死不空不住天地終始前人之遺後人之思帝命曰咨章服是宜百世其承之四方其則之唯爾法是依唯爾言是師臣拜稽首聖敬不違播為聲詩永之兹碑太原宋氏先德之碑皇慶二年夏車駕幸上都羣臣扈從獨昭文館大學士宋超弗克從於是儀天皇太后命倣古制為安車驛赴行在所且給裝錢甚厚明年改元為延祐元年二月二日制詔中書以超為翰林侍讀學士中奉大夫知制誥同修國史秋八月天子至自上都駐蹕龍虎臺公卿百官奉迎上顧翰林羣臣曰宋超於朕非他人比朕深賴其力用僚寀其善遇之羣臣敬聽欽承三年夏又詔臣其大父禧嘉議大夫戶部尚書上輕車都尉追封兾寧郡侯諡敬敏父和集賢侍讀學士中奉大夫護軍追封兾寧郡公諡文康大母李母李繼張妻王皆追封兾寧郡夫人秋某月又詔臣某文其先墓之碑嗚呼上恩至矣謹按宋氏世家太原之樂平縣長夀里髙祖某字德謙宋宣和時進士博學多能名與趙國器埒三晉以西皆宗之貴冨子孫欲昭其先者必德謙文為重逺近學者輻湊率皆有聞故晉之言師道者必首宋氏娶王有子曰洪在金為名進士父子以家學相傳自樹益茂其子即敬敏公禧也生文康公和字君和幼值亂離轉徙雲朔然猶嗜書不肯舍長通六經大指慨然有及物心遂刻意為方無所不習又博聞深辨之由是大通求治者填門均豫善劑無間於顯晦約豐至其窘憊不自勝者既藥之又從而負米分賑之或親為調餌乃去活者滋無算皆曰非宋君和吾何能生貧者感冨者謝宋氏名實俱積矣家破而完完而益振遂大時兵荒循環白骨彌望公自代地歸見而泫焉曰此皆鄰里鄉黨也傾資取瘞之又率邑中旅祭之王生者其師也子父不相遇乃構堂迎致養其夫婦終身為之棺衾墳墓又戒子孫四時附祭無廢其篤行類此以至元二十七年正月己未卒年七十有八娶李氏以至元九年三月卒繼張以至元三十一年三月卒惟文康承詩書之緒不幸蚤厄乃能奮而自立蓄其盛心然慮其不可必遂則游藝以暢志觀其處心積行雖古之君子不過也蓋自德謙以來既已三世為儒而力豐時嗇至于文康蓋幾泯矣而歘然以伸內外兼飭復開厥家可謂英特之士者矣而超其季子也幼已不羣經方兼誦而師不煩文康嘗撫而語人曰吾活人多矣天其酬以是乎少長即以尚友天下善士為急㑹料民為兵家與焉憤發曰世儒而今兵耶不脫非夫也乃辭親徒步來京師有忽吉甫者中山名儒也為諸道醫學提舉聚徒教授因往兼受二業僦舍五里外日啖虀粥戴星往來師嘉其勤苦使分教數十人乃立程度課督整勵衆皆有成師喜而薦之得太原醫學正二十四年轉將仕佐郎大都醫學教授距辭親時十載既而名聞禁中方用丁文康憂居喪一凖於禮有旨起直尚方賜以居宅俾視太師及公主疾愈賜衣鈔扈蹕栁林上顧林木不懌隱几而卧問侍臣以枯悴故歷十餘人皆不愜獨對曰栁水木也往者河經林間土潤木榮今河徙益逺故耳上悅矍然起坐稱善者久之二十九年詔除其更繇覃懷有御藥園設官提舉嵗從中遣使采製則中闤闠而立局逺屏行人聚民執役局中為公私大患其年使往盡革其弊民為歌謡稱頌之先是州醫官與提舉官屬有隙一日誣以用御局藥鼎烹所盜狗者有司置對方殷使適至察其跡可疑試語有司而兩造知不可隱皆首實遂止坐盜狗罪不然坐不敬者數十人哈喇楚巴圖爾上愛將也有疾上憂之奉詔往視既愈上大悅勞問從容因乘間以儒而為兵請上即諭中書樞密曰哈喇楚巴圖爾萬人敵也宋超活之與活萬人同其削兵籍而𨽻醫二府奉詔施行遂遂脫兵之志魯國長公主及駙馬魯王皆得危疾詔馳傳視之至則遄愈主王皆感其更生奏以為應昌總管賫以妻妾奴婢金寶幣帛車帳駝馬牛羊甚衆悉謝不受告歸不許為留者二年主以圉人竊賣駿馬縛將殺之時適在坐為陳貴人賤畜之義力諫免之比還王之中外雖孩稚亦無一物故者三十一年詔視庫克楚太子疾愈上甚喜賜之衣鈔元貞元年夀寧公主伊埒哈雅公主小太子相繼有疾詔治皆愈上喜召至便殿迎笑賜坐慰勞賜以玉食時服裕聖皇太后因俾兼直隆福宫十一月太后小不安療即差賞以衣鈔貂帽布達實哩公主下嫁髙麗王阿穆噶太子持節送之詔使護行貴賤萬人跋履皆無恙道經廣寧廣寧民行賈髙麗以罪為髙麗流竄耽羅者十一人耽羅絶島也非人所居至是其家邀訴至則語王追之存者七人耳為之衣服飲食而歸之且戒王毋得復然又具白太子申禁是後髙麗不敢流竄中州人大德元年阿穆噶太子疾視之愈二年又視魯國長公主疾又愈皆有重賜今上皇帝居潜小不安命往視尋可裕聖大喜褒賞再四今上設燕命坐手贈寶鈔白金且豫命宫人製金衣即燕所出以衣之今上視其宜稱甚悅寵豫優洽四年裕聖不安茹藥尋差賜衣鈔改承事郎掌醫署丞成宗皇帝疾時得少愈輒受賞六年升承務郎十一年升本署令遷奉訓大夫至大元年進正議大夫掌醫太監皇太后有㫖盡蠲户役二年視碩迪巴拉太子疾愈賜衣鈔他如奉詔視療貴臣帝師愈而蒙賜者不列今上居東宫綜軍國事有㫖充昭文館大學士皇太后録前功加賜寶鈔甚厚三年遷中奉大夫仍職昭文自昭文拜今職碑紀先世事而及此者以著有是祖父必有是子孫也今年六十矣而恂恂謙勤居閒危坐讀書至昃不廢自世祖時入侍宫闈出入四朝或留中彌月非獨以方進蓋正言讜議而將之以朴忠純誠故聞者不厭而所益宏多退無自矜之色與人忱恂表裏若一故列聖眷之亦終始若一中饋久虛上以內人汪氏繼室封兾寧郡夫人前後所得賜豫及樂平租入常分遺二兄若姻友之賢者家無留資技能雖髙未常自祕以惠淑後進為喜嗚呼制行立心若此可謂克肖者矣其躋榮介福孰曰不宜故因纂其前烈而牽連書之抑以啓後之觀感而勸慕云爾文康有三子伯曰越先卒仲曰起終汾州吏目孫頥江淮鹽引局副使豫中官位下都總管府掾泰衛王府侍官復掌醫少監學行能世其家恆印鈔庫大使有剸治材伯仲之子皆由季父以仕又以恩復其家孝敬振振蔚為太原名族然則今之恩紀郅隆者豈上之好賜下之幸致哉由其義故也新塋在某所文康而下四世皆葬焉越與其配李氏祔銘曰聖緬世殊術闊效疏蠖屈蚓伸若有若亡顯允德謙握懷瑾瑜不韞不沽大畀其徒維晉武國我以詩書惟守單平我貴曰儒我有子孫我道不孤卓彼文康竒肱之車乘風而徂復還于初此我堂構此我菑畬仁宅禮門闢義為塗襲其家珍與神聖俱彼墊以危我安我舒彼饑且渴我餔我濡彼以為命此以其劬野有其竁里有其居諒曰古人不逺是踰子濬其德維川維澤諸為忠誠于以醫國簡在帝心溫恭朝夕豈無他人惟爾之特式公式侯帶裳幅舄報厥攸生蒸嘗廟祏噫嘻宋氏其盛匪棘樹之百年於焉始穡功無不酬酬無不極凡百周行毋怠而力世萬子孫視此貞石秦國先墓碑書曰王人求多聞時惟建事又曰所寶惟賢則邇人安臣竊獨究觀我世祖聖德神功文武皇帝之治天下以道為車以德為馭揭日月而載雨露括宇宙而宏紀綱聖智亦云睿矣然於一技一能苟有以自見者罔不舉而措之得用得行之地而致其功蓋兼愛一視初無冨貴貧賤之分也故能大一統而垂萬年丕顯丕承式克至于今日陛下法天憲祖於多聞建事寶賢安邇之大經有加彌光故凡左右景從雍容廊廟者皆當時弼成基命之後昆也嗚呼不其盛歟至大三年詔追贈貝和中奉大夫護軍漁陽郡侯配鄂摩克氏追封漁陽郡夫人伊德實托郭琳資善大夫上護軍漁陽郡公配約蘇鼐氏漁陽郡太夫人大乘多自翰林學士嘉義大夫贈榮祿大夫柱國薊國公配竒齊葉齊德濟氏追封薊國夫人皇慶元年加贈郡侯為金紫光祿大夫上柱國大司徒秦國公諡康懿加贈郡公為懷忠保節功臣太保金紫光祿大夫上柱國秦國公諡安惠加贈薊公為推誠宣義功臣太傅開府儀同三司上柱國秦國公諡文敏三夫人氏皆改封秦國夫人焉是為今翰林學士承㫖光祿大夫崇福院使大慈多之曽祖祖父母也延祐三年詔樹碑于其先墓命臣某為之文謹按秦國康懿公伯什巴里人也世令德為有國中貴臣至文敏公學業益懋中統中自其國來覲天光世祖既知其家世甚盛又知其學問有源隨問隨對上大器之即命通籍禁門恆侍左右誦說經典益久益親賜侍宴衣冠貂裘帽金帶銀器白玉佛像銀鈔等前後相望恩顧良勤且謂皇孫阿南達曰遺爾良師爾願學否對曰果有良師乃所願也遂詔為阿南達師未幾莽噶拉木太子薨皇孫嗣為安西王出鎮順聖皇后為之請于世祖願載師自隨上不允曰大乘多我所須也餘人則可既而后又面請曰大乘多學業甚精聰明方正俾往訓導數年諸子有成然後乃還若何上不得已許之辭行三宫皆贈良馬金錢詔其子大理多入侍裕宗于東宫以文學供奉順聖又俾諾海駙馬巴薩大王從之學上又詔其子大慈多入侍禁中與托音俱以文學備顧問文敏既西行抵開城阿勒坦布哈阿多展三皇孫皆師之久而王將逺征曰巴克實老矣其留平凉少休矣巴克實者漢云博士也異時文敏亦曰吾老矣西來二紀矣吾思見至尊也使請王許之遂自平凉歸京師值世祖上賔成宗即政入見上深嗟閔曰先帝所篤敬忱愛者也今老矣其以三品祿之遂拜學士嘉議之命賜第于長安賜寶鈔以養之大德三年庚子寢疾薨于賜第年七十有二葬于某所太保生二子長即文敏公次曰大悲多終於宣政院提㸃所達嚕噶齊文敏有六子曰大理多終中順大夫樞密院參議曰大慈多自州守升轉運副使入為詹事集賢平章軍國凡十四遷而陟一品忠誠闓敏以文學侍中知無不言多所獻替中外以大用期之曰拜特穆爾終中順大夫陜西怯連都總管曰布雅尼錫哩未仕他姬子二曰僧努承務郎烏程縣達嚕噶齊提㸃有四子云云孫若干人惟我國家初基其邃古結繩之治未改及四方畢服逺或數千萬里則號令之明期會之一始不得不驅策諸國字書以為我用若秦公父子蓋彼之授受有源業精而學博者也適當寤寐俊乂之朝謳歌來歸契合于一見之頃文子文孫為賔為師出入中外者三十年卒階清閟二子又克篤前人成烈日近耿光延寵歷朝世濟其美及考論其所自文學之外無他岐也然則守身之専得君之盛可謂絶無僅有者矣猗歟休哉臣既奉詔纂叙申之以銘銘曰於惟皇家統天載地肇修人紀建國君民教學為先無有逺邇矧是本支宜君宜王舍學何以可渠可摹孰克堪茲西方之美廣厦細旃啓心沃心見晚興喟詒謀輟愛輔彼緑車偕其行止邁彼壠坻亦再終星爰閔而憩言歸自鎬乃際鼎成嗚呼豐芑後聖一揆恩無不周世濟有子益顯于初相命公圭尊其簠簋豐碑桓桓發自德音以慰以禮非學何立非孝何行非忠何仕老臣奉詔詔爾雲仍其思其企雪樓集卷八
