body:
  text: 雪樓集卷二十三元程文海撰銘玊融小孤山之子衍孫嵗甲申加元服山翁祝之曰維爾衍美有文冠而字曰季蕃後十有二年廣平程某訪梅於小孤山之下衍請其説乃為之銘以廣其意大衍之用一乾二坤坤道資生草木以蕃美暢四支其吉維元匪直也文德行本根敬內義外如車兩輪孤山之子石塘之孫視我銘詩勿替彌敦心齋銘并序郭德基為張遊道求此心齋扁余作心齋二字遺之銘以申其義人惟一心何彼何此天飛淵淪匪尺伊咫此之名立物我對峙是非善惡相挺而起有齋翼翼昭晰表裏專名曰心自我更始心耶齋耶心即齋已回不違仁知者夫子如愚坐忘孔莊異指體認少差毫釐千里吾克吾已吾復吾禮歸視吾齋靈臺止水福州路學二銘并序至元癸已余至三山既謁夫子廟即修學宫創大小學以來諸生作亭後圃為遊息地落成之日天新雨以時雨名之洎大德丁酉七月乃大修廟學越三月告成以其餘力築壇樹杏於亭之前發篋中舊藏祖庭杏壇二大字張之竹溪黨公筆也浚池左右取重兊之義更時雨曰麗澤而繫以銘杏壇謂有人邪窅兮緇林謂無人邪洋洋乎金石之音斯道何在日用常行厥臨孔昭參前倚衡夫子之德昊天罔極仰瞻堂壇如有所立麗澤亭彼滋者澤矧兩而麗宛其相漸有友之義此湮而枯挹彼有餘我潤而沃溉爾不足名川三百支川三千勉哉作聖其淵其天趙履道履齋銘蟻封其旋車輪其曵奚道奚徑孰平孰陂蛇虺之頭虎狼之尾危石薄冰慎哉舉趾靜虛齋銘并序寂然不動者天地之體也感而遂通者天地之用也天以隂陽化生萬物而人獨靈於其間者以方寸之中備此理耳故記曰人者天地之心夫心之體本靜而虗惟其靜故足以燭羣動惟其虛故足以納萬有倘克已之功不加此心之體不具則戰之以物欲塞之以吝驕而發揮形著於外者始與天地判然而不相合矣是以君子體乾坤之健順勉焉日孳孳焉至於體立用行範圍參贊則學問之極功也詹君雲卿以靜虛名其進修之室蓋其識趣精詣志力強敏坐進此道不占有孚廣平程某敬而銘之曰噫靈臺萬化宗如水止如鏡空鑑妍蚩靡遁容來無迎去無從一物無萬理融寂不動感而通此天德惟聖功賢希聖將無同尊經閣銘并序南陽書院既成乃葺舊閣謀藏書也會憲使歷山公俾提舉學事者萃列郡校官板本書至因庋之其上以待學者彚經史子集為八架架有壁而加扄鐍焉噫匪囚之也匪以為觀美也匪循故常而資夸柄也亦曰讀之而已里非無儒也家非無書也惟無常師常産之憂是以有此學也於戲宫居而師友之又為之賦飲食以飲食之甚矣古之人不幸而不獲生於斯世也亦甚矣今之人幸而猶得聞古之人之言也可弗念歟夫聖人之言如天賢者之言如地諸子百家如萬物尊經猶尊天也銘曰厥初生民有哲有愚表之君師身為其樞亦既降只繄訓之敷載陽載隂闔慘闢舒式如玉金家國貞符豈無衆言或翼或扶仰之彌髙欲近而疏南陽之廬里黨之學殿堂室門中仰崇閣集厥大成於此焉托擇焉執焉熟焉復焉惟聖希聖惟賢希賢于以潤身于以豐國左右逢原欲其自得傳道解惑亦思厥官刻此銘詩無廢後觀藏室銘并序讀書名山古人之事也三島之藏室老氏之藏也三谷之藏室程氏之書之藏也藏之云乎亦讀之云乎銘曰前數千載在方䇿如見其人後數千載有方䇿此心此身孰不靈於物乃謂席珍孰匪秉彛而曰覺斯民吾愛吾廬豈以專壑讀書名山尚友先覺方丈瀛洲玉室金堂逺莫致之吾有華岡插架非藏占畢非讀咨爾朋來問津三谷大德八年嵗在甲辰暮春之初華岡子書范陽許氏餘歡堂銘讀書潤身治生潤屋歡信有餘意無不足人方劫劫我則愈愈心廣體胖仁宅安居不名一錢朝衣東市一一飄風所謂長喟那知許事一杯陶然欹枕前榮浮雲在天曷其銘詩豫攸好德異日升堂尚非生客逍遙逰銘有跋光風霽月魚躍鳶飛熙熙皥皥浴沂詠歸彼逍遙逰意得自我是將無同孰云不可漆園非古句曲非今吾名此堂實名此心歸去來兮吾亦荷蓧青山白雲相望一笑茅山劉尊師驅役風雨神鋒凛然而襟韻甚髙意悟飄灑留京蓋久非其好也今將言旋余深愛敬而莫能留乃為書逍遙逰三大字以况其為人又為之銘以篤永好君歸而揭之榱題乎則是余朝夕與君周旋也吳氏主靜銘仁義中正以靜為主主之伊何天君內處不二不參常居其所以立人極以保天豫水止之平鑑空之睹由中御外厥用孰禦生色睟然見於其宇季札之孫請事斯語朂哉進修毋念爾祖母不敬銘德之聚禮之輿出與出居與居有克念孔子徒有弗念視此書孝里銘四端之宰萬善之先秉彛之懿制行之全有虞蒸蒸標爾萬世蔚其緇林曽閔不匱我行其野聞周於蘄使者式之書閈之眉入出昕昏目在心守孰亡蒼旻孰不黔首元聖之處奚闕而稱里仁為美所美非名亦有髙人其居曰栗黃中通理取材落實保兹之素企彼之崇通德遐矣千年鄭公希聖希賢尚其永錫銘于閭左各共子職自牧堂銘人心惟危如馬不羈出入無時勝虛抵巇不蹶則迷地中有山髙而能卑謙則象之天地鬼神咸貴於斯君子法焉以收其馳如牧于坰白駒之維彼牧伊何不圉不奚匪我其誰維天人師訓亦如兹驕慢自髙非我法宜以瓦鐵食衣壞色衣視退轉心鞭䇿常施與吾聖言不期而期惟此上人白足赤髭謙光定慧我有世希自牧之名夫豈自欺吾銘其堂誦吾所知欲徴吾言徴諸聖辭蜀冉惟良省身齋銘聖人之學惟博惟約既逹夫博乃守其約其約伊何忠信傳習日以三省其道乃立忠謂盡已信謂以實傳之於師習而勿失匪忠而忠匪信而信雖信雖忠於義已吝傳必由聖以戒頗僻匪傳而傳習之何益是以曽子卒傳孔道由思及孟萬世允蹈省身冉氏惟曽是企拳拳服膺是亦曽子肯堂銘濟其美復其始構于此施孫子褧齋銘并序郭靖州履字元坦沉敏端實好學不眩名其讀書之室曰褧齋廣平程某為之銘曰古之君子學也為已不患莫知患不知此如彼衣錦猶尚之褧外雖暗然內則甚炳玉韞山輝珠藏淵媚苟有諸內物豈能蔽鼓鍾于宫聲聞于外謂人不聞我則已聵魚在于沼亦匪克樂謂人不見我則已惑莫見乎隱莫顯乎微翼翼其心曖曖其輝大禹不矜庶士交正顔子若虛後世稱聖敝緼非耻懸鶉非窮君子存誠執乎中庸郭氏元坦惟簡惟淡我銘褧齋以作爾監虛室銘即虛為室所苞則夥謂室曰虛其中有我由虛生白生之者誰既云虛矣誰其見之粵有真義獨居其奧曰希曰夷相與徑造視之不見聽之不聞我客戾止玄玄迎門鈍齋銘銛故恆割久則必訛驥於駑駘其行實多順流加帆抵石敗波疾走翾飛終嬰禍羅維此君子焉知其他保此鈍遲以育天和百嵗獨長如援魯戈美哉象賢一唯一阿匪直緒餘其德同科吾有拙璞爾琢爾磋久不潰成錐則屢磨銘以訊之今者若何針贊友敬堂針并序長樂亦山陳公請余扁其所居之堂曰友敬申友敬之義作為家訓以警諸孫古今言行有關於天典民彛者盡在是矣且求余言余何言作友敬堂針兄弟之身初則一體癢疴疾痛孰彼孰己兄弟其弟匪曰恩斯弟兄其兄乃分之宜是惟人倫是惟天命非自外來惟友惟敬分財取少纎悉之惠食果取小直讓之細然而性善於此著形一家和順千世典刑為兄克友弗敬非弟干戈琴弤何有於悌為弟克敬弗友非兄煮豆燃萁靡念厥生嗟嗟手足友敬惟心其和愔愔其肅欽欽反是不思為犢為禽爾堂曷名敢告司針李府判家巴延忠武王畫像贊烈烈桓桓如河如山功極名完盛德之容維恭維寬幕府同心戚欣燠寒儼其當年長劍髙冠追隨凌煙尚永弗刋喬逹之學士真贊集詩句顒顒卬卬示我周行俾民不迷俾爾壽而臧喬逹之內子真贊集詩句如山如河如鼓瑟琴宜爾子孫秩秩德音玄武贊數尺之藤萬縷之墨玄雲勃興靈物逼仄天君跣立臨下有赫瞻之若夢卷之無迹兹其是耶知白守黑貞義處士家傳贊周司徒以六行教民曰孝友睦姻任恤吾觀李君其幾之矣不然何惓惓於事若是而子又克肖益大之是家也其不謂之行義之家歟危槐坡真贊待之不來呼之不應異哉槐坡斯之謂命黃成性史學提要贊并序史之為書也博而雜其為學也煩而易遺出沒浩瀚而不可執也必設羅落以張之混澒闔闢而不可窮也必立檢柙以制之此史學提要所攸出而始學者宜盡心焉故為之贊曰清升濁墜厥既滋久有物有事膠葛紛糾削牘殺青水委海受有窺其源涉足濡首惟江夏氏操綱結紐婉而成章弼彼天牖如珠纍絲如魚在罶何千萬年誦之在口吾觀世學使我心疚昔拙而臧今巧而莠襟𥚑馬牛為世所醜此有要言母廢而手惟江夏氏顔鑽墨守心千古前身萬古後歌以揚之叶其莭奏往茂藝林朂哉不朽李秋谷平章畫像贊天作之君必擬之臣猗歟秋谷潛龍舊人輔𨗳羽翼藹然師友圖像青宫德義是取九居五位轉坤旋乾道同志合匪人伊天萬國具瞻始會天意玉質堂堂儼廊廟器身為道寄道以身𢎞孰道孰身穆穆迓衡道不計功而功孔灼千載如新雲臺麟閣白雲平章畫像贊溫溫其恭廓廓其容堂堂乎拔俗之標槃槃乎學古之胸宜夫致功則隆致位則豐身居廟堂之上神遊丘壑之中匪青山與白雲孰與吾心而可同王仲澤真贊二十四歲卒博學有名吁嗟乎仲澤玉質而金聲矢直而砥平胡不能以久生吁嗟乎仲澤何饜于學餒于福豐于德歉于位富于名嗇于壽蓋所然者人也所不然者天也吁嗟乎天豈不在所承承哉陳氏三先生畫像贊默軒賡子揚猗嗟子揚邁世之材三鳯之首多士之魁學足以尊主芘民氣足以摧姦斥回作室者方資以楩楠豫章為禮者方賴以犧象雲雷四佐大幕曽未足少展其風之培邈超遙乎羲皇之上翺翔乎河洛之隈千載之下拜公像者凛然猶有生氣哉淡軒庾子京賡之弟猗嗟子京古人之學四俊稱首後進先覺方力飬於洛西卿相莫能易其樂一振鐸於河東禮義化行乎干槊豪如杜善甫望顔而氣下驁如李長源聞語而膽落留金逆旅安知墮器之誤却賈圄人不忍病馬之鬻百世之後聞其風者不亷貪而敦薄耶肅齋元忠時佐庾之子惟公弼父嘉祐名臣八傳至君為儒之醇刋偽落華冠義服仁其止安安其動循循天爵既修富貴浮雲政成于家化及邦人訟者求直不言而信貸者告匱折劵豫貧不忍羸牛食之終身附郭藝桑盜者莫親惟君之學追古與鄰素髮朱顔廣袂長紳五栁有言無懷之民葛天之民宋學士真贊蒼然松柏之干霄粹然瑾瑜之出璞人稱尚德之君子自言為善之最樂宜其身事四朝位列九卿登瀛洲上玉堂而恐終歸於黃閣也趙克敬真贊岩松海檜鱗皴磊磈與風雲會文隱于內朴見于外不知者謂此其神傳知之者以為天繪白雪老人獨曰此鈍翁鈍翁也蓋屢百世而猶在任東卿真贊邈矣千載懷哉此賢先進之後後進之先春風池館晴雪林園相逢一笑握手無言徐佐卿墨龍贊二首駕鴻濛兮上寥廓風雷相纒雲噴薄駭而視之墨池涸收吾丹養吾素髯君來衆勿怖説適齋説物各有所適坎井之蛙東海之鰲數仭之鷃九萬里之鵬其處身之大小髙下不齊而其適一也君子之於貧富貴賤也亦然世之處貧賤者或怫然而熱中或恍然而失志焦然若不能以終日一旦而富貴則驕則盈蓋終其身而未嘗有一日之適是曽二蟲之不若也誰謂人為靈於物者哉豫章胡先生誠叟名其居室便坐之所曰適先生方布衣時以明經史通詩賦進士業講授鄉里其氣浩然其容澤然其議論軒昻震蕩聞者竦立無一毫憔悴不自得之態既而位郡博士同時行輩衮衮臺省矣或以先生名聞始授朝命又屈為海陵教官先生不以居卑為羞處約為怨單車之任其志氣猶布衣時真能適者也余謂適者無所往而不適不適者無所往而適富貴而適可能也貧賤而適難能也能其所難能豈不能其所可能哉先生今日之適如此他日之適從可知也夫古之當大事立大功者類非悻悻小丈夫所能也耕於野築於岩漁於水濵若將終身及其出而任天下之重若固有之不少動其心焉所謂適則無所往而不適者也先生適者也當路多知之者行臺治書侍御史李元讓工小篆既為作適齋二大字而中丞徐子方詩以美之屬而和者十數余少從先生學知之尤深故為著其説至元二十九年夏五學生程某敬書實齋説草木之成為實何也以其種是則生是而不渝其初也羽族之孚亦然故孚亦為實人之所得於天者其生之理也實生之後而偽其人也非其天也盱之士陳櫸孟實以實名其讀書之齋初余未識人皆稱其賢謂其言也信謂其行也果純乎一實者也及既識則誠有如人所稱者焉嗚呼古今偽言偽行以欺世盜名者多矣能讓干乘者或不能不愠見於簞食蓋能勉強於其暫者未必能掩覆於其久也孟實與余相周旋於金陵廣陵凡四載今年歸自京而孟實留吾家考其行如其言而終始如一日也則孟實之為實也不既實矣乎為之作實齋説至元癸巳暢月上弦廣平程某書王肯堂遂慵軒説翰林侍講學士王君名構字肯堂自號曰安野矣買宅於京師又榜之曰遂慵僕竊惑之夫安野君以文學被眷遇有列于朝正黽勉從事不敢告勞之時也去年留京師嘗為賦詩曰安野標慵豈必慵所以諷也而君意殊不樂似以僕為不喻其意者僕之惑也滋甚會出使閩海已受命不敢宿留亟就道故未暇為君竟其説夫人生而父命之冠而友字之名與字固未必有所取義而亦有取義者觀昔人所以名君字君之義豈不望君以作室之事歟天下猶大厦也垣墉塗塈非一日所能完棟梁榱桷非一木所能任臣之於君猶子之於父肯堂而後可以構必乾乾必蹇蹇必夙夜匪懈庶幾乎畫宫于堵而績于成也君有列於朝而欲安於野乎未可也安於野猶未可而可以遂慵乎哉人固有身在朝廷而志山林者矣大槩野者君子之所不得已而非其所安也伊尹之耕野未遇則然終身所安不在是也禆諶之適野有謀則然平時所安不在是也晉公之緑野安矣君欲效之不亦太早計耶吾故曰君有列於朝而欲安於野乎未可也安於野猶未可而可以遂慵乎哉僕之惑殆不可解而君之意誠有所未喻也客有喻君之意者曰慵一也而有二焉有可慵者有不可慵者子於父之事臣於君之事不可慵者也世之人世之人飲羽於市門之下血刃於風波之上終身役役以至於疲薾行盡如馳而莫之或止此可慵者也而慵於此者幾何人哉君之所慵在是爾吁人有其非而遂其非遂之不善者也君有所慵而遂其慵遂之善者也而子何訾焉僕於是釋然曰客言當矣為人臣者公爾忘私國爾忘家失一心於公事國事雖私事家事有不暇顧而况乎聲色勢利之所以奉身者而暇勤勤乎哉君之慵是也僕之惑非也君能慵於其所可慵則必能不慵於其所不可慵不慵於其所不可慵則必能如韓子所言之匠氏如柳子所言之梓人以經營於斯世而天下皆將在廣厦帡幪之中矣他日功成名遂而安於野僕當勞君曰吾今而後知大矣哉遂慵之功敢書此以寄至元甲午四月八日廣平程某書于三山憲司之繡綵堂文矩名字説矩所以為方之器也物非矩無以自致於方矩非物亦莫著其為方之用蓋矩者梓人氏所謂角尺也必上下均平左右若一然後舉此而加彼推已以及人是以君子有潔矩之道然器非人不行用之則隨所施而無不中度弗用則亦自守其尺寸之常此君子又有藏器之喻孟軻氏以規矩方圎之至與聖人人倫之至並言夫豈徒者文掾名矩而字子方材器兼人如刃之新發木之向榮六翮既舉而風迫之也求余説其名字之義因書所聞以復之抑又聞方者地也非厚無以載體之者輿也非輪亦無以行有弗思思則得之靜山説瀘川劉君求靜山説於廣平程某曰艮之象為山山有不遷之體焉故曰艮止也為學之道知止而后有定定而后能靜世以山為仁者之所樂因以仁者之靜歸之而曰靜山夫山固靜矣不靜惡能為山然山不徒靜而已也若曰山徒靜而已則觸石而出膚寸而合不崇朝而遍天下與夫不舍晝夜盈科而後進放乎四海者獨非出於山歟蓋靜其體也動其用也言用不及體無本言體不及用非道劉君體用之士也默而識之吾言初不必竟蕭文孫字説文者道之著也天秉陽垂日星地秉隂竅於山川凡天地間形聲之異品類之繁孰非是道之著而因其文而文之者聖人也君為文武臣為周公聖莫盛於周故文亦莫盛於周而又有夫子集其大成故其言曰吾從周又曰天之未喪斯文也匡人其如豫何文乎文乎豈翰墨之謂乎為士而舍周公孔子宜何師乎吾故人蕭則平之長子文孫既孤而字未立為之字曰從周且敘其義以告焉尚勉之乎當使則平之友異日咸曰則平已矣幸哉有子如此劉時中字説古人致禮樂以治身心惟恐須臾之或縱以離於中和也風氣既降家自為教人自為學賢知過之而愚不肖者不及不得已而慎獨之訓生其防之於未萌者蓋甚微且密也然君子之中庸夫子之時猶言民鮮久矣然則不亦難哉劉君端淑老成言動有則觀其名時中而字仲謹必能守慎獨之訓而自防於未萌者中乎中乎抑將何以驗其為中乎苟能於人所不知已所獨知之地慎之慎之而又慎之其必能知之矣劉君傾蓋平生不日而又别故為之説以識豫念龍牙説物之能神變無方者莫龍若也其蛻於江海之濵蓋欲遺其形迹之纍以遂其神爾余嘗怪夫西方之學以逺離生死為宗至其梏於形迹則返有甚於世俗之為觀其於摧牙朽骨猶眷眷不舍又時出光氣舍利輩以眩愚盲不亦可疑笑已乎今或得殘片斷株於江海之濵曰此龍之遺也夫龍既已遺之矣靈於彼者乃取之知乎不知乎若通真雷尊師真得猶龍之學者也觀其赤手把茅於江干不十五年而千柱之宫岌然以起是可謂能神變無方者矣又觀其為規必欲千載則比夫龍之所遺厥有重輕矣太初公探龍之穴不得珠而得牙因以贈師豈亦况其猶龍之謂豫謂師之猶龍非他學猶龍之學荒唐無驗不可究者之比也喜而書以贈焉蔣沂字説言俗化之善者必曰齊魯然觀一變至道之云齊魯固自有差等也學者舍周孔奚師欲知周公孔子之所存舍魯何適淡然公子名沂而字師魯豫知其非謂前希曽而後轢尹以騖夫聲也亦非謂左曲阜右闕里而繫其迹也蓋曰周公孔子道之表也沂泗汶洙魯之望也務學必窮其源見道必于其本此命名制字之旨歟師魯志尚不羣材鋭而年甚茂知道之方縱靶極詣當何所不至然豫聞周公之治魯也尊尊而親親孔子之於魯也恂恂如不能言者欲尋二聖人之所存此獨非耶師魯其慎所師哉師魯名父之子且所從又往往皆名師前之説固已飫聞而飽誦之矣於其南也并祝加餐宗人萬選字説蘄春宗人子祥之長子曰萬選字舜舉家學有源才業駿茂教邑庠録郡校皆無煩言而有令譽余自武昌東過雪堂舜舉侍其父在焉因請余為其字説夫選於衆而得咎繇舜之知人也而咎繇陳謨亦曰在知人人固未易知知人亦未易而性能自知者然後能知人耳唐虞君臣皆有明德氣合道同萬世師仰是以孔門心傳亦以明明德為學者先務夫所謂明德即帝典克明俊德之德咎繇德明惟明之德也人有此德顧吾所以明之之功何如耳咎繇躬有明德是以陳謨則謨明弼刑則刑明今子方職于學則明德新民是為先務異日致君澤民於雍熙之世何莫非明德之用者然則修身待舉吾安得不為吾宗望哉王天錫字説魯人誦其君曰天錫公純嘏嘏者大而且逺之福也純者全而不雜之名也天之豫人者莫不善亦莫不純純嘏即純德之所致也然不曰福而曰嘏蓋慶有餘而後其福大且逺也不徒曰嘏而必曰純者蓋吾之所為莫不善故其所遇亦莫不善也余友楚山王君以名其子曰天錫牧菴姚公因而字之曰純甫純甫又謁其説於余純甫名父之子方左右就飬歡聲和氣雍雍盎盎其致嘏之道未可量至於純一不雜則問學之極功性分之終事是非他人所能與也子必勉之夫學問者何亦曰去其粳粃吾性者而已德而至於純非一日之積也故又曰善不積不足以成名子必勉之賴巋字説平章政事安南國王來朝從行者賴安撫名巋謂余求其字與號愚按字書巋音三而訓各異切區韋者曰山貌切苦軌者曰山小而衆切丘愧者曰獨貌愚以其意推之山則山矣皆未盡其義也天下篇曰巋然而有餘靈光序曰巋然獨存然則巋之訓如曰衆山中之獨髙者庶乎盡之於是字之曰伯髙至若號之云者古無有也然而因其名之有字而復字其字以示訓抑何傷乎於是號之曰謙齋謙者地中有山之象也山髙矣而不自有其髙故易曰謙君子有終吉夫易之占吉凶悔吝四焉吉一而已而謙六爻專之髙而不自髙之功也伯髙伯髙吾為子危之卑而不可踰吾知免夫皇慶元年鞠有黃華雪樓道人趙克敬二子字説集賢趙君克敬既名其二子曰遹祖述祖涿郡盧處道字之曰承宗紹宗已而避宗廟之嫌也東平王肯堂易之曰承忠次忠禮雖不諱嫌名然臣子之道止於敬而已雖諱嫌可也克敬以余老友其子承忠又同禁林俾申其忠之義釋者曰盡已之謂忠則忠之道盡已焉耳苟盡乎已以之事父以之事君以之正夫婦友兄弟信朋友凡修齊平治之道無一不備且父敬而子忠所以承先訓後亦至矣傳曰使民敬忠以勸不在君之父子乎所謂臨之以莊則敬孝慈則忠亦盡已之謂也盡已之道無他學之古而已矣朂哉二忠商繼顯子孫名字説善者必傳乎曰君子之澤五世而斬矣善者必無報乎曰積善之家必有餘慶矣顧其所積何如耳蓋論其人則當積之至於終身論其家則當積之以世世愈傳而積愈厚是之謂善繼彼所謂斬也特以一世之善而言耳余讀集賢周君正平所為商君繼顯名字之説而喜典刑之篤論也復喜商君父子以善傳家也又喜繼顯之善繼內能顯其祖考外不負鄉先生之深期也嗟夫使今之顯者人人同然豈非名教之望世俗之深幸哉今繼顯子三孫十四繼者可謂衆矣繼顯既各命之以名嫓之以字訊余俾申其義繼顯之意蓋曰吾為人子孫吾則若此今為吾子孫者庶亦如吾乎嗚呼人孰不欲有子孫亦孰不欲餘慶然使為人子孫者皆能以其祖父之心為心豈復有不繼者哉夫所謂君子者以進德修業為本而進德修業則貴於及時今繼顯之名子皆以時而字以德則義方之訓切矣木之用不待贊彥之美不容稱修而具之為羣材舉而用之為羣彥則繼顯之詒謀者又逺矣為之子孫者可不各思其義而勵其志乎曰時敏德修時膺德進時中德庸者子也棣威桓武彬文杞柔棟隆桂實楫濟栩和采禮槩平極髙格通幹直棫才者孫也今年敏初以父任詣銓余因識之恂恂易良世濟將自兹始夫以繼顯材望之孚事業之著而其適長年逾五十猶未登仕版是亦可見其不競不絿之教者然則余辭其費乎祭文祝文祭余秋山亷使文維至元二十有九年嵗在壬辰春二月丙戌故江西亷訪副使奉議大夫秋山先生余公之柩至自長沙次于盱江郭南門之外後三日己丑友生程某謹以潔牲柔毛庶羞清酌告于公之柩前曰維公稟氣峭剛賦形敦厖重如泰山喬嶽肅如烈日秋霜蓋其得於天者垕故其發於文學政事者類其為人此公之所以為公而吾之所以深敬愛也嗚呼今其死矣始吾遊學于撫得公景定甲子所校程文讀之一時預選皆名流次年悉登上第吾時尚少於是始聞公名而未能詳也國家平一土宇公官于鄂參政鹿泉賈公北方宿學涖政荆湖於人少所許可於公獨加器重吾時留京於是益聞公名而未及識也嵗丙戌搜賢來南公適在盱首以應詔公亦勇往不辭入覲清光大稱上意起家風憲往二湖南于時權要腹心星布棊置舉手搖足且陷譴呵公如快刀健斧不避盤錯風采大振為諸道最化弦更張遷為江右憲副鄉邦顒顒望公遄驅日月幾何凶訃遽至知與不知失聲嗟悼嗚呼惜哉公之享年六十有四有壻經紀家事護柩來歸有子雖尚童稚日可冀其成立公死無憾也然公於不可為之時能為人所不能為之事及今新政之始乃公行志之秋也徯公共昌正氣以報主知誰謂公竟溘然而逝嗚呼痛哉吾官滿還家甫終慈母喪事而公柩適至想公音容思與欵欵共談當世事而不可得矣潔觴敬祭以寄一哀公之精爽能如平生少鑒吾誠也乎嗚呼哀哉尚享重修南陽書院告成文四首先聖惟夫子為郡邑之通祀崇儒乃聖朝之巨典南陽敝甚無以揭虔妥靈度材鳩工爰作新廟仲春庀役長至告成謹以粢盛制幣式陳明薦奉兖國公顔子配武侯三代而下論王佐者惟公一人南陽祀之為鄉先正某鄉之願學者也欽若明命勉勵於斯修敝補廢職分當然幸底于成敢忘昭告鄉先賢某垂髫時來遊斯學固已服膺公之盛心將指此來則遺規隳廢已甚竊效先覺遂忘其難經始於嵗首訖役於仲冬殿閣堂房門階窔奧庶幾苟完日長至舍菜于先聖先師告成也噫嘻微公基之今孰構之繼今以始尚其相之司土惟神職司此土亦有嵗年學之敝也為士子羞學之修也為神人喜徼福訖役工徒無虞且謝且祈垂祐永永郢中先墓祝文仰惟髙曽卜居古郢再世經營生計既定林廬在原宅兆于嶺牛羊滿村鄉田同井中罹百憂遂適他境今六十年遺蹤未冷粵從徙居朱紫交映國恩固厚亦緣家慶惟宣慰叔作藩南屏郢實所部因得歸省既封既植且闢且整鄰曲之榮子孫之幸自兹以來又十溫清嗟惟末孫早際明聖兹焉來鄂憲莭是秉謂邇松楸可以瞻偵欲去不能拘於簿領眷然長望徒有耿耿緘辭寫心遙酹酒茗仰惟髙曾英爽不暝尚鑒畢誠式回幽聽相我後人以安以永又某效官此土庶邇先塋水逺山長尚隔千里兹霜露之既降慨瞻省之末由爰遣常儀謹修時祀仰冀靈明之格少歆追逺之誠餘慶所覃式安且永偕菴祝文仰惟二塋相距一望松楸連蔭雨露分流而合祀有堂猶循舊設近者幸成先志改立偕菴兹既畢工敢嚴遷奉伏望明靈共格去故就新相敬如賔受蒸嘗於永世克昌厥後瞻屺岵以長春乙已春祀西髙渠墓祝文曩官于鄂稍近先塋今焉顧瞻又隔湖漢每遇嵗時之改不勝霜露之懷敢飭彛儀遙陳菲薦伏願俯歆微悃啓佑後人家慶所覃其寧惟永乙巳春祀武昌墓祝文逺違松楸已再閲嵗嚮風西望寸心䀌然兹當雨露之新庸致蘋蘩之薦伏望俯歆微悃安裕九原佑此後人益綿家慶已酉八月祀郢墓祝文向官湖右稍近松楸暨列朝班雖専遣祭今已三載草木蒼涼况值凶徒肆其侵伐驚動泉壤不孝罪深兹來武昌實奉朝命因再削牘直于有司就寄純誠虔具薄奠霜露之感倍萬尋常仰惟尊靈俯賜歆格默垂幽贊妥佑如初已酉十月祀武昌墓祝文兹以使事暫留武昌瞻望松楸百里而近霜露既降中心惕然専遣門人代陳時祭使事將畢躬拜有期仰惟尊靈俯歆忱悃益安益固流慶綿綿書啓答黃草塘書某再拜草塘黃君教授足下往者客居於洪實與足下同州里聞而不面之日久矣儼然造豫喜慰參半又辱携教編摩二書連翻數䇿已窺足下之用心幸甚幸甚世無實學真識因陋襲弊苟焉自安至於上下數千百年之間扶大經尊大緒立為一書暢所志而垂無窮此古聖賢所為也不意於吾州里而獲足下太息敬羡不能已已此其為惠蓋亦大矣而又侑之以駢文􅓻句溢口虛美殊非足下所宜施諸人者而僕亦何敢安受之乎且以足下精誠絶學大雅不羣使之紬繹金匱綜理木天固當頴然出羣士之表顧猶抱其所言下教於潛深伏隩者豈非以相為引重朋友之責而不言誰知其志不得不姑為此屑屑耶夫薦進名士大夫當路貴人之事也異時僕在官聮有所識知未嘗不噓以微吹如戴晉人之吷今則謝病退處非事所宜故於足下不過徒太息敬羡而已方今文治煟興無昧弗燭倘足下之聲光益盛亦何待衆多之口而後顯哉劇思與足下談體有少苦厚意不可不報故破此默默而以書惟足下幸察不具某再拜答存心何希之自修書某與執事相知非一日獨以出處如參辰不獲一展平生之好乃若承風藝林玩芳玄圃其澡雪厭飫久矣今者辱書蒙稱謂甚厚局縮愧悚良不敢當也往者士大夫狃於流俗既不以古人自期又復不以待人故其誇頌云云者其心豈誠謂然哉亦曰人施於我而我悅我以施於人宜以悅也言之無諂辭受之無歉色一彼一此以是相先豈非既不自期又復不以待人乎今執事過聽曲愛而寵光之雖去流俗萬萬然溢美已甚終不敢當也伏惟先德醴粹宜託之命世之筆而顧以見諉豈亦出於過聽謂可遂不朽之計而然耶此誠孝子慈孫之心也古之不朽有三立德立功立言然德有厚薄功有淺深未必並行而俱逺也而能使千載之下聞而知之者猶若見而知之是豈非立言君子之力哉故夫子曰言之無文行之不逺今某誠自謂拙於言辭不足以光昭先德以塞孝慈之心而又不可咈也勉敘次來示以復盛指筆墨猥攘多慚見知何時良逢庶幾傾蓋不一一答何端竒書乃者與太虛談樂聞足下名德之髙問學之懿相距數舍言宴無從徒懸渴心耳學之不講久矣豈徒學者之罪亦父兄師友之過也夫子曰君子以文會友以友輔仁蓋仁其表而文其景也後之言文者或不然不鄙惠書猶及後生之學甚盛甚盛請誦所聞與足下論之文者何也猶之卉木之葩華氣之所鍾欎勃充盎故其所發輪囷紛郁不主一態然皆出於有本有元初不期然而然者世俗因倣而為之雖形色肖象無一不如人之見之者亦未始不以為如也然即而求其神氣流行潤澤充滿則又若漠然者何耶其故可知己今之為文者類此故未有無表之景也亦未有不式其表而惟景之取也蓋聞古之測景者或於陽城於滑臺於交州必有定所而后以考寒暑之中若持竿而行仰而俯視曰是亦景也而可乎今者幸甚足下猶肯以文章風厲後生然後生之病無志者不論有志者政在於持竿視景耳倘足下併有以教之滋益幸也足下又不鄙欲僕為之發題僕自顧素非能文不過少壯以來事役四方聞見積久故於兹事稍能明其寸尺若欲使之操斤執引與工師相倡和及以其氏名為所緝之重則足下不免過聼誤計焉耳狐裘羔袖可乎然意不可孤抑亦朋友之責勉承所指或取或去政在識者紙短心長書不能盡願幸無訝賀某學士新居啓伏審分玉堂退食之間開甲第富有之美南窗北牖嘯傲羲皇上人左圖右書商略宇宙內事風清日麗心曠神怡問揚雄之竒方隨厦燕助右軍之筆竊效籠鵝笑而受之幸莫大矣賀張疇齋承旨續絃啓伏審法喜重諧吉涓載協杜陵野老政須燕玉之謀山谷間心始笑湯婆之拙允為佳偶永共嵗寒菲爾俗儀聊申賀意雪樓集卷二十三
