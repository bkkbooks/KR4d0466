body:
  text: 雪樓集卷十二元程文海撰記岳州路三皇廟記充宇宙而無垠者氣而已通則平塞則病聖人生於天地之間得其氣之至完上參贊而下曲成天地萬物無不各得其平功葢莫先焉故下至百家有用之學亦往往託之為宗豈不曰開物成務非聖人莫能與於斯耶三皇非獨有功於醫也而言醫者必宗祀之亦豈知聖人之於民必先憂其或有以病之而後至於憂民病恭惟聖朝功成治立乃俾郡邑建學敎醫懿哉古昔聖人憂民之心乎巴丘水國也左江右湖霧雨之所蒸薄漲潦之所蕩汨土瘠吏繁民或内外交病太守王君耀卿欽承上心布宣中和之暇構禮殿以崇明祀闢講肆以懋醫徒翼翼嚴嚴華而不侈工既告備圖來徵文某惟王君在民之心之切如此則其為政豈復有病民者哉喜而為之識雖然醫非苟道也學非觀美也三皇聖人而非土木也今方有其書藥有其物而實實虚虚誰之過歟治民亦猶是也有民人焉有社稷焉又授以治之之具焉而曰不治獨不愧於心乎亦獨不懼於心乎予既嘉王君之能憂民又慮學醫者之費人也於是索言之復以告來者黄龍寺修造記豫章鄂岳之交有山焉曰黄龍綿地五百里唐之季沙門誨機事佛其上迹用焯著鄂别帥温遷約迎至唐年刺史秦裴又迎至郡以䕶國寺處之遷約割田百三十頃奉之裴又奏超慧號以錫之敎益昌徒益集衆本其所自目䕶國曰下黄龍六傳而當宋大中祥符五年賜額延禧又十三傳而當崇寧元年郡以建萬夀禪寺南渡改報恩光孝今郡中黄龍山也大德七年秋山之主僧德冨來言曰冨所居山寺古寺也自隋已名護國度長絜大城中莫先焉故為祝聖人之㑹冨以元貞丙申來首為敗屋請命於平章政事程公公忻然主之冨又内嗇外贏以益之於是經藏成既而樓若鍾偕成宣慰楊公又樂新之以勸以率凡尊者閣經樓􅕥亭僧房庖庫咸以次可成其未即成者冨究心力將俱成之所以為佛事也願有述焉其可予惟事佛所以事君臣子之心也學之斯能似之佛弟子之事也悟空而苦由苦而空至於無所蘄乎世而世蘄之無意自厚而世厚之而學成矣故不烏巢肩栢生肘不足以得其忍不投崖不截割不足以得其捨其敎曰衣壊色衣匄食自給不三宿桑下此特聊指其所従於道里之岐直初未喻也而已鮮能之不襲其迹故耳世之崇塔廟而奉焉者曰此恭敬心豐田廬而處之者曰此慈悲心是慕其所學者之事非學其所學者之事若夫聚而長之者則有不得已於斯焉葢曰耳目嚴而後中乃存體膚安而後業可定此固常情之防而長之者之慮也然則是誠有不得已焉然由其學而言之則曰小乗耳欲障耳嗚呼學佛之難如此夫而非學佛之難也學佛者之難也今冨介然單人以其願力上分侯封旁啟覃祴泛掇俯仰之資蘄於世者切切矣而非為已也其衣食自奉又如其敎卒能糞除黯昧毁折之餘嵽嵲烜赫盤盤閎閎佛事熾然於是乎在而以愛君之心來者亦有以發其莊敬於顧瞻之頃其視尸居鼠息者顧不大有逕庭矣乎然則學其所學者學師焉學奚難者今雖未潰于成吾知其必大成也已宫居既然其徒又可知也已乃書以遺之雖然此非師之成也或曰是非師成而誰成曰欲知師之成師知之程公名鵬飛光山人今為榮禄大夫平章政事議湖廣等處行中書省事楊公名漢英播川人今為龍虎衞上將軍侍衞親軍都指揮使紹慶珍州南平等處沿邊宣慰使行播州軍民宣撫使德冨號宻印圎照大師凡木石幣粟工徒楹架之若干與用其財若力者之甲乙冨將别識武昌路學修造記大德四年某奉命觀風湖右來武昌以使事有㫖乃率其長吏課學校而整比之其年冬郡學禮殿與祠祀之廡櫺星之門俱一更張情文粗稱又三年講堂成觀瞻粗完於是文學掾蔡君天麟求記記者所以詔今而傳後也夫子之敎有本有末其所以詔今而傳後者初不在乎耳目之間惟武昌有苗之封畛三代而荆舒漢晉隋唐之衰於以宿兵設險顯德改物者久之然後彬彬者稍出若文簡馮公其傑然者也學雖不止此猶幸而若此母亦敎之者固若此耶今朝廷清明聿興文治所謂學非曰扶木而編瓦備物而象容以飾此土也有明人倫之訓焉是則所謂本也或者本之不知知之不務猥塗舊而為新文一而為百言言然曰吾之於學也亦盡心焉耳矣嗚呼不其罔歟蔡君則不然童冠誾誾辰入未出相與講切聖賢之言甚力曰敎曰授期副其名而未已至於興作葢出於不獲止而非以為功也非以為功而求記焉葢欲後之掌敎於斯者不當倚席而偃然尸居耳是獨不可詔今而傳後乎若夫非無師也而弗師非無學也而弗學是固任敎事者之責矣亦顧主領敦勸者何如數年之間安侯以西臺侍御史牛侯以東廣宣慰使繼領郡符皆能知為政先務故任斯責者得成其志是又凡二千石所當知者然則可弗記諸忠武侯祠亭記楚有材尚矣至於丞相忠武侯遂為古今冠冕南陽書院所以名所以祀者書院成六十年而敝部使者廣平程某來新之内外完好祠亦補舊而加飾焉行省都事尉氏楊君處恭又即祠前築臺為屋江夏尹滑臺趙君仁協謀幷力於是亟成翼然華䆳其髙山景行之意葢惓惓也夫孔明不可作矣觀其﨑嶇一隅所就不酬所願自太平之時之臣視之曽何足芥其襟懐而君輩神交意悟有為平原執鞭之想有志事功之士固非流俗所能並哉雖然嘗試言之使孔明生當建武中元事固未易可知使𤣥德顧不至三其亦終於躬耕而已葢古之君子未嘗無志於天下然亦不以所遇而制吾身之重輕此孔明所以不可及已既與南陽耆舊慨嘆之餘因俾刻之石使學者知所勉且無忘楊君之美趙君之勤大德七年某月某日記重建乖崖祠記愛其人以及其所經従所游處彌逺而親久而益不忘故覩河洛而思禹見丼棠如見召伯焉此一念之真也乖崖張公有遺愛於崇陽邑人祠之至今嗚呼可感也已按公之終更而去也民思之生祠公于所建美美亭春秋祭祀不絶紹聖中移置浄刹院紹興復于美美隆興二年邑令陶楙以北峯亭亦公遺蹟乃徙焉而命梵安浮屠主祠事郡志云爾今郡别駕白雲翁介其父老言曰美美舊有公祠前令新亭而祠廢大德庚子邑長改建社壝于亭前因復立之伐石傒祠夫一念之不忘則窮天地亘萬世而猶存初不係辭之有無也居而惟恐其久去而猶忌其復來彼亦人也何以得此於人哉有民社者可以鑒矣仁人心也吾以此心彼獨無是心乎所謂一念之真也有民社者又可以勉矣此吾所以重有感於斯也因書以遺白雲翁使刻之通城縣社壇記社稷郡邑通祀也而或廢不立立或不式予乗軺行春武昌境中見其具且式者無幾耳乃自郡始既而咸以新告通城與焉予或記或否者顧其吏民有請弗請也越二年秋郡治中以公事至其邑其邑長以治中好學而文請碑其事治中謙以諉予予謂治中曰民人社稷王者受于天以授于下而分理者知一而不知二或幷忘而遂怠且虐之可乎夫民神之主神依人而行祀固不可廢也政亦不可慢也至治馨香感于神明之謂何民為貴社稷次之之謂何任其寄者皆不可莫之知也且吾之所能言者治中亦能之盍不遂記諸治中曰公之言我之心也請以為記停雲軒記孰不知君臣父子夫婦兄弟朋友為天下之大倫而獨謂聖人人倫之至豈不於斯五者咸盡其道而無以復加故耶晉宋崇尚清虚此道不絶如縷獨淵明皎然自㓗於俗天倫大義惓惓不忘後世知言之士無不資以為名髙至於停雲一詩與伐木風雨諸篇相表裏其厚於朋友之倫又如此此所以為淵明也吾屬有文子方者以停雲名軒問之則曰少長宦學四方每一陟望雲雖孤飛而親亡已久中心䀌然還坐一室無與語其憂悲則又惟朋友之念此軒之所以名者義若同而意則有異意雖異而其本則同葢因雲而思親因親以及友此心常若室中有雲之孤飛矣然則謂之停雲亦可也嗟夫木欲静而風不止子欲養而親不留予嘗深感於古人之事矣今則又有感於子方之言也想其居於是軒聽於無聲視於無形而惟親是慕不苟訾不苟笑而惟懼不為親榮有朋自逺方來則侃侃焉切切偲偲焉而惟此之講求也然則是軒者其孝子之羮墻益友之筌蹄乎予往築室京師因去親之久而題之曰逺齋以著予念今室邇而逺者竟逺矣停雲之感實同此心乃書其說以贈焉夫子不云乎孝始於事親中於事君終於立身子方敏者也立身事君之事其肯忽諸南湖書院記教之之地不患其不多教之之人不患其不衆而惟道之不明不行是憂者何也厥今百里之區數十百家之聚自非獷鄙荒殘莫不有童烏之學焉雖其所修者甚野亦可以見此事之不可一日無矣况夫設官分職各司其局非不備且專也而徒有其文可乎南湖書院者起於宋季原於藩臣屋數十楹以為居祀七賢以為望田數百畝以為食來者養而敎之意甚美也歳久而敝繼之以燬田侵業荒幾無南湖書院矣大德五年春予行春至其邑乃俾經營之越三年其山長趙某來言曰書院敝矣非公言莫能改新今講肆齋房門廡與夫七賢祠咸以就緒念締創之不易傳守之無常凡紀今勉後非金石莫可而無辭以刻敢請予為之言曰文武之道在人非徒入而櫺星而大成而髙堂而修廡之謂學也然實既陋而文則又然是無以稱清時右文之盛意此其所以必葺也若稽古書院天下惟四而已雖郡縣亦不敢咸建校官而文士彬彬若此今書院郡縣學星分棊布國家所以責望化民成俗者在是可無勗哉夫文武之道布在方册人患不求之求之有餘温故知新亦在乎加之意而已趙君年方壯材方茂學方進而不休能修其文必思其實予豈獨以南湖之師望之而亦豈獨為南湖之學言之君歸而刻之乎異日過而視之所見進於吾之所言則南湖為有人矣南城縣重修學記南城漢豫章郡之大縣也縣大則其學當亦大而獨否者以縣建郡不能兩大故也非惟不能大抑且陋焉者以學廩之不大而來者之相循故也大德青龍之歲敎諭黎君過予盤辟而進若有所請問之則曰先是學宫奥渫狼藉不可顧瞻大德五年恭可寔來職思其居而力不支郡判官叚君立夫命郡校歸石粟七十五佐其志於是扶補剗磢覆墁築甃之工咸興郷役之四年郡長華峰公督建學門功未畢而公受代至是就畢之郡博士又佐以米石十有五迺繚周垣易殿瓦立三賢祠茍完矣庶幾可以逰目舉足匄公一言碑之予曰修學者非扶木比瓦塗塈而丹雘之之謂也而居庠序者率以此為功陽享其名隂享其實衆又從而誇之曰是善於其職嘻可笑哉然不猶愈於坐享而坐視者果若君言君亦難矣乎抑今之所謂修者在人目古之所謂修者在人心俱毋以碑為也黎君曰不然僕政以學者不聞斯言是憂願金石刻之予曰未也前之所謂大者非吾學之所謂大也天地囿於其中而况於一棟宇之間乎茍能知之則冨貴不能滛貧賤不能移威武不能屈是之謂大丈夫十室之邑豈無其人顧好學善敎何如耳君其毋謂邾小龔氏舎田記盱江城中有善男子名曰龔有冨與妻陳氏妙静發阿耨多羅三藐三菩提心詣大景德寺僧伽塔廟合掌恭敬而白佛言願買稻田布施常住供養十方三寶結縁福德使過去見在悉得安穏快樂作是念已有冨命終妻子眷屬持田及劵授比丘可仁已稽首於白雪道人請現宰官身而為說法道人為說偈言我聞天人師身空無所有莊嚴布金地念彼長者恩長者本無心以有我佛故我佛竟何在不離長者心三千與大千何者非净土虚空一微塵於中見三界云何得如是過眼塵亦無人我與衆生究竟不可得而我心所作一一俱見前如耆闍崛山又如河沙數業風不能蕩欲火不能燒善男子女人汝今當諦聽汝等捨難捨囘向於所親若生布施心我相衆生相我佛無所得於我亦無求是名福德多過百千萬億道人說是偈已舎田受田僧俗眷屬皆大歡喜信受奉行大德八年暮春初記主一書院記今之書院三代之家塾也粤自曹戚肇端延及于今日進不衰豈非斯道之亨吾黨之幸哉往年豫章掲君某客武昌懐省檄詣主一書院為長過予辭行予問主一何在曰湘潭何為而有也曰自鍾氏又問而未能知也今年自主一來予盱上手一録目請予文予讀之曰鍾君如愚師顔廣漢張宣公之弟子也年十六以書問仁因留受業弱冠中進士科刻意學而不仕晚官嶺海引年而歸除南岳書院山長監南岳廟師顔没其子割田畝五百建講舎祀宣公奉師顔配因師顔之號而請名于官曰主一書院中更燬廢田入豪家元貞甲午鍾氏捐己錢以贖之益之以己田合畝一千復立主一書院請于官官從之乃建燕居之堂講肆一齋廬二某至之初年鍾氏謀改作禮殿兩廡儀門櫺星門藏書閣兩先生祠官署公庖凡作屋若干間以燕居之堂為問仁之堂講肆為厚德之堂凡改屋幾間又増齋廬為四架溪橋而覆之以瓦大凡為屋幾百間其材悉出鍾氏鍾氏者師顔三世孫夢鯉也今為彬州宜章縣敎予曰嗟夫以彼其心敎一邑而止邪又讀之曰書院之復也夫子以燕居之服坐於堂而四公侑今既殿矣則從秩祀儒以尸𨽻于主一者若干官所定也予曰止河汾氏不云乎通於夫子受罔極之恩使儒之𨽻于主一者若鍾氏之於主一焉則一不為少不然雖多亦奚以為抑又言之家塾而從燕居禮也冕而殿焉是乎非耶雖然鍾氏亦勤矣設其地立其官儲其財備其友俾専且裕焉隳之而廢之而有之而愚之今鍾氏非怵於威利於贏也而若此可不謂勤且賢乎然予知鍾氏之志不止此也不止此而欲進於此焉則是有在彼而不在此者矣是雖鍾氏之志而亦鍾氏之事而敎之與學之者咸不可不求以稱其事焉者不然崇居豐養誨惰誨貪誠不若相忘於寂寞之濵之愈也君往而訊之不疑吾言則以為記松臺記欲為山水之觀則必之乎其萃然後足以兩盡西南之陬天下之山之所出也其萃必甚冨冨而又必皆雄特秀偉瑰詭不凡而後能曼衍四出以行乎天下而天下之山有能得其祖宗之一體亦足以自名而世已取雄特秀偉瑰詭不凡之美盡歸之亦孰知猶有未觀者乎劉君時中瀘人也而居於播播固西南之近藩亦山之萃也其居曰松臺吾不知有松幾章臺髙幾仞然意其如化人之中天又如上方之鬱蘿蕭臺也葢劉君慷慨邁往有國士之風其非雄特秀偉瑰詭不凡之地則必弗居吾固因其人而知其地也劉君曰吾臺未記盍記諸夫地之勝以人不以文至其久也亦或以文不以地譬之於臺茍非託君吾固不知而君非與太原公俱吾亦不知也太原公雋厚而文又有君貳其府曰地曰人俱可以久顧屑屑於金石之辭者豈不以吾之說山有可録者乎劉君曰然然則吾益因其人而知其地矣可無述哉正中堂記大德八年之夏時暑早熾余方坐白雪歌南風命此君為歲寒之曲顧有一士在門視之吾幼清之子士一也相勞苦已問幼清何如及其家務纎瑣未竟士一進一卷書曰文自先世家崇仁之西南民稠俗淳安居數百年矣並先廬之隂而行不一里有谷焉廣可十畝山冠水帶宻衞環趨前曰清後曰白流之合而近者也南華葢北臨川西北芙蓉峙之逺而最者也蒼翠不可悉數明靄不可得摹虚中而按衍意若有俟乎人者於是吾父卜大毋之兆而屋其傍越三年兆徙而屋留屋之東偏山形如字之个因曰个山負山構堂於焉讀書過庭請名扁以正中跪求其義則訓之曰陽始於北長於東極於南隂始於南長於西而極於北元亨利貞天之道仁義中正人之德正者體之定貞者隂之静屬夫北者也中者用之應亨者陽之動屬夫南者也是堂之北在天則一辰常居而不易在地則一山屹鎮而不摇吾之静而正者似之是堂之南在天則衆星隱見而互更在地則衆水流注而不息吾之動而中者似之文敬受訓不敢忘唯質下學新不足以探索賾隱敢請一言於父師以覺其所未覺俾朝夕顧諟焉予既閱因念幼清方客淮海不得共此朝夕今聞其義方之言亦足以慰然中正之義大矣經卦六十有四三百八十四爻以正中言者無幾今専之於一堂名信美矣又仰之天文俯之地理參以己之動静義既備矣抑東家之東即西家之西庸詎知卜居是谷之外者辨方正位獨不與是堂等乎然則吾有此南人亦此南吾有此北人亦此北其不同者一動静之間耳况吾方以為似彼而彼或者初未始似吾是固宜聽於無聲視於無形若孝子之於其親不敢斯須去心而蘄以似之也不然堂曰正中耳士一氣遒才穎肯構之子裕蠱之良名方獵獵以起書不云乎往省括于度則釋是亦一正中之說也士一試思之歸而以告㓜清青田書院記道不繫於地也然由迹以知其事㳂事以見其人使後之學者有所觀慕感發則地亦若與焉者此青田書院之所為作也謹按陸氏居青田至象山文安公時已十世不異爨先代復其賦表其閭文安公兄弟又以道德師表當世而青田陸氏聞天下中更㓂燬星分瓦解陸氏先祠亦不能屋矣至元二十三年廣平程某以侍御史將㫖江南過金溪顧瞻遺址閔然興懐郷之耆舊咸請復復其家且建三陸先生祠遂以語郡郡下之縣縣無其人文書茍具大德五年公諸孫如山慨然謀諸賢士大夫且懐牒郡庭以為請衆咸義之為助其費適縣令尹張居懌政最方茂有志斯文欣然自以為功乃即義居故址剏屋數十間春秋有祠講肄有堂廡門室房略備扁曰青田書院而請某為記某葢嘗冀其成而今始克成可喜也抑可歎也傳曰堯舜之道孝弟而已使家皆陸氏人皆文安弟昆治民者豈復勞其心哉亦既不然而於風厲示效之方又藐然曽不訾省是不亦可歎已乎美哉張令君能知所先務也懿哉賢士大夫能助其子孫繼志也大哉公之道德久而彌章也公與徽國朱文公生同時仕同朝學同志其不同者立言有豐儉之間是以今之知學之士知文公者甚衆而知公者甚鮮知不知非道之所計然以義居數千指若此不幸遇患又若此行道之人猶念之况大賢之里居政敎之所急而可藐焉略不訾省若此乎無他不知之過也某雖未足以知公抑嘗知學公嘗有云就使吾不識字要當為天地間堂堂正正大丈夫今家之子孫與其里之秀民勞於作樂於成庶幾藏脩游息於永久其亦奚所見乎是必有所慕矣然慕其人不若師其心居其居不若履其道不然名存實廢室邇人遐適足以來無窮之慨歎而已然則父兄師友可弗念與是役也以七年二月建十月成明年三月記太一觀記太一尚矣靈均歌之茂陵祠之曰此天之貴神也迹效不可得詳而後之尊信有加焉是誠可貴矣乎不然何其微而著仆而起莫能尼之也太一黄老言也學黄老者類貴之往往託為名髙新城梅峯之祠浮丘師弟子之祠也而曰太一昔者炳靈中以火廢道士饒元初復起之覺菴道人朱明逺請記之人之言曰物之成毁有時又曰有數時也數也皆有所制而非人所能為者也非人所能為而物之毁者又必人也然後乃能起而成之然則為人者不亦又可貴已乎是以列於三才靈於萬物而裁成輔相之功天地猶將賴之聖人惟慮人之不能踐其形而失其類也是故指之仁義之塗教之君臣父子夫婦兄弟之懿以綱紀幽明垂裕無極此聖人之道不可一日熄焉者今其起此廢也凡一土一木能悉取具於身之膚革筋髮初不蘄於人乎則人之類誠可有無矣然吾聞明逺之言曰觀已無屋王冲和者募財與材而為之屋觀本無田元初以所得於其父母與明逺之田而為之田然則非能不假人矣人之類亦誠足賴而誠可貴矣民神之主也不其然哉不其然哉而人必自棄其類者何元初之為黄冠師也明逺與其室實資之其興太一觀也又經紀而佽助之嗟夫人之於神若此吾不知神之於人何如也幽者不可知其可知者終又當何如也明逺名通安陸人室陳本善堂記昔者聖人之制宫室王公卿士大夫以至於庶人皆有正寢以安其身今之堂古之寢也寢而曰正非獨辨方正位葢惟正可以久安耳予友喬達之居京師榜其堂曰本善善夫其命名之義也已聖人之訓脩齊治平爰有次第然皆本於此身身必本於此心心又本於此理知其本則知所止故曰在止於至善又曰知止而后有定定而后能安然則達之之學粹矣予與達之别多而聚少驅馳四方家如傳舍欲如達之安其居一日不可得而達之數十年馬迹不出國門予嘗心羨而不知其何以能然今然後知其居之得所止也或曰人有一善必本於其父兄師友厚之至也達之之意庸非取於是乎予曰是同一本也藴玉者必潤滋蘭者必馨吾未始見茨之生於梓也且將仰事俯育於斯繼繼承承舎善奚本懿哉乎其名也達之聞而請予文以記夫言者行之枝葉也君方務本文非所先雖然予固友也暇日升堂是為談本歴山書院記歴山書院歴山公所建也山在古東郡鄄城相傳舜嘗畊之民因祀之尚矣公大父國初來居其下有斬將搴旗之功没於王事慶鍾其子是為提刑公提刑公少長戎行克肖先正嘗以郎中佐征南軍衆議屠長沙公獨争之強曰殺降不義且皆吾民也由是活且百萬人終浙西提刑按察使歴山公以名臣子奉宿衞受世祖皇帝眷知起家持憲節厯七道入尹神皋參宥府勤於勸學所至必先之莅官之餘且淑於其鄉而厯山書院以成聚書割田繼以廩粟以曹人范秀為之師其子弟與鄉鄰凡願學者皆集又慮食不足率昆弟嵗捐粟麥佐之提刑公之封樹在焉則為書與昆弟約謹烝嘗䕶松檟相與為忠信孝弟之歸又與子姪約凡勝衣者悉就學暇日習射御備顔行曰毋荒毋逸毋為不善以忝所生也又曰再舎而謁醫若疾何復藏方書聘定襄周文勝為醫師以待願學者與郷之求匕劑者於是郡邑上其事有司乃定名曰歷山書院就俾范秀為學官而督教事焉廣平程某聞而歎曰斯古人之事也有三難焉非其時而為其事難也崛然特為於衆所不顧又難也矧資非有餘而黽勉為之噫難哉其慮之周者愛之厚也愛之厚者以君之所仁親之所親也推親親仁民之心以及是忠孝之道備焉且彼知舜之當祀必知舜之當法故也鷄鳴而起孳孳為善獨非舜之徒歟顧善敎善繼何如范秀聞而請曰是固我公建學之志也請以告而刻之某曰諾哉若夫棟宇簡編畎畝之大凡則碑陰在公大父諱固都斯姓巴約特氏為百夫長其先以北方君長歸國世有戰功提刑公諱華善治法征謀聞望甚偉歴山公名齊諾今為嘉議大夫參議中書省事篤於學問博通古今有經濟之具其家方大云安仁縣新公署記大德十一年扈從上都暇日與安仁倪君仲寳語因及吏治予以為束皂𨽻簡追胥布德化於獄訟寓撫字於徴科有一于此亦足賢已仲寳曰敝邑大夫庶幾焉近民而不瀆勤事而不僿始至以官署偪而弗飭與僚史率巨室共圖之材以善賈工以優直徙闢新址為聽事為吏舎為鼓樓閱幾月而成崇麗􅃉閎不與前等此雖於治無與然民之過之者心目相撿弗敢玩也濟之以善政善教其庶幾乎予曰然嗟夫望其車服而心革念其所嘗芘而相戒勿犯美矣俗習之良而彼亦何以得此於民哉司牧者不得不思乃揆其終則亦父老之事也仲寳曰唯父老政願記署之成請因以告而刻之邑大夫常山趙某主簿東陽葉某萬里䆫記臨川鄒衆仁舉名其居室曰萬里䆫既請涿郡盧處道書其顔又請予記鄒盖名族衆之祖嘗為達官諸父皆聞人身為名家子材又美茂有志當世誠欲汎濛汜而上崑崙以馳騁其長故特寄所寄於朝夕之地云然也夫體不盈匊而大無不包處於深幽而逺無不至物而不物非神而神者獨非吾心乎故不出户而知不窺牖而見無向與背無出與處而八荒恒在我闥也奚獨萬里此䆫為自其昏蝕相禪町畦分而崖谷異茀乎而詰屈冥昧蕩乎而汨没湛浮繼之風烈火駛方寸悉燃則雖一舉足猶躓斯時也䆫於萬里何有且子方有四方之役蘧廬之蹔然逆旅之茍然䆫與偕平抑委之也予故曰特寄所寄焉耳然則又焉用記雖然嘗試為言之養心莫善於静以子之懿謹自將好學不倦潜心以日進此道靈者聚而明者發旁薄於四方上下之宇入出於往古來今之宙深造絶詣莫之能先是則吾將無以賛子窻之功矣豈直萬里哉其請記也實自楚來燕之歲是為至大元年禪智院記黄州歐陽山禪智寺比丘道清以宋庚申渡江至吳城闢地作室肖其師庋其書書門曰禪智不忘本也不二年而没二弟子曰永昌永材當材主事時里人金文福夫婦輟衣食助締構為度弟子一人曰正璨越五年為至元二十三年正璨繼材因自悉益治其室使粗列於招提蘭若之間而文福夫婦又悉其田畝百有竒施之於是佛有殿經有藏僧有堂而常住始有田其人可飽食安居矣今年冬璨寓其事來京師請余記佛事熾矣余尚何賛惟彼匹夫匹婦之治其生也甚勞忘飢渇犯寒暑商較於微茫追逐於汗漫積銖累寸然後免於飢寒之阨復思庀蓄以遺子孫也相顧益老一旦親舉而輸之他人雖福利之說錮其中抑豈治生之初志哉若文福夫婦者葢可念矣則夫食飽而居安者是宜思之不忘而欲託於不朽也乃為之記婦曰駱無子云至大元年月日記鹿泉先生賈公祠堂記鄂江介要區我世祖皇帝疆理南夏嘗觀兵焉已而廟遣元臣鄂為王土乃妙柬忠良文雅鎮撫之地利人和不二年而江表大定禹跡所至其吏民父老感念父母再造之恩不能忘也鄂於是有大元興寺又以為未足昭伐功鄂於是為武昌路而忠良文雅者鹿泉賈公亦既尸祝于校官至大元年統天繼聖欽文英武大章孝皇帝嗣大歴服凡先正之臣克左右亂四方者罔不襃顯爰贈公推忠輔義功臣銀青榮禄大夫平章政事追封定國公謚文正配李氏定國夫人鄂之士民共戴聖天子崇報之仁而公之功庸如新乃請於有司願新公祠而記諸石廣平程某適以使來因以文請程某曰公之盛德偉材天下誦之匪獨鄂也至其淵源終始閟在史官世容有未知者盍遂記諸咸曰幸甚公之大父河東襄獻公守謙父蔡州觀察判官頥母曰孫夫人公四歲能誦孝經當定宗時為省從事或夜餉黄金一鋌拒卻之上聞嘉歎月班銀如金數世祖皇帝踐祚召寘宰司寄以腹心喉舌扈從北征馬上時時進說通鑑或言民富且畔公進曰盜由飢寒不聞以冨或曰山東非冨耶公曰璮權太重耳且今獨見市民之奢郊野固有殍者上深然之金亡貴家或為𨽻公悉奏免上集百司命公歴數其奉至已奉上訝欲増之大臣謂禄秩不可紊進公執政公曰宰屬猶非才固辭上命太傅貞憲王巴延南征而以公行宣撫商議中書省事多資其畫䇿功公獨辭賞不受王師東下留公于鄂蒐兵峙粟弛賦蠲征養士興學飢者食疾者藥赴愬者予平禮接耆艾詳諏利害而興除之鄰境郷慕歸者載塗百城従風而靡然此緒餘耳公之居宰司也以國器契上心佐興運與太保劉公諸賢酌古今之宜立一代之制建學求賢緩刑薄歛循名責實為官擇人中外各稱其職中統至元之初號為極盛典章法度萬世可遵嗚呼逺矣葢公嗜書如飴未嘗一日廢猷為一出於經以仁愛為本三年鄂二年洪善政不可毛舉其最較著人不能忘者亦弗可弗述也蘄黄亂公命將往將曰鄂必畔請先鄂同列聳公曰吾畱三年矣此必無他請以百口保之鄂遂免冦平議東兵捕竄者公曰彼民何辜飛檄武寜馘之豫章飢公適至欲賑衆不可曰必咨中書公曰然則民魚矣責償於我乎取計口賑活數萬拊循勞來殷勤纎悉一如居鄂時民嘗受故國署有司急之詾公下令俾自焚其署獲都昌僣號者辭延平民公曰囚覬少挺耳立誅之秉心往往類是順性理而志躬行事親孝居處恭辭章髙㓗稱其人詔使至鄂士民章上公功公取章歸曰我何功雲中嫗三子一従軍一戕兄議原以養公奏曰殺兄大惡也恤母冝免子従軍談者於今為美傳不云乎凡㫁五刑必即天倫習司空城旦者尚知之公子五人亹亹皆負時材伯牧濟寧仲叅廟論高山仰止蔚然如公之猶存天道無親恒與善人茲非然哉茲非然哉公世居鹿泉名居貞字仲明年六十薨於豫章墓於真定獲鹿北牛山召南之事尚矣述之者曰敎明於南國化行乎江漢言之者咏嘆滛液而不能已愛之者至不忍犯其所茠焉及求其設施言行之略邈乎不可得聞返而徴諸世家不出六藝之文葢求之愈不可得思之愈不能忘徒三復其詩想像慨慕而已故予於公之事竊有感焉而備載之使後之來者有以得其詳師其心履其蹟忠君而仁民千載而下觀者猶有所興起也豈徒想像慨慕云乎哉此記之旨尚不厭其煩云雪樓集卷十二
