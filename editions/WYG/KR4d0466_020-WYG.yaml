body:
  text: 雪樓集卷二十元程文海撰碑銘彭城郡劉文靖公神道碑銘有元碩儒濟南劉公抱器懐寳不及大施於天下以死爰有冡嫡誕襲厥慶克浚其道以學行為天子大臣從容進退作世模凖皇慶元年推恩二代公贈正奉大夫㕘知政事追封彭城郡公諡文靖配魏氏追封彭城郡夫人明年公之子與余同官未㡬移疾去示亷鐸行状請為文碑諸墓道以肆上恩謹按公諱景石字文瑞章丘人曽大父諱照好學樂施大父諱珂以孝友聞金長清縣豐齊稅監父諱鼎有王佐才國朝為廣武將軍益都緫判兼安撫濟南淄徳軍民勸農使行左右司郎中事今贈嘉議大夫禮部尚書追封彭城郡侯諡獻穆母馮氏繼趙氏並追封彭城郡夫人公生而卓茂十歳通五經能詞章尚書公與客語公侍有持火鎌過庭下者客命賦詩公應聲曰金惟主斷割兹鎌復何謂出火濟窮途本以剛為貴一座大驚由是知名年十四丁父艱居喪哀毁或勸從刀筆吏可速逹公曰學儒先志也可舍而他乎學益篤後稍從仕以亷直自立淄萊二州新城蒲䑓長山三縣咸統于淄吏治曠軼公私交弊行省檄公監治期月之間政化大行上下恱服歴濟南緫府山東轉運經歴奉職不回乆之自以剛潔不能低昻以疾免歸日與長山某叅議清陽張郎中益津髙提學大定郭處士邢州智處士中山王詳議為忘年交商校經義評論古今以夜繼日或見其貧厚相賂遺雖故人弗受也嘗曰世味不可深深則難返私惠不可受受則難報晚讀釋老書曰此可以治心不可以治世可治心而治世者舍聖人之道何以哉其子多疾手書戒之曰曽子有言吾日三省吾身汝亦當日三省汝身飲食起居中節乎視聽言動合禮乎進徳脩業及時乎毋以荒恣敗身毋以自信敗徳母以因循廢學至元更化憲府交辟不起俄授濵學教授曰上命也不可辭到官再宿而去濵人止之不可留詩為别末云駕言陟秦䑓放目豁憂煎跂足望東海大聲賢魯連􅅾萊如可到隨此謝世縁凉風吹客衣日暮生蒼烟徘徊不能去心思空茫然還濟南二十三年五月二十日卒殯歴城東之七里原大徳九年六月七日葬章丘明秀鄉祖塋西南之新塋魏夫人祔􅀄尚書公擇婦曰莫若魏貟外之女魏君正人女必賢遂求㛰夫人貞静孝儉範于中外至元二十四年八月十三日卒年六十七子男二長敏中由河南江北等處行中書省參知政事為翰林學士承㫖榮禄大夫知制誥兼脩國史次早世孫男四燕孫燕駒皆下殤從禮從道方力學女二長適承事郎利用監提控兼照磨魏誼次適士人常文孫嗚呼日月不居典型彫謝余與公之子上下三十年慨想公之風流渺長往而不待庸辭謬學乃得備載記於無窮不亦幸乎惟公之志誦其詩可知己公之道觀其嗣可見己所以封名邦錫羙號流耀金石與國同其休豈非天哉銘曰孰生哲人伊濟之南有鏘其音如玉如金哲人維何其碩伊劉志與時仇身與道周桓桓劉公人憂我樂孔孟不􅇜後世誰若父昔王佐子今國器維公之樂雖死弗貳膴膴彭城厥土千里茫茫新封如帶如礪相古哲人罔屈匪信維哲且明以覺後人福州西禪寺用晦暉和尚塔銘達摩得法南海上第六祖慧能居曺溪禪宗常盛於東南宋之季若癡絶無凖雪岩霜林之属軌物牖民學者萬數天子遣問公卿致聘氓俗士女䖍禮拜跪交絡門路此必其道有足尊者至元中予㢘問閩海識西禪大師圎智慈慧魁大混合實而不野通而不肆端源呈舒薈翳刜刋髙坐講演䟽逹飽蒲拄拂所示懸觧妙悟究其授受蚤獲游從諸老間予益信君子之學必有由來師諱道暉池姓福州懐安桐口人年十五出家事候官末山寺仁逺大師受戒具繇西禪出江西遡浙江而歸凡歴諸禪一充維那三掌書記一主前板自景定元年秀􅄘出世至西禪十居壇埸退處西菴年八十四無疾而逝是為某年十二月有五日藏于西竺之西塔曰怡怡之塔在神光時嘗買大藏經一藏入寺又置田園相其弟晙師建顯慶禪寺于西竺皇慶二年秋其徒端堯等走京師謁銘惟師道峻而徳淵體空而化𢎞悼前修之不作懼正法之莫傳予又嘗挹其風儀接其聲聞銘不可己巳銘曰佛法南建其妙曰禪逹摩既東曹溪六傳學熾徒緐道流徳宣與時汙隆隨山為川暨于西禪蚤事諸老涉吳歴楚霜披雪槁居壇秉拂用信厥道其明昏昏其晦皜皜真源未息末教横被師頋而憂人競而靡西菴既謝為悲為喜其來非行其去非止福州荔枝綿州附子西竺之西㣲言斯紀河東郡公布都公夫人李氏墓碑夫人京兆李氏金進士試長安今諱君寳之女皇贈正奉大夫䕶軍河東郡公諱布都納之妻榮禄大夫平章政事商議中書省事察罕之母元光壬午十有二月四日生至元戊子正月十有九日卒某年某月某日葬墓在徳安孝感之白雲山平章任湖廣理問日買田宅于兹因葬焉至大庚戌某月追封河東郡太夫人皇慶癸丑九月以狀匄文刻諸墓􅀄長安君娶蔡氏生三女夫人居其仲始九歳隨父官洛陽天兵南伐城䧟家破軍帥成格勒一見夫人驚曰此女丰度異常他日必貴問其姓曰李氏而帥之妻西夏主之後也亦李氏乃鞠如己子而恩意加焉成格勒者諸王錫喇之愛將也時河東公以巴喇勒哈歸命數從王攻戰有功與成格勒同官于解後以不肯代成格勒為總管成格勒賢之以夫人歸焉因家于解夫人躬莭儉慎喪祭和上下正内外不動聲色而教被婣族不出閨閫而化行邑里河東公亦未老而謝事優游鄉井終其天年號為善人長者人謂有警戒相成之道焉其子八人長平章也博涉經史才徳過人早為忠宣公鄂囉齊所知㧞置幙下累遷為湖廣行省理問改行樞宻院經歴棄官讀書白雲山俄起為武昌治中河南行省郎中入僉詹事院事進昭文舘大學士太子府正拜參知政事㝷以平章政事議中書事亷慎廣厚所至稱賢次博囉早世次博囉徹爾敦武校尉百夫長次博囉台湖廣行省宣使卒次博除太倉令卒次濟噶台封武畧將軍寳慶路達嚕噶齊次多羅台性至孝樂志琴冊髙尚不仕朝廷為旌其門次鼐滿台敦武校尉邵陽縣逹嚕噶齊子孫曽𤣥七十餘人皆足世其家嗚呼譲其徳之至乎河東一譲夫人以歸遂基百世盛大之業忠孝萃於一門夫人固詩禮之冑𦙍耶賢矣哉銘曰譲為徳基化由内始河東秉義公侯繼起藹藹夫人婉婉令儀蘭閟其芬玉韞其輝維儉維勤克慈克孝家承内則邑被隂教維京兆父厥懿攸鍾維河東公爰配以隆葬雖邦異封則同壌白雲央央焄蒿悽愴是夫是婦是母是子刻此銘詩百世之軌故國子助教李性學墓碑至元二十三年余以侍御史行御史䑓事被㫖求賢江南過揚州㑹故人為提刑按察使曰郡庠有李性學先生識之乎曰未也極道其問學文章余固願見使三往不見連騎詣之終不遇自是性學之名職職胸懐間遂歴两浙江東西得士二十三人獻之天子天子盡用之布諸中外愈恨不得李性學先生還䑓性學適長明道書院得與論議窮日夜談經博達精粹超詣獨見易詩數百家可坐析立辨也為文閎宻深厚類永嘉葉適又博通星官歴翁浮屠道士百家之言私獨念曰茍入侍必與俱一日忽持一卷書詣䑓言僧格必誤國累數千言衆大驚以聞未㡬僧格果敗天子立徴性學至則以為國子助教學者數百人凡經指授莫不充充然相慶以為得師公卿貴人皆折節願與交名動京師已而竟以疾卒無子弟親戚以治喪無贏錢財以給喪今江浙等處行中書省左丞吳君某與三数知己以禮葬京城西南三十里盧溝橋之南吳君某園中皇慶二年夏吳君自江南還憮然謂余曰嗟夫性學不幸客死今若干年矣吾雖去京師往來余懐也吾懼死者日益逺知者日益寡不有識焉盧溝之丘且夷矣知性學莫若君君其為文吾將礱石刻諸墓性學庶㡬不朽矣盧溝南北使客之衝千載之下豈無賢者哀而酹之也嗚呼始終哉吳君乎夫吳君位丞弼名天下非待假託附麗以聞今􅂋後而惓惓焉一窮士死生之際亦可少愧天下輕薄之為交者且性學數千里外孤生雖甚賢不見斥於人頋已幸又何望得此於人哉吳君可謂知友道矣可謂義人矣性學之賢從可知己性學名淦建昌南城人世為詩書家其人魁大少飲酒一食能盡肉數斤善談論逹政治不娶不知有男女事或端坐至旦竒士也平生著作頗冨聞河中知府田衍多得而藏之惜已死不及出而行於世卒以某年某月某日葬以某年月日得年若干銘曰于嗟乎性學知足以知聖賢而學則閎矣氣足以怵公卿而言足徴矣行足以信友朋而没獲寕矣而年不永位不稱丘首不克正命也夫命也夫羅壵墓誌銘皇慶元年秋盱江吳東之病于京師廣平尉明安岱爾慕其名載與俱歸邯郸不數月竟死明年冬十有一月二十有七日其友豫章羅壵亦暴死京師二人余知也一歳之間俱喪焉未有以抒余悲延祐改元春三月壵之父某來歸其喪長秋寺卿訥古徳勒謂余銘以慰其父心􅀄壵來京師其同舟者寺卿之子也因就壵受司馬氏通鑑歸而言之父至是薦授長秋寺架閣庫管勾兼照磨居官三十有六日而没時年二十八曩余識東之於武昌余見其學也若古人然然其氣貎萎薾言呐呐不能出口知非遐齡之具也及上即位之􅀄余被召過豫章壵以書謁余又數見于此余觀其骨勁而神潜類致逺器者寡言而專志類善飬氣者不意其遽死也其父之言曰壵㓜而知孝年十二即却酒肉以祈親年長而知學叢書數千卷日以從師取友讀書績文為事常夜分不寐或遂坐至旦又示余所纂記著述誠用心勤矣豈以勤心之過反促其齡耶壵之於東之非徒友之葢師之也皆苦學早死然壵有父以歸其喪東之之骨未知孰歸之也悲夫壵字奕髙娶嚴氏有子曰謙始八歳女二俱㓜以某年月日葬某縣某鄉某原銘曰㓜而期壽其親兮父則歸爾骨也長而學致其君兮禄未逮而没也彼邯郸之丘兮則孰為之碣也其不幸也耶其幸也耶元都水監羅府君神道碑銘維至元十有二年世祖皇帝下江南招納降附緫攬英傑披腹心掲恩信靡不揚聲奮烈移忠本朝以成聖人立賢無方之羙國之得人莫盛於斯若都水監羅侯其一也侯諱璧字仲玊年十三而孤事母則以孝聞長而魁岸沈鷙好學善騎射􅀄習舉子業既而歎曰大丈夫生世當以竒䇿取勲名安能卑卑作腐儒語耶聞蜀帥朱􅑤孫募士即仗劒往從之一見大被器使累功為武翼大夫制西路馬步軍副緫管帥移鎮荆湖辟與俱至江陵天兵大入境率所部忠銳軍降㑹太夫人訃至歸葬乃入覲授宣武將軍管軍千戸𨽻丞相阿珠招収淮軍討歙㓂有功領本州安撫事十五年從張元帥廣南賜金符轉明威將軍管軍緫管鎮金山居四年海盜屏跡徙上海督造海艘再月而畢明年朝廷議轉江南之粟以實京師下其事行省侯獨以海道便部􅈇舟率先道海自楊村入不數十日至京師賜金虎符進懐逺大將軍管軍萬戸兼管海道運粮二十四年納延叛給餉遼陽浮海抵錦州小凌河廣寕府十寨務加昭勇大將軍又明年督漕至直谷既輸之倉白潞河决漂廬舍突障塞势益張官吏凛凛侯為方樹柵築堤捍之倉以完鍚宴中書堂陞昭毅大將軍同知淮西道宣慰司事使貪暴列城化之民不堪侯循行郡邑籍其罪以示之大恐求自新使亦衰止於是簡獄訟均賦役脩政令興學校正造作之法嚴漕運之防政教大行進便冝十二䇿上皆嘉納又請棄两淮廢田以給貧民令耕三年以上量視其入從之嵗得粟數十萬斛拜鎮國上將軍海北海南道宣慰使都元帥㑹征交趾公私煩費郡邑騷然惟本道民以不擾頃遭黎㓂之地所向焚蕩民無所歸發廪賑之然後上聞活者萬計島夷蜑蠻畏威慕義有同齊民董屯田治塩法百弊悉去大徳三年除饒州路揔管兼府尹未行改廣東道宣慰使都元帥其治一如海南而恩威過之初諸洞蠻二十餘萬負固奪民田以食租賦不入乃誘致其酋假以官秩曉以福禍令諭其黨相率奉版籍以歸北軍之戍者不能其水土多瘴癘死為善藥給諸郡以療之有請増塩額置轉運司者抑而屏之民既恱服建逺華樓以壮其觀未㡬詣行省白事因移疾求解職不許請于朝又不許越父老聞之争赴䑓省乞留乃還㝷除都水監換正奉大夫通州多水患鑿二渠以殺之又浚阜通河而廣其堤歳増漕六十餘萬斛而人不病至大元年治水邳徐間訖功求免益堅復命與河南省何平章脩两淮屯田二年秋得疾還至維揚曰余殆將死矣首丘之義而可忘乎趣歸鎮江舍報恩道院其故宅也疾愈復劇却醫藥戒家人我且死母事浮屠子坤載刲股為粥以進弗納以九月十日薨年六十六明年四月癸酉葬丹徒縣長樂鄉太山之原郡守以下送者吏民數千人延祐改元春三月其孤以浙東海右道肅政廉訪副使臧夢觧所為狀來請銘其墓道嗚呼余知侯有年矣以侯之才之政已過人若此至於知天命之有歸寕屈己以行志憫世俗之茍得寕違時以守貞以世祖之為君而言必嘉奨以順徳之為相而事必咨詢居松江减其田之入而上取以法建義塾敎其鄉之士而下􅂆於學非賢且智而能之乎其克終也宜哉曽大父諱明大父諱煜父諱大義宋承信郎淮東將領娶陳氏繼李氏湯氏子男一坤載也孫女一銘曰炎景南謝天戈于征江流湯湯羅侯在荆惟侯桓桓歸我神武綰符抗旌化極海浦曷憂京師轉粟于南超凌鯨波夷險一心惟侯之才孰曰不可惟侯之徳孰慊于我低徊卿監亦既升朝未究厥施纓載南彯時惟至大聮軒累葢奚侯之明急流勇退不有嵗寒孰知松栢翹翹勁草表於疾風宜一人是知宜大臣是咨胡不丞疑胡不憖遺茫茫故鄉太山之原勒銘周阿過者式焉自觀先生王君墓碣唐之季太原王該奉母黄避地江南至廬陵家焉好善急義世稱長者王家宋紹興中有盧溪先生庭珪與胡忠簡公銓友皆以剛直名王益顯繇該十五世至廸功郎次魚次魚生鄉貢進士畿畿生如箎如箎生宜孫仍孫㓜孫宜孫善為文好竒古㓜孫字季稚是為自觀先生性篤孝母劉疾苦痰醫莫之治一日夢讀南陽活人書或指甘桔湯良覺如夢立愈寳祐丙辰赴闕上書言國事餘萬言不報歸教授于鄉宋之亡其友文丞相兵敗執以歸過廬陵謁于驛舍為文祭之期以必死辭氣忼愾左右嗚咽莫能仰視自是日與賔客過從守經執禮浩然以終也數詣府陳救荒弭盜之術民頼焉有妖僧惑衆自利日就禱以千數白于邑屏之某與鄉人處諄諄然且教且諌有鬬者輙自解曰獨不愧王先生乎嘗宿友人胡斗南菜羮亭食有羹曰古人食必祭即唱四句曰惟神生也何神逝也何處飄然乘風尚或余頋食已危坐至旦曰予逝矣予逝矣未㡬卒于家年七十六娶劉氏勤儉孝慈先三年卒子男七福徳吉長觀真東福徳長蚤世女適彭嘉龍孫男二留禄卒以大徳二年正月十有一日葬以二月三日墓在邑之里田大山之原有中庸大學章句二卷太極圖説擬荅朱陸辨深衣圖辨經籍論易通貫三為一圖家傳譜系簡便經驗二方各一卷雜著若干卷歐陽先生守道謂其學從陸氏文自蘇氏云烏乎亦尚徳博雅君子哉延祐改元閏三月其子真以状来京師乞銘真又賢冝銘銘曰死可生生可亡孝且忠窮何傷螺之山下有江江洋洋王氏昌静山處士陳君墓誌銘饒之安仁有隠君子曰陳恢叟恢叟之父甚賢而貧有曠地數十畆以樹桑為業凡喪祭冠昬衣食賔客之事皆仰焉又計其贏命其子從師問學恢叟即感憤自奮與湯東澗吴道心諸老游非聖人之書弗敢著於心非君子之行弗敢服于躬早作而夜思期不負其親而已學益明行益髙於是近者曰陳先生吾師也逺者曰陳先生吾師也翕然慕而從之有終恢叟之身弗改事者諸門弟子間相與謀欲請為廣其業遽止之曰毋累我毋累我且為歌詩以喻其意與仲父起元俱號稱君子其脩身事親治家居鄉之道人取以為則焉大徳二年九月十有九日無疾而逝年五十一恢叟諱應洪自號静山居士曽大父文炳大父彦雲父麗娶某氏子男三長曰垕繇慶逺路龍溪書院山長為翰林國史院書佐次淵次日新為老氏學賜號崇𤣥冲道明復真人孫男三能廌英女一延祐改元夏四月垕來告曰不幸先子棄諸孤且十有七年矣惟是貧弗能禮也殯于里之楊園將以某月日啓葬于鄉之古塘惟垕之不肖幸以筆札從公于太史氏日新又以祠官事今上獲從公游且並辱公之知非公之文將何以慰先子於地下而垕死有餘痛願公匄之銘予為之題曰静山處士陳君之墓而銘之曰古人云渭川千畆竹可以比封君江陵千樹橘可與千戸侯等然其人所以垂後著稱者亦如是而已陳氏徒頼區區數畆之桑卒饜詩書之澤至於今弗替而益大世獨以長厚聞豈非賢哉海北海南道宣慰使馬府君神道碑海北海南道宣慰使馬君卒之二十三年子壽祖赴調京師既授撫州臨川縣尹來言曰壽祖無肖幸頼先人餘澤曩在南城獲知於公今又有臨川之命是天以壽祖卒教于公也性先公没且葬有年矣諸孤寡弱無以承先志使先公之行不大暴於天下夙夜是懼惟公賜之銘敢以状請君諱成龍成都廣都人世為大官曽祖珏某官祖徳􅂋某官父某某官君少有大志涉獵經史善騎射至元十三年師入宋宋太皇太后詔内外悉罷兵内附君以右武大夫濠州團練使利戎司金都統制承宣使奉常徳府印綬版籍詣轅門降夏入覲召見賜金符授昭勇大將軍昭州安撫使属以兵狥下湖南江西廣東西一十六郡遷昭毅大將軍招討使尋拜輔國上將軍海北海南道宣慰使到部恵安氓庶招徕黎獠置屯田以養軍脩庠序以勸學政化大行属征交趾公私煩費君供給罔後而民弗擾又出新意造大艦數十號海哨馬部至㢘州師頼以濟三年謝歸治第潭之城南敎子孫宴賔友割田分金以賑乏居善藥以拯疾怡然以終二十九年十有二月二十有八日卒年六十有六夫人婁氏宋緫制泗州軍馬順之女貞淑慈儉至大四年春三月二十有一日無疾而逝冬十有一月二十有三日合葬善化縣長沙鄉巽山之原子男五興祖明威將軍鎮巢副萬户没王事壽祖承徳郎撫州路臨川縣尹兼勸農事復祖襲守萬戸承祖光祖女適忠翊校尉潭州路湘潭州判官趙伯顔孫男三徳孫堅孫福孫女二銘曰物盛則虧時過則㣲天命豈常有徳乃歸惟宋之亡仁哉太皇毋俾我民而病我疆列郡承風涕泣内附市不易肆野不易處惟蜀馬氏世禄于趙承宣既來亦以内詔智符擁衆還廸于南招降納叛威愛允覃載輯海邦髙牙大纛政洽化流胥暨時教進不違天退不待年盤盤長沙大第雲連宋祚有終馬氏罔墜巽山之碑過者墮淚程某夫人齊氏墓誌銘新安處士程某之夫人齊氏年五十有八以至元二十有六年五月八日卒又明年十月某日葬里之長原又二十有三年處士命其子復心請銘于某同宗也夫人諱静真世為鄱陽大姓祖某父某母某氏幼孤無兄弟鞠於從父從父憐而愛之析其産半以嫁半以立其父後為父後者弗成厥家家破并奪夫人産以自益夫人既歸程氏或勸處士言之邑夫人止之曰從父所以立先人後者願以承宗祧也不幸而至於此復以我故而罪之將如宗祧何處士曰吾意政爾乃止事後姑盡其孝相夫子盡其順治喪祭昏嫁給賦役延名師以教子常易奩具以濟其乏慈儉雍穆儀于内外臨終猶戒其子善事其父治喪勿用佛老嗚呼可謂賢矣子男二若水復心皆賢而文復心上四書圖説將與秩以父老引年以本郡儒學教授致仕時年六十孫男二暹遜女二長適顧某曽孫男若干人女若干人銘曰為孝女為賢婦為慈母而早死使存也始與夫子偕八十有四而死也二十有六年吁其天乎邠州大開元寺喜和尚塔銘皇慶二年秋八月十有八日邠州大開元寺圎融洪辨大師右脇累足而化光發屋外年五十三僧臘三十五荼毗舎利湧出葬東岡明年夏六月其徒行秀為狀願銘塔石師名法喜王姓邠之新平人父選母寗七歳隨親入佛廬即樂而忘返稍長願從浮屠學當州洪福寺講主性公法行髙峻遂從受戒具十八遊大梁事孝嚴温公温公門徒千數師出其右居五嵗竟代温主講席已而去之五䑓山入闗道益著所至升座講説人見有異氣熊熊繞身歸者日衆又慨然歎曰佛法非􅂋不傳非秘不尊詣京師謁大金剛上師膽八一見授以秘乘成宗即位賜號圎融洪辨大師主當州洪福寺明年改平江雙塔寺講主一夕夢異人告曰寺將有刼難師宜急去因北還寺果没於海濤被㫖居開元而開元與雙塔皆頽圮乆師至輙大其棟宇廣其延納自施大藏經一藏于開元雙塔雖淪廢而開元至今頼之度弟子三千而行秀居首嗣法五十而可宗居最惟師夙悟真乘生應法運顯秘並行而弗悖功徳兼隆而弗居非混洽洪融獨見特立者能若是哉銘曰佛以時出法由運興惟兹喜公兆自七齡洪福發藻孝嚴避鋒杖錫五䑓振衣闗中白毫出頂緇衣雲從爰來京師秘宻是宗三承景命往主𢎞刹昔無完墉今若貝闕神人啓夢我道斯皇林林學徒惟師是望云何長往秋月麗天師來無期同法永延吴君載墓誌銘始余與金溪吳氏仲季事族祖徽菴先生于臨汝精舍意相得驩甚至元丙子以來余日有事於四方率數嵗乃一集集率一二日去余悲之然猶冀其相見之未艾也大徳五年聖可死余銘之九年時可死余銘之余始痛其離闊之無窮期矣今時可之嗣垕子又死焉其仲弟應子亦又以銘累余嗚呼以時可為父而喪其冡嫡以聖可為季父而殞其猶子以應子為弟而哭其長兄豈天故短其命欲余銘耶何銘之忍也垕子字君載其學有家傳復從馮得一先生受詩益邃於理治内制外執經行􅁠咸協于中余數與語芥利禄泯臧否遐瞰髙蹈泊然獨立有隠君子之風柰何嗇於天而不得中壽以死余懼天下之為善者自怠為惡者之日侵也然死生命也君載之心固在此而不在彼也余獨悲與君再世相知而遽爾也則亦已矣焉耳時可諱徳溥宋登仕郎聖可諱可孫宋進士及第尉瑞之新昌入國朝為建昌路儒學教授諱堯仁諱士亨者君之曽大父大父也三世皆為名儒配曰葛氏先卒繼俞氏子男二斗孫婁孫女二長適鄧承先次適上官瑜孫男二増坤女四以皇慶二年九月某日卒年五十二以明年某月日葬延福鄉福林原銘曰生不並世兮余孰與之相從相從而不我知兮孰戚欣于厥中十年而三銘其人兮得不為之哀恫邈緬緬兮前者不可作而後者不可窮周仲芳墓誌銘周氏出姫姓有居撫之金溪者為儒家且五百年藤州守衮七世孫曰桂芳字仲芳種學績文好仁急義蚤有名郡邑間余家相距三舍而未之識人謂仲芳曽大父監建寕府都作院冕大父監江州湖口鎮公儀父登仕郎耑子三世皆非通􅂋其騰踔驚奮揚英飛烈焜霍千載者必在仲芳已而仲芳持家亂離息影太平樹果植花弹琴詠詩消揺㐮羊以樂其志以善其身以裕其子孫而已人又幸曰夫有徳者必壽仲芳嘗侍父疾五年衣不解帶保鄉民數千垂絶之命於阽危睚眦之間可謂有徳矣竟以皇慶二年十有一月十八日年六十一而卒嗟乎所謂天者誠不可知矣然視世之顛暝貴冨恣睢形勢身死名㓕者不既多乎此固仲芳之志也將以某年月日葬某鄉某原其孤以状介其友至京師乞銘余聞仲芳之為亦可謂鄉里之賢者也乃叙而銘之仲芳娶余氏先卒男四徳厚鎮江路官醫提領徳謙為從弟後徳懋早世楫方力學女一適鷺洲書院山長鄧觀國孫男女若干人銘曰為學不顯其道為徳不食其報閟青山兮終老青山峩峩吁其柰何故同知處州路緫管府事袁府君神道碑銘世祖即位二十有七年某被㫖求賢江南時四明袁君以永嘉之命居里以應詔不起後數年與君之子桷同與史事相知狀君平生請為墓道碑文烏乎君諱洪字季源袁氏之先轂宋嘉祐中為開封進士蘇文忠公守杭為通判終處州守贈光禄大夫其宗慤亦舉進士為祥符丞因家祥符祥符生贈少保謂少保生贈太保􅆏靖康亂從青州軍還四明太保生贈太師衛國公昇嘗攝治大獄連千餘人悉焚其牘太師生同知樞宻院事資政殿大學士銀青光禄大夫奉化郡開國公致仕贈太師越國公韶越公㓜學于族父正獻公燮嘉泰中與正獻公俱坐道學廢後繼為侍從尹京十年居政府號稱能臣生中散大夫嚴州守似道賢如其父君其仲子也曽祖妣太恭人楊氏贈齊國夫人祖妣吉國太夫人陳氏贈周國夫人妣恭人王氏贈令人君七歳通詩書春秋十七以澤監鎮江大軍倉京尹馬樞宻光祖辟為佐以敏逹聞禮部李尚書伯王中書劉舍人震孫皆以治劇才薦改佐两浙轉運幕轉運使胡太􅀄阿僻君數謝病去不許度宗聞其名用為太社令宰相賈似道不樂四明人君與同郡為侍從執政守倅者六十餘人皆被廢日相從講學口不挂時事賈後悔起奉華州雲䑓祠禄咸淳九年通判建康明年冬國事日蹙大帥趙溍委以府事出督江上兵城中大駭夜縱火剽掠相率出郭去君宻捕斬首亂數人乃安諸將益桀驁日以語侵君且請較射君出私帑具賞與射君先發三矢三中衆驚服溍遁諸將釋兵歸又聞賈平章兵敗保揚州淮西緫領費伯恭遁入海乃㣲服詣行在所授浙西安撫司主管機冝文字改松江制置司參議官不拜而歸明年天兵下臨安至元十五年入覲召見授朝列大夫同知邵武路緫管府事二十年改温州並以疾辭大德二年改處州命下而卒二月十有八日也年五十四葬鄞縣桃源鄉慈溪之原君早從王鑐先生學戒以躬行守而弗失父事兄賔州浚一物不私有嚴州遺澤二以譲兄子馬公嘗命徴責旁縣不受令潜說友為轉運檄督寕國絹十六萬匹曰此絹自嘉熈以來名存實亡莫若止取景定至今年逋且昔者嘗以不能謝馬公矣潜恐蠲數夥亟命他吏卒如公言􅀄至建康慮囚句容治偽造楮幣者縱連坐二百餘人宋之亡諸無頼往往以小睚眦構䧟衣冠之士陳叅議允平者在䧟中帥府命招討王世強捕治君儒服入白且語帥曰新附之民人情未安不絶告訐羅織之禍非所以示綏懐也帥悟釋允平自是叱去上變者君還自建康即去聲色謝榮利延師教子盛饌樂賔客人有不能䘮葬昏嫁者出財以相之有疾為藥以救之有過委曲覆䕶之不及中壽而卒識者惜之唯君承七葉之盛貫六籍之藴際興亡之㑹進不阿以茍容退不矯以自潔安時委運以明哲終豈不謂善人哉予昔不能力薦之天子今乃得宣遺羙託金石故樂為之辭君娶史氏宋太師丞相越忠定王浩之曽孫資政殿學士贈太傅忠宣公彌堅之孫直敷文閣荆湖轉運副使賔之之女有淑徳再娶楊氏五世居太學父曰應翔太平州判官子一桷也翰林待制文林郎兼國史院編脩官夫人出女三長適宋丞相史荘肅公嵩之之孫似伯次適工部尚書余天任之孫昌期次適資政殿大學士史岩之之孫益伯孫男三章早世瓘珖俱力學女四長適同知餘姚州事趙孟貫餘在室銘曰昔在宋世有赫袁氏宋禄有終袁氏罔替優優處州濯濯厥聞太守之子樞宻之孫惟君之生遭世多艱任運而行益光厥先末承休恵三辭郡貳命雖不猶義則弗匱有子郁郁有孫奕奕有之似之維民之則掲應強妻何氏墓誌銘豐城處士掲君應強没之十二年配孺人何氏卒子倧羙哭㡬絶語其諸弟史舘編脩傒斯曰吾不徳禍及吾母吾向者以汝獲識翰林程公公天下士也辱銘吾母吾死且瞑目然今我不可以見汝其為死請公仁人必不我拒若然則汝亦與有榮耀焉傒斯以狀采請孺人諱妙静世為豐城人宋禮部延世之曽孫性勤儉好詩禮景定甲子歸于處士遭罹多艱不失婦道處士既没撫諸孫盡其愛晚好佛老氏盖賢婦也處士字子常祖大成父三畏皆以徳自好叔父三京嘗為貴州鬰林令有聲處士文行脩明為鄉里所師其居多竹人稱之曰森玊先生孺人以宋寳祐庚戌三月三日生以延祐元年八月二十九日卒子一倧羙多材贍智好吟詩至大中求祖之所自出至於南海帥府檄為潮陽掾已而棄歸葢足世其家者孫男三壬午生申金璧女三洪智早世来崇許適徐引兒為從兄瓘之婿范清女以明年某月日葬于某鄉某原銘曰婦人之徳不出于閾非其子之賢曷以示無極許㡬先墓碣延祐二年春三月七日天子始䇿進士廷對者五十有六人國子生盱江許晉孫與焉授將仕郎南城丞廼輯大父處士君善行来拜曰晉孫不肖幸塵末第歸拜二親而吾祖不及見矣惟吾祖之墓未有所表著者敢請君諱開字㡬先其先汴人宋南渡始宅盱曽大父晦之大父昌宋團練使父通宋進義校尉君㓜孤刻志勇自立身長七尺能蹶張挽強晚好易明歴數善相人論禍福如辨白黒諸貴勢大人多禮致之有名江湖間至元中詔徴江東謝枋得過盱相見傳舍中與語一日夜執手不忍别居鄉尤以孝友稱年近九十猶能日書細字数百坐語至夜分乃寐大徳九年六月九日無疾而卒年八十有九三日而歛貌如生延祐改元冬十有一月庚申葬南城太平鄉金塘之原配趙氏與君同年生先二年卒子男二炎明時霖好老氏學女一柔嘉適徐孫男三晉孫益孫鼎孫女二端婉皆適徐銘曰天之蒼蒼吾可厯乎物之茫茫吾可極乎前之積後之昌非人之則乎雪樓集卷二十
