body:
  text: 年譜諸孫世京編録公諱文海字鉅夫避武宗皇帝御名以字行程氏之先自成周之世伯符始國於程至伯休父佐宣王中興忠誠君嬰保晉趙文子忠佑公元譚西晉守廣平移節新安忠壯公靈銑佐命于陳代著忠績世居歙縣之黄墩復遷于休寧縣之閔川口宋元豐中有曰處士巽者於公為七世祖巽生緒緒生仁勝皆以經學教授潛徳弗耀髙祖徴士諱宥興性仁厚有大略樂善好施嘗遊漢上樂其風土卜築郢州京山縣之西髙渠上薦辟不起卒𦵏其地曾祖安僖公諱子明沈静方嚴寡言笑重然諾天兵破襄漢避地于鄂時㳂邊流寓者凡數千人悉為經理之使各得其所卒𦵏夀昌之槲林村皇贈集賢侍讀學士中奉大夫䕶軍追封楚郡公祖簡懿公諱徳秀魁岸有器幹復東入彭蠡寓隆興新建縣之呉城山從之者數百家㳂江閫帥檄委紏合鄉井以自䕶遂結豪傑料丁壯利器積粮掘壕樹栅以為固外兵莫犯民咸徳之初以季子登朝恩封承務郎復以功擢夀春府軍事判官主管淮西安撫使司機宜文字晚以宣義郎致仕卒𦵏呉城之吳林皇贈資善大夫中書左丞上䕶軍追封楚郡公三子長累贈光禄大夫大司徒柱國楚國孝肅公諱翔卿次同知荆湖北道宣慰使司事巖卿次翰林侍讀學士兼國子祭酒飛卿公簡懿公母弟宋逸士徳萃子也襁褓來後大宗孝肅公以為嗣孝肅公資性明敏練逹事情持家御衆斬斬有法椿藼夀考叔季宦成孝友之著焉公幼有異質恢廓不羣承學父師及長卓有成立徳祐乙亥季父侍讀公通判建昌攝守事公侍諸父奉大母太夫人就養未幾天兵南下建昌内附侍讀公受命為守遂舉家居焉公不能忘郢故取郢之白雪樓以名所寓而後學因稱雪樓先生後賜地築室京師又扁其齋曰逺故又曰逺齋先生云宋淳祐九年己酉夏四月十七日戊午午時公生于呉城山寳祐元年癸丑公五歲入小學讀書即通大義父師初命名曰槱之後字周翰景定元年庚申是年兀中統元年公年十二歲是年天兵渡江公侍大父母避兵于海浦兵退歸呉城從仲父宣慰公受業對客賦詩作文應聲而成人服其敏三年壬戌公年十四歲是年季父侍讀公登進士第省試三塲文公一覽成誦聞者驚異咸淳元年乙丑是年元至元二年公年十七歲初從學于龍淵胡自明先生明年徃就學胡氏家塾三年丁卯公年十九歲游臨川讀書臨汝書院受學于族祖徽菴先生若庸與翰林學士呉文正公澂為同門徽菴乃饒雙峯先生髙第弟子有字義行世六年庚午公年二十二歲赴湖北省試及歸道經夀昌過白狐嶺謁獅泉李先生珏見公所答策文驚曰三篇皆欲為國家措置大事他日必非常人有司迄不敢取八年壬申公年二十四歲初贅于臨川嘉禄徐氏廣胖居士霆發女也徳祐元年乙亥公年二十七歲是年侍讀公參制置司事于洪公從之居講學東湖之上侍讀公尋拜郡建昌公侍諸父奉太夫人就養冬十二月天兵南下建昌内附大元至元十三年丙子公年二十八歲始更名文海字鉅夫是年春公從侍讀公入覲世祖皇帝于上京授公宣武將軍銀牌管軍千户十四年丁丑夏六月子大年生十五年戊寅公年三十歲是年春公挈家入備宿衞冬十一月九日上召見香殿問卿在江南知賈似道為何如人公條對似道始終所以忠邪狀上大説給紙扎命悉書其詞敷奏稱㫖特命改直翰林俾從諸老游十六年己夘夏六月授應奉翰林文字朝列大夫十七年庚辰冬十一月進翰林修撰十八年辛巳公年三十三歲春正月陞中順大夫祕書少監冬十二月遷集賢直學士中議大夫兼秘書少監十九年壬午夏六月公建言吏治五事一曰取㑹江南仕籍二曰通南北之選三曰置考功歴四曰置貪贓籍五曰給江南官吏俸禄朝廷皆采行之是年有㫖賜地十畝于安貞門㶚河之西樂道里俾築居室公作逺齋于室南有齋記詩文二十年癸未公年三十五歲春三月加翰林集賢直學士同領㑹同館事二十一年甲申冬十一月四日夫人徐氏卒年三十七後追封楚國夫人二十二年乙酉是年夫人俞氏來歸宋昭孝太妃女弟也二十三年丙戌公年三十八歲春正月改集賢直學士進階少中大夫三月公入見陳乞興建國學遣使江南搜訪遺逸御史臺按察司並宜參用南士上即命建國子監詔公仍本官拜嘉議大夫侍御史行御史臺事賫漢字詔書乘驛求賢江南夏四月公至行臺視事承詔禮遣葉李趙孟藡赴闕公遂遍歴諸郡廣求賢俊二十四年丁亥春公率所薦趙孟頫張伯淳等二十餘人赴闕復命上皆擢以文學風憲清要之職公復奏陳民間利病五事夏四月特拜集賢學士仍還行臺二十五年戊子夏四月子大光生二十六年己丑公年四十一歲夏四月子大本生時首相僧格專政法令苛急四方騷動公乘傳入朝奏疏劾之僧格怒凡六奏請害公上皆不允命臺臣館公俟命二十七年庚寅春有㫖還公行臺未幾大臣交劾僧格如公所言明年僧格伏誅二十八年辛夘夏五月子大來生二十九年壬辰夏五月召公及姚燧陳天祥等十老臣赴闕賜對勞問甚悉三十年癸巳公年四十五歲秋七月拜正議大夫福建閩海道肅政亷訪使冬十二月至福州視事興學明教吏民甚畏愛之大徳元年丁酉公年四十九歲春二月子大觀生冬閩海代歸四年庚子公年五十二歲春二月拜江南湖北道肅政亷訪使秋閏八月至武昌視事首治行省平章家奴之為民害者上下肅然冬作歲寒亭于署後有詩文題詠一卷五年辛丑公重建南陽書院㓜嘗游習其處有自作記文七年癸夘公年五十五歲湖北連年大祲公以公田禄入悉賑貧病之不能存者惠濟甚衆是年冬代歸八年甲辰公年五十六歲是年秋公築室盱江城西麻源第三谷建閣藏書數千卷扁曰程氏山房復作三賢祠于左祠孝肅宣慰侍讀三公其地即晉人所謂華子岡者有自作藏室銘并陵陽牟巘記文臨川鄭松圖誌冬十一月召拜翰林學士知制誥同修國史九年乙巳夏六月加商議中書省事專使驛召赴闕秋八月公拜命作晉錫堂于家呉文正公記之冬至京師十年丙午春公奉㫖撰世祖平雲南碑文成賜其省臣伊蘇岱爾刻石㸃蒼山夏亢旱暴風星變公應詔集議致灾弭灾其目有五曰敬天曰尊祖曰清心曰持體曰更化十一年丁未公年五十九歲冬十月拜山南江北道肅政亷訪使十一月武宗即位素熟公名留為翰林學士知制誥同修國史商議中書省事特加正奉大夫公避御名以字行至大元年戊申公年六十歲是年公奉詔修成宗實録撰追尊順宗諡册文成秋特制贈父翔卿正奉大夫㕘知政事郢國公諡孝肅母李氏郢國夫人仍授長子大年承事郎同知南豐州事二年己酉夏五月驛召公偕平章何瑋左丞劉正等赴上京議政令尋命公奉使湖廣行省銓廣海吏選冬竣事移疾歸三年庚戌秋九月復拜山南江北道肅政亷訪使四年辛亥公年六十二歲春二月仁宗即位分遣詔使召老臣尚文蕭􅆽等十六人赴闕公與焉夏四月賜對便殿六月授淛東海右肅政亷訪使秋九月拜翰林學士承㫖資善大夫知制誥兼修國史皇慶元年壬子公年六十四歲是年春公奉詔修武宗實録成詔陞翰林院位從一品有謝表及進三朝實録表冬十一月進公榮禄大夫二年癸丑春三月上立中宫命公撰玉册文成夏六月旱廷臣集議公獨舉成湯桑林六事自責為可行時宰不說上特遣近侍賜上尊勞公秋詔偕平章李孟參政許師敬議行貢舉法議定上命公草詔行之撰國學先聖廟碑文成延祐二年乙夘公年六十七歲春奉詔撰加上皇太后尊號册文成勅待詔畫公像儒臣製贊以賜是年公得末疾尋愈三年丙辰公年六十八歲春疾復作公上章乞骸骨歸田里上不許命尚醫給藥近臣勉留特授中子大本承事郎郊祀署令俾侍公疾夏得請南還特加光禄大夫降制追榮三代贈官錫諡賜上尊儷錦命廷臣祖餞大本乘驛侍行諭行省有司問安否勿令致仕秋九月公過呉城山告祠祖父母修葺壠墓長子大年任行省檢校官謁告侍養冬十月公至盱江四年丁巳初上嘗勅平章韓國公李孟賜程氏世徳碑文成傳至盱江至是公力疾拜命戒諸子宜盡忠孝以成報國之志仍令大本還京供職五年戊午公年七十春三月十五日丙子楚國夫人俞氏卒年五十八秋七月十八日丙子亥時公薨於正寢六年己未春正月庚申諸子奉二柩安厝于南城縣可封鄉繞堆大磐山治命也秋門人應奉翰林文字掲傒斯狀公行業上于太史氏泰定元年甲子集賢大學士王約言于朝請加公封諡事下太常定議博士栁貫撰諡議上聞二年乙丑秋七月制贈光禄大夫大司徒柱國追封楚國公諡文憲至正十八年戊戌監察御史王彛等言故贈大司徒程鉅夫累朝簡注中外具瞻為時名臣為國元老宜錫功臣之號并賜神道之碑以備褒崇以彰激勸十九年己亥夏四月甲子丞相太平傳㫖中書命參議兼經筵官危素撰神道碑文集賢待制趙雍書丹同知太常禮儀院事周伯琦篆額文成以賜公孫翰林應奉世京仍勅行省守臣樹碑墓道公生丁時艱刻意勵學以研精性理為務幾二十餘年已而運遭革命入事世皇寵遇優渥出入禁闥獻替輸忠一以撫安羣黎為第一義建言興建國學搜訪遺逸臺憲參用南北之人科目取經明行修之士敷陳利病讜議時政摧抑權姦責弭灾變上皆嘉納之故能出膺澄清之寄入居謀謨之職立綱陳紀為時名臣始終一節表表愈偉累朝眷遇逈出等倫混一以來朔南之士一人而已其立身行已經綸大節太史氏既已書之公所著玉堂類藁九卷奏議一卷詩文三十五卷先正亦已序述詳備矣不肖孫復摭取歲月大槩次為年譜綴於文集之前俾讀者開卷有所考觀立言君子毋誚其僭踰可也至正二十有七年丁未春二月望諸孫世京百拜謹述雪樓集年譜
