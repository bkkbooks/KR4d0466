body:
  text: 雪樓集卷二十九元程文海撰詩薩迪勒黙色謙齋御史瑞竹江南御史彈琴處揷竹為楥竹自成不見稚叢縁節上渾疑隣筍過墻生清隂已比甘棠愛直氣先占衣繡榮廻首荆䑓舊亭下髙枝應有鳯凰鳴龍眠二馬二首蕭蕭騣尾傍塵埃曽際風雲萬里開却憶少年河畔路鳴鞭落日驏騎回廻顧飛龍玉轡頭還思閒卧逐犂牛何時放與江南好草軟沙平得自由張鏔君哲清節堂張君少也孤鞠育賴母慈母也貞且潔堅苦力自持教兒讀詩書不見兒貴時兒豈不欲養養已無所施娟娟寒梅花皎皎叢菊枝芳時苦氷霜未春已離披天地何不仁古今同一悲巍巍清節堂行坐常見之何以報阿母勿負母所期聊為清節吟庶補南陔詩吳道人息庵厭盡人間尚愛詩結茅投老已嫌遲翛然鳥倦雲歸後正是風清月白時斫桂欲將枝并折畫江漸與扇相遺死灰槁木蒲團上又到身中子午期楊唐州挽詞子士允天道由來逺楊家重可憐阿兄忠見嫉乃弟善無年往事成孤憤修名竟兩全唐州千載意有子幸能傳蘇李相别圖漠漠隂風吹草低蕭蕭漢節對羣羝少卿心事元無異家共長安萬里西淵明髙卧圖手撫髙松石更竒披襟脫屣醉眠時壺中酒盡琴無軫說着羲皇總不知鄄城陳景新賑粟辭賞伏波躬耕輕萬斛卜式還聞辭爵禄潁川太守復何人往往挾持求大欲陳君好義不言功猶落玉堂揮翰中見說鄄城諸邑子近來相尚起廉風衛州王景先省郎祖母八十萱草花開宿雨乾北堂稱夀玉杯寛幾千蜀道陳情易八十京華就養難忠厚已従今日見艱虞莫忘昔年看阿婆心事諸孫福河朔聲名庶不刋周南翁悠然軒開軒臨四野野草細扵毛白鳥湖上起青山雲外髙援琴忘舊譜洗盞對新醪落日䦨干角詩成漸逼陶寄題郎官湖太白祠亭黎僉事崱景髙所脩昔持黄華節觀風漢陽城城南十頃湖空有郎官名太白不肯顧髙祠風雨傾亟召郡博士為我時經營我復棄官去無由觀厥成再以王事臻夙夜有期程豈無濟勝具對面慙髙情安南古交州黎子真豪英好事竭肝膽摛文嚴且明連年湖上住日愛湖水清殘碑出沈翳繚垣制縦横象設儼邃穆飛簷欎峥嶸蒲荷取次發竹樹皆光晶素月濯古華澄波送新聲黄鶴怨崔顥鸚鵡愁襧衡歘若張李来復與岑輔并仍歌五字詩酌以白玉觥由來磊落士况值天下平萬古為一時四海為一泓神交溟涬外氣合如弟兄遂使郎官湖􅂱􅂱流芳榮我歸玉堂署君亦来上京示我新記文忽疑夢乍驚題詩謝謫仙心與孤鴻征徐㢘訪母大梁進士邢家女嫁得徐郎在覊旅姑章但識寄来衣阿婦未聞堂上語姑章不待阿婦歸升堂空有淚沾衣可憐積善生男子不見婦歸兒貴時諸姑歸閻新無夫迎歸事之如舅姑有男我娶女我嫁阿姑自言今世無頃聞父死惟老母輦致平陽奉朝暮邢家子姪各有歸誰識良人心更古良人已沒諸孤長富貴聨翩照鄉黨門庭日廣車馬多但恨姑章隔泉壤寄鄭信卿參政闕下相看未忍分過門誰料不逢君竟叅華省江南去定有新聲天上聞夜静每勞瞻紫氣春深幾欲和停雲豫章䑓下南歸路何日論心到夕曛題陳天賜載之詩後亹亹辭家日悠悠上國心闗河題欲徧雲海夢初深卷裏英雄迹人間正始音成連舟已逺空對伯牙琴書韓氏八十詩卷宋筠作序八袠更齊年兒孫孝且賢衣冠驚乍見今古㡬能全徳是耆期本家宜福禄綿國初人物在獨對宋公篇王仲庸八十李受益𨽻書養志以扁其堂大興王氏世忠厚乃祖向來醫國手活人千萬不論功富貴浮雲亦何有隱君八十字仲庸同牢孟光夀且同妻賢子孝萬事足有善可樂酒可中皇慶天子初嗣位賜帛髙年興孝治此時二老拜恩榮新搆華堂名養志李侯八法元蒼蒼奮筆為挽千鈞强三牲五鼎亦易得楣間歘見三鳯凰薄俗悠悠不堪數君家盛徳天所與聖朝望治猶渇饑敢信今人不如古羡君有子真賢孝澤滿鄉閭犯無校祝君夀命金石堅永與聖朝扶世道賀亨復都事榮親堂勸忠褒徳感恩私風木無情喜又悲五等已分茅土貴百年莫忘蓼莪詩但令報主存先訓更覺榮親永孝思遥想茫茫濟陽路棠棃千樹擁穹碑上賜潘司農龍眠拂菻婦女圖拂菻迢迢四萬里拂菻美人瑩秋水五代王商盡作圖龍眠後出尤精緻手持玉鍾玉為顔前身應住補陀山長眉翠髮四羅列白㲲覆頂黄金環女伴駢肩擁孤樹背把閒花調兒女一兒在膝嬌欲飛石榴可憐故不與凉州舞徹来西風琵琶檀板移商宫娛尊奉長各有意風俗雖異君臣同百年承平四海一此圖還従袐府出司農潘卿拜賜歸㸃染猶須玉堂筆天門蕩蕩萬國臣驛騎横行西海濵聞道海中西女種女生長嫁拂菻人題濟南安氏章服卷笏滿床頭酒滿鍾家能孝友國能忠一門又見安員外八葉寧論漢侍中賸種葵花傾曉日深培荆樹貯春風江州陳氏三千口七百餘年㸑養同趙一徳季潤忠孝詩南昌趙氏子早嵗遭艱虞骨月不相保萬里為國俘釋縛燕趙間遂為鄭家奴蕩蕩天宇濶亹亹日月徂轉瞬四十年朝夕勞且劬主翁豈無恩不得齊民俱主翁父子沒悉力持且扶有客南昌来解后談厥初問知家中事五内猶摧刳父兄死未葬有母八十餘再拜主母前涕泗下漣如委曲陳其情願母哀其愚主母為之悲暫許奉康娛星言整去装策馬登長途山川日以異旬朔奄相踰日暮不留行忽已臻其廬升堂拜慈母再世得相於慟哭父兄前隣里皆欷歔生者幸少慰死者歸黄壚主恩不可忘母養不可虚黽勉與母辭復返鄭氏居主母驚且喜左右咸歡呼趙子令至前授以咫尺書汝孝通神明汝義薄天衢永為故鄉民汝去勿躊躇趙子再拜謝洒血滿襟裾主恩一未報何用早歸歟主翁積忠勞封諡焉可無穹碑表墓畢逝将還故墟主翁有遺嗣無罪倐見誅奮身伏王庭誓死訴寃誣白日廻其光天道劃昭蘇豈獨全鄭門髙風動皇都滔滔天下者廻首成榛蕪安知磊落人淪此氓𨽻徒飛檄下九天大字旌其閭郁郁文獻邦盛事暎梅徐母夀渉千齡聞有駟馬車吾聞善必報此理天不渝我作忠孝詩永激頑懦夫送傅道士新拜天書領故山飄飄歸鶴振髙翰九霄風露秋標格萬里雲霞玉佩環舌齒存亡真大訓精神清净勝還丹由来孝敬神仙事莫遣山林有厚顔趙際可天馬圖天馬出西極神龍不能追目為紫電光歕作風雷飛天馬不常有晝中或見之見之夢寐不可得得之不用終何為穆王無復瑶池宴漢武秦皇不相見何當真馬生渥洼来與天子駕鼓車趙母八十梓潼八十趙氏母内外之孫廿又五生長兵凶老太平盛徳冲和天所與臺中濯濯兒更賢捧觴百拜阿母前願将忠孝報天子桃花海上春如烟和陶詩秋風吹庭樹宻葉潜銷落𤣥燕寧久翔白鴈紛南泊清晨得尊酒㝠然還獨酌年運倐徂謝春秋焉能託依依仰先哲緬邈空述作江漢日東流寒花繞叢薄開卷撫休運振衣望丘壑葛老竹軒開軒忘寵禄種竹作幽人霧罷清隂合霜侵粉節匀虚中堪體道直上似持身應有同心者移家與卜隣早行圖萬山廻合路紆縈獨策羸驂欵欵行却憶麻源三谷裏畫橋擕酒聽溪聲寄喬達之東魯相逢兩見秋忽傳南牧古筠州向來不負甘棠訟此去真分黄屋憂政裂多門従古患民罹百病自今瘳中朝人物如君幾縦樂江南得久留豐城熊蒙泉挽詞故國三吳暮橋門六舘秋文章歸自誌賔客拜荒丘但覺風流逺誰將嵗月遒青山延慶里落日不勝愁夀李秋谷薇省星辰近鑾坡日月遲上公開瑞旦舊學蔚明時玉琯微陽動宫壺喜氣随已傳蕭應昴復說傅騎箕琥珀蒼松液珊瑚碧樹枝茂生豪傑士来作太平基憶昔公初起方時事已隳艱虞身保障謀議國蓍龜赤手除蛟虎丹心見藿葵一朝周典禮萬世漢官儀宗廟重鍾簴乾坤再柱維泰階寒耿耿遐壤日熈熈大小陳綱紀神姦鑄鼎彜桂枝增秀發蔓草極芟夷鄉校惟聞頌朝廷總得宜端由天子聖亦在哲人推昭代才何盛斯文柄獨持立言成凖範析理貫書詩餘事歸青史新篇藹素期朝趨雙闕内夕夢北山陲顧問常前席論思每執規力援寒畯溺已視庶民飢姓字喧童稚仁恩被等衰功髙門似水心静爵空縻報主期堯舜為臣志吕伊山河分陜地勲業太常旗早達謙盈理居多寵禄辭戰兢存夙夜贔屭負安危即此觀天道宜能永福綏直為天下祝不是老夫私次韻秋谷西郊書事車馬城西何處村青山緑酒鴈紛紛天開勝日晴如洗地轉微陽氣欲醺應倚長松詢白髪還臨絶澗望紅雲髙賢自古閒難得夾道争瞻李相君贈李肖岩海内畫手如雲起冩真近說中山李一入都門天下聞半紙無由及田里羣公列卿日闐咽過眼得皮仍得髄含毫泚墨笑且談忽見威儀在屏几精神遒遒出眉目炯若寒蟾映秋水自言貌盡千萬人不獨形殊心更異邪正惟存瞭眊間英雄多在風塵裏我聞其人未曽識姓名籍籍常在耳皇慶元年秋九月退食詞林方徙倚黄花遶屋白日寒風罷天髙鴈如蟻忽従集賢趙司直剥啄叩門到堦戺掃堂展席開清尊相對蒼然感衰齒京華出入四十載顧影周行若疣贅只堪杖屨老林丘何用形容汙縑紙解包拂硯起盤礴落筆童奴亦驚喜平生傳冩盈筐箧豈有踈髯白如洗懸之素壁日相看従此嵗寒吾與爾黄金百鎰未能報贈君肖岩兩竒字君王思治方旰食夙夜求賢每虚已願君莫問江南北徧厯幽遐閱多士魚塩版築鼓刀徒今人豈無古人比莫待九重勞夢寐便合圖歸獻天子緝熈殿御題紫薇花扇面夀郝中丞十一月廿五日江南千里花茫茫紫薇静對中書堂畫工㑹得無窮意一枝宛轉留芬芳緝熈殿裏日月長御筆落處蛟龍翔花前未覺風流逺扇底猶含雨露香烏府先生黄閣老髙敞新齋坐霜昊聊持此畫託千年従今永伴中書考夀白雲山人白雲山人起西域陽春為心玉為徳初従南土佐元戎萬里聲名已輝赫頃得雄藩展驥足武昌城裏初相識黄鶴秋風庾亮樓大江落日曹公壁此時㝡好安太守旦暮過従豁胸臆君為郎署向河南我欲江西老一庵再承天詔還京闕君已中書坐賛參萬國山河歸美化千年治亂入髙談紫薇紅藥天光轉翠竹蒼松客夢酣聖明天子今軒昊敬老尊賢古来少皇恩忽先一陽回大政仍資共探討天教初度臨長至我識仁人多夀考安得移家與卜隣嵗晚風流成二老禹柏圖我昔觀風江漢域大别寺中觀古柏皮空骨立二千尺扣之鏗然若金石雙龍盤拏爪角怒白晝歘恐風雷黒小枝旁出勢蜿蜒復似逰龍顧深澤蒼蒼數葉森北向貞心不受螻蟻蝕我時見此獨驚怪僧言相傳禹所植别来夢寐常髣髴恨不圖之堂上壁安南國王住漢陽府中好事黎侯崱皇慶元年同入覲忽持墨本來相覔開緘蕭蕭朔風起半幅生綃萬鈞力恰如大禹疏鑿時天斧雷硠鬼神役自言得之寺僧手寺僧得之故侯宅舊本糢糊鎻暗塵上有東坡手題墨臨摹欲遣天下知國王命我來索詩此柏㑹有摧朽日此卷豈有消磨時我聞此語坐太息神禹至今㡬興衰人間老樹亦無數此樹應以人而竒門前馬鳴君欲歸黄河東去浮雲西歸語山僧謹護持莫令此柏凌空飛次韻吳閒閒梅花故園爛熳看花處愛月畏風愁夜雨漱芳亭上一相逢忽似江南花下語薄裁瓊靨嬌難狎細剪氷鬚繁可數却憐主人閒更閒病眼摩挱吟欲舞亦擬南城覔數株安得萬錢買連土題蘇黄遺墨并序伯杭郎中示余所蔵蘇黄二帖惓惓忠孝如見其心兩翁遺墨流落天下者多矣君獨寳此可尚已夫為之詩曰兩翁心事幾人同二帖惓惓孝與忠惟有太平賢御史時将舒卷挹髙風送羅元發教授應昌擕書别帝京王國得儒生路出開平逺雲連絶漠横鳯瑶諷夕吹龍海夾寒城善教無南北因成萬里名送髙君尹尉氏聞君别親故宰邑出王畿青天大梁道落日黄河西尉氏古稱劇長材無不宜民心如蹄涔微撓即濁之但使各生遂豈在信嚴威撫字考寧下㢘信謹所持勿謂百里小可為天下師宿麥日夜深農務将及時君行不可遲君㑹不可期努力樹嘉政足慰平生知九歌圖瀟湘南下洞庭深無力能援楚國沉縦使九歌堪入畫何人冩得放臣心題雪景圖五首竹所每徑造雪溪俄夜逰人生適意耳何去復何留家近長安市居然静勝喧為言賢令尹不為雪闗門布被冷扵氷紙忩明似月推枕理殘書未肯甘汨沒天地玉清境郊原瑶樹林無邉詩興在只向㶚橋㝷介矣閔仲叔髙哉井大椿夫君見何晚大雪不干人舜舉梅竹折枝吳興畫手早相知粉墨凄凉嵗月移惟有寒梅并翠竹京華相對獨題詩黄華老人墨迹讀罷黄華水調歌漁簑鶴氅奈情何溪邉梅樹湖邉石怪底新年入夢多送王義父還黄陂重建河南書院少年匹馬逰淮浦雙鳯亭前憶同譜黄陂老尉有佳兒伊洛洸湟接東魯黄州精舍久寂寥河南故號無今古江漢奔渾想源委宇宙褰開見規矩惟有中書白雲老幾度扁舟為凝竚思賢撫迹意無極慷愾伊誰闢榛莾郡人好事王義父手擲千金如糞土去年赴調來京師解后乃與中書語願公早歸白雲下看我峥嶸抗新宇我有良田二百畆永與諸生共勤苦京師聞者皆嘆息磊落新篇慰覊旅期君努力成此志坐為江山發矇瞽文光夜揷翼軫寒聖道春融天地溥待君業就當識之盛事千年照淮楚謝西溪君住西溪第㡬灣青原白鷺思漫漫灘聲夜應書聲起樹色朝連野色寒昔在蓬山歸是夢今㳂湘水去為官過家誰共臨流賦試拂沙頭舊釣竿成翛然孝感詩世祖舊臣成太史笑人拘忌說隂陽但憐墓草臨衢路敢許棺花結祲祥千疊香山新改兆一枝玉樹已傳芳由來孝是昌隆本狐首青烏信渺茫寄商季顯㢘使商侯守官四十年清如氷壺直扵弦平生知己惟霜竹卷蔵淇澳懐渭川七閩同寮許相寄日月悠悠今幾嵗每過聊城不遇君想見珍緹鎻寒翠玉堂望望北歸鴻何日霜枝在眼中不是人間無處得卷舒長揖故人風近聞歸自西江側况復家居臨大驛也知愛竹仍愛詩若得吾詩當兩易雪樓探梅圖竹樹參差老不才四山壁立雪皚皚凌寒何許龍鍾老獨對梅花待酒來玉荷杯夀内曾預方平㑹金盤捧玉杯蓬萊幾清淺又見碧蓮開天山胡氏春暉堂春暉堂前蘭葉齊春暉堂後萱草肥阿兒日晏王府歸上堂稱觴舞僛僛兒能讀書母所教兒能為善母所導兒孫滿眼才且賢母恩深厚何以報天融地和日載陽願母夀年天地長利翥彦祥樗亭四詠柏龍庭前老柏苔蘚澀拔地盤拏奮鬚鬛變化愁随霹靂飛摩挱若有風雷入主人獨抱嵗寒心苦節貞姿日月深門外黄塵三十丈何時乗此去為霖松石地底流脂成琥珀地上枯枝并為石皴皮剥落棟梁材瘦骨崚嶒風雨色根離葉盡碧枝空此心不轉與誰同前身不是赤松子安知獨非黄石公太湖石震澤波濤日夜翻澤中老石久都穿何人掇取樗亭看白玉圍腰下九天春月菊開遍幽花不待秋不當重九更風流唯應細嚼枝頭蘂爛熳青春醉不休真樂亭闗右山水邦竇氏烟霞人讀書不求官為樂得其真孤亭抗林表嘉樹藹氤氲野色雨餘逺天香風定聞見月為素秋逢花即芳春詩成寄逺客酒熟分比隣閒雲時獨留馴禽日相親一與物情遣安知賤與貧送李宗明賈公門下客李氏舊名家萬里辭京去孤舟背郭賖吳山新店雨楚樹故林花定有懐賢者逢君久嘆嗟子昻為閒閒畫竹石作别仙舟發御河别楮洒蒼波雙樹尊前出叢篁石上多月明行亂影風静倚柔柯還似看棊處㝷雲入薜蘿孤雲渺渺従何起亭亭只自飛朝随風鶴去暮逐雨龍歸幾度超滄海多應㸃翠㣲何時能借我裁作羽人衣夀額森特穆爾知院四月初三日開國元勲後明公食肉飛山河雄帶礪社稷寄樞機禁直星辰近天光日月依因君弧矢旦梅實記初肥白鶴歌并序右丞李君明之性至孝弱冠時父有罪當刑君請代之暨赴刑所世祖皇帝宻㫖緩刑遣近侍候之君欣然就死略無不滿意馳報詔並釋之母病盲君日䑛其目目乃復明已而為昭睿順聖皇后所知擢為大護國仁王寺總管寺之役方興髙深大小之宜君實度之梓匠工役之勤君實董之簿書之期㑹錢榖之出納一無私焉迄致重門複殿金碧交輝巍巍煌煌為京師諸寳坊冠冕一日羣鶴翔舞所居簷間人皆以為孝感所致翰林王鹿庵李韋軒商左山諸大老賦詩美之繼作者無慮百家凡數大軸皇慶二年夏余被㫖撰碑文至寺與雪菴宗師偕來徜徉觀覽緑隂鬰然師指庭中喬松鉅柏曰此李君手植也今年㡬八袠官且一品子貴孫茂而君方聰眀康强日婆娑嬉逰扵是間其人必有大過人者言未既君擕所蔵瑞鶴詩卷出示且索余詩余既美君孝行之盛又悲卷中諸老無復平昔乃作白鶴之歌以著余感云白鶴來羽毰毸舞且鳴久徘徊白鶴非鶩雞何由致庭階主人孝行深可哀父當刑子代之天子哀其情父子得並生母方盲子䑛之天地哀其誠母目得復明主人孝行世所驚白鶴雖禽鳥豈無性與情白鶴去還復顧青天遥遥髙且逺但願主人世世還相似白鶴長來庭下住劉處士挽詞處士真終始文康若父兄各求千載志豈為一時名花下琴尊在階前竹樹榮精魂渺何許日暮玉河聲題何澄畫村田樂番番白叟宛宛黄童飽食而嬉樂與嵗同白叟番番黄童宛宛今日何長舊日何短明君在上良臣在下今汝樂只誰識憂者右三章章四句楊士允郎中将赴江西省幕出示勉庵記因題其後兼以贈行髙齋對時雨竹樹藹青青手披勉庵文忽念君子行君子今何行江右撫列城君子當世彦累世飄華纓忠貞所服襲孝友日光明自従列中朝海内仰清聲云何有逺適天意在黎氓顧惟大江南去國數日程貢賦天下九舟車日無停有民此有財暴本必傷生井法廢已久貧富始相形貧以食其力冨以蓄其贏貧多富恒少相養乃相成俗吏守一隅上下蕩無經民心國之本可正不可傾願君執其綱一視使其平矧今用文治禮讓漸可興勉哉君子政素學此足徴題楊士允志雅堂楊君志大雅百行繩祖武庋書充棟梁列噐雜今古退食即披玩朋來共容與書以味其道噐以觀其度蔵之貽子孫用之奉明主題米元暉忘機圖扁舟輕不渡斷岸斜初轉白鳥波上閒青山意中逺已知江湖樂還驚嵗年晚海翁那有機相忘自應遣菊圃王朋益挽詞忠讜人皆忌剛㢘性獨存初還淮土節又作魏城藩勇退中年志全歸聖主恩悠然堂下菊白露滿空園封氏節婦中山節婦人所無年二十六身孀居朝躬蠶繅夜辟纑上事尊章下惸孤自食苦淡奉甘腴力持門户勤且劬只今春秋七十餘一生皎潔氷霜如堂前隂隂槐栁榆堂後藹藹萱花初兒衣斑斑白玉壺方瞳素髪紅氍毹阿婆髙節摩天衢阿孫聲名滿皇都阿婆夀命金石俱阿孫世世髙門閭中山節婦人所無題楊紫陽跋盧諮議詩卷二老已青山斯文尚世間傳家欣有後開卷若承顔治亂何堪說乗除只等閒秪應存世徳珠去自能還南忩緑樹隂隂鳥自啼薰風寂寂日長時客來欲問南忩意庭下蕭然半局棋送司徒錫喇卜法師歸秦州秦州法師沙羅巴前身恐是鳩摩羅讀書誦經踰五車洞視孔釋為一家帝聞其人徵自遐辯勇精進世莫加視人言言若空花我自翼善刋淫侉雄文大章爛如霞又如黄河發崑阿世方浩浩觀流波五護尊經鬰嘉䶗受詔翻譯無留瑕辭深義奥極研摩功力已被恒河沙經成翩然妙蓮華大官寵錫真浮苴舍我竟去不可遮青天蕩蕩日月賖何時能來煮春茶虀庵瓮裏青黄碧緑卷中㓜婦受辛欲為氷壺作傳酒醒雪夜何人薛氏佚老園客至自洛陽為說永寧城城南十畆園風物有餘清園中有髙堂佚老以為名紅紫昻復低時至自敷榮廻溪䕃弱栁長渠泛落英好風來無期幽鳥相和鳴况有賔與客美酒長共傾借問主者誰闗輔舊諸生為官伊洛中扵焉委餘齡斯人骨已朽但有名與聲兹園雖未荒令我懐典刑幸従公子㳺同列在王庭題詩繼茂躅永言播芳馨陳氏宗敬堂堂前衆花發堂上春酒香上有百嵗翁語笑何琅琅下有四世孫醉後相扶将翩翩舞且歌五綵曳朝陽祝翁金石夀勸翁白玉觴朝吟屋東麻暮賦池西楊富貴豈不榮孰若夀且康園有果與蔬田有稻與梁甘腴豈不美稼穡不可忘古來賢達人敬仲誰敢當卜齊事已逺遺𦙍尚髙唐筆歌贈張進中宣城諸葛無消息京師張氏雄江北張氏之筆如秋鷹神王骨勁随縦横又如囊錐乍脫穎毛生厯階楚王驚朝廷年年冩佛經千人萬人集佛庭張氏施筆知㡬萬寳蔵赫奕騰金英張氏施筆真施筆有口未嘗言福徳至尊得之猶愛惜衆人區區豈常得張氏初年學劉逺劉逺之名翻有靦始知一技足名世况乃窮年究墳典我行偶出鍾樓南馬前長揖求停驂坐我土床勸我酒不得公句終身慚學書豈但記名字用筆貴能知筆意莫愁世無王右軍且合相我太史氏送武當張真人赴召祈雨南歸聖主憂凶嵗真人下碧岑雲辭武當黒雨入薊門深獨抱回天力常存濟物心兩宫宣賜罷歸鶴杳沉沉張儀之餘慶堂炎宋南遷日羣公従六龍徳門張氏最戚畹主恩重國敗家仍破身全慶尚鍾髙堂帝城裏千載亢名宗集賢直學士文學山挽詞身是忠臣後心懸聖主朝瀛洲纔接武炎海逺乗軺敢謂都門别俄成楚些招青原在何許南望颯風飈曹承㫖擲雙陸得畫犬一卷索賦四海為家天地開諸侯方物集燕䑓豈惟雉自越裳至亦有獒従西域来依依母子䑛且乳或寝或行縁復顧區區禽獸猶如此况乃君臣并父子夜户不閉不可忘犬四方無虞不可忘戰黄金千鎰璧十雙不如曹公一擲得老厖畫師畫此豈無意安得猛士守四方林縣尉救火懐寧林少府為政近来無大火中宵起驚民四面呼炎烟和月黒猛勢挾風驅即恐全城燬那能大屋塗朝衣當烈熖頓首望天衢臣職多遺闕斯人何罪辜誠深如見帝言訖欲忘軀倐若銀河决仍将碧海輸參差餘萬室歡舞立千夫火本無情者君真有徳歟存心皆惻隱何物不沾濡天地原無間豚魚尚可爭吾詩非溢美庶作後人摹長江歸櫂圖靄靄天始晴蒼蒼景将晚江波日東流逰子何時返張𢎞道挽詞辭家随叔父結髮學飛仙短死非闗命長生不在年夀寧増母筭心已悟真筌何意人間事猶勤聖主憐姚文獻公汾晉水玉山和尚二詩墨跡汾晋祠前水自流玉山老衲亦荒丘數行殘墨姚公帖霜日閒看雪滿頭題樊川别墅嚴家賣藥長安市種徳流芳已三世孝思獨在神禾原更築樊川植蘭桂亭䑓髙下春風香神禾􅊊􅊊正相望白雲時負䦨干起翠柏應参雲漢長終南山色年年好富貴榮華似秋草但能嵗活千萬人對酒看花可終老秋江釣月荷簔非避世持竿不求賞夙抱江海心寧為利名鞅天明紫烟裏日暮清波上四顧無人知孤舟自来往畫兔君王罷㳺獵重徳不重射狡兔秋田中食粟得閒暇雲雷詩四十年前春夢裏魚龍晝起陸成池雲收雷罷須臾事正是青天白日時題許仲仁墨跡殘雪詞林退食時小忩開卷鬢如絲音傳正始誰同調氣逼元和稍自持文字不随前軰盡風流却許後人知霜清日冷梅花瘦獨對爐熏看欲癡夀李右丞八十八袠康强似壮年平生忠孝得扵天居隣金地心如佛坐對雲山興欲仙瑞鶴時聞賔客賦綵衣争羡子孫賢功成名遂身先退久視長生自有傳張母貞節歌罷柏舟心欲無此生寧用表鄉閭雲中白髮張君母絶勝人間偉丈夫題歸來圖山多兮險幽龍騰兮虎逰山人去兮乗雲忽歸来兮躡浮縣厓兮木欄䕃蒼松兮望流泉流泉兮在下白團團兮誰宇岩扉兮石户去不見跡兮来無所餐露芳兮月腴将子無去兮吾與同居黛石山夀張宗師蓬莱山上白雲根鑿得嶙峋黛色鮮不受神人梁碧海曽供媧氏補青天懸厓日暖生靈液深谷春回響細泉看到後天終不老長盛香案玉皇前江臯雪霽圖茫茫積雪霾四野一葉扁舟順流下不知前村雪㡬深早有擕琴探梅者小橋初日暎青林隔岸樓䑓􅋍玉岑對此窅然思郢曲朔風滿面獨長吟王東泉八十二首懸車三十載閉户自長吟鳥語日移席花香春滿林龜蒙五畆宅箕頴四朝心獨往吾雖愧當時憤更深先生今八十千嵗以為期花竹年年好溪山處處宜東阡復南陌美酒與新詩放浪樊籠外世人那得知送喻道士歸漢中白雲觀秦公有揖客身着羽人衣玉井一為别白雲長自飛還従京國見又向漢中歸廻語故人道吾生已息機汪忠卿御史梅庵家住新安生虎林繡衣風節老梅心客来若問封侯事笑指庵前月色深胡景清得母三十餘年失母慈闗山阻絶塞鴻悲一朝相見灤河上却話初逢離亂時題元裕之贈劉濟川詩後二首濟川齊王豫之孫赫赫齊王化古墳還従文字識王孫王孫不向齊中老目斷并州何處村元子文章學老坡百年人物擅闗河風流併逐浮雲㪚况我看詩鬢已皤王梅叟溪山對月圖明月照飛瀑倒瀉清溪曲溪上一株松亭中人似玉題盧仲實歸養詩卷昔君滁州佐戎幕棄官歸養何其樂今君調官向京國心雖欲養寧復得一别滁州已十年阿翁三載隔重泉平生為養可無恨但恨無由再相見東風吹花楊栁新金河水暖波鱗鱗京華之樂春復春少年馬上知何人雪中行吟七賢圖長庚自是謫仙人子美逢時稷卨臣風雪茫茫五君子凍吟猶得望清塵送呉思可守汀州同袍趙濟寧夙昔說君名京國初相識閩山忽逺行分憂天子寄平政庶民情但使心如水能令瘴癘清葛推官平反大梁秋官仁且明刑者復續死者生昔無一兒慰目前瓊枝玉樹今森然力田種苗苗或荒君家種徳子滿堂子孫世世不可忘用韻賦解安卿雙頭牡丹并序瑞雲紅牡丹兩花并蒂詩人以為解氏子孫競爽之祥是矣而詩中比之麗人亡是公也輙用韻反騷並蔕開花自一竒人鍾和氣物何私文華軾轍趨京日風韻機雲入洛時定與子孫呈上瑞肯同兒女逞多姿䦨干穩護紅雲著實在枝頭驗我詩送扎法經歴赴山西幕我昔居南䑓與君日相従回首三十年謂君已飛翀及兹復相見微名不償功雖蒙聖主知進退何従容好爵誰不縻君視如飄風寜為正直窮不為壬巧通歘起佐西幕激烈孝與忠别我升車行念我雙鬢蓬君行展髙材一罄平生胸我志在丘壑睠焉息微躬冥冥朝陽鳯夏雨生梧桐寂寂澗底松蒼然嵗寒中朂哉君子心庶用存始終雪樓集卷二十九
