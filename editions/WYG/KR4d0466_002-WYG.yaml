body:
  text: 雪樓集卷二元程文海撰玉堂類藳制詞平章布拉吉達故曾祖父蘇布台贈効忠宣力佐命功臣太尉開府儀同三司上柱國公封河南郡王諡忠定制龍虎風雲昔共基於鴻業河山帶礪今宜表於駿功矧茲閥閱之崇亶有淵源之自具官某故曾祖父某夙彰孝勇妙藴機權繇侍子而摠戎旃前無堅敵部降人而專帥馭出有勁兵為王前驅靡國不到汴水之恩波未竭牛關之妙筭若神忠義傳家勲勞奕世生為柱國亦何愧於古人墓表征西更覺榮於異日宜超爵列并侈儀文胙以名邦錫之美諡盖將為萬世之勸豈獨慰九京之思於戲披荆棘以立朝廷既無忘於先烈聽鼔鼙而思將帥尤有望於後昆尚爾明靈服我休寵可故曾祖母黄古台氏追封河南郡王夫人制功成治定念股肱肇造之勞善積慶流亦伉儷相資之徳爰從夫爵用表世勲具官某故曾祖母某氏稟專靖之姿作孝義之配兵間積苦回文無竇室之詩膝下承顔養志有姜妻之鯉故能悉心事主結髪從軍教忠實佐於興邦樹義允儀於中壼宜疏湯沐庻廣漏泉象設六珈廟食三室噫締構經營之匪易家國何殊哀榮終始之所加閨房與及眷惟淑質歆此寵光可故祖父烏蘭哈達贈推忠宣力定逺功臣太尉開府儀同三司上柱國追封河南郡王諡武毅制孝子慈孫之志身欲極於顯揚出將入相之家禮何嫌於隆盛顧茲節槩實貫幽明具官某故祖父某胄出名家光分列宿憲宗啓聖勤如博陸於昭宣世祖造邦功過淮隂於齊趙風披霆擊地闢天開方期文軌之同大紀旂常之美何滕城遽啓葛陣空存率其伐功幸哉遇西平之有子嘉乃丕績悵然思李牧之用兵爰申異數之崇仍舉易名之典於戯西南七擒七縱山川尚識於旌旗君臣一徳一心魂魄諒陪於弓劒庻㡬英爽不昧寵光可故祖母烏哩津氏追封河南郡王夫人制睠惟世臣厥有令婦能輔成其夫子以勱相我國家具官某故祖母某氏名族姬姜華姻秦晉介胄生蟣蝨殷雷之勸常聞圖像上麒麟雞鳴之戒有益而又克生名嗣式配前人宜錫寵章以昭善慶爰正魚軒之秩仍開翟茀之封噫邦君妻曰夫人生雖弗及通侯子為丞相逺益有光可左丞相某加太尉餘如故制朕丕承先烈圖任世臣矧居上相之崇宜寄本兵之重具官某業傳忠孝徳備剛柔𢎞濟多艱勛逺侔於周魯儀刑百辟時可致於唐虞乃睠師垣尚勞邊境稽我祖宗之已試惟卿父子之克堪庸加掌武之階以佐修文之治於戲循名責實朕方務於止戈論道經邦卿尚勤於補衮可左丞相某加太尉餘如故制惟軍國雖異容而文武非二道眷惟左輔實曰兼資具官某徳器素閎聲華甚懋徃丞執法臺閣生風晉侑秉鈞官僚承式材無施而不可功有位而乃成宜寓本兵以隆政柄於戲佐萬機之任深有賴於股肱折千里之衝諒不逾於尊俎可故榮禄大夫江浙等處行中書省平章政事旺扎勒圖特贈効忠宣力定逺功臣開府儀同三司太尉上柱國追封林國公諡武宣制三千同心祖宗所以致王業四百並建國家所以醻世勲矧予政路之良實爾義方之懿宜伸異數追奬純誠故具官某忠智而静深雄毅而篤惠風雲不爽蚤參絳灌於顔行露雨並流迄繼甫申於藩翰方迓旬宣之績遽興殄瘁之嗟庚桑之祝非虚甘棠之詠益逺是用加之顯號諡以令名爵超五等之崇秩視三公之重既端兵本仍位國楨匪惟漏澤於九京抑以勸功於百執噫漢文之思李牧恨不同時周穆之命君牙庻其率考英魂如在茂渥其承可故妻某氏追封林國夫人制祥開鵲印已彰忠孝之全詠著雞鳴尤美貞賢之助盍伸湯沐追命烝嘗故具官某故妻某氏名閥姬姜能臣伉儷蚤播宜室家之譽常懷閔君子之心尚以瓊瑩儼徳容之有素玼兮象揥稱命服之甚華猶需列爵之榮乃正小君之位茲伸䘏典俯慰永懷噫五鼎萬鍾木欲静而風不止三槐九棘源之深者流必長嗟爾淑靈歆予懿澤可參議中書省事賈鈞父中奉大夫江西等處行中書省參知政事居貞特贈推忠輔義功臣銀青榮禄大夫平章政事追封定國公諡文正制同心同徳時允賴於經綸懋賞懋官禮必兼於崇報粤我祖宗之謨烈孰為左右之忠良闕具官賈某故父某官某材足以開物成務行足以範世格民奮繇閥閱之英出佐風雲之盛嘉猷則告於内自結主知非道不陳于前有裨聖學仁言甚溥介節彌堅肆文武之兼資當中外之重寄籌帷幄則舉無遺䇿維藩屛則隱若長城民歌賈父之晚來國美召公之日闢方南行而膏隂雨倐上騎而比列星茲惟圖任之新緬念老成之逝是用酬庸錫號節惠易名啓山礪河帶之書晉青綬銀章之秩仍登宰路下賁𤣥墟庻幾少極於哀榮于以具隆於幽顯噫畢公之亮四世慨弗逮於仰成申伯之揉萬邦尚遹觀於濟美顧惟英爽不昧寵光可故母李氏追封定國夫人制慎終追逺桮棬之澤猶存崇徳報功湯沐之恩不廢矧名臣之齊體宜寵數之稱情具官賈某故母李氏琬琰内彰筓笲素習柔嘉維則蚤嫓美於姬姜儆戒相成寖陞華於將相懿彼閫中之範宛其林下之風乃睠象賢足占裕慶茲用追榮石􅐎申錫泉扃慰報本之深思勵教忠之大義以光窀穸以重烝嘗噫生也有涯雖未竟六珈之飾没而不朽庻其安五鼎之歆可特進平章政事嘉琿特加開府儀同三司太子太保太尉平章軍國重事上柱國封魏國公制元良毓徳羽翼之寄匪輕丞弼均勞股肱之義無間肆予邇列亶有世臣宜兼命數之隆式示眷懷之渥具官某忠勤而明濟侃直而惠和由閥閱之茂勲為邦家之偉器薦更中外練逹古今属當代邸之迎功參平勃繼預漢廷之拜位次蕭曹方有賴於恊恭豈遽宜於勇退茲用進登亞傅光輔前星兵民之要務是咨祖禰之名封并紹申階掌武仍視秉鈞蔚居柱石之間雍容廊廟之上於戲入承儲極保身體者望之深出侑政機關軍國者任之重益充令譽佇徯嘉猷可特進平章嘉琿故曾祖父達吉斯特贈効忠翊運保徳功臣開府儀同三司太傅上柱國追封魏國公諡康懿制報功王者之令典顯親人子之至情矧世篤於忠貞宜上尋其淵懿爰加贈錫以極褒崇具官某故曾祖父某凉土竒材金方間氣功名著代未應謝艾之可專器識絶倫豈獨韋宗之所覩睠惟良嗣入作藎臣迄流慶於孫曾亶有光於家國茲用指魏邦而啓宇遵周法以易名六字表功三能開府顧遺榮之甚腆非盛徳其孰堪於戲七世侍中蓋不墜日磾之訓四朝元老又安知長樂之誇英爽故存欽承毋怠可故曾祖母梁氏追封魏國夫人制齊夫人三初未聞於王命漢侍中七世共美於家風睠我臣上揚其祖禰伉儷之重褒䘏是宜具官某故曾祖母梁氏西方之美人東漢之舊族君子偕老相大國而顯諸侯天下復平居北堂而稱命婦賞既延於後嗣位盍正於小君盖考徳必論其世者欲浚忠厚之源列爵必從其夫者以著貞順之効茲為懿澤尚賁幽扃可故祖父錫哩特贈推忠佐命宣力功臣開府儀同三司太師上柱國追封魏國公諡貞獻制雲臺烟閣居多故國之臣玉闕金城代有良家之子世雖殊而事不異功若舊而報則新具官某故祖父某胄出相門身逢聖運竇融朝漢義固取於尊王由余入秦功不逾於定霸孰若攀龍而附鳯訖觀歸馬而放牛蔚為將帥之良兼寄兵民之重光輔五朝之弓劒𢎞開萬里之版圖垂裕本支流芳簡册是用表勛作諡建府經邦仍申胙於大名俾從歆於顯考備于追飾慰此遺忠噫始賞而復公侯事信有超於徃牒受祉而施孫子靈其不昧於寵章可故祖母田氏追封魏國夫人制因親以顯親大父之功已報無爵而從爵小君之號宜加典禮是常哀榮斯至具官某故祖母田氏毓珍令邃主饋髙華諒每戒於懷安故首明於歸徃聿致登壇之拜終膺胙土之恩為室家之道其義豐為子孫之謀其効逺足光内則盍列世封噫五楘詩存無復平生之閔六珈儀盛猶當永世之傳歆此明綸安于顯祐可故父資徳大夫雲南等處行中書省右丞贈銀青榮禄大夫平章政事諡毅敏阿嚕加贈秉忠執義威逺功臣開府儀同三司太師上柱國追封魏國公改諡忠節制衽金革而不厭勁氣猶生聞鼓鼙而興思遺忠可録矧此岩廊之彦乃其堂構之良宜洊追崇用垂廣勸具官某故父某官贈某官某堪輿偉器閥閲名流耿上谷之有弇克當父任李西平之得愬足紹家門七縱七擒百戰百勝威憺羌髳之外境踰秦漢之先籌畧無遺旬宣不廢顧王旅甫臨於交趾而將軍乃病於壺頭遂致其身式開厥後茲用增封大國進列上公號以顯庸諡以協行表邦家之八柱視宰路之多儀祖禰均恩閨門與慶匪獨榮其幽壤抑以視於昕朝噫保乂王家永念為臣之不二光昭令徳亦惟有子之能賢寵秩有章歆嘉無斁可故母王氏追封魏國夫人制積行累功爰致上公之位抗尊齊體宜從大國之封用衍殊榮式綿遐慶具官某故母王氏清心玉映淑徳蘭芳彤史增華内則素宜於家室綏章延寵中權獲展於邊陲克相令終俱膺燕譽彞鼎之刋不泯庭階之祚未央衮繡有嚴禕褕斯稱以申夙夜儆戒之勸以慰雨露悽愴之懷噫侯母通籍禁中惜徒存於舊典將軍題碑墓上庻共享於榮名可榮禄大夫遙授平章政事中政使翰林學士承㫖兼修國史三寳努特授金紫光禄大夫上柱國遙授中書左丞相封蒲國公餘如故制篤近舉逺盖有國之𢎞規崇徳象賢乃為臣之盛美雖已班於宰路猶未究於寵章洊錫殊榮於昭異眷具官某名家令器治世通材知無不為將順之忠夙著行思可樂顯揚之孝彌彰肆予臨御之初與有翊扶之績爰躋邇列仍長禁林念旦夕承辟之孔勤信夙夜在公而無忝克循先烈亶謂世勞用啓誓於山河併申名於柱石服茲新命踐厥舊官於戲日磾之侍漢宫遂流芳於七葉伯冏之為周正因託譽於百篇罔俾前修獨專徃牒可張氏第二代嗣師封正一嗣師太清演教妙道真君制盖聞古先哲王莫不以清静寧民為本公孫有大隗之訪陶唐有赤水之徃所以博求至理在宥天下也朕甚慕之張氏正一之教其幾是乎今有司以嗣師位號為請惟師嗣守道器遺榮冲引尚安所事名然繼宗開緒納俗安善之迹不可弗表也宜有顯稱以致遐仰可張氏第三代系師封正一系師太清昭化廣徳真君制道之大原出於天而成之在人有漢天師之緒逺矣㣲其子孫善世善承不怠益大孰濟登茲是以代有異人出禆治化朕既加號於嗣師而系師景行焯靈昭于簡册渺然自㧞功成不居經不云乎上徳不徳是以有徳可資徳大夫中書左丞劉正故祖父聚贈資徳大夫中書右丞追封清國公諡昭懿制惟祖宗之於子孫猶水木之有源本末之茂者本必大流之深者源必長睠予近弼之忠良亶自前人之積累具官劉某故祖父某重珪叠組之名裔三百餘年之故家當世未夷含章不耀居家理而宗族稱其孝與人善而鄉黨服其仁積是慶餘克昌厥後迨其孫而始大盡為臣之匪躬法度森嚴而臺閣風生政事亷平而聲譽日著朕博詢於輿論俾佐秉於國成嘉乃賢勞推其所自是用晉登宰路陞錫崇階開大國之新封稽易名之舊典以光幽壤以示昕朝於戲忠孝以事其君尚不負傳家之託公侯必復其始庻幾發潛徳之光顧爾英靈服我休命可故祖母何氏追封清國夫人制夫有克家之婦教子以施于孫國推追逺之恩尊祖以及其妣眷予丞弼錫以寵褒具官劉某故祖母何氏慈孝著于閨門勤儉刑于宗族卿慙於長嗟家世之中微徴後有謩幸公侯之始復雪涕指墓碑而激厲延師資經訓之菑畬迨至成人遂登膴仕朕既獲忠良之用茲不忘教養之功惜哉賫志於重泉于以追榮於愍册啓封大國正位小君於戲生也有涯雖未究六珈之飾没而不朽庻幾安五鼎之歆尚爾有靈服我休命可故父忠贈榮禄大夫大司徒追封清國公諡簡穆制立身揚名以顯父母者人子之大孝昭天漏泉以為恩澤者國家之至仁眷予丞弼之賢亶有淵源之自具官劉某故父某躬服道義譽聞家邦不卑小官嘗為禄仕厭㕓市錐刀之污下效孟氏之三遷念祖宗門户之髙華慕燕山之教子維天福善為朕得人凡中書政本之良皆平日義方之懿子欲養而親不逮身雖没而名則彰是用陞錫崇階晉司邦教啓大封而賜履節壹惠以易名庻極哀榮具隆幽顯於戲家聲益大始賞而復公侯遺澤無窮受祉以施孫子顧惟英爽不昧寵光可故母孫氏追封清國夫人制母貴以子爵從其夫録善追榮已致上公之位抗尊齊體宜膺大國之封用衍殊恩以勸有位具官劉某故母孫氏毓芳名族主饋髙閎賓祭恪恭内則可儀於九族閨門雍肅家人知有於嚴君勤儉以相其夫詩禮以訓其子使朕獲忠良之佐而國資經濟之才惜不迨禄養於庭闈是用錫寵光於泉壤爰正小君之號以慰純孝之心於戲五鼎萬鍾木欲静而風不止三槐九棘源之深者流必長尚爾淑靈歆予茂渥可中奉大夫中書參知政事額卜徳哷勒故曾祖父們色勒喇卜丹贈昭文館大學士資徳大夫追封吉國公諡忠懿制士懷忠義雖百世以如生澤及子孫乃積善之餘慶睠予輔弼亶有淵源具官某故曾祖父某以間世之才得不傳之學九州之外五經之表固自有人三辰之運六氣之行如指諸掌知白旄黄鉞之顯西土率簞食壺漿以迎王師舉父子以偕來至孫曾而方大是用崇階進秩文館陞華胙以名邦錫之美諡匪獨榮其幽壤抑以示於昕朝於戲徳闇而章所以慰烝嘗之怵惕世濟其美庻幾增門户之光華其服殊恩以康乃後可故曾祖母巴特瑪氏追封吉國夫人制言不出閫盖婦道止於幽閒没而揚名待子孫而後貴顯睠良臣而論世宜䘏典之追榮具官某故曾祖母某氏範正閨闈徳宜家室知儆戒相成之道每懼懷安當艱難共濟之時首明歸徃慶延後嗣職代天工被之象服以是宜豈曰禄養之不逮於戲徳惟邁種故取實於既熟之餘福至如川其養源於初發之後服茲命數佑爾雲來可故祖父北京路穆呼哩烏齊爾巴咱爾羅丹前贈推誠宣力功臣光禄大夫平章政事追封吉國公諡明襄制天生賢佐弼予一人國有寵章迨其三世式彰孝治載在贊書具官某故祖父某官某卓爾竒才生於絶域父子為師友在家盖有異聞學術貫天人中國若合一契於草昧而知天命奮節義以迎王師仕歴累朝慶延後嗣是用疇庸錫號節惠易名封肇啓於名邦秩仍崇於宰路載隆典禮備極哀榮於戲逝不可追者親揚名以顯徳何以加於孝事君則忠迪爾後人歆予成命可故祖母呼巴氏追封吉國夫人制賢者有後由子以施于孫國之至仁尊祖以及其妣以隆輔弼以勸臣工具官某故祖母某氏淑慎其儀柔嘉維則恭儉而中禮富貴而不驕儆戒相成有以相其夫子茀禄是荷用垂裕於後昆慨逝者之如斯嘉芳名之不朽是用疏封大國漏澤九原豈特以慰其家盖將使顯于世於戲哀榮備矣庻幾全追逺之恩雲仍保之則亦有無窮之聞顧惟不昧歆此寵章可故父翰林學士承㫖正奉大夫伊卜徳噶羅丹贈推誠守正功臣金紫光禄大夫大司徒柱國追封吉國公諡忠簡制惟世祖皇建有極而衆賢聚在本朝左右輔弼罔匪正人先後奔走亦多吉士至於天人袐奥之絶學皆其家世授受之真傳及臨事而有為顧無施而不可永懷舊徳黙契予衷具官某故父某官某剛毅而惠和廣博而精粹在階庭為良子弟學術可以名家在朝廷號賢公卿中外稱其善政晚以耆老乆侍禁林嗟哲人之云萎幸良嗣之克肖是用易名旌善錫號表勲啓山礪河帶之書晉紫綬金章之秩仍掌邦教以光𤣥墟於戲不朽者名雖死之年猶生之日欲報之徳移子之孝為臣之忠英靈如存寵光不替可母咱納克布氏封吉國太夫人制母以子而貴臣以孝為忠然令名夀考人不能兼而禄養逮親古所罕見日侍慈顔之燕喜予嘉政府之純臣具官某母某氏毓秀髙華持身法度言動不踰於閫閾賓祭必備於情文勤儉以相其夫故夙夜在公而忘其家事詩禮以訓其子故亷慎律已而保其令名盡婦道而盡母儀宜家人而宜後嗣肆朕得忠良之助其可忘教育之勤是用正位小君疏封大國于以著克家之美于以彰錫類之仁於戲象服六珈儀可為於内則黄髪千歳養永就於南陔茂對寵光以綏夀祉可榮禄大夫遙授平章政事商議中書省事太子詹事衞率使何瑋故祖父淵贈推誠宣力功臣銀青榮禄大夫大司徒追封易國公諡武宣制積功累行以忠厚而起家㳂流遡源施恩澤而追逺疇若予采詒厥孫謀具官何某故祖父某昔守鄉邦宅心惠政全民保境載父老之口碑立身揚名見子孫於身後慰其幽壤我有寵章於戲取實於既熟之餘徳可忘於邁種養源於方發之始福之至也如川迪爾後人歆予休命可故祖母鄧氏追封易國夫人制惟天福善積慶以興其家有國報功尊祖以及其妣予嘉忠藎厥有淵源具官何某故祖母鄧氏出自名門嬪于右族懿範隆於閨閫義方篤於家庭有子能賢既没身於王事及孫而大克盡道於帝臣式啓國封俾從夫爵于以光於幽壤于以勸於明廷於戲在邦在家聞逹本無於二道惟忠惟孝死生俱享於令名其服殊恩以康乃後可故父易州等處行軍千户兼軍民摠管伯祥贈推忠保節功臣儀同三司太保上柱國追封易國公諡忠毅制盡忠之士雖死如生積善之家其後必大眷此岩廊之彥乃其堂構之良爰遡慶源肆頒愍册具官何某故父某官某雄毅而明敏忠智而清深粤從總角之年早已脱頴而出從其父而犯不可測之敵忠所事而復不共戴之讎衆推將帥之才身際風雲之㑹燕南陲趙北際固自有人金先滅宋後亡俱嘗戮力謀屈羣䇿勇冠三軍攻城每㧞栅以先登臨戰嘗褁創而出陳方王旅欲吞於江漢而將軍乃病於壺頭莫贖其身式開厥後爰舉褒崇之典仍兼命數之隆節惠易名建邦啓土載加爵秩備極哀榮豈但以慰其家盖將使顯于世於戲北風易水嗟壯士之不還黄河泰山暨汝封而長在英靈不泯寵命其承可故母楊氏追封易國夫人制興家必有令婦錫爵則從其夫矧在位之忠良實積慶之垂裕寵疏湯沐光賁泉扃具官何某故母楊氏名閥姬姜能臣伉儷清儉以立門户勤勞以濟艱難利家人夫婦之貞内則素嚴於閨閫閔君子車甲之盛中權獲展於邊陲其身嗟夢幻之幾何遺澤幸階庭之益衍是用肇封大國正位小君以慰霜露悽愴之懐以申夙夜儆戒之勸於戲侯母通禁中之籍舊典徒存將軍題墓上之碑榮名與享服我休命迪爾後人可故母郭氏追封易國夫人制功成治定念股肱宣力之勞善積慶流亦伉儷得賢之助爰從夫爵用表世勲具官何某故母郭氏貞淑範於閨闈慈孝聞於婣族閔其夫子永歌五楘之詩教以義方逺慕三遷之懿眷惟良嗣作我藎臣端由内則之賢盍正小君之位以光窀穸以重烝嘗於戲副筓六珈嗟死生之契闊雲仍百世尚福澤之便蕃顧爾淑靈服我休命可母葉氏封易國太夫人制子之禄逮其親揚名以顯朕以孝治天下錫類有恩惟元臣之忠良皆母氏之聖善將以成其家慶肆肇啓於國封具官何某母葉氏淑慎其儀柔嘉維則雖被服之盛不與君子而偕老而正位乎内允恊家人之利貞維以永年幸哉有子直言正論出而揚蹇蹇之風愉色婉容入則奉融融之樂教忠有自寵錫是宜賁以象服翟車榮其黄髪兒齒於戲南陔所以美孝子乃風化之表儀北堂稱曰太夫人亦邦家之光耀永綏夀祉茂對休嘉可榮禄大夫大司徒知太常禮儀院事田忠良故曾祖父嗣叔贈昭文館大學士中奉大夫追封趙國公諡忠毅制求忠臣必於孝子厥有本原啓大國而為諸侯及于祖禰斯惟懋賞以待殊勛具官田某故曾祖父某泰而不驕仁者有勇事親以禮心勦形瘵於湯藥之間與物為春近悦逺來於干戈之際允能安集仍識依歸矧死事之蹟未忘而作善之祥有在追加異數庸荅遺忠於戲袨服叢臺初誓山河之礪帶圖形烟閣益綿家世之軒裳遐想幽貞尚知明命可故曾祖母曹氏追封趙國夫人制六世同居義盖由於中饋一門俱顯禮必及於從封爰布明綸俾躋列土具官田某故曾祖母曹氏心存孝敬訓著柔嘉人無間言骨肉之情甚懿事資内助里閭之盛益深卒為開國之臣是曰宜家之婦冠于族黨慶在子孫用茲湯沐之頒相彼烝嘗之祀於戲佩其象揥雖已厚於平生申以丹書尚有光於永世可故祖父子成贈資徳大夫尚書左丞追封趙國公諡武康制遡淵源而論徳相望百年崇班爵以報功是為再世以推念祖以勵立身具官田某故祖父某蔚為時英凛有將略此父此子因心之孝則同為國為民仁言之利已溥乃若出竒而清州里决䇿以嚮朝廷臨財能亷敵愾甚勇方迓鷹揚之用聿興豹隠之思逺邇相從湛浮自得盖遺榮於晚節以垂裕於後昆茲用指趙分封遵周作諡官列羣公之次秩超九命之華褒䘏有加情文斯稱於戲長弓大箭莫圖汗馬之勞赤舄衮衣已極為臣之貴徃歆茂典益衍慶源可故祖母陳氏追封趙國夫人制恩紀旁流婦人從夫之爵榮名上及臣子尊祖之情宜畀絲綸以光簠簋具官田某故祖母陳氏躬有淑徳嬪于義門婉娩聽從之無違儆戒相成之不怠先人後已為矜式於中閨睦族宜家襲儀刑于前轍卒啓孫枝之盛盍齊公衮之尊用舉彞章俾詶永慕於戲龍旂承祀想欣朱紫之森羅翟茀以朝猶有丹青之彷彿可父潤授光禄大夫大司徒封趙國公制有學名家父以是傳之子惟天福善禄所以逮其親自昔所難於今為盛式隆孝治載在贊書具官田某父某識洞貫於天人譽蚤聞於朝野結知世祖言如響之應聲辭爵天朝身自量而甚準謂有生之定數盍取夀而舎名維以永年幸哉有子肆朕龍飛之始備殫翼戴之誠信有心傳灼知天命是用仍封鄉國晉陟地官既以勵於教忠亦以資於養志於戲馭臣之柄在爵禄朕不敢私老成於國為蓍龜爾尚無隠益綏夀祉祇服寵章可故母呉氏追封趙國夫人制母貴以子爵從其夫雖未嘗逮禄養於生前豈不可追榮名於身後具官田某故母呉氏毓芳名閥主饋髙閎宜室家而夫婦利貞事舅姑而婣旋稱孝慶延後嗣名列忠臣屬當臨御之時備著翊扶之績父榮封國慶夀衮之方開母實抗尊悵慈顔之已逺爰正小君之號以慰九原之思於戲其生也榮其死也哀允為殊遇事君以忠事親以孝是在後人可雪樓集卷二
