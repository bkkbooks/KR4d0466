body:
  text: 雪樓集卷十三元程文海撰記漢川縣學記九澤既陂雲土夢作乂然後其地始有人漢川其域也土夐水長人之歸者以佃以漁耳有能興爼豆之事視之當如卿雲景星固不易遇也予嘗行春斯邑焉顧謂邑教季國珍曰庠序不飭不興如政教何乃示以宫墻之制俾與邑吏謀新之士寡而吏媮莫尸其事大徳十一年邑令鄭國惠君來士誦前言令慨然率邑教李孝純相與徙舊廟為講堂而作新廟至大元年秋庀役二年春禮殿成深四十二尺廣加四尺崇殺十尺廡列四齋中敞㦸門庖庫内備繚以尺垣三千立櫺星門以出為工萬餘糓石六百緡楮四萬有竒皆取諸儒與富而賢者然邑儒之籍户九耳是誠不易矣甫成而予以使復來武昌孝純國珍率諸生來言曰今之庠公之教也令之功也不可不識敢告予語之曰邑於民最親教於民最急學校若無與而實功也且璽書相望下勸敢有弗欽聲教與土同敷訖于四海其可自鄙今爾令長士民務所當先宜矣美矣然立教之基為學之地乂有在也令長士民盍亦分任其事乎治化學業之成視棟宇之成孰愈歸而見賢令長士民試以斯言告之且識不忘焉令名政字舜卿董役者直學曹諤知書張至道林文瑛黄龍佛殿記武昌黄龍大比丘宻印圓照長老作禮於白雪道人曰我佛如來有大福徳善知識是名静山居士常現宰官身于我佛如來道場䕶持恭敬能捨難捨莊嚴種種以為供養願報國恩爾時持地菩薩心生讃歎顯大神力於寶坊中湧出白金布施我佛如來常住十方諸善男子善女人聞是因縁悉發皈依三寶正智無有愛恡是故我今志心增廣莊嚴我佛如來寶殿如大梵天宫於中供養現世無量夀佛寶座祝願讃嘆我今思惟云何我報恩大招提希有功徳悉得圓滿佛事熾然我今發回向心一如居士所願乃至居士及諸大善知識乃至過去現在未來衆生乘此功徳因縁悉得安穏快樂佛法住世亦復如是世世生生無有變壊諸苦我今禮請願留一言亦復堅固如是道人曰善哉善哉長老成就一切種種功徳甚深微妙又不自貢高懽喜回向實為希有我於經藏樓閣堂房已曾授記今圓明寶殿欲就我又復來我應與佛有縁我今亦發大回向心資報國恩一如居士如長老所願同心視讃無有退轉我今為汝説四句偈言我佛無所住亦無所不住無生滅增減是名大道場道人説是偈已十方三寶四衆懽喜證明如我所説刻石奉行時至大二年某月某日武昌路觀音閣記人非水火不生活及其為患也或使人不能生沙羡為郡地窪風悍居者不免水火患水防矣猶厄於火至元二十七年長民者以父老之言搆重屋於市中祀白衣大士而禜焉某頃嘗詢諏於斯當其為患儆庀或無虚夕而救至輙息父老語予曰此大士之力也至大二年秋復以使事來則屋加崇而又廣望之崢嶸粲絢勢如中天之臺予留數月融風罕作父老又曰此官之賜也問之則曰先屋敝矣行省郎中上禀下承力興是役自上宰以降若僚屬若郡邑若士民咸欣賛其為今鬱攸之變益少非賜而何遂請為之記予讀春秋凡火非人所致者皆書曰災獨哀公二年五月魯司鐸火延及桓僖二宫則亦書曰災寜非以守先君之廟祧而備豫不嚴若此欲直書之則非為魯諱之義故寜曲筆遷就之耶傳者不知乃矯聖言誣天意且宋鄭嘗災矣其有司或先事而備或事過而防觀其設施纎悉具備然後命禳于𤣥㝠回禄用馬于四􅅠祀盤庚命四鄉敬享大為社祓禳于四方然則禦災捍患之道自有次第先後也歟丞相達爾罕公之在沙羡也别籍役徒千專以待塗徹縣鐘於高堠望所起節鐘號召之故甫起救輙至今禜祈之地又益嚴則夫先後旬宣於斯者咸致心民事若此是誠不可不記也雖然甍棟之比如櫛倘徒徼神倖怙官賜而積薪不徙突決晏如一旦變生所忽則雖化身千百億身各具手目千猶恐倉卒救有不逮然則人所當盡者固有在也可不慎哉父老其惟時教告之遂俾刻為記省宰故丞相額森布哈平章曰程鵬飛曰呼喇美曰格濟格右丞曰斡魯參政曰伊巴喇忻郎中曰王柔曰必都喇卜丹員外郎曰托里曰沙木斯迪音都事魏弼郭時可張徳榮喬憲而尸其事者郎中布達實哩也疎山白雲禪寺修造記大雄氏之宫布天下得地者什六七得人者什二三西江之西之山之宫仰為大疎次之疎為近故予知疎為多昔疎之興也葢有記之者矣故予獨記雲住師之能熾焉自住之住是山也於今八年矣一年而僧堂改觀二年而宫殿塗塈丹雘莊嚴像設供養之工畢舉三年作下院於撫州又作於金溪縣四年鑿山為園蓺桑蓺桐蓺茶凡四千五年宰堵波小大之屋皆完新以其餘力復取化城洲地六年又鑿山種栁株餘二萬役水舂磑而屋幬之七年架萬嵗閣八年閣成設飾咸具刻畫肖像萬身剏二庫以豐財八年之間無日不事無事不有功然後祝堯之廷布金之地始淵麗廓大崇桀輝赫居者過者無不生懽喜賛歎瞻仰尊敬心曰住真善住者住曰未哉明年吾新香積矣又明年吾又新西堂矣明年明年無量吾事亦無量於是山中之人皆驚且服願記其事夫佛之道非假宫室以為殊勝也非資田園以為贍博也然以人而學佛之學則非人莫能為者毋亦宜先為之乎且佛固人也彼為刻躬閼性無暇於此今學焉者既未能學其為又不為人之為則予於斯也誠有不能名之者矣今疎之熾也得人之效也記之而使繼之者繼之其所謂無量無量者非耶住番人也器資尚書之胄也楚山上人之法子也大徳六年山寂疎無人疎衆枚卜十人於佛住獨吉再卜住又吉乃以上聞錫之璽書而為疎主遂自徑山來歸歸而以潔身自誓於佛然則佛固許之且復訊之矣住葢能於無所住而生其心者耶然則疎之熾也奚足為住言哉至大四年二月八日記承慶堂記上即位之明年改元皇慶懋官延賞澤流八荒百官七品以上序榮先世有勲勞於國而子孫官未至者錫異恩若寶源庫提舉渾源孫君諧之祖考是已三月制贈曾大父中奉大夫武備院使護軍謚忠惠大父􅓵徳大夫中書右丞上䕶軍謚正憲父正奉大夫大司農上䕶軍謚文莊爵皆神川郡公其配皆郡夫人諧既拜命白於廟集賢司直趙君克敬為作𨽻書名其堂曰承慶以侈上賜冬十有一月介趙君謁文於予按孫氏之先始以函人受知太祖從軍征討得名位子繼孫承皆能著勞績致大官為時名臣所至以保生靈樹風節為己任故世稱勲臣之家必曰孫氏慶之源逺矣夫人之於其世也孰不欲光前而裕後而天之於人也善惡災祥之感曾不少爽若李英公輩依乘風雲勒功帝籍臨終惓惓焉戒其子弟為門户計不再世而家覆族夷及觀其起家乃從羣盜人之所以遺其後者固自有本末哉善惡之積子孫之賢不肖隨之形脩者影長聲大者響振若孫氏者其庶幾乎積之者既善而所以承之者亦不惡初諧提㸃利器庫時䘮制未行也丁父艱去官泣血三年服除尚書省建又不願仕於是投閒者七年乃拜今職嗚呼人亦孰不欲富貴哉其所存若此得不謂之賢乎孫氏自忠惠以來把麾持節聨圭疊組赫然照人而未始一日舍先業又足以觀其所承者矣孟子曰函人惟恐傷人矢人惟恐不傷人故擇術不可不慎也推是心也以往何所不用其厚使孫氏之子孫常若忠惠正憲文莊之世則斯堂也其慶可既乎朂哉其承之諧字和伯其弟兄子姪皆孝友克世其家云昇平橋記臨筠之交鵠山之陽梁於灝江之上曰昇平橋灝迅急嵗輒壞至大元年春里長者黄君應瑞相橋下流勢少殺謀遷之易族子田以立其址買晏氏山以礱其石更為石橋掘地丈餘得故橋株十數石佛像十有三乃故橋所也心獨喜經始於是年四月二十有六日落成於明年三月八日脩丈十廣去其七高如廣之數上為屋七楹工凡六千五百費緡萬五千有竒又為菴其涯以祠石佛廪道者守之配鄒出簮珥以相焉橋成之日行者歌休者誦煙峯流泉獻狀増勝皇慶二年其諸孫允武來京師謁記曰此鄉民之志也且言君平生好義嘗於上高之境為二橋曰新曰大滸又鑿新喻檀嶺道數里作舍道傍以便䝉山之役者若此甚衆余觀萬金之貲世常有之不拔一毛利天下嘐嘐曰我為善我為善不過謟土偶實巫覡求福田而已他弗知也黄其庶乎昔有結茅度蟻奪高第者黄所濟多矣黄固涪翁之苖裔也盛徳之門又浚以益之其大也必矣君年八十餘耳目聰明齒髪不衰子若孫皆謹愿篤學未必非其報嗚呼此亦鄉人之言也君何心焉書畀允武歸刻於橋之上君字國祥人即其居號之曰曉山老人云正月日記致樂堂記周之族盛於番咸淳進士名垕者其族之賢者也與廬陵劉㑹孟廣信李明通同登丞相江文清公之門有名皇有江南授同知廣州事不赴子應極字南翁又賢弱冠失怙事母孝謹宦逰四方乃心罔不在膝下大徳丁未待制翰林事上於春宫詔許迎養且勅有司禮遣明年奉母至京師又明年侍皇子説書月廪餼其家遷集賢司直於是集賢大學士郭君名其堂曰致樂來謁余記之夫為臣子之道忠與孝而已耳人有常言忠孝不可兩全余則曰忠孝無二道也今天子以孝理天下推錫類之仁使子事其君得兼養其親上之賜大矣而親之樂奚而致也母豈不曰吾之子所以致養於我者上之賜也可不盡忠乎忠以報於上者母之所以樂也食焉而怠其事謂之養且不可況可致其樂耶忠之道何盡心焉耳矣必事其君能致其身必事其親能竭其力必㳟於兄友于弟信於朋友居上而不驕為下而不悖仰不愧俯不怍而後可以言忠忠之道備而後可以致其親之樂樂則孝在其中矣故孝者必忠忠者必孝忠孝之道非有二也南翁勉乎哉不然傳有之雖日用三牲之養猶為不孝也以子之賢且材如此何所不厎吾猶云云爾者此天子之望其臣母之望其子賢者之望其友之意也南翁勉乎哉皇慶二年二月日記遺音堂記皇慶二年春正月八日余過左司唐古公之廬環堵蕭然有梅花一樹鳴琴在牀左圖右書余驚焉促席與余言曰古人之所以為古人者何絶人逺甚遺言遺行具在可效可師而卒莫之由何哉豈今不古若耶吾行古之道亦古人已而必曰古之人古之人乎哉余益驚焉他日出遺音堂三大字示余曰吾以此名左丞野雲廉公之堂且為書之羣賢見之歌詠君其記諸余曰余何言哉公前與余言而忘之耶此遺音之説也夫音者出於虚入於寂鏘然而起杳然而止古之音寥寥不可聞已可聞者非其遺言遺行乎考其言求其行若有聞焉若耳提面命焉遺音從可知已夫廉公吾聞其人矣以勲伐世家致位疑丞政平恕行公清無貪􅎱無刻苛親賢而下士方盛而已辭歸而友木石狎魚鳥玩天地之盈虚閲寒暑之往來泊然若無與於世得古人之高吾敬之公宦學朔南謹敏博達由御史歴吏部佐省闥受知天子進則竭心陳力以贊其治退則彈琴讀書以樂吾天葢與廉公齊心而擬迹易地則皆然者庶幾能言古人之遺言行古人之遺行矣以遺音名亷公之堂豈無意哉非公不知名此名非亷公不足稱此名也音乎音乎吾懼夫聽者不識二公之趣而求古人於弦上也故次第其語而詳道之應州覺興寺長明燈記余寓居京城東北隅與今知樞宻院開府公隣且有再世之好一日謂余曰先王積徳累行竭心本朝天子聖仁思念舊勲曾祖考以下皆追封泰安王曾祖妣而下皆追封王夫人餘慶所鍾忝處宥宻夙夜凛凛無以報稱上恩奉先而裕後惟今世人求福慧利澤者必於佛乘而致䖍焉心竊慕之去年夏承詔祝釐五臺山還過應州造覺興寺向佛作禮仰見長明燈炯炯静照若有所感因念曰俾吾子孫世世克忠克孝毋忝乃祖聨輝繼燭不當如是燈乎遂捐白金五十兩楮幣五百緡於寺以續是燈之明子其為我記之雖布施之末不足以勤翰墨庶幾頼子之文昭吾之志於後耳予曰善哉善哉予於佛書未深究然長明之理葢可知已明者燈也所以長明者人也燈無不明而不繼之以膏則明熄矣人無不善而不繼之以徳則善熄矣若公祖孫顯融四世即是燈之明四世也由四世以至于百世繼之以徳即是燈之明百世也善不可熄當如此燈矣推公之心可以卜公之世焉夫目非無見也待光而明心非無知也因觸而感公既因燈之感而明夫善必又將感公之之善而續燈之明者是公之布施無窮而福徳不可量也以是而報上奉先裕後可謂善矣公娶完顔氏甚賢子小和尚福安等皆佳兒吾又知其必能世守忠孝承于父祖益逺而彌光如是燈之長明也公名額森特穆爾階開府儀同三司云永新州醫學祭田記國家仁民愛物無所不用其極天下郡縣建醫學置官吏與儒學等醫有功於民甚大誠有國者所宜先昔人方之相業可見已大徳初王東野為吉安路永新州官醫提領七年遷本路副提領至大四年赴調京師改臨江未行徽政院使羅司徒薦其名興聖宫命為太醫嵗年之間三錫楮幣凡七千五百緡皇慶二年夏又命乘傳還江南迎妻子初為永新時手建廟學嵗三月三日九月九日有事於三皇唯取給醫家至是盡以所受上賜買田五十畝入學奉春秋之祀還朝謁余記東野永新人也大父文信父慶隆皆有善行其祖母又賢日夜課東野學不懈而東野長好倉公之術遂稱良醫及被寵用凡所錫賚不以仁妻子不以事緇黄惓惓買田鄉校以蠲誅求可謂不負矣嗟夫永新之學者既無公上供給之勞又當國家崇重之日益勵所學以擴其仁民愛物之心此則東野之志而國家之望也凡吏於兹學者其亦勉之哉延祐改元二月朔記虎林山大明慶寺重建佛殿記佛鑒慧照净戒大師居杭州虎林山大明慶寺之三年寺災既復且完大徳癸卯復災師大懼曰豈余之道凉徳薄致然與抑物成毁有數地隆替有時與嘻其甚矣且昔者三呉之士輸仁馳義曾不旋踵而重以愬之予獨何心乃鬻私田之在越者率先走白行宣政院使張閭公公亦發帑倡之於是効材薦貨者復四面而至嵗丙午正殿成基隆於初構加於時俯仰陟降改觀動色寺僧子永莊嚴諸天梵相端儼妙麗如親示見於虖非師之强忍堅摯疇厎是耶按寺肇於唐盛於宋景定有佛慧大師者以律教焯於兹遂為國祠壇場至我元而益大嵗時百官䖍集祝聖人夀師名嗣良道行高峻多遊天台鴈蕩間居是寺凡再棄去再還遭寺荐災乃以興復為己任卒賴以振唯佛法之大固無待於傑棟廣宇而非此無以致崇極寄瞻仰師曰是役也我執事之人亦惟勤哉不可以不記因集賢侍讀學士趙君孟頫求文於余謹書以記延祐改元月日記太和州重脩快閣記廬陵有閣最一郡之勝在太和東南城上邑令太常博士沈遵名曰快閣迨黄太史庭堅繼至賦詩其上而閣之名聞天下葢自豫章􅑴流五百餘里江盤峽束牽挽鬱隘驚心怵目至是而山平川舒曠浪褰開躍然如龍蛇之伸鵾鵬之息跂而四顧快可知己邑為州官事繁逰覽廢閣壞為廐為驛為獄訟之庭旋葺旋毁豈復知有所謂快者哉至大四年邦侯聖隂徒貳車楊學文議改作而侯以監察御史召留俸五百緡屬寓公高安尹嚴用父成之已而郎侯祐來議克合掄材徴工撤而新之為屋三重重十楹前為閣後祠太史中為燕休之堂三年而畢弗亟弗徐屋加於舊而民弗與知登斯閣也天高水夐陽開隂翕禾黍滿野舟行如飛仙地之勝若始闢焉明年高安之孫莊侍其諸兄威來京師以圖請記且道侯之政予雖未登兹閣竊為之一快告之曰州曰太和至治之稱也閣曰快自得之謂也治欲其至而民欲其自得葢相須也民不自得求其治之至難已山川雖勝而暇登覽乎哉於虖太和邑也而為州守尊而親於下民下而敬乎上上下各安其素非自得之驗而至治之候乎知此則是閣之勝獨最於一郡乎哉書以遺之俾刻之石董是役者劉冲蕭佐延祐元年九月朔記古衞城崔府君廟里門記衞之汲有古衞城在其境廟於東北隅者漢崔府君祠也府君諱瑗字子玉順帝時以茂才為汲令居七年數言便宜開稻田數百頃民祀之至今廟屢廢輒興累朝皆有封號至元中封靈惠齊聖廣佑王皇慶二年居民呉徳建里門以表之子實益加藻麗焉介以記請嗟夫王去今千數百年民之思不泯非為令者之善鑒哉延祐元年冬十有二月朔記婺源山萬夀靈順五菩薩廟記五顯神莫知何所始在徽之婺源呉楚閩越之間皆祀之累朝封號甚尊顯宋徳祐元年燬於宼時里人汪元龍守鄉郡弟元奎為邑宰復建之施田若干畝奉時祀曰景福莊世祖既定天下禮百神奉香幣致祭至大四年再燬元奎之子僉廣東肅政廉訪司事良臣某路治中良垕首樹正殿衆爭獻貨幣門廡樓觀庖庫之屬皆成焉壯麗宏大甲於郡初廟附智林寺寺亦再燬再構皆出汪氏延祐元年賜廟額曰萬夀靈順五菩薩之廟寺曰萬夀之寺明年良臣請紀於石唯神赫奕變化著靈効順海内所共聞而廟有再興之功汪氏為大不唯神在國初元龍兄弟保民之功尤多仕皆至治中伯朝列大夫仲奉直大夫良臣嘗為監察御史有能聲是為記夏五月十五日廣平程某記廬山重建廣福觀記廬山廣福觀古匡先生祠也宋南渡燬於李成之亂五十年道士王大成始建正殿其徒孫元道加堂庭門廡像設而庳隘儉陋茍備棲息而已又百四十年為大徳乙巳冲和明素𢎞逺大師提舉觀事陳啓宗觀復大師知觀事王徳脩首飭越國孟忠襄公珙所構道藏而更覆之撤兩廡及賛拜之庭而崇之而殿益弗稱始丁未訖辛亥裒仁歛義殫慮畢力斬木絶谷伐石他山又大新之既成高明洞深邦邑改觀陳君復捐嵗給之田四十畝茗園果林百餘畝益觀之稍凝和冲妙學正法師教門高士揚州𤣥妙觀提㸃雷希復曰是不可以不紀以請按匡先生名續字子孝事周老􅅨得其道廬於彭蠡之濵虎溪之上相傳以為仙去人即其居而祠之山之得名曰廬曰匡以此晉惠逺法師東逰至虎溪顧而樂之太守桓伊奪其地為東林西林寺遷祠谷口唐開元中詔大其宫遣使致祭號曰仙廟南唐主割都昌劉建營田以奉祠事宋治平中賜額夀聖觀後避高宗尊號易以今名匡先生初號大明公建中靖國初封四極靖明真君凡水旱疾疫無不禱禱無不應邦人賴之惟神仙之説肇自中古覽老􅆅氏之書豈得已哉秦漢之君不務逺徳廣為祠宇壇場以致神人以求長生惑矣後世因之又加侈之非滋惑與若匡先生既善其身又大福其民歴二千餘嵗猶祀之宜矣陳君王君竭志興復以彰神休以祝上釐雷君不蔽人之善皆可書遂為之記杏山藥室記醫家者流率以董仙杏林為美談亦有以為稱號者求其有董仙之心葢亦寡矣夫醫功莫大於濟人禍莫慘於欲利持濟人之術而有欲利之心然且不可茍術之未精利之是嗜其禍可勝言哉今夫庸醫以病嘗其術故有峻其藥以急功多其藥以幸中能醫以病舞其術故有左其藥以厚勞迂其藥以盈取以濟人之術而禍人皆欲利者之所為也盱江陳庚杏山醫三世矣予觀其為人質而不浮聽其言簡而不眩審其術信而有功怵然有急人之容泊然無茍利之心其庶乎有董仙之心者歟年方弱冠時鄉之儒先秋潭周君嘗以杏山表其室於今二十年矣醫二十年而鄉人信而用之如一日留京師七年出為江西官醫提舉司都目人信用之亦如一日積三十年之間名不少貶而家不益饒者得非心董仙之心然也今年春予苦末疾杏山來京師留逺齋者益久且益嘉其為人故樂為之記且以朂其志云延祐二年秋七月既望廣平程某書於逺齋楊氏先塋記􅃉古之初不封不樹中古墓而不墳成周之時始以爵等為丘封之度與其樹數設官掌之漢律列侯墳高四丈自是以降其制益明天禄辟邪之屬亦各有差等所以辨貴賤定民志也聖天子以仁孝治天下加惠臣鄰無有幽顯孝子慈孫之心咸翼然以奮嗚呼教孝勸忠之政不其美與梁國楊文懿公之墓在大梁祥符縣魏陵鄉白榆村先是公之二子敬直元直遵禮經廣兆域至於表羡道識𤣥堂猶有俟也二子既受簡知至大三年秋七月詔推恩其祖禰明年夏四月又賜碑墓道遣將作院使伊納克傳㫖集賢大學士李謙為之文冬十有一月又加贈錫謚時敬直以轉運使官兩淮元直以太醫院使侍禁中皇慶元年夏六月元直請歸脩治先人塜及樹所賜碑不許乞聽兄離職行事乃許敬直承恩奉詔唯謹明年春正月元直復泣請於興聖宫又不許請至二十餘終不許曰爾為爾親吾為吾子孫也且爾兄在豈必爾其命河南行省給費為爾成之元直曰以公給私不可固辭從之乃賜楮幣萬五千緡仍督行省相其役二月復遣刑部郎中楊某賜河南丞相尚醖二壺以申敇之明年三月壬子丞相身率僚佐共建勅賜神道碑於墓右寓公鄉老及四方來觀者萬數莫不咨嗟嘆息曰非盛徳之後能若是乎改作祠堂三楹秦國公李孟為榜曰致嚴壙未有銘集賢侍講學士趙孟頫銘之墓前有表參知政事賈鈞書之墓南二丈有石門刻御史中丞郝天挺之字曰楊氏先塋塋前石人獸如制又南去二百五十尺華表雙高國子祭酒劉􅆳題其衡顔曰梁國公神道有碣路左書曰大司徒梁國公墳則鄂國公史弼書也中以畝計者十五垣以甓外以丈計者六百繚以牆樹榆栁栢松數萬鬱鬱如屯雲翼翼嚴嚴遼遼極目前臨官道過者竦瞻咸曰此非教忠之原發祥之兆乎葢是舉也金工石工木工土工凡六千有竒其費上賜之外竭家之有猶不足也冬敬直元直乃圖其成請記於所知程某曰兄弟幸賴先訓歴事累朝被遇兩宫隆恩異數顯寵若此非勒之金石何以表君上示子孫且辱知於子餘三十年矣其為我記之某曰余聞仲尼之言封崇矣有若堂者有若防者有若覆夏屋者有若斧者合從於防從若斧者焉此足以觀聖人慎終之一節也君子不以天下儉其親聖人亦從事之宜而已故有其位有其財與其時君子莫不盡心焉非以為汰也非以為觀美也所以勸也所以事君事親也昔有身為冢宰乃家廟之不營而祭於寢司寇劾之者有傷其生無以為養死無以為禮聖人非之者適於宜而已若楊氏兄弟之廉敏端惠孝友敬篤其事君也外則于藩于宣而致其理内則夙夜在公而致其勤其事親也生事葬祭咸致其誠則於事君事親之禮講之亦久矣宜能位並九卿澤及三世軌物備制遂其所俟嗚呼此忠臣孝子之事也至於啟發人之善心使之思教子思立身以及於事君事親之本其得於觀感羡慕者又不知其幾何人也詩云孝子不匱永錫爾類其是之謂乎是宜有記嗟夫楊氏之子子孫孫毋怠母荒丕念爾先丕敬厥徳其克永世哉文懿公諱澤字潤夫凡再被贈恩階曰榮禄大夫官曰大司徒勲曰柱國梁國其封文懿其謚也其行已載所賜碑敬直今為榮禄大夫江西等處行中書省參知政事元直昭文館大學士資徳大夫太醫院使掌醫卿延祐二年十月日記魯齋書院記邠岐豐鎬之間周之故都也三代之文莫尚於周周之文莫盛於文武周公江漢逺矣其化猶存於小夫弱女況千里之近者乎無他聖人之道與天地並立日月並明孰有外天地日月而能久其生者吾意有能復興文武周公之教於其地特易易焉耳世祖皇帝經營四方日不暇給而聖人之道未始一日不在講求觀兵隴山首召河内許仲平先生衡入見先生亦首謂聖人之道為必可行嘉言篤論深契上心時自陜以西教道久廢乃命先生提舉學事於是秦中庠序鼎興搢紳縫掖川赴雲流文事翕然以起其所成就皆足以出長入治由是聖人之道乍明世祖皇帝踐阼先生又以其道入佐皇明施於天下卒能同文軌而致隆平由是聖人之道復著葢有是君必有是臣陰陽之消長日月之晦明聖賢之用舍固各有其時也今天子以天縱之質繼列聖之緒嚮用經術尊禮儒先彬彬雍雍著者益彰而且廣矣先聖後聖顧不同條而共貫與先是雲中趙侯守長安嘗議建書院如他郡先賢故事不果後以西臺侍御史復來因請以先生從祀夫子且申前議乃有王氏欲斥居宅為之得前太子家令薛處敬賛其决士民承風勸趍前御史張崇推官李益匠府同知韓祐相與董成之前為夫子燕居之殿以顔子曾子子思孟子侍坐後為講堂左右列格物致知誠意正心四齋以張子厚先生昔講道於横渠乃為室東偏合張許二先生而祀之庫寢庖廐畢備屋凡若干楹事聞有詔賜名曰魯齋書院乃諭陜西省給田命官設禁如他書院故事有司既奉詔而祐等請紀以文夫文者何也以西伯周公之聖而止曰文今郡國校官往往而具宫居而師事者亦無不同及觀其効則彌闊而遂疏者何耶無亦文非其文而然與夫子不曰斯道而曰斯文學於此者亦可以深長思矣古昔儒先自伊洛關輔以來相望百年不絶而續若朱子之立言使聖人之道復明於簡籍許先生之立事使聖人之道得見於設施皆所謂豪傑之士也觀先生之於朱子信其道從其言尊之為父師敬之如神明嗚呼殆所謂雖無文王猶興者與終際昌時出其所學有以當聖人之志建不朽之功可謂開物成務之材矣詩云亹亹文王令聞不已聖祖有焉樂只君子邦家之基先生有焉侯於先生有慕用之誠而不能忘凡所以尊先生者無不為也然非私也所以為道也所以廣聖天子之教也所以使學者知所宗也所以志先生之志而學先生之學者也一舉而衆美具焉可無述哉侯名世延字子敬今爲資善大夫御史中丞斥居宅者王庭瑞嘗為吉林副總管詔旌其閭以褒之嗚呼聖天子之欲化民成俗可謂誠且篤矣承學之士奚可以不自力乎自今邠雍之間郁郁乎復如文武周公之世吾猶有望延祐二年十有一月朔記東菴書院記書院昉近代視郡縣之學在昔為尤重非名足以厭時論學足以任師道者弗與是選人才亦往往於是焉出世漸靡法漸疎賢否並進義利易處其教始大壊近年書院之設日加多其弊日加甚何也徒知假寵於有司不知為教之大徒徇其名不求其實然耳翰林侍講學士渤海解君之構東菴書院其立義獨不然其言曰國朝以來中州之學自許文正公既没師道之不立未有如今日者予幸賴先生之遺訓承文明之休運身列儒臣之目乂薄有負郭之田足以支緩急而不求所以承先裕後化民成俗之萬一乎吾將拂䄂而歸率鄉里子弟之俊秀者擇師而教之毋使吾邦仁義之風詩書之澤一旦斬焉於聖人之世而已又何用假寵以溷我哉而屬予記按解氏世以儒術起家歴宋金多名進士家藏書萬數千卷而君於書無不讀至元十三年詔試天下士君中首選由是階以入仕用廉勤以効於朝用循良以治於外凡天子擇任華要君必與焉由集賢太常三入東觀再署詞苑名與學躋徳與位隆葢敭歴三十有餘嵗矣其位也方駸駸而未已而學也方勉勉如未至年未耄老而退然方求為千載之計不亦善乎書院之建既不𨽻於有司無勢以撓之嵗時假給從己出無利以汨之又必擇良師友而為之教則無厖茸冗穢之患矣故教者用其明學者保其聰教者循循焉而不知其所化學者充充焉而不知其所得嗚呼使天下之學他日不取法於此耶書院在居第之東偏中樹高堂為羣書之府翼以東西序為師友講習之地吭以重門為内外之别中庭䕃以松栢冬夏青青自延祐元年之冬至二年之秋其經始落成之嵗月也屋凡若干楹君名節亨字安卿東菴亦其自號云溥濟廟記延祐三年詔封臨江路中聖洲洞庭行祠故焚修道師謝宗夀為端惠靈濟真人賜號曰溥濟之廟從有司之請也大川三百支川三千憑依為變化禍福者往往而有考論其最莫江湖若也南方之湖洞庭為大洞庭之神君山為大則湘君湘夫人之神今余不得而知之矣彭蠡之逼而有洞庭之祠者川行之人無所不畏敬則無所不崇事也且神既神矣況又有異人者出而以其所脩習者震耀出没其間人之視之如在其上其左右由是楊謝之功用日著而洞庭行祠曼衍四布矣楊著於白沙江口今為九江孚惠真人謝楊之弟子也著於昌邑山則中聖之自也予弱冠行乎四方今老矣泝船風波之上亦屢矣嘗以為福善禍滛天之道也行險而不失其正人之道也予雖守聖人之訓聽造化之權則聰明正直之謂神者亦豈矯造化者足以為之哉然則彼之所修習者予雖不能知若其功用之所被雖余亦有時而利頼之矣況欲暘而暘欲雨而雨禦災捍患有出於風波之外者乎是宜錫之璽書躋之典祀而恒為民福也雖然川澤之氣孰非能神今以謝君之靈又濟以有司之請非遇聖天子勤恤民隠之至抑烏能延恩致命若是之侈哉嗚呼山川鬼神其毋忘諸宜逺樓記天之蒼蒼其正色耶其視下也亦若是而已惟山亦然予得請南歸宗人琦来送因與閒語琦曰吾父以野處自名早疎世事近者架樓於屋西字以宜逺予曰記有之君子居高明逺眺望自非冲襟逸韻中無柴棘亦孰知高明眺望之為快哉予不知君家公言論風㫖何若然即其處樓者逺則自處於寛閑壙埌之野可知惜予不得相與登臨觴詠其間也且宜逺者非謂山乎予寓於盱之上南踰百里有筆峯焉不知其幾千仞然自豫章南望翠筆頴然於天末其去之也猶將四百里也然上其隣峯則見諸峯並列尊卑巧拙不能相過也或返下視之者及去之益逺則望之愈高攬之益秀而向之並列者皆風斯下矣然則山之為物信外逺而後宜耶琦曰公之言可因為斯樓記予曰可雪樓集卷十三
