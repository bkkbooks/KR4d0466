body:
  text: 雪樓集卷五元程文海撰玉堂類藁勅賜碑平雲南碑國家繼天立極日月所照罔有内外雲南秦漢郡縣也負險弗庭乃憲廟踐阼之二年歳在壬子我世祖聖徳神功文武皇帝以介弟親王之重授鉞專征秋九月出師冬十二月濟河明年春歴鹽夏夏四月出蕭闗駐六盤八月絶洮踰吐蕃分軍為三道禁殺掠焚廬舎先遣使大理招之道阻而還十月過大渡河上率勁騎由中道先進十一月渡瀘所過望風欵附再使招之至其國遇害十二月傅其都城城倚㸃蒼山西洱河為固國王段興智及其柄臣高泰祥背城出戰大敗又使招之三返弗聴下令攻之東西道兵亦至乃登㸃蒼臨視城中城中宵潰興智奔善闡追及泰祥於姚州俘斬以狥分兵略地所向皆下惟善闡未附明年春留大將烏蘭哈達經略之上振旅而還未幾㧞善闡得興智以獻釋不殺進軍平烏蠻部落三十七攻交趾破其都收特磨谿洞三十六金齒白衣羅鬼緬中諸蠻相繼納欵雲南平列為郡縣凡總府三十七散府八州六十縣五十甸部寨六十一見户百二十八萬七千七百五十三分𨽻諸道立行中書省於中慶以統之大徳八年平章政事伊蘇岱爾建言所領雲南地居徼外歴世所不能臣先皇帝天戈一麾悉歸王化今其民衣被皇朝同於方夏㓜長少老怡怡熈熈皆自忘其往陋非神武不殺之恩不及此惟㸃蒼之山嘗駐蹕焉若紀聖功刻石其上使臣民永永瞻仰於事為宜中書以聞制曰可以命詞臣臣某再拜稽首而言曰世祖皇帝之徳大矣譬如天地之無不持載無不覆幬而生生之意恒寓於雪霜風雨寒暑變化之中物之䝉者薰然而温灑然而濯翕然而同靡然而順有不自知其然而然者故其功烈之崇基業之廣貫三靈而軼千古夫以大理之昏迷旅拒虐我使人若奮其武怒俾無遺育可也而招徠綏緝終釋其主弗誅嗚呼微天地之徳孰能與於此乎今陛下建中和之政凡以繩祖武厚民生無所不用其極中外欽承無遠弗届是以藩方大臣於錢榖甲兵之外惓惓以光昭令徳為請其知為政之本也已漢世宗從事西南夷天下為之騷動蜀民咨怨喻之諄諄鑿池涖習再駕而後取之其視今也孰愈穆王周行㝢縣必皆有車轍馬跡焉初非疆理天下也而世猶誦之至今其視䟦履山川灑濯其民而納於禮義之域孰多彼碧雞金馬與夫㸃蒼皆其山之望者也漢使祭之唐季盟之夫各有所畏焉耳今也鐫未始磨之崖紀無能名之績桓桓燁燁與世無極豈惟足以震百蠻榮千古其餘光所被山川鬼神與嘉賴之嗚呼盛矣哉臣事先皇帝早受眷知今復待罪禁林發揚蹈厲職也不敢以荒落辭謹再拜稽首而系之詩曰於皇維元載地統天大噫小嘘曰寒以暄粤西南陬水駛山􅍶風霆流形氣交神州跂息蠕蠕勾萌鮮鮮谷飲巢居燕及跕鳶繄誰之恩聖祖神孫武烈文謨湔祓生存既有典常被之服章我吏我民我工我商萬國一家孰為要荒㸃蒼蒼蒼禹跡堯牆井鉞參旗終夜有光威不違顏作善降祥嗟爾耄倪視此勿忘拂林忠獻王神道碑皇慶元年春天子若曰我太祖皇帝肇受天命太宗憲宗惟艱惟勤逮世祖奄有萬方子孫承承底于朕躬元功大臣宣力載勞褒崇弗稱朕甚憫焉於是制贈故金紫光禄大夫秦國公愛綏推誠恊力賛治功臣太師開府儀同三司上柱國追封拂林王諡忠獻詔臣某撰文刻碑墓道顯休之謹按公西域拂林人祖巴阿喇父博囉穆蘇公剛明忠信能自致身立節於西域諸國語星歴醫藥無不研習有列邊阿達者以本俗教法受知定宗薦其賢召侍左右直言敢諫為世祖所器中統壬戌春詔都城二月八日大建佛事臨通衢結五采流蘇樓觀集教坊百伎以法駕迎導公進言曰方今高麗新附李壇復叛淮海之壖刁斗達旦天下疲弊瘡痍未瘳糜此無益之費非所以為社稷計也上嘉納之是月望上幸長春宫欲因留宿公趣入諫曰國家調度方急兵困民罷陛下能安此乎上方食愕然盡以賜公拊其背曰非卿不聞斯言促駕還自是日見親近公亦無所隱至元戊辰春大蒐于保定之新安日且乆公於上前語供給之民曰得無妨爾耕乎上即日罷從幸上都新涼亭成大宴諸王百官競起行酒公進曰此可飲乎上悟抱公膝上啐其頂左手挽公髯飲以酒顧謂皇太子曰有臣如此朕何憂焉癸未夏四月擇可使西北諸王所者以公嘗數使絶域介丞相博囉以行還遇亂使介相失公冐矢石出死地兩歳始達京師以阿魯輝吾所贈寳裝束帶進見令陳往復狀上大悦顧廷臣嘆曰博囉生吾土食吾禄而安於彼愛綏生於彼家於彼而忠於我相去何遠耶拜平章政事固辭初上登萬歳山瞻望四郊惻然纍纍欲遷之及將盡徙南城居民實大都皆弗果賜宿衞士廬舍禁殺胎夭䴠置西域星歴醫藥之署立廣惠司給在京疲癃殘疾窮而無告者皆以公言罷行之成宗即位眷益隆賜腰輿出入大徳癸卯上弗豫政出闈闥秋八月京師地震中宫召謂公曰卿知天象此非下民所致然耶公對曰天地示警戒耳民何與願熟慮之曰卿早何不言公曰臣奏事世祖及皇帝雖寝食未嘗不召見今曠月日不得一入侍言何由達數年之間灾異日起公力陳弭變之道辭多激切弗納丁未上棄臣民公時在秘府有秘文非御覽不啓中使奉内㫖迫取公厲色拒之今上皇帝奉皇太后至自懐州悉誅奸黨迎立武宗以公為忠爵賞特異方倚柄用至大改元六月癸卯薨于上都之私第年八十二三宫悼惜不已贈賻有加某年月日葬某所公起家為定宗近侍中統間掌西域星歴醫藥二司事至元戊辰兼廣惠司丁亥拜秘書監己丑領崇福使甲午加翰林學士承㫖兼修國史大徳丁酉遥授平章政事丁未封秦國公積階至金紫光禄大夫今而有是命前後以功以言被賞賚及卒葬賜贈黄金為兩者四百有竒白金七百有五十楮幣十五萬水晶金玉器珠衣㡌寳帶錦衣白馬不可勝計六男四婿三孫皆為大官近侍長男額哩葉先禄大夫秦國公崇福使領司天臺事次㙮爾哈翰林學士承㫖資善大夫兼修國史次哈斯光禄卿次克哷濟蘇太中大夫同知泉府院事次老哈昭信校尉提舉廣惠司事次約尼宿衞興聖宫長壻榮禄大夫宣徽中政使訥古徳勒次中順大夫同知崇福司事蘇爾坦次資徳大夫章佩院使烏呼納次更直禁衞士赫赫長孫布格次蒐克次安圖皆直禁衞盛矣竊謂古之有天下者皆以得人為基我朝以神武仁恕定四海群方萬國忠良亮直雄偉傑雋之士莫不都俞廟堂之上歴數世而彌光若公者得輸肝瀝膽致位丞弼自公而王載美太史垂榮子孫稱社稷之臣豈偶然哉銘曰於戯皇元赫赫巍巍聖祖神宗超姚夷羲東集扶木西臻虞池嚴嚴在廷文凝武思我有争臣拂林之支衣義飫仁載公轢私佐定翼憲世皇是儀靡言罔從靡徳弗施我車爾輔我舟爾維惟公之來廢寝忘飢惟公之言堇荼如飴杖節遐徼信威四陲朝霜茫茫夕雪霏霏既復而往復往而歸蒙強突勁睨險如䧅彼留而安寧歸而危皇華以遣出車勞之大徳之末蕭牆禍基牝雞晨雊猩猩夜啼圓儀示儆方載陳規弗悟弗悛竊弄潜窺在朝惟公謇謇不移我皇赫怒草刈榛夷大業載安天平地熈惟公始終不詭不隨漢軼武騫唐擬徴珪何以賚之寳帶珠衣何以貴之大冕桓圭膴膴拂林爾封爾提惟君之聖惟賢之知欽于世世視此貞碑趙氏先廟碑先王之制諸侯廟五大夫廟三父為士子為大夫葬以士祭以大夫禮也是以君子将營宫室宗廟為先祭器為次居室為後而宗廟之器苟可銘著者無不著焉所以慶所以勸也忠孝之道備矣今天子稽古右文一本於禮河洛之思羮牆之見慨然延念先正之臣克左右亂四方其股肱心膂之績固以彰于彛常煥乎其足徴矣乃若國家所以報往而勸來者猶以為未底極也爰命公卿舉先猷展故實而隧章之典行焉於是陜西行御史臺以永古特氏父子勲伐列上公車有㫖集博士禮官議議既上詔故征行大元帥按扎爾為推忠佐運功臣太保儀同三司上柱國追封秦國公諡武宣配白氏秦國夫人故蒙古漢軍都元帥國寳為推誠佐理功臣光禄大夫平章政事柱國追封梁國公謚忠定配雲氏梁國夫人明年公孫世延入叅大政政以咸熈天子嘉焉又贈其曾祖故群牧使逹衮彰義保節功臣資徳大夫御史中丞上䕶軍追封雲中郡公諡貞毅配鄂喇琨氏雲中郡夫人繇是叅政之先三世六人皆蒙加恩又明年叅政拜中丞自中丞遷右轄分治雲南天子顧中丞非君不可復拜中丞以乃祖乃父勤勞皇家宜撮其平生著之閟祀庻幾永啓厥後爰詔臣某文其家廟麗牲之石臣惟上之下下郅隆者恩也大復古始者禮也感激奉詔謹按永古特氏雲中世族武宣公幼孤育於外氏曰卓裕勒嘉因姓舅姓轉而為趙宣武智略沈雄弓馬絶世未冠材器已顯攻城略地所向無前扈太祖平河湟從太宗下岐鳯馘強俊取平凉慶原邠涇如風隕籜金源固守闗河幾二十載一旦武宣假道擣虚如天墜而地湧良平之智不及施賁育之勇無所用心潰膽裂莫之能支睿宗深所嘉賞金源繇之遂墟已而奉律西征隴右遄定進兵蜀道首奪階文守漢陽制三邊納吐蕃收後効成都夔門之戰江油張掖之師皆其功之較然者多謀尚義厚下恤民所至捄殄戮贖俘囚輯降附則所惠葢廣矣然則開國之功不後諸将而略不滿假退然若無所謂勞謙君子者歟忠定雖出将家自㓜學問雍容閑雅言貌甚都葢武宣雖積苦兵間而敬禮儒生恒戒軍中無毁文籍是宜有佳子弟之報慷慨倜儻能得人之懽心勇於當敵愛恤士卒有古名将之風焉重慶刪丹之戰皆居軍鋒或降或殱無不如志火都受首䇿之彌精思立竒功以承先志乃招屬户修廢州虎視西南别授元戎之寄於是徼外羌渠畏威欵塞列於王㑹初不自以為功降羌爵命反出其上殷勤遜謝益簡帝心君子有終世濟其美古之名将有不能及者矣竊嘗䆒觀成功之臣弗居者百一而矜以致敗者何多也若武宣忠定為而弗有有而弗恃簮組蟬聯式克至于今日父子祖孫並受顯服胙之秦梁躋之廟祏將遂為百世不遷之祖非盛徳孰克登兹嘗聞雲中据西北河山之奥原野高博風氣凝厚炳靈異而生其間者不出則已出則必瑰偉絶世之材若永古特氏之達已數世而方來者彌昌其不謂之間氣之鍾歟且家奮於韜鈐而中丞服膺詩書動必以禮高材姱節負天下重望尊天子之命考先王之禮於報本返始敎孝移忠之義葢惓惓也詩不云乎以似以續續古之人斯可謂能似續者矣揆厥淵委宜有雄詞發揚蹈厲老臣何能然大君有命謹摭其大者而系之銘銘曰皇帝御㝢天葢地函萬有咸鬯施仁錫類幽遐闓通恩明在上矧兹世勞崇功廣業禮有攸當永古特氏方叔召虎父子相望揚休纉慶光于邦家以将以相桓圭𤣥衮爾祖其從同尊與享馨香惟徳子孝臣忠世世无曠刻此貞石以昭淵猷以迪永養應昌路報恩寺碑城應昌之四十有一年上即皇帝位制公主星格喇實封皇姊大長公主子阿爾嘉世立嗣封魯王命下之日主謂王曰應昌有土肇自太祖皇帝成於世祖裕皇而順宗皇帝今儀天興聖慈仁昭懿壽元皇太后實已所自出上篤親睦之誼承成宗武宗惇叙之志以有今日欲報之徳惟佛焉依至大二年嘗規建佛寺于宫之東曰報恩盍竭力成之既成請文勒碑昭示無極上以命詞臣臣某謹按太祖初興魯國忠武王阿齊諾延以佐命元勲有分地約世婚而昭睿順聖皇后歸于我世祖太祖之孫色徹肯公主下嫁王子納沁主元八年始置應昌府以封其子特穆爾尚帝季女囊嘉特章公主未㡬陞府為路十四年特穆爾北征有大勲賜號阿勒逹爾圖諾延元貞元年封濟寧王主為皇姑大長公主子敦布拉尚星格喇實公主乃今皇太后之中子也大徳十一年武宗即位封皇妹大長公主敦布拉魯王逮今嗣王祖孫凡五世國益大爵益貴恩數益異為之傅以輔之為之群有司以治之於是鴻吉哩氏雖古塗山有娀不足擬隆寺之建所以歸美報上昭忠孝也殿堂廡門庖寮庫庾庋經之室棲碑之亭金碧焜華棼橑宏宻繚以周垣亘以修塗一木一石必出乎已一夫一役不煩乎民簡僧之有行業者曰智以主之日帥其徒誦演祝讃梵唄洋溢諸佛降監祖考来格帝室王家福禄攸同謂之報恩不亦宜乎洪惟聖祖神孫覆斯天載斯地廣大慈仁與佛一徳皇姊嗣王克永孝思克廣徳心以崇佛乘宜聖上親親之道彌至而臣子報稱之誠無斁賛皇圖於億載保王國以匹休猗與盛哉臣某謹拜手稽首而獻頌曰在昔太祖龍興朔方惟鴻吉哩忠武洸洸佐定中原遂開大荒約締世婚申錫土疆實生昭睿相我世皇光天之下徳盛仁強應昌既邦魯國是王貳館繼承奕葉重芳連城列邑沃野相望設官分職乃紀乃綱婉婉皇姊愛積厥躬帝弟帝兄承于祖宗洎我聖母澤濬恩隆何以報之佛法是崇乃集群材乃徴六工于城之中于宫之東爰作爰謀爰蔽我衷以奠覺皇以展孝恭飛殿峩峩列屋周阿丹題藻梲電轉星羅彤雲承霤翠霧凝柯天花夕雨貝葉晨哦慧日曬光祥風扇和寒松沃色碧海澄波永底佛慈百禄是荷磐石其宗礪山帶河聖母萬年帝壽且多佛法廣運皇道無頗魏國趙氏先徳之碑夫立徳制行外有以孚于人内有以孚于家善亦審矣若其晦顯則係乎時焉而非為善者之所急也金源氏之末有趙令宰元城吏民愛之既沒相與封樹其墳至今謂之縣冢此可謂善孚于人者矣令之冡婦曰袁㓂至擕二兒逃于鄰穴不納則棄已所生者於草抱前室子以免明日㓂退草中兒亦無他衆義而賢之此可謂善孚于家者矣其孫為御史使東南還過潤適秋濤大溢冐田廬毁城郭失亡甚衆存者無所得食輒以便宜發官粟以賑全活無筭其後乘貳車㢘訪浙部又值饑疫躬歴民廬勸分所活如上然則好善其家法耶先是朝廷興舉䘏典以勸臣鄰視厥子孫之秩追命其先有差乃延祐二年冬御史臺言曰侍御史趙簡自始通籍以迄于今宣猷多矣其家贈封之恩敢請循令甲制曰可贈大父琛資善大夫大司農卿上䕶軍追封魏郡公諡安僖父楫榮禄大夫大司徒柱國追封魏國公諡敬惠大母袁母李皆追封魏國夫人明年春再以表墓為請有㫖命臣某文之于碑謹按趙氏魏人曽大父藻元城令大父琛潜徳韜輝七十二乃終娶于李生汴而卒再娶于袁生楫即草中棄者也袁有志操勤以裕貧儉以養節衣食必先汴而後楫既長則遣楫婿於李而為汴娶董氏焉汴亦終不仕以養曰進曰徳其子也又皆賢楫雖出居然不忘其親事之極孝趍義尚交俶儻自憙中統初宣撫張公某材而辟之辭不許則願下就工官以便定省張公益賢之後遷承事郎織染司提舉善於其職嘗輸幣于宫府獨以精良受美錦之賞以老上印綬去陳書樂賔不復與世事張夢符書其堂曰餘慶李受益為之記盧處道為之銘名士數十人皆歌詩以屬之大徳癸卯正月十三日卒得七十有四年李慕用君姑之徳順而貞睦而肅以服飾易書敎子故皆有成後夫四年卒得七十有四年子男四曰簡中大夫侍御史曰亨襄陽三司大使曰潤山東宣慰司照磨曰循雜造織染提舉皆能官有譽簡端深闓亮服膺詩書向自淛部入為刑部侍郎遷南臺治書河東憲拜治書侍御史叅議中書河南叅政晉居臺端建白宜開經筵講聞治道及選耆儒訓迪宫邸上嘉其忠賜貂裘犀帶至是又有今命父子祖孫逮于閨門咸食善報所謂降之百祥者歟書云臯陶邁種徳夫臯陶亦豈若農圃然日夜眷眷遲其所殖之孳茂且實而享有其利哉世或不察而以種徳自名持陿而望奢尅期延佇小有不遂則已固疑而怠衆亦且笑而議之矣夫以一婦人當危急存亡之時身且不保何暇他有所計特其真誠恤孤保抱鞠育同於所生及顛沛造次之頃能不失其本心耳又豈知今日之報乎惟趙氏之善發於元城濬於魏郡而澄涵於敏惠然非有為而為之是故充於中而弗外見必有後嗣若此然後大襮君子曰幸哉不然為善者何恃臣既奉詔叙次為之三嘆申以銘詩曰太上貴徳肫肫其誠道既隠只有實有聲抑又㪚譌課功責贏或觖以對或恑而馮是以在昔戒母近名顯允茂宰維魏之華嗣有明哲實昌厥家夫出婦居衆奔以譁曰冦至矣績捐其麻左抱右提孌孌呱呱蒼黄怔營一母二嬰誕棄其一豈獨寡情顧此失恃我所素矜棄彼在我此棄孰生天兩全之載歸載寧自兹繩繩時乃天道我初何心人謂其報司徒司農崇封顯號湯沐大名配食祖考懿彼淑人維神所勞天道無親恒與善人天何言哉委于大君允爾趙氏茀禄用新言與其善言昭其厪咨爾雲來爾朂爾遵匡氏褒徳之碑天子既興聖人之治忠孝貞節之旌徧天下而下邳匡氏尤以挺特聞延祐二年九月三日遂以集賢大學士臣顥請賜匡氏褒徳之碑臣某奉詔為之文曰匡氏漢丞相衡之裔世居滕後有諱友者與子珍耕于邳皆甚賢鄉人慕之號其居曰匡家穴珍娶劉氏生一子曰才是為元帥公公雄勇多智好讀孫呉書仕金為武略将軍邳徐兵馬都巡使嵗壬辰金亡甲午率所部歸國屬大帥岱齊麾下令招收散亡還守邳境公言邳徐逼宋北邊而銅郡孟山宿遷桃源睢口皆要地今不早乘勝攻取則邳徐不可守矣帥大然之益兵俾與禆将百家奴進擊不旬月五城皆破獲馬都統王都統以歸板授沂邳東河監軍丙申邳人袁萬作亂隂連宋将李都統兵襲邳公出戰大敗之獲袁萬加沂邳東河監軍諸路兵馬使戊戌徐守張彥叛合宋将鮑太尉等來攻復敗之擒其将丘太尉等二十餘人進沂邳東河元帥兼建武軍節度副使壬子宋兵大入境戰不利死之時年六十五夫人高氏儒家子亦負竒操歳庚子公計事幙府邳賊夏興乘虚襲破邳執夫人以去夫人大罵不屈賊怒㧞刀斮面仆地賊以為死獲免百家奴破賊分其産以畀之幙府因名其田曰夫人荘以旌之公死時夫人年始三十五誓死不嫁子國政六歳而孤所依唯母一日宋兵暴至母子相失母哭曰天乎吾子死匡氏絶矣我生不如死乃冐鋒鏑求於亂屍中得之卒幸全中統三年李璮叛宋人伺間擊破邳盡俘邳人國政與母與焉居之淮安至元十三年宋亡國政率其衆三百餘户北歸從淮東行樞宻院伯竒爾穆蘇朝於上都賜宴便殿錫以衣服鞾㡌授承事郎揚子縣丞歴睢寧汶上主簿丁母艱起佐濮州遷睢州判官虞城縣尹所至以廉惠稱事母尤極孝母年五十疾甚刲肝活之復疾復刲肝後數載又疾又剔腦和藥以進疾竟愈母聦眀康強八十九而終國政廬墓終喪有麞時至廬所若素豢者郡邑聞而異之曰父死忠母守貞子盡孝有一猶難矧兼之耶上其事表其里曰貞孝女一適毛閏孫男二曰傑曰慶女四長適陶英次適屯田提舉單禎次適劉江次適金師古公之墓在里之先塋夫人高氏祔謹按昭文館大學士太醫院使完顔致所状如右臣某曰匡元帥屢立顯功殺身為國雖三遷官皆出幙府時官制未行也高夫人不辱其身國政克致其孝有司旌之宜矣而國政間闗數千里率衆來歸僅得貳一逺縣世祖之惜名爵可知已國政陸沉州縣四十餘年曾無幾微顧望心不亦賢乎匡氏一門大節焯焯如此然非臣顥不能上達非聖天子不能嘉憫而褒顯之則是舉也豈不君君臣臣哉銘曰匡氏維邈有相于漢徙滕蓄懿耕邳遘亂仡仡元戎沉幾獨斷爰歸有徳振我南翰刈旗馘将捐軀折叛輸忠未究居然永歎阽危反覆全家就難蹀血僵户南遷北竄㸃戎斫面馴麞繞竁婦貞子孝赫焉炳煥嗣子歸朝素髪州縣徳隆報爽𤣥造誰筭文臣為言睿渥遄渙穹碑既掲河昭宿爛抒誠播辭永激頑懦均州武當山萬壽宫碑皇慶元年春三月京師不雨徧走羣望不雨詔武當山道士張守清禱而雨明年春不雨禱而雨夏又不雨又禱又雨既霑既渥乃大有秋上寛憂顧下蘇飢窮道術以及物為功諒矣初均房之間有山曰太和又曰仙室以𤣥武神居之名武當踞地八百里峯七十有二最高曰紫霄之峯峯之最勝曰南岩岩前有洞天二曰大安皇涯之天曰顯定極風之天上出浮雲下臨絶澗猿啼鳥嘷豺虎所家人可投足者僅尋丈許道家言龍漢之年虚危之精降而為人修道此山道成乘龍上飛是為𤣥武之神至唐貞觀益顯天下尊祀宋理宗時詔道士劉真人作宫此岩不克漢東異人魯大有隠居五龍觀草居菲食四十餘年救灾捍患預知人禍福時人神之天兵破襄漢去渡河訪道清和真人西絶汧隴北踰隂山至元十二年歸與道士汪真常等修復紫霄五龍諸宫獨結茅南岩或請作室廬曰非爾所及也其人将至矣二十一年秋九月師自峽州來年二十一願為弟子大有欣然曰吾遲子乆矣即授道要明年春正月大有仙去師躬執耕㸑墾山鑿谷種粟麥為食繼帥其徒剪薈翳驅鳥獸通道自山趾三十里至五龍觀又七十五里至紫霄宫又八十里至南岩歳三月三日相傳神始降之辰士女㑹者數萬金帛之施雲委川赴乃構虛夷峻揵木穹谷刋石窮厓即岩為宫廣殿大庭高堂飛閣庖庫寮次既嚴且㓗炫晃丹碧轇轕雲漢像設端偉鍾鼓壮亮引以石徑䕃以松杉積工累資巨萬計歴二十餘載乃成墾田數百頃養衆萬指至大三年今上皇帝儀天興聖慈仁昭懿壽元皇太后聞師道行遣使建金籙醮徴至闕賜宫額曰天一真慶萬壽置提㸃甲乙住持制加神號𤣥天元聖仁威上帝神父啓元隆慶天君明真大帝神母慈寧玉徳天后瓊真上仙賜師號體𤣥妙應太和真人延祐改元春二月皇太后命師乘馹奉香幣還山致祭冬十月集賢大學士臣顥請加賜宫額曰大天一真慶萬壽宫詔翰林學士承㫖臣某撰碑文集賢學士臣孟頫書丹中書叅知政事臣世延篆額臣某竊惟聖天子原清静之本躬垂拱之化父天母地懐柔百神陶成萬類子育兆姓宵衣旰食期底于治可謂至徳也矣師以雲棲霞舉之侣而能振道濯徳焦心苦志奮樹堂壇以承天休亦可謂豪傑之士矣師闓䟽果毅方嚴質茂雖大祠祭不待沐浴更衣所感必應雖身被顯寵如始入山其有道者耶若神之徳廣大混茫變化無方謂列宿所鍾詎不信然從師至京者曰唐道𤣥云臣某謹拜手稽首而獻詩曰翼軫之墟均房間白雲峩峩武當山根盤千里阻且艱七十二峯羅烟鬟帝遣𤣥武驅神奸被髪長劒衣黫黫穹龜修蛇猛且閒乘雲而來馭風還跂予望之杳莫攀真人學道鐫堅頑飛上千仞誅榛管斡旋天樞啓天闗瓊樓珠宫翠囘環霞披霧暎黄金鐶湛恩大號帝所頒神來居之珮珊珊寒松蕭颼水潺湲飛香滿空馥黄蘭願神永永哀民囏汎掃穢濁撫恫瘝我皇萬嵗御九寰興聖怡愉長朱顔雪樓集卷五
