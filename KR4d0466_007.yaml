body:
  text: 雪樓集卷七元程文海撰玉堂類藁敕賜碑南陽書院碑皇帝即位之四年冬十有二月集賢大學士臣皓言臣幸得待罪周行在帝左右位崇智下無以仰答聖明有能推尊聖人之道表章大賢之業作興民俗敷宏治化者此真人臣之職而上之所宜聞也臣謹按南陽城西五里有岡阜隆然隱起曰卧龍岡有井淵然渟深曰諸葛井者相傳漢相忠武侯故宅民歲祠之巫覡雜揉薦獻無節黷禮慢賢君子病之至大初故河南行省平章政事何瑋行農至郡率官吏老長伏謁祠下顧瞻徘徊愾然興懷謂守臣史烜曰孔明三代而下一人而已武昌相去千有餘里猶建廟學而尊祀之况其所游處也哉出步祠東得隙地焉曰是足以建廟學矣遂以諉烜烜下邑主簿趙守訓董其役乃合僚吏祿入之贏以備傭相山之有良木石𨽻官者以具材審制度地與設官養士之宜上于省以聞報可至大二年春即工大修侯祠而加廣焉祠之東為孔子廟廟之後為學凡堂序門廡庖湢庫庾肄業之齊庋書之閣官守之舍咸備屋以間計祠十有二廟學四十有六皆端壯廣直不務侈麗皇慶元年秋落成割官之廢地四十頃籍于學置山長一人掌其教而訖功且再歲矣廟學之顔麗牲之碑惟陛下幸焉即日下中書平章政事秦國公孟與翰林集議臣孟等言夫子廟宜因舊制殿曰大成之殿門曰大成之門侯之祠宜曰武侯之祠侯曰非淡泊無以明志非學無以廣材非靜無以成學學為侯作也宜以講堂為靜成之堂東序為明志之齊西為廣材之齊閣所以崇羣書也宜曰崇文之閣合而名之曰南陽書院制曰可其命翰林學士承㫖賡書之翰林學士承㫖某為碑文書篆并以付賡臣某竊謂周道既衰孔子作春秋而萬世君臣之法定曹操篡竊羣雄並起而爭之春秋幾廢昭烈揭大義發大號再造劉氏侯首稱漢賊不兩立王業不偏安間關百折期復漢祚春秋之義煥然復明至今三尺之童猶知賊曹而帝漢者侯之功也傳曰有功於民則祀之侯之功萬世之功也况又居其鄉哉烏乎我朝聖祖神孫武定文承薄海內外罔不臣妾諸學子以及有位之人師聖人之道仰大賢之業夙興夜寐可不思廟學之所以建聖天子之所以命豈徒夸前人聳後觀哉所以教天下知為君臣之道也烜世有勳伐今守饒州守訓供俸翰林云詩曰惟皇上帝降衷于民惟皇作極以君以臣皇風既邈王霸攸作乃修春秋褒善黜惡漢有天下擬迹舜禹厥德既衰冠履易處不有昭烈孰扶天綱不有武侯春秋以亡河漢之間南陽之郭盤盤卧龍惟侯之宅山縈川絡霧矯霞舒尚想君王顧彼草廬惟侯之學伯仲伊吕惟侯之志光我漢祖躬耕之憂廊廟是蹈義信志詘四海其悼廟學之設惟侯之思天子之錫惟侯之儀高山景行君子所履詞臣作詩永作臣軌武都忠簡王神道碑太祖時國字未立凡詔誥典祀軍國期㑹皆用輝和爾書時武都智敏王居部中年十五盡通其學冠諸部名動京師乃徴詣闕召對稱㫖詔侍睿宗世祖南征以為斷事官及即位有翼戴之勤再命為丞相不拜然內外尊禮咸視丞相凡與上謀議未嘗出以語人推轂天下賢俊未嘗有德色故位列卿佐而名出宰相上有子男十一人孫男二十四人皆為顯官女四人孫女四人皆嫁世族羣臣之盛鮮與為比世其學者惟忠簡王王生有異質強敏過人為裕宗宿衛起家至元十五年從征有功授從仕郎樞密院都事徽仁裕聖皇后召入內廷以字學訓成宗晉王十九年進朝列大夫樞密院斷事官雪邊帥之誣衆譽翕然大德二年遷翰林侍讀學士太中大夫復命輔迪武宗今上九年升翰林學士正議大夫武宗即位以師傅恩特拜榮祿大夫大司徒翰林學士承㫖知制誥兼修國史至大元年加金紫光祿大夫領太常禮儀院事餘如故明年九月十日以疾薨于京師年六十一三宫弔賻制贈推誠保德濟美功臣太師開府儀同三司上柱國追封武都王諡忠簡以某月某日葬高良河之濵智敏王之兆延祐二年某月上思舊學之懿欲永其行于石而以文屬臣某臣念嘗奉明詔為智敏王碑以臣荒陋方懼弗稱今復以命臣豈以臣與忠簡王嘗獲同僚知王為審耶敢不欽承謹按王諱阿實特穆爾輝和爾人世居伯什巴里入國朝乃徙於燕曽大父諱巴拉瑪大父諱阿迪斯世有名位父諱默色斯至元四年薨特諡敏惠公大德十一年贈推忠同德佐理功臣太師開府儀同三司上柱國追封武都王改諡智敏母曰齊達勒翁吉拉特氏昭睿順聖皇后諸妹也追封武都王夫人生子五長曰瑪努勒今為開府儀同三司大司徒翰林學士承㫖領章佩監次即忠簡王至大中權臣用事公道壅底上雖聰睿剛斷樂聞直言羣臣恇怯畏忌惟王知無不言言無不聽朝廷舉諸大典多出王請蓋王好謀而善諫上方眷倚而天不憗遺哀哉王之配曰托克托鼐氏封武都王太夫人有子男二科綽同僉太常禮儀院事多爾入宿衛曰和爾章氏有子男二拜特穆爾廬州路達嚕噶齊呼圖克真州達嚕噶齊女一錫錫適尚醖局都提㸃溫都爾曰科爾沁氏無子惟智敏以長材宿學際明時遭聖主辭尊榮於再命保貞固於初心所以風當世澤後人者深矣而王師傅三朝益侈先業都清華之貴襲異姓之封昭旗常播簡册豈曰過哉乃叙而銘之其辭曰遐哉邈矣慨彼先覺窮深滌逺智敏之學方其逢時鳯嘴麟角日月耀彩風雲附足人具仰止高揖恬漠爰集忠簡克承于家夙夜通明從容承華既傳德義復篤忠嘉直如朱弦藹若春葩菀兮莫贖萬古興嗟惟王之世功豐德隆三秉鈞衡七守疆封兩典邦教二領元戎或掌詞垣奉常大農曽未百年重卿纍公嗚呼王哉曷起而從武都逖逖伊王之國赤舄奕奕伊王之服峩峩穹碑斯王之德王雖不作服美無斁尚迪後人輔我皇極陳氏先德之碑天子既用潜邸舊臣陳皓為集賢大學士以制書就第拜其父榮祿大夫大司徒上柱國封趙國公母李氏楊氏並趙國夫人配完顔氏封亦如之又贈曾祖考昭文館大學士中奉大夫護軍諡通憲祖考資善大夫大司農卿上護軍諡康靖並追封趙郡公曾祖妣劉氏祖妣樊氏並追封趙郡夫人前妣王氏追封趙國夫人陳始居盧龍遷霸之信安復遷河間之清州延祐元年夏五月皓自霸啓曾祖祖及伯父三世之封改葬清之司馬莊明年春三月天子復賜先德之碑而命臣某撰其辭謹按皓五世祖諱山以材勇仕金纍遷穆琨監軍大安初守居庸關聞太祖神武仁聖必有天下以兵內屬為平陽太原等路軍民都元帥後以年老歸信安金主南播河北山東羣盜並起有號兩淮張者據信安元帥單騎入謁說令北歸弗聽環信安百餘里皆水澤有蒲藕魚鱉可賴以食春秋積潦車馬不得進冬以水沃城則凍不可登張恃以為固數喻以禍福終不聽壬辰將帥滅金乃慷慨言曰今天下已定君保一孤城欲何為耶生民何罪城且屠矣張感動從之元帥娶禇氏邢氏生子課德松課即通憲公禮賢下士繇千戶都統為萬户與金人戰死是生康靖公德娶孫氏常氏無子松娶趙氏生廥菑畬廥生昉畬生暉昕康靖修潔自好生國祥國瑞剛國瑞是為大司徒樂善喜賔客今年八袠猶聰明不衰國祥嘗提領稻田事實祔葬新塋娶徐氏殷氏有子曰克溫克良克恭克遜克立剛善騎射終同知固安州事娶孟氏吕氏蕭氏有子曰克信克誠克忠惟皓寬敏信厚強學好義從翰林學士承㫖安藏事徽仁裕聖皇后安藏深釋教后乃命皓祝髮受戒及從上覃懷入侍春坊益見親用武宗命以資德大夫為釋教都總統上即位遂易冠服以榮祿大夫位集賢恩寵甚渥臣嘗觀前古士君子積德纍行不獲其報必有賢子孫出遭聖明大顯其道若陳氏之先知時審變輸忠伏節磊磊若此而皓果能遇非常之主朝夕左右言聽計從名在賢公卿之列親老益壯生享大國之封豈不信哉皓王夫人出夫人有賢德為九族儀軌配完顔氏金翰林學士銀青榮祿大夫貞簡公蘇都爾之曽孫左諌議大夫蘇哷之孫也銘曰乾剛兮坤柔隂陽兮曷留何滄海兮不縮不盈何草木兮一春一秋豈積之有厚兮其培之有弗固惟先哲之孔明兮克置豫于度嗟虞舜之大聖兮氏茲陳于既衰或受命而君兮或良弼而碩師歷周漢以底于今兮猶昭晰而弗虧孰夕風而朝露兮孰冬盛而夏腓伊盧龍之茂族兮既益熾而彌章俯黃流之奔猛兮吾將沂夫崑岡遭明哲而際運兮是果誰之所造匪夫傳之有則兮而繼之有道冠岌岌綬緌緌兮曰載錫此趙土既尊乃父兮遂及厥祖今視前而丕纘兮後復祗承于厥今何祚之有窮兮何福之不任世世鑑此貞石兮乃爾祖之志天子之心姚長者碑皇帝在春宫時嘗幸勝因寺棟宇華潔象設嚴穆顧昭文館大學士頭陀教宗師溥光而美之溥光對曰都民姚長者之力也因歷歷道長者平生由是長者名姓簡在帝心長者卒之明年十有一月集賢大學士陳皓言于上願表其墓以風厲天下之好善者詔臣某為之文臣謹按長者諱仲實字仲華河南人和粹謹厚好善不倦父守信仕金為千夫長沒於王事金亡奉母趙家于京師至元十三年為京敖鹽局使二十四年遷真州三務使居半歲慨然曰剝下以事上非我志也棄官而還以為京師天下之都㑹也東至于海西踰於崑崙南極交廣北抵窮髮舟車所通貨寶畢來可廢居以為富行之十年纍資巨萬乃曰積而不散禍之招也於是耳目之所及力之所至緩急患難知無不為謂人莫悲於死無以葬買雍莊地十餘頃為義塋以藏之歲將冬地且凍預為竁以備之人莫病於男女失其時貧不能婚嫁者資以助之人莫不幸於失身為奴贖而齊民者數十家飢則為食於路以餉餓者寒則置席于獄以藉囚者天子建辟雍獻美木十章米五十斛織金帛二端役夫羊裘九十襲勝因之創也致幣五萬餘緡大藏經一藏若元正若天壽節若車駕行幸還若國有大慶必率諸耆耋執贄入賀元貞初裕聖皇太后册寶禮成詔賜綵繒百二十匹復其庸調又命為京師諸耆耋長念無以報上德乃于萬安寺建水陸㑹清本庵藏黃籙醮施大藏經三藏于元國慈濟興福寺捐金永安寺白雲觀而祝釐焉至大庚戍春丐貧民責五萬餘緡還其劵前後施豫不可勝計至元初于城東艾村得沃壤千五百餘畝構堂樹亭繚以榆栁環以流泉藥闌蔬畦綺錯棋布嘉果珍木區分井列日引朋儕觴詠嘯歌其間聘名師課子孫洎然無所干於世優游四十餘年以至大四年正月十有七日無疾而卒年七十三越五日葬漆園之先塋送者數千人塗祭巷哭哀聲徹天皆曰善人亡矣娶劉氏亦好善二子積中由御史臺譯史遷太史院積善四女孫男曰永安臣讀太史公書劇孟郭解輩事甚義而不軌於道白圭猗頓術可富而不聞其能散孰若長者一介之士名動萬乘聲流四方稱于後世豈不以好義而軌於道積而能散也歟烏乎賢哉銘曰於嗟長者生獨不群視人如已與古為鄰孰不為富暴刻是循孰不閔窮施者何人于嗟長者佩義服仁德被死生惠及疏親相古之人卓孔之倫義豈不高匪道之遵吁嗟長者生遇聖神恩下九重名垂萬春藹藹天都鬱鬱漆園史臣勒石過者書紳凉國敏慧公神道碑昔者聖人範金合土飭化八材以利天下後世者夫豈一手一足之為哉必有感㑹契合之數焉是故羲軒不並興倕般不並世我世祖聖德神功文武皇帝受天景命以有九有之師思闡能仁安集率土乃中統元年西召帝師帕克巴俾之為上士綽爾濟斡建黃金浮圖于吐蕃以天竺泥波羅國良工之萃也發詔徴之國王奉詔搜羅得八十人令自推一人為行長衆莫敢當有少年獨出當之問之年曰十七矣主以其幼對曰身幼心不幼也遂使部衆以東帝師見而異之因使督役明年浮圖成自請歸養帝師竒其材勉以入見天子且為祝髮授以祕典日誦數千百言心印大明慧解殊勝因以薦聞上趣令侍臣往召既至上目之久乃問汝來大邦得無怖耶對曰聖人子視萬方子至父前何怖之有汝來何為對曰臣世家西土奉詔構塔于吐蕃者二載見彼土兵難願至尊安輯之特為蒼生來耳汝何所習對曰臣以心為師粗知繪塑鑄鏤上大恱命取古銅人示之曰此王楫奉使宋時所進關鬲脉絡咸備嵗久缺壞命匠繕葺皆辭不能汝能之乎輒諾奉詔至元二年乙丑補銅人成上閲之悉大喜呼辭不能者皆來使之諦觀曰爾辭不能此誰所補皆頓首謝曰天功非人所及也延祐三年春以集賢大學士邦寧皓之言有詔樹碑于凉國敏慧公墓道翰林學士承㫖某為之文臣某謹奉詔公諱阿爾尼格泥波羅國王之胄即前少年補銅人者也祖考密迪哩贈中奉大夫護軍漢中郡公考拉克納贈資善大夫上護軍漢中郡公祖妣琨德楞齊默氏妣蘇默哈達氏皆贈漢中郡太夫人公生三歲父母携以禮佛公仰視塔曰此心木及相輪寶瓶誰所為歟聞者驚異知為夙緣髫齓端嶷如成人入學誦習梵書未久已通兼善其字尊宿自以為弗及尺寸經者藝書也一聞讀之即默識之少長每有所成巧妙臻極既補銅人上深簡注工事無不命之若佑聖廟之肖貌如生若護國仁王之莊嚴無上若西園之玉塔陵空皆公心匠之權輿九年忽病中使宣問踵至而病益甚乃夢遊鈞天帝所下憩居庸之巔四天女饋以食食已曰公可歸矣既寤沉痾頓失詔給衛士十人尚方日供珍饌賜以飾金腰輿十年立諸色人匠總管銀章虎符命公長之統四品以下司局十有八鑄黃金為太子寶安西北安王印金銀字海青圓牌內廷大鵬金翅鵰尚醖巨甕又創為鑌鐡自運法輪行幸揭以前導十一年建乾元寺於上都制與仁王寺等上都國學始成肖祀夫子十哲詔公為之賜宅京師咸宜里金幣皆有差十三年建寺於涿州如乾元制初公之夫人某氏猶留鄉國順聖皇后嘗遣黃金賜之族薰利賜金輒匿之而以夫人適他姓弗從則幽之絶食者浹旬死拒得免是年特出中使賫黃金五百兩乘傳往召即凉國太夫人也十五年詔公返初服授光祿大夫大司徒兼領將作院印秩皆視丞相賜冕服玉帶錦衣金帶燕衣二十四襲貂裘帽鞍轡車馬妻以宋景獻太子孫女郡主趙氏凡景獻府庫田宅悉賜之十六年建聖壽萬安寺浮圖初成有竒光燭天上臨觀大喜賜京畿良田畝萬五千耕夫指千牛百什器備十七年建城南寺二十年建興教寺二十八年創渾天儀及司天器物世祖上賔公於私第為水陸大㑹四十九日以報又追寫世祖順聖二御容織幀奉安于仁王萬安之别殿元貞元年建三皇廟于京師又建萬聖祐國寺于五臺裕聖臨幸賞白金萬兩妻以戚里女囊和爾沁資送中給崇真萬壽宫成詔公位置像設大德五年建浮圖于五臺始構有祥雲瑞光之異又命織成裕宗裕聖二御容奉安於萬安寺之左殿六年國學文廟成復命為之肖位遵先猷也公奉詔感激益盡心思焉八年建東花園寺鑄丈六金身九年建聖壽萬寧寺造千手眼菩薩鑄五方如來於是公已老矣最其平生所成凡塔三大寺九祠祀二道宫一若內外朝之文物禮殿之神位官宇之儀器組織鎔範摶埴丹粉之繁縟者不與焉嗚呼勤哉蓋自列聖肇基往往草創至我世祖始建都邑統一函夏中外乂寧年榖屢熟故得以日力之餘展其工事又得不世之巧智如凉公者奉而成之可謂天地之盛時今古之慶㑹也公平居恆誦生滅滅以寂滅為樂先於五臺北山構招提一區四年而成浩然有退休志大德十年閏正月甲午顧左右曰我若瞑目當帷堂設榻使我安寢以逝翌日沐浴而朝朝退示疾中使御醫相屬丁酉竟薨於寢上聞震悼輟朝詔近臣營護其家賜銀鈔二萬五千兩勑有司治葬事是夕星隕于庭眀日木稼越七日癸卯從本國闍維之禮夏五月癸酉塔于宛平縣香山鄉岡子原夀六十有二夫人賽音德哷齊默氏贈凉國太夫人次郡主趙氏繼夫人囊和爾沁蒙古氏次夫人中山湯氏焦氏天水趙氏隴西辛氏蒙古默爾竒斯氏清河張氏太原閻氏子男六人曰阿僧格榮祿大夫大司徒凉國出也曰阿卓勒嘉議大夫諸色人匠總管府逹嚕噶齊閻出也曰阿濟格焦出也曰額布根張出也曰阿齊雅辛出也曰阿齊拉張出也女八人曰默德訥齊默凉國出也適拉塔納新曰嘉納克實哩郡主趙出也為比丘尼曰額森德濟湯出也壻平章政事巴咱爾曰展德勒張出也適鄧州達嚕噶齊和拉布哈曰布延德濟湯出也適中書舍人布哈曰呼圖克德濟辛出也曰旺扎勒默爾竒斯出也俱在室阿僧格娶道安氏武都王之孫大司徒翰林學士承㫖瑪努勒之女孫男二曰阿咱爾曰永安女一曰楚通俱幼至大四年加贈公開府儀同三司太師凉國公上柱國賜諡敏慧至是又蒙恩建碑焉惟公生自金方雖智由天性然所知不出其本及逢聖人之興不間萬里來歸于廷觀慕感效益開厥機故隨命獻功以成一代之偉觀固曰時運亦人事也不然豈能承休光膺顯服若是之烈哉夫備物致用立成器以為天下利者聖人也而巧者述之若公之巧未知與古何先然而名則過之矣不亦盛乎銘曰聖人既作萬物斯覩聞而知歸如父如母如輻之凑如川之赴展體乘心各獲其素允我世祖天生聰明靡有弗燭靡為弗成翼翼凉公維金天精衣壞色衣介焉東征曠若發曚雲披日杲聿觀其辭既諒既好爾來伊何西民無告式廣德心亦昭慈寶於焉定契君聖臣賢仁言利溥巧乃非先萬國來瞻事則宜然有創有承咸則千年我觀于前抑豈皆拙力有未暇或非所屑惟此凉公金紉玉切土木生輝嚕吰嶻嵲孰云羇旅命服在躬遄返其初對是顯庸榮生哀死慎始令終有子世官嘉聞曷窮宛平之原司徒之兆松檟隂隂岡縈水繞積慶在兹永世克肖何以銘之史臣奉詔信都常忠懿王神道碑夫春秋迭運日月遞照必時和而後物生古今豪傑之士亦必有聖哲之主而後能依乘風雲聲流後世蓋運之所啓氣之所㑹固自有時也初太祖皇帝既定中原選兾人常公資入宿衛八年復選掌內宰是生諾敏總管奴婢贈太傅烏爾圖太傅以父職事憲宗二年夏㑹諸侯王于驢駒河之上命宿張具河忽大漲列鼎橫潰太傅身救獲免㑹無廢禮上深嘉賞然竟以此得疾賜白金三百兩為湯藥費傳歸療治而以其奴拉欣代事且出宫女妻之明年卒實為信都王之父王諱約爾珠世祖南征還至順德思太傅之勤問有子乎曰有召見復俾侍中居四年敕以拉欣還之王固辭曰拉欣奉至尊久豈宜復為臣奴臣死不敢上嘆賞良久賜楮幣二千五百貫償之因謂侍臣曰約爾珠忠純出於天性宜友賢成德遂命與董文忠出入宿衛又問丞相色珍御史大夫博囉曰約爾珠室乎曰未也賜白金二千五十兩乘遽歸娶自是日益親幸至元九年裕宗在青宫求可總宿衛者上以王畀之一日復召入近臣諫曰畀之而復奪之無乃不可乎上笑曰朕特戲耳賜巾服寶環佩刀還侍太子徽仁裕聖皇后亦召王之夫人加以本朝冠服慰賚甚厚頃之賜金束帶及臧獲十人扈從北征恩渥彌至昭睿順聖皇后聞王之賢亦賜織金服錦段及楮幣萬五千貫三十一年授奉訓大夫典膳署令改中順大夫家令司丞成宗即位賜珠衣帽及楮幣三萬五千貫元貞二年轉嘉議大夫吏部尚書內宰司丞大德二年進資善大夫同知宣徽院事八年某月某日以疾薨年六十一葬玉泉山之陽王娶馬氏生二子長曰布哷齊至元十四年生始八歲裕皇養之宫中年十七太夫人疾篤刲股和藥以進疾愈而終不言裕皇以為孝選宫中良家子徐氏妻之丁信都王憂哀毁踰制再三詔之起乃起賜玉帶加資善大夫同知宣徽院事武宗踐阼入侍興聖宫賜以裕皇遺服一襲進徽政使固辭乃以為同知徽政事皇慶元年升光祿大夫封趙國公仍賜尚服錦綺衣黃金寶幣白鶻延祐二年冬加紫金光祿大夫徽政使次曰小和尚大德九年以奉訓大夫代其兄為內宰司丞尋遷少中大夫領皇子碩德宿衛士女一人適正議大夫吏部尚書諾鸞孫男女五人趙國公之子曰雅克布哈甫齔成宗愛之召居禁中賜稱太子及長為娶御史大夫博囉之女為夫人內帑備奩具親迎之日貞慈靜懿皇后幸其第內族畢至既而夫人早世生四子皆天博囉復以季女繼之自武宗至今上繼統官凡四遷為集賢學士領典瑞卿階四遷為資德大夫三賜海青俊禽他物以巨萬計加榮祿大夫守司徒不拜司丞之子邁珠婁拉克善舒紳女一在室王之子若孫既益貴盛延祐二年特贈王推誠宣力保德功臣太師開府儀同三司上柱國追封信都王諡忠懿祖效順功臣太保金紫光祿大夫上柱國諡安穆父推忠守義功臣太傅儀同三司上柱國諡恭敏皆追封趙國公祖妣侯氏妣孟氏皆追封趙國夫人配馬氏封信都王太夫人明年春正月集賢大學士典瑞卿曹勛帥卿佐僚吏即臣某家傳詔為王神道碑文臣謹奉詔按其家所述及考之國史叙次於右惟太保之純恪恭慎太傅之憂國忘身王之孝友忠敏出參入陪勤勞帝室其所積蓋已深且厚矣宜乎貴列三能王封異姓子孫咸建大邦上承殊眷湛恩景命被于五世開國以來羣臣臻此亦鮮矣夫天之所厚在德聖人之所貴亦莫如德天與聖人一也世方區區覬海嶽之報于㳙埃之功不亦逺乎然王非運之所啓氣之所㑹際吾君之聖且明亦不能底是也嗚呼時哉銘曰粵若稽古君臣所遭伊負鼎爼太公鼓刀書載一德家傳六韜振古如斯仰之彌高繼軌並馳世豈無之皇皇我朝乃有太師太師訏訏繩其祖武位超列爵國啓廣土其嗣伊何天子所倚其孫伊何帝視如子惟此常氏頻恩積賚胡然而盛胡然而大世篤忠貞帝心簡在詞臣作銘天子命之子孝臣忠永監於兹袁州普庵禪師塔銘袁州大慈化寺普庵寂感妙濟真覺昭貺禪師加諡慧慶大德之四年冬十月乙酉以光祿大夫三藏普覺圓明廣照法師布爾尼雅實哩復加號其塔曰定光靈瑞之塔集賢大學士皓昭文館大學士都功德使明埒棟阿傳詔中書以刻辭屬臣某惟禮樂刑政聖人所以致天下之治也此既不足然後凡有血氣者皆欲肆其趍利避害之心而是非之理泯矣當是時有能以空言誇譬福禍猶足以恐動脅誘使趍於善此慈氏之學亘百世曠四海宗之而不能已也况學其學而以濟衆利世為功不失其傳者乎惟師之生當炎祚板蕩之際象教陵遲之後遂指心之夢于壽隆雖父母莫能抑其勇契歸一之妙于大溈雖鬼神莫能窺其會情忘體合天動物與而師之道成矣楮衣糲食藜杖芒屨而民歸于儉廣津梁崇塔廟禦灾捍患而民懷於惠而師之化漙矣逮師之沒騰英厲響赫赫隆隆不加寸威奔走千里不賴尺壤食指萬數歷祀二百六被大諡再表靈塔臨濟以來未之有也欽惟皇上御歷紹統憂勤黎元以師澤民之久褒而顯之使民知為善之利是亦慈氏之仁也淵乎㫖哉銘曰聖人制治隨世而異循源達本用而不匱方古之隆不教而從洎古之逺教之或窮玩常嗜詭翳世之靡合離反真其道乃信於皇我元居檏之刓毁剞折劂我治用完儀軒法昊翼以慈寶僞既靡遁真亦克保惟普庵師沒二百年其道之昭猶火之然弗迫而却弗驅而前仰沫承流被乎大千彼濟于深此夷于巇彼禳此祈惟普庵是師惟師之學允罔或覺惟聖天子以優以渥師諡孔嘉師塔孔華惟億萬年贊我皇家雪樓集卷七
