body:
  text: 雪樓集卷十八元程文海撰碑銘大元河東郡公布都公神道碑銘至大三年制昭文館大學士正奉大夫太子府正察罕祖考某可贈正議大夫輕車都尉追封河東郡侯妣某氏可追封河東郡太夫人父布都納可贈正奉大夫護軍追封河東郡公母某氏可追封河東郡太夫人眀年察罕拜參知政事即詣史官廣平程某而請曰察罕西方之人也先君慕聖朝德化萬里來歸沐煦養生息之仁家於解抱孫長息於解沒而埋骨於解天子不以臣不肖有列於朝褒崇之恩上逮祖考惠至渥也惟是先君冡上之表未樹大懼失墜無以顯休命發幽潛願先生哀而賜之銘謹按國史院編修官辛良史所為行狀河東公諱布都納西域巴喇勒哈人世為大家本俗以族顯無姓字歷三世輒不知名國初歲在庚辰大兵西征巴喇勒哈平於是公生十有三年矣少失怙恃好竒節聚族而謀曰天方授聖元神武無敵於天下我國亦臣伏不敢後盍往從之乃悉族來歸時諸王錫喇引重兵鎮朔方公美髯長大勇冠軍王竒之戊戌南征圍安豐軍校巴延台者薄城城上梃長鈎及之懸以上左右錯愕公時在後隊望見奮出大呼助巴延台引却人鈎俱墜禽戮陳前一軍皆驚勝氣百倍城陷䇿功賞獨厚王由是知公拔置帳下名以巴圖爾初河東陕右民賦之𨽻王者以成格勒總管之附治解州乃以公為副因家焉辛亥春長安僧讎誣玄都道士謀置毒于酒將不利王有司連逮數百人死榜掠者往往而是公時使王所和林力狀其寃王悟命釋之公晝夜兼馳至長安諭教諸道士謂公自天而下相率焚香遮道哭且號曰我輩更生將何以報但願公多賢子孫秦民父老迄今誦之癸丑貢職王嘉公識大體且辨捷可代成格勒總管公叩頭曰臣得給事左右薦由成格勒王縱憐之義不可謹辭王嗟異從之賜名馬重錦弓矢以旌之至元庚午告老而歸居里中恂恂然至于濟人利物之事則不敢讓鄉人爭訟不願詣官而詣公公諭以理咸心服而去公不解中國書言必中義動必中法天性也切切以教子為務嘗戒之曰我不幸少年百罹不得學爾等安居暇食宜勉讀聖人書行中國禮他日面墻悔之無及至元十四年忠宣公鄂囉齊開省湖廣聞察罕通經義練軍務辟置幕府察罕以親老辭公曰吾素教汝讀書知禮義者將以有為也食其祿辦其事是亦為孝不當以我為念諸弟足養也於是察罕始出仕嵗晚敕斷家事弄孫自娛日與里社過從射燕優遊將終身焉一日至迎祥觀正襟瞑坐衆以公假寤久之撼搖已逝矣時至元庚辰夏四月七日也享年七十三葬惠政鄉曲范村之原夫人亰兆李氏父登進士第金末遷河南夫人方九歲歸戎帥成格勒為養女靜秀丰整帥以同寅歸公焉後公八年卒子男八人長察罕也以忠宣薦起家授四萬户知事遷行省理問行樞密院經歷行省郎中大德丁未妙揀東宮官僚召除僉詹事院未幾進昭文館大學士太子府正至大辛亥春今天子即位擢置中書次博囉早世次博囉徹爾敦武校尉百夫長次博囉台湖廣行省宣使卒次博除太倉令卒次濟噶台將仕郎華隂縣達嚕噶齊次多羅台不仕好琴書有至性州以純孝聞旌其門次鼐滿台敦武校尉邵陽縣達嚕噶齊孫曽男女六十七人嗚呼盛哉嘗論皇元之興天下之一初也其人多敦龎顓蒙忠信篤實不為言語文字而躬行實踐暗合道義庶幾古人故其福力亶厚子孫蕃衍有非後來尋常所能及者觀河東公詎不信然銘也何辭銘曰猗與皇元開闢一初人生而純與古為徒惟河東公泰山喬嶽不言躬行與道暗合辛勤來歸義眀君臣維忠維孝貽厥後人為解世家作廟始祖衮衣赤舄時乃天祐有之似之魁偉沉深遇合以時冨貴何心我作銘詩用詔來裔母迷厥初永永千祀故登仕郎吳君墓志銘蘭林吳公之封其友廣平程某識而銘之二年友竹君亦殁孤垕子以狀來亰師曰昔者先人讀季父之銘而悲曰知我者鮑叔小子識之今言猶在耳而日月有期敢又以請嗟夫二惠弱一猶惻而并亡之因思少之時與君兄弟遊顧嵗月若與我無與年大以來漸如夢覺今則已若隔生信矣三十年為一世也君家撫州金溪吳塘蓋數百年矣深道居士濬與汪公藻熊公彥詩輩交其孫景立饒州助教曽孫堯仁玄孫士亨是為秋山翁君為翁仲子名德溥字時可季蘭林也出為宗人後偕君學於臨汝精舍師徽菴程先生而友三人相得甚歡未始一日不羣居並坐既則僕有四方之事自是契闊矣君又晚得末疾竟弗繼見以殁君姿敏甚於文如騰雲建水聲焰獵獵然部使者郡守二千石而下咸期之深季蚤策名期君者益衆君偃然不為意或以登仕告身強之出而已晚矣天兵南下林無安棲君外調內娛仰事俯育如他日翁老而彌剛母劉病日進君給百役以奉公上率百指以寧晨昏不使疾聲暴色小得至膝下又推其餘能以芘閭里或勸之仕輒惻然曰吾不忍頃刻離也繇是二親逍遙壽終墓十里外朔望必一往拜不廢以至終身友愛天至季出仕久則躬往視之為留久之篤於交遊無所顧吝或聞風蹐門皆將迎勞徠不使觖望去嘗造官舟潯陽役人困踣十七八君亦良憊然見必拯而活之後十年猶有拜而謝於道周者娶於余六子曰垕辰應良復來三壻曰余天麒鄧慶老余天一孫十二人男斗孫婁孫翼孫宜孫女八人曽孫男女各一君事親孝治家勤持身恪與物仁義方之訓亹亹餘澤蓋未憖也生於丁酉九月卒於乙巳八月卜以大德十一年某月某日葬于某鄉某里梧岡之原嗚呼蚤暮相規朋友之務也而契闊若此乎昔歲志蘭今兹銘竹山陽鄰笛盡焉此心銘曰天之生材厥惟艱哉來者不可待往者又烏能來維此良朋既窅然而深歸吾誰與偕黃伯雲墓志君子無幸而有不幸小人有幸而無不幸無不幸者豈獨無患禍乎非也彼之所為固有以召之非偶然忽然而遭之之謂也君子之為行也兢兢是故善作祥降若夫慮溢於情涯事生於意表吾亦未如之何而以身殉道亦又何不幸之有且夫髙門縣薄無不走者固矣至於專養其內者亦庸詎知異日膏猛虎之口哉余聞廬陵黃伯雲之事喟然悲之伯雲儒先生專門毛詩學深於六義著書盈篋其所獨悟出毛鄭逺甚江丞相搢紳大儒獨推伯雲善學至元中吳會雖平冦盜竊出伯雲一日携所著有所詣賊妄意袖中之藏斃以一矢即之書也先是丙子初妻戴與其大女子不屈於兵以死夫又復然其長子定哀父母之若是也不食肉者三十年余尤悲之余留京師定輯其家世瞿瞿然請曰父將改封願矜而榮之一言按伯雲名從龍世衣冠曽大父萬頃大父欽父秀實母劉會孟之姑也二子伯雲長仁厚孝友貧而好振定之弟曰通其大女子之壻曰沈次二壻皆曰歐陽孫男五今封地曰儒行鄉毛竹原祔于祖也死時年五十有三余既悲其不幸復為推其然以祛世惑且慰其子之心而使刻其石曰解衣佐刺濟曲逆薏苡連車躓新息銜袖文書大人惑夫禍福之不常疑似之易成蓋自昔記之矣嗟夫學以成身豈顧纍之哉俞景隆墓志銘臨川黃君述其同郡俞景隆之事來曰炎發之故人也葬願丐銘余辭不獲蓋余與黃君善黃君之為人也慤語有之不知其人視其友又曰達視其所舉富視其所與而孟子録鄭人之言曰尹公之他端人也其取友必端夫薰蕕之不同器牛驥之不同皂自古記之矣是故喜中郎之似則不計其誰何見元賔所與如見元賔彼豈不知生死之道殊親踈之勢異哉誠愛切於心故也然則黃君之請不得不力而余之辭也又烏得而力哉按俞氏繇徽徙撫將十世矣􅕺隆名應元業儒博敏嘗從里中儒先生曽子良學復肄業於白鹿洞受知江丞相及雙峯饒先生乃升居洞學講席久然後歸既不得志於場屋則退而養志重親之心甚豫也親既考終以禮送之亦自營樂丘於新莊而構堂於其前命曰歸真蒔花竹貯煙霞常遊衍觴詠於其下几列名書數十卷永日危坐焚香沃盥而讀之屋益潤子孫益長植以繁有子三人仁英仁傑仁偉英已卒孫九六男三女曽孫八三男子五女子而身亦益老蓋七十有七歲矣以至大元年夏四月卒將以某月日歸于歸真之兆余既為之次其事已而歎曰鄉稱善人斯亦足矣正命而終斯亦可矣尚子平有云但未知生之與死何如爾因語黃君曰天地一寓也萬物一假也死生一往復也彼將奚以為真乎冰之為水也孰受之氣之為風也孰與之歸歟其將安歸黃君曰惜歸者之既逺質斯理之無從尚刻以訊于幽宫是為銘鄧德光墓志銘豫往聞南武城氏有佳壻焉曰鄧觀國德光而未之識及居京師又有來言南城教諭鄧某文學行能者余獨心志之蒙恩過家里中父老子弟無不詣余武城氏昆弟在焉余一一顧接相勞若如平生歡獨不見所謂鄧某者居久之武城昆弟戚然相告曰家有子壻不幸蚤世其先世之生類皆一時俊乂故其殁也往往有賢卿大夫為銘其墓石今子壻將窆而石未有文敢介先君之故請以為眀公纍若何子壻家本番昜今其居邑曰金溪鄉曰雲林五世祖需宋承節郎監復州沔陽鎮需生曄進武校尉廣西經略司屬官曄生槐進武校尉監吉州永和鎮槐生顯子顯子生瑛以儒相傳至子壻觀國益好學有文歷冝黃星子廬陵南城四邑教諭娶于周有子曰辰周沒又為家子壻其死也年三十八雖其平生行事不少表見不應銘典然眀公辱以先君之孫之壻而丐之一言先君而有知也其將何惠之敢忘敢請余為之閔默不能却蓋余平生於士苟有一善則余心之願見之也甚於士之願見於余若觀國余聞之甚習徯之甚久而終以不見且其博謇好修事親有禮屢為百里師而不困以彼其材亦獨何所不得其志哉而顧僅爾是誠可念已余於武城又有世好乃不遂却而為之銘其墓在白馬鄉髙橋之原葬以某年月日南武城者故冬官侍郎曾文莊公之采邑也其言稱先君先君者文莊公從子故常平使者徑節公也來謁銘者國子進士文种將仕郎修而觀國修之子壻也銘曰深衣之斂若斧之封兹非孔子之徒歟雖不年何慊縣尹鄭君墓志銘至元中余初入奉宿衛携孥自隨時子大年始晬甚弱乳藥兼哺請醫與俱醫以老為解因薦進其甥曰此儒也而工方與之俱如吾行矣乃與之俱即鄭純道也贍敏通暢書無不觀處療甚精審不特過秦中過邯鄲為某醫某醫也方是時涉寒溫者五六千里小大皆無恙純道力也既至公卿間聞其善為方邀致無虛日由是交益廣譽益起上方勸能因得試令而其邑乃在巴蜀中時純道親留江南辭不願往改録判南劒州純道不以崇庳為意亟歸迎養時閩地甫定兵民紛揉郡又當道過客使車晝夜至事取趣辦衆睨其為已而翕然推重不意其為乃爾也既代交薦之得􅌕縣主簿兼尉縣與郴桂溪洞相犬牙異時日罹冦暴純道至選役夫五百蠲其庸假以利器使為鄉導立烽燧謹關梁廣耳目寇動無不預覺輒馳擊掩襲深入窮追由是寇不敢動民得安業眀年鄰郡盜起復深入掎角收所掠邑民甚衆郡上其功不報先是邑為寇燬乃建邑庠招諸生釋奠肄業以餘力起敝廢皆完循資得景德鎮稅課提領人皆於此自潤而純道官滿過余余視其貧與昔等耳時余忝召純道亦調集京師守銓者兩年乃得岩邑未幾又聞所代者以瘴癘暴死益不樂然不可改也至大二年冬余始見其子華孫於里中則知純道視事不數月竟以瘴癘暴死於官悲夫純道長身豐下氣貌壯偉泛愛多可無新故咸樂之然銓邑者其故人也固有幸不幸耶華孫既以至大二年八月九日己未葬之于靈峰之原而以表墓為請按其先琮由信仕盱遂為盱人曰慶曰浚曰文煥者純道之曽祖祖父也純道凡三娶有五子惟華孫善孫為之服餘嗣他姓女為王氏婦華孫醫甚工今為江西醫司都目蓋初妻黃氏出也純道名公大以淳祐己酉四月六日生以至大戊申十月二十四日殁銘曰嗟夫純道與余同年月生而有十日長耳誠不意其歘往也自今余至亰師無復有能知三十年之舊事而相與縱談抵掌者矣嗟夫勇遂侯碑故金吾衛上將軍和濠二州招討使賜諡勇遂侯王公諱喜字恱道宿州符離人也至元十二年王師東西大舉渡江公鎮歷陽奉所守上職方氏天子嘉之錫圭入見行至濮上而病遂捐館舍訃聞軫悼特加贈禭賜諡易名又官其子凡以顯答勤敏者恩意殊等東南列城聞之莫不競勸不期年而江表大定由聖天子得經逺柔服之道也公系出侍中朴侍中為周世宗股肱心膂之臣世宗又五代有志恢張王略之主君臣相得幾若力牧大鴻之於軒轅張文成諸葛忠武之於漢也不幸功業方殷命之不淑然而周疆江淮卒如侍中經畫之素至於禮樂律歷之精賾體國經野之縝微悉利賴之若夫混區宇之長謨雖易世之後猶有功焉是可謂興王之良佐者矣勇遂公親其後昆承輝襲寵為時名臣于翰于蕃真隱若一敵國江淮草木逮今猶知其名又能察天運之始終拯民生於阽墜使國家靡有汗馬之勞坐定千里王功民庸俱茂焉簡在帝心欽遲延想倘獲近天顔奉大對其契合建置庸詎知不侍中之似也惜哉至大二年冬某自禁林出使因奉恩制歸告先郢國孝肅公墓公之子虎英適為臨川太守為某道先世之詳已而請曰先人荷國寵靈施及後嗣水木源本夙夜靡敢忽忘惟是鄉者虎英幼孤不能有以揭榮焯懿詩不云乎永錫爾類區區誠願僥福於先郢國孝肅公貺以文辭刻之冡上則豈惟世世子孫永有視效抑凡委質竭力者亦知所歆慕焉此虎英之所深志而力祈者惟公念之某上惟聖明加惠崇報之大典下惟孝子慈孫之至情宜不可以却且某者世祖皇帝之老臣也嘗宿衛禁中凡當時經逺柔服之規蓋在耳目今苟辭以不文而不少寫萬一以章勇遂之功而成太守之志殆非所以對越在天之靈也其何敢然乃敬諾則退而徴其事公之先自符離徙齊安名皆弗傳公娶髙氏有子三人虎臣虎炳虎英虎英幼而襲職為昭勇大將軍和州招討使繼守番昜武岡南安皆有績業其守臨川勤於政治忠孝兩盡尚庶幾焉碑宜有詩詩曰淮水之清王氏之寧冠冕蟬聨世載忠貞維周侍中謨弼世宗相得彌彰魚壑毛風民幾太平大命之嬰閟其經綸曰篤其慶集勇遂侯敦弓厹矛以殿淮州以作民休朝宗百川星邁于垣言逺有光曷殞中天將印侯封赫赫隆隆以闡皇猷以隧幽宫幽宫岑岑廣谷喬林煙雲鬱冥氣降澤深孰終孰傳以象以賢四馬加騑繼其蕃宣為國世臣功名日新報上之勤爰以及親豐碑桓桓是斫是刋子範臣規畀爾永觀稿城王公墓志銘國家以神武不殺定四海必有武備故分軍旅據要會而兵民異掌往往不相下相怒相戕民弗康惟建昌之在行者萬户王君忠信純誠知止戈之義人用大和吏民以寧老稚至今誦之余初朝亰師及見其叔父冀國忠穆公慶端事裕宗為詹事夙夜禁衛勇力絶人而平居禮讓若書生知其家之能賢至大四年余被召會萬户君遷雲南宣慰元帥則出其先公行狀求銘於余余曰世德也是宜書公諱思敬居真定之稿城族大以蕃父諱吉其季曰善為金吾衛上將軍左副都元帥即忠穆之父今平章政事之祖也公嘗為百夫長嚴整盡職已而去不仕時真定中山民苦於役錢征之急而無所於出金吾悉力代民償之又率其族公為之先輸其族之未輸者民之貧無出者至空其家不顧也昆弟六人公行在二克友克恭終始誠一或欲異居公喻以義同室無間言其居鄉恤患周急有忿爭者不之官而之公公為理解皆恱服而去州里化之成美俗焉以大德十一年十一月二十四日無疾而逝年八十有四周月而葬先塋之側妻趙氏先公卒有子曰元繼葉氏生子三德信毅德宣慰元帥也孫男九人女若干人曾孫男二人銘曰維善國有良臣維世德後益振名不亡澤逾新我銘之貽後人故登仕郎蔚州安定縣主簿馮君墓碣蔚州安定主簿馮君卒之六年其子禮與順德王寧為樞府掾寧與余善介以請銘寧潔白好修取友必端按馮君行應銘法宜書君諱善主字君協右北平石城人性至孝父仁義死遺言貸竇氏銀三十兩往償之竇謂已償君不直竇氏言持銀詣憲府請母死廬墓終喪初學於張簡之聞許文正公以經學教胄子徒步至亰師從之公歎其淳篤公殁千里赴弔於懷欲廬其墓諸生弗欲懷人義之遺布三百匹曰吾為許先生來因利之弗忍為也乃歸服心喪三年未嘗御酒肉至元二十五年始以耶律祭酒薦得平灤路儒學正教授冀州遼陽所至以君出許先生門爭從之遊在冀州州割田五頃入學給祭祀養生徒在遼陽部使者洪君大開義學聘君為之師初石城兵燬夫子廟弗治君度而新之拜闕里求孔顔孟十哲像祀之廟主興州宜興簿政化大行改蔚州安定未行以大德十一年九月晦卒於家年六十二以某年月日葬某鄉原嗚呼世固有學而為士者矣學而弗篤篤而弗行行焉又不得名公卿大夫借聲助譽卒窮悴困蹙遂以士詬病方是時在許公之門者莫不震耀焯鑠君乃嗇一簿領匪命也夫然以君之學亦不可謂不行矣娶某氏生子四長禮也次禋桓州學正次祐國子學録祺博士弟子員女二長嫁國子監掾張德次適舅氏張璉子懷孫男詵詵女四銘曰其生也惇惇其死也諄諄其封也芚芚歷千載兮永存婁道輿墓志銘始余從族祖徽菴先生學臨汝書堂聞婁氏獵獵起場屋堂距城數里未及迹其門友其人侍季父西渠公守盱江適婁君德剛為郡功曹文學政事為一郡所推右始與其弟兄遊且升堂拜其母自是過臨川未嘗不造焉至元之末余使閩以德剛之弟道輿薦授廣州濓泉書院山長以疾辭大德四年余移節湖北明年道輿實來復舉為桂陽石林書院山長會德剛之子志淳亦授南嶽書院長乃與偕行及余謝歸亦尋還一再會道輿失賢配哭愛女又喪其仲兄髙懷雅志已非疇昔九年余被召留中至大二年董湖北選事事已而還則道輿亡矣余弔焉為之慟今天子即位余待罪禁林其弟起莘及其孤以書來言曰先兄且屬纊有緒言曰知我莫若程公我死必得公銘乃葬葬有期願公哀而賜之銘余惟相知餘四十年生不幾見而遽殁烏得無情乎謹按龔孟夔所為狀婁之先有諱郝者由嘉興徙居臨川郝於嘉定間參知政事忠簡公機為從兄弟樂善好學藏書數千卷號南坡居士郝生忠州文學必中必中生從政郎知福州閩安鎮建號艮堂以學行為三衢徐霖廣信徐直方所器為忘年友與同郡林實大段浚趙崇懌章貢曾原一相友善由是知名有别業曰德厚莊以奉祭祀恤姻舊者至今世守之建生四男子南良起南文輔起莘南良德剛也擢咸淳戊辰第文輔道輿也與仲兄皆與鄉貢君少篤學資性過人出則侍其父閩安公周旋諸老間入則見其母韓夫人持家斬斬如法家子弟不敢越毫髮而忠厚之意常行其中故君之弟兄成於家庭之訓居多伯氏早喪二親繼殁君扶孤撫幼支顛翼弊教養昏嫁歲時薦享秩然詩禮如平時其長石林也興廢補滯各得士友之心及還宅中堂奉宗祧處弟子姪東西偏凡有未安者各使得其所不幸遂沒若君者可謂賢哉娶李氏男志漙女安正適饒德榮李及安正皆先六年卒君生以淳祐癸卯卒以至大己酉七月十三日將以某年月日葬于臨川縣明賢鄉厚澤原君初有讀書之室環以竹扁曰竹坡云嗚呼余過臨川蓋嘗登青雲之丘而永歎焉彼昔之渠渠煌煌者一無有也而重樓復館髙花美木巋然百年之舊惟婁氏已與其兄弟遊蒼顔皓髮褒衣博帶行若思坐若遺言呐呐不能出口若與世甚不相類者卒以保先人之業以不泯墜忠厚之可長也信不誣矣若子姪皆純茂秀朗足世其家然則君亦跛男子之遺裔乎何其世之多賢也銘曰構爾基樹爾滋危爾持積不施吁其悲黃志尹墓志銘豐城黃志尹名所志以學行文章為後林李户部客至元戊寅秋九月俘于兵粥於長安鄭子誠家子誠儒長者與蕭維斗友一見志尹命諸子師事之遂名長安中家長安三十年餘解后商人故同里附書問其家子允子隨商至長安則志尹死矣鄭氏云大德甲辰日南至一夕大醉卒允子哭啓封負骨而歸將以某年月日葬蘇陂之原書扺京師屬其妻之舅氏揭傒斯乞銘於余夫自昔士君子不幸遭喪亂流落者多矣幸而生還者幾人幸而人不奴𨽻畜又得尊禮者幾人甚不幸而死死而能歸其骨志尹抑又幸已嗚呼允子其遂昌乎志尹得年五十九祖嘉言父元興初娶蘇氏有子一人去家後兩月乃生允子也在長安娶某氏無子先卒孫男呼都克丹孫女一銘曰子生而父不知父死而於子乎歸余辭以銘之幸而悲大慶壽寺大藏經碑聖人之書皆不得已而有言者也西方之聖人虛空為本寂滅為宗而積其書至五千四十八卷其得已哉蓋迷待法而悟故不可以無法法待言而立故不可以無言書者言之寄也於是後世尊其書建大寶藏而藏之名曰大藏經俾學之者沿經以求法悟法以成佛然則由言語文字以至虛空寂滅經之功不既大矣乎國家崇佛法建大佛寺必置經藏聚天下之工書者泥黃金繕寫以示其嚴選天下之善鎪者材美木傳刻以致其廣京師諸寺日飯僧端坐羣誦撞鍾吹螺晝夜不絶歲又一再遣使乘驛奉香幣遍天下亦如之斯盡恆河沙界並受其福於呼至矣東南海濵之國髙句麗古稱詩書禮義之邦奉佛尤謹皇元之有天下聞風來附世祖皇帝結之恩待之禮亦最優異父子繼王並列二館今王又以聰眀忠孝為皇帝皇太后所親幸大德乙巳乃施經一藏入大慶夀寺歸美以報于上寺為裕皇祝釐之所於亰城諸剎為最古皇慶元年夏六月謂某為文以勒于石傳曰知之者不如好之者好之者不如樂之者王之於佛法知之者與好而樂之者與是日天新雨王延至其邸始入諸僧列坐梵唄之聲洋洋滿庭復至一室門闥靜深窗户無塵花木芳潤王親肅客户外入就席言論恂雅禮意歡浹一僧隅坐轉法華每舉一佛名一菩薩號王必以手加額而致敬焉王雖與客語意未嘗不在經也然則王於佛法誠好而樂之者矣經豈徒施哉嗟夫是心也以之為國則聖夀長皇圖昌以之為家則富子孫國永存以之為身則六根清淨萬法統一乃至無有言説直入上乘正覺寶是經者復能日以是經為人演説俾迷者悟愚者覺盡恆河沙界並受其福是則王之所以布施國家之所以崇信聖人之所以立言之初心也王名璋好賢樂善有德有文逮事世祖以皇甥為世子入宿衛被賞識成宗朝選尚公主大德末年從今上平內難立武宗有功為推忠揆義協謀佐運功臣開府儀同三司太子太師上柱國駙馬都尉瀋王征東行中書省右丞相嗣髙麗國王今上即皇帝位策勳加太尉寺住持西雲師名子安法行髙卓纍朝所器重賜號佛光慈照明極淨慧大禪師官榮祿大夫大司空領臨濟一宗事惟王賢王也藏經大施也師又主其寺不可無詩以頌其美而垂于後乃作詩曰我聞佛法第一義無有言語及文字若非言語及文字迷者何以見真諦佛大慈悲大智慧發大願力度萬世如矇冥行得經術如墮溝壑獲引臂如渡大海舟楫利皇元功德配天地佛法尊信古無二琳宫寶剎遍四裔髙麗嗣王帝戚懿願大慶夀大布施寶經入萬四千偈天龍百萬常守衛珊瑚璃琉碼瑙貝車渠摩尼及火齊黃金白璧諸美異遍地莊嚴等瑣細佛光老禪念一切受持此經永不墜永與浩劫湔障纍聖夀無疆四海治興聖怡愈億萬歲施經功德不思議徐真人道行碑道無為也而無不為老氏之為道無為自化清靜自正其學可以修身可以治國遺書具存為神仙之説者宗焉神而明之與時偕行卷舒闔闢不失其正非有道之士有至焉者不能也秦之亂子房佐劉氏蹶嬴蹙項基四百年之漢出於圯上之一編文景之治清寧靜一庶幾三代得於蓋公之一言亂則致其功治則致其化力行而不顯功成而不居道固然也金之季王重陽起咸陽為天下全真教祖馬鈺談處端劉處玄丘處機王處一郝大通等為之徒隱顯變化震撼于秦隴燕齊晉魏之間人皆以為仙徴聘之使聨鞅結騎尊敬寵信貴賤罔間所過貪者亷暴者慈而不知其然拔死命奮敗軍而不以為能迹其行事幾於道矣皇元龍興列聖崇尚其教益大皇慶元年冬十有二月朝元萬夀宫孫真人履道狀其師徐君之行來徴文謹按師諱志根梁之扶溝人父某仕金至昭武將軍師沉質魁偉弱冠為道士學於王真人志謹初重陽入梁主太寧坊王氏嘗曰吾後必宅是金亡其地為墟後六十四年志謹即之為宫廣袤七里賜名朝元工未竟而志謹傳之姬志真志真傳之李志居志居傳之師師躬畚鍤率夫役勤力而勞心早作而夜休克潰于成壯麗甲四方至元某年制授本宗掌教真人乙酉賜號崇玄誠德洞陽真人壬寅優詔存撫師益奮勵以𢎞道濟物自任逺近慕嚮雲歸川赴宫之役夜自輦土石道得遺槖數百金伺其主乃榷場盜也懇致其半師曰女亡命利此為貧耳我欲之固全有何半耶速持去速持去邏卒不女貸盜愧謝而去師未嘗言盜後傳其事河朔歲飢民爭襁負趍河南無所於歸師館穀唯恐後被掠者購而歸之眀年秋成或歸或留或願入為道士惟其欲大德中待選行省者嵗久食盡來謁師悉不拒日就食者數百人一日當祝釐羣官咸在師設齋坐衆人堂下相君驚曰此何為者師告之故且曰食此數月矣相大感動即調遣在官之帑庾歲簡亷慎者掌之聽其出內無所問甲辰六月十日夜有星隕于寢所無疾而逝年九十一室中唯冠巾杖屨數日乃斂顔色不少變蠅蚋莫敢近某年某月某日葬城西北仙蛻園嗚呼其有道者耶即不為老顧不立事立功為名公卿耶余嘗讀老氏書而慕之歷考古之所謂仙者若狂若俠若疾其出入如鬼神前知如蓍龜不知其何道要其歸則本忠孝寶慈儉皆不悖於老氏世無其人久矣豈知又有若重陽諸子者耶上下數百年亦豈盡無之耶而卒埋沒泯滅又何也重陽倡道代有眀哲非遭遇聖明尊道隆德崇樹名教其能宣光六合垂訓萬世若此其盛耶余故重孫請述師之概俾後之學者覽觀焉自重陽全真開化真君以來各有錫號具諸碑師以郝為祖王為父姬李為兄而今孫君之嗣掌教事也先是歸河東師知其賢纍請不起固請乃起賜號泰定虛白文逸真人道甚髙銘曰大蒙必眀大虧必盈四海橫流大道以興金鎔火冷白日炳炳飛龍在天衆陽乃騁咸陽匹夫老聃之徒振衣終南天下風驅亦有七子是承是似墜不能壓鳩不能死天子既崇所嚮聞風城撤其關戰弛其弓與時上下應物變化德盛功隆雲螭我駕赫赫朝元奕奕洞陽匪柔匪剛襮圓裏方躬操畚鍤不知其勤恤窮振滯不知其仁榮非師有年非師壽太始之先鴻濛之友葉隱君墓表閩之葉盛於莆世多聞人達官近代丞相顒尚書大有尤灼著者後遷南劒尤溪之華山族益蕃至夢曉買田築室于仕陽鎮家焉卒葬里之厚溪三子季曰三友好善有信義為鄉里稱讀書明理不為章句之學暇則彈琴賦詩投壺雅歌以自娛丙子正月十有九日室人云亡乃皇元大兵渡江之第三年也又明年二月十有八日君亦卒時方劻勷皆藁葬至元庚辰閩既內附仲子元德入亰師獲事濟陽王以慎重有材略見親幸辛卯署府户計總管大德癸巳長子宗榮亦授梅州長官至大戊申元德始謁告南還省墳墓十月二十有四日遂啓殯合葬於湖山距家半舍而近立祠墓下復先世田三十畝奉蒸嘗亡何宗榮死元德以禮葬之先塋之旁之湯山撫其孤嫠經紀其家事畢還亰師皇慶壬子夏六月謁余於禁林聽其言觀其行蓋孝友純慤人也狀乞表其先人之墓嗚呼自古承平子孫稍自樹能不失其世者亦可以為賢矣一旦臨患難狼狽顛踣公卿降而皂𨽻為負販為盜賊姦宄藐不知先世為何若元德者遭變故失怙恃投身艱棘居數千里外歷三十餘年自致貴富依依追逺卒復故初有承平士大夫所難者其先世之澤可見已宜得吾文按三友字某得年五十二配張氏有賢行得年五十五子二孫男四女一銘曰方時之攘攘生不得禮其死存不能保其亡匪惟爾邦餘三十年去者復死者葬祭有田孝友以光曾幾人何則惟爾臧惟後之慶處士聶君墓志銘處士聶君諱復孫字仁甫居盱水上世仕宋曾祖諱有朝請大夫知江州軍州事贈少師祖諱子述華文閣學士宣奉大夫衛郡開國公贈少傅父諱世清承直郎武岡軍判官君生承平時襲貴冨能諄諄謹篤以賢子弟自好宋亡天下為元君獨以長厚為鄉里所親善人用不忍侵犯克全其家余去盱三十年而歸蓋靡然異矣君褒衣博帶周旋揖遜未嘗見其斯須之忽造次之失雖豪奴悍吏卒然遇之莫不退然自喪鞠然以慕豈偶然耶余常舉為子弟勸夫天下之俗與時遷移強者挽之於前疾者驅之於後守而不易其所者寡矣少年自信為行老而逆施者有矣平居以學自勵出悅紛華者有矣盱之人稱信厚有古君子之風者惟君與曽履祥然履祥名頴瑞亦世家仕咸淳間且光顯矣竟以處士卒君初以大父澤授登仕郎未調而革命遂終身焉至大庚戌七月四日卒得年七十二初娶鍾六年而沒無子再娶趙生三男鈞錡公亮一女適張子言先十五年沒孫男三公旦公晉汝郎女一許嫁饒普曽孫男申郎君有弟曰渙孫蚤世其孤鋭方襁褓君長育之教訓而冠昏之無子又以公亮子之故惟鈞錡為之服以某年月日葬南城縣太平鄉大義之原書來亰師乞銘余觀盱之盛族聶氏之子孫彬彬然必其先世之積也厚繼而承之者賢耳堯舜萬乘之主且大聖人也子一不肖國非其國况士大夫之家乎銘曰猗歟處士戎承于衛周規折矩內仁外義嗟時之人毋忝厥世處士是式以畀後嗣雪樓集卷十八
