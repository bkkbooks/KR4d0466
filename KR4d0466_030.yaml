body:
  text: 雪樓集卷三十元程文海撰詩題劉將軍墨跡芝山山前湖水春行人尚說劉將軍將軍百戰能百勝髙興獨與烟霞親平生橫槊三千首流落知為幾人有殘篇忽向嗣侯看燕山落日天風寒送薛𤣥卿裁雲以為裳製霧以為衣朝辭赤墀下日暮歌采薇世味淡如水髙情誰可希還持江南夢送子山中歸白雲山八詠白雲隱岫靄靄天際雲還自青山起昨夜為雨歸今日青山裏緑野芳春平原藹初緑時鳥變芳聲還同世外客閒看齊民耕古塔標峯浮圖上空翠遙望是層峯落日照峯頂化為千丈龍憨泉灌圃流泉清且甘誰遣姓為憨搰搰抱瓮者泉頭仍結庵楚山秋霽坐對連峯曉悠悠楚國秋山中深幾許時約白雲逰石人晚照何人化為石朝朝還暮暮只見亂山晴不知石人處棠店霜晴霜凋棠梨樹爛爛如春花日照樹間屋晃然成綘霞菟村夜雪楚國但荒榛子文無故宅年年村中獵雪上于菟跡送白雲平章歸故山賜姓出朝班今朝始是閒恩隆光祿貴名配白雲山進退君臣際聲名宇宙間岩花千萬樹日夜待公還蕭山圖回首江西最上逰山隨人姓尚為蕭客行天下三十載家住溪南第幾橋日冷雲松朝漠漠月明風谷夜迢迢夢回枕上聽春雨記著東園長藥苗送榮上人歸洛陽白馬寺榮公逰上國又向洛陽歸白馬開新寺緇塵濯舊衣吟詩江月冷振錫野雲飛此去千餘里無令消息稀鄧教授致仕還江東積學今成老遺榮不待年歸心彭蠡外客思薊門前孤棹隨飛鳥長河合暮蟬知機誠可尚忽别獨愴然送慧心和尚或坐或行無不可一來一往本難期滿輪明月天如水正是孤舟到岸時四駿圖四馬同一槽同槽已蹄齧豈不愛神駿所貴還在德題李宗師所藏李仲賔李雪庵趙子昻墨竹李侯遊戲竹三昧葉葉枝枝分向背却憶王猷徑造時一㸃清風驚百代雪庵筆力老且堅神藏氣密如枯禪繁霜雕林雪積野虛堂宴坐方寂然最後數竿更森竦髙節猶含老龍種一枝欲費百金求松雪道人世所重羡君一朝得三絶五月對之若氷雪我但從君覓竹栽滿植中庭貯秋月謫仙捉月圖牛渚磯前白錦袍蛾眉亭外月初髙江波滿眼如平地醉倒長舟一世豪祖生得母二十八年南北阻三千里外死生疑一朝見母唐州地昨日官軍破賊時貢士鄒國祥挽詞開闢乾坤後浮沉吳楚間著書成白首把酒看青山空憶鄉書薦惟求聖代閒京華聞永已南望一長澘長沙李主簿棄官隱居東湖孺子祠側築齊曰仰髙寄題一尉髙安政已佳桂陽拂袖更長沙簿書期會諸君足泉石山林兩鬢華賴有蘇卿餘舊圃况依徐孺作鄰家仰髙堂上琴書罷自灌畦蔬種好花題宋復古古木寒泉老樹倚寒泉空山鎖翠烟麻源三谷裏白雪小樓前地僻無人到神交有畫傳題詩自惆悵何日問歸船李叔行成都寓居萬竹亭岷江之西雪嶺東蠶茨溪頭萬竹中孤亭已去世人逺髙節惟應君子同兄弟一家皆玉立子孫千古更清風四松寂寞浣花里却笑﨑嶇子美翁李仲賔風竹橫披平生著處惟栽竹為愛干雲度雪姿何似卷中三五箇閒來舒卷看參差次韻解安卿石假山夜騰光怪晝生輝數尺嵌岩舊見稀欲獻楚王憂刖足怕逢織女誤支機斜當明月偏宜照近逼紅塵不敢飛中慶堂中蓬島客相看不覺戀柴扉畫馬耳峻蹄髙目有隅肉􅐢磊磈立奚奴承平誰用千金買空使閒人畫作圖畫牛東華塵裏度年年每見春風憶故園曾是江南新雨過閒看稚子引烏犍釣臺圖先生只合桐江老幸有生涯釣與農偶被羊裘勾引去客星早已不相容桃江圖大仰山前宿雨餘桃枝江口正樵漁何人乞得身無事賸買雲山小結廬山水圖誰能如此住相對兩忘情屋上青山色忩前流水聲墨竹舊篠斜依石新梢怒出林平生讀書處手種盡成隂睡鳬圖紅蓼不禁霜雙鳬夢正長世人那得似江海永相忘滕王閣圖幾度滕王閣憑䦨看晚晴西山與南浦相送復相迎蕭御史取稧帖圖稧帖屋梁上世人那得知不關蕭翼黠自是老僧癡笓子墨跡北去南來鬢已皤􅌨風沐雨閲人多謾誇編竹能除垢奈此蕭蕭短髮何塔海布哈孝行詩治定功成萬化開遐方驚見産竒材養生送死如東魯致樂遺榮類老萊禮豈専為中土制孝元根自本心來北堂日永萱花好安得千金佐夀杯吳君載挽詞竹罷繁霜徑蘭摧白露庭不堪垂老日頻作故人銘生世無中夀傳家謾一經最憐歸故里何處望儀刑濠梁劉孝子詩濠梁孝子劉將軍名在乾坤旌在門少年攻戰策殊勳袵席干戈獨好文父死寢苫仍枕土母疾減年兼剔股阿母孀居五十年阿兒孝行俱千古西園種李生李枝東園種桃桃滿蹊將軍之孝天所知世世子孫還似之韓滉牧牛圖農為天下本萬世此心同晴日開圖畫方知宰相功李氏八十詩憶昔申公八十餘故人曾為辦安車太平天子思文治會向山中訪禮書題龍眠二圖孔訪萇𢎞聖人何常師小技亦有道至今圖畫中若聽文王操曹楊讀碑以彼禍賊深遇此智識淺道旁十六字方爾較近逺夏可軒挽詞身分栖雲壑名誰動玉墀神仙付兒子詩禮自吾師瀛館徒云貴山翁元不知清風蓬島在何用紼謳為范氏貞節海內傳貞節誰如范母賢八旬夀者相五十寡居年門有名王表家多勝士篇里閭增嘆羡詩禮見曾𤣥王氏節婦鄆城王氏孝且慈年未三十身孀居上有姑章下二雛仰事俯育何勤劬二雛已長姑章沒四十餘年心玉雪二雛食祿母亦亡天地茫茫眼垂血大兒棄官守墳墓小兒奉檄還當去一家孝友誰能似王氏世世還如此題劉武敏公整子墀學臣字說後衣冠儀羽立丹宸百辟師師學藎臣獨羡世家家訓在清風千載鎮如新王生大字筆王生袖有筆如椽早自通州道者傳笑我蒼蒼頭已白不關太極寫雲烟夀李右丞八十一嵗富貴康强八十餘當階上馬不須扶已知忠孝千年夀况復升平一事無案上楞伽閒每讀杯中醽醁醉仍呼雲山滿眼春如海爭羡朱顔照白鬚安氏積善堂大同有安氏積善人皆聞食比黔敖敬粟無秦晋分遺金且不愛負劵常對焚止酒猶好客居肆仍尚文雲霞映髙誼蘭桂延清芬天道苟可憑有報寧非君農人力菑畝繼之還在勤雲中四老圖白髮雲中老衣冠有古風婆娑松竹裏莫是採芝翁樂廷玉西村南土信云美西村還是家侵尋新嵗月夢寐舊桑麻汶泗青山逺荆吳白日斜政成聊自樂繞屋種名花畫兔足撲速眼迷離嬌兒宛頸雌雄隨安知搗藥明月裏夜夜天寒月如水李澤節義詩母知柏舟誓兒知麥舟惠節義萃一家慈孝非二致天書爛爛照里門李氏之德難具論母夀八千為秋春兒身富貴及子孫老夫作頌天應聞劉氏濟美堂燕山有德門孝義子傳孫家誦同居樂人懷必報恩酒香花氣合琴靜樹隂繁濟美堂中客無忘劉氏言春江小景翠栁紅桃春滿天鴛鴦鸂鶒亂平川東風閲遍閒花草惟有人無再少年訪友松竹居圖流水青山净似苔竹松多處有樓臺只愁寒夜來相訪雪擁重門唤不開周文矩畫髙僧試筆圖南康遺墨紹興題京國傳看白髮時一片古屏秋似水山僧把筆未曾知白鶴圖昻昻十八鶴云是宣和寫長鳴月滿臯四顧天垂野相從上寥廓三嘆非仙者周介夫稽中堂紛綸接構勞反覆梏亡患伊人炯獨立髙堂啓清晏四壁惟詩書前榮或賔饌時從退食際發此喟然歎前瞻慮已逺却顧歡猶緩暗室儼有臨春氷凛將泮冥求天下本歘見古人面清風日正髙明月夜方半持之應萬物至理何由畔題趙子昻畫羅司徒家雙頭牡丹並蒂芍藥並蒂連枝花亂開冲和元自主人培集賢學士春風筆更寫天香入卷來葉處士挽詞君在山中住青山深復深泉聲傍户細樹色過墻隂接竹惟澆藥看松亦抱琴如今無復見空有夜猿吟送戴道士住天台君承恩命住天台萬壑千峯繞綘臺門外霞川浮溟涬杯中雲海接蓬萊時同野鶴看桃去或領山猿採藥回三十年前吾亦到舊題應入白雲堆題召秀才孟陽處士詩卷孟陽處士入京師身著山中舊補衣坐對王侯常極論行逢水石忽如歸韓康賣藥逃名姓陶令休官覺是非何似行藏隨所遇無心處處可忘機題趙敬甫先德詩君不見趙侍御大父昔宰元城日惠政旁洽四海聞身死百姓負土葬至今猶號縣家墳又不見趙侍御祖母袁氏遭亂離獨抱前母之子棄己兒孤兒哀哀草間啼冦盜滿眼若不知兩兒俱全天與之豈知孤兒孫絶類更離羣出入耳目股肱地吸為凜秋噓為春一朝天子賜恩寵白日赫赫懸髙旻上公大國及祖父漏泉之澤無涯津乃知為善必有報當時未必求報如今人嗟哉侍御何以報永以忠孝書諸紳朱陵别館圖悠悠清川動靄靄朱陵曉宿霧猶空濛行雲方縹眇谷深嘯隂虎峯髙礙晴鳥應有仙人來巢居謝塵擾何澄馬畫馬非真馬猶擅千金價南山猛虎多安得馳之射宋學士所藏五馬圖朝飲幽并暮秣吳龍膺鳯脊紫方矑承平得此寧無用可惜人間只畫圖李仲賔為劉明逺畫竹李公畫竹真天成踈枝密幹皆有情偶然縱筆作長幅颯颯坐覺聞風聲古松偃蹇連蒼柏怪石崔巍如積鐵李公心事劉子知嵗晚相期飽霜雪王氏貞節李家孀婦王家女翠柏為心未云苦故廬蕩盡起新廬子為縣官女有夫一生孝敬無與比德被親姻照閭里紛紛薄俗安可論幾人玉雪懷終始重送戴道士并序余既作霞川詩送戴君提㸃其所稱述翰林從事邵生為余言如此後數日太常博士虞伯生來言君所適者越也非天台所謂霞川乃在桃源蓋用以自號者請更賦被命將居越扁舟指㑹稽海雲迎棹起江月照人低有道蟠龍虎無生混鶩雞霞川隨處是何必武陵溪一初一從何處起初自幾時名昨夜山中夢梅花雪乍晴南陽太守射虎圖一箭何妨一害除使星歸進兩𤣥珠欲知太守忠勤事請看南陽射虎圖題晉寧申氏家慶圖申家盛德映當時家慶圖中始見之盡出槖金援滯獄潜輸囊米濟鄰飢已驚賢婦能齊夀復見名郎有七兒最是舍旁羇旅者感恩猶自說流離右軍帖吾有七兒一女皆同生題吳閒閒擬剡圖和風翼輕舟平崎䕃嘉樹依依流芳在渺渺層波去未知圖畫情稍叶滄浪趣真人與道息宇宙隨所寓季真亦已逺陳迹寧足慕環樞本無方矧有濟勝具何許川上亭政在㑹心處劉恩州挽詞籍籍甘陵守依依白下民甘棠初蔽日宰樹已經春昆寵家留譜龔黃代有人須知清白吏名德久逾新李伯時馬龍眠畫馬真是馬一匹猶當萬金價參差粉墨見龍媒渴飲長江栁隂下我今老病無所求但願早賜歸林丘肩輿飽飯百不憂閒看稚子騎犂牛折枝桃榴圖二首長眉添粉重媚臉醉春暄百囀東風裏如何獨不言西國移根早瑶池染露新青禽舊相識來送鳯城春謝安對奕圖晉代衣冠不可尋空餘畫史筆間心東山絲竹西州淚却是羊曇恨最深郭熙小景一路秋光百里溪行人行急趂前期船頭别有鳴琴客仰面青天信所之雪晴圖沙際風回雪乍晴偶然雙鴈下青冥山禽共嚮木居士不見靈芝一朵生夏圭山水隱者多依泉石間結廬相對共幽閒誰知泉石更多事日夜鬬聲來撼山趙大年小景匹馬衝寒踏落花杏園深處曲江涯何如相對風軒坐喚得漁船傍酒家賜歸後讀趙閒閒遂初園八詠得閒已羡閒閒早得去何妨去去遲偶讀先生遂初賦于今不愧八篇詩韓滉田家移居圖韓公豈獨丹青妙出入周旋足令猷坐擁荆吳兵百萬不忘田舍有漂流饒陽葛文元嘗題詩真定趙定國臨碧亭西壁上重來則穿壁之竹覆之矣為賦一絶臨碧亭中題壁處重來花鳥總無言惟餘亭下青青竹透壁穿墉護墨痕樂府漢宫春夀劉中齊尚書記得年時向爛柯山上問訊山君神仙當日機杼付與何人猿驚鶴怨道烟雲久暗楸紋秪有箇留侯好在玉梁千尺峥嶸老子當筵國手曽看書賭墅决策推枰而今長垂衫袖卷却機心後先翻覆一從他局面虧成旁觀者不求他訣只從乞與長生喜遷鶯夀大人四月七日天南天北記嵗嵗今朝白雲凝目遙想羣仙劈麟作脯鶴馭丹霞三谷此日癡兒多幸引領諸孫盈屋齊綵服對緑隂紅子緩斟醽醁和睦保吾門一家詩禮箇是生籙官不在髙名何必大無用滿堂金玉但願太平無事日用莫非天祿從今去看夀如磐石鬢鬚長緑酹江月寄夀京山宣慰叔嵗時荆楚渺淮海相望竹林清逸挂了豸冠歸去也側耳中郎消息見說旌旗行春江上也報歸來日嬋娟千里如今猶共天北應是南國甘棠緑隂新長未放春風歇料得清香凝燕寢兵衛森然畫㦸回首塵蹤轉篷未了又欲馳京陌浩歌金縷殷勤遙寄銅狄木蘭花慢夀忠齊三月草七日春光明媚日萬紅紫鬬芳菲算幾許韶華脂銷粉褪蝶懶蜂稀誰如半山解道道緑隂幽草勝花時天與誕生元老夀延長占佳期功名富貴轉頭非滋味總曽知且鸞坡鳯掖文章議論玉珮瓊琚癡貌那知許事須安排名字作去聲公師豈識遼東歸鶴只今夀國元龜臨江仙夀崔中丞四月十日永日緑隂庭院靜最憐紫燕翩翩舊巢已墮不堪黏主翁情愛重親手捲朱簾恰則五龍同浴佛嵩髙又報生賢殷勤深意倩誰傳呢喃如對語富貴出長年又有序四月草五日豫生之辰先養蒙學士旬日亦既拜臨江仙曲之賜謹次韻為養蒙夀且賀新除卷起黃庭聽夀曲蒙齊可賀綿綿安排機㑹實關天生辰今日是新命此時傳宣室曾聞前席語偉哉龍象初筵斜飛取勢玉堂仙太平遲公等大拜定今年養蒙詞附臨江仙曲仰為座主雪樓相公先生夀前幕下士張伯淳頓首再拜白雪樓頭清晝永新來喜事連綿朱明緑暗麥秋天繡衣何日去丹荔已香傳前夜團團明月好清光留照華筵錦囊隨處地行仙庭椿關望眼同慶八千年青玉案夀趙方塘學士五月五日昌陽初薦長生醑又好日逢重五緑鬢神仙家玉署每年今日綵鸞齊駕排日歡初度今年天上恩榮異道夀也還他富細葛香羅難比數醺醺醉了卿卿一笑巧結同心縷沁園春并序五峯大卿寄示所和繡江參議沁園春詞一以退為髙一以進為忠二者皆是也區區愧未之能焉倚歌而和情見乎辭十載京華騎馬聽雞自憐闊踈看春風葵麥敷舒如此故園桃李憔悴知歟要乞閒身聊追故步雪艇烟簑一釣夫君恩重却許令便養欲去躊躇竹西凖擬寧居詠不到娉娉嫋嫋餘又橋邉巷口燕尋舊壘天東海角月上新衢尸素有慚澄清無補豈不懷歸畏簡書堪時用得卿如卿法吾自吾廬金縷歌夀大人新月溶青荔望天邉夀星一㸃白雲千里又是吾翁初度日兩見童顔十四多綘縣老人一嵗想得姑仙麟脯宴進蟠桃滿引霞杯醉羣玉樹可人意癡兒未了公家事喜此中堂名繡綵晨昏如侍著箇斑衣渾欲舞却把夀巵遙跪祝翁夀三山一似已潔清香凝寢處奉安車弭節徐徐至就祿養看孫戲沁園春和王寅夫樓居妙曲兼致惜别意天上仙人只愛樓居真成故常自五雲深處乘風冉冉三神山畔弭節陽陽醉裏乾坤閒中嵗月興到謝家春草塘憑髙望看塵間萬事翻覆蒼黃好留此意要荒想坡老風流肯獨當况日邉紅杏空迷蝶夢眼前緑樹嬌囀鶯簧明媚時光溫柔地氣倘可栖遲老是鄉花神訴怨春歸閬苑自有天香清平樂以茗芽棕扇夀長樂尉弟四月三日潮來潮往百里遙相望喜見卯君初揆度好寄海南拄杖蕭然四壁坡翁要求黃木無從受用一般苦味奉揚千載清風品令夀談公植提學九月十日黃花的皪更著意粧秋色三神山外九仙峯頂輝騰奎璧聚逺樓髙人在青雲千尺輕車屴崱度窈窕穿丹碧翠橙香沁玉醪春艷笑摩銅狄數㸃梅花己報調羮消息滿庭芳夀曽徑節天地為爐昆岡欲燼此君興味何長深林蒼雪特地作清凉甲刃摐摐陳裏翠旌纛佩玉鳴璫須知道生來有節晚嵗更昻藏詩人閒品藻似衛公九十淇水徜徉任風花髙下蝶亂蜂狂有客長途苦暍貪美䕃欲買陂塘推門去何妨枕藉三萬六千場青玉案夀趙定宇梅花杯酒年年早有箇詩人未老恰則蛾眉新月巧人間春信水邉仙影共約今宵到少年回首都休道算只有紅泉快幽抱贏得池塘閒夢草堂開二樂客添一笑長似梅花好金縷歌夀胡澗泉憲僉二月七日八桂歸來後又十年泉紅澗碧蟠桃春曉老子精神真滿腹合借福星當道怎長寄東臯舒嘯是則顛崖人渴想奈一川風月多情好攀琪樹拾瑶草耆英洛社尊胡杲問何當棕鞋桐帽率先九老嵗月天長留石磴此約他時須早定分我香山歌笑未論桑田滄海事比諸公他日猶年少政恐有鋒車到摸魚兒夀燕五峯右丞記江梅向來輕别相逢今又平楚東風小試南枝暖早已千林烟雨春幾許向五老仙家移下瓊瑶樹溪橋驛路更月曉堤沙霜清野水踈影自容與平生事幾度含章殿宇隔花么鳯能語苔枝夭矯蒼龍瘦誰把氷鬚細數千萬縷簇一㸃芳心待與和羮去移宫換羽且度曲傳觴主人花下今日慶初度五峯詞附繡使雪樓先生歌摸魚詞華余初度次韻敬謝盛心荒唐愧甚又浮生平年六十登樓悵望荆楚出山寸草成何事閒却竹烟松雨空自許早搖落江潭一似琅琊樹蒼蒼天路謾伏櫪心長䘖圖翅短嵗晏欲誰與梅花賦飛墮髙寒玉宇剛腸還寧馨語英雄操與君侯耳過眼羣兒誰數霜鬢縷秪夢聽枝頭翡翠催歸去清觴飛羽且細酌盱泉酣歌郢雪風致美無度水龍吟次韻謝五峯不知今夕何年飛來五老峯頭月清輝無限殷勤回照嵗寒蒼雪寫入宫商鋪成紈素盡情誇說倚胡床老矣若為消得除却是杯中物自笑半生長客正沉思故林幽樾兒童驚走龍鸞雜還兩山排闥風雨蕭蕭氷霜耿耿相看髙節問此君學和龍吟水底幾時成闋漁家傲次韻謝郭西野僉事出世自憐居佛後眼前萬境真何有曲調最新情却舊重湖右林宗一笑同擕手西野有雲初出岫浮空肯學纎絺皺須信此中無雨久君識否老夫只羡無官守摸魚兒次韻盧踈齊憲使題嵗寒亭問踈齊湘中朱鳯何如江上鸚鵡波寒木落人千里客裏與誰同住茅屋趣吾自愛吾亭更愛參天樹勞君為賦渺雪鴈南飛雲濤東下嵗晏欲何處踈齊老意氣經文緯武平生握手相許江南江北尋芳路共看碧雲來去黃鵠舉記我度秦淮君正臨清句宣城水名歌聲緩與怕徑竹能醒庭花起舞驚散夜來雨疏亭詞附樂府摸魚子奉題雪樓先生鄂憲公館嵗寒亭詩卷為君歌嵗寒亭子無煩洲畔鸚鵡江山勝槩風霜地要近魯東家住丘壑趣應素愛昻霄老柏孤松樹登髙作賦想白雪陽春碧雲日暮别有倚樓處金閨彥尚憶西清接武年來喬木如許團茅時復羲皇上我醉欲眠卿去歌欲舉還自悟君亭琢就瓊瑶句踈齊試與倩倚竹佳人湘絃赴節凉滿北忩雨大德辛丑五月草二日書于長沙肅政公宇之澄清堂涿郡盧摯頓首再拜感皇恩次韻姚牧庵題嵗寒亭翠節下天來通明誰侍地有髙齊要名士相逢恨晚老矣酒兵詩帥嵗寒同一笑千年事黃鶴羇情暮雲離思半掬心香火初熾梅花滿樹又是一年冬至政相思恰有江南使牧庵詞附捧讀雪樓憲使嵗寒亭記擊節之餘扳踈齊例亦賦樂章姚鐩再拜尋丈嵗寒亭何多環侍烟節雲旓萬青士旄頭鐵甲更兩蒼官為帥落成天雨雪皆竒事不獨𤣥冬偏生幽思六月清風失炎熾三年轉燭君去豈無人至惟應無坐嘯文章使臨江仙以鴛鴦梅一盆夀程靜山平章千嵗蒼虬成玉樹江南江北孤芳平生何處最聞香五更江上路幾度月中霜休笑梅兄今老大年年青子雙雙風流消得喚鴛鴦和羮真箇也莫忘水雲鄉清平樂夀王楚山楚山清曉借問春多少松菊深深香縹眇萱朵蘭芽交照丹霞洞口紅泉從來慣醉飛仙不是稱觴獨後後天長似先天臨江仙餞拜都御史海北天南千萬里繡衣霄漢乘驄飛來黃鶴喜相逢清霜鸚鵡月寒食牡丹風仙闕曉班催玉筍馬蹄還上春空江頭官栁得春濃不如江漢水萬折與俱東㸃綘唇送王藎臣緑鬢青雲王郎故是乘驄侣阿龍風度想在烏衣住帶得春來又共春歸去江頭路美人何處官栁吹風絮又送王世英執法星邉從前合著雙星佐近來添箇轉覺光明大到得長干想見鶯花過情無那王郎知麼喚起思歸我摸魚兒次韻謝張古愚漢江東舊家文獻風流意氣相許金臺早集荆山鳳聲振一庭鵷鷺春幾處須信道甘棠樹樹含清露平湖古步妙一曲鈞天魚龍出聽未數應鍾吕吾衰矣鬢㸃吳霜幾縷劉郎忘却前度千年黃鶴歸來晚山色謾留眉翠東北注羡衮衮雲濤去接西江水仙塵異趣但極目朝陽清光萬里阿閣送髙翥鷓鴣天夀郝仲明御史庚暑初消酷吏更秋風新動仕途清生辰長占中元是今嵗欣逢二美并冠獬豸掌銓衡鏡般明了水般平手中一卷山翁啓人道延生北斗經蝶戀花夀齊諾監司十二月朔黃鶴山前梅半吐嵗嵗年年誰是氷霜侣自有使君來共住黃昏不怕風吹雨見說和羮天已許帶得春來又怕將春去記取澄清堂上語八千眉夀從今數南鄉子夀程靜山報道杏梢紅又報新添老令公好箇平章風月手成功畫㦸金叉各幾重七十未為翁彭祖當時丱角童家慶圖中須著我吾宗嵗嵗年年夀酒濃浣溪沙題湘氷行吟風雪交加凍不醒抱琴誰共訪湘靈數峯全似故鄉青流水落花何處路緑隂幽草可憐生行人小待我同行滿江紅送陳正善繡使將指江閩楚甸春濃早重染甘棠舊緑天又念海深江闊達聰明目漢使只今應遣十周官自古須廉六羡繡衣遙映衮衣明人如玉論别恨猶未足還怕見征車速待相隨千里試騎黃鵠無奈江山分去住漫教風雪欺松竹問使君如肯酌紅泉尋三谷掃花逰寄贈西野赴臺都事别離况味嘆自古難禁最關情處暮簾捲雨念征衣乍拂故人良苦見說麻姑也怕方平節斧正凝竚又報道待回天上官府誰與傳尺素想玉簡頻催綵雲難駐中臺獨步便迤邐金門近連沙路野鶴江樓為囑仙翁記取耿無語倚山亭黯然平楚摸魚兒次韻謝張古愚又山亭一畨春老歸遲黃鶴何許殷勤天上乘槎客還記渚鷗沙鷺憔悴處奈青鏡難藏一一都呈露空庭細步念一笑三年相思千里他日看嵇吕西門栁烟雨千條萬縷人誇張緒風度誰知聳壑昻霄意春樹漫搖柔翠杯滿注願回夀松喬一曲清如水壺中得趣問日麗扶桑風來閶闔應許共遐翥浪淘沙次踈齊韻題楊生卷城上望宸樓夢裏神逰山無重數水悠悠惟有江西楊處士來往扁舟金鳳落何洲君試回頭呢喃檣燕替誰留誰道明年如斗大借問沙鷗㸃綘唇夀王楚山幾日春寒楚鄉山色偏濃秀雪前雲後相對青如舊洞府沉沉聞道花開又烘晴晝蟠桃結就共慶千年夀木蘭花慢夀胡澗泉耆英圖畫裏笙鶴擁地行仙是曾識舊家南宫禮樂餅餤春筵海南早迎駰轡凜霜威風度肅蠻烟笑引霓旌綘節歸尋碧澗紅泉軒然過却古稀年忩户濕壺天甚小車花外醉呼麟脯滿泛金船蒲輪晝榮相錦福蒼生此筆健如椽辦了調元勳業丹霞小住千年浪淘沙夀談梅屋瀟灑水雲鄉樂事難忘鳳書無奈又相將繞屋江梅猶未白簡上飛霜小住政何妨院院秋香今朝何處按伊凉一曲一杯千萬意地久天長海棠春夀胡澗泉年年二月風光好佛出世有誰知道無量夀如來昨夜先來報澗邉玉樹泉邉瑶草千嵗和春未老莫羡澗泉間有鳳銜書到六么令夀聰山海鶴松間襟韻梅花雪後精神皇家蓍蔡老元臣彞常千載事品物四時春人道聰山育秀秀如嵩嶽生申夀身夀國夀斯文三階明紫極一氣轉洪鈞臨江仙夀晋軒久矣君家無此客年年天際遙瞻文星明似半規蟾槐㕔風細細蓮燭夜懨懨尚記當年飛鶴譜重隨賀燕呢喃逢迎一笑捲踈簾花開春未減日永酒頻添蝶戀花夀陳北山月掛新年弓未彀璧水溶溶已覺春光透國子先生松竹友一尊請為斯文夀况是雪中萱樹茂華蕚相輝天長地久何處東風吹雅奏孔堂絲竹千花晝又戲踈齊怡雲詞後長憶山中雲共住出處無心只恨雲無語今日能歌還解舞不堪持寄山中侣誰道解愁愁更聚自有卿卿慣畫雙眉嫵問取慳風并澀雨相逢認得怡雲否菩薩蠻次韻郭安道探梅孤根自是春憐惜一苞生意何曾息南北本同枝先開先得詩風來元不約冷暖憑斟酌花落又花開年年去復來千秋嵗夀劉中庵報梅開處又報君初度氷雪種瓊瑶樹重逢仍嫵媚方發非遲暮春滿靣廣平消得平生賦觀裏桃應妬無耐風霜沍香不斷清如許從教吹笛裂自有和羮具花㑹否明年相見沙堤路天仙子夀杜左丞一自夀星臨杜曲嵗嵗小春春意熟泰階相向更分明調玉燭扶鈞軸突兀眼前惟此屋折得嵗寒枝上玉擬祝翠尊還覺俗何如繡綵在庭前看未足杯方續周魯後前光汗竹太常引夀髙麗王沁園嵗嵗菊留芳待此日慶真王金鼎燮和元造夀域同開八荒帶河山礪一傳千嵗地久與天長晴日上扶桑便先照璚階玉觴鵲橋仙次中庵韻題解安卿盆梅南枝春盛斜斜整整猶帶孤山光景相逢索笑耐尊空向老瓦盆中自省風霜人老關河路永賴得生成慣冷憑誰移傍太初岩待雪月交光對影中庵有竒石號太初岩臨江仙夀尹留守六月灤陽天似水月弓初上新絃一篇來夀我同年帝京賢牧守人世妙神仙年甲偶同人却别我今早已華顛羡君福祿正如川印章金磊磊階樹玉娟娟清平樂西野使君自遼左寄詩詞至灤陽猥承見及次韻代訊且謝不忘新來酒户想勝看花處帶得春行平壤路同笑同歌同住灤陽却近山家芒鞋夜夜丹霞流水落花歸思蒼烟白石生涯太常引夀李丞相雪消一半鳳城春杏桃小帕嚴辰獨有柏屏蒼翠便似南華大椿露濃天近玉魚金印恩共嵗時新多少太平民願真箇朝堂秉鈞碧桃春夀廣微天師琵琶峰上曉雲光遙聞薇露香雲中王母九霞觴碧桃今日嘗開大國佩重章舊家張子房青山虎踞復龍驤梅花江路長沁園春夀李秋谷平章十一月朔河漢無雲淡月踈星玉宇初澄漸金仙掌上露華髙潔西風陳裏霜氣崚嶒浪蕊浮花狂茨怪蔓此日紛紛一掃平誰歟似有天公錫號秋谷山人須知與物為春向揫斂中間寓至仁是紱麟盛旦黃鐘應候一陽方動萬彚俱萌億兆蒼生鈞陶繫命夀國端如夀此身梅花逺倩新詞描寫來侑芳尊玉樓春次韻王彥博右丞詠梅梁園賦客情無奈嚼到梅花和蠟愛偏憐初日透宫黃怕染春風成野黛逰蜂怪底隨飛蓋揀得繁枝償酒債玉堂開卷已春殘紅紫紛紛都異態清平樂夀李秋谷葱葱瑞色岑蔚亭前客一㸃梅花藏太極總是春風消息去年今日西山哦詩賭酒忘還到底黃扉紫閣不如未老清閒天仙子夀白雲平章玉漏遲遲髙閣報枝上梅花春又透紅雲宫闕白雲山人盡道如君少江北江南行處好試聽陽春歌楚調調鼎勳名都做了人生七十古來稀仁且夀誰能到有酒滿斟南極老雪樓集卷三十
