body:
  text: 雪樓集卷十五元程文海撰序引贈歐陽南陽序古之君子不出家而成教於國若無所事乎逰也然以一鄉一國為未足而必尚友天下之善於是始有結駟過都重趼不息者而師友之淵源廣矣洙泗及門三千大抵異邦人也然則士其可懷居也哉聖人之教四而文為先其論君子之於友也亦必自文始然則士其可以舍文也哉陶唐氏開聖治之初者也夫子贊之不過曰有文章西伯周公大聖人也諡皆不過曰文道德禮樂至周備矣而言三代者亦不過曰周尚文然則士其可徒以辭章為文乎哉歐陽南陽生臨江之俊士也祖父皆儒先生長者義方素明生又材質秀穎志尚不羣其為學也力自奮拔刮磨不肯蹈陳襲陋觀其所為詩賦諸篇飄飄然殊有凌雲之高御風之逺也自以居幽守獨從師取友之未𢎞而父母之望未酬也於是四方之行昉自今始而首造於余豈以余為可與論文者歟余聞之欲窮山林川澤之觀者必即其都會焉夫京師固士大夫之鍾聚也生其行乎凡生之蓄於今者乃余之發於昔者也生其行哉余固卜其於師友必有遇也嗟夫古學不講久矣以生之材之志余尤望其於道終有得也故余以古之士與夫古之所謂文者先言之而冀生返觀之庶乎立身養志之不茍也京師遇吾故人乎為我謝焉曰今歐陽生勝昔歐陽生韓門不拒幸甚送雲伯讓序不擇官而仕為捧檄而喜昔人豈矯情哉為親也人子之於親幸而及養則三釡亦足樂不然萬鍾於我何加焉雲謙伯讓蚤年來江南猶及見諸老前謁余於金陵𬒳服儒雅吾固異之别二十餘年復見於京師見識議論益老成又二年復見之則掾於宗正府意其驊騮開路一日千里忽來訪余曰謙以嵗月遷餘杭總府知事即之官願得一言余訝其逺來久客取之廉而去之遽也則曰小人有母韓夫人平生睦族善姻憐貧敬老切切以教子為事重師友厚賔客凡所為有益於其子者無不為也新年八十一嵗七子十三孫謙幸成名老母留江南而西浙湖山演迤風土清淑宜於老者侍膝下奉色養官事之暇則板輿輕軒花朝月夕東遊西衍舉夀觴以怡慈顔尚庶幾焉余曰嘻子知所本如此豈惟便養推之宦業思過半矣夫知事八品官爾其任與三品等曰知事知事一府之事有不知者乎行一不義罪一不辜必反而思曰吾親聞之得無不可於意否役一夫斂一物則必又曰某家有老者乎得無妨其養否某家有幼者乎得無傷其慈否告而長語而僚必公私俱得而后己悅乎親仁乎下獲乎上宦業之昌由愛親一念而推之耳子盍行乎吾何言耶天都英俊之域名公碩彥發言為詩聞子之風必有大篇短章爭歌頌者吾為發其端繫以五言六韻人孰不有母及養能幾人歸無慈顔喜萬鍾空一身雲子退急流八帙念老親低頭蓮幕日適意綵衣春平反多不疑間居賦安仁忠孝重山嶽富貴輕埃塵高大有積慶堂詩序南城高君大有世以好賢樂善稱趙間間嘗為其祖簽省書積慶堂三大字以表樹焉今復新其構而揭之以奉太夫人之養可謂肯堂矣易曰積善之家必有餘慶夫一善易能也一慶易致也積之為難古人固有如孫叔敖之瘞蛇宋景文之度蟻適然一念之興遂致卿相若執劵而索償余謂是説求之吾聖人之書若有不相似者終莫若舜之孳孳夫惟孳孳於善故無不善又若蜀先主之戒其子曰勿以惡小而為之勿以善小而不為此乃近道乃積慶之基也若大有之承祖敬親尚賢之意若此吾知其慶之積也必矣余聞高氏久而未識大有也吾知大有以宗人仲和僉院之言及觀李野齋所為詩益信故書此以為他日升堂會慶之本紹運詳節序史學自古為難孔子敘書斷自唐虞司馬遷始以洽聞廣覽上及古初自是以來編年紀歷日以繁浩或出一家自相謬戾或參稽互見多所異同白首著述求其統會條分户析終至缺疑理固然耳南臺御史謙齋君好古樂賢端直不撓有古賢士大夫之風一日過余出示其客張君致逺所編紹運詳節一卷上下凡幾千年一目可極可謂節而詳者其志於惠後學深矣然天開地闢帝王迭興史氏傳疑古今通患其所不可深詰者多矣余獨喜因御史之舊獲知張君之學又因張君之書益見御史之賢於是乎書黎景高詩序安南人豫嘗讀黎君景高安南志郎官湖記等作未始不擊節驚嘆去之耿耿不能忘於心今復覽此編其五七言詩森整豐暇若不經意而乃得於苦心長短句穠麗婉至字字欲與花月爭妍而決非兒女口中語善夫景高如斫輪手圓規而方矩靡不合乎度如伶倫管含宫而激商靡不應乎節惟其學之審積之厚故其發也無不中然豫不獨愛其文復敬其人也介而不隘通而不流溫溫而春澄澄而秋至於懷恩感義慷慨奮激有古烈丈夫之風觀其始終彰憲侯一事可見已故其為文建辭起義皆有感而作非茍然者嗚呼誠有德君子哉其由京師而歸江南也乃敘以贈之贈彭斯立序廬陵彭斯立工篆刻一日擕所刻若古印章者謁逺齋曰是可以不朽豫曰是可以不朽乎曰未也吾刻古帖可上擬閣本淳化若絳若潭若臨江武陵直下視之耳吾又將取今名卿巨公雄文大章盡刻之配古以傳願得公手書所為文四五十篇歸刻之豫曰子之技善矣哉子之志異矣哉古帖若絳若潭若臨江武陵其初一淳化也今雖並傳懸絶若此誠以摹刻善否然也豫嘗得而觀之皆弔喪問疾簡記之辭多不過十數字少者數字其如洛神樂毅賀捷表者絶無而僅有耳非所謂雄文大章人亦無四五十篇者又皆後世好事者收而藏之朝廷搜求遂入祕府宋淳化始刻之摹以示人間也非其人志於傳而書且刻也子今欲豫書而刻之而傳之耶夫傳者必名善書刻雖工如文若書之未善何若豫之文藏之金匱石室者不可浪出應俗之作又皆散落漫不記省亦未必可傳亦不能至四五十篇之多且老懶不喜書將何以稱子求况古以文章名家或千數百篇或三四篇或一二篇赫然天地間者又不待手書刻而傳之亦非可手書刻而傳之也文之傳不傳繫其文之善否書之傳不傳繫其書之善否非帖比也豫誠無以稱子求也茍有志焉子行四方有善書若文者擇之可也不必豫也豫於斯文刻不刻不敢計也傳不傳不敢知也獨喜斯立技之善而志之異敘其語以贈之世必有賴子以不朽者歷代帝王紀年纂要序史莫信於書春秋莫博於史記後之稽古者舍此何以哉然孔子斷自唐虞政以世近而可信也司馬遷乃上述黃帝以來又逺詳其世次先儒固嘗疑之矣至於諸家編紀沿訛襲舛此皆好博之過後惟康節經世書以歷紀之始明白可信然好竒惑異者猶不能據依著述紛然莫之統一近平章白雲翁以政事餘暇悉取諸家紀載而集正之一以康節為準名曰歷代帝王紀年纂要亦上及羲農者因備博覽而已嗚呼白雲知所去取哉白雲信道篤學博觀約取於天下之務莫不盡然不獨是書也是書既經乙覽復徴豫序夫康節所以可信者以其信孔子也白雲所以可信者以其信康節也然則可信者莫若孔子信孔子者莫若康節信白雲者端在此編矣王氏孝節序豫學於臨汝書院時信之貴溪月嵓先生為之長先生與豫同宗其學渾渾而𢎞其行侃侃而和其言恂恂而善誘其子植甚賢娶五年而殁植之室餘干王氏又甚賢宋咸淳壬申年十九歸於植植死終喪誓不改嫁事舅姑生死無違禮先生既殁嵗至元壬午一夕盜入室姑疾在牀王守不去盜欲刃其姑王叩頭號泣乞以身代盜兩釋之姑以考終嗚呼世莫親於父子兄弟不幸孝友之道不明臨小利害即相視若秦越以王氏匹婦守其身事其親死生患難不足動其心卓卓如此不亦難乎豫有以知先生之道雖不獲大焯於當世其所以儀於家訓於後者深矣王氏年已六十康強寡疾勤儉有則子孝婦順如己事其舅姑閭里族姻軌範之邦人士歌誦之豫又有以知先生之世必由是而益昌天道之不爽明矣豫自去先生驅馳王事出入中外幾四十年幸無大過每思臨汝親炙時如一日今復聞王氏孝節之盛遂書其大者以授先生之孫同文天下有以樹教化移風俗佐隆平之治者於此必有取焉王氏名靜婉皇慶元年九月程某序溫國司馬文正公墓碑老杏圖詩序司馬文正公以純誠古學位宰輔雖童兒婦女知其為端人其薨也敕命蘇文忠公為文表其墓至尊親書其額曰清忠粹德之碑未幾仆於羣憸之口嗚呼邦國殄瘁固基於紹聖哉而斷碑之罅隨有杏生焉盤屈蓋偃擁其龜趺若非偶然者金皇統間夏邑王令及墓僧建祠修復老杏迄今二百餘年矣而無恙白雲翁家與之鄰益用封植繪而為圖皇慶之元翁以平章政事預國論議留京師乃出是圖及修復之碑以示廣平程某序之且將求當代名筆賦詠以發揮之某曰草木寧有知哉生得其所而不剪伐於樵童牧豎幸已所以異之愛之圖而傳之乃秉彛好德之良心也白雲有志於洓水公而曰天人之際在是亦何不可者遂為詩曰吾聞精誠可以貫金石誰謂草木真無情君看穹龜涑水上老杏布護數百齡風枝雨葉擁幢蓋陰森若有神物憑洓水先生三代士青春行天和且平問學深探古人賾德化直與元氣并蘇公雄文照四海比較當世誰重輕豐碑俯仰漫興廢百朴不奪二老名由來宋祚圮中葉已在紹聖非崇寧夏臺大人獨好事異國肯與扶顛傾古祠香火今幾載大字深刻羅軒屏何人卜居占此土白雲老子今疑丞摩挲往事起惆悵表顯更為圖丹青乃知天地崇至誠陳根斷石猶寵靈此心豈有古今異遺迹試向天人徴送布哷齊平章北還詩序古之有天下者必由得賢以興我朝自太祖受命至於世祖統一萬國雲龍風虎之士隨方而至莫不鞠躬盡瘁以立顯功若今江浙行省平章政事布哷齊之祖克哷公三世佐運翼聖南征北伐東誅西討忘軀委命以致其業以有人民土田至大初先帝御極今上在春宫始申追贈之命夫上公之爵大國之胙其祖父皆所宜有而平章公既承其忠於前復昭其孝於後於是立廟以祀伐石以載煥然功臣之中可不謂賢乎嗟夫使世臣大家於慎終追逺之道皆能若是則天下之俗有不歸於厚者哉其將歸刻姚君端夫之文也詩以送之皇元定海宇羣材集如雲於時克哷氏聯翩策殊勳忘軀力從戎佐運應天人金戈一指揮號令捷如神金源絶其流遼水飛埃塵功成寧後賞所志四海賔茫茫大國開皇上天地仁再世三公上乃孫復秉鈞溫溫平章公高行邁等倫立廟展孝思伐石表至恩卓然世俗中見此不世臣請身從南來素志一旦伸今晨告我别秋風集冠紳會見穹碑成突兀摩蒼旻上以報先世下以厚斯民代白雲山人送李耀州歸白兆山建長庚書院序國家樹教育材之本莫先於學校而天下之學廪稍不足者士既無所於養廪稍之有餘者祗益郡縣勾稽覬望之資教官率以將迎為勤會計為能而怠於教事非其人皆不賢其勢然也惟書院若庶幾焉而居城邑𨽻有司者其弊政與前等近世士君子之賢者往往因前修之迹據江山之會割田析壤建為書院既不𨽻於有司而教育之功乃得專焉馮翊李君仲章為德安府判官時豫方家白雲山中君尋亦買田築室於城西三十里白兆山之麓而居之乃李太白題桃花岩處相傳太白嘗讀書於此豫既出山君亦纍遷耀州守皇慶二年春君赴調京師南還割田二頃建河南書院乃二程先生之父作尉之邑豫語君曰君居白兆山非君家太白所逰歷乎獨不可建書院為教育之地哉君慨然曰此吾志也願歸割應城田四百畝建長庚書院聘名師教鄉里子弟以成公之命豫既韙之行有日重為告曰今天子仁聖夙夜孜孜以樹教育材為務君力是舉既無城邑之纍而有江山之勝士又得所養而不𨽻有司教可專也審矣利莫大焉德安文物之盛必自君始君之名與太白此山相無窮不亦休哉君勉成之豫歸白雲山幸逰息焉用晦和尚語録序佛法非言不立非人不傳此用晦和尚語録所以述也若因人以求法則其人已滅因言以求法則法不可言是用晦和尚語録未嘗述也和尚十五出家為僧七十一載遭遇佛法盛明遍參東南諸大長老九居壇場為人説法撰得千言萬語畢竟如何測之不見其涯求之莫得其緒似言非言似述非述若知和尚未言前便是元聳既述後即師未常言徒未嘗述用晦和尚語録序竟皇慶二年九月日敘龍虎山志序翰林侍講學士臣明善奉敕志龍虎山玄教嗣師臣全節屬臣某序之臣伏讀終篇山川之竒人物之盛前後宫宇之廢興纍朝恩數之隆尚聚此書矣然天下山之大者曰嶽水之大者曰瀆曰海顧以兹山先豈無意乎意龍虎之得名以張氏張氏老氏之學也繇東漢迄今綿千數百年而益振朝廷且尊而信之此志之所由作乎嗟夫治道貴清靜老氏之道也原於軒黃文景用之其所成就可睹已然流而為神仙巫祝豈本旨哉若所載天師恆之對唐高宗曰能無為天下治乾曜之對宋仁宗曰茍能反古之朴行以簡易志慮清明神氣完和矣奚事沖舉政和中訪高士王道堅以修煉延年之術曰清靜無為軒黃所以致治多欲求仙漢武所以罔功修煉非天子事已而命之􅓙厄奏曰修德可以回天禬􅓙之事不敢誤國端平初徴留用光入朝答使者曰歸奏天子治天下道德五千言足矣山林野人來將奚益若四人之言誠祈天永命之貞符哉庶幾善學老氏者可謂豪傑之士矣今天子撫盈成之運正清靜無為之日嗣師數陳老氏之本上嘉納之此志之獨先龍虎宜也臣故敢敘作志之意以示後之學者歐陽南陽手藁序臨江有竒士曰歐陽南陽豫識之三年矣見輒對客操觚櫝長歌大賦踔厲風發氣落落不可下其為言也必欲與常人殊嗚呼何其能耶夫杞梁之妻非善哭也情之哀也易水之夫非工歌也義之感也養由基之射調弓而猿號黃帝張咸池之樂於洞庭之野而遊魚出聽藝之精而音之至也得之天而應於物也世之號能言者不若是不類談兵趙括歟天非一時也地非一邦也人非一俗也物非一態也言不極不足以盡其變言其可易言哉南陽之逰京師也諸公交薦之其羽儀於天朝也非逺矣覽其集心異之遂為之辭送白雲平章序白雲公以四朝耆望潛邸舊臣皇慶初預參大政明年遷平章政事延祐改元春三月引年致政平章李秦公以言上曰知足哉是翁特加光祿大夫賜歸田里朝之人祗聞德言歡舞詠歌顛瞑昭蘇震炫黯黮相顧而歎天子能待臣以禮白雲公能事君以義秦公能成人之美如此方公罷戎幕屏居白雲山時買田築室鳴琴誦書幾與世遺矣庸詎知一旦桓圭赤舄坐乎廟堂之上黜陟百官盛極若此者哉自豫識公武昌幾十五載外和而內直好學而樂善曾無毫髮易其素其去常人固萬萬矣至於感老氏知足之言服孔子在得之戒從二疏當年之樂飄然反其初服於公特其職分猶足以風勵天下為萬世美談夫一出一處一進一退而國家之輕重繫焉此古之所以貴夫賢士大夫也然士大夫雖賢非遇明天子其遺恨千古者多矣若公者可不謂至幸矣乎因率同志作為歌詩以揚之且為他日續二疏傳張本續孟伸蒙子序續孟二卷伸蒙子三卷唐林公慎思所作其書列於唐藝文志宋崇文總目夫以孟子才號亞聖書次六經自司馬遷揚雄韓愈之徒尊信篤好以為大有功於聖門至司馬光李覯輩乃著書譏毁學者固自有次第哉二書免於世俗之見亦幸矣夫然二書文深義密諄切反覆不悖於聖人之道誠有補於世教也公字虔中福州長樂人兄弟五同讀書邑之稠巖山石室公中咸通十年第又中宏詞拔萃科賜其鄉曰芳桂里曰大宏繇祕書省校書郎至尚書水部郎中黃巢犯長安罵賊而死蓋賢者也其幾世孫崇萬來京師求豫序之嵩萬今為浮屠氏云延祐改元四月晦送李善甫知沁州序許文正公承朱子之學為我朝儒宗及其門者人人皆自愛重為賢士天下尤稱賢者曰平章布呼密公至元中豫於平章坐識其同舍生李君善甫蓋已矯然於時其為學也內而修身齊家外而事君治民一以文正為歸與君一合一離一見一聞上下餘三十年未嘗少變其度信學之有源也至大四年豫𬒳召過豫章君將為行省檢校握手相勞苦俯仰今昔慨然興懷豫待罪翰林之三年君亦赴調京師日與還往如初見時已而宰臣之知君者交贊之曰善甫沁人也逰宦外久得無思其鄉否即奏為沁知州行有日來别豫曰君是行也有民社之寄矣况父母之邦乎展其所學正在今日然豫聞臺之知君者復不少忍令不行其學於天下乎其不久息於沁也必矣豫旦夕候君西門之外嚴元德詩序自劉會孟盡發古今詩人之祕江西詩為之一變今三十年矣而師昌谷簡齋最盛餘習時有存者無他李變眩觀者莫敢議陳清俊覽者無不悅此學者急於人知之弊也變眩清俊固非二子之本亦非會孟教人之意也因其所長各有取焉耳去年識廬陵嚴氏二仲曰元友元正其詩若文雅厚深密非求一日之聞者近復得其季元德所為詩亦往往可誦以三子卓越之資生會孟之鄉加之父師之訓乂有歐陽公諸老遺風餘思宜所底若此然吾於元德猶有欲言者會孟於古人之作若生同時居同鄉學同道仕同朝其心情笑貌依微俯仰千態萬狀言無不似似無不極其言曰吾之評詩過於作者用意故會孟談詩近世鮮能及之夫學者必求之古不求之古而徒膠膠戛戛取合於一時其去古人也益逺矣其不為會孟所笑者亦寡矣求古之道當何如能如會孟之融會斯可矣而猶必以養性情正德行為本二仲歸試以吾言告之忍恕堂詩序京師有袁氏者父母既喪兄弟同財而居嘗相推讓保其家和人以為難又懼夫情之或遷義之弗盡字其堂之額曰忍恕朝夕監觀以自發焉且以示後子孫豫聞之曰嗟夫聖人之道忠恕而已雖天地由之既恕矣復何事於忍乎豈學有淺深恕必由忍而入乎學恕而先之以忍則用力必至信道必篤或遷之機弗盡之微無自而起矣恕其庶幾乎雖以是名堂可也使天下皆袁氏唐虞之世何足過哉朝之大夫士皆為文辭以稱道之屬廣平程某為之序李氏忠節序夫為人臣而有馬革之忠為人婦而有柏舟之節非幸也義也於是而有祠廟之褒門閭之旌封爵之加亦義也非幸也忠臣貞婦豈不欲長保君臣之樂伉儷之情哉不幸而蹈危躒變寧忘身而徇義以為不若是不足以為人此豈得已而為之哉中統三年李璮之叛濮陽李文秀以武衛親軍千户從諸王噶必齊征之戰死濟上其妻頓氏年始二十有九終喪骨立誓死不嫁治家訓子卓然有倫子永既長授宣武將軍侍衛親軍總管未幾蚤世撫其遺孤以至成人復襲武略將軍侍衛親軍千户於是頓氏年八十二嵗嫠居五十餘年不易縞素鄉里尊之有司始上其事請表其門於朝而翰林修撰彭君允道屬豫序之嗚呼治亂相仍生死相因夫喪子天母孫纍然何其不幸矣乎然視世之飽食高位而有曠職安居美室而有過行其不幸又何如也故李氏之不幸乃斯民萬世之幸也摛文掞藻之士可無以詠歌之乎溫州路達嚕噶齊拜特穆爾德政序東南海濵諸郡溫最劇大德十一年夏四月拜特穆爾來守是邦首興學校勸農桑使民知本裂姦貪震豪橫抑奔競之風禁苛暴之政使民畏刑建忠臣之祠表孝子之墓禮先賢之後使民尚德是嵗大旱遍走羣望引咎痛自責闔境雨足大有秋明年環溫諸郡飢疫相仍流民數千人來歸為之儲偫以食之為之廬舍以居之為之藥物以救其疾為之櫬轊以給其死及其返船又為之裹囊而導之出疆明年秋七月吳越大蝗蝗且入境至境皆死人以為德化所致民有高姓者售私鹽或捕詣吏吏受賕反以捕者犯連逮甚衆漕使檄君詰之具正其罪濬平陽河渠五十五萬五千九百餘丈嵗溉田四千餘頃郡庾庫久敝為委吏憂徙之爽塏繚以重垣以固之又為常平倉其旁以備荒政不期月之間民順吏從田野四闢盜賊寢息囹圄空虛頌聲咸作乃召郡博士及羣士之賢者修其圖志求古今之遺迹山川之勝概為之臺榭逰觀樂民之樂而政成矣至大三年受代去民思之至今惟君生長富貴而孝友肫篤好賢下士得於天性又能本仁遷義履公律廉為天子分憂者如此豫雖未之識而翰林經歷張子仁編修章德元縷縷為豫道之且屬豫序二子皆賢者其言有徴因書以為守令之勸李雪菴詩序古今詩僧至齊已無本之流非不工而超然特見高出物表徑與道合未有若寒山子之詩雲頂敷之頌得其旨者惟昭文館大學士雪菴大宗師乎師以淡泊為宗虛空為友以堅苦之行為頭陀之首蓋數十年矣適然遇會濡毫伸紙發而為詩有寒山雲頂之高無齊已無本之靡不假徽軫宫商自諧得之目前深入理趣謂不足以流芳聲於四海振遺響於千祀可乎樵夫織婦邂逅一語猶萬世不可跂及況衣道食德遐觀曠覽若大宗師者耶世欲知師之道此固特其粳粃然求其至亦不外乎此也詩云乎哉詩云乎哉平章政事張閭公右丞曹公參政李公得本於十二代宗師焦空菴將刻諸梓而俾豫序之延祐二年夏六月既望廣平程某序李仲淵御史行齋謾藁序自豫識御史李君仲淵而後知天下真有以古文為任者邪説興而大道廢議論勝而文氣卑其來久矣古人一章一句該體用具本末備終始猶有餘後世纍千萬言欲究其理而不足非文之至也耶若原道原人太極圖説通書西銘等作方可稱繼三代者思必如是而為文則天下之文廢矣又豈通論哉作述之體既殊古今之尚亦異學足紹先聖之道言足垂將來之法而已豈必模三墳擬大誥而後為古乎此仲淵之所憂而吾之所以知仲淵也仲淵材峻而氣渾學富而行實其為政簡而敬和而平以扶綱常任教化為本至其不可奪則卓然有古遺直之風故其文精鑿沉欎不假議論而理自見不托迂怪而格自竒其本則六經其辭則雜出西漢而下其可任以古文者仲淵其人乎然文之盛衰世道之占也我朝之盛自古所未有獨於文若未及者豈倡之者未至而學之者未力耶今天子方以復古為己任於上𢎞其風浚其流凛焉而任於其下者非我輩之責耶而吾老矣仲淵不可辭也仲淵名原道亳人有集曰行齋謾藁見示屬豫以序不勝狐裘羔袖之愧章德元近藁序豫自衰疾以來愈不喜為文雖談之亦自厭也為之愈力而愈逺談之愈切而愈病常欲一旦盡謝去前好湔滌腸胃收視斂息以自愛也而適然意會輒復為之而不知蓋士君子釋此無以達於情而接於物也至於談則絶之久矣如淫聲美色而逺之矣安能日嘐嘐然與物相仇耶近得東嘉章君德元與豫同史館年相近也道相似也乂敦信而豈弟古君子人也心甚好之乃時與之談向如淫聲美色而逺之者如沐猴衣冠執干而舞非不俯仰中節投之以果則不覺攘臂而起矣此非絶之不深制之不嚴為知者然也君之詩若文質厚而氣和一以理為主蒼然正色貫松柏而後雕不知世之知君者復幾人也安知數十年後無索君於茫洋之間溟涬之外者耶豫之所謂欲謝去者行見之矣姑為君一言君名嚞嘗著東嘉郡志二十卷甚有法贈王太醫序廬陵王君東野善為方繇郡官醫提領入為興聖宫太醫諸貴戚近侍公卿大夫皆以老謹爭相延致君亦輒能以效自見延祐二年春二月豫暴得末疾幾不知人君入診曰脈大浮盛得之氣虛而風乘之宜服三生飲間投以小續命湯數日疾可已嘉興徐元善復入診一如君言服之三日手可舉足可履服之五日手可至髮際足可因人而行服之七日手可至顛足可因杖而行服之十日手可舉物足可去杖與人矣惟舌本微強害於言以問君君曰脾脈絡胃夾咽上連舌本散舌下心之别脈上繫舌本此心脾受風未除也宜服解語丹服之十日舌不強語不害若君之醫可謂良矣而徐君不立異以為功亦可尚也夫始余之疾聞君之言而喜及得徐君益信然當是時君誠賢徐君一立異衆必茫然不知為計矣豫有弗病矣乎賴二君子皆良醫其識同其心又同是天以賜豫也嗟夫方今之受病又甚於余者衆矣不知皆能得良醫如東野同心如元善者治之否乎彼嚚嚚然計功而害能專欲而擅利危人之身絶人之命而不顧豫甚懼君之不嘗遇徐君以成其功也其必審所以自處哉他日天子詔其上所驗幸并以愚言為對送艾庭梧序臨川艾氏多聞人或以詩鳴或以文高或以明經顯豫少學臨川多與之逰去年秋有客候於豫謁入曰臨川艾庭梧敬候先生亟見之則吾同舍生從子也問其字曰伯蒼問其年則豫去臨川時猶未生也問其所從學則皆良友碩師出其詩若文及與之談經則兼昔人諸長而有之豫甚驚亦不意去臨川四十餘年復有斯人也問其所為來則曰吾生四十年前欲一望大河之外不可得今幸遭盛明極日月所出車轍馬迹皆可至奈何守一丘一壑而自比於井中之蛙乎吾將浮遊乎齊魯燕趙韓魏秦隴之郊問古帝王之所都聖賢之所起其餘風遺俗猶有存者乎其高人魁士猶有伏畎畝偃林藪而未起者乎吾將求之以益吾所欲聞此所以為來曰子寧欲仕乎則大笑曰先生何量人之淺也方今明君在上賢公卿滿朝才士如林職修政舉文武備用又何待三千里外一窮書生乎吾不為是也豫大驚然心猶疑之居嵗餘數相從察其志益堅學益閎文益雄豫始知其言之不欺而志之可尚也而信之猶未篤夫京師者天下遊士之區富貴利達之塗以子之材而求諸豈有長為山林之臞子乃舍衆人之所趨就衆人之所迂雖日日語人人有弗疑者乎今果去我而逰飄乎其不可留嗟夫豫愧子矣豫不敢復量天下士矣子其待乎明年春歸俟我於臨川之上胡彥承文藁序豫比從李御史仲淵識胡君彥承彥承嘗學於蕭徴君維斗維斗與豫善豫知之深故喜彥承之善學也今復從翰林直學士薛君公諒得盡讀彥承所為詩文六十篇益知彥承之所以為學也夫文與學高下學之進文從之矣以彥承為丞相之孫太守之子生長富貴出入禁闥身取祿位於他人宜如何方且誅茅為園鑿嵓為室遊目終華洗耳河渭顛暝乎詩書之囿沉酣乎仁義之藪然後又求正於有道尚友乎千載其過人不亦逺乎然非文不足以知彥承之所以為學非彥承不足以知學之所以為善又非維斗不足以致彥承於道也則豫之敬彥承也徒止於文乎彥承名居祐京兆人送王克誠引豫讀張希孟之言而益謂師友之不可不尚也向豫忝與中書末議克誠實掾東曹雖不相語而間相面知其逰蕭夫子之門於當世人物取與弗輕也去之七八年豫既復來來又不能自引以去而聞克誠為秦省幕長矣希孟言以贈行又屬豫繼夫克誠學問有源行之方大豫其何贈乎嗟夫幼而學壯而行人孰不有是心惟以己心酌人之心母以己學律人之學則可以相天子治天下而況於一方之寄乎克誠行矣豫誠無以贈君乃遙祝之曰願以此學相天子治天下里氏慶源圖引氏族之制所以定親疏别嫌疑厚人倫也古者國有牒家有譜然猶有拜汾陽之墓者矧二者并亡之歟其西北諸公以名稱相呼以部落為屬傳久而差失真尤甚此里氏慶源圖之所以作乎里氏者隆禧院使約爾珠所自氏也按里氏世高昌人高昌宅河西之境在唐為伊州其俗大抵與諸國類又世蹂金革雖豪王大族能自系其所自出者無幾惟里氏世仕其國為大官自大父薩竒蘇仗義歸朝佐定中夏為山東大都督其後列朝著寄方伯垂紳曵紱分符握節者餘六十人亦既盛矣而隆禧君大懼世代日益逺生齒日益衆無命氏以相别終亦荒唐杳渺不可知而已何以奉先而傳後哉乃以身事本朝者實自大父始而大父之名從世俗書有從土從田之文考若伯考之名皆有里字而春秋有里氏遂自氏曰里氏又遡而求之定其可知者自丞相棟裕勒以下至於今九世系以為譜號曰里氏慶源圖而隆禧為七世云君好學廣問於忠君孝親之道尤所篤慎嗚呼百世之下觀此圖者亦足以見人之不可以無學也尚敬念之哉尚敬念之哉送高伯椿大年尹京山序郢余父母之邦也先世墳廬疆畎相望閭里雞犬相聞今僑居數千里外松楸之思霜露之感每當時序未嘗不西仰而薰心也集賢待制趙公為余言高君大年將之官京山余聞之喜蓋君以修名廣業從事中朝習知為政之要家又世儒愷悌孝友有本有原且趙公之嘗僚也趙公於人賢賢賤不肖而於君尤加厚然則以斯人宰斯邑所謂牛刀之用枳棘之棲君或有不屑焉耳由邑人言之抑又何幸之甚也況今明天子在上有若君輩分憂宣化於下忠厚及於草木正直孚於鬼神由明達幽罔不安賴為政之良蓋若此然則由余私言之幸不又甚於邑人乎云胡不喜夫郢楚之故都流風餘俗豈必猶存雖存亦奚足為明時道抑若子文叔敖亦彼為政之良者也以今之時以君之志又豈列國陪臣之所敢望雖然余聞彼之不治也久矣譬之農焉物土之宜而布其利驅蟲螟拔荑稗又若牧焉去其敗羣視其後者而鞭之其不殖而繁者否也以君學古入官達於從政顧獨不知此哉而余乃諄諄然如八九十者蓋閭里之厚望芻蕘之常談今逢明公下車代為父老誦言之耳詩不云乎維桑與梓必恭敬止況於封崇而雨露之者故余於君之將行夙駕於上東門以俟具此藉手焉送郭元坦序閩之陬幅員凡幾千里連山絡其精神巨淵敞其眉目固必有瑰特者生乎其間然炎劉之世無聞焉中唐而權輿近代而坌溢嘻何其富也蓋嘗思之昔者遷其民於江淮則彼之靈鍾美賦固已無所於寄而飛潛植動又烏足以當之永嘉以降北之去而南入者紛總總也則夫氣之蓄而厚者既有餘時之陶而化者復日異宜其出則穎然於軒冕之場處則繩然於材藝之藪也鄉余行春是陬甲乙數者猶四三人焉其典刑風裁足使余忘其為旅郭德基氏遊最親去之十年乃有伯仲欒欒訪余於京師則郭氏之二子駭其衣冠曰喪父之喪也何以來曰志母之志也為之閔然而悲伯曰元坦既仕矣余遂以仲薦幸中書不廢余言亦使仲仕既而伯超秩六品衣朱衣擁象笏為長史太傅府中幹譽望一府一府咸利賴之至大二年春銜命南禮名山川因將便道拜家慶余固竒其有以慰母於未沒報父於罔極也又期以纘名德於前人光簡册於當世也欲為一書以寫余意以致其鄉黨之欣欣以寄四三人之猶存者未涉筆元坦兄弟來别適余亦有行役乃不暇書歸而見諸君子若四如居士夷白老人與小孤六平山諸君為我謝且問焉曰公等俱無恙否自有閩以來亦有荷布躡蹻入京師不一二年朱衣象笏以歸者否異時士大夫之子或齒膠庠或登天府即臧獲亦與有德色然則余兹之喜顧不大愈於異時抑不過若異時否抑視為男子分內事初不為動獨鄙如余者乃助之抃否且余前言閩之言亦果不謬否公等其有以語我來也山川悠逺維其勞矣伯仲尚無忘余所欲者哉王楚山詩序杜紫薇有云千首詩輕萬户侯蓋隱居求志尊所聞行所知無所蘄乎外無所茍於身抒性情之真寫禮義之正陶天地之和其言論風旨之重孰加焉尚何萬户侯之足道然余意張公子未足當斯言也余友楚山翁其幾之乎翁與余同里又同年生辟世牆東若君公每當風晨月夕山嬉水娛可嘯可詠可歌可吁者一寄此集也觀者美之如錦段玉案嗟夫誠有以自樂他何重輕然則以詩輕侯又未足為楚翁道也余將還西江因留其集而書此以謝焉雪樓集卷十五
