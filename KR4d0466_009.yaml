body:
  text: 雪樓集卷九元程文海撰玉堂類藁敕賜碑記薛庸齊先生墓碑聖天子思以二帝三王之道致太平是故表章六經尊寵儒生所以風厲天下者意甚深也國初河南薛元微之制行立言穎然當世搢紳尊之曰庸齊先生先生之子友諒今直翰林為學士天子知之延祐三年夏四月有詔為先生樹碑而俾臣某夀其事于石臣與友諒同寅習知先生名德固願有述也况又奉詔謹按薛氏自漢晉為汾陰大姓有東西南三族之别徙下邽者西族𦙍也先生家本下邽世有顯者大父圭讀書力田不躡世好父沂明春秋經傳再與計偕廷䇿輒見卻歸而聚書窮理不復出衆仰其高以友諒貴贈中順大夫禮部侍郎上騎都尉河南郡伯配郭氏追封河南郡君先生生而不羣幼而有詩聲冠而載書入少華晝夜誦習不以辟地廢束枯葵學書泉上石為之窪其勤類是又從明理學者游遂一以聖賢為宗國初遊大同過應州髙韓二帥喜而薦之中令耶律公得應州教授俾子弟學焉公與間語輒擊節賞㑹沙門萬松問先生以孔子之教何者為要答曰君君臣臣父父子子松默服時進兵襄鄧中令薦聞授撿察使督衛輝河南餽未幾改軍儲轉運使軍以無乏明年召還賞白金百兩貂裘一楊奐秦中名士也廉訪河南慕欲與游辟居幕府先生從之始定居洛西甫閲歲謂竂寀曰進不能行其道徒羈塵網無為也即棄去一時英俊若中山楊果縉雲李微虞鄉麻革雲中孟攀鱗蒲城郭鎬李廷河中竇獻卿洛陽宰沂皆友也王文統柄國嘗羅致沂為真定勸農使不得已而受陽為不事事至亡其告身及金符於酒家文統知而迹得之沂因自免歸文統聚歷代竒謀詭計為一書先生見而責之曰士君子如欲平治自有聖賢格言此何為者遂絶勿與通中統初召為平陽太原宣撫不起授提舉河南學校亦不起日與女几辛願栁城姚樞稷山張德直太原元好問南陽吳傑洛西劉繪緇川李國維濟南杜仁傑解梁劉好謙講貫古學且以淑人伊洛之間復蔚然矣洛西山川明麗先生卜築其要㑹重以花竹池臺之觀良時勝友觴詠遊衍浩如也自中令公以下咸謂洛西神仙先生髙明樂易誘掖不倦及門者後皆知名官洛師者多名卿材大夫昕夕造席請益過者以獲識為幸遇異時瞻遺貌過故居慨然贊詠而不能忘二子友直終於龍陽州判官友諒蚤以文學記室事安西王王薨官州縣三十年勝殘伸枉興利去害皆有實狀最其大則武陵涔陽活餓莩餘三十萬晚構精舍於洛西招徠教育迓續先生之盛心義方之明堂構之美蓋兩盡焉先生臨終不茹藥具湯沐授治命為書别親知又題七言詩四句投筆而沒時至元八年秋九月冬十一月葬北邙山之陽今贈集賢直學士亞中大夫輕車都尉追封河南郡侯諡文靖配徐氏追封河南郡夫人生友諒及王郝楊三婦次王氏生友直次任氏女八壻曰太常博士王顒曰陜西漢中提刑按察使郝繼祖曰孟州知州劉遹曰永寧張經洛陽焦厚孫惟德楊師孟永寧張成孫男九曰濟終山陽尉曰貽孫蚤世曰恭曰鼎安蚤世曰寬國子生曰裕曰信曰敏曰惠孫女十有四先生為文辭得於心有易解中庸注聖賢心學編皇極經世圖說道德經解陰符經論說有詩三百篇曰適意集嗚呼若先生者可謂生有以樂死有以歸俯仰天地不愧不怍者矣恩加蒸嘗延及奕祀不亦宜乎碑宜有銘銘曰大道之行三代之英元聖所志有紀有經未墜在人或措或舉顯允薛公其適惟魯吾師吾友莫或稗之匪以旦暮與千古期野有𤣥黃吾有緗素飲水曲肱夢與天遇維伊之左維洛之西昔程今薛室豈逺而湛露及泉道隆時泰夫豈公榮百世永賴邙山之陽林深石蒼嗚呼逺矣其存者長秦國文靖公神道碑孔釋之道為教雖異而欲安上治民崇善閉邪則同後世之士各尊所學更訾迭詬莫歸其極自故翰林學士承旨秦國文靖公始以佛法見知天子至於忠言讜議敷宏治化者孳孳焉悃悃焉悉本乎孔氏孔釋之道克協于一夫天之生斯民也豈無意哉初其父方燕坐作觀音觀想忽有抱一童子付之者已而其母有娠及産紅光發屋鄰曲爭以失火來救生五歲一日卧三晝夜始寤問其故則曰文殊方為吾說法不覺久留耳自是日聞父兄講誦經論即了大義九歲始從師力學一目十行俱下日記萬言十三能默誦俱舍論三十卷十五孔釋之書皆貫穿矣十九被徴召對稱旨為特賜坐世祖即位進寶藏論元演集一十卷嘉嘆不已因勸上宜親經史以知古今治亂之由正心術以示天下向背之道遂譯尚書無逸篇貞觀政要申鑒各一通以獻上深納之親王阿里克布克潜謀不軌天子重以骨肉之情命公往調護之而反狀益聞乃遣近侍默色斯特穆爾布哈亟召以還曰毋害善人既至慰勞久之公因舉任賢勿二去邪勿疑與治同道罔不興與亂同事罔不亡有言逆于汝志必求諸道有言遜于汝志必求諸非道敷繹詳暇以諫上大悅特授翰林學士嘉議大夫知制誥同修國史尋商議中書省事奉詔譯尚書資治通鑑難經本草成進承旨加正奉大夫領集賢院㑹同館道教事公既以碩德重望為上所信幸每賜對必以開言路廣聖慮慎刑節用為言未嘗不稱善至元三十年五月二十有二日丁丑忽端坐若禪定者左右扶就寢至夜聞異香馥郁即視之已薨矣是夕有大星隕于庭圓相凝室不散見白毫出西南去天子聞之震悼遣中使致祭賻贈有加五日辛巳闍維于國西南門之外得五色舍利不可勝計塔葬其骨于宛平縣七園之原詔收其家遺書得歌詩偈贊頌雜文數十卷命刻梓傳出延祐二年贈推忠贊翊協德欽臣太師開府儀同三司追封秦國公諡文靖明年集賢大學士臣皓請刻石表墓而以文命臣某臣謹按公諱安藏字國寶輝和爾人世家伯什巴里自號龍宫老人祖諱小乘多贈銀青榮祿大夫大司徒父諱德桑特克薩和爾德贈太保儀同三司並追封秦國公祖妣布延德濟妣額森郡主並追封秦國夫人配張氏封秦國夫人男二威喇托多齊中憲大夫同知徽州路總管府事女一適荆湖北道宣慰副使耶律希圖中書左丞相鑄之子也孫男二闕閭朝列大夫德安知府九九其門徒之賢者則太師天藏沙津密護赤為之首臣常與公同僚並受世祖之知觀公為學有根柢制行有繩凖論事有本末憂國如家視物如已忠信豈弟有古君子之風是以四海之內黔黎之䇇緇素之流希聲光而談道德者翹首跂踵莫有間焉其能生為大臣沒享上公宜矣銘曰佛以教離儒以習衰哲人之憂愚者之疑於鑠秦公孔釋兼融振衣金維與道俱東展也生知允矣上智搜羅羣經攄發祕義以儒輔世以佛洗心嘉言罔伏如玉如金出入承明餘三十載窈窕禁林遺風猶在音容雖邈命數維新茫茫秦郊原隰如鱗吁嗟秦公百世之士繼之承之惟爾後嗣大護國仁王寺恆産之碑皇元以仁得天下其愛衛社稷福綏生民之道甚備惟佛法慈悲智慧大無不包細入無倫參天地贊化育功博且逺尊信尤異若昔太祖龍興列聖相承世祖奄有四海成宗垂拱而治武宗立功邊陲今上撥平內難以正神器皇太后慈明仁愛受天下之養雖天命所歸人心所戴萬有億載而陰相默佑之者豈無所自耶初至元七年秋昭睿順聖皇后於都城西髙良河之濵大建佛寺而祝釐焉肇基發跡天人之應神物之感雲臻霧集昭爛赫奕三年而成時裕宗在東宫襄善贊美所以奉慈闈尊梵王宏法海之盛心無所不用其極以佛法不徒行必依於人人不可以無食中宫乃斥粧奩營産業以豐殖之已而效地獻利者隨方而至物衆事繁建總管府統於內置提舉司提領所分治於外歲滋月積府之政日以懈田失故額租賦不登寺之賴日以削至大元年皇太后翼扶明聖慨然思述祖宗之德念昭睿順聖經始之仁罷總管府建㑹福院以平章政事宣政院使按巴哈瑪爾布哈為㑹福院使綜核名實遣官分道約部使者集郡縣吏申畫疆埸樹識封畛歷四載始仍舊貫視常歲之入相倍蓰焉凡徑𨽻本院若大都等處者得水地二萬八千六百六十三頃五十一畝有竒陸地三萬四千四百一十四頃二十三畝有竒山林河泊湖渡陂塘柴葦魚竹等場二十九玉石銀鐵銅鹽硝鹻白土煤炭之地十有五栗為株萬九千六十一酒館一𨽻河間襄陽江淮等處提舉司提領所者得水地萬三千六百五十一頃陸地二萬九千八百五頃六十八畝有竒江淮酒館百有四十湖泊津渡六十有一稅務閘壩各一內外人戶總三萬七千五十九實賦役者萬七千九百八十八殿宇為間百七十五櫺星門十房舍為間二千六十五牛具六百二十八江淮牛之𨽻官者百三十有三經界既正版籍既一皇帝以為能稱孝養意進封按巴秦國公辭上曰爾逮事世皇乃纍朝舊臣封以此毋庸辭出制書親授之皇太后樂其有成功也命詞臣載文勒石以垂永久臣奉命惟謹竊謂祖宗受命為天下主所以尊崇佛法休惠僧徒惟恐不備焉者豈有他哉誠以其道足以安利國家澤潤生民期底于至治也欽惟聖上侍皇太后繼志述業篤恭於其上而羣臣披榛剔螙忠順於其下故能若是猗歟盛哉居其居習其書衣其衣食其食盍亦修其道安其教願宗社之靈長祝兩宫之萬夀以報于上嗚呼一寺之政必得其人乃舉况天下之大四海之衆乎既刻其詳于碑之陰謹拜手稽首而獻詩曰巍巍世尊靈妙昭融振華金方迪我皇風皇矣聖神聰明神武圖基萬億四三六五爰稽象教載跂遐躅四海同源萬里一轂於穆昭睿順坤承乾髙良之濵神宫矗焉丹明碧麗重門夾戺傑棟龍驤飛甍霞肆學人總總以衣以食原田每每誰蹙誰闢繼祖承宗唯我聖君爰啓爰謀太母之仁昔也莽只今也禾黍昔也蕩只今也徴賦既樹既碣疆場有截我倉我庾載盈載溢惟得其養其道乃明惟得其人其政乃行嚴嚴廣剎其音藹藹西負太行東漸滄海松敷梵唄河衍法流於千萬年敬天之休貞文先生揭君之碑延祐五年春二月癸巳朔越三日乙未皇帝御嘉禧殿集賢大學士臣皓翰林學士承㫖臣和塔拉都哷默色言集賢大學士臣約臣貫等為臣言故江西儒師揭來成其道德之化仁義之教被於人也深人思之弗忘而名號未有所加封樹未有所表無以勸來者諡法清白守節曰貞道德博聞曰文諡曰貞文先生賜碑墓道臣等謹昧死以聞制曰可其賜諡貞文先生翰林學士承㫖某其為碑文翰林學士承㫖孟俯其書篆三月戊寅傳詔至旴臣某方養痾田里待盡朝夕不圖聖恩猶慮及臣臣雖委頓敢不拜手稽首奉詔臣謹按揭受氏有三以官楚司揭氏之後以邑漢揭陽侯之後以名漢陽信侯之後晉魏吳楚之間皆有之唐乾寧中有僕射鎮為袁州刺史居旴水上者為旴江揭氏居章水上者為豫章揭氏皆宦族先生諱來成字哲夫世居豫章之豐城今為冨州云先生孝友篤誠出於天性家貧從諸父三登學手抄經史百家讀之年十七為人師三十三始為進士四十一而宋亡築室簔荷山之陰筍坡之下授徒自業暇則率子弟灌蔬剃草講誦畦間暮則拾薪蘇以繼照其配日夜蠶績佐之以具婚嫁喪祭存老恤孤嘗得遺金直可二萬求主名還之年餘七十不肯乘車輿意所往即徒步百里齒髮不少衰端居竟日不苟言笑雖妻子未嘗見疾聲厲色惰容雖武夫暴卒卒然遇之莫不斂容敬禮其飭身修行必踐其跡安時順事一㑹于理卒之日逺者悲傷痛悼近者朝夕㑹哭如親父兄葬之日送者咸慟哭盡哀行道之人至不忍聞君子曰先生懷道秉德博問苦學不以貧賤易其樂不以靡薄遷其慮動靜有恆俯仰無愧生而人敬之死而人哀之非古所謂特立獨行者歟嗚呼賢哉臣竊維處士有諡其來逺矣自世祖皇帝有天下四十餘載以處士得諡及賜碑者蓋自先生始非皇上聖學日熙文德天覆岩穴草萊之士雖有仁智烏能被休光承浚澤若此哉以先生之行諡曰貞文實應諡法乃繫而銘之曽大父諱克已大父諱光朝父諱惟明世忠厚父以先生後伯氏惟聰娶雙井黃氏生三男梅十歲能屬文蚤世傒斯今應奉翰林文字同知制誥兼國史院編修官若讀書力養惟謹一女嫁陳用清孫男二汯滈女四長適楊湘次適陳閏生以端平乙未六月九日卒以至大已酉六月二十二日葬以明年十月十又六日墓在宅西南四里查山三世祖諱文莊兆之右文集二十卷藏于家銘曰於惟貞文茂懿深醇莫知其源孰知其津無迎無將囿物之常無喪無得命物之宅渾兮淵淵肅兮融融以是而始以是而終九族漸仁羣士仰德天子命之百世之式昌平縣新治記昌平在今為赤縣當行幸警蹕之道皇慶二年冬十月己卯詔徙治縣西南五里辛店以便吏民之供頓宰臣以前主簿程玉嘗有惠政于民民信愛之奏以為尹任其役玉至官與達嚕噶齊達罕主簿紐爾台郭勒巴延布哈尉塔布岱典史陳榮等議割祿入五月以倡於是前達嚕噶齊布斯必多羅岱等及縣之長老他郡縣之吏皆捐金來助又取物産雜植之𨽻官者售於民而利其直合得楮幣萬九千二百緡以延祐元年秋七月十二日建功以九月某日落成凡長吏之治胥史之署賔燕之次儲庋之藏庖飪之舍靡不周備而費一出於縣官又夾道列植榆栁北至關南達于都門綿亘九十餘里他政一如主簿時加勤恤焉天子以為能三年夏四月特賜衣一襲進階承務郎遣上都留守哈喇特穆爾度支監卿曼濟台等傳詔翰林命臣某曰女職太史氏其為文著之碑臣謹按昌平在漢西都屬上谷東都屬廣陽在晉屬燕國隋屬涿唐屬幽州之范陽郡其間或為郡或為縣廢置無恆而治亦屢遷今舊治則後唐所置名則石晉所復也自古天下不能常一茲縣扼雄關之隘據南北之限故其民善守而尚勤開國以來連山失其阻大河失其險際天極地莫不來臣上享其平下安其生而茲縣為赤縣蓋五十餘年矣其徙也非醜舊而圖新所以利吾民其著也非侈今而夸後所以勸其臣世之君子仕於窮荒僻壤猶曰吾受天子之命來為吏不敢以欺其民况在輦轂之下乎且孤城小邑之令猶不可以授非其人况在畿甸之內乎嗚呼今之令于茲者善已後之令于茲者朝廷將何以得夫賢乎賢者將何以副吾君乎唐有大臣曰狄梁公萬歲通天中由魏州刺史都督幽州昌平於幽州為屬縣縣人至今祠之夫近於民者宜莫如令古之令于茲者多矣不聞有所祀而梁公居官非久又非為令顧得民心如此豈不以其大忠也耶比有㫖復修梁公廟然則天子所以風厲天下者深矣豈唯昌平哉延祐三年六月丁亥奉勑謹記旃檀佛像記蓋聞道非有像作易者必擬諸形容法本皆空度世則暫資於色相謂如指空為鏡不若以鏡而喻空即樹占風將使識風而忘樹是以雙林付囑舍利以凡聖而遍分千輻經行足跡亘古今而常在非炫神通於幻境實開方便於迷津所謂由目以㑹心即心而印佛者也按大藏功德經佛升忉利天度夏三月為母摩耶說法爾時優填王常懷渴仰而不得見敕彼國內巧工造佛形像禮拜供養毗首羯磨天化為匠者即白王言但我工巧世中為上王即選擇香木肩自負荷持與天匠操斧斫木其聲上徹三十三天至佛㑹所以佛神力聲所及處衆生罪垢煩惱皆得消除又觀佛三昧經佛升忉利天既久優填王不勝慕戀鑄金為像聞佛當下以象載之仰候世尊猶如生佛乃遙見佛足步虛空蹈雙蓮花放大光明佛語像言女於來世大作佛事我滅度後我諸弟子付囑於女然則萬影沉江如如不異孤光透隙一一皆圎夫豈擇地而容蓋亦隨緣而應望梅林而止渴靡不同沾泛竹葉以言歸誰堪共載唯我聖天子道躋往聖慈等覺皇祝長樂之春秋恆依佛地企如來之歲月坐閲人天爰命集賢大學士李衎與昭文館大學士頭陀太宗師溥光大海雲寺住持長老某大慶夀寺住持長老智延大原教寺住持講主某大崇恩福元寺住持講主德謙大聖夀萬安寺住持都壇主德嚴大普慶寺住持講主某翻究毗尼經典討論瑞像源流乃有阿閣鵷鸞法筵龍象五千四十八卷歷劫藏心十方三世諸尊宿主摩頂莫不恪承淵㫖同述勝因曰釋迦如來净飯王之太子生於甲寅四月八日是為成周昭王二十四年既生七日佛母摩耶夫人往生忉利至昭王四十二年壬申太子十九棄位出家修道至周穆王三年癸未道成八年辛卯思報母恩遂升忉利天為母說法優填王欲見無從乃刻旃檀為像目犍連慮有缺謬躬攝三十二匠升天審諦三返乃得其真既成國王臣民奉之猶佛是年佛自忉利復下人間此像躬迎低頭問訊佛為摩頂授記我滅度千年之後女往震旦廣利人天由是像居西土一千二百八十五年龜茲六十八年凉州一十四年長安一十七年江南一百七十三年淮南三百六十七年復至江南二十一年汴京一百七十六年北至燕京居今聖安寺十二年又北至上京大儲慶寺二十年南還燕宫內殿居五十四年大元丁丑嵗三月燕宫火尚書省舒穆嚕公迎還聖安居五十九年而當世祖皇帝至元十二年乙亥遣大臣博囉等備法仗羽駕音伎四衆奉迎居於萬夀山仁智殿丁丑建大聖夀萬安寺二十六年己丑自仁智奉迎居於寺之後殿焉元貞元年乙未成宗皇帝親臨奉供大作佛事計自優填造像至今奉詔纂述之歲是為延祐三年丙辰二千三百有七年噫四大海中頓覺業風之息一彈指頃不知賢劫之過嘉與涵靈從茲安隱於是集賢大學士陳皓以述上聞有㫖授臣某俾為之記臣謹奉詔言曰粵自古初聖人教民報本返始而祭祀之禮居其一廟則木為之主饗則孫為之尸及其後也乃有像設焉而不知其所從始由斯觀之其原於梵俗也歟夫佛為世中尊又何俟於贊然欲知佛之為佛不當于其身而况於其似然苟不自其外而求之又將無所措其力是故佛雖多訓然往往自即其身以言蓋因以卜人心進退之兆若於其粗者猶惓惓不怠焉則其進也殆庶幾乎此佛之意也陛下考百王之度酌羣言之藴上以惇孝下以施仁蘄於厚天下者無所不用其極至於軌人於善足以輔吾政教之所不逮者亦以天下之心為心而從之而非若彼內祠祕祝者之為也夫以金石之悍堅猶未能必其可久今以一木之為而綿歷獨若此然則佛之自衛者固甚周而人之崇信之也抑豈一手足之功哉于以見人心之仁推諸四海而凖而性善之說果不誣矣嗟夫遡㳂二千年有竒至于陛下然後發德音紀鴻烈非緩也熙明之治至是而始隆雖典祀之外猶必以斯文文之也然則化之漸被者廣矣不其盛與記洛陽之伽藍筆多慙於董史頌西方之無量心共祝於堯年莫測真如徒欣聖際謹記應制詩贊題手卷六首滕王閣佩玉鳴鑾地滕王說幾秋人間空畫本檻外只江流共濟艱難業旁招俊乂儔太宗尤可念千古有瀛洲龍舟錦帆畫舸著聞在昔樂若可極得不償失臣作畫師磨鉛䑛筆願寫陶唐土階三尺金碧山水春堂宴賔圖青山偏宜春晝觀日射樓閣飛雲烟鷓鴣斑間鸚鵡緑黃金楣映白玊䦨髙堂四面山回抱把酒看山終不到嶄然屹立見全身堂上何如山上好衆人之樂為主人誰知主樂因嘉賔野花淡蕩天氣美一草一木皆精神小李將軍誇好手休道今人世無有他年人展此圖看小臣作詩同不朽蜻蜓蜻蜓飛欵欵萑葦舞僛僛欲泊未泊間漂搖故多疑甚欲呼與語小立休嫌疑枝葉元不動風波有定時莎雞蜥蜴羽短未堪振莎雞抱禾穗無旱不須雲蜥蜴自游戲萬國笙歌樂太平昆蟲草木咸生遂􅴄鼠食栗兔首麋耳飛翔以尾有體則鼠其名曰􅴄畫師何心以筆獻針小物陰類若人孔壬在室竊嚼在野攫拾遇物輒敗匪獨此栗昏夜橫逸白晝潛匿戒之戒之罔俾在側題何澄界畫三首姑蘇臺吳王大凱破越回西施飛上層層臺撞鍾樹羽臨四野重江疊巘烟霞開捐衰棄舊窮遊逸不信佳人解傾國春風楊柳鬭腰支秋水芙蓉比顔色珠歌翠舞儼成行鳳臛熊蹯安足嘗願天回光繼白日願地注海供玉觴君王宴樂無終極伍子昌言空切激焦勞嘗膽卧薪人辛苦安知在仇敵山自青青水自流君王日日臺上頭麋鹿未遊吳已沼西施還上五湖舟阿房宫智力有窮天不老秦帝山河迹如掃參差忽落畫圖間白髮朝臣驚欲倒咸陽初起阿房宫六籍已焚兵已鎔渭水函關萬年固終南泰華五雲中復閣重樓鬱相望翠户金鋪九天上上容萬人常有餘下建大旗知幾丈霞騫霧翼天日迷山童地赭民暌暌窮奢極麗猶未愜謂海可梁天可梯蓬萊何處樓船逺上蔡東門嘆黃犬六國池臺春草長千門歌舞斜陽轉遊觀未畢化埃塵宫樹凄凉野鹿馴至今世上丹青手留與千年作爭臣昆明池蒲萄蒟醬笻竹枝萬里來自西南夷瀾翻浪漭四十里上林更鑿西滇池牽牛左蹲右織女朝暮日月相吞吐魚龍萬變世莫聞曼延百尋人豈覩樓船笳鳴角抵張千官劒佩鳴鏘鏘身毒蕞爾猶阻絶四表何以昭天光君王好武古莫當海㝢如此仍開疆金堤楊栁秋風起落日輪臺遺恨長憶昔世祖規南國刳木為舟神莫測江漢功成指顧間中天垂裳開八極老臣撫卷重太息可惜畫工描不得臣待罪祕書日祕書監扎瑪里迪音出示中統年間習水戰船樣長尺有咫竟平江南一天下世祖規模宏逺矣因併記之右昭文館大學士中奉大夫何澄年九十所進畫卷澄之畫得自天性世祖時已有名被徴待詔掖垣至大初興聖宫成皇太后㫖總繪事遷太中大夫祕書監致仕今進此卷上大異之超賜官職詔臣某為之詩將藏之祕閣示天下後世工緻妙巧古人不得專美於前臣竊謂自古以翰墨見知當世不為無人澄獨以姑蘇臺阿房宫昆明池託物寓意其庶幾執藝以諫者歟臣既喜為之詩復識卷末以不朽云皇慶元年二月日具官臣某拜手稽首謹跋李秋谷畫像贊歷觀宰輔久無儒者潛龍羽翼公乃大雅帝曰舊學汝遂相豫真儒之效此其權輿熙運方開明良起喜如龍而雲如魚而水任以天下可謂大臣勞謙得士清靜寧民想其風采金玉圭璧賜之畫圖式是百辟豈惟丹青盛德形容尚友凌烟黃閣清風孝經直解序奉教撰孝者百行之源五常之本自天子至於庶人罔不由之以成德述之有經衍之有傳釋而通之有義疏至近代司馬文正公洎晦菴朱先生各明備其辭焉聖天子以孝治天下篤意是書表章尊顯圖鏤以行自家而國自國而天下將使家曽閔而人參騫德至盛也太子淑性天與懿學日新問安視膳之暇尤孳孳於此乃一日傳教示以錢氏直解俾某為之序謂欲傳之板本以廣斯文某承命伏讀義訓詳明質而不野坦然切近易知易行信可尚也太子不徒歷之於目抑必著之於心不惟善於其身又將推以教人詩云孝子不匱永錫爾類太子可謂能錫類者矣記曰孝者善繼人之志善述人之事太子可謂善繼述者矣某文墨雖荒敢弗敬承而為之序抑言近而㫖逺者善言也後之讀直解毋以淺近而忽之雪樓集卷九
