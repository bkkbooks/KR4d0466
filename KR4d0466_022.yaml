body:
  text: 雪樓集卷二十二元程文海撰碑銘洛西書院碑洛水出京兆讙舉山東流至熊耳禹導之又東至今河南永寕之長淵相傳即出書之地地居洛邑之西故又為洛西韓岳烏喙明月金門諸峯列其前嶕嶢鹿跡鳯翼諸峯擁其後國初賈尚書損之辛徴君愿元員外好問楊轉運奐陳㕘議賡兄弟姚少傅樞諸儒皆講學其間下邽庸齋薛先生𤣥至風教大行弦誦之聲交于州里孝友之行被乎芻牧諸老既謝薛公云沒學者倀倀莫知攸歸公之冡嗣翰林直學士友諒思纉前志式承遺則割嵗入之竒倣書院之制爰建義塾用廸教事乃經乃營甫渉寒暑上則先聖先師堂陛有崇象設有嚴下則師承有飬講肄有序學者彬彬粲然復興又購司馬氏獨樂園故阯創五賢堂以祀伊洛諸儒以廣教飬之所延祐元年春國子監以聞陟義塾為洛西書院五賢堂為伊洛精舍書院置山長一人領之秋九月以從集賢大學士陳顥之請詔翰林學士承㫖劉賡書其額以賜於是山川澄鮮日星浮動紳珮翔舞稚耋嗟嘆若神龜之文始出熊耳之源載滌若諸儒先復在而親炙之噫上之化下其易如此然自三代以來庠序學校之制不廢後世义推其意為之書院精舍教養之術備矣而學者闊踈聖人之道寖逺寖微何哉人情役於所利風俗變乎所尚有非聖人莫能制者皇上踐阼赫然發憤誕脩聖人之政廣厲學官之路將俾闕里之俗逹于海表矧河洛奥區乎薛氏之舉忠孝兼之矣初薛公以郡教授為撿察使督衛輝河南餉遷轉運使尋謝病講學洛西中統中王文統用事以平陽太原宣撫使召不起以河南提舉學校官印綬即家授之亦不拜著易中庸解皇極經世圖聖賢心學編諸書以終友諒居官㡬五十年所至興學崇教以致其治嘗請陞周程諸儒從祀孔子既建書院精舍又構禹廟長淵之上以箕子配薛氏之學可識已書院之成摭洪範語名其堂曰彛訓東西序四齋曰好徳遵道叙倫明義尊洛書所自出也嗚呼是五者聖人所以建皇極參天地立民命學於斯者可徒以决科射䇿為學哉友諒既侈上賜属刻辭于詞臣某謹作詩曰遵彼洛汭瞻言禹迹洋洋其淵其沚湜湜九源既滌九疇攸錫於皇時命作我民極惟極之建哲王所務惟建之艱惟斁之懼譬彼流水必東其注湮之汨之洪流四騖神禹不作仲尼素王轍環天下我心憂傷孟氏無言予墨予楊倬矣周程爛兮景光我皇聿興天地與侔時夏輅殷樂虞冕周有洛之西羣儒所游翼翼薛公其音孔休人逺言存誰纉誰嗣詞林之老天子之史爰抗儒宫于洛之里教之食之烝我髦士大臣上言天子命之其名孔嘉惟其稱之彼愚彼頑此砭訂之永恊于極神其聽之故翰林待制權君墓誌銘延祐二年九月十有九日甲子旦方㑹飲玉堂之署待制權君不至酒再行或馳報君已死葢未始聞其疾也衆驚且悼即罷酒赴弔則属纊未二十刻咸哭盡哀或留助喪事丙寅出殯郭東門外又咸送戊寅子翰子洙衰絰踵門泣且拜曰不幸先子棄諸孤有遺言我生六十有六年矣知我者莫若程先生我死必得先生文以葬今將以壬午忍死奉柩歸葬先塋敢以状請惟是藐諸孤暴罹大故荒惑迷亂先子言行未之能詳若夫大莭固公所知惟公念焉余哀其辭則敬諾按權氏太原舊族君諱秉忠字伯庸其先有諱平者宰潞之黎城卒于官葬縣北鳯皇山之陽子孫因家焉祖坦仕金為懐逺大將軍隰州刺史行黎城令國亂率其民柵山以守猶聘名儒楊先生以訓諸子日夜講誦不輟亂定乃還衆皆服之考從道深藏自好再世皆葬縣北之永泰里祖妣亷氏妣劉氏祔君㓜從真定李敬齋先生學工文辭不事産業至元十三年試諸郡儒生于真定餘五百人君中髙䓁例復其家明年山東東西道提刑按察使姜公彧察其行能用為掾歴户工二部東京遼陽二行省晝治牘夜讀書未嘗有毫髪過三十年調承事郎汴梁路封丘尹大徳四年遷同知鈞州事十年轉承務郎海陵尹治常居最海陵嵗饑出私粟以濟流民坌集授官舍以居至大三年就拜陕西諸道行御史䑓監察御史加承直郎所至拯寃滯詰貪墨吏民畏而愛之皇慶二年以平章政事李秦公之薦陞承徳郎授翰林待制兼國史院編脩官循恪易良人益尊其徳年勞應秩四品而君不自言余方薦為直學士而沒嗚呼君生後余一嵗耳竟去我而死乎其無與論徳考行者矣余嘗謂君性嗜酒非飬生之道然雖多不亂志癉惡非處下之宜然雖直不倨庶㡬古之君子已乎君娶張氏二子翰與洙也洙為國子生銘曰木嶄嶄兮厥草莽莽四序相禪兮忽消而已長人孔明兮君獨内朗人忌直兮君獨惡枉太行之陽兮黎之里君生出游兮歸以死余不知天之道兮或在其嗣河中郭氏新塋碑汾陽王自朔方提兵入翦畔臣其後以司空中書令領河中尹兼靈州大都督由是蒲為朔方行營蒲帥常兼朔方節度既又分置邠寕一鎮然朔方寓蒲如故王本華州鄭人蒲華相距數舍而近視蒲猶家鎮蒲亦最乆王八子諸孫六十餘其居蒲者雖世次不可知然地以人著若今郭村郭原小郭村之類及石幢所刻郭氏子孫名字則其支分𣲖别於蒲者廣昔唐有天下三百年其間名將相能以功名始終如王者有㡬吾意其子孫宜世世克昌而乍續乍絶者葢自上元以來奸權迭用治日恒少雖其君之世位亦不能自保其必傳况臣下乎雖如王之忠誠大節上通於天猶且急需慢棄㡬不免於讒口况後嗣乎吾又意其子孫韜光自照不溷於時雖聲之不延而實則茂矣嗚呼亦孰知吾猶及見於數百載之下乎使道旁旅次邂逅逢迎知為汾陽之𦙍猶將脩容歛衽而與之言况所識又其賢者乎吾於是家先塋之述葢有感矣其舊塋在今河中府城東三十里曰新兆村旁有古寺寺有廢石幢刻郭氏子孫名甚衆父老謂為郭氏墳寺墳有古栢五驗之其兆葢已九世近代多故其不能來𦵏而菆於郭南者又三世矣至中書右司員外郎思貞始别買地於城東文學村啓郭南菆塗奉髙曽祖考三世及考興元府君之柩於武昌而族𦵏焉殤女祔髙祖是為郭氏新塋去舊十二里地凡若干畆背負崇岡大阜環擁如屏是為古紫金之山面則中條來對自南而東連延五老諸峯髙下逄迎如有所衞其西南則黄河太華百里而近西北則馬首諸峯遥相頋挹若聚首焉葢葬師之不謀而地自吉豈非天祐忠良之家也哉右司之考曰復亨字彦通年六十有二妣姫氏繼徐氏年六十有三祖曰信妣杜氏年皆踰六十髙曽二代名氏皆逸彦通缺一見知為公輔器大加賞朂嘗為録事判官羣惡少年侮法售奸以為常彦通至復然彦通因以計痛䋲絶之政遂以成權臣誣害宰司没入其家彦通為之疏理有㫖蠲半自興元赴調京師為銓曹所抑彦通浩然便自闕下携三子縱觀江淮湘沔間没殯武昌歸葬于延祐元年十二月二十三日秦國公為文以祭亹亹不忘昔太白識汾陽於微時而汾陽不忘議者兩賢之然則自元禮林宗以來二姓世有夙契也異哉右司既以翰林侍講學士清河元君明善之銘志其考墓又徴文於廣平程某謂将表石新阡葢必嚴必慎孝子慈孫之心也然古人欲為不朽則必託之金石而其所以不朽往往出於金石之外其不可恃也如此然則脩吾之所能知者而已其不可知者固非吾之所能制也汾陽逺矣然喜聞而樂道其事者猶若宿昔此豈非脩吾所知之故哉右司端潔靖深加之好學敏劭事業功名方獵獵以起視汾陽葢將瞠若乎其後若乃先世松檟之所存山君川后當為之守識呵禁亦奚以刻畫文字為然余與右司相好因欲以其家之所修者告其子孫也乃不辭讓而仍之以詩曰虢仲虢叔王季之穆文王之卿上公之爵事由世遷受氏維郭大河之東地望攸属在漢有道薦紳之尊唐曰汾陽千載恒存允武允文澤流諸孫興元迤之嗣徳彌敦瞻彼蒲東新兆故刻石雖可隕名不可泐亦有喬林其樹維栢九世而更文學斯宅山冠水綬宛宛巍巍髙曽祖禰或啓或歸來于今阡式安以嬉清淑扶輿祥址慶基聿觀古源為陵為谷豈無能存匪帛伊竹咨爾山靈視兹宰木世萬子孫不疑何卜趙儀可墓誌銘進士科由隋迄宋凡七百年矣得士固多失人亦不少得者非善所試也失者獨以不能合於所試耳夫君子不以言取人七百年間豈無明君良臣而治效終爾者抑有由也今之科制則不然而塲屋廢乆曏者聞人老死且盡其能與者亦鮮矣余自弱冠聞江右諸儒先稱詞賦家必及趙儀可儀可家廬陵廬陵師友眎他郡為衆儀可又以材力浮湛激昻其間故所就異而馳聲蚤科廢益衍其力於經史百家之言為文盈編授徒恒滿席聞科舉令下猶攘臂盱衡不自謂其老也然終不自得以死死時年七十有七矣其先大宋人曽祖慶善祖鶚飛父惠有二子曰文儀可也曰宗強兄弟皆㓜負雋氣相為師友儀可三貢于鄉入太學為諸生國朝為東湖書院山長選授南雄郡文學宗強弱冠擢第以宋韶州仁化主薄兼尉客死延平不知其瘞後二十年儀可躬往物色得之以歸為同域異穴於母易氏之墓田期兄弟合葬焉延祐元年冬十二月葬宗強於右明年正月七日儀可亦卒其子將葬之於左遂來乞銘夫銘必功烈徳義焉若儀可殆可銘乎其配先胡後丁有九男子重厚平復初剛直潔深及五女子十二孫五曽孫宗強死時年二十實至元丙子十月二十三日無子以剛嗣銘曰扶垂白以逺尋手足之骴舍異室之糓而就同氣兹非悌歟銘其何愧故砲手軍捴管克哷君碑銘至大四年閠月二十有八日宣武將軍砲手軍捴管克哷君以疾卒于河南鳴臯鎮之正寝年五十五八月某日葬于鎮西北原延祐三年春三月嗣子穆延特穆爾以應奉翰林文字蒲道源所為状因翰林直學士薛君友諒請銘君諱實實岱蒙古人晚易名士希字及之大父錫喇濟蘇父雲都世為砲手軍千戸自太宗以來破金伐宋皆有功始屯聞喜之西薛荘後徙鳴臯家焉至元中命君世官將衆從丞相巴延南征以渡江功賜白金三百兩授武義將軍佩金符尋遷武徳將軍進本軍搃管天下既定兵革偃息乃即所屯建書院立社以教導民凡書院殿堂門廡齋序庖廪庋書之閣為屋五十楹請于有司置山長一人割田千畆以傋祭養事悉如制名曰伊川書院凡社壇壝之度牲殺之數升降薦獻之文不侈不儉以祈以報事悉如制名曰里社正喪祭之禮嚴長幼之節皆身率之禮讓漸興風俗浸羙矣大徳二年以足疾匄閒大肆于學手不釋卷與中書右丞陳君天祥翰林學士承㫖姚君燧盧君摯侍御史趙君簡諸老游名聲籍甚居十餘歳公卿交薦將起君翰林㑹卒君之南征也所至破軍殺將降城邑人爭取金帛婦女君圖書而已士之在俘者輙贖而歸之人既服其賢及閒居里有得巨黿于伊水之濵曰此濟源神周將軍也集巫覡鳴笳鼓迎而祠之畜之池中四方來祈禱者日以千數君取而烹之黿卒不能神人益畏君正直人有所訴不之邑而之君片言折之莫不感服有過惟恐君知之嗚呼若君者庶所謂古君子矣乎夫人塔塔氏呼圖克諾延之孫䝉古百戸薩喇之女子一即穆延特穆爾賢而有文藏書萬餘卷無不究覧君之卒築春露亭于墓側以致其時思買田百畆以供其嵗祀今嗣為千戸是將益昌其家女一托里塔納適䝉古副萬戸齊齊克圖孫男二女四穆延特穆爾娶鄭國忠宣公鄂囉齊之孫蒙古侍衛親軍副都指揮使拜珠之女再娶張氏君雖生貴族長戎馬而㢘敏好學有詩五百餘篇曰伊東拙藁藏于家自號曰西齋云銘曰惟天下之將治兮四海承風惟治之將隳兮家用弗從葢自古而然兮豈在今而不同相君子之賢知兮起于朔方被詩書以為衣兮襲仁義以為裳豈故俗之不足懐兮而吾儕之足希惟聖道之將明兮夫亦不知其所為劒差差而耀鋩兮雄千人于一夫何功之弗懋兮何謀之弗如頋獨好此窮固兮適遭時之謐寕既正直而無私兮又豈弟而亷清齊冨貴於浮雲兮庶吾道之足憑彼滛流之浩蕩兮渺四頋而靡極苟舍此以為防兮吾將安所兮休息士有所飬兮農有祈前有所承兮後有基嗟君子之不作兮尚千載而監兹楚清先生墓表延祐二年冬臨川婁泰初書來京師曰楚清先生以今年夏五月二日卒烏虖先生服仁履義冝享百齡乃七十又六而止耶先生臨川人龔莫婣也先生自莫來後于龔莫有二兄曰若曰雷復在宋皆以進士入官先生亦再舉于鄉廷對列名第六授隆興府觀察推官兩浙轉運司幹辦公事遷臨安府觀察判官改福建轉運司幹辦公事積階儒林郎洪杭事殷議幙轇轕先生於文法如素習决之沛然所事守帥非一皆驚服倚頼之譽以大振最後考亭朱浚尤親權臣聞而欲一識之先生不往左授閩幙歸而屏居山中與名軰相從講學求聖賢樂地如是十許年乃還名聞四方士大夫至臨川者必詣焉得其㸃墨隻字為喜好善疾惡然不形於言後進有可教無識不識皆誘掖奨飾不進不休家非饒財恒以周急為務自莫來時方幼獨與母居孽叔豪奪其貲先疇大削先生既貴或得其劵以告謂可不勞而復先生笑曰昔誠鬻之今可強取耶既而孽叔子不惠蚤死叔無後或勸先生并其業先生不可曰詎可使吾叔不祀卒取契家子繼之為之冠昏舉叔之業畀之俾共祭養余聞先生大節葢如此而先生未嘗自異力學至老不廢夜誦如為諸生時性剛直絶畦畛為文辭伸紙冩心造次皆本於理有集五十卷外集若干卷友人唐浚述之曰子雲有云楚兩龔之潔其清矣乎臨川龔孟䕫字龍友世濟其清人皆稱之曰楚清先生其曽大父誠之大父良英父方母汪先生初名揚復娶晁氏昭徳文元公之後克盡婦道先三十年卒女一嫁侯敬孫亦俱卒男曰自厚有文聲先二十年卒婦鄧氏有至行孫男文潜能世其學孫女徳巽徳静壻張觀朱夏曽孫女二先生既卒文潜以其年六月丁酉葬先生于臨川縣積善鄉西盈之原實汪夫人墓左遂以述來徴銘余甞學於臨川先生時在仕國及先生隠閭巷余間以歸客經從每見益親然終不得朝夕見今方引年意謂川觀岩居將得從先生遊而乃不然嗚呼悲哉銘曰前之清膏蘭自㓕後之清松菊惟恱于此歸全山榮水澈後有千年尚其來閱吳隠君墓誌銘余在臨川時有同舍生居金溪者曰吳氏兄弟三人伯諱徳鴻字儀可仲諱徳溥字時可季諱可孫字聖可皆甚賢其伯氏雖未識而相知深余自去臨川四十餘年夢寐未嘗不與吳氏相接大徳五年官武昌季氏没九年赴召京師仲氏没今也伯氏喪余復留滯禁林嗚呼筮仕以來家居者僅四五或半嵗或一嵗無過再嵗者使日得與吳氏相追逐其能㡬何况㑹不一二而别常八九者乎况相知數十載而猶未識者乎大徳五年至今十六載耳而喪其兄弟三人生不能盡其情死不能臨其穴語之塗人猶悲况所厚者乎然仲氏季氏之墓余皆銘之今復請銘其伯氏亦可少慰也夫吳氏家金溪吳塘里且十世矣家故饒財有贍恤之徳又多醇儒篤孝友之行故家政之脩咸稱呉氏而五福之備乃在儀可聖可在宋得進士第為新昌尉在國朝為建昌儒學教授最先卒時可僅補宋登仕郎卒差後而儀可明毛氏詩工文辭又從馮先生孝揚學而試輙不偶然能自樂雖家事壹不闗于心其始二弟治之二弟死子治之惟日事讀書談名理飲酒賦詩而已足不至城府者四十年無喜怒憂思無疾痛苛痒年八十一而終豈不得于彼乃得于此耶儀可性至孝至元中羣盜大入渾舍驚避母劉方病末疾君守不去哀懇得免人至今誦之惟儀可於人有君子之目於徳備五福之報斯亦難已仕不仕不足計獨與君相知数十嵗不一見而死為可悲耳祖諱堯仁父士亨配饒氏先卒子男三祥子茂子宏子女一適李人表祥子及李氏女亦先卒孫男二文孫程孫女五長適劉徳集次適余良琇次適余一龍餘幼曽孫女一卒以延祐二年十有一月辛亥葬卜明年九月某里之仙源其塋也銘曰洪範稱五福而不及貴豈貴可致而福不可備君獨得其所難人猶不能得其所易非天也耶非天也耶濮州臨清縣主簿武先生墓表至元二十有二年秋七月趙郡武威卿先生卒冬十月葬于平棘縣棘蒲郷北邢原之先塋配任氏祔君名震攸緒之冑世居太原崞隂大父濟安始來平棘父元母趙惟君一子㓜入小學獨不敖惰父母愛其勤而憂其勩夕輙休之則伺親寝酣蒙牖篝燈誦中程廼止長就學于真定李迂軒先生鄰有樞宻判官白文舉名士也聞君夜誦獨苦大加期異太尉史忠武公禮致于第俾為諸孫師至元七年詔試儒生中者復遂中髙第十一年又詔舉學官衆以應詔遂為州學敎授樞宻趙公微時讀書學中既貴買田畆千五百為祭養資君悉索賦入一新殿堂齋房大集諸生脩教事由是趙學興盛為河朔先二十一年調將仕佐郎濮州臨清縣主簿明年春至邑發其素脩一施於政寛而肅明而平不苟不迂不為淺功近利而民之歸愛萃矣上下虚心属目冀見真儒之用不幸秋七月以病卒于官方革賦詠自如又為子戢講孝經第十二章章徹而逝嗚呼不亦好學知命君子哉壽五十有七年居官凡五朔邑中吏民無不失聲太息鄉之長者悲㓜者慕學士大夫相顧而唏曰自今無所考徳問業者矣葢其禀厚質醇學奥而材逹沈黙敦簡喜愠㡬亡謙虚為常不以已長格物不忮不競與人周詳朋從折簡求益者無虚日答已則燬其簡䆳於經史誨人亹亹無勌其辨論如貫珠如霞舉如繭絲之繰如風舩順流如抽闗而擴武庫也為文輙棄其藁門人裒集為若干卷理覈意精若古人之言然葢其平生以勤自得以之立身身立以之事親親驩以之蒞民民愛而恒謙以自牧故物不忌而名彰又有古人之徳者耶卒後三十有二年是為延祐二禩門人史灼述其行事子戢以述來請表于幽阡戢之言曰先子幸而以學發身不幸不得施之於世衆咸傷之而况其子今兹之請期慰往而導來倘獲諾焉雖不幸猶幸也余曰諾太史公稱燕趙多悲歌忼慨之士然則其於仁義道徳之云葢齗齗也然秦焚書而漢興燕人韓嬰趙人食子公軰皆以儒術專門授徒數百近代廢興相尋趙魏齊魯之郊無立草而學士大夫往往有以自衛卒存其存子貢所謂未墜於地不其然歟雖然若武先生者亦未可數得也配任氏先卒再娶于王四子男曰戡終平江廵捕官曰戢今為中書掾女壻曰程世英為晉邸侍官曰魏遵為士戢為宰属有清匂聲退食杜門惟以奉母教子為急先務親將賴以顕傳有之幸哉有子如此則謂之曰子姑自愛吾為子銘銘曰曲沃武公爰始舉晉厥祚曷延唐叔之𦙍六裂三峙迄為家人沒沒千載奮焉蜺伸亦粤安平衆慶我戚韜光襲靈吸錬泉石終以表世特立獨行代有子孫載其休聲我觀威卿愔愔大雅以道殉身不以用舍矧覺後覺聿若亨貞我以吾義彼以其名緇帷之林豈無尸祝亦有桐鄉在彼清澳邢原既長𤣥堂之方嗟爾子孫不匱不忘僉廣西提刑按察司事胡公墓碣有元僉廣西海北道提刑按察司事胡公卒之十年子脩已䓁以容州判官陳偉状來請銘公名夢魁字景明澗泉朋友之所尚也建昌新城人幼已頴異父師不煩未冠以明經貢于鄉郡守面試以文頃刻而成守大驚賞既長復為首薦遂登進士第調澧州户曹改丹徒尉累遷浙西制置司㕘議官歸國朝奉母還里江西宣慰使檄攝本郡判官者二年旅覲得㫖予秩方俟命適余將㫖旁求遂薦于上擢僉廣西憲事嶺海吏治不律公所至發擿蕩滌之聞驚見懾同列亦為悚海南宣慰使最貪毒皆不敢問公條其宿惡劾罷之衆大驩快居四年所決黜甚衆民為建祠刻歌謡山谷間譽流中䑓㑹更憲號公亦乆瘴癘地倦且病而歸矣自是杜門却掃甫及挂冠即致其事公之初釋褐也包文肅公勉之曰子少年入仕所至叵量然自大者人小之自卑者人尊之公曰謹受教故平生謙謹委曲與人語唯恐傷之性強記自少至老諸書恒在口言論風㫖恒如布衣時服用稱是不識者不知為貴人所守凝一故蒞官行法不吐不茹風績偉然惜其用之不究也予雖同里閈而南北驅馳相從之日葢寡然每一挹之郁乎其容之温粹乎其論之篤粲然相與之情之文也今不可作矣悲夫公生於陳從母戴夫人愛而子之胡陳固同姓也戴夫人嚴甚内政斬斬家雖豐以古法束公於學衣不得兼帛食不得兼肉故早有成公又守其訓終身故自奉甚約曽祖儼祖孔昭父泰定公凡三合姓吴氏趙氏樊氏子十一人男克己先沒脩己正己進義副尉湖南道宣慰司照磨成已女婿張蜚英呂元嘉三十九代天師張嗣成樊溥孫承祀郎郊祀署令程大本曽宗垕譚括以大徳十一年六月二十三日暴病卒年七十四以某年月日葬公於南城縣太平鄉唱歌嶺之原所為詩文曰偶然集銘曰山才之芚宰如之新泉澗之奫淪曠然而望如有人嗚呼生者疇親故常州路儒學教授袁君墓誌銘有溈之後至陳轅濤塗别姓為袁氏盛于漢演迤于晉宋隋唐之間宋祥符慶歴中有以世科雄文起豫章西山者是為豐城蒐湖袁氏之祖豐城今為富州云至元十三年余自盱入朝道蒐湖識袁君則成廣面大耳方瞳長爪言論忼慨竒偉人也後十年余以使事過豫章㑹君于校官及余廉問湖北則知君嘗仕漢鄂而分教浙西矣自是不復相聞今上即位召赴闕始識其子中立則言君已没矣又五年夏余謁去將南歸中立乃以熊君朋來所為状請銘君諱斗楠則成其字也曽祖諱晟祖諱植宋廸功郎梧州教授考諱濟宋承信郎廣州監稅君㓜從世父徳慶太守漸學弱冠為徐給事鹿卿所知延置賔舘陳工部杰長君九嵗耳明於易同學于郡之東湖書院遂從受業焉聞閩人劉升伯尤擅其學又往從之盡得其道㑹徳慶君調髙要丞携與俱峒獠跳梁丞當捕君出竒計佐之禽其酋太守林億上功補進義校尉東南十三副將聞母章氏喪而還服除復講易東湖徳慶君之子灝頥竟用其學取髙第而君試輙不偶繼丁父艱曽㕘政淵子雷尚書宜中交薦其才未及用而天下為元至元十七年江西始建儒學提舉司首辟為邑教諭改撫州臨汝書院山長遷興國大治教諭郡守史棣甚尊禮之言於伯兄湖廣行省平章政事格用為鄂州儒學正明年攝漢陽府敎授明年詔遣裴侍御留左司銓選廣海官以為静江路教授固辭明年調壽昌南湖書院山長元貞元年陞常州路儒學教授所至新黌舍闢土田嚴敎養士論恱服君既䆳於學尤長於醫著書立言人以為訓大徳八年冬十有一月甲子以疾終于家年七十八娶萬氏繼王氏俱先卒子男一人中立也萬氏出以髙材偉識克世其業居京師二十餘年名聲籍甚初授澧州醫學教授遷龍興並不赴孫男二長曰必里克台年十八為成宗宿衛士今始調將仕郎耒陽州判官次曰裕勒通曽孫男二曰諾海曰布哈君所著曰自家意思者三十卷傷寒纂要百二十卷藏于家實以卒之某年與萬氏合葬里之胡家墩惟余與君生同郡而不相識既識而君已老不㡬見而君遂没能無情乎余幸以衰疾得與君之子相周旋猶見君也嗟前脩之淪謝慨後來之悠邈乃為之銘銘曰藹洋洋豐之旁播之勤耜又良時靡常道甚臧位弗充壽則長嗟伊人逝茫茫前之嗇後之慶王氏阡表將貽父母令名必果又曰幸哉有子如此余每誦之未嘗不喟然也夫脩身慎行恐辱其先此固人所當勉者庸知亦為子孫地乎人自非喪心失智孰不欲其子孫之興及考論其平生則或馮時逞私雖旦暮不計何暇身後之慮哉是故古之君子寕窮毋逹寕嗇毋豐葢其志慮甚逺也胙城王興祖之曽大父克温金季嘗佐輝州忠於國而惠於民民至今誦之余識興祖乆文雅粹温知其漱六藝之芳潤皭然逄掖中今見世系則知家本河朔華腴世故亡其譜牒其來胙城斷自曽大母申氏始髙祖曰魏金時進士寳豐令曽大父佐輝州值兵疫民不聊生廼出私財為粥為藥以拯餓病生者甚衆衆既懐惠承以捍城竟握節以死時年四十有二大父曰文立念其父因事死兵遂不仕以明經教授鄉里父澍有雋材弱冠貫穿經史於書無所不讀而以聖賢為歸文無不習而以明理為主不幸二十有二年得疾卒没之時抱興祖着膝前告母某氏及妻某氏曰人不患貧賤患無賢子孫此子異時庶㡬乎惟二母之望言終而没興祖時雖幼已知其意之悲即自奮稍長捐其先疇為資逺求師友力學成身䇿名庠序登天官入粉省蔚焉羣士之英二母華髪朱顔坐受劬劳之報志甚樂也然則澍雖不幸幸哉有子如此而興祖猶以祖父居約而操狹時左而願乖為子孫者位卑而名弗彰志勤而道苦逺無以貽親名是懼而謀於余余曰充子之心足以貽其先矣而何位卑之足計况一時之赫赫千載之寂寂乎子姑安之其慎母怠興祖有男若干人其先墓在某所銘曰善可為乎有貧且夭者矣不可為乎有位髙而金不少者矣觀輝州之忠惠其子孫之學問樹立則可為不可為瞭然矣曰然弗彰則亦既有此表矣艾君哲阡表世之人於儒也或听听焉者何曰謂其無所可用也然則君君臣臣父父子子禮樂刑政以維之養生送死以厚之此二帝三王之道周公孔子之敎也而能誦其言道其事者誰耶曰儒也然則今之治天下未始不守二帝三王周公孔子之法縱或小戾亦非故倍之也今而謂誦其言道其事者為無所可用耶曰惟誦之道之而鄙之也嗟乎儒乎夫豈其然乎臨川之艾臨川之儒族也曰庭梧者亦儒也其言曰庭梧之曽大父棄疾年九十而不衰觀於天而知宋之將亡大父居仁有子思誠思明思明庭梧之父也族之人既皆儒誠亦然父獨否勞以致養衆訝其獨勞祖曰我非不之恤也顧人也皆儒殆將不保異時衆頼其勞耳其後宋果亡豪奪蜂起有家者大抵皆摧敗不支而儒為甚父所存護者獨全人始謂大父知言父生平不事作業獨好為人排難解紛拉強翼弱其慷慨赴義有古俠者風自州長吏以下皆諉以事嘗佐軍擒賊有功不居操心甚恪故為父老禱榮必應有志不遂者歸之輙得故咸尊嚮之没又甚悲思之今者庭梧匂文表其竁余既許諾則謂之曰若祖所謂儒特一時一族者耳且責功利於儒或儒以功利為事是皆道之不幸而世亦由以大不幸者是故君子體仁而行義苟用焉而體不具謂之支離之民子而為儒亦克慎諸且子非儒父將曷書庭梧謝而畢其言曰艾本新定今臨川者十三世楊氏母也植實禮頴四弟也植從黄冠師以夢也大徳十年十一月二十六父卒日也其明年十月庚寅窆也某山某原墓也余表而又誄之傋也曰考終卜之身逢吉卜之後人山木芚芚雪樓集卷二十二
