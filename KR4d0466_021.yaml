body:
  text: 雪樓集卷二十一元程文海撰碑銘資德大夫湖廣等處行中書省右丞燕公神道碑銘公諱公楠字國材姓燕氏其先自幽薊徙青徙曹至宋禮部侍郎龍圖閣學士贈太尉肅居汴之考城太尉生虞部郎中處厚虞部之孫玫隨髙宗南遷居匡廬之下其曽孫森以學行為朱文公所知有子曰燮通判永州永州生嶽州榷茶分司堂配雷氏夢五色巨翼入幃生公十嵗能屬文居父喪廬墓三年再與計偕不第後以連帥辟五遷至贛州通判至元十三年皇有江南帥府授同知本州事明年下廣南有功授同知吉州路總管府事二十二年夏召至上都奏對稱㫖賜名賽音曩嘉岱命參大政辭乞補外僉江浙行中書省事俄移江淮置尚書省復僉江淮行尚書省事在江浙時嘗請置兩淮屯田二十五年用前請以為行大司農領八道勸農營田司按行郡縣興利舉弊劾江西營田使沙布迪音貪橫罷之又明年拜江淮行中書省參知政事時僧格新敗螙政未去民不堪命赴闕極陳請更張以固國本上恱㑹欲易政府大臣以問公公薦巴延特爾格布呼密舍哩克哷濟蘇史弼徐琰趙琪陳天祥等十餘人又問孰可為首相對曰天下人望所屬莫若安圖問其次曰巴延可又問其次曰旺扎勒可明日拜旺扎勒為丞相以公及布呼密為平章政事公固辭改江浙行省參知政事賜弓刀及衛士十人三十年復為大司農得乾沒公私田為頃六萬九千八百六十二嵗出粟為斛十五萬一千一百有竒楮幣為貫二千六百帛為匹千五百麻絲為斤二千七百元貞元年進河南行省右丞首正鹽法大德三年遷湖廣五年夏徴入朝明年正月四日薨于京師傳舍年六十二𠡠中書致祭有司具儀衛遣官乘馹護喪南歸某月某日祔葬江州德安縣烏石山先塋延祐改元夏子琦以萍鄉知州秩滿赴調京師以狀來請曰不幸先公棄諸孤十有三年矣而神道之文未之有也知先公莫若先生敢請唯公以通材贍智識時審變簡知世祖起自羈旅致位疑丞雖久寄藩維無嵗不召而公於當世之務奮然以為己任大者陛陳小者驛聞未嘗不稱善可謂千載一時者矣最公前後條上時政凡百數十事在至元間多言屯田鹽法賦役便宜往往著為律令在元貞以後皆立國之規樹化之本當時雖不盡用今多踵而行之若公沮桑哥欲罷廉訪司之謀免崔中丞於譴料劉深征西南夷必挑變取敗深竟誅死及語平章劉國傑必先積糧思播順元然後進兵不從卒殘湖南北數千萬轉餉之民倭人入市慶元有司不能用公前後待之之道而利其貨寶劫之以兵反被殺略燒焚之禍沅州唐運判豪橫奪民田武昌縣尹劉權殺主簿誣繫其妻子悉正其罪淮東西飢秦賑粟三十五萬斛湖南北飢亦然且先賑而後聞然皆人所易能至於世祖數欲置公左右輒以疏逺辭一薦完澤天下享和平清靜之樂餘十五年此則人之所難也公每謂余曰可與慷慨論天下事惟君與僕耳然余固陋退怯無毫髮補益而叨祿竊位遂四十年今又銘公墓道略不辭讓雖曰知己獨不愧於公乎公娶某氏子六璋某路總管府判官某龍興路新建縣尹琦新撫州路總管府判官某某某孫男女若干人有五峯集十五卷藏于家銘曰召公翼周厥土惟燕運邁代徂氏族以綿維沂暨汴太尉攸經四世而南匡廬載寧人歌舜風家秉周禮百五十祀而公以起惟帝世祖有此萬國孰土爾疆而逖爾德惟公之來允國之材惟公之思允國之基帝曰弼余惟公正直公曰臣愚願守方伯入二南省再宅大農人誦公賢孰知公功孰相孰卿惟公明之孰賦孰役惟公平之公胡不留公胡遽歸生守外藩沒寄京師峩峩匡廬下有彭蠡彭蠡茫茫公在蒿里念公平生無復晤語匪惟公銘思我世祖故河東山西道宣慰副使吳君墓碑大同吳侯卒之明年昭文館大學士雪菴大宗師來謂余曰伐木廢闕朋友道喪久矣吾雖學隱枯禪迹寄浮雲而於綱常之懿弗敢墜也故人吳侯尚德好義奄于西土今不幸死矣吾痛之深念所以報既往貽方來者未之有得也庶幾墓石之有刻乎敢介其孤以請余嘗讀集賢大學士郭君松年所撰五福堂記述其鄉人號侯曰五福翁而昭文為扁其堂及觀延安尹單師中所賦飢烏謡翰林集賢諸君所為歌詩美侯賑荒之事知侯長者重以昭文之信義誠足以激頽俗振靡行乃不讓而載之辭按侯名誠字某世為湟夏大姓父德融善煆有巧思憲宗時用為諸路銀匠提舉中統𥘉世祖召治器尚方復其家先是嵗丁巳侯被㫖造征南弩於太原起家為太原路逺倉糧提舉監支納至元七年夏大司徒阿爾尼格言于昭睿順聖皇后㑹建鎮國仁王寺授諸物庫提領轉大都路諸物庫使録建寺勞升同知大都人匠總管府事遷奉訓大夫西京路總管府治中改泉府少卿進朝列大夫河東山西道宣慰副使未幾引年罷事婆娑邑里延祐元年八月八日己丑卒年八十六越五日癸巳葬大同縣孫賢堡西南原之先塋送者踰萬人謙抑和厚不事表暴居鄉稱其孝友在官號為亷慎而未嘗以為能尤善理財家纍千金然一用以為施與每嵗豐儲粟數千斛飢則不易價而散之其窮民之無告者輒以與之昭文建大同寺佛殿資之若干緡臨終猶以二萬五千緡分貧疾餓者其餘釋老之施不可勝紀而未嘗以為德構堂宅西北隅以奉諸佛莊嚴妙麗藻鏤飛動旁庋華嚴法華報恩金光明心地觀五大部經朝夕朔望諷誦膜拜如空山老釋而未嘗以為善懸車告老日與髙人逹士或焚香瀹茗或烹羊􅀈酒談宴終日而未嘗以為逹年八十餘聰明康強如五六十者嵗時伏臘斑衣翠袂奉觴上壽充庭溢目里閭之所歎羡四方之所誦說而未嘗以為為善之報嗚呼豈非所謂長者耶觀世之人廪升斗之粟懷數金之資即慢言驁色髙視闊步淫酗放蕩如莫加於己者視此可不少愧矣乎豫於侯誠有感矣侯先娶孫氏生子三男曰仲傑景運倉使曰仲英女嫁李深再娶曹氏生子四男曰仲仁仲義仲禮女嫁毛文舉他姫子一仲實孫男十五人仲傑之子四端濟布伯竒特穆爾博諾仲英之子一善孫仲仁之子一諾爾仲義之子三三寶努僧家努慶孫仲禮之子三壽孫添孫祐孫仲實之子三定孫買孫喜孫曽孫男一重孫端濟布子也侯同母弟三人曰用武略將軍大寧路川州知州曰貴曰寶忠翊校尉鞏昌路便宜總帥府同知隴州事用有四子男二曰竒爾台布哈錫喇布哈女二貴有二子曰仲智仲信孫男曰沙卜珠女一寶有一子曰伯竒特穆爾孫男二巴勒桑桑齊余叙侯之子孫遂及其弟者所以廣孝悌昭忠厚也其亦侯之志與銘曰唯天生物浩浩無涯或衰而盛或盛而衰孰謂無涯其實易知盛罔不厚衰罔不虧觀侯之身其先可識觀侯之後唯侯之積後方無窮理亦不息欲永弗替莫若為德罔浚弗深罔固弗殖於千百世監于兹石奉聖州法雲寺柔和尚塔銘佛法之行其來逺矣至皇元而益盛山林空寂之士一旦乘時際運左右人主傾動王侯奔走天下生被顯寵沒享榮名者不知其幾𢎞教通理大師則不然淵然其若虛退然其若藏蕭條靜深無所願乎其外至於誘引慈濟則孳孳搰搰如抱漏甕沃焦釡得其法者莫不飽滿慰喜若涉萬里而還其家師之道其不可及矣乎故師之生也七歲事永安寺廣行大師能默誦金剛楞嚴諸經二十悟華嚴奧㫖二十八受法廣嚴寺傳戒大師乃去滋味絶華好日課金光明經一部禮佛百拜深惟靜念孤征獨詣道益閎以肆憲宗聞其名號曰𢎞教通理大師命主清凉大㑹於臺山釋教都總統寶集壇主秀公慕其德聘攝華嚴講席於京師又傳菩薩三聚净戒于佛子山及蔚羅黃樓諸剎自是日與所度弟子定慧和純順遇等七人嗣法弟子扶宗𢎞教大師行育等二十餘人講演祕乘敷析本統昭揭天下俾有知覺皆造佛地歷四十年弗懈益勤爾後若金河之英樓臺之清五華之聰咸化之明黃梅之剖開宿昱義溫朗顯德之徒皆能追蹤先進騰英海內為一時龍象則師之不可及可知已師嘗聞𢎞法寺大藏經板之闕勒而補之極挍讎之善憫永安寺之廢撤而新之窮土木之麗病德興河南二橋之圯更而甃之盡柱石之固且師之於身也疏食飲水而飯僧萬餘收聲滅視而問法千數則師之不可及又可知已嗚呼其人不可作矣夫師諱善柔董姓德興之永興人父諱育母房氏皆好善師歷住持奉聖州水西法雲二寺以至元六年正月三日化于法雲之北堂壽七十有二僧臘三十有八塔在寺傍後四十七年定慧請載其行因鐫之兹碑銘曰人皆有有不能無有人皆無無不能有無我思柔公其道惟一所觸皆空空罔不實寒泉在沼明月在天寒泉照月月照寒泉又如明鏡物來鑑之妍者誰妍媸者誰媸惟師之道亦復如是惟師之志普度一切嗚呼柔公廓落洪融生非其始死豈其終其徒孔多其道孔赫師如可作監此𤣥石廖隱君墓志銘臨江廖氏自五季之亂有諱凝者仕周為連州刺史馬氏據湖南棄官隱衡山復徙臨江新喻之黃原其曽孫克順仕宋為殿中丞贈虞部郎中郎中生禮部侍郎贈工部尚書鼎臣尚書生大理寺丞詢大理第四子曰謙始居今邑之槐江先是一日至江上樂其風土折槐一枝倒植其地曰後三年我當復至槐若生吾必家焉已而果生遂徙居之故號其里曰槐江其九世孫諱應瑞字祥國是為隱君君始冠産紫芝三莖于庭其僮僕不之識也掇而去之輒復生其父以為祥乃以命名君長身美鬚髯善辭令見者皆樂與交少從胡觀道丁守亷受戴氏禮寒暑不釋卷崇孝敬敦信義慮必周乎物動必由乎禮如其義委之千金不愛焉非其人一言一笑不可得歲積粟數萬斛不以豐凶二其價不以出入易其量事上遇下必主於誠訓敕子弟必本於學故躒患難而不跲處逸樂而不渝孝養三十餘年無違志人皆謂君得施其學於政詎可量哉君中歲以來益放情丘壑抗亭纍榭蒔花藝竹窅然冥然若無與於世者元貞三年正月二日竟無疾而卒年五十有五葬里之銀城山至大三年十月三日改兆袁州宜春縣溫湯之原延祐二年二月其子瓉來京師介其里人歐陽應丙乞銘君之曽大父諱嗣冨大父諱柟事荆湖諸連帥有聲父伯雲長沙趙葵鎮淮右辟安陸尉君之配鍾氏繼張氏皆有賢行子男六長璵播州路平溪上塘長官次璜太平路萬成州判官次琪兩浙錢清場鹽司管勾次瓉次珙播州儒學正次震為族人後女一適周㳂孫男四志宏志一道宏鳯孫女五曽孫男一孟孫女一嗟夫以君之才之學何施不可而以隱淪終然年不滿六十及見諸子皆駸駸宦途諸孫曽皆向學夫焉有所憾哉銘曰孰不為學兮學之豐孰不為德兮德之隆不逺其施兮誰所窮朂爾後兮休罔終諸路頭陀教門都提㸃誠公塔銘頭陀為學佛者衆行之本自迎葉啓教彌勒受託得其道必離貪逺癡少欲知足守十二行錬磨三境精進堅固卓然出於世者故曰若有苦行人我法即存若無我法即不存然行愈堅而傳愈寡矣逮于我朝乃有廣化誠公懷貞抱朴髫齔慕道不傷生不茹葷年十四從清凉寺頭陀師翟公受五戒六齊之法為在家弟子十六父母命之娶不娶誘之以計不變詘之以威又不變從而逃之外家父追及之又逃之公林栖禪院從提㸃塵公剪髮出家又追及之終不變十九入京祀七代宗師受大戒從遷曲河院宋師沒始主塵公之常樂院至元十四年為大都路禪録二十四年主九代宗師之清安寺明年得隙地都之靈椿里構蘭若曰廣化而師之行益固道益髙十一代宗師授以金字戒本大德元年夏天子降璽書賜號靜照妙行大禪師諸路頭陀教門都提㸃師自授道至入滅四十九年弊衣蔬食受經誦戒持諸部咒仡仡朝夕未嘗以寒暑廢於其教可謂無愧矣若乃神詭變幻至人所不道然史氏稱澄什之流多驚耳悸目之事載而不廢豈無取焉若師平居晝之所止常有異氣入室結如善財像夜之所息則有白光洞胸經時不散嘗有羣雀集項如立朽株都人鄒氏女纍年為魑魅所憑以念珠拂之立止十代宗師遣其徒李純輩四人之江南踰年不返師一日坐見李至因問其介及宗教事有頃李果至又一日見許善友者從保定來言寂照師沒已而許果來若此甚衆嘗有盜入室戒勿捕或橫逆相加置弗校非其道圎滿清淨真實無上者歟大德九年秋九月十五日手書發菩提心論金字戒本授弟子法雲付以宗門事曰吾將逝矣越三日召雲䒭侍焚香易服口誦如來者三右脅纍足而化壽六十五茶毗得五色舍利三十有二將封平章政事通政院使多年尚書右丞同知太常禮儀院事達音達實奉皇太子教塔于清安寺旁延祐二年夏四月昭文館大學士雪菴大宗師介其徒法雲請銘謹按師姓楊氏縉山人諱志誠初從七代宗師請名問何志曰誠而已遂以命之自號寂菴父諱林以勇材仕金守居庸關太祖南伐以其衆降命為都元帥母房氏生子二師為長師既為浮屠氏弟子五人法雲法聰法麟法性法智雲纍被錫命為大都路頭陀教禪録今住持清安云銘曰我聞頭陀衆行之首或云杜多華言抖擻何以衣之弊袖糞掃何以飫之羮藜飯糗塜間樹下豫戶豫牖行之孔艱學之彌少於粲靜照舊自童幼超陵真覺擺落塵垢動如神行止若木朽瞻迦葉前忽彌勒後精進勇猛具足成就如何長往如夜弗晝師行罔加師德罔究非死非生與天地久故平陽路提舉學校官陳先生墓碑近代名臣之後有世秉純白恪勤先訓綿數百􅑤而弗墜者惟河東陳氏乎陳氏自宋太常少卿纍贈金紫光祿大夫刑部尚書太子太保諱希亮起巴蜀以忠正剛直䇿大名嘉祐中七世至平陽提學公不少貶方是時中原袵兵且百餘嵗師道久廢我元建國覃懷許文正公衡進而師於上保定劉徴君因退而師於下名賢遺老並列周行而公亦起為河東儒師學者始有所向方矣公諱庾字子京其先眉之青神人自太保居洛太保之孫慈州士曹揮遷臨晉士曹之孫少中大夫國子監丞克基復徙猗頓公官平陽又家焉遂為河東人曽祖諱灝贈儒林郎祖即克基考諱仲謙昭勇大將軍三白規措使驍騎尉潁川郡伯公少與趙定劉繪張澄同學號為四秀又與兄河東兩路宣慰司參議賡弟東平勸農使膺齊名號為三鳯隨親宦青州崇慶壬申四方兵起携家還猗頓河東破乃西涉河客華隂二載河東平出關居洛西十餘嵗貞祐丙子兵大入轉徙無常興定庚辰隱盧氏山中元光正大再與貢再試春官不利去省親于陕丁父艱九移解梁復有母之憂服除辟聘交至乃應平陽髙雄飛之招署郡教授日與髙第弟子寧源李兟之徒講習問辨來學日衆㑹中書令耶律鑄奏置經籍所平陽命公校讎領所事世祖徴至六盤山與語大恱中統初以宣撫張德輝薦授平陽路提舉學校官進德義樹教化勉學戒惰風俗為之一變明年年六十八卒嗚乎惟公之學沉潜貫穿先行後言其事親也旦暮必盛服與兄弟婦姒序拜堂下問起居受訓敕然後退居洛西日每佳辰令節具琴尊約親友奉昭勇公升籃輿登女几山歷白馬烏喙諸峯上龍門臨八節灘徘徊嵩少訪裴司空邵先生遺迹然後歸及遭亂離父母繼沒猶執喪盡禮至兵冦相戒無犯其境其與人交必盡其道陵川劉昻霄太原元好問河中李獻卿洛陽李微奉天楊奐虞鄉麻革濟南杜仁傑曹南商挺諸賢咸相友善而仁傑豪宕滑稽善罵獨與公莫逆每謁升堂拜母或揖丘嫂索酒與客飲終始無戲言吏部尚書賈損之嘗稱為端雅君子早居汴翰林學士趙秉文楊雲翼參知政事楊慥監察御史雷淵劉祖謙爭相薦引莫能屈太原李汾者負材使氣一日㑹相國寺語侵公公正色曰漢有董賈唐有韓栁宋有歐蘇皆能上為國家重下為儒林表我輩幸遭盛明不能以道義相尚追蹤前輩徒以文墨小技陵人將安用之李沮而退坐客大服故其教人也一本諸道德仁義或問政曰以禮曰何謂禮曰臨事以敬律身以義用人惟賢養民惟惠體風俗而施教察過失而立防行之以寬柔簡易之道輔之以中正裁制之宜謹之以進退賞罰之節故曰有禮政事得其施無禮政事失其施也或問政之大者曰政莫大於守法愛民任亷去姦曰刑可用乎曰懇懇用刑不如行恩孶孳求姦未若禮賢且民不見德惟刑是聞公之政殆矣或問寡過曰行不歸義皆過也反求諸義其庶乎問寡欲曰無過則欲自寡臨終手書為學之要凡九篇以遺子孫公嘗有馬病腰醫小愈或欲售之公不肯曰安用誤人為後鄉里見人憸薄輒曰君是不鬻馬陳先生耶嘗暮歸得金叉玉璫道旁求主名三日不得潜瘞其所過樂安誤碎逆旅主人器償不受密緘白金卧所而去及還主人曰是封銀償我者鄰里傳聞聚觀歎息平居見貧乏不能自存孤孑不能昏嫁者必資給之一日語兄賡曰吾聞財多害身今喪亂若此而吾廪有餘粟藏有餘布不散不止與為他人守孰若分諸鄰里鄉黨乎兄大喜立散之公之制行又如此人皆謂有太保之風信夫嗚呼豈性當世之師百世之師也其所著書有經史要論三十卷三代治本五卷唐編年二十卷淡軒文集三十卷方為春秋解未成㑹卒娶王氏某州節度副使棟之女再娶楊氏盧氏令起之妹子男二元義解鹽司判官元忠以學行聞孫男二造早世觀今翰林修撰同知制誥兼國史院編修官為學有家法女一適麻懷祖曽孫男二仁壽同祖仁壽為參議後女一公以中統二年秋八月六日卒以至元二十有五年秋七月二十有五日歸葬臨晉北原疑山先塋以楊夫人祔延祐二年春二月觀以豫相知翰林久請文刻墓銘曰陳基姚虞爰啓于眉太保振蹟乃𦙍邦畿擁旄秉鈞世濟弗隳聨輝竹帛堅貞並持藹藹平陽古學是師剛簡易直孝友具宜河水之東洛水之西餘風可想遺教足稽懷哉諸老邈矣當時五十五年追載此碑孝孫之思邦人之貽故河東兩路宣慰司參議陳公墓碑參議陳公諱賡字子揚退居之十年至元十一年正月六日卒年八十五後十有五年秋七月二十有五日葬河中府疑山先塋以夫人張氏祔延祐二年夏從孫翰林修撰觀請為墓道文謹次其槩如左公之先唐廣明中有諱瓊者避黃巢亂自京兆萬年舉家入蜀居眉青神四傳至宋太常少卿贈太子太保希亮與從子太子中允庸職方貟外郎知蜀州諭同登天聖五年進士第邑令張逸表其閭曰三俊世號三俊陳氏太保遷洛又四傳至與義遂參大政為渡江名臣太保長嫡曰京東轉運使忱京東生慈州士曹揮居臨晉慈州生儒林郎灝儒林生金國子監丞克基居猗頓監丞生耀州三白渠規措使潁川郡伯仲謙潁川之子五人公為長與長弟平陽提舉庾季弟東平勸農使膺齊名太原元好問號為三鳯故乂號三鳯陳氏公風儀秀整器量閎大言論必本於理喜怒不形於色時稱長者公之仕在金以父澤起家監藍田子午酒改陕鹽場管勾入國朝用解梁儀總帥薦為帥府經歷辟解鹽司判官張德輝宣撫河東張仲一建行省皆署參議又以行省言授河東兩路宣慰司參議金正大初偕弟庾入汴丞相髙汝礪専恣不道即伏闕上封事乞斬以謝天下不報又為書責諌議大夫陳規不早諌規入極言不聽公長歎而去汝礪竟恚死歷事四大幕一攝宣撫事皆能推誠盡禮以事其上正身修德以化於下故奸宄屏息謗讟不興而政以行方朝廷用兵西北日不暇給責平陽太原各輸粟萬斛公請出鹽劵募民入粟民歡趨之頃之謝疾歸解與沙門道優輩遊每夏五入王官谷歷白石萬固俯西岩尋吕純陽故居登五老峯至秋乃還嵗以為常無少間金崇慶中河南亂奉二親竄華隂還買田洛西治生産日置酒速客登山臨水以樂其親凡十餘年正大中避亂于陕居潁川公喪哀毁柴立時寇盜四起所向洶洶乃奉母間行入盧氏山中數與盜遇盜輒指善道使去竟免於難弟膺之幼張夫人實乳哺之稍長隨兄庾遷平陽及從軍山東有子元凱未齔公復載至解教育之遂為名大夫居家戒子弟必以孝弟忠信遇鄉黨無少長必以和而不違於禮或步至其家相勞苦人人自以為親已人有所緩急傾囊倒廪救之不愛也有所忿爭不之邑而之公一言感動往往自謝去或愧悔終身壬辰之亂有沈千戶者捍公一門後百計求之不可得每嵗時率弟姪設位而祭之故公沒之後聞道公姓名者必以手加額唏噓不自勝公之學閎肆演迤以力行為本不棘棘章句不矜矜自道其為文雄健雅麗務極其意有默軒集二十卷塢西漫録十二卷嵩隱談露五卷弊帚集十卷尤工行草書得筆外意公之游在洛西則賈某損之趙某慶之麻某平甫劉某光甫薛繼先曼卿辛願敬之趙元宜之和某獻之在汴則趙秉文周臣楊慥叔玉麻九疇知幾雷淵希顔李汾長源北渡則元好問裕之李獻卿欽止楊奐煥然楊𢎞道叔能趙著光甫之屬此其尤賢者嗚呼士之生也德豈不足尚耶才豈不足貴耶學豈不足明文豈不足工耶賢而不達自古已然逄而不然又烏足賢若公之神可與元氣遊名可與天地終又何乖逄之足計哉公之夫人張氏德足以配君子先七年卒二子皆夭死從孫述為後又死今以觀之子仁壽奉公祀三女長適金參知政事同華莭度使李仲修之姪次適王次適馮皆大姓銘曰嗟嗟陳公河嶽之英遭時多艱嵗靡遑寧扶老携幼日與憂并洛西十年乃東入京京途悠悠誰秉國程昌言罔知有弗速傾薄言還歸爰屬皇明既佐戎幕亦撫鰥􅑱眷言顧之日月斯征孔子戒得老氏知足皎然美人在彼空谷緬懷萬端藏之一束惟仁吾居惟義吾轂惟孝惟弟吾帛吾粟賢必大用公獨吝之衆人愠之公獨信之賢必有後公獨靳之衆人憤之公獨順之㷀㷀諸孫于以𦙍之春秋祭祀永言慎之宜興守王君墓志銘大德之末嵗凶民流東南逾甚死者無算朝廷憂之議懸賞勸分余時幸陪末議深贊其成因竊念四方賢守宰豈獨無分憂者乎後十年始知宜興王使君之事使君名德亮字仲明大父義自陳留避地范陽家焉父福倜儻好義以善役水為磑有名燕趙間遂𨽻少府俾提領涿州工匠與其配胡氏俱以壽終一男一女女為楊州鹽場管勾李鈞妻男使君也自幼知奮發力學兼習象胥弱冠舉為中書省斷事官令史秩滿授從仕郎北京宣慰司都事以材入為中書掾御史臺舉幹廉升承事郎再為北京宣慰司都事納延之亂與宣慰使伊爾蘇克俱受選任凡儲偫械器城守斥堠細大悉以委之晝夜盡瘁者十旬無乏興無敗事亂既平有㫖進一階當路格不下君無觖望詣銓得江西行省左右司員外郎終更遷承務郎遼陽行尚書省左右司貟外郎轉承直郎常德路總管府判官未上改大都稅課同提舉期年課羡四千定遷承德郎上都稅課同提舉不苛而集升奉訓大夫遼陽行中書省左右司郎中居三年進奉議大夫萬億寶源庫提舉寶源受天下轉輸衆謂劇而公甚優以才宜撫字進階奉政出牧宜興自以未更民事勤心奉職孜孜在民值嵗荐飢公私蓋藏咸竭道殣相枕藉至以妻子易一餐餐訖赴水死君憂形顔間身親勸率皆感其誠於是得捐有濟無之粟萬石有竒以賑損貴就賤之粟六千以糶山谷羸困不能出者粥活之行視荒田諭冨者資飢者分耕之宜興之菑遂瘳猛獸食人殺官軍十三行旅殆絶君齊戒禱于山神即獲二虎一豹飛蝗大集民大駭君盡誠禜之且設方略捕絶之稼以有秋以其暇出私帑市材傭工一新州之治宇民聞歡趨之堂室樓門翼然畢備凡典州六十四朔其所興除不可計大要以利民為本代至而君已病矣既亟家人授簡以家事請書君抵之不答天性和易輕財好施雖以文為害進然恆不樂每勵其子以學問曰吏不可為為儒而貧抑又何惡苟棄吾訓非王氏子孫也既葬之秋子宏以范陽鄭守謙之述來請志墓宏之言曰先人出入省尸三十年嘉言善行多矣宏幼不能知所知者宜興之略耳余惟古循吏逺矣然有能一日勤其官子其民則語默造次皆足以及人觀使君之於宜興庶幾民之父母者歟况加以用心五六年之久是宜彼之思不能忘此之情不能却也君凡四娶曰葛氏一女嫁奉議大夫冠州知州周郁曰劉氏一女嫁某官孔特立曰唐氏一男宏曰張氏一男弼一女幼君之壽六十有一沒以皇慶元年十月庚午窆以延祐二年二月庚寅墓在范陽縣禮讓鄉史家里初建新阡徙祖考序昭穆而葬焉銘曰有美王氏由宋而燕維肇其先弗德孰延蓄之為淵演之為川懿爾史君厥施沛然曷以其善不以其年教一經相活千人封德靡不報聲隨景從匪我期之大畀則豐尚力于訓爰亢于宗涿鹿之野其固惟崇許州大洪濟寺益和尚塔銘大雄氏一傳而迦葉二十八傳而達摩又五傳而宏忍遂岐為二能傳而南秀傳而北由是講論興焉毗盧之書為卷五千四十有八出於佛者什二三演於緣覺聲聞者大半其語言文字亦博矣不了其義不足以深其道不深其道不足以得其法法學矣成惟艱哉是故了義非難了心為難義了而心未了者有矣未有心了而義不了者也許田栖岩和尚其宿根慧命者耶其在母也母夢適野而得金印野有人曰亟以獻佛母留也即望見塔廟甚盛因懷印以往寤而和尚生父母異之甫齓俾出依鎮陽天寧朏公父母南歸以幼復從焉十五六衣祴北征學於燕中寶集寺又學華嚴圎頓於真定净公又學唯識於大梁孝嚴溫公嵗月逾滋心義向了遂即溫講席而坐每鳴鼓升堂義鋒四起和尚惟竪十指迎其所至霧解冰消莫不卷舌低眉以就聽位於是四衆輻湊聞所未聞和尚自以教𢎞遂退修面壁觀于明月山大比丘衆全公輩謂今塵剎俱空法無所住燈昏夜永孰測迷津乃共即山中請復設席和尚感受其言出居許州大洪濟寺思究唯識宗㫖母張竭資以給購疏記三十餘部凡一千三百餘卷於是嵗講一周聲益以揚風益以逺傾耳席下者恆數千百人自河以南願學者皆趨焉其始至也殘屋與僧各不四五既而敝者新無者有莊嚴殊勝如梵天宫金地福田出入衍蓋居净侣指千悉得溫飽皆和尚之功及其徒誾與燦之力也和尚戒律精嚴終身壞衣疏食燃四指以煉心講唯識四十餘年凡三十餘周河洛之間設席以待者惟恐不足以致樵兒牧叟類皆信向之大德中詔住持大洪濟寺汴之王公貴人皆崇以師友之禮四方欲了佛義者皆以和尚為歸亦孰知和尚所了者不徒在此也嘗預臨壇一閲藏典一飯僧餘五十萬度臘五十有五賜號佛性圎明普照大師以延祐二年四月十日示寂嵗七十有三州别駕以下千餘人送之塔于城南八里寺篤于接引自海量以下得法者一百二十人有竒親授記度者餘二十人名具碑隂父成姓劉氏鄭州人也某寺沙門法洪纂其事來請余識余惟聖人之教不貴言而貴行今若栖岩師之劬躬守法先行後言於聖人之教亦若嘗有聞者乃録其行而系之銘銘曰道隱世龎厥生孰存因彼耀此昭兹侗昏有言不信自卑其尊粵古大覺啓不二門噓吸羣流躍如西奔孰游其深惟汲之渾我觀栖岩繄古尊宿印佛者心式表前躅三衣一食無悖無辱抽關剖鑰顯示季俗了義了緣雙林有囑性海此舟嗚呼不復周應卓妻李氏墓志銘廬陵周應卓之妻李氏卒且葬李子楨以狀走京師涕泣再拜言曰楨之母死且葬父命曰汝往在京師獲識翰林程公不幸汝母死今葬矣然不得如程公者銘之猶無子也楨忍死受命以行敢請志曰李氏邑士人李某之女也幼聰慧涉書史服勤女事得父母之愛為淑女長歸周氏謹甘㫖恭祭祀睦族姻以相夫子得舅姑之歡為賢婦晚為兒女昏嫁不擇勢利家庭訓誨一本忠厚得鄉黨之敬為慈母合是懿行斯可銘矣生以淳祐辛亥十月十有六日卒以皇慶壬子五月十有二日葬以癸丑十一月十日里之龍湖其墓兆也子男四祐敬鼎楨敬出為段氏後女一適李以學孫男二岐原岐本楨弟某父命為楨子女五皆幼銘曰生可法死可銘是謂婦人之貞雪樓集卷二十一
