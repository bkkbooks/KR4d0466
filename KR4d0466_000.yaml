body:
  text: 雪樓集目録别集類四元卷一玉堂類藁一制詔諭冊文祭文齋意青詞祝文卷二玉堂類藁二制詞卷三玉堂類藁三制詞卷四玉堂類藁四制詞表牋致語卷五玉堂類藁五敕賜碑卷六玉堂類藁六敕賜碑卷七玉堂類藁七敇賜碑卷八玉堂類藁八敕賜碑卷九玉堂類藁九敕賜碑記應制詩贊卷十奏議存藁卷十一記卷十二記卷十三記卷十四序引卷十五序引卷十六碑銘卷十七碑銘卷十八碑銘卷十九碑銘卷二十碑銘卷二十一碑銘卷二十二碑銘卷二十三銘箴贊説祭文祝文書啓卷二十四題跋卷二十五題跋雜著卷二十六詩卷二十七詩卷二十八詩卷二十九詩卷三十詩樂府臣等謹案雪樓集三十卷元程鉅夫樓鉅夫初名文海以字行建昌人雪樓者郢州有白雪樓鉅夫嘗以名其寓故世即以是稱之鉅夫少與吳澄同學宋末從季父飛卿入元遂留宿衛世祖竒其才改授應奉翰林文字累官翰林學士承㫖追封楚國公諡文憲事蹟具元史本傳鉅夫宏才博學被遇四朝忠亮鯁直為時名臣虞集嘗稱宋季士習卑陋以時文相尚病其陳腐則以竒險相髙江西尤甚鉅夫始以平易正大之學振文風作士氣元代古文之盛實自鉅夫創之蘇天爵元文類亦録鉅夫古文十餘篇大抵皆制誥碑版紀功銘徳之作而不及其詩盖生平所注力者在此其順宗諡冊諸篇元史亦有取焉誠以廟堂制作温厚典雅有合於訓誥遺風足為歐陽修王安石等嗣音固非南宋以來雕鏤藻繢者所可及也鉅夫所撰如玉堂類稿奏議存稿及詩文集雜著本各自為部其子大本合輯為四十五卷門人掲傒斯校正之此本併作三十卷乃至正癸夘其曽孫溍所重編刋校未竟至明洪武甲戌詔取其書入秘閣越明年始刋成之云乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀雪樓集原序聲音與政通文章與時髙下原其始則理與氣合道與時合要其歸則亦泯然而無間三代而上醇乎醇者也漢猶近古其文則雄偉渾厚由其氣質未漓故其發為聲音者似之魏晉以降剥剖分裂作者厖乎不醇豈風氣乖而習弗善與至唐韓栁氏出起弊扶弱剗垢易新遂為後世作者之宗匠宋盛於前而靡於後金則無以議為也我國家以泰初混龎之氣開闢宇宙世祖皇帝合南北為一家于斯之時人物之生辟猶春陽始達生意奮發甲者畢坼勾者畢出挺英揚㽔駢榮競秀條逹暢茂滋息雨露而收其實者也公生於宋淳祐巳酉當我憲宗嗣服前之二歲至至元丙子江南始平遂以侍子入見尋命入翰林年方壯也自始識學至於有立其所以儲精畜思藏器待時鬱而未施者固天所以遺聖明之世膺作興之運以恢宏大業黼黻太平者也公之文悉本於仁義輔之以六經陳之為軌範措之為事業滔滔汨汨如有源之水流而不窮曲折變化合自然之度愈出愈偉誠可謂一代之作者矣初世皇之在潛邸也已喜儒士凡天下之鴻才碩徳靡不延訪招致左右爰暨即位乃考文章明制度興禮制樂為天下法一時名士彚征並進文采炳蔚度越前代如王文康公鶚王文忠公磐李文正公冶太常徐公世隆内翰圖克坦公履之儔多前金遺逸皆為我用惟公南來際遇隆渥逮事四朝四十餘年雖出入顯要而居侍從之列者有半仕履之乆一人而已故其謨謀獻納輸忠盡職一寓之文古所謂立徳立言而不朽者公其有馬今其存者内外制詞及諸襍文若干篇詩若干首樂府若干首摠四十五卷仲子大本之所録也嗚呼盛哉公諱文海字鉅夫後避武宗御名以字行雪樓其號云至正十有四年歳在甲午四月生明前一日後學李好文謹序
