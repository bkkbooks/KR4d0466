body:
  text: 雪樓集卷四元程文海撰玉堂類藁制詞榮祿大夫平章政事同知徽政院事左都威衛使王桓故曽祖父永安州都監增贈榮祿大夫平章政事追封冀國公諡武康制尊祖敬宗思廣天下之孝序功録德遂及勳臣之先以勵事君以勸教子具官王某故曾祖父某官某齊家有法裕後惟仁基四世之忠良備纍朝之任使出則為良將帥入而為名公卿具有顯庸實由積德是用表勛錫爵節惠易名誕布恩榮式光泉壤嗚呼河山渺渺載瞻大國於岐梁子孫繩繩永底厥后為堯舜尚迪爾後式副朕心可故曾祖母李氏追封冀國夫人制為國以禮恩宜體於群臣致位崇班封乃及於三代具官王某故曾祖母李氏惟和惟一有德有功主饋共稱其賢率下咸服其愛遂鍾賢子克收名世之勛施及文孫屹作中朝之佐是用尊以小君之號從其列土之封庶極哀榮以示恩意嗚呼積善有餘慶必基閨閫之間為國生良臣允副笄珈之盛幽靈不昧明命其歆可故祖父金吾衛上將軍知中山府事左副都元帥善贈銀青榮祿大夫大司徒追封冀國公諡武靖制有功當封雖遠必録無德不報既往可追矧豫宣力之臣復有詒謀之美宜隆命數以備哀榮具官王某故祖父某官某以忠孝立身以仁義發迹用士致其死力治民得其歡心入真定之兵三百餘人定中山以南四十二郡不殺降以規賞常捐已以活人為吏則稱其廉循為將則號為智勇宜子孫之盛大皆德澤之深長是用倣周法以易名表兾方而啓宇仍躋崇秩庸示殊恩嗚呼仕至執金吾緬想勳勞之舊名在太史氏榮書邦邑之新英爽如存休命勿替可故祖母李氏追封冀國夫人制我有世臣其功可及於古人稱賢婦厥德猶誦于今爰錫寵章儷封大國具官王某故祖母李氏勤儉慈愛柔嘉靜恭宗族視為範儀舅姑稱其孝謹內勉君子外濟時艱發倉廪以賑嵗飢脫簮珥以紓民責有脂澤以遺後宜湯沐之從夫嗚呼詒厥孫謀夙夜每勤於警戒蒸畀祖妣春秋永治於禴祠苗裔相承昌熾未艾可故父榮祿大夫平章政事僉書樞密院事兼徽政副使左都威衛使贈金紫光祿大夫大司徒上柱國追封冀國公諡忠穆慶端加贈推忠宣力功臣太傅開府儀同三司上柱國仍追封冀國公改諡忠武制居朝廷之上必有腹心之臣在軍旅之中則有爪牙之士惟是二者鮮能兼之緬懷勛舊之賢爰舉褒崇之典具官王某故父某官贈某官某番番良士翼翼小心世祖識其有為裕皇知其可任出則扈從警蹕入則守衛宫庭營威武而儲峙富強軍神鋒而訓習明練平山東鎮清口遇賞則辭餉和林剪乃顔有功不伐庶幾古之良將信為國之重臣雖握樞衡如在管庫宜後人之允蹈致大賚而啓封表四字以䇿勛視三公而開府載疇偉績改錫嘉名嗚呼金城湯池嗟不憗于一老岐山壺口今以作于爾邦永襲休明式昌嗣胤可故母追封冀國夫人李氏仍冀國夫人制為臣居丞弼以顯其親推恩及祖宗况在其母用光泉壤申衍脂田具官王某故母追封某夫人李氏育德高閎來嬪茂族夫能盡臣道皆內助之得人子復列台衡亦義方之有訓雖偕老之詩莫賦而孝養之禮無從是用因子致崇從夫錫爵嗚呼父子亦既濟美宜大其家名器所以馭臣匪私於汝服豫休渥保爾利貞可妻劉氏封冀國夫人制國家凡賚於臣工恩澤必加於伉儷蓋內有主饋之寄則外盡事君之忠于以見夫婦之體齊而君臣之義大具官王桓妻劉氏相其夫子宜于室家春秋克敬於蒸嘗夙夜諒多於警戒用能保其祿位以不墜於箕裘宜錫脂田式昭婦道欽豫休命對爾新封可故金紫光祿大夫平章政事翰林學士承旨祕書監領崇福司事秦國公愛綏贈推誠協力贊治功臣太師開府儀同三司上柱國追封拂林王諡忠獻制功大者位隆勞多者賞厚備國家之恤典必勛舊之良臣故具官某有服大僚克勤小物既宣力於憲廟復受知於世皇使於四方挺節窮荒之外列于庶位正色周行之間早已歷於機衡晚乃分於茅土太息九原之不作若為千載之可傳夫官莫隆於師而爵莫貴於王且號以表其勳而諡以著其行具此衆美可謂特恩豈惟旌爾之賢所以為後之勸嗚呼身沒而名不朽足慰平生邦舊而命維新益昌乃世英靈有濯寵渥其歆可故妻沙喇氏追封拂林王夫人制王封異姓特隆念舊之恩妻曰夫人盍俾從夫之爵故具官某故妻某氏位正乎內德協于中其夫歷事於纍朝有子咸躋於膴仕盛大固由於世德訓戒亦本於閨門庸啓拂林之邦式慰焄蒿之感嗚呼死生契闊百兩之御百兩之將終始哀榮五鼎而養五鼎而祭歆豫漏澤佑爾後人可榮祿大夫知樞密院事穆呼哩封廣平王制國非謂喬木必有勛勞之世臣爵莫貴封王宜畀子孫之賢者具官某乃祖先父纍朝元功逮豫纂承之初資爾翼助之力左右厥辟握掌武之樞機夙夜在公長周廬之禁衛是用超之五等胙以大邦嗚呼丕勞爾先故有生而富貴克篤前烈尚永保於忠貞明聽朕言對揚休命可太保庫楚故祖父某追封祁連王制昔在初載粵有藎臣濟朕于艱難保朕于沖幼必乃祖之攸訓至厥孫而始彰宜異其愍恤之恩以稱其積纍之善具官某故祖父某忠厚為本勤儉為基德可致富貴而弗居謀可建功業而弗有故其施於後也大所以食其報也豐是用疏西土而啓封超五等而錫爵皆推原其所自庸垂勸於方來嗚呼思克犖之邅回以有今日望祁連之峻極庸建爾邦魂兮如生歆兹成命可故祖母某氏追封祁連王夫人制論忠臣之功莫大於保其體求孝子之志莫先於顯其親載疇爾庸遂及祖妣具官某故祖母某氏靜恭可則勤儉有常惟積善以深培本根宜再傳而致位台衮蔚為元老輔朕眇躬既加異姓之王宜命從夫之爵有光門閥式表國恩嗚呼魂魄故鄉想天山之不改蒸嘗禰廟諒翟茀之如存不昧祗承式昌嗣續可故父某追封祁連王制惟國家之大臣應天地之昌運雖鍾河嶽之秀實本祖父之賢具官某故父某簡質繼其前人忠信篤于後嗣乃左乃右在朕有保翼之良惟艱惟勤於今為柱石之重欲報之德每念其先爰啓大邦超上公而命爵載疏美號詔太常而易名增閥閲之光華慰焄蒿之悽愴嗚呼父為師子為保既備哀榮君以禮臣以忠尚全終始英魂不爽漏澤惟歆可故母某氏追封祁連王夫人制母之鞠育其子正欲大其家聲君之寵綏其臣孰若尊其先世爰疏異數昭示至恩具官某故母某氏功見於宜家德足以裕後篤生良輔以保朕躬翼衛於幼沖之時扈從於艱危之際始終盡瘁夙夜在公遠追古之名臣蔚為今之元老推其積善之自錫以從夫之封稱王夫人建祁連國嗚呼非此母不生此子果若人言有其德必得其名時乃天道歆兹明命慰爾幽靈可開府儀同三司上柱國江浙等處行中書省左丞相拜布哈故曾祖父某官達實端多卜贈服勤濟美功臣太保儀同三司追封居延王諡安敬制父傳之子萃忠孝於一門祖逮于孫備哀榮於三世具官某故曽祖父某官某志在功烈心無死生力戰則聞鼓而不聞金臨事則見義而不見利威稜憺乎群國武勇冠於三軍方太祖之在潛知歷數之有屬故見危而授命寧殺身以成仁共憐李廣之數竒尚想張巡之眥裂是以王加異姓國啓新封錫號以贊其忠易名以表其節嗚呼龍翔黑水昌期曾感於風雲蚓食黃泉漏澤仍沾於雨露精神不爽休命惟歆可曾祖母和斯德濟德哷氏追封居延王夫人制漏澤九泉莫厚於國家之典追榮三代惟施於宰輔之臣矧忠義之相傳由閨門之有度具官某故曾祖母某氏警戒成於夫子教訓及於兒孫國爾忘家世載其美追原懿德盍啓新封嗚呼在昔艱虞厚報豈圖於今日致身富貴長守是在於後人苖裔相承昌熾未艾可故祖父達爾罕托恰勒贈推誠保德功臣太傅開府儀同三司上柱國追封居延王諡莊敏制事君致身人臣之大節封王列土國家之異恩既忠於前宜榮於後具官某故祖父某驅馳百戰終始一心雖身沒而名存况父忠而子孝亦天啓於昌運故世産其英賢將軍豈惡於生恐傷於義壯士既得其死甘喪其元此汝所以存心於理宜其有後是用誕頒爵號以答勛庸昭乃辟之弗忘俾爾孫之有勸嗚呼聞鼓鼙而思將帥如見平生指帶礪而誓河山庶幾不朽精神如在恩渥其歆可祖母額森諾郭蘇德哷氏追封居延王夫人制君臣以義合故有死事之臣夫婦以德從必獲稱家之婦克兼是美宜享其榮具官某故祖母某氏淑慎其儀柔嘉維則若夫若子繼沒於三軍為母為妻獨守於一節是用乃孫之貴載加大國之封嗚呼如山如河緬想克宜於象服于疆于理尚惟永胙於脂田昭爾幽靈歆豫休命可故父贈揚武守正功臣太保儀同三司追封延國公諡忠節布哈穆爾加贈揚武守正定遠功臣太師開府儀同三司上柱國追封居延王仍諡忠節制朕思良將為有死之將軍世選爾勞惟象賢之濟美録功惟重頒爵故超具官某故父贈某官某業紹祖宗才兼文武杖節邊陲之外甫脫命於纍囚息肩卿監之中復聞謀而上變大建征西之府以為逐北之圖彼乃懼而詐降爾竟歸而遇害惟天福善生子世家雖已錫之山川宜益尊其名號以勵後世以慰當年嗚呼馬革褁尸獨殺身而報國虎頭食肉終啓土以封王爾魄如生朕命維允可故母阿爾台呼塔噶氏追封居延王夫人制盡忠為臣既封王而列土正家有婦宜錫爵以從夫具官某故母某氏妻道可書母儀可則其夫死事力求尸於莽中負骨來歸上祈哀於闕下鞠躬盡瘁守節持家煢然母子之依致此公台之貴緬懷賢範益厚徽章嗚呼副笄六珈尚想宜家而宜室萬鍾五鼎庶幾事死如事生佑爾後人歆豫寵命可故母托里氏追封居延王夫人制嫓賢伉德既克稱於名家厚本浚源乃篤生於良輔慨違至養庸畀恤章具官某故母某氏幽間之姿貞順之行內而正其閨閫外則和於族姻生備嘗於艱難沒宜躋于祭祀是用改從王爵封以居延下齊夫子於玄臺上配爾姑於禰廟嗚呼母之愛其子咸願致於公台朕以廣其恩故特隆於命數其歆景命允迪後人可妻布雅木齊氏封延國夫人制惟國家推恩而命爵於夫婦齊體而抗尊彰厥有常達于庶位具官某妻某氏生於盛大之族嬪于忠孝之門貞靜純和既克勤于中饋警戒畏慎諒多贊于夫君宜加湯沐之封以為伉儷之重益勉婦道用相爾家可御史大夫巴圖母某氏封泰安王太夫人制官德懋者莫大於親榮濟世美者實原於母訓誕敷命數光賁庭闈具官某母某氏蚤以名家嬪于華胄事尊章而盡禮處姻族而可儀夫克成其大勳助由中饋子能繼其先志教有義方宜疏泰嶽之封庸正小君之位嗚呼三牲五鼎養喜逮於親年副笄六珈貴盍齊於王者其承景命永介壽祺可銀青榮祿大夫安南國王遙授湖廣等處行中書省平章政事陳益稷加金紫光祿大夫餘如故制委質歸朝既去逆而效順以爵馭貴宜崇德而報功誕播明綸用孚衆聽具官陳某知畏天者事大期保境以全民慕帝王之有真見幾而作懼祖宗之不祀自拔而來以忠孝之誠受知於世皇蒙天地之恩嗣封於故國始者周王之赫怒伐罪弔民終焉舜帝之誕敷班師振旅彼迷不復爾守彌堅拯溺救焚從王師凡一再舉適館授粲留湖右幾三十年身歷事於四朝志不渝於初節肆朕踐阼亟其來朝是用增新秩以示恩仍舊封而授職嗚呼內寧外撫朕不忘銅柱之南近恱遠來爾益拱辰星之北祗若休命永肩一心可仰山慧慈靈感昭應大通禪師加封慧慈靈感昭應大通正覺禪師制佛法本空實慈仁而利物神道設教大變化以無方某山某禪師自唐會昌以來有小釋迦之號因緣出現知幾劫之修來願力宏深致二神之獻宅大哉德施之普巋然江水之西爰即舊封肆加美諡嗚呼求神通索妙用未嘗有為畏天命閔人窮是乃正覺隂翊王度永鎮名山可仰山顯德仁聖忠佑靈濟王加封顯德仁聖忠佑靈濟廣慶王福德聖仁忠衛康濟王加封福德聖仁忠衛康濟順慶王制山川出雲為雨者是名曰神功烈在民則祀之乃古之制有嘉靈迹爰錫贊書某山某王能自得師聿來胥宇乘蜿蟺扶輿之氣為聰明正直之神水旱疾疫之不常遇災輒禱伯仲塤篪之相應如響隨聲兹既達於豫聞其並增於美號嗚呼為民請命故致力於山靈明德惟馨繼自今其世享祭則如在感而遂通可太保庫楚妻旺扎勒台氏封應國夫人制朕聞家人正而天下定鵲巢應而王道成蓋國之本在家而女正位乎內有嘉賢淑作儷元臣具官某妻某氏生后族之中服女師之訓配其爵位宜而室家是用貴因其夫榮開大國肆誕敷於明命其祗服於訓詞於戲邦君之妻曰夫人乃古之制婦人以義勸君子惟汝之賢欽念寵嘉益勤敬戒可御史大夫伯都母王氏封泰安王太夫人制國之名臣必有內助之美家之孝子必有母訓之嚴自昔豫聞于今乃見具官某母王氏貞靜表于閨閫慈儉儀于族姻方良人任社稷之勞必勸以義及有子任耳目之寄克教以忠勛庸備載於鼎彛命數猶稽於象服爰錫從夫之爵以慰愛親之心於戲被山帶河雖君子之不待前周後魯於賢嗣以攸觀永篤忠貞以介眉壽可通奉大夫侍御史趙世延故祖父蒙古漢軍征行大元帥按扎爾贈推忠勛庸功臣太保儀同三司上柱國追封秦國公諡武宣制應天順人惟祖宗之仁聖建邦啓土亦將帥之勤勞眷比盈成申之褒贈具官趙某故祖父某官某才兼文武德備忠良挺不世之姿佐方興之運率師滅夏莫不望風而降假道破金咸謂自天而下以帝王之兵不殺為本故秦蜀之衆長驅而平遂收百戰之功逈出諸將之右慕興唐之英衛老不辭難方佐漢之良平謀無遺策九京不作千載如生是用進位台衡表勛柱石冠四字以錫號節二惠而易名榮開白社之封載在丹書之府嗚呼望三千之組練古名將何以加渺百二之山河爾嗣孫其是似尚維英爽歆此寵嘉可故祖母白氏追封秦國夫人制夫將帥之後有清白之名必閨閫之間有勤儉之教具官趙某故祖母白氏出於令族配我良臣起從諸王歷事五帝南征北伐當建業之難內撫外攘受總戎之寄賞則均於士伍功必讓於偏禆惟爾謹身節用以正乎家勞心焦思以淑于後施于孫子允稱執法之中在我國家宜贈從夫之爵以正位號以極哀榮嗚呼生將門歸將門獨秉詩書之訓始婦道終婦道是膺象服之宜魂而有知歆豫景命可故太傅録軍國重事録太醫院事依前開府儀同三司宣徽院使領大司農司事特爾格贈推誠佐理翊戴功臣太師開府儀同三司上柱國追封秦國公諡忠穆制豐水有芑儲材式遺於子孫南山得賢圖任正資於耆舊遽亡一鑑孰作九京故具官某喬木世臣高山景行推前人未究之志廣太上好生之仁全活知幾百人出入將五十載二公宏化為商鼎之鹽梅事君致身作周邦之屏翰弼亮四世終始一心生雖極於顯庸沒盍伸於恤典是用胙之大國躋以上公錫號而表勛易名而開府於戲載瞻西土永懷德義之言啓迪後人益贊邦家之固英魂不爽寵命其承可故妻輝和爾通郭囉氏追封秦國夫人制慎終追遠本蓋繫於家人崇德報功恩式隆於恤典故具官某故妻某氏育芳名族作儷元臣約婚爰自於初年歷夫艱阻歸國竟尋於舊好宜其室家事姑備孝養之隆教子熟義方之訓緬懷賢範加厚徽章雖文駟雕軒生未正小君之號然鸞誥象服沒猶荒大國之封尚克歆承式昌嗣續可故妻冉氏追封秦國夫人制朕聞生榮死哀禮無先於爵賞男外女內義莫重於人倫所以録既沒之勛庸推而及平生之閨閫故具官某故妻冉氏慈孝而恭儉貞靜而淑和作配世臣號稱賢婦胙既開於大國封可後於從夫於戲副笄六珈豈異當年之榮耀山河百二尚貽後嗣之昌隆咨爾幽靈服我休命可妻張氏封秦國夫人制咨爾故具官某妻張氏婦人從夫爵者也爾夫以四朝元老為我近臣九京不可作矣用開大國以封之躋上公以贈之惟爾盡婦道以正家篤義方而教子肆頒異數以慰爾死生契濶之思其益敬恭永對光寵可某官布拉吉達封河南王制撫帝業之艱難爰恩將帥啓功臣之盟誓宜及子孫咨爾在廷聽豫作誥具官某知明識遠心廣體胖勛名克篤於前人藩翰久勤於外服昔將平於內難朕大投艱方深計於中途卿獨決進志存弼亮身佩安危所謂社稷之臣盍享尊榮之報乃復煩於機務非示寵於忠良是用命汝襲諸侯王以長守於富貴歸丞相印以自養於壽齡既不遠於京師可以時而朝覲允資重望坐鎮一方於戲表河之南念爾乃祖乃父為國之屏敬哉有土有民永建厥家母棄朕命可光祿大夫同知徽政院事趙國公常布哷齊故曾祖父資贈效順功臣太保金紫光祿大夫上柱國追封趙國公諡安穆制朕惟德盛位隆勞多賞厚故爵有五等之制恩有三世之推豈朕所私乃國之典具官常某故曾祖父某鍾河嶽之氣逢祖宗之時助玉食之調和佐瑶圖之開闢出參輦轂入侍禁闈惟風夜不懈於忠勤致孫曾益躋於顯盛是用詔太常而定諡命中書以授官以賁九原以勸百辟於戲表恆山而賜履惟爾之賢建上公以錫名亦榮之至尚迪爾後母忝世臣可故曾祖母侯氏追封趙國夫人制掌先朝九重之養厥有內臣啓名家纍世之昌必資賢配允為餘慶宜渙異恩具官常某故曾祖母侯氏惟儉惟勤克淑克慎至曾孫而建土皆積善之降祥是用正位小君儷封全趙於戲魚軒翟茀已無及於當年礪山帶河尚永存於奕葉眷惟幽爽不昧欽承可故祖父烏爾圖贈推忠守義功臣太傅儀同三司上柱國追封趙國公諡恭敏制一善必録聖哲所以得人五世其昌忠良故宜有後風雲不改茅土方新具官常某故祖父某大節傳家小心事主負羈絏而從巡狩知無不為和鼎鼐以輔經營死而後已迄啓孫曾之慶聿開閥閲之華載錫公封俾從禰祀於戲洗而揚觶豈無杜蕢之正言書以汗青不遇董狐之良史朕方慨想爾尚顧歆可故祖母孟氏追封趙國夫人制洪惟我祖建官必得其人粵若汝家得君最親於衆何愛從夫之爵以副尊祖之心具官常某故祖母孟氏德嫓臣工禮明閨閫上致舅姑之養下教子孫之忠宜啓世封式綿家慶於戲母儀婦道早稱德耀之賢象服脂田永顧邯鄲之胙服豫休命相爾後人可故父資善大夫同知宣徽院事約爾珠贈推誠宣力保德功臣太師開府儀同三司上柱國追封信都王諡忠懿制祖宗創業時非一手足之為家國同休古有萬子孫之祝矧惟邇列亶是世臣爰推漏澤之恩以慰在廷之彥具官常某故父某官某致身得地稟性自天方當就傅之年已識事親之禮近耿光於世祖承明眷於裕皇由鼎爼以造邦小試阿衡之事業指鹽梅而喻相諒多啓沃之謀猷逮豫訪落之初念爾老成之遠克昌後嗣益茂前聞是用躋異姓之王封視多儀於公府表駿功而作號錫美諡以易名少極哀榮用光幽顯於戲周家五等列爵顧兹命數之已超金氏七葉侍中尚衍聲名於不朽肆惟英爽不昧欽承可母馬氏封信都王太夫人制胙之民社固追念於世勞相其階庭又丕昭於母訓盍疏湯沐以賁晨昏具官常某母馬氏有內則之修勤得老氏之慈儉周旋中禁閨門警戒以相成燕坐北堂簮笏怡愈而就養由國命婦升王夫人於戲從夫爵而爵既崇保家聲而聲益振受兹祉福宜爾子孫可妻徐氏封趙國夫人制小君之稱所以正位乎內從夫之爵所以勸功于朝宜畀恩言俾榮志養具官常某妻徐氏居然令德所謂家由婦興嬪于世臣豈特母以子貴何愛魚軒之寵以成翟茀之華夫豈眷私蓋彰孝治於戲怡愈鶴髮無以夫人而自安敬戒雞鳴庶幾君子之偕老可加賜普庵禪師塔名制朕聞佛氏以空寂為宗則凡學其道者寧欲建名號殊稱謂以示天下後世哉而國家非此無以昭尊德樂道之意也朕自即位以來聞袁州大慈化寺普菴寂感妙濟真覺昭貺大德慧慶禪師印肅紹臨濟之緒超華嚴之境德映當代澤被方來其道甚尊顯心切慕之既纍錫大諡惟塔號未稱可加賜定光之塔曰定光靈瑞之塔主者施行表箋致語天壽節中書省賀表大德丙午誕開熙運合九五以育乎聖神丕衍鴻圖撫億兆而膺乎壽富欣逢華旦喜溢中秋中賀欽惟皇帝陛下大德體元玄功致泰無為而治猶勤典禮之修不令而行益廣恩言之布當千齡之慶會得萬國之歡心臣等幸列台衡光依宸極河清海晏龍飛常御於中天星拱雲從虎拜敢先於率土翰林院升從一品謝表天開文運治載睹於熙朝地切禁林恩比崇於極品具僚胥慶斯道增華中謝欽惟皇帝陛下德與日新聖由天縱遇儒臣而特異相古所無進院秩以示優自今而始親授銀章之重益為玉署之榮臣等學愧前修位隆往代典謨訓誥敢忘黼黻之勤元首股肱願效賡歌之盛進三朝實録表皇慶元年十月九日一人御極聿嚴金匱之藏三后在天實監玉堂之紀粵若稽古克底成書中謝欽惟皇帝陛下孝友慈仁溫文睿哲統之垂業之創今昔繼承功以著德以彰在兹纂録首崇筆削之任式宏龜鑑之圖臣等職忝禁林才非良史繫年繫月豈足盡於先朝作典作謨庶有徴於今日興聖宫元旦中書省賀表正月始和禮聿嚴於元會聖人教愛養莫大於尊親宇宙維新臣民均慶中賀欽惟皇太后陛下身為內則德嫓周南興明聖於兩朝皇圖益衍昭慈仁於四海帝治彌昌是宜宫壼之基克底邦家之盛臣等職慚百揆忠守一心地久天長願岡陵之齊壽風和日麗普覆載以常春中宫元旦中書省賀箋三陽肇序彰泰道之方亨萬物皆春表坤元之厚載歡騰海宇喜溢宫庭中賀敬惟皇后殿下寬裕有容柔嘉維則功密孚於宗社德允稱於禕䄖輔贊皇猷廣二南之風教昌延聖祚茂百世之本支聿增彤史之光式衍椒房之慶臣等幸逢盛旦忝備台司仰日月之儷明誕昭內治在璣衡而齊政永紀長年文廟落成祝聖致語伏以建國君民學為先務歸美報上頌必有祈方追蹤三代之宏規敢推本一人之大德欽惟皇帝陛下承天御極繼聖受圖虞夏商周所弗臣悉同文軌風雨霜露無非教咸被聲光肇卜上庠首營新廟宫墻翼翼聿來學禮之徒爼豆振振共藴祝堯之志臣等夙叨化育幸際平成爰酌禮於古今庸致嚴於朔望思皇多士於樂辟雍作之君作之師首善繫四方之本教以忠教以孝感恩同萬歲之呼雪樓集卷四
