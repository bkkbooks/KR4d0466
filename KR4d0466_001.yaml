body:
  text: 雪樓集卷一元程文海撰玉堂類藁制詔諭册文命中書省從新整治制朕自即位以來纍降詔旨圖治惟勤績效未著蓋司民政者撫字乖方居風憲者彈劾失當不能副朕愛恤元元之意今命右丞相達爾罕左丞相阿固台中書省官從新整治其布告天下凡在官守自今以始洗心易慮各盡乃職貪污敗政者責罰黜降亷勤公正治有成效者特加升擢期於政化流行黎民安業共享和平之治合行事理條列于后命左右相詔至大元年七月中書政本也軍國之務大小由之朕自即位以來厲精求治爰立輔相以總中書而期年于茲大效未著豈選用之不當歟何萬幾之猶紊而羣生之寡遂也今特命左丞相塔斯布哈為中書右丞相太保竒塔特布濟克為中書左丞相統百官平庶政便者舉行弊者革去一新綜理諸內外合行大小事務並聽中書省區處聞奏違越者論罪於戲設官分職慎毋紊於條綱持盈守成務先安於黎庶皇慶改元詔至大四年九月朕賴天地祖宗之靈纂承聖緒永惟治古之隆羣生咸遂國以乂寧朕夙興夜寐不敢怠遑任賢使能興滯補敝庶其臻茲斂時五福用敷錫厥庶民朕之志也踰年改元厥有彞典其以至大五年為皇慶元年延祐改元詔正月丁未惟天惟祖宗眷佑有國朕自即位于今四年比者隂陽失和星芒示警豈朕躬修德之未至歟抑官吏之未選而政令之或乖歟思以回天心召和氣側身修行實切余衷庸敕攸司各共乃職爰布惟新之令誕敷濟衆之仁可改皇慶三年為延祐元年於戲以實應天爰聿新於庶政用孚有衆同保合於太和諭立魯齋書院諭陜西行省行臺大小諸衙門官吏人等中書省奏御史臺言故中書左丞許衡首明理學尊為儒師世祖皇帝在潛邸嘗以禮徴至六盤山提舉陜右學校文風大行西臺侍御史趙世延請依他郡先賢過化之地為立書院前齊哩克琨總管王某獻地宅以成之延請前國子司業某同主領教生徒乞降旨撥田養士將王某量加旌勸準奏可賜額曰魯齋書院仰所在官司量撥係官田土入學奉朔望春秋之祀修繕祠宇廩餼師生務在作養人材講習道義以備擢用從本路正官主領敦勸行省行臺常加勉勵其王某令有司别加旌表仍禁治過往使臣官員人等毋得在內停止褻瀆飲宴聚理詞訟造作工役應贍學産業書院公事毋得諸人侵擾彼或恃此為過作非寧不知懼順宗皇帝上尊諡册文臣聞顯親所以為子追逺所以厚民矧必百世祀而位弗隆為天子父而養弗逮流光積慶爰集眇躬亦既踐阼而纘先猷是宜稱秩而躋廟祏以循彞典以逹純誠欽惟皇考皇帝淵穆有容神明莫測文孫文子鍾至愛於兩宫宜君宜王膺具瞻於四海當璧之祥未卜棄屣之迹已遙興言欲報之恩昊天罔極對越有成之命夙夜惟寅昭哉玄德之升聖矣生知之異衍莫衍於昌後嗣而有天下孝莫孝於配前烈而茂本支念茲繼體之初實切終身之慕謹遣攝太尉某奉册寶上尊諡曰昭聖衍孝皇帝廟號順宗伏惟明明降監序于祖宗攸躋攸寧永錫祚胤謹言皇后玉册文皇慶二年二月皇帝若曰朕荷天地祖宗之佑皇太后之訓嗣大歷服思底于治必樹元配表正六宫咨爾翁吉喇特氏是我家世戚嫡嗣所自出積德流慶肆啓爾來嬪于朕淑慎孝恭令譽昭聞承命慈闈爰正爾位今遣攝太尉右丞相圖固勒授爾玉册玉寶命爾為皇后惟天地定位萬物以生日月並照萬國以明君后合德萬化以成上以事上帝承宗廟下以親九族正萬邦為朕內助惟爾之賢其永念厥德履中體順俾聖母暨豫一人以寧匪惟爾嘉天亦永相念爾共享我有國欽哉皇太后加上尊號玉册文維延祐三年歲次乙卯三月巳酉朔越二十有二日庚午皇帝臣御名謹稽首再拜言臣聞正始之道王化之基尚矣況母儀天下德厚功隆者哉欽惟儀天興聖慈仁昭懿夀元皇太后陛下開兩朝之帝業紹祖宗之正傳曠古所稀於斯為盛以臣涼菲鞠育教誨底于有成定神器而措諸安遏亂略而反之正不動聲色天下歸仁惟我聖母全德之致也自登大位八方謐清華夏蠻貊罔不率俾亦惟我聖母泰寧之應也日月星辰循其軌天地祖考降之祜九族既睦品物咸亨持盈守成臣何力焉亦惟我聖母福慶之積也然而治效方隆徽稱未備宜益崇髙之號允合天人之心是用參稽典禮惓惓懇懇謹奉玉册玉寶加上尊號曰儀天興聖慈仁昭懿夀元全德泰寧福慶皇太后欽惟陛下得一以寧至靜而方慈儉為寶茀祿是康永錫祚胤俾熾俾昌受茲顯號萬夀無疆臣巨夫誠歡誠抃稽首再拜謹言祭文齋意青詞皇太后遣使祭諸神文一十九首后土平陽路坤靈承天子育萬有丕基攸託元造以成念茲長樂之安居實自無疆之厚德爰伸信指少逹純誠以報以祈永扶昌運東嶽泰山泰安州山嶽之重尊岱為宗配天芘民國賴禔福端居長樂密藉洪休禮具報祈益昌祚胤南嶽衡山潭州路祝融紫蓋屛蔽天南清淑之靈無逺弗屆同上西嶽華山華州太華峙秀上司金天靈貺所加年豐物富同上北嶽恆山保定路曲陽縣奠茲朔野仰止恆山凜然風威降佑作善同上中嶽嵩山河南府路嵩神峻極天地之中兆祉發祥均于四表同上江瀆成都府川瀆共尊維江之永滔滔南紀澤及邇遐長樂安居實永洪潤報祈兼舉流祚無疆河瀆河中府啓沠自天界于中土眷言福澤端共靈長同上淮瀆唐州桐柏之源實參名瀆格于幽顯惟神是司同上濟瀆懷孟路導沇發祥源清行逺利澤之性潛顯無殊同上東海萊州三神出沒百川朝宗朝陽既升景貺斯至安居長樂敢昧所原因報有祈永綿丕祚南海廣州扶胥黃木厥有典文匪今斯今邦國徼福同上西海河瀆附祭虞淵泛濫水環神州涵佑蓄祥流光景命同上北海濟瀆附祭玄冥之壑鯤化之池是為靈淵皇圖式固同上東鎮沂山登州琅琊穹隆作鎮東夏蓄泄雲雨集于休祥長樂靜深敢忘鴻佑報祈備舉益鞏丕基南鎮會稽山紹興路夏后登封玉帛萬國靈光永祚今古攸同同上西鎮吳山隴州汧岐之間古稱吳嶽金方巨鎮平秩西成同上北鎮醫巫閭山高州奕奕龍山有周已顯仰高錫厚永奠皇圖同上中鎮霍山霍州隂陽之交必有崇鎮蟠深錫巨奠于土中同上翁郭察圖建宫殿祭文四首太歲伏以肇建皇居載安黼座仰歲君之鎮靜懼役事之震驚穆卜剛辰式陳明薦伏願京邑翼翼奠此八方四維福祿穰穰至于萬年億載后土伏以帝居肇造黼扆載安惟爾有神實司后土式伸昭告以格洪休伏願萬國來朝共仰京都之壯麗億年當寧永慿神力之護持九良伏以皇居肇造黼扆載安惟爾九良之神實司土木之柄輒陳菲薦用介繁禧伏願極正京畿來梯航於萬國尊瞻帝座保福祿於億年安吻告諸神伏以宫殿肇新始安螭吻神祇擁護用介鴻休穆卜剛辰式嚴祀事伏願梯航萬國仰京邑以來朝福祿億年保皇圖之永固天夀節萬夀延真宫建醮道場文二首齋意伏以天申休命丕承積慶之基序屬孟秋適屆誕彌之旦念生成之有造薦蠲潔以逹誠靈宇載嚴真遊所集爰肅陳於淨醮祈上格於髙穹伏願諸福來崇克彰於善應萬靈增固永保於無疆青詞伏以大道無言密啓乾嘉之運七月流火載符夙震之辰爰即琳宫肅陳清醮伏念丕圖全付涼德奚堪期迓續於天休必祇承於帝命蘋蘩蕰藻昭明德之惟馨上下神祇賴至誠之可動尚惟純佑俯賜鑒觀伏願祉錫眇躬保皇基之鞏固福隆太母介萬夀以怡愈嘉與羣生同臻至治又行宫建醮事道場文二首齋意伏以天啓皇圖用申休命時惟秋孟適屆誕彌謹於十七日命萬夀延真宫道士一壇就幄殿之次修建正一消災集慶清醮若干分位肅延飈馭敬演玄科伏願上帝垂慈衆真降監聖躬康泰享九州四海之隆平太母怡愈同億載萬年之長夀青詞伏以曰旦曰明密運監觀之造載震載夙適逢生育之期爰肅行宫恪陳清醮伏念皇圖至重帝命惟新顧夙夜之祗承若淵冰而求濟不言善應雖黍稷之非馨有感必通幸蘋蘩之可薦敬將誠意仰逹髙穹伏願申命用休保列聖太平之業介福于母奉萬年長樂之觴上親祀太廟祝文天鑒祖宗畀茲大寶盈成之會嗣守為難益以美名中心怵惕潔齊薦見祇奉明禋啓佑無疆式臻康乂長春宫建金籙醮道場文八首齋意伏以仰荷皇仁獲承大寶夙夜祗懼恐上拂於至和天地監臨矧升聞於涼德乃自去秋而後雨澤愆期復於暮春以來星芒示警爰感隂陽之沴將為民物之災實深太后之驚疑益重眇躬之寅畏側身修省虔意禱祈謹命某官某道士於四月初五日就長春宫啓建上清正一金籙清醮二千四百分位修崇道場七晝夜之科蕆教至某日滿散蠲消既往之災迓續方來之慶伏願兩儀協序二氣致祥列星循度以安行諸福應誠而畢至風調雨順咸孚萬國之歡心時和歲豐永底慈闈之至養風伯祝文爰自去秋迄今春季時雨不降暴風頻興雲垂斾而屢褰澤雖下而未霈復覩乖曜孛于西維不勝恐懼之心庸致禱禳之敬式稽金籙寅事琳宫惟神稟命帝廷實司風柄願作清塵之瑞大霽鳴條之威相齋事以圓成格天心之仁愛祅災潛掃膏澤下流清清泠泠俾四時之平秩熙熙皥皥遂萬物之生成雨師祝文去秋以來種不入土維春之暮星復示災謹稽金籙之科儀仰扣紫清而禳度賴神祇之交助庶肸蠁之潛通惟是明神實司雨澤願齋壇之清淨致上帝之監觀咎證俱消甘霖時若曰暘而暘曰雨而雨實維豐年為君盡君為臣盡臣式寬憂顧建壇青詞天惟善應顧感召之由人道本無方因祈禳而設教念隂陽之久否復星象之示愆祗即殊庭肅陳清醮蕆事九朝之禮積誠七日之間建金籙之瑶壇啓琅函之玉字伏願齋忱上逹帝監俯臨絶妖孽之萌芽災星退舍集福禧之潤澤甘雨應期下逮羣生悉資餘蔭九朝青詞飈馭降臨望清光而伊邇淵衷修省依道蔭以惟勤九肅朝儀載陳奏牘伏念惟皇作極理物代天顧雨澤之失期而星芒之示警愆由眇已慮及羣生按金籙以修齋仰璇穹而請命冀闢蠲消之路幸垂仁愛之心伏願乾道清夷泰階正直庶徴各敘三光全而寒暑平六府孔修五穀熟而人民育永同夀母祗紹慶圖三清青詞道妙沖虛無方而善應天心仁愛有感而必通稽金籙以修齋望紫清而徼福伏念尊居人上職代天工自秋以來閔甘霖之閟澤逮春之暮驚祅祲之耀芒豈政令之失中抑膏澤之不下側身恐懼稽首祈禳伏願眷顧淵衷祓除沴氣五風十雨臻禹疇肅聖之時億載萬年奉文母怡愈之樂普資庶品同享太平昊天青詞眷命為君遇災而懼見道知象有感則通稽首蘂珠薦誠蘋藻伏念位託臣民之上身膺歷數之歸自顧菲涼未堪艱大不雨妨於東作有星孛于西維莫測其端豈無所自貢緑章而罪已回蒼昊之好生伏願下監齋忱潛消沴氣天其申命方開熙洽之期神之格思益介簡穰之祉后土青詞天髙聽下本仁愛以為心地靜德方必順承之有道仰觀譴告俯切戰兢力祈上下之平成敬啓仙真而禳禬伏念尊居五位望繫羣生方茲徯雨澤之來蘇俄復睹星文之謫見深求其故內省諸身豈政令之失宜致隂陽之為咎既騰章於蒼昊庸申告於鴻厖伏願六氣惟均庶土交正田耕井飲野聞擊壤之謠雨施雲行時若配天之澤雪樓集卷一
