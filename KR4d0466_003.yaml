body:
  text: 雪樓集卷三元程文海撰玉堂類藁制詞故平章政事薩里贈推忠守正佐理功臣太傅開府儀同三司上柱國追封徐國公諡忠肅制紹築水之封蓋仰思於基構列雲臺之像亦追念於股肱惟兹世勞在昔先正有美忠嘉之克肖眷言褒恤之是宜故具官某惇大而直方剛毅而亷潔以閥閲之胄而加之博學以鼎爼之器而濟之純誠獨發姦謀兾回淵聽譴不辭於九死刑迄正於四凶文祖知其匪躬具臣為之愧色乃若旬宣之績暨夫綏定之勛惠洽閭閻恩加庠序剸煩治劇而事皆可法興利除害而知無不為兼衆循吏之所僅能有古名將之所不逮家無餘積塗有公言方觀長孺之在朝人皆知憚緬徯玄成之正已天不憗遺兹用胙以徐方躋于周傅表功錫號節惠易名視台宰之多儀簉邦家之八柱昭豫令典慰爾遺忠於戲華屋山丘深起思賢之詠白雲弓劔諒深扈聖之勤尚敷遺於後人益對揚於休命可故妻鴻和納哩罕氏追封徐國夫人制積行纍功之盛爰致公封匹尊齊體之賢宜從夫爵匪獨光其家祭抑以煥於國章故具官某故妻某氏育自名家嬪于貴族雞鳴著詠知婦德之無違鵠峙在庭昭母儀之有素云何不淑蚤爾長歸追封湯沐之恩俯慰杯棬之感於戲褘衣闕翟空留服飾於丹青石室金縢尚繼勳名於帶礪諒惟懿識不昧欽承可妻宗氏封徐國太夫人制錫之山川既追崇於大國宜其家室亦正位於小君以勵忠臣以彰孝治故具官某妻宗氏清心玉映淑德蘭馨相饋祀於高華所期偕老撫遺孤於艱棘乃曰未亡後嗣賴以有成名閥因之不墜盍佐北堂之養俾從東土之封於戲膏沐誰容寧慕六珈之盛飾風猷未遠庶幾二惠之能賢其服殊恩益修內訓可丞相托克托故曽祖父固都斯追封某王制家國同休表生平之為善淵源遠被宜奕世之流芳粵若孫曾為吾丞弼爰推恩於欲報兼示眷於具瞻具官某故曾祖父某稟間氣於兩儀之間稱竒材於六合之表風流譽處雖梗槩之無傳閥閲聲名尚光華而有耀克昌厥後以迄于今用追禭於多儀并申榮於三世以昭令德以迪遠猷於戲貴震一方故國之風雲已矣爵超五等中天之雨露湛然英爽未渝欽承無怠可故曾祖母某氏積善降祥於子孫而益著報功崇德雖伉儷而必偕用稱情文亦彰孝治具官某故曾祖母某氏相中閨於裔土婦禮無違啓後嗣於清時家門未憗譽齊三鳳功協一夔用沿開國之封追畀從夫之爵於戲周禮下王后一等當知在昔之匪輕蕭氏有丞相八人彌覺於今之為盛柔嘉如在懿惠其承可故祖父且錫勒加恩泉壤有國所以勸功尚論本原後嗣於焉濟美榮其大父慰我元臣具官某故祖父某世載賢稱親逢聖作會孟津者八百咸秉盛心列要服于五千悉歸至治乃風猷之弗替而聲教之所漸代有其人不忝厥祖眷在廷之三俊實承祀之諸孫宜極追崇用昭眷倚於戲王公皆爵孰如君命之榮伯仲能賢佇見家聲之振肆惟幽哲歆此殊章可故祖母某氏翟茀以朝莫起小君於窀穸龍旗承祀宜從大父於蒸嘗用勸造邦亦嘉尊祖具官某故祖母某氏以名門之懿淑為令婦之表儀慶集子孫國賴棟梁之助恩均昭穆家傳帶礪之盟再命所加九京斯顯於戲坐間銀鹿諒知終列於王官肘後金章惜不及觀於相印永惟柔識尚服明綸可故父雅雅同心同德事不間於古今懋賞懋官誼無分於存殁眷此贊襄之彥資其揚顯之心具官某故父某惇厚有聞忠貞弗懈日磾歸漢胄本出於王家伯冏事周職莫親於僕正執干戈而衛社負羈絏以從君勳在五朝勤非一日用啓承家之慶仍居佐命之功冒九死而不可回挺然臣節佐萬機而能有守簡在朕心觀俊宅之盡忠見義方之善教爰推罔極追錫有章於戲四世五公掩前聞而獨盛一門三戟喜同氣之相輝尚顧寵綏益安顯祀可母歡台氏封康國太夫人制來章有慶肇開西土之封壽考維祺方受北堂之養從頒湯沐俾侑旨甘具官某母某氏名世高門宜家令配蚤資內助五朝之翼亮無違晚邵母儀三季之忠勤有自光分鼎席譽蓋槐庭肆豫孝治之時副爾顯親之志於戲通侯子為丞相昔列遷書邦君妻曰夫人今昌魯語嘉承茂渥益介期頥可故榮祿大夫河南江北等處行中書省平章政事何瑋贈推忠佐理同德功臣太傅開府儀同三司上柱國追封梁國公諡文正制允文允武遽興殄瘁之嗟懋賞懋官庸舉報崇之典故具官何某家傳忠孝德備柔剛事軍旅而敦詩書生閥閲而習政務踐揚臺省憚汲黯之在廷勤勩蕃宣式樊侯之維翰教興庠序惠洽閭閻論事後成敗國之蓍龜以身佩安危朝之柱石朕方求助天不憗遺兹用胙以召棠躋于周傅表功錫號節惠易名視台宰之多儀簉邦家之八柱昭豫異眷慰爾遺忠於戲華屋山丘深思賢於既往丹書帶礪應濟美於方來爾其顧歆是為不朽可故妻張氏追封梁國夫人制錫之山川既追榮於先正宜其家室亦有位於小君以彰國恩以勵臣節故具官何瑋故妻張氏誕生名閥來嬪高閎淑慎其身既百年之偕老柔嘉維則將永世以流芳爰錫絲綸從封湯沐於戲正位乎內雖死之日猶生之年在後之人行已也恭事上也敬尚惟不昧服我異恩可趙王專故曽祖父巴雅爾罕贈宣忠協力翊衛果毅功臣太傅開府儀同三司上柱國駙馬都尉追封趙王諡武毅制古今大義莫重君君而臣臣國家異恩豈但親親而貴貴眷豫懿戚代有偉人自其祖之匪躬至于今而五世忠勤益著典禮宜崇某王某故曽祖父某胄出名門身逢聖運年方齠齔從太祖以西征約結婚姻尚帝姫而敦好纍建開疆之偉績遂為佐命之元勳迄流慶於孫曾亶有光於竹帛兹用贈之周傅王此趙邦簉八柱以承天列三能而開府表功錫號節惠易名於戲爵至於王甚盛蔑以加矣世濟其美爾祖其與享之毋忘寵章是在後嗣可故曾祖母齊國大長公主阿老罕布濟克追封皇高祖姑趙國大長公主制肇造興邦賴臣子翼扶之力相成有道實皇家肺腑之親褒恤宜崇哀榮斯至某王某故曾祖母某神明育粹智略超凡決勝運籌凛有丈夫之風烈起家裕後聿開戚畹之王封為室家之道其義豐為子孫之謀其效遠追惟懿行盍胙大邦用衍絲綸有光窀穸於戲丕謨丕烈豫亦念於前人維孝維忠爾尚佑于後嗣諒存英爽不昧欽承可故祖父阿爾布哈贈懷忠竭力效勇定遠功臣太師開府儀同三司上柱國駙馬都尉追封趙王諡武襄制盡忠效節閔豫戚里之賢沿流遡源嘉乃世臣之後誕揚恤典載在贊書某王某故祖父某以太祖之外孫尚世皇之季主富貴固其素有居上不驕智勇可謂兼全遇戰則克是以生名家之子迄能為死節之臣丕顯其先式開厥後是用遷封大國峻秩上公錫號表勳易名叶行旌邦家之一柱視宰路之多儀以發幽光以隆孝祀於戲九京可作賴有不朽者存奕世其昌保此無窮之聞英魂如在茂渥其承可故祖母伊埒追封皇祖姑趙國大長公主制於惟帝姫下嬪世戚雖生於宫掖車服不繫其夫而施于子孫家國俱賴其助肆敷愍册式慰孝思某王某故祖母某穠矣棣華粹然玉質在室不煩於姆訓為婦克盡於壼儀始自正家咸詠肅雍之德居然生子聿為節義之臣是用追啓新封進遷大國於戲若稽恤典名位何以復加垂裕後昆富貴所以長守尚惟不昧歆此殊恩可丞相特穆岱爾故曾祖父蘇海贈翊運宣力保大功臣太尉開府儀同三司上柱國追封歸德王諡武烈制水注而為江河其發源也必遠木大而為梁棟其植本也必深積盛德於百年嘉元臣之三世惟有是似曰篤不忘具官某故曾祖父某從太祖之肇基為元勳而佐命金甲雕戈而親行陳篳路藍縷以啓山林如霆如雷張六師之聲焰于疆于理開萬里之版圖聞鼓鼙而興懷幸孫曾之濟美兹用分茅以胙超爵而王儀既視於秉鈞階仍升於掌武表功柱國定諡易名誕錫殊恩遠彰前烈於戲有餘之慶始賞而復公侯不朽者存受祉以施孫子顧惟英爽不昧欽承可故曾祖母伊蘇衮氏追封歸德王夫人制録善追榮既封王而裂土抗尊齊體宜錫爵以從夫具官某故曾祖母某氏先正令妻元臣王母宜家宜室致門户之方興如山如河想德容之甚盛丕昭壼範庸拓沐封於戲顏如舜英慨浮榮之易落書藏金匱尚令聞之無窮惟爾淑靈服兹休命可故祖父布拉吉達贈推誠保德定遠功臣太尉開府儀同三司上柱國追封歸德王諡忠武制立身揚名嘉元臣之盡孝報本反始原祖德之自來乃備哀榮肆頒命數具官某故祖父某生為名將蚤事太宗效忠於憲皇授鉞之時迄平欽察宣力於定廟帥師之日遄有中原從世祖當潛見之初扈王旅征西南之國駐點蒼下大理言聽計從拔善闡平雲南師武臣力旋有征南之役俾代親王而行天不憗遺衆所嗟惜觀我家成大一統之業皆纍朝有不二心之臣流慶本支為今柱石是用表勳作諡掌武視儀聿作國楨肇開王爵偹密章之異渥慰泉壤之遺忠於戲一門萬石之家蓋益修於孝謹四世五公之盛尚永篤於忠貞佑爾後人欽豫寵命可故祖母額森氏追封歸德王夫人制雲臺麟閣越在昔之造邦翟茀朱幩盍從夫而有爵載揚恤典庸備追榮具官某故祖母某氏名閥姫薑能臣伉儷柔嘉維則既正位於室家警戒相成迄流芳於彛鼎宜其象服衍以脂田於戲五楘詩存無復平生之閔六珈儀盛猶當永世之傳歆此明綸安於顯祏可故父穆爾呼察贈推忠佐理同德功臣太師開府儀同三司上柱國追封歸德王諡忠貞制盡忠之士雖死猶生積善之家其後必大眷豫良弼慶自前人具官某故父某智勇而靖深雄毅而明敏左右世祖平定雲南旋扈聖於武昌入與謀於家國維時中統討叛濟南攻城每拔槊以先登對壘嘗褁創而出陳方王旅藉虎臣之力而將軍遺馬革之尸莫贖其身式開厥後兹用顯庸賜諡超爵分封躋三事以經邦表一柱而開府追榮身後式慰孝思於戲龍虎風雲秉國嘉象賢之嗣山河帶礪剖符峻異姓之王益闡幽光永垂來裔可故母蘇爾台氏追封歸德王夫人制忠於君孝於親既極報崇之典正乎外位乎內宜旌伉儷之賢是生偉人爰立作相盍疏湯沐以重蒸嘗具官某故母某氏琬琰自將笄笲素謹身間內則蚤積順於閨門慶衍後人寖升華於宰輔兹用從封茅土光賁幽扄慰報本之深思勵教忠之大義於戲孰不美副珈之飾生也有涯庶幾安列鼎之歆沒而不朽可故丞相和拉布哈贈闕功臣太師開府儀同三司上柱國追封歸德王諡忠獻制皇皇帝業念祖宗創始之難翼翼世臣備國家報功之典故具官某奮由閥閲勇赴勳名相我世皇時維中統省臺院寺詳酌古以建官文物典章新造邦之立政致規模之宏遠備左右之勤勞胡不百年可為一慨兹用王之大國位以太師既晉陟於階勳復兼崇其諡號以彰舊德以勵羣工於戲異姓封王命數蔑以加矣長富與貴忠孝所以守之尚迪後人欽承休命可故妻某氏追封歸德王夫人制念舊追榮朕所以王異姓抗尊齊體邦稱曰君夫人爰均國恩俾從夫爵故具官某故妻某氏必有令德乃嫓元臣朝廷有儀諒閨門之有度仁義相接亦夙夜之相成何間幽明益崇命數於戲夫夫婦婦澤既被於重泉君君臣臣義當明於奕世淑靈不昧寵命其歆可故知樞密院事達勒達哈贈效誠正義安遠功臣某官追封某諡某制洪惟皇祖於鑠武功厥有禦侮之臣備著捍邊之績用疏恤典式表殊恩故具官某起自世家奮為名將前無堅敵既纍奏於膚公願為忠臣遂益堅於大節究觀終始盍備哀榮賜諡表勳增秩超爵於戲國家之恩侔天地無間顯幽君臣之義昭日星惟殫忠孝尚迪來裔欽承寵嘉可故妻某氏追封某夫人制嘉我世臣已備報崇之典閔其君子亦惟伉儷之賢爵俾從夫恩昭追遠故具官某故妻某氏篤生華閥作嫓高閎宜于而家豈但矜其車甲勸之以義諒不廢於君臣迄致良人終為名將載嘉懿範爰畀愍章誕啓新封以光窀穸於戲萬鍾五鼎惜無偕老之年副笄六珈祭以如生之禮尚惟不昧欽此來歆可故中書右丞相達爾罕哈喇哈遜故曾祖父達爾罕竒吉里贈推忠佐命宣力功臣太師開府儀同三司上柱國追封順德王諡忠武制觀宰相繫年之表近閔良臣慕帝王有真而來遠思乃祖爰稽恤典誕播明綸故具官某故曾祖父某卓識超羣沉幾先物我太祖當在潛之際怯烈氏有害正之謀聞姦宄刻期而肆凶乃晝夜間行而上變我故有備彼乃成擒方涼土之未臣帥師克夏出金人之不意反斾平燕惟此有不二心之臣是以成大一統之業澤流孫子世篤忠貞嗟宰木之成隂盍分茅而列壤是用秩􅀈三公之貴爵超五等之崇節惠易名表勛錫號於戲風雲龍虎尚想見於當時帶礪山河期有光於奕世英靈如在寵命其歆可故曽祖母喀爾沁氏追封順德王夫人制勛莫大於造國念昔先臣爵所貴於從夫昭兹懿範爰申贈典以既朕心故具官某故曾祖母某氏生有淑姿長諧嘉偶室家閔君子諒每戒於懷安食漿迎王師故首明於歸往足光內則盍列世封於乎通籍禁中惜音容之已遠題碑墓上庶名譽之俱傳歆此異恩昌于後裔可故祖父達爾罕博囉齊贈叶忠翊亮定遠功臣太師開府儀同三司上柱國追封順德王諡忠毅制皇皇帝業念開國之元勛翼翼世臣嘉象賢之有子身亡而功固在骨朽而名如新爰著贊書式隆恤典故具官某故祖父某惟昔厥考乃心先朝義固有於君臣情實均於父子䇿勛盟府推第一之蕭何為將世家亦無雙之李廣延賞作千夫之長平金收屢戰之功逮及賢孫蔚為名相瞻言先正有慨豫𠂻是用儀視公台封開王爵表崇勛而錫號節二惠以易名於呼功加於時澤乃垂於後嗣世濟其美名勿墜於前人尚爾有知服我休命可故祖母旺扎勒岱爾氏追封順德王夫人制考德必論其世者欲浚忠厚之源列爵必從其夫者以著貞順之效伉儷之重褒恤是宜故具官某故祖母某氏靜柔其德淑慎爾儀夫既象其父賢汝亦稱其家婦誕敷漏澤光賁幽扄於呼異姓封王蓋以勛勞之舊父業傳子勉旃忠義之家尚爾淑靈歆豫寵命可故父達爾罕囊嘉岱贈宣忠孝節保大功臣太傅開府儀同三司上柱國追封順德王諡忠愍制事君致身克紹前人之烈生子似父聿為名相之家萃忠孝於一門歷祖孫而五世載揚異渥光賁重泉故具官某故父某沉深善謀果毅冠世蚤從憲廟有事西川轉戰無前既纍奏駿功之捷忘身臨難不幸遺馬革之尸世憐死事之忠天厚積善之慶成季之勛未泯紀于太常西平之子復賢光于奕世是用爵躋極品號表崇勛既視秩於三公復易名於二惠以旌大節以勵羣工嗚呼既死無復生惟榮名之不朽盛德必有報在爾後之能承國有異恩朕之篤意可故母托遜哈納氏追封順德王夫人制光榮纍世眷我忠臣之門赫奕殊恩顯爾夫人之德維兹之澤實自其原故具官某故母某氏慈順可貞靜嘉有則良人節義必是妻能勸其夫後嗣忠賢非是母曷生是子爵至王而極矣國之禮亦宜之於呼如山如河既追錫小君之號宜家宜室實有開奕世之祥益衍慶源永垂來裔可御史中丞托歡母旺扎勒氏封順德王太夫人制車服之繫是夫者妻之道身名之顯其母者子之賢肇錫嘉名有光世閥具官某母某氏篤生賢嗣世我良臣致忠孝之有傳亦保懷之能教是用因先王爵稱太夫人於呼召虎旬宣惟召公而是似魯侯燕喜壽魯母以攸宜欽我寵章受兹介福可皇太后故曾祖父追封濟寧王諡忠武阿齊諾延濟勒追封魯王仍諡忠武制洪惟壽母用宏濟于艱難肆朕眇躬獲丕承于上下推育慶兩朝之本宜追崇四世之親尊號皇太后故曾祖父追封某王某天挺英豪世積忠厚服勤太祖奄有庶邦逮事世皇遂為懿戚惟當今之聖善皆先世之沖和雖已啓於王封猶未蔽于朕志庸加異數改錫大邦仍忠武之嘉名備哀榮之盛典於呼黃河如帶泰山如礪國其永存新甫之柏徂徠之松廟斯孔碩尚歆景命允建外家可故曾祖母某氏追封魯忠武王妃制世為后族實顯有功夫乃婦天故從其爵式衍東朝之慶益疏戚里之封尊號皇太后故曾祖母某氏德為母儀言為內則風化素彰於閨壼祚胤乃正于家邦是生吾母之慈大受天下之養兹用貴其象服胙以龜蒙庸昭泉壤之榮以副宫闈之望於呼賢如明德惜馬氏之未王福萃太任底周南之美化尚其幽懿服我休嘉可開府儀同三司知樞密院事額森特穆爾故曽祖父嘉木和爾贈純誠保德翊戴功臣太尉開府儀同三司上柱國追封泰安王諡武毅制維師若尚父載嘉繼志述事之賢修法有魯僖爰舉崇德報功之典誕敷愍澤光賁幽扄具官某故曾祖父某慷慨激昻果毅沈鷙東征西伐必斬將以搴旗左翼右張實亡身而許國惟太祖之神聖識名臣之子孫用集殊勛大開厥後是用表東岱而賜履超五等而追王既錫嘉名復頒渙號於呼故國非謂喬木丕勞爾先孝子必出忠臣永垂後裔英靈不昧休命其承可故曾祖母翁吉喇特珍氏追封泰安王夫人制為婦配名世之家必有令德封王受曾孫之慶是豈常恩爰泝淵源式隆命數具官某故曾祖母某氏貞靜著于閨梱孝儉儀于族姻夫子無回顧之憂尊章有善事之譽立功者成其業為國者忘其家維爾之賢克正乎內是以弼亮至于四世忠孝萃于一門俾從列爵之封庸表為善之報嗚呼茫茫我土亦曰安若泰山蟄蟄爾孫尚惟生此王國眷焉幽懿歆此明嘉可故祖父蘇爾呼圖克贈推誠宣力佐運功臣太尉開府儀同三司上柱國追封泰安王諡忠定制有大勛勞必世享其祿位追榮典册宜先逮其祖宗眷惟閥閲之家可後寵章之恤具官某故祖父某謀而能斷勇而不矜專摧陷廓清之功而弗居備險阻艱難之嘗而弗挫述乃祖帷幄之寄啓厥子柱石之隆至于孫而益昌皆其德之未艾是用泰嶽中土也以為爾邦王章大名也以為爾爵申以嘉號備其異恩嗚呼慨念先朝可謂得人之盛尚迪爾後亦克惟朕之承與國同休其命弗替可故祖母唐古珍氏追封泰安王夫人制婦之爵從其夫古今之達道祖之榮及其妣國家之至恩既積顯庸宜臻異數其官某故祖母某氏謹身節用嫓德娠賢家門增盛大之基朝寧獲忠良之佐上不墜于祖訓下益衍於後人所謂世臣亦惟爾敬是用分茅泰嶽襲爵真封永以王夫人之稱配食忠定君之廟嗚呼魚軒翟茀何殊貴盛於當年瑜珥瑶環尚迪子孫於百世幽靈不昧休命其歆可故父某官贈推忠宣力贊運功臣太傅開府儀同三司上柱國追封泰安郡王諡武穆博爾歡加贈推忠宣力贊運功臣太師開府儀同三司上柱國追封泰安王仍諡武穆制開國承家惟克篤於前烈定功行賞以啓佑於後人爰備哀榮庸嘉忠藎具官某故父某官贈某官某勇智似乎祖父勳業冠乎朝廷在世祖成宗之時備出將入相之績誓師南指淮海來歸轉餉西征關隴晏卧降王斬帥絶施勞伐善之言執法秉鈞得憂國愛民之體上既委以心腹爾亦竭其股肱蔚為名臣載在史氏雖已加乎寵命猶未愜於朕心是用節惠表勛錫爵啓土追恩既往垂勸方來嗚呼天有柱地有維不憗一老河如帶山如礪其永世王禰廟有光朕命無斁可故母追封泰安郡王夫人克哷展氏加追封泰安王夫人制夫得賢婦子有賢母惟家之隆生違至養死獲至恩斯善之報爰疏異渥庸表幽扄具官某故母追封某夫人某氏柔順利貞恭儉節用以爾茂族相我元臣立非常之功有無窮之聞篤生令子復列中朝襲數世之勛勞保一家之忠厚是用錫河嶽之履為湯沐之封以示寵綏式昭愍恤嗚呼木欲靜而風不止嘗聞孝子之悲源之深者流必長尚衍後人之慶眷惟魂爽服此休嘉可母扎拉展氏封泰安王夫人制報功者君之仁顯親者子之志用章孝治誕布明綸具官某母某氏有林下風蔚閨中秀嫓德元老宜于而家教子義方利於吾國兼為婦為母之懿備從夫從子之榮是用錫之山川隆其命數昭世閨範稱君夫人於戲象服是宜雖君子不能偕老正位乎內而家人見為利貞益介壽祺茂對休命可雪樓集卷三
