body:
  text: 雪樓集卷十七元程文海撰碑銘翰林侍講學士張公墓志銘大德七年五月癸巳翰林侍講學士清河張公卒於亰師嗚呼公固博洽通達之士也至元二十三年某以侍御史受詔選士南方未行聞廷紳有言公賢者既至杭公為博士時猶未識公而舊識識公者人人言公與所聞同也暨識而心察之又同也乃薦之明年報命有㫖問所薦有可相者乎對曰惟上所試以觀其材耳由是公晉居憲幕嗚呼今二十年矣豈謂當執筆銘公之墓也讀其述曰張氏系出清河支居崇德曽大父汝昌京學諭大父一新宋承務郎致仕贈奉直大夫父琥宋朝議大夫崇德縣開國男母恭人葉氏家世為儒至朝議公而門益大公名伯淳字師道幼已卓然九歲舉童子科又以父任銓受迪功郎淮隂縣尉改揚州司户參軍尋擢進士第監臨安府都稅院凡事五府主輒俾贊其幕議最後者倚之尢專易鎮又挾與俱公亦悉心佐治功冠一府民至今不忘升觀察推官除太學録然自此歸矣至元二十三年授杭州路儒學教授除浙東道按察司知事在官二年五祈閒不遂二十八年朝廷重振綱紀擢為福建亷訪司知事歲餘有頌美於上前者遣使召問明年驛以入見若冗官若風憲若鹽策楮幣皆當時大議清問及之對悉當上心由是大加賞識命至政事堂將大用之而辭孔力益簡注焉遂為翰林直學士今上龍飛詔命多出其手進階奉訓大夫仍先職知制誥同修國史史成既進無覬幸心即請急以歸明年進奉議大夫慶元路總管府治中一府推尊之事必咨焉行部使者過之輒曰此有張治中在可無庸留也省檄按疑獄衢秀州咸得其情事已因過家與其伯氏相從嬉遨不忍頃刻舍去榜其室曰養䝉若將終焉然不獲遂大德四年即家拜翰林侍講學士明年造朝扈從上都還請老不許又眀年夏病終于官得年六十有一有司護匶歸里夫人趙氏前十三年卒以公治命合葬于崇德州石門鄉通賢里沈莊之原秋七月己未窆子男五采永嘉郡文學掾復本還皆蚤世杲尚幼女四孫男四燦煥爚焌女一讀已因為之言曰世儒於世往往扞格不能相諧惟師道也天資髙明濟之敏裕疏通豈弟文事偉如事親惇宗尊賢信友述之者尤亹亹不置其蒞官臨民所歷有風采或能道之至其亷於利淡於名惟知之者知之耳嗟夫立賢無方殷士膚敏以師道之材逄時遇合何所不可為而僅爾命也歟抑將集於其子也銘曰景星慶雲醴泉芝草天道地寶可以永好而不可恆保嗚呼師道僉福建提刑按察司事曾公墓志銘曾本鄫也國入於魯而為曾自郕公父子遊聖門而氏遂著南豐先生出而東南諸曽為聞家公上距先生七世其先徙居撫州金溪謙之宋贈少保貫道宋贈少傅鈺宋舉進士官至朝議大夫贈少師為公曾祖祖父母黃氏臨川郡夫人夫人三男子鴻子吏部左曹郎官淵子參知政事伯仲皆進士甲科冲子字聖和公也少以父任補官主潭州瀏陽縣簿趙丞相葵宣撫江東西辟佐吉州節制司居三年州守移溫又辟以自助府罷調臨江録事參軍丁少師憂服除連應杭升二府辟改官知仁和縣嵗中提轄左藏封樁奉使督運未還除司諸軍審計遷太府主簿兼刑部郎中出守南安軍積階承議郎未幾罷郡歸至元二十四年憲臣奉詔選士公起家授承直郎僉福建提刑按察司事二十七年以老病丐閒不許明年代至乃歸大德九年五月某日以疾終得年七十有八公生而凝粹端敏好學諸先達咸愛之少師嘗病甚焚香祝天願損已壽七年以益父父病尋愈後果止七年蚤間吏事初仕攝太和太和劇邑即有能聲府委以他務無不力辦裁决皆中機㑹由是一時名公卿辟舉交至仁和富民爭財而毒殺女兄粥獄求脫擲其奸市有劫盜官論十九人以死曰此盜也獄具而公至閲其狀曰此非盜也將理出之時盜發都城官吏皆當坐幸藉手以免語共侵公公恚曰後獲真盜吾一官不惜若十九人命何力伸之獄遂逭俄而果獲真盜所剽具存衆乃大愧十九人遂雪閩部逺且險吏乘為奸民迫為亂公行部所至先以榜檄警諭感切之吏相顧聳戢或棄而去向之山藏澤嘯欲出不敢者得檄皆麇至拜庭請罪侍御史吳公曼慶來見公所為喜非公分部亦檄使行有囚殺人當死省貴人私出其罪約公蒞刑公曰如律則往蒞通鄰妻而毆殺己妻丐吏蔽以誤殺亷得讞正之奉職往往類是歸而益老治地於南郭命曰樂丘題其門曰生處樂死便埋至是諸子奉其柩以某年月日窆焉夫人氏先鄭後李男子三文樞文機文棟女子三長壻趙某公性好周人之急鄉鄰喪葬必親之年飢必振之持酒縱橫卷舒自適與人語惟恐傷之病革猶衣冠對客無憊容為詩云云將瞑笑而逝先葬文樞輯公行事如上來丐銘某既諾則念往者將㫖搜羅時公以故侯家居或以公為言者曰生民休戚惟湛浮閭里者知之亦必能吏而後能知吏治得失雖今故殊時然若斯人昔者之敏明又將之清慎而勤力其可余曰然今視其行事信然然使未老且不病當猶有可書銘曰死者不可復生斷者不可復續斯古人訓以哀敬折獄也然或不能審克則利令智昏播糠眯目又烏能若此之堅决彊毅脫民於無辜之戮哉故同知寧國路總管府事楊君墓志銘余自為諸生時見前太學楊君必大所為文或有識之者曰此篤行君子也至元中余待罪臺端將命旁求于野至浙東問官吏爵里有宣慰副使楊某試問之即太學楊君也因録其名氏薦之自是弗相聞後二十年或以隧識介其子天合見余於京師曰父殁久矣而墓石不文敢藉以請請不已噫余知之何辭費為君字伯起世家臨海傳春秋學曽大父􅎵宋迪功郎大父定宋通直郎江隂軍教授贈承議郎父元績宋承議郎知山隂縣事贈朝奉郎母林氏封安人君少孤能自力于學由鄉貢入上庠試藝輒冠群遂釋褐教授南劒㑹長二缺因攝其州以辨治聞擢教京庠丁林夫人憂服除為户部掌故升録國子連進為兩學博士又丁家難起知台州積階朝散大夫官兵部郎中至元十三年以州歸國城邑賴以安全就加本州安撫使以病謝事十九年入朝授中順大夫浙東道宣慰副使屬衢婺有寇行省命往治軍至則别淑慝以釋纍囚獲免者餘數萬二十六年同知寧國路總管府事居三年再以病謝三十一年八月十三日卒于里第得六十有八年以其冬十月辛卯窆于臨海縣興國鄉石鼓山之原循先志也初娶于鄭封恭人又娶於曹五男子天祐天任天合天說天協一女子壻陳處約孫男女九人生平終始一亷得祿輒施故白首僅給寬厚謙挹襟度灑然善談論為文下筆立成有集曰中津亦曰中齊人因曰中齊先生其隧識云爾以余舊所聞君之行事具諸人者多不著然其清介敦朴不為赫赫以諧俗取寵益信其為篤行君子也是宜銘天合早孤今甫世其祿能勤尊顯表發所親之志是宜可嘉不可辭銘曰謂為善必名揚乎則比屋可封者奈何不必揚乎則守一節者亦或載而旌其家矣君子曰彼以其少我以其多盡我而已遑恤其它嗚呼是惟楊君之墓石有泐勿磨楊漢卿墓志銘國子助教李君鳯言於廣平程某曰僕幸甚邂逅親承下風愛重人物頗習知公之夙心有楊希震漢卿者從母之夫也本單父人其考曰通字伯達嘗為魏郡幕僚僑居睢陽又徙東明實生漢卿幼學於鄉先生王清之超悟不羣師逸功倍同輩有爭輒為排解或羣質於師則為之甲乙曲直不詭不阿師甚竒之父亦曰異時庶幾關西夫子乎因命之名少長無所不習旁通譯書燕南宣慰同里宋公廷秀愛其材欲與俱至京師辭以親老戮力以奉甘㫖考八十妣七十咸以夀終漢卿時亦半百毁瘠過禮既免喪喟然曰仕或為養也今孤且老尚復何為因屏迹村墅手抄詩書乘耒耜以率子孫家由之肥漢卿天性直諒重然諾周急成美有義俠風鄉黨宗族有難平之事不之郡邑而之漢卿漢卿聲音鴻爽身容偉如面剖是非可否無所避千金之産百年之仇皆語下立决退而相與守其言不敢少變亦有望廬而退遽畏其知者其配張氏唐鄧鎮守總管之女亦克相夫成家三男子曰謙曰讓試吏有才曰誠四女子一早卒壻曰李某王某宋某皆士族孫男若干人其家浸盛去年春漢卿屬微疾不出户一日忽獨語曰吾止此耳聚其家人而告之曰生死常理王公猶不得免我死爾輩母戚也指臧獲曰此輩助爾服勞可均衣食毋偏也具盥沐衣冠倐然而卒時閏正月十四日也後三十七日辛酉窆于村之西南且遵治命遷祖考妣㑹葬焉今者僕誠以為漢卿材器若此不幸不仕不少槩見而死心誠悲之公倘不廢言則幸而丐之銘不幸猶幸也余曰諾信如子言古慷慨竒士也然使出效一官則繳繞拘閡亦未必能行其言若是嗟夫人生貴適志耳豈必仕哉銘曰孝於親信於人頴焉而揚英淵焉而潜珍擬之古先誰之倫歟故紹興路儒學教授蔣君墓志銘固陵蔣君諱世傑字俊民自幼已負英稱由進士入官嘗參建昌軍事云今五十年父老猶誦嘆不忘至元中余識之京師相從夜語典刑碩儒也後又識其二子於江都皆犖犖有父風於是余胥疏江湖之上二十年矣今年秋其子太常博士述君里系官次求銘然後知君物故歲月家夲光州父諱克勤宰邑象山愛其風土因家于明君生十四年而象山公沒大父母皆無恙君已能孝長慈幼翕然以和學於舅氏舅氏名士也深器之宋開慶已未中進士第尉黃岩遷泰州録事參軍母喪釋服遷録建昌清敏公勤受舉於前後三太守最後守念其拯飢盡瘁欲再薦之君力讓其同幕由是益知名遷安慶府司理參軍沿江制帥素知其材德羅致幕府通署三司事至立决咸當其情帥問知君所署者輒不復視即奮筆畫諾與總餉使者共薦君于朝帥既去君亦還郡郡將倨甚君與抗不懾改授宣教郎知福州閩縣遷提轄榷貨務遂歸國朝浮湛閭里者十二年授無為路儒學教授始至即去又七年改教紹興居四年而代又四年病卒于家得六十有九年是為大德五年六月二十八日先娶于趙繼娶于洪皆先卒七年正月二十一日與二配合祔于邑西梁家嶺之先兆始君之將葬其親於此也雨君𬞞食露禱者逾月逮事而霽人皆異之生平恂恂亷讓惇厚平恕不欺長幼貴賤待之如一心無宿怨口無訾短人有小善惟恐延譽之後里有疾必調藥手飲之或遂周而振之農談草坐無間然焉讀書賦詩迄于沒有梅心先生集若干卷藏于家四男子汝致有篤疾汝霖佐郡幕後君五年沒汝礪博士也家方以之大汝翼亦登仕版一女子壻曰安陸府儒學教授林理孫男七曽孫男女五銘曰懷哉蔣君古之善人彌積而長不在其身蔽芾甘棠亦有遺民懷哉蔣君故徽政院中議田君墓志銘至元中裕宗皇帝監國某幸以文墨待罪禁林時時與諸老近耿光承顧問退坐詹事府廷欵語移日見司徒張公平章王公以謙敏忠勤之姿表裏翊濟履屐之間無不勝任一時宫府號為得人若田君輩是也田君字吉卿名永祚先自延津徙稿城至君始業書推擇為吏宫府初設官屬起家為侍衛軍掾成宗在邸俾宰常州武進兼總宫府財計辭不就升掾詹事遷提舉備用庫使撿核鈎較無纎芥私遷大匠副總管大德初隨府升副都總管善於其職皇太后纍加賞歎進為徽政院長史賚以燕衣六年轉徽政院中議積階自承事郎至朝列大夫九年十一月二十九日卒於官十年十二月某日葬於稿城縣某鄉某村之原其孤以太常博士蔣君所為狀來求銘蔣君故與若同事知君為詳剛特明敏見義必為其居幕中凡論一事發言盈庭人人自是君徐起而評之辭簡理盡無不犂然心服咸自謂莫及也遇有不可必力爭不屈一府深賴之每嘆俗日以薄至自忘其桑梓故於鄉黨彌加勤懇因君而仕郡邑者數十人來則館去則贐或與其子同升仁厚之言篤實之行見於居官治家者如一誠可謂賢哉丈夫也而歲僅五十有四不究其用奈何娶于陳于李子男四逺奉宸庫提㸃寧太常奉禮郎亨國子學生貞尚幼女三長壻曰趙庸中相府譯史三未行逺嘗官武昌甚異其材今聞君大槩人信有所夲哉銘曰大厦之構大匠之掄材無短長用有詘伸何以謂之幕中之畫何以誄之尚世其德故昭勇大將軍欽察親軍都指揮使巴約特公墓碑自昔聖哲開創之初必有股肱心膂之臣翊佐鴻業無有疏戚悉肩一心上之所以策厲激昻亦非必兼金聨組至論其終所成乃皆卓然非後能及嗚呼盛哉哈里幕北舊國也巴約特氏國中右族也太祖聖武皇帝初定四方哈里內附巴約特氏內徙有愛伯者來居濟隂重厚沈鷙以五十户從軍南征力戰死事子曰伊蘇岱爾世其官即昭勇公也世祖皇帝命丞相巴延經略襄樊公在行功多百丈山鶴子灘最賞銀鈔八十兩長圍合公被甲先登賞銀鈔百兩明年破復州兵殺其將賞以百户主帥言賞不酬勞上錫金符加千户督五路招討十六年改授金虎符管軍總管江南平録功進階懷逺大將軍管軍萬户領江淮戰艦數百艘東征日本全軍還有㫖特賜養老一百户衣服弓矢鞍轡有加二十二年移鎮泰州時籍漸丁為兵得萬人以公為欽察親軍指揮使統之公於是以舊職讓其中弟餘則分俸贍之納延之役功多賜金帶明錦以納延姑姊妻之大德三年春二月以病卒於官墓在曹州濟隂之白塔原正室二人托郭先卒子曰嘉琿逹曰哈斯襲公符職繼室額蘇掄子曰哈迪牧馬户同知曰延夀側室三人孟格津子曰巴延管領哈喇齊曰靈保次哲古子曰旺扎勒特穆爾廣德萬户府逹嚕噶齊次錫喇克沁子曰哈喇章尚幼孫男曰呼圖克曰法保公沒後九年而當大德十一年今天子龍飛其冬公子欽承恩㫖俾樹碑于公墓公子乃以公事實屬某文之于碑惟公忠勇純誠致身國事摧鋒無前聖眀在上以庸詔䘵卒能佐興運平四方身佩信符為國大將建邦之略事君之誼視古無間焉聖上崇德報功俾彰不朽誠萬世一時之偉遇公子又咸英毅有立或踐厥官將必大世其業獨惟文辭弗稱無能發揚而公子既屢以為言敢弗自竭申以銘詩曰稱戈㑹周致梟助劉有宗於斯其朝如流惟君之眀藏袴有待惟臣之忠夙夜匪懈上信下孚以勩以愈兵包虎皮遂長萬夫遹觀古初力與時奮豈無其人貴有令聞嗟爾人子孰不顯親孝為忠基來視雕珉雕珉孔崇聖明與之宰木維喬子孫樹之純德郭先生墓碣大德十年三月十有八日長樂鄉先生郭君卒年六十二五月二十有七日葬穫嶺之先塋皇慶二年夏五月子履拜余亰師乞文表墓其友南雄教授陳立翁亦以書謁余曰郭先生死且葬且祠于校宫而未有易其名稱者此門生故友之闕也皆請曰純德先生至元二十九年余觀閩風居君家君日相從文史甚歡知之深宜莫余若也乃次第其行為之文君諱隚字德基其先辟梁開平之難繇期思抱汾陽廟器從王審知入閩至長樂芝山下居焉世明經號書厨郭家曽大父囦大父已千父正子第進士教授亷州著春秋傳論十一卷是為存齊先生君生十一年而孤母林力貧節用以教育之君亦自奮厲於書無不讀尤深經術弱冠已為人師宋咸淳中補太學博士弟子員國亡居鄉講學至元中郡舉遺逸授泉山書院山長遷興化路教授秩滿丁母艱服除改吳江州教授代還邑長二執弟子禮相從問學方議建精舍於六平山是年冬所居屋西偏所植梅忽槁死君見之微笑眀年春再調興化未行屬清明歷造鄰曲親舊歸課僮僕覔葵栽兩兩植庭下至夕無疾卒聞者莫不悲啼太息涕泣沾襟曰天何奪吾德人遽甚君平生志慕髙尚所至多佳山水游覽談宴無虛日而職無不辦又以學行文章為人所宗名聲籍甚余去閩幾二十年思其人未嘗遺於心亦不謂如是而止也豈非命乎蓋嘗論其談經明白統貫不刻鑿以為異其詩若文和平沉深不琢鏤以為工其為人疏通慷慨謹簡易直不矯亢以為髙其為子為父孝以慈其與人交彌久而孚益逺而不可忘謂之純德不亦宜乎娶李氏二子履沉質魁岸有材略由太子太傅府長史遷奉議大夫知靖州鼎好學有文龍江書院山長女嫁進士陳嵩先二年沒有易述四書述梅西集各若干卷立翁又曰郭先生性愛梅既葬其子於墓所遍山皆植梅隆冬花間遙望如積雪若見先生之精神標度焉余既題其墓曰純德先生之墓故乂表其阡曰梅阡云銘曰奕奕郭氏明經世閩載生純德允迪前聞玉雪擬質星霞耀文可法可尊粹如春溫我思其人梅花之原嗚呼先生尚篤後人張氏宗㑹亭碑宗㑹有亭東平張氏所以會其宗也宗法之不講久矣相遘於塗未知其孰尊卑執手相爾女視財勢為輕重乃至相搏捽於市朝有司顧獨曰俗不古俗不古嗚呼斯民也三代之所以直道而行也嗚呼不意猶有斯亭又不意猶以斯而名斯亭亭在博昌趙村實張氏令子某所建蓋張氏世家東平金之季年徙大梁又徙歸德復遷於睢艱閔顛沛子孫或還東平或居博昌居博昌者為墓於斯奉曽祖考妣衣冠以葬而遂葬其父母焉博鄆鄰也歲時子孫上塜不廢由是某意匠斯亭以聚宗族嗚呼人生兩儀中政如萍之生水不蕩於波豈不終夀駢足聚面然而非所必也於非所必之中而求盡吾情司造物者獨不念之乎雖然由宗而言有五世百世之分由張氏而言則有鄆博之别於此而不失其宗以㑹其同則以念祖宗者而念昆弟由昆弟以及子孫雖百世可知也語不云乎慎終追逺民德歸厚以若張氏所為厚之至也豫雅不樂虛文覩張氏所為矧又有請喜而誦之嗟夫人有此心亭有無非所計也家有此亭記有無不必論也然則吾多言哉冀國王忠穆公墓碑聖天子既踐阼惠澤充洽宇內欣欣褒寵所加罔間幽顯先是榮祿大夫平章政事王忠穆公既葬之明年朝議恤典議甫定先帝鼎成公之嗣子桓帥衛兵扈翊聖天子龍飛忠勤焯著三宫咸嘉賚之由廣威將軍同僉徽政院事進階資德大夫徽政副使有㫖復伸前議贈公金紫光祿大夫大司徒上柱國冀國公諡曰忠穆配李氏贈冀國夫人俾樹碑墓所有司欽承惟謹謹按公夲稿城名家考諱善金吾衛上將軍右副都元帥功在史牒公諱慶端字正甫幼已卓然自異考甚愛之年十三遭父母憂既免喪即喟然有逺志初為郡管庫也衆或乾沒公獨不汚亦不訐為水軍提領也練士恆如臨敵軍帥當逺餉和林公請代行訖事而返敗齊寇於老鶬口授金符為千夫長督城大都議固以甓公請衣以葦遂省不資上將賞公曰職也奚功且有聨職顔進在遂併賞進千户别賜公白金三百兩旌之平李璮公與有功王師南下助戍清口宋人覘知虛實急攻不解守將戰死城欲覆公拔刀誓衆樹柵以守臂毒方劇因割去之裹瘡力戰城卒以完群盜四起復擊走之進武節將軍官軍總管領左右中衛兵扈從北征還遷右親軍副都指揮使進侍衛軍都指揮使時衛兵雜處因建威武營以居之經畫田廬各有攸業别命一軍曰神鋒教以蹶張之技堂曰整暇時訓練也局曰犀利匠戈甲也資食之倉以足儲康濟之局以虞疾浚渠通舟列屋取僦營之如營家於是代卒至者如歸諸衛悉來取法是役也衆始難之既則利賴之至元十九年建詹事院就兼詹事丞時威武富儲峙有司來貸數萬石粟裕皇以問公對曰兵民等耳何間焉即日與之上奬公為宰相器上嘗遣近侍夜出伺察為邏卒所執告以其故卒曰軍中唯知王將軍令他不知也近侍以聞上賞公皂貂裘東征納延特敕公以所部扈從公時年六十餘矣在軍中與士卒同甘苦晝則擐甲執兵身與敵遌夜則引車環列卧不解衣贊畫經略小大仰成暇則俾士卒為軍市縱其𢡟遷故連年暴露而軍中富强東寇既平大駕北巡命公以其軍先歸公引義以請復扈北上而還僧格専政公略不附之裕宗升遐公獨以漢將膺宫朝心腹之寄備殫忠欵成宗即位論翼戴功拜金吾衛上將軍中書右丞行徽政副使兼隆福宫左都威衛使進階資德大夫大德二年加榮祿大夫平章政事僉書樞密院事兼使如故公年與位髙而勤力益不懈加以謙下仁厚濟物在心至其自奉甚簡得上賜輒以治具賔禮臺閣名流次及鄉黨親戚餘則班諸昆弟宗族之貧者曰是皆祖宗之枝葉也吾受祖宗餘澤忍坐視而不恤哉長者為畢昏姻孤者為具田宅死者為治喪葬人或有所干援外深拒之而隂為之地人徒賴其成而罔知所自宋既亡有內戚久拘京師公既常周之又請縱而歸之其在軍也請尚醫自隨士卒有疾視之如子軍中相語曰吾屬家居父母猶不若是勤也物故則必以槥歸北征還偶遺其一必獲之乃已然紀律嚴眀不為姑息平居瞑目匡坐一室乃至竟日不為寒暑而變剛毅亷潔忠勇幹敏謀而善斷能而不矜懿禀自然中於大道嗚呼所謂天地之間氣者耶世祖皇帝嘗賜公玉拄杖人謂表其足倚杖也初疾裕聖皇后命髙醫視之輟膳與藥畀之曰活此老所以活蒼生也嗚呼知臣莫若君豈非然哉裕宗在東宮衣帶金帛之錫相望成宗念公宣力久初即位既遷公官隨以厚賜及謝事卧病遣中使諭㫖謂公篤實家無餘財給湯藥費三萬緡且曰病起當有異恩然竟不起將終力疾謂嗣子曰以位以年吾無所憾獨蒙國厚恩不得效命邊方以此為恨耳爾勉輸忠勤毋忝爾祖則吾目瞑矣公既薨嗣子繼任宫朝肖德趾美上下交孚遂進為榮祿大夫平章政事兼使如故三宫眷賜有加未艾被遇與公生平略等西平以來於斯為盛公之行樞密判官張浹述之詳公之墓翰林承㫖閻復志之備今公嗣子既服上恩謂某於公生平惟舊且適當筆爰屬撰具其事於碑某因伏自念至元中親奉世祖皇帝玉音俾入翰林與諸老伍遂獲時時入覲東宫退坐宫府公輒張具促席亹亹甚歡今三十年矣名迹棲遲文字淟汨豈足光昭眀良之盛然倘獲牽聫不朽與有榮耀用不敢辭謹著其完名大節如右而系之以詩曰大鴻力牧邈已猶徴國有藎臣奕世其承允矣王公喬木之英粵昔草昧野有𤣥黃元帥之旗望如金湯厥佑伊何訊之鎮陽義與仁俱善積慶餘萃於一躬仡然萬夫謀定功成匪棘匪徐羽林天軍其屯如雲亦有帝城奕奕誾誾視此無疆繄誰之勛翼亮三朝不愆不恌長樂未央晨門夜刁誰扈東征大將嫖姚先公後身約已豐人分祿無贏燕及九親貴貴賢賢羈旅懷仁君聖臣忠貴富均崇甲章九原柱國上公嫓德之良追沐冀封豐碑言言有命自天盛德之輝彌山貫川尚列鼎彛旗常孔宣當陽之初公子實劬股肱腹心匪公曷如傳業纘名屢不一書以有殊榮以篤其慶億萬子孫式顧寵靈永弼皇家淮清以寧楊隱君墓銘周君宗禹以其外舅之述來視之弟為兄述也意鬱詞悲不無望於立言之君子而周君懇懇洊以屬豫豫惟其天倫之愛甥舅之誼也乃為之銘曰南臯翁楊浩然家弋陽父元龍諸老游惇義方翁幼悟師碩師沛辭章命數竒進輒郤卷而藏家蓋肥子裕蠱樂倣徉生丁酉以未終七十霜娶於方繼以黃亦先亡方三子子應有壻趙湘壻宗禹義與文庶子雙孫有三男曰實二女郎州鉛山峯芙蓉閟幽光刻銘詩慰死生其永藏集賢直學士同僉太醫院事歐陽君墓志銘至元中四方既平民物豐殖天子思得俊乂布中和之政與天下息肩凡一技一能無不召見陳所長方是時岩穴草野之下聞聲自喜揚英舒翹頴然如景風靈雨之被也新定歐陽氏以醫聞再命而後至留京師十七年沒而其子以狀來丐銘余惟銘墓非古也亦必有茂懿焉然余聞其郡之初勸駕也以親喪為解後十五年使者自京師奉璽書偕二千石及門乃起應詔是其中之所存者深乎其狀曰歐陽氏自圖南者遷新定生宗禮以醫起子大莭遂有聲孫淇益箸曰吾救人多矣後必食其報是為君高曽祖考君名懋字勉翁生有異質於家學夙成既至召見應對合㫖命坐賜食賜貂裘帽錦衾褥城東宅一區食尚醫祿加月餼復其家遣使專致其孥再賜城南宅計口廪膳凡所顧問對輒契合所進方藥常御又賜玉帶名馬太子北上和林上愛之深意欲君從君慨然請行太子踐阼是為成宗待君益厚意有不豫見輒釋然無時不召好賜有加歲時嘗從上上都大德十年獨以疾不能從成宗益不豫君病亦侵十一年五月二日遂殁年六十有三歷官成全郎御藥局使升集賢直學士奉訓大夫加朝列大夫太醫副使又加太中大夫以直學士同僉太醫院子男印孫男同祖光祖女曰淑君將沒謂印曰吾常以素餐為懼故不敢乘時為爾干祿爾其善自樹以成身噫信斯言也所存誠深矣其可銘印奉喪南歸將以某年某月某日葬墓在某鄉某里之原銘曰我聞魏徐來自丹陽道與時俱冕服九章曷若歐陽若岐於黃二聖在天往哉毋忘太平路儒學教授徐君墓志銘往年嘗述釣臺二徐之貞時徐父晞顔無恙也後二年其子蘋以史官袁桷所為家傳來曰吾父殁矣公幸矜而又賜之一辭按其先自太原來曽祖某祖禧父景榮晞顔字子愚居宋太學中試輒髙第歸國朝歷廣信安吉二郡博士秩滿當遷曰我願為博士耳集賢薦為湖南提舉曰母老不可逺也乃再得姑熟所至以扶道樹化為己任修治先賢冡請蠲諸儒力役桑門氏將夷安定胡先生墓力爭而復之性仁厚俶儻初遭父喪適歲儉悵然曰飯佛老徒曷若飯餓者乃大賑得食者數萬人兵餘因以飢疫棄俘遺殍狼藉君募飢民掩死扶生身自臨視可活者拯而活之有女子氣僅屬曰我儒家子也載以歸稍長治裝妻儒家事繼母盡孝妻偶一語非所宜即自罪不內居幾月母為解曰無之君乃叱妻拜謝然後已母黨質田久君對母折劵請歸之在信州母偶思歸即棄官奉以還有友客死為治其喪又嫁其孤所為率若此娶於某氏有九男子觀先卒頥為族人後艮革節益晉萃復二女子曰清曰淳皆能潔身以死孫男女二十三曽孫男女三生以宋端平甲午二月二日殁以大德丁未十月七日葬以某年某月日某鄉里茆岡之原其兆也有集十卷將殁命其子曰我無贏餘而好周急今方荐饑我死慎毋營佛老事第為我活里中人足矣銘曰古之孝者皆以善事繼母致稱蓋能盡道而格無情也既孝矣又推其仁以及物且終始不二若徐君者始可言太學諸生哉臨淮縣尹蔣君墓銘濠上蔣君㑹龍董淮左學校八年士興於學學無闕政遷令臨淮數月棄官去有子曰培亦儒也以文無害為行中書掾積勞當豫秩將或亦為令夫令果不可為乎有為之者矣可為乎何為而不為也亷將軍既棄於趙嘗一為楚將無功曰我思用趙人蔣君儒先生長者嘗舉於鄉與儒居蓋久一旦有簿書期㑹之役宜不勝而自免也若培則必能為之矣其去也就養餘杭大德乙已秋卒因葬餘杭越三年培以壙記來告銘蔣以國氏期思故蔣也先繇期思遷婺其父秀升又遷濠梁而生君君卒時年七十一矣娶於周一子二女再娶于劉培有三子今年實至大元年墓在錢塘縣某鄉玉岑山官由將仕郎淮東道儒學副提舉遷從仕郎淮安路臨淮縣尹銘曰稷嗣君衣楚製從沛公齊魯間羞稱之其後公孫丞相初入關友人戒之曰母曲學以阿世蓋猶徵稷嗣君也觀蔣君不肯為令與不為主簿者何若語有之孟公綽為趙魏老則優不可以為滕薛大夫信夫鄭真人碑夫寒暑之所以不忒天地之所以長存是蓋有其故矣昔者聖人修其可知者而其不可知者固已周流其中非必蘄於治世也而世恆以之治後有得其粃糠土苴已足自附於聖人以之為身則身安為家則家理為國則國以小康然教始多岐矣猶龍氏之寶三曰慈儉不爭夫果慈儉不爭也則在宥天下者庸詎不樂於此哉今之所謂大道者其守慈儉不爭之寶者與大道之流豫不能探其源其見于紀述者已十世其十一世之祖曰鄭君名進元以宋咸淳三年五月十四日生於永嘉家夲儒也幼值亂離至于輝州悟真大師党君器其頴異留使之學遂通孔老二氏言時年十三矣明年大道第七祖李真人祠嶽過輝一見許為道器且謂党曰吾二人皆弗及見後一紀當至堂下也党亦不諭既而李党二師俱逝至元庚寅君從衛輝道録賈師來燕扺天寶居堂下適十二年矣第八祖嶽真人異之授以戒牒道名留之不可歲癸巳再來今齊王以紫衣旌有德師與焉又受明真大師神籙祕訣及親書道訓四章自是術業蓋著治病立驗賈師逝君喪之如所生進嗣其職第九祖趙真人於君彌屬意而早逝大德六年第十祖某真人召之者三至則以為都提舉付以祖師經筆琴劒為詞一篇授之師再辭不獲乃為詞以復遂嗣焉十祖逝喪之如賈師而加毁蓋昌平之阡為地七十畝樹而周垣之碑第五祖太𤣥真人之功于龍山又創衆真堂于天寶以祠傳教諸師買園畝百餘於故都之東種柳於宫隂古河之堧歲用以裕八年有㫖命君設金籙大齊于天寶宫既事錫號曰演教大宗師明真慧照觀復真人明年又命君設大齊於玉虛宫又明年再命設於天寶禮畢進見喜動晬容賞延於衆甚厚然君退然若不勝一日召左右告語若將留訓者弟子咸以謂年方强豈遽如許十二月命召普濟大師張君於秦中明年四月當朝上京未至疾作謂侍者曰歸期至矣普濟當嗣遂以五月朔終於龍山弟子奉封于五祖之兆之左其勤者又封衣冠于初祖之兆之右又封于輝蓋以君所自也某地昔為大元觀今為頥真宮君性謙慈和易留心經史學者一見終身不忘善於奬勸咸歸心焉雅善生財興構雖多而未嘗丐假若術之靈著又道之緒餘也編修朱某述其事為詳其弟子以碑請于承㫖清河公而公以諉余碑宜有銘銘曰天地之母萬物之宗疇克尸之天下為公囿焉洋洋猶魚於水獨擅而私匪夸伊恑慈儉之寶衍五千言蔽之以一不為物先維觀復師自緇林氏寬柔以教孰訾其異可離非道于焉始終養生送死彌著其同噫嘻髫年橫流寸梗化為琅玕燁彼光景道無成毁時有屈伸小往大來寄之在人崆峒藐然鼎成弓墮往或驂之不右則左雲乘風御方羊帝鄉無疆惟休刻示茫茫郭德基阡表長樂郭隚德基閩中名士也以乙巳九月二十九日生丙午二月十八日卒二子履鼎以其年五月二十七日葬之于穫嶺原先墓之次墓既銘且志矣履鼎又不逺數千里謁余於京師謂故人之厚者莫余若也祈表其阡郭氏相傳其先由期思奉汾陽廟器從王潮入閩粵遂以長樂為家上世皆為儒里中號書厨家正子者由進士入官為合浦郡文學掾以沒是為存齊先生德基之父也至元二十九年余觀閩風始識德基時以興化郡博士秩滿家食暇日相從文史甚歡疏通慷慨與人交彌久而孚於書無所不見為詩文下筆立就雜漢唐間遽難别彼之士大夫曰是未足見其長也蓋生十年而孤育於母林天資贏溢弱冠已為人師進而鼓篋聲喧太學中教於莆田亷訪使副張公尤知之今又受知於公耳其自莆田教吳江游息談笑職無不辦松陵震澤猶有歌酒處在焉心不忘莆再調博士未往而終於經又粹易與四書皆有述其雜著曰梅西先生集凡若干卷二子亦競爽家尚不替一女適進士陳嵩先沒余既表其墓則為之辭曰天之畀於物也不全蓋自古記之而人為甚若斯人者進而論思獻替或揚激清濁次之石渠東觀其誰曰非其任耶而卒乃爾嗟夫人生貴適志耳誠不如盤礴老梅之西豪歌而痛飲也雪樓集卷十七
