body:
  text: 雪樓集卷十六元程文海撰碑銘興化路重修夫子廟碑夫子廟起漢歷唐迄宋出闕里遍郡縣宇宙混合時數清明新天子即位首詔天下孔子之道垂憲萬世有國家者所當崇奉聲教四暨彌尊彌光莆田一方廟餘三百祀東西陊剝將壓教授曹怘曰斯廟不治且壞豈上之人宣明教化之意責不任孰諉乃請於亷訪分司曰宜請於守二又曰宜學廪給無贏事經始尤難泉布焉須視力營度謂録事楊德懋能吏字學博士黃夢舉嘗寮教護屬功此兩人可白府檄之神宫丹堊像服是宜兩廊翼屋一切改造面閣背堂嚴嚴翼翼齊廬庫藏悉有成規元貞初元陬月九日戒事某月某日告成麗牲有碑不可無刻教授以莆屬郡率前進士黃仲元余明等馳書謁文余謂廟夫子廟也曷謂夫子子者嘉稱夫之言扶以知帥人者也吾夫子魯國東門一儒耳帥三千異能之人於仁義禮樂之域扶堯舜禹湯文武周公之道於東洛二百餘載之後當時不獨回也㸃也參也賜也由也求也豫也須也亢也尊其師曰夫子至於天王之太宰儀邑之封人稱之若不然邢昺魯大夫之言陋前人爵諡之題淺是奚足為夫子之榮之尊敬用唐大中修兖廟故事大書曰莆學重修夫子廟碑既又為莆士曰鄉老成人性與天道聞諸夫子壯者茍不以四十見惡為可懼少者苟不以後生可畏而自勗未得患得既得患失皆吾夫子所謂鄙夫唐杜牧云盧秀才未知古有人曰孔夫子者味哉言乎若弟子之服勞與鄉人之樂義者教授自能書於碑隂銘曰生民之盛莫如夫子道師萬世廟嚴千祀飛龍在天宫墻新美彼爾多士編氓敢齒下視越茠肆安厥止誰之功與昊天罔極矧是莆邦詩書舊里尚有典刑仁風教雨令問令望前修是企朂哉成材昌我文治永銘此碑壺山夀水南劒路總管府判官忠都君墓志銘國之將興必有豪傑者出大而訏謨定命建侯行師功業表表在當世其奔奏疏附之士政爾卓然曩余將㫖過洪都武略忠都君迎馬首意氣軒舉不凡日相好也有論其世者父朝坤當皇元開闢之初起行伍著名朔南西陲忠都年十五勇亢其父歲己未鑾輿觀兵于鄂執殳敵愾戰輒有功平叛于濟拓地于襄軍中稱健者必曰忠都略長沙拔桂林大雪搗壘盛暑登陴人憚其勞君奮彌厲江南平䇿功遂拜宣命余壯君之勇嘉君之忠而益信豪傑之生為不數數也洎來閩見其子阿實達拜且泣曰先君不幸以元貞乙未四月二日棄諸孤越二月始有延平之命榮不逮生賫志以殁將以某月日葬於某所惟先君受一日之知倘哀而賜之銘死且不朽余讀前史知六合之表詩書之外有所謂豪傑者非必皆知道之士而頓挫感慨抑異乎苟利祿富貴者之為若忠都君者又庸可少乎君生於大名路濬州歷官忠顯校尉管軍總把宣降金符授武略將軍提舉揚羅渡龍興路托克托郭遜提調十三路展齊今福建行中書省榮祿公以汀州路總管府同知薦于朝改授南劍路判官子五人呼圖克拉伊蘇岱爾進義校尉管軍上百户阿實達福州路録事司達嚕噶齊托音哈斯銘曰桓桓戚揚為龍為光厥武方將維卒不抗維後人其昌濟南公世德碑甚矣天之愛斯民也民之有主也猶天之有日也不可以二故自古及今天下合于一而民始定不然邊陲兩界日殘於鋒鏑天心之仁豈忍斯民之若是哉金人有中土宋氏保江南力不能以相并天將命不世之主出而一之我朝起自漠北剪金茹宋討服薄海內外諸國凡天所覆日所照莫不臣屬而為一家於是斯民得見一統太平之盛此我朝之有大功德於天下而天之所以愛斯民也然當天下之未一也彼天之所廢不可復支令有不行政有不及而一方之民遑遑無依於斯之時不有間世之英可勝牧伯之任保聚其衆徐視天命之所歸則斯民也不膏血於兵即魚肉於寇豈復有遺類哉此濟南公之有大功德於一方而亦天之所以愛斯民也蓋自我師克燕金人徙汴山之東河之北盜之區兵之衝也其間能捍敵芘民自奮於時而興霸業者有四歸朝之後天下稱為四諸侯濟南公其一也公諱榮字世耀濟南厯城人自其先世已能力本以饒其家散利以惠其鄉積德崇義人知其後必大公體貌雄偉技擊便捷材略大過於人蓋天之篤生為斯民計故能於喪亂搶攘之際全數十萬口之命山棲野處以待時之清及我師之至即以衆附朝命授金紫光祿大夫山東行尚書省兼兵馬都元帥知濟南府事常從征伐以勇䇿勳以仁止殺遂至平定中原修復濟南廢城為國雄藩當東南一面之寄事上有禮恤下有恩而民益有所倚賴艾服官政之年遽致其事子孫冉世襲爵治法征謀皆卓然有立無忝父祖而公猶康强夀考被遇三朝封濟南公賜銀印子孫男女八十餘人年八十有三乃終非其有大功德於民而然與夫愛民者天之心也厚施在民天必報之余觀張氏三世入為諸侯奠一方出佐天子定天下始而一方得脫於亂離終而天下得免於戰爭誰之賜也是其施於民者厚則其受報於天者宜何如張氏子孫福祿名位殆方昌而未已也公之子七一曰邦傑字智萬年十有七為質子三十有一襲父爵四十有四先公卒二曰邦直行軍萬户三曰邦彥權濟南省事四曰邦允盤陽軍節使五曰邦昌鄂嚕總管六曰邦孚大都督府郎中七曰邦憲淮安路總管公之孫三十有五元子所生者四伯曰宏字可大既襲祖父爵中統元年以南伐功授濟南路大都督統攝諸軍事未幾割山東五州𨽻濟南改山東路職如故先是察益都李璮有叛謀密奏於朝凡三三年璮果叛據濟南城與戰敗之璮誅復治濟南至元元年遞遷天下諸侯改授鎮國上將軍真定路總管兼府尹九年召除襄陽等處統軍使十三年歸符印于朝致仕十九年冬卒年五十有九仲曰守信叔曰崈季曰宇公之曽孫升和兒字子京叔子也而後大宗今為建昌郡侯之長官宣武將軍政尚慈惠民所害除之民所利興之民所憂憂之民所樂樂之四年矣亷勤如始至余倦游而還與侯相好也敬侯為豐功盛德之家將刻石以彰世美徵余文侯之所以光祖宗者以實不以文也然孝子慈孫之心其敢不將順乎若夫三世行事之詳有家傳在姑述其大槩而系之以詩詩曰溟濛蒼𤣥遘時迍邅蠢蠢蠕蠕曷生曷全歷山之隂西齊之偏季世糾紛兵交盜挻民其何依天啓英賢維濟南公乘時翩翩雄勇絶人所向無前數十萬衆集於崖巔阻險以守竣命於天丙戌歸朝降宅平原樹栅開府外周湧泉爰設教條首務力田乃勸孝弟乃懲罪愆祈緩科徭以惠顛連庚寅北覲欽奉綸言取汴有期公願率先賜酒賜衣嘉爾忠䖍位冠羣后一日三宣我師及河公馬疾鞭乘筏宵濟奪彼舟船我師遂南虎視龍驤乘勝轉戰其鋒莫當既破張盤旋搗汴梁越一年間繼下睢陽帥欲戮俘帥欲烹降公輒諌止靡酷于戕沛徐暨邳連歲拓疆兵務少間乃修濟城官廨民廬期年具興闐溢往來詡詡笑聲不圖斯今復覩升平有司違行額外徴兵固請如額部衆以寧嵗在戊戍朝論銓衡天下諸侯治孰可稱濟南第一莫之與京年踰五十謝事全名元子嗣爵載頒虎符分正者誰出令維初户徴白金嵗倍榷酤力懇寢罷瘡痍獲蘇有民彼逋棄其田廬有民此居償其賦租謂例則然孰諏孰圖以灾傷聞玉音曰俞融風煽妖比屋成墟亟哺之粟膏萎澤枯大㑹帝庭侃侃陳謨新符偉服眷渥超踰賦金至再度難免除三取之民一代其輸有命益地以旌政殊盜逼東界領軍遄驅竟發一鏃斃其凶渠中使目之色動心愈濟東地卑霖潦所潴餽餉孔艱輦任嘆吁運土堅杵以便徒輿百里濘淖坦坦其趍鹽法弊滋自辦官需母喪廬墓骨立哀癯享年不遐紹業有孤公之聞孫惻惻仁愛跣禱憂旱殄虎除害從師南來先斾拔寨招納降附撫視雕瘵益都亂起義旅雲㑹收募散亡扼塞衝隘七馬七槍功實為最叛誅城復鎮牧弗怠南北既同海宇清泰克繩祖武未老勇退婉娩賢女王府作配沮折逆萌聞者敬慨淑明何多家慶未艾於顯今侯涖我盱水公子之孫公孫之子永言追好昭示厥美庶幾方來知所由始古云不朽匪此繄彼我侯勗哉百世丕祉楊氏先塋碑宣德楊侯守諒牧盱之四年諗于廣平程某曰楊山北巨姓世立勳名曾祖考諱某仕金監治武川郡事祖考諱實甫考諱昉俱隱德弗耀守諒奉先人遺教生三十有六年𬒳遇世祖皇帝親擢授承事郎資用庫副使越四年升承直郎資用庫使又八年升奉議大夫資用庫提㸃又四年賜名賽音竒塔特升朝列大夫利用少監又四年升朝請大夫今上皇帝嗣位大德元年授少中大夫建昌路總管今年六十有一矣顧唯獲事兩朝夙夜祗栗幸未底曠敗前後所受錫齎恩寵無與比恆懼弗克報稱非祖考之澤其何以至於斯而墓碑未𥪡為人子孫安乎公能為文其俾之銘匪直泉壤之光亦其遺𦙍之所賴以庇覆也某初識侯於京師一見知為長者逮侯來盱寬簡鎮靜民安其政幾於古循吏之風時閒居得與侯相從也侯之言油然孝子慈孫之心遂承命不辭次其世而系之銘曽祖妣完顔氏子一人祖妣李氏子二人長眀房州節使次考也妣某氏子四人伯季彬叔天祐季君澤侯仲也娶張氏牛氏子一曰溫中尚監令史二曰良大府監內藏庫副使三曰恭四曰儉五曰讓六寶童恭讓俱蒙古譯史銘曰幽冀之北土寒氣徑碩人攸出沉實簡靜譬諸水木有源有根若稽前猷視其後昆維曽大父小試未究大父暨考潜晦遺後世德其崇用啓今侯帝眷優渥莫或與儔子孫繩繩流慶未已我銘此碑昭所夲始曾履祥墓志銘公建昌南城曾氏諱頴瑞字履祥曽祖度特奏進士祖發監文思院贈中散大夫父同僉書定江軍判官伯父三府君復無子父命之繼曽為氏逺矣公之髙曽始自撫州徙居南城詩書世守學行為鄉先生至公伯父文莊公漸高科立朝在正人端士之目而門始大僉判公清介無倚附自六館諸生晚得一官諸子皆生長勤約舍學無他力公尤專苦昆弟共學木榻上一褚衾數年寒暑不易性警悟涉世見人情物理如鏡照數計不差諸兄侍郎公頴茂左司公頴秀先貴顯咸期以逺到寶祐丁巳以侍郎公郊恩補官任峽州逺安簿尉臨江軍清江丞吏事修舉倪倉使普徐憲使眀叔首薦之義倉米虧守夜出片紙籍諸豪吏以償公曰無罪狀而破人家不可請得先詰吏吏皆泣拜爭輸新淦岩邑也賦積負郡數委官料理計窮乃令首吏坐邑苛督益負守以諉公未至縣十里許吏迎拜曰使來辦矣公曰汝郡都目來幾日矣我來乃為此言耶吏又拜曰使江西人吏知使家法使來事必辦先是受委者並緣侵漁縣供給且不暇故也縣以例私獻緡錢三千公曰此縣賦也歸之公帑即正版籍弛苛征疏源剔蠧繇是新淦無逋賦攝録參有商舟遇盜死者十三人連逮盈獄誣服者兩年公閲欵疑之㑹有村民以他事下獄又有二囚以輕罪先在密相謂此人來敗矣公亷訊則殺人者二囚也盡釋寃係者一州稱明蓋盜殱諸商時村民附舟泣告得免盜疑其泄也時楮幣日賤朝命監司權衡其法名曰稱提憲司責富民以錢易楮緩輒沒入其資令峻甚民重足立憲檄公督其鄉郡有喜怒風㫖焉公故寬之乃械繫換錢溢數者一人行闤闠中捃托告訐之風頓息民賴以安且以估籍非平世法請於憲除之黃公萬石守平江公為屬未幾黃移福建轉運使以公任鹽事吏與盜為姦私官課大侵謾月執細民數十决遣應故事公密詰犯者得利害興除之縱囚約勿再犯私販為絶比去官鹽積本羡三十萬從黃公制置松江盜起溧陽俘入將盡殺之公審閲皆樵牧豎子入白曰是豈能為亂者大閫初建宜以德意示民即破械縱之贊畫經年江東以治考舉及格班改宣教郎知安慶府桐城縣事未行㑹黃公尹臨安一日謂公賈平章問君盍往見之公唯唯他日又曰平章今日問君尤悉且曰正欲大用履祥具啓事一見何如公徐曰先生方不肯貶已以合時豈求久於此者某往見何義卒不往以臺章鐫秩尋叙復遇黃公制置江右客以公為首公進言留屯臨川非計也語稍厲同列爭進者誚公閫公亦不然公公曰事去矣謁告而歸除帶行提轄文思院主管江西制司機宜文字辭除制司參謀辭除江西提舉又辭自是閉户不復出乾旋坤轉挾一能占一藝者各自爭奮公碩德重望諸公貴人競欲推挽武愍李公鎮江西擬公知汀州事左丞管公行中書省擬公提舉福建儒學公曰余老矣無能為也已固辭幸諸子卓然可傳家事纎悉一推付之幅巾野服浮湛里閈者二十五年如一日間徜徉溪南水竹間溪南有地曰中洲先廬在焉曰此吾先人之隱處也摩挲松竹曰此吾先人之手植也異時當從先人祠於此嗚呼亦可悲已初侍郎公以徑節二字名其溪南便坐之室鄉人稱之曰徑節先生大德四年庚子正月十二日中夜卒年七十有六以其年六月十六日庚申葬於南城縣太平鄊豐髙里黃家塘之原子男四文种前國子進士􅀈前補國學生修前將仕郎積女五壻寧文彥前從政郎南康軍司理吳初前將仕郎吳芑孫陳異孫一未行孫男十五渶沂浚孟孫淑孫偉孫宏孫敬孫戊孫卯孫辛孫易孫慧孫丙孫定孫女十一公嘗以文种為兄頴達後修為從子􅀈後蓋僉判公侍郎公之意也公魁岸山立軒邁朗豁勇於善而周旋世故委曲綿密仇於惡而與人語惟恐傷之不汲汲於超驟不屑屑於資計故居郊外後家城中湫隘僅庇風雨更涉憂患人所不堪其心休休然坐一室方廣不盈丈扁曰寒篷宗族姻戚名公勝士酬接其中杯酒殷勤嬉娛言笑未嘗不盡歡常語子若孫以少時艱難曰非力學不足以立身非從善不足以為人又曰士以不辱身為重用舍命也遇否時也辭婉而正志怡而安嗚呼斯完矣夫余倦遊而還幸前修典刑猶及見公方將結昏姻之好操几杖相從以庶幾萬一善人之歸而遽隔古今邪悲夫諸孤緝公平生行事來乞銘不敢以荒落辭銘曰歸去來兮命與時兮撫三徑以嬉乎而歸去來兮死猶生兮樂夫天以寧乎而晉處士兮漢征西人所命兮吾何與知溪南十畝兮有宅一區上有修竹兮下有蘭芝吾魂氣無不之兮千載猶思母毁我琴瑟兮母墜我書詩噫嘻維先人有之維後人似之故建昌路儒學教授蔣君墓志銘至元二十有三年余以集賢學士行臺侍御史將㫖江南搜羅遺逸得二十四人焉既復命朝廷分其半掌憲諸道餘悉授任有差時龍山蔣君松魁長才奧學為衆所推余將以君入見未行而君病病而卒余為悼之深也又十有五年其猶子宗道叙君行事來乞銘余為之喟然以嘆曰銘吾故人而弗忍辭君世家嚴陵夀昌曾大父敬之大父震亨父焱母某氏君早負文聲學於太學者七年甲戍授初官典教盱泮以恩轉修職郎次年又以江西制置黃公萬石之辟授國史校勘江西提舉司主管機宜文字未赴而盱城歸附天朝君復掌教事時余季父西渠公守盱酬酢紛糾君雍容風議佽助為多余時初識君也凡在泮七年雖中更多故教育不廢有力於庠序為多至元辛巳西渠公以郡事再入奏因薦於朝衆謂命下矣而中格最後余起君於丘園而君竟弗得生命也夫命也夫君為人磊落恢廣軒然有古丈夫風其孝友信義天性然也晚隔丘墓不復能歸每蒸嘗之際執爵望哭悲不自勝暇則過余先君所或與盱之賢士大夫遊杯觴流行為詩自遣詩如其人余時官中朝去家久且逺聞君徜徉甚適念不得旦暮膝下時與君輩相從及以使事來歸意謂將得相與行吟河洛之間少酬前志而事乃爾人生相知為難相知矣患不相聚聚或弗能久此余所為屢嘆也君字仲方生於乙未二月二十日已時卒之日實至元丙戌九月二十五日娶葉氏子男一人宗德女一人適鄭相之孫男四人建孫昌孫福孫元孫女一人君既殁妻子追念其志將以君歸葬乃以某年某月某日權窆于某所銘曰誰之不如彼豈有餘此獨嗇也誰之不容挈其平生而去之迫也銘以訊之尚能視此刻也忠烈廟碑國家既一方夏薄海內外靡不乂寧乃眷西南之疆外引六詔內接三苖地險俗厖播川郡實據其㑹爰畀太原楊侯節印俾紹服先公之駿功侯既稽首受事入覲以謝歸則布宣皇威一以法令從事環播川數千里箐居卉服之民咸知職貢讋行惴息以大帥府為命於是王化浹矣上嘉其勞推恩錫類追諡侯大父為崇德公考為惠敏公所以慰答忠勤者甚厚侯既膺寵典彤弓大卣以祀以戎治法征謀恪遵臣業所以憂邊恤衆者甚備間嵗必一述職請命示弗敢安大德七年冬道過武昌因言於亷問使者廣平程某曰漢英不肖猥承邊寄凡所享有莫匪祖考之休慶而廟碑未刻懼無以示子孫敢叙次其事以見倘矜而貺之辭其自昭穆十六世而下咸嘉賴之某既辭弗獲則為之嘆曰為人臣子不當如是耶謹按楊氏系本太原唐乾符初贈太師諱端者宦游㑹稽後客長安適南詔陷播州大為邊患有㫖募能安疆場者太師慨然自效遂命為將以復播州威暢恩融夷夏畏服因領其郡是為播州楊氏始祖五季俶擾衆推其子孫世守五傳至昭而無子鄰郡帥充廣實太原舊族贈中書令業之孫鄭州防禦使延朗之子來與通譜命其子貴遷為昭嗣且授以家藏翰林楊大年所草中書令及莫州刺史制誥二通自是太原之族復合而守播者乃公之後八傳而當宋嘉定六年髙祖忠烈公始考典禮建家廟以祀五世奉太師公為始祖百世不遷餘則有夾室以奉祧主其明年嘉禾生於庭戺詩人歌之咸淳四年考惠敏公又請於朝錫今廟號刻家訓于石榜崇孝于樓至是而播州之楊幾五百載用夏變夷益逺益大傳至於侯莭義不替勛庸益著蓋侯自幼已能好學秉禮以文自修尊禮老成得其忠益其承天寵召民和也固冝若夫致嚴於宗祏崇飾於本原思以微顯闡幽垂裕永永是又孝子慈孫之大莭也孔子作春秋諸侯用夷禮則夷之播為中國郡縣嘗以朝臣出守不幸季世殘於裔戎而楊氏以晉土之望攘除湔拔復此天明帶礪河山綿綿延延以至於今獲遭聖神大展忠力視春秋杞鄫之君自絶於禮而見擯於麟筆者不其藐與謹詩其事以聲皇風以迪家慶詩曰於皇維元立極繼天電激風遒以奠九埏孰荒弗庭稽首後先越西南陬魚魚顔顔我有虎臣端坐播州折其機牙汝力汝田或觸于藩我飫其羶有向穴嘷叱之寂然虎臣維何楊系太原太師啓之既十六傳祖德宗功瓜引蟬聨錫廟與名亦既有年於皇我朝君聖臣賢煦沒崇生恩厚無前惟此虎臣允武允文殿此大邦維國之珍金甲雕戈刻印以銀謦咳一堂千里聲震屏翰旬宣有飈不塵介圭來王臣職既陳帝曰歸哉勤恤我民飲至勞還爼豆詵詵祫礿蒸嘗于此秋春嗟惟楊侯承家事君靡或間言式是臣鄰何以似之曰忠曰勤何以永之咨爾後人故將仕佐郎建昌路儒學教授吳君墓志銘異時場屋之士居連甍出連衡以得失為雄雌失則悲得則肆古人之事一不槩於心務於躬也某少從徽菴先生於臨川得延陵氏之仲季焉則獨否以是皆友之三人無須臾不偕偕而無適不樂於文蓋嬉笑諧辨以成未始棘棘然也季長於余二年業成且精凡試輒可識用𢎞朗意悟飄灑卓然萬夫之望一舉進士遂中其科得瑞州新昌縣尉以歸重慶在堂內外歆豔既而天下定于一某入仕京師季亦名聞大朝擢建昌路儒學教授後十年余將㫖南歸時季已解去而盱校良規斬斬新田每每問之季氏力也盍再仕乎方藝木引泉笑而不應自是余留升揚留長樂留武昌家居之日良寡而延陵氏之仲季逺則書近則面凡余家慶弔之㑹無不與焉者今自沙羡謁告歸意當三人復聚如往時可無不談談無不盡而季則已往矣仲又益老且病不復能行徒以書使其子若猶子來速余銘季墓嗟夫生者不常見死者遂不可見情當奈何而忍文之抑吾友兄也其可辭按前太學進士余鑰狀略曰吳本金陵五季徙弋陽又徙金溪六世祖濬徙今地曰吳塘濬孫安世又析於新田曰景立曰堯仁曰士享吳塘三世也曰安世曰以謙曰鑑新田三世也君生七歲自吳塘出繼於新田新田無父而有祖母乃奉之而依於吳塘吳塘之父字嘉甫有志不偶力學以命其三子伯德鴻仲德溥季君也名可孫字聖可甫十二已辦科舉之學少從仲兄游郡中博士程君紹開每語人曰二吳文行逺器也平居恂恂臨事毅然山立蓋自幼已為長者所知掌故胡桂芳名士也見之曰長必有成以女女之其師馮得一亦名士愛而教之者十年遂與同升二公殁君經紀其家無所顧愛去盱學而歸也餘廩粟石千有竒封識以俟代者喜飲酒然必相知者而後飲飲至無算然亦未嘗醉也文辭字畫溫雅如其人至於薄世味篤古道其天性固然生丁未四月丙戌卒辛丑十月戊寅葬癸卯十有一月庚午是為大德七年信州貴溪縣西山其阡也子四男曰泰卿晉卿女曰葵曰燕孫男三女二人之生非必爵祿以為達也不辱以事親以成身以行志雖一日可也况中夀乎且以聖可之材諝器裁進而師尹君公奚忝亦既得其塗矣步未改而斂轡跋馬以歸終以不出是不亦異於人乎夫異於人者天必異之或謂其子亦異於人甚余曰然銘曰少之時弟昆壯且老兮孰存授美人兮粹溫吾欲與言而不得與之言嗚呼蘭林在髙原何德載墓志銘吾友延陵幼清氏之於人也吾不能知然其所常誦者樂安有二人焉其一曰何氏太虛吾承言而未之識則將㫖以出乃俾吾兒禮致之後四年歸始克識焉氣徑而材穎多能而善用於是吾以獲友為喜而謂幼清不吾欺或從而贊之曰此竹洲公子也太虛又出一帖題曰竹洲公字也則又進一編且請曰山之先考行事之狀也敢丐公銘狀曰韓何同系昌黎伯既言之矣福家於崇仁詵徙於樂安九世而生夢龍娶于詹生三子時其孟也名天聲而字德載季也皆舉進士得官而季尤夙悟十二而孤母兄束之於學以遂有成是為竹洲先生初尉曲江干掫有聲州部咸委以事無不立决州部長吏前後四輩皆材而薦之蚤緣伯氏獲識文信公及在兵間因相上下志與事異幡然來歸餐英枕石者二十有三年而後沒沒之日歲庚子十二月二十有五日得年七十有二事母孝事兄恭詩文字畫咸為識者所尚急義樂施無戚疏貴賤交得其歡晚歲蓻圃嚴溪之灣畦菊數十種聞葩花之竒者必致之不可致必往觀之混而不汚貧而能佚自贊曰子孫孫子方寸足貽其自信蓋甚篤方試禮部也柄國者面譽其文且期之甚及射策於廷則又怒其直而殿之其自樹蓋甚深子政大父父也妣曰李諶大父也妣曰劉曰呂公娶於唐先二年卒子七人男曰山曰鳯女五孫七人三男四女葬之日大德六年壬寅十二月庚申地為崇德坊之原官為儒林郎職為主管刑工部架閣文字都督府幹辦公事山永惟先人之用既不克究而僅可見者又閟而弗章山之罪也故敢以銘為請吾嘗記幼清言樂安何氏為一家之齊魯今視竹洲君行事之狀與其子之為豈非然哉乃語之曰子姑就館吾為子銘銘曰進有以行也不必崇退有以安也不必豐然不然耶尚以訊於幽宫監察御史蕭則平墓志銘大德七年八月十五日南臺監察御史蕭君泰登則平以疾卒年三十八聞者皆愕且悼或疑時某客鄂諏之自東來者曰信矣嗟㦲頃余在禁林吏以諸道提舉學事姓名來中有蕭某年若干余訝其少或告曰公未識耳材則老也洎來南臺中丞徐子方道則平朝夕不離口後數年余從閩歸則平方典江廣學事學者咸井井有生氣衆誇語余既僉桂憲之明年聞海南有制獄乃行都元帥沙什干賊殺不辜為則平所劾鞠之如章帥遂抵罪以則平為御史七年春南浮江漢以下余留之酒不可余笑曰真御史也自始識及是不數見每見氣益老言論益深豈意自是遂終不可見耶廬陵劉將孫須溪翁之長嫡也其言信狀其行事視余亹亹萬言曰是宜銘且助其子以請曰則平之志也按蕭氏世夲長沙徙籍安成曽大父平林先生負重名仕為江西安撫副使官中大夫爵廬陵縣男名逄辰大父安中從仕郎德安府觀察支使父元永中順大夫瓊州安撫副使母胡氏則平早頴拔諸公皆器之弱冠試吏丞永豐涖事敏决行中書省以名聞授將仕郎湖南道儒學副提舉為部使者賞識即子方也子方一代耆碩言輒見聽遂擢僉廣東按察司事衆睨其所為會有獠賊來逼城衆惶惑無所措獨奮曰督捕盜賊獨非憲部職耶我請先之即上馬出將吏驚馳以前賊遂退走因按所部潜與獠通以人為貨及他奸利事守令以下抵罪者八十七人又建議减韶州歲賦白金得請遂减半條嶺南積弊二十事身詣臺言之㑹建肅政亷訪司繼丁胡夫人憂至元三十一年今天子踐祚思與天下更始詔罷征南兵釋交州纍臣以則平為兵部郎中介禮部侍郎李衎往諭其國時安南既以失藩臣禮重得罪聞有詔使疑懼參半吏民迎餽麇至喻所以來意悉慰却之君臣卜日拜伏以聽然後知上德意感慕歡呼而使者又亷敏開亮不與前等乃大喜過望歸所盜邊地二百里遣其臣奉表貢獻謝罪遺使者橐中裝甚厚辭不受益之再三終不受益大服既報命授連州知州未拜奔瓊州公喪起提舉江西等處儒學所職辦治行省遣慮郡囚袁瑞州路有訹愚民自誣殺人而代死者既具獄矣悉發擲理出之僉廣西亷訪司事始至陳便宜二十五制獄既竟出沙什干所掠生口八百七十五人牛馬三千六百有奇還之民栁州白蓮道人謀畔論死者二百録之釋不知情者百三十有七人他所辨雪糾正不可勝數凡黜貪謬吏二百一十汰左右江攝貟四十一進階奉直大夫拜南臺監察御史首言十事分按江浙行中書省水旱民流議捐倉實以賑或曰咨可而發無後憂曰民命急矣毁家償之不悔也方大有建白病日侵得告即命舟自載且治衾槥或言豫凶事曰死常事非凶也書别子詩别親友戒左右毋妄受贈禭既戒不復言遂卒於舟明日斂於建康某年某月某日葬於某所配楊氏再彭氏皆名家子六人男若干女若干則平精悍謹密不煩不苛不為事所詘故發必中機意悟飄灑豈弟周施與人必誠故巨人長者咸愛之至其孝於親忠於國不媕阿淟涊天性固然故自號方崖其始為御史也激烈自奮或謂太剛必折曰患不剛耳折不折天也或告當自愛曰身非吾有也觀則平此言豈自為身後計者而獨志余銘嗟㦲銘曰奕奕堂堂崖穹石蒼不可蓋藏咨爾山君勿刓其方何子宏墓志銘公諱宏中字子宏撫州樂安人樂安尚書學聞四方由進士起家何氏為著子宏又以博學善教為鄉先生故其義方素修私淑尤廣及門者大抵成名而子宏終老於鄉先生至問其家則懷章綬而歸拜者前後四人安輿就養益以廉勤為訓所至諄諄不舍故仕學皆優乙亥春子宏年七十諸子來集于家冝章令霖永州教授希之道州判官堯廣昌主簿夢牛皆服其命服以次奉觴上壽里中豔之謂當若陳省華且曰樂以善及人宜天報之若此其明年遂以壽終又明年伯子亦卒越四年始克葬於邑東山口陂之髙坑又二十九年為大德八年甲辰仲子始來求銘蓋仲與叔方相與隱居求志服膺所聞期有以顯其親者未已也曽大父思容州法曹大父庚父湛母詹氏娶於董有五男子最季元善出為栁氏後二女子咸歸於劉曰祐雨曰季說壻也孫男女十八曽孫男十一盛哉文學既盛子孫又盛所謂鄉先生家不皆若此顧不宜銘銘曰謂夫人之間其效濶疏者吾亦未卜其何如也及觀子宏氏之廬抑若此矣為斯言者其不幾誣哉張宗漢夫人葉氏墓志銘天師觀妙先生之嫡曰宗漢幼從人間事誦讀纂綴為舉子未達蚤世其配同郡葉氏女也嫠居三十年誨育幼孤昏宦有立人皆以為難廣微真人述之曰吾世母也諱惠柔貴溪人曾祖夢得宋中奉大夫貴溪縣男嘗為歸州太守祖億年太學進士父繼善象州推官夫人生十六年而歸于張容德婉嫕婦禮無違甚得上下歡心良人賴以畢志及寡中慈外厲佐叔氏以成其二子與紹今為建德郡治中與純烏山縣尹一女嫁進士倪日强於是夫人志願既酬端深以臨家政子孫先意承顔不使少有忤拂母儀子道為逺近宗州里以義莭上聞而夫人哭烏山感病殁矣訣語琅然類了達者時大德十年六月七日也生平不輒出閫長子屢駕倅車來迎就養人以為榮而夫人輒不許㦯贊之終不許念弟老不得數面為築居焉遇娣姒如同生者四十年晚坐北堂雍雍繩繩合千指無一誶語男女孫十六人曰太初祥初瑞初復初臨孫震孫壻曰臨川徐和金溪鄧章四未行沒之明年太初將其父命北上數千里至京師請銘於廣平程某遂以述來昔觀妙之嗣曰簡齊天師事寡撫孤藹然天至余逮識之因謂此誠天人蓋神仙之說無則已有則舍孝義之人孰為之又聞人誦葉夫人事知其家風昉振內外咸有懿德不待遐舉斯出塵矣今視其述不私宜以銘兆在某邑某鄉某里之看源葬以某年某月某日銘曰邇也視其閭逺也炳之簡書猶室不安兮奈何彼殊樂哉義婦慈母之幽墟千萬年其永居雪樓集卷十六
