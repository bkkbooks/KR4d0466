body:
  text: 雪樓集卷十元程文海撰奏議存槀吏治五事取㑹江南仕籍昨者欽奉聖㫖許令江南曽有官人齎告勑赴省換授此最良法姦臣賣弄遂至顛倒求仕者憑外省之咨而外省貪饕尤其可畏有錢者無告勑可以得咨無錢者有告勑却不得咨求仕之人有賣家喪業而卒不沾一命者亦有全無根脚大錢計㑹白身而一旦受宣命者亦有外省等官將空頭咨示旋來内省尋趂有錢人貟書填姓名亦有内省官吏通同作計公行添揷人貟又有一等潑皮歹人置局京師計㑹保官誣冩根脚保明而得官者吏治之弊至此已極今省府欲行考究似覺費力今有㨗法可以永除病根欲乞選清強通曉官貟無論南北每省差兩貟前去同本道按察司取㑹江南州縣城郭鄉村鄰甲保明詣實元在亡宋有官人貟姓名一槩置籍明書本人郷貫三代及入仕根脚齎擎前來省部以憑照勘遇有求仕人貟一閱而知真偽極為便當仍與申飭外省遇有求仕者合與行下本郡令鄉都鄰甲保明本人是何出身即量輕重咨來不許邀阻其有外省官吏遷調人難許令求仕人赴御史行臺及按察司論訴庶幾公私兩得便當籍成之後却與商略白身人求仕格式行下江南通南北之選聖主混一車書兼愛南北故北南之人皆得入仕惜乎北方之賢者間有視江南為孤逺而有不屑就之意故仕於南者除行省宣慰按察諸大衙門出自聖㫁選擇而使其餘郡縣官屬指缺願去者半為販繒屠狗之流貪汙狼藉之輩南方之賢者列姓名於新附而冒不識體例之譏故北方州縣並無南方人士且南方歸附已七八年是何體例難識如此欲乞令省部刷具北南府州司縣官貟脚色叅對今後北南選房流轉定奪若以南人為未識體例則乞於北方州郡每處且與㕘用一二人一任囘日却與通行定奪其北人注南缺而不赴者重與罪過庶幾吏稱民安可以上副聖主兼愛南北之意置考功歴國朝建御史臺雖有考課之目而未得其要莫可致詰欲乞照前朝體例應諸道府州司縣下至曹掾等各給出身印紙歴子一卷書本人姓名出身於其前俾各處長吏聨御結罪保明書其歴任月日在任功過于後秩滿有司詳視而差其殿最則人之賢否一覽而知考核得實庻無僥倖置貪賍籍國朝内有御史臺外有行臺按察司其所以關防貪官汙吏者可謂嚴矣而貪汙狼藉者往往而是何也葢其弊在於以徴贓為急務於按劾則具文故今日斥罷於東明日擢用於西隨仆隨起此棄彼用多方計置反得美官相師成風愈無忌憚欲乞省臺一體應内外諸路官貟有以貪贓罷者置籍稽考未許收用其吏人犯贓者重置于法永不叙用内外一體照應庻幾官吏知所警戒給江南官吏俸錢仕者有禄古今定法無禄而欲責之以廉難矣江南州縣官吏自至元十七年以來並不曽支給俸錢真是明白放令喫人肚皮椎剥百姓欲乞自今並與支給各官合得俸錢其有貪贓者重罪不恕人自無辭民間利病江南買賣微細宜許用銅錢或多置零鈔竊惟江南小民多而用錢細初歸附時許用銅錢當時每鈔一貫凖銅錢四貫自銅錢不用每鈔一貫所直物件比歸附時不及十分之二在前上司指揮官收銅錢有私藏者坐以重罪其拘收到官者必多或民間尚有窖藏亦難盡知計江南銅錢比故宋時雖或鎔廢其到官者寧無十分之五在民者寧無十分之一若盡發在官之錢使民間以鈔一貫就官買錢若干添貼使用其有民間窖藏未入官者立限出首納官免罪如限外不首私自發掘行用許鄰右主首諸色人捕告騐實坐以元罪有誣告者亦反坐之試行一二年如公私果便永逺行用如其不便然後再禁公私亦無所損如不復用銅錢更宜増造小鈔比來物貴正縁小鈔稀少謂如初時直三五分物遂増為一錢一物長價百物隨例省府雖有小鈔發下而州郡庫官不以便民為心往往憚小勞而不領取提調官亦置不問於是小經紀者盡廢民日困而鈔日虚宜令増造小鈔數倍常年分降江南州郡特便細民博易亦利民重鈔之一端也軍人作過甚者責其主將仍重各路達嚕噶齊之權各路管民官與管軍官不相統一軍卒肆凶小民受害管軍官不肯問而管民官不敢問又甚則如臨江之兵揮刃以擬總府吉州之兵奮拳以歐府官此風何可浸長國家置達嚕噶齊本令兼管軍民江南諸路達魯花赤固多失職亦縁地逺軍驕故不能制宜特降㫖今後諸處經過屯戍軍兵敢於民間剽奪姦汙者本路達嚕噶齊即將犯人凖法處㫁如漏失本人姓名具管軍官姓名呈省自其牌子頭至百户定罪有差若十人以上同罪罪其主將事體重者奏裁似望每翼頭目各務鈐束其下不致生事軍民相安逺方幸甚百姓藏軍器者死而刼盜止杖百單七故盜日滋宜與藏軍器同罪盜之害民刼盜為甚刼盜不已羣盜生焉故自古立法刼盜必死江南比年殺人放火者所在有之被害之家纔行告發巡尉吏卒名為體覆而被害之家及其鄰右先已騷然及付有司則主吏又敎以轉攤平民坐展歲月幸而成罪又不過杖一百七而枝蔓逮捕平人之死獄中者乃十四五况刼盜幸免必圖報復而告發之家無遺種矣被賊刼者誰敢告發盜勢日張其禍何可勝言夫諸藏兵器者處死况以兵器行刼而罪乃止於杖此何理也故盜無所畏黨日以多今後强盜持軍器刼人財物贓證明白只以藏軍器論罪郡府以便宜從事並免待報庶使㓙人警畏平民安帖其於治勢實非小補江南和買物件及造作官船等事不問所出地面一切遍行合屬處處擾害合令揀出産地面行下凡物各有所出所聚處非其處而謾求如縁木求魚鑿冰求火無益國家徒擾百姓如紵絲邵緙木棉紅花赤藤桐油鰾膠等物非處處皆出家家俱有者也而行省每遇和買不問出産在何地面件件都是遍行合屬其各道宣慰司承行省文字如此亦遍行合屬總管府總管府又遍行合屬司縣遂使江南百姓因遍行二字處處受害及申到和買諸物又行移體覆今日體覆明日體覆動輒半年一年及上司放支價錢官吏通同不復給散於民虚寫收管粘入卷中以備照刷公私俱弊欲令省家先計必合和買物件某物出於何處聚於何處采之公論置簿籍記如在江東止行下江東在兩浙則止行下兩浙量逺近立限期仍令本處宣慰司止行下所出所聚去處委廉幹正官一貟依時給價於係官錢内即行放支結保申呈如後經手官吏作弊事發欽依至元十九年聖㫖條畫盜官財物罪犯追㫁又造船一事其弊與前略同自至元十八年至今打造海船粮船哨船行省文字並不問某處有板木某處無板木某處近河採伐利便又有船匠某處在深山採伐不便又無船匠但槩驗各道戸計敷𣲖船數遍行合屬宣慰司宣慰司仍前遍行合屬總管府以江東一道言之溧陽廣德等路亦就建康打造信州鉛山等處亦就饒州打造勾喚丁夫逺者五六百里近者三二百里離家逺役辛苦萬狀凍死病死不知其幾又兼木植或在深山窮谷去水甚逺用人扛擡過三五十里山嶺不能到河官司又加箠楚所以至元二十一年寧國路旌德縣民余社等因而作閧亦可鑒也又所用木植鐵炭麻灰桐油等物官司只是椿配民户民户窘急直一錢物一兩買納處處一例不問有無其造成船隻並係倉卒應辦元不牢固随手破壞或致誤事宜令今後凡是海船止於沿海州郡如建德冨陽等處打造粮船哨船止於江西湖南湖北等處打造仍乞照故宋時打造官船體例差官領錢與河海船匠議價打造每人願造若干船隻領若干錢寫立文書須管十分堅牢如有違約追罰價錢依法治罪所委官在彼守待了畢交領囬還則民户無逺役之費匠戸無差役之苦官吏無催督之勞或有欺盜發覺照依盜官財物例追㫁公私兩便而所造船隻亦可為長久之用江南諸色課程多虚額妄増宜與蠲減江南茶鹽酒醋等税近來節次增添比初歸附時十倍以上今又逐季増添正縁一等管課程官虚添課額以諂上司其實利則大槩入已虚額則長掛欠籍姑以酒課言之自前日有司陡増酒課每米一石收息鈔十兩而江南糯米及所用麴糵等工本通僅七兩以七兩工本而官先收十兩和息寜有此理所以杭州建康城裏酒價不半月間每瓶驟増起二伯文其他可類推也前來欽奉聖㫖諸色課程從實恢辦既許從實豈可虚増除節次累増課額實數及有續次虚増數目特與杳照並行蠲減從實恢辦庶將來不致陷失嵗課亦不致重困民力建昌路分小於撫州而雜造段匹三倍撫州工役太不均宜只依撫州例諸處凡似此不均者比附施行竊惟建昌雖名一路而在宋時止稱為軍宋初本是撫州屬縣兩處民戸物産大不相侔况建昌四縣近又割出管内南豐一縣以為州事力小弱甚矣今江西却令建昌路安機一百張毎年造生熟段匹二千二百五十段而鄰近撫州路止安機二十五張建昌何重撫州何輕撫建甚近土性亦同非建昌獨宜織造也縁建昌曽有一路官刻下民媚上司妄添數額遂不可減作俑有自流毒無窮本郡不堪其憂臣昔家此實所備知如令比附撫州體例特與末減似望公私易為趂辦段匹又加精好而本路之民少得一分之寛然此特建昌一路與織造一事也其他路分及工匠等事似此不均者亦乞令各處有司比附上項事理施行生民幸甚江南官吏家逺俸薄又不能皆有職田不能自贍故多貪殘宜於係官田地撥與職田江南官吏多是北人萬里㩦家鈔虚俸薄若不漁取何以自贍中前曽令依腹裏郡縣體例各各給與職田而行省行下必令於荒閒田地内摽撥夫江南州郡安得處處皆有荒閒田地只為此語糊塗浮汎得職田者遂無幾人轉見窘迫恣意貪殘今欲與一一添俸則費鈔愈多虚鈔愈甚莫惟職田之為便也宜令行省徧下諸道諸路郡縣凡各處係官田土即撥與各官充合得職田比腹裏體例母令減少使潔已守職者既免飢寒之憂其病民蠧國者自甘懲汰之罰如此然後治平可冀也議安南九月二十日錫哩瑪勒承㫖達實宻官人及樞宻院衆官等傳奉聖㫖令臣等議安南國事欽奉如此臣等議得自古帝王招來海外諸蕃小國率以恩信覊縻使之稱臣奉幣而已難於一一責備安南臣屬日久蕞爾小夷安敢與我抗敵但以大兵猝入其境愚妄失措遂至弄兵以正理論之宜加誅討但彼生靈無辜可為哀閔兼安南奉貢近三十年一旦滅之恐海外諸蕃不知底裏聞之震駭有虧聖朝來逺之意况比年用兵占城沿海州縣百姓勞動今安南既自知罪願増歲幣聖度天寛宜亦包容但彼中未嘗遣使請命遽以朝命許之恐輕國體宜令行省移文安南開示聖上寛大之意令彼遣使奉表謝罪齎所増十分嵗幣入貢彼若不來徒以虚辭疑貳我師然後加兵亦未為晚臣等愚見如此伏取聖裁學校臣聞國於天地必需才以為用而人才之盛非自盛也全在國家敎育之勤其衰也反是參之歷代可考也國家自中統建元以來中外臣僚亦時聞表表偉傑者皆自往時故老宿儒薰陶浸灌而然歴時既久以次淪謝邇來晨星寥寥無幾何矣臣不知更十餘年後人物當何如其瑣瑣也而主國論者恬不知怪視學校為不急謂詩書為無用不知人才盛衰張本於此葢甞有㫖行貢舉求好秀才上意非不諄切而妄人輒隂沮之應故事而集議凡幾作輟矣然則無怪乎選任之非才政治之不理也今已至此後當若何臣愚欲望陛下明詔有司重學校之事慎師儒之選京師首善之地尤當興建國學選一時名流為國人矜式優以餼廪隆以禮貌庶四方觀感有所興起外而名都大邑敎官有缺不但循常例取庸人而已必使廷臣推擇可以為人表儀者條具聞奏令有禄可養而不匱職比親民而加優視敎化之廢興為考第之殿最其諸生有經明行修者特與蠲免賦役依已降詔㫖施行似望國家敎育有方多士鼓舞不倦他日隨取隨足無臨事乏材之歎天下幸甚伏取聖裁好人臣謹奏臣聞治天下者必盡天下之才故曰立賢無方曰旁招俊乂若限以方所徴以技藝雖曰用人猶無人也國家既已混一江南南北人才所宜參用而環視中外何寥寥也豈以其疎逺而遂鄙之歟此羣臣之私意非陛下至公之度也臣何以知之臣往在江南屢聞明詔一則曰求好秀才二則曰求好秀才而以好秀才致之陛下者幾何人江南非無士也亦非陛下不喜士也是羣臣負陛下也且陛下遣使江南丁寧之曰求好人夫所謂好人者大而可以用於時細而可以驗於事葢無所不該矣而凡出使者皆昧陋愚淺不達聖見之髙明止以卜相符藥工伎為好人之尤此何謂也不惟不達聖見且使逺方有識之士或以淺窺朝廷臣竊恥之臣之愚陋雖未足以為好人然世所謂好人者儻無則已有則臣必識之江南百餘州縣之廣袤數百餘年之涵養豈無一二表表當世不負陛下任使者臣奉命而往布宣德意庶幾遇之如得其人以驗臣言則望陛下先試以一職任事使之自卑而髙自難而易小有益則小進之大有功則大用之磨以歲月自見能否且陛下如用若人則不但愚臣得舉所知而已他時奉命出使者皆知陛下德意將見異人輩出不逺數千里為朝廷用得人之盛視古無愧臣不勝大願謹録奏聞伏候聖㫖公選臣某謹奏臣於至元十五年十一月初九日欽奉聖㫖節該您省得的勾當說者官人每好的歹的說者欽奉如此臣竊惟國家自平江南以來内而省部宻院等衙門外而行省行院宣慰司總管府州縣官並皆參用南人惟御史臺行臺按察司獨不用南人臣不知其說也夫南北人情風俗地里各各不同若欲諳悉各處利害須是參用各處人貟况江南自歸附以來已十餘年而偏逺險惡去處盜賊時時竊發雖官吏貪殘所致亦縁行臺按察諸司耳目不及每年察司官名曰巡按其實何曽徧歴止於安静地分遷延翺翔聞有小警即行退避至於偏逺險惡去處曠數年不敢一到其間小民被官吏苛虐無所告訴激而為盜官吏反欲因此有所虜掠每有一二人竊盜便稱某郡某縣一同作歹上司聞此欣然出兵子女玉帛恣其所欲真盜何甞捕得而無辜一切受禍朝廷於江南設行臺按察正欲察訪利病果得其人何至如此非惟官不得人亦縁南北事體不同所用皆北人而無南人故不能諳悉各處利害如舟車之於水陸不能易地以為功也臣愚欲望聖慈特降睿㫖御史行臺自中丞以下隨路按察司自察使以下並合公選南方曉事耆舊及清望有風力人貟每路或一或二不定貟數與北方官貟同共講論區畫庶幾諳悉江南事體用知逺人情偽内臺侍御史至監察御史等官亦合參用一二南官以備采訪不勝生民之幸謹録奏聞如蒙采擇乞送中書省召耆老大臣集議施行伏取聖裁論時相臣聞天子之職莫大於擇相宰相之職莫大於進賢苟不知以進賢為急而惟以殖貨為心非為上為德為下為民之意也昔漢文帝以决獄錢榖問之丞相周勃不能對陳平對曰陛下問决獄責廷尉問錢榖責治粟内史宰相上佐天子理陰陽下遂萬物之宜外鎮撫四夷内親附百姓觀其所言可謂知宰相之職矣今權姦用事立尚書省以鈎考錢榖剥割生民為務所委任者率皆貪饕徴利之徒四方盜賊竊發良以此也臣竊以為清尚書之政損行省之權罷言利之官行恤民之典於國為便謹冐昧以聞伏取聖㫖論行省竊謂省者古來宫禁之别名宰相常議事其中故後來宰相治事之地謂之省今天下疎逺去處亦列置行省此何義也當初只為巴延丞相等帶省中相衘出平江南因借此名以鎮壓逺地止是權宜之制今江南平定已十五餘年尚自因循不改名稱太過威權太重凡去行省者皆以宰相自負驕倨縱横無敢誰何所以容易生諸姦弊錢粮羡溢則百端欺隠如同已物盜賊生發則各保界分不相接應甚而把握兵權伸縮由已然則有省何益無省何損又其地長短不均江淮一省管兩淮兩浙江東延袤萬里都是繁劇要㑹去處而他省有所不及其五分之一如此偏枯難為永制今欲正名分省冗官宜罷諸處行省立宣撫司一浙東西二江東西三淮東西四福建五廣東西六湖南北自江淮以南止幷為六箇宣撫司其為宣撫使者許帶舊日相衘外如諸道宣慰司今日止是過道衙門有無不加損益宜盡行革罷歸其權於宣撫司凡舊日行省宣慰司職事皆於宣撫司責辦其江淮諸道軍馬分立六箇元帥府但是有宣撫司處便有一箇元帥府管諸萬戸以下軍官專一討滅盜賊如此軍民之事有何乖誤何必令外面權臣借大名分竊大威權以恣横於東南哉元末各省專恣不相救援以底于亡大明革省立布政司與公言相合云議災異中書省臣欽奉聖旨以恒暘暴風星芒之變同御史臺集賢翰林院㑹議者竊惟事有本末政有後先今特摭其本與先者言之其略有五一曰敬天二曰尊祖三曰清心四曰持體五曰更化具列于後一敬天天育萬物不能自理乃立之君以主之故君者所以代天育物也惟明君能知天監在上赫赫甚邇凡一語動一政令罔不兢兢業業思合天則期當天心若論官則曰天命有德五服五章不敢乗一時之喜怒而輕予奪之也若論刑則曰天討有罪五刑五用不敢因一時之喜怒而出入之也凡事如此謹守勿失於是陰陽和風雨時而萬物育天相之也乃若政令之或爽天必出災異以儆之而儆之者所以仁愛人君欲其久安長治而萬物得其育也故明君遇此則必省躬以知懼昭德而塞違誠格政修天意乃得於是災變弭而和氣復矣故雖堯湯之世不能無水旱而卒以無害者堯湯用此道也一尊祖自古帝王創建國家無不自艱難而得之而傳之子孫猶菑畬者之望播穫作室者之待堂構也夫固不易哉我太祖皇帝起自朔方身歴百戰收附諸國惡衣菲食櫛風沐雨何如其辛勤也世祖皇帝親歴行陣心籌計畫恭儉敬畏以有天下混一南北何如其辛勤也主上以仁明天縱之聖紹膺景命葢常以此存心思祖宗開基建業之不易而遇是儆也固益兢兢業業用一財則必曰此民力也自祖宗艱難而得之也豈可輕用官一人則必曰此國柄也自祖宗艱難而致之也豈可輕與動静整敕每事如此則百司自然供職庶政自然脩舉祖宗在天之靈必皆歡恱而天佑響荅福禄日臻邦基益固矣一清心心者一身之主而萬事之本也夫目之於視耳之於聽口之於言手之於執足之於履皆惟心之所使心得其正則接物臨事之際視聽言動皆得其正而無有繆誤乖戾之患况四海之廣萬幾之微皆仰治于一人而一人之所仰者非惟心乎葢水必止乃可以涵物像鏡必明乃可以别妍醜故帝王貴清心清者静一不遷之謂也若聲色之娯飲宴之樂所不能無尤當節適使不至撓吾心之清心清則四海之廣無不燭萬幾之微無不察光明洞徹不言而信讒䛕不得施邪偽不敢前百官有司各安其職無有撓格之患則法制流行紀綱振舉災變息而天下治矣語曰本立而道生故帝王以清心為本實総攬權綱之要道也一持體事莫不有體體者得其要之謂爾人君任宰輔以馭百官守法度以信萬民斯其體也若乃任一小官罰一小過有司之事耳而人君親之則有司懼矣夫上下正政令壹賦歛以時用度有節賞罰必信此天下之守也而朝行夕改守無所止則臣下恐懼皆思為己而怠其所職殃害及民怨讟不免而或召災異故為君之道在乎持大體先有司裁制予奪必信必一則雍熈之治可坐而致何災異之有哉一更化傳有之琴瑟不調甚者必解而更張之為政不行甚者必變而更化之今有司所甚患者曰財用不足曰選法撓亂曰官府不治三者而已改弦更張此其時也盍亦思其所由乎財用不足豈非所入者有限所出者無窮與選法撓亂豈非賢不肖混淆越格者多而非格者不少與官府不治豈非賞罰不明而名節素不勵與宜敕有司詳校一歲錢榖所入幾何所出幾何若所出皆為當出則財之不足將無法可理若猶有不當出而可以已者如不急之營繕無名之賜予據其名件一皆止之則財用必足矣又詳校銓選除合格外越格與非格者幾何任迴量其根脚功過定奪仍原其所由跡轍一禁絶之則選法必行矣官府之制上下内外相維相資各有條理果皆得人何有不治然人材不齊善惡必有故賞罰立焉若善者當賞而不賞惡者當罰而不罰則善者變而為惡而惡者狃而益甚又如犯至不叙大罪也而或巧圖復用老病謝事常理也或戀不忍去至有貪欺害民善於自蔽不即敗露上官不以審風憲不以察因習成風不知有恥治何由興宜嚴敕省臺公賞罰勵名節由京朝始則官府自治矣凡此三者更化之大略也三者果更民力必紓人材必多祥瑞必集國勢必隆然非更之之難行之之難也非行之難守之之難也惟聖天子以敬天尊祖清心之德守而行之又何難哉銅錢鑄金為幣起於上古至周太公立九府圜法於是有貨泉之名泉即銅錢也歴代相循以為國寶雖形制増損互有差殊然自周以來上下二千年有國家者未嘗一日廢棄葢金銀雖可貴非民間皆有之物惟銅錢不貴不賤為諸貨之母可以流布通行以此名之為泉言如泉流不竭也多者藏蓄為業雖遭水火亦無所傷貧者手持一錢入市亦可得一錢之物所以上下同寶古今通行今國家雖以寶鈔為幣未嘗不以銅錢貫百為數然則鈔乃錢之子錢乃鈔之母也子母相權乃可經久實廢其母而虚用其子所以鈔愈多而物愈貴也民間為見公家不用銅錢所在凡有窖藏錢寶之家往往衷私立價販賣與下海商船及爐冶之家銷鑄什器遂使歴代寶貨翻為民間所私兼自古有國家者皆因仍歴代見有之錢行用如五銖半兩開元通寶之類乃漢唐以來舊錢今縱以鑄錢事重費多未議舉行亦合收拾民間見有銅錢量冝立價官為收買見數與寶鈔相權並行庶使利權歸一不啟僥倖之心其於鈔法亦有補益又兼即目行用庫皆以平準為名以官倒金銀與寶鈔相凖立價故也今既開禁民間金銀價愈騰踴若不收拾銅錢為鈔之平凖誠恐將來日久弊深猝難整治愚見如此取自集議聞奏施行雪樓集卷十
