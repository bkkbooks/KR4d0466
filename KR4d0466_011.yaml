body:
  text: 雪樓集卷十一元程文海撰記逺齋記余來京師十年始築室室之東偏敞一齋為遊息之所名曰逺客疑焉解之曰余生長東南望燕山在天上四海一家得以薄技出入周衛違親數千里非逺乎余之始至也棲于南城之南凡八遷而宅于茲國中闤闠之地余不得有乃僻在城隅距舊棲又一舍而贏非逺乎客何疑客曰子之言則然大鵬九萬里一息二城相望咫尺日三數往復腹猶果然白雲舍雖數千里外以志養志如在膝下子以為逺未之思也客去遂記于齋壁至元二十四年夏五甲寅廣平程某記諸公題詠附集賢學士程公十年于朝日近清光而親舍乃數千里今以行臺侍御史得旨南還庶幾便養而回望闕廷又二千里外日以近者人子之樂日以逺者人臣之憂此逺齋所為作也夫忠臣孝子之眷眷於君親也一以朝夕左右為樂然亦難乎兩全矣子之愛親不可解於心臣之事君無所逃於天地間惟其所在而致其道豈以逺近間哉余既從公觀光于上國又將從公而南與公同其樂而不同其憂者思有以紓公之憂焉為是言也或曰近多懼逺多譽人所樂而公憂之何也之言也讀易而未知易之所以易何足以知公之心吳澄書逺齋銘閻復子靜吾友巨夫自洪之燕有宅一區有田一㕓舉頭見日尺五去天以逺名齋義或不然彼美巨夫學為通儒秉內相權乘御史車慶流千載道濟八區由是言之不亦逺乎張仲默必葺軒記汴張君仲默官淮南扁所寓曰必葺而謁記於余余曰子何葺之皇皇哉冨人之居崇閈屹墻雄柱修梁疏疏晝窗沉沉夜堂故不俟棟撓榱崩藩拔級夷始求匠氏之方今子無屋屋於官而歸厥直之當遊目環堵塗塈眯眶昻首上覆茅茨壓吭簷頽木蠧土洳草荒壁裂暑而漏日瓦破寒而受霜驟雨飛下顛風走旁偶客寄乎蘧廬葺不葺其何傷仲默曰不然吾知葺吾居而已而葺之為官乎為私乎吾暇計乎哉今夫鳦之巢于誰氏之家也春而來秋而歸未始有定之也然有烏衣者頡頏于飛言采其泥言壘其棲雌雄偶居子孫焉以肥何嘗曰此王謝堂也烏用是修之治之哉古之人有世一葺者矣厥考作室厥子肯堂是也有歲一葺者矣亟其乘屋其始播百榖是也有時時焉葺之者矣一日必葺其墻屋是也彼皆有為而葺也若夫吾之葺也何所為何所為椽桷之腐焉者鮮之磚甃之缺焉者填之垣翰之脆焉者堅之隙壤之莽焉者軒之吾知葺吾居而已而葺之為官乎為私乎吾暇計乎哉余聞而賢之曰噫天下事當葺者何限有得其説而推之者縣葺于而縣郡葺于而郡朝葺于而朝欲無興滯補廢得乎則又勉之曰人生天地間百年一蘧廬耳謂蘧廬而不修之治之物欲之不除氣質之不改棄安宅於漂搖委廣居於蕩析則所以與天地相為不朽者烏在此獨非葺之大者耶仲默聞余言躍然曰吾知葺吾外公獨教我葺吾內葺吾外一日而必葺葺吾內終食造次顛沛而必葺外且不可不葺而况內乎哉余嘉仲默之葺有大於墻屋者也次第其説以為之記沖虛通妙先生王君祠堂記至元壬辰春將奉母喪歸于兆剃草穿壙畚土輦石事嚴積雨泥潦大懼弗克葬遍走山川家君曰此邦有王侍宸人謂司隂晴柄冰澗鄧主簿實嗣其法有禱輒應盍求諸二月甲子朔往叩蚤猶陰晦雨垂垂欲下已而雲破日漏午大霽自是再旬不雨至甲申掩壙已乃雨竟月余歎曰異哉一日主簿君來謂余曰侍宸道法能呼吸為風雨在宋嘗被遇徽髙二朝沒而邦人事之如生歲已丑旱禱而雨辛卯旱又禱而雨祠在天慶觀廡下卑褻弗稱今即其昔所寓地于觀之左而改祠焉所以報也徴余文為記余寓盱未二十年客外之日十九不能悉盱故實獨識君久知君為侍從家賢子弟又因君知侍宸為此邦人所嚴事且於余之有禱也其應如響是可記也侍宸事迹具實録主簿君名桂孫字芳逺自號冰澗道人至元壬辰四月既望程某記此君軒記古之爵五等而有土有民者曰君非有土有民而蒙是號必其德有可尚者也人而能是亦希矣竹物也而何以得此稱於子猷哉竹之德固可尚心虛而神清貫四時而不改也晉人尚雅趣頗以不事事為清虛吁比德於竹者如斯而已乎吾至官借宅於人而植竹於西軒之外復借子猷所以號竹者名吾軒吁吾軒借於人也軒之名借於人也皆非吾所自有也獨所以如竹者非可借於人而意子猷或未之知然則子猷之君此君亦借耳借歟非歟是未可知也吾將問之此君至元三十一年五月五日記寧德縣重修學記福州舊領縣十有二二百年來士學為東南最寧德較他縣若弗及雖然此以科舉之士言也初無與乎人才之實閩故家星錯棊置爾來潛深伏隩不見人而人不見者多矣若余所及見寧德孫君侁者又豈敢以科舉之士例視之哉君少年遊太學方衆人汲汲進取之時獨能師其同舍之先輩俞君晣從事於經學世務及既成進士官于浙往來猶造其師之廬而考業焉今老矣務學如少年時一日詣余請曰寧德自宋嘉祐始有學近歲邑再燬於冦火將及孔廟輒息異哉若或相之者宋末割長溪之半置福安縣國朝遂升長溪為福寧州而以寧德𨽻焉至元二十六年州之守行縣視廟學弗修畀金俾前邑令葺講堂新四齋兩廡三十年冬提學者命侁掌教事學無廩養士之粟歲貯于私家非便首營搆之而縣大夫議大修完乃捐俸以倡諸生亦各出力以助縣主簿董其役鳩工度材成先聖殿視昔加崇朵室回廊靡不更理繚以宫墻二百八十堵有竒從祀金鄉侯以下舊圖于殿壁兖公郕公沂公配饗西靣坐而三公之父立于後於禮為未協乃遵彛式分繪于左右廡以今年五月告成欽遇皇帝御極播告于天下上承祖訓嘉惠學校士類莫不聞風以興然勉勵宣明部使者之職也盍與本原古者建學造士之意以誨飭于邑之諸生乎為是敢有請某竊惟朱子以道鳴于建閩之士家藏其書人誦其説而能實傳其道者蓋鮮前此猶曰有科舉之纍也而今無之有能一日實用其力者乎謂朱子之後不復有朱子余不信也寧德雖下邑居若是其近世若是其未逺而孫君又嘗於科舉之外有所講聞矣余何言哉余何言哉惟聖朝之敦儒崇化州縣之為政知本與夫孫君之不失其所以教是則可書已邑尉髙顯主簿李榮令寧柄其長曰超爾齊前令方秀仁守白璧也孫侁云至元甲午八月朔記漳州路重建學記異時東南之學行天下漳為文公過化之地學官禮樂他郡則之按宋慶歷二年始建學于州治之東南政和間移置治左紹興九年復慶歷舊基中燬于兵至元二十有八年重建禮殿孑然於草莽瓦礫中卑庳苟且過者不知其為夫子之宫也聖上龍飛首詔各道肅政亷訪司勉勵學校雷行風動其曷敢不共僉事趙君𢎞道分司南還亟稱漳學興復一出郡博士郭廷煒之力廷煒以二十九年夏五月實來時廟之東西各有隙地有司據之以聽訟以畜馬廷煒喟然曰此而不復不可以為學白于公歸侵疆乃鳩工度材首崇殿宇像四公十哲明年儀門成又明年學門洎東西廡成又明年講堂成修髙廣深翼翼嚴嚴廊孰垣墉內外有截几席炊煮百須具備郡人士又言屬縣廟學廢未復延煒造漳浦班荆以祭觀者感泣是營是度捐俸為倡而漳浦廟學亦成長泰龍岩放焉余聞而異之既而漳之士以圖及創修顛末來求余記於是𢎞道之言益信惟學校廢壞比比相望前修雕謝大雅寂寥持牒來為校官匽薄歲月忽不省存郭君乃能不愧於其職拮據捋荼卒致完美可謂難矣方今遭逢聖明敦儒崇化無有逺邇漳之士子藏修遊息於斯盍亦相與厲而行精而業為詞章者母拘拘於科舉而用力乎詩書六藝之文明理義者母嘐嘐於訓詁而篤志乎聖賢體用之學孝弟忠信以養之禮義亷恥以維之求放心黜陋見而嚴恭祗畏以守之以盡其材成其德不至於古人不已是則朝家建學立師之意亦文公所望於漳之父老之裔孫也抑文公記漳學教授廳壁有云教授之為職惟自任重而不苟者知之夫人能以自任不苟之心為心則天地萬物孰非吾事况一學乎郭君蓋非苟然者其自任之重必能以是充之矣郭君莆人紹興旌表孝子之孫少擢進士第文行皆可書元貞元年四月朔記台州路學講堂記夫子之道與天地並繇周敬王庚申距今千七百七十四載改物凡幾代未曽不右斯文我先皇帝混一函夏詔天下郡國士習先聖之術者並復其身厲賢也新天子嗣位訪落重申前詔以惠博士弟子貟繼志也某際遇兩朝亷問七閩奉條奬勸屬所選行義年尉薦宣化也凡職于斆者築室館士儲書聚誨思其居也臨海教授新安許某不逺一力以書來諗台舊有學學有明道堂歲乙亥􅑒于兵朔月月半部使府侯至坐直舍如斗大餘皆露立灌莽中前乎此師氏忨嵗愒日忽不省存某始至即謀此邦耆宿得錢氏屋五間修髙廣深以儒人所助泉布倍直庚之移為講堂翼翼嚴嚴右祠先賢左庋器服從祭象似樽罍胡簋應圖合禮齋廡庖湢昔蕪今治几席炊煮百須具備經始於癸已陽月落成於甲午相月又闢小學於門左侗稚師必士民之選章逢來者都授已課試署甲乙猥曰居官無官官之事處事無事事之心非教授職也事若鮮淺願賜一言以紀顛末某竊謂官先事矣士不先志可與不也吾儒何儒斯文何文文王而下惟周公諡文憲夫子諡文宣周公之文制作之文也夫子之文雖不得位而制作豈止性天道云乎哉文不在茲之歎豈止刪詩定書明禮正樂修春秋云乎哉如有用我東周可西時輅冕舞規模四代泰伯堯曰歷敘唐虞夏商周聖學之傳治道之盛此則吾夫子之儒之文宇宙宏闊學問浩大今儒無科舉之纍而或昧辭遜羞惡之端間有志理義之實而或欠經天緯地之略平居講貫無半知解異時臨事必錯路歧故不患百年之無善治決不可一日而無真儒俗流變俱溝瞀嚾嚾解果其冠屈竒其服羣稟孔氏之門直視越下之茠若斯儒也有之無益無之無闕人材器也教授造就人材官也儻以余言朝夕誨儒書者庶幾台之人士一一成材大器逺識時乃之德領聞髙風時乃之功某年某月某日記建昌路重建太平橋記盱居江閩間南北往來必道竟上郡東舊有橋橫江之壘十有三跨梁之楹七十有三中為亭東西為門至元丙子燬焉民病涉為梁以濟壬辰六月郡侯章公總管趙公帥同僚洎郡寓公大家度材鳩工癸已十一月始事越明年七月落成柱石棟宇髙廣雄麗視舊有加惟盱為江閩要處而橋又為盱要處是不可不復成之日適際聖天子龍飛之始河海晏清霄垠軒廓郡人名之曰太平既請書於余則又來告曰是役也君之父若叔與有力焉敢以記請余不得辭夫一物廢興莫不有數由丙子至甲午幾二十年而橋始復太平之世民有餘力一橋雖微可以觀治矣其自今始舟車之輻湊商賈之都會千萬里重譯之逺夷然而安曠然而四達凡自此塗出者其可不知君上之所賜乎既以諗盱之父老於是乎書且詩之曰維盱為郡江閩通衢郭東有橋又盱要樞前此簷楹星斗可㪺中厄於數或艇或泭而後來者思濟輿徒梯梁雖駕風雨則虞比來一載木運石驅鴈齒翬飛鬼呵神扶日東西行萬武奔趍邦人士語疇昔所無伊誰之功公侯大夫拜稽對揚臣何力乎明明天子澤被我盱涼颸暖曦晴江漫湖童謡老壤載歌袴襦祝橋壽耉其樂居居國語音魚臣賦此詩天保嵩呼道一堂記余來閩之三載實大德初元雷雨作解獄訟不留文書頓省自公退食時與仙翁釋子談方外事一日髙士劉采山介僧中順來余識劉而未識順也問奚自則曰固儒也願有謁焉鄉邑懷安北五里曰桐溪山水峻清溪上之士曰樊世顯師吕公居仁友林公少頴構堂象孔老瞿曇氏而祀之子朱子書其顔曰道一且為之記端平燬於鄰改作西山真公復書之復齋陳公續記之至元廢于兵今樊氏子孫廓而大之之書之記未有復者敢請余笑曰是非可以言語盡也虎溪三笑今日之事非歟畫史圖之道一在是矣奚而記雖然余孔子徒也知其一而非知其二也二子盍各言而一余將因而一而究吾子朱子所謂一者可也曰太上寶者三西方戒者三曰是其粗者耳又曰無爭三昧則不爭善勝也和光同塵則不垢不淨也曰亦其粗者耳乃又曰進是則道德同焉心性同焉生死異而所以出生入死死而不亡者同焉教亦多術矣殊塗而同歸余又笑曰是於吾儒人生而靜積善積惡之義大學正心誠意洪範嚮用威用之旨似有合者二氏之道有以異乎無以異也二氏之於儒者之道有以異乎無以異也子朱子之所謂一儻在是乎嗟夫一陰一陽之謂道繼之者善也成之者性也孰無性也民之秉彛好是懿德孰非民也故以迹論之則一而三以道觀之則三而一初非比而同之而自有不能以不一者也推是以往雖萬者可一而况於三乎朱真數君子復起不易吾言矣抑又有説焉異而同則三固不能以不一同而異則一亦不能以不三故古今三者各自名家先儒亦有以為鼎立於天地間而闕一不可者然則各有一一試索言之黃冠者曰吾抱一為天下式也方袍者曰吾萬水而一月也余方營吻未皇二子詰之不置則應之曰弗二以二弗參以三因次第其語而遺之俾記之堂上夏五月記福寧州學記豫為孫君侁記寧德縣學之三年而又以記福寧州學為請按長溪唐武德昉為望縣閩王氏析為寧德宋末又析為福安皇元一統肇州福寧二邑𨽻焉初惟夫子廟在縣治之東慶歷癸未遷城東南陬始有學自元祐庚午更新而堂宇備自師公古鄭公樵教授而經術明自鄉儒先遊紫陽之門而絃誦衣冠盛歲久屋且敝至元丁亥白侯璧改作而颶風壞之元貞乙未樊侯忠又改作而颶風又壞之丙申陳侯翼請于省臺命同知州事孫璧董其事協謀悉力樹戟門作禮殿繢從祀祠先賢會講有堂肄業有齋畚土輦石燥濕崇卑翼翼嚴嚴規宏而工密可書已然豫前記學其説殊未竟校庠序古矣明倫之外無他説也詞章勝德行微先儒有憂之歸而求之性命大雅不作假性命之説以媒利達而世道與人心俱往矣夫詞章性命之學猶不能無弊則夫管攝人心扶植世道必有攸在不然羣居終日翕翕訿訿相與商功利而較智術弊又甚焉聖朝一視逺邇制度考文嘉惠儒者𨽻名者不役于有司其以德行文學進者胥此途出新州者新學之兆也新學者新士習之機也士無科舉之纍盍亦思古人所謂明人倫者為何事修其孝弟忠信於家為孝子於鄉為善人於國為忠臣斯無負於國家設學之意若夫工詞章而不窮其理談性命而不踐其實其不為功利智術之歸者無幾矣吾為此懼閩縣學記閩為縣自隋始縣有學自宋慶歷始學在九仙山之麓粥民地為之廟成於熙寧方尹叔宅修於崇寧莊尹誼至元戊寅燬焉越五年創禮殿又五年創西齋苟完不旋踵而敝門徑欲蕪士非無志往往畫於力不足元貞二年春教諭韓君挺特實來以興復為已任謀於豫乃諭縣官勸學子協力圖之鳩工度材修廢補闕繚以重簷護以闌楯新像設繪從祀而廟始嚴會講有堂易桷與瓦置二齋設小學而學始備以至門垣階序墁甃漆丹悉如式於是故老來觀歡謂前所無有諸生詣豫徵記董子曰設庠序以化於邑然則邑學古庠序也所以明人倫也人而不倫則物矣科目興月書季考姑設利祿毆靡使從豈道德果盡信哉故明倫之説為書生常談其於化民成俗之意戾甚閩為福附庸非深山窮谷比士風之盛五百年于此矣科舉廢後生無所事聰明日以放恣詩書而刀筆衣冠而皂𨽻小有材者溺愈深居近利者壞愈速不能不蹈先儒之憂天朝嘉惠學校𨽻名者復其身德行文學必繇此選是學校重矣况邑於民尤近哉今堂宇新士習盍與之俱新讀書窮理必思聖人所謂教者何事充而仁義禮知之性盡而君臣父子兄弟夫婦朋友之職求無愧於為人由一邑之善士為一國天下之善士庶幾庠序不徒設道德可盡信且以解先儒溺深壞速之憂是惟明時崇儒重學之意而亦司教化之責者所望於斯邑之士也尚勉旃哉韓君故孝亷孔惠公之子家學有淵源故於斯文篤意如此同文堂記若昔聖人之興必有大制作所以通神明之德見天下之賾同人心而出治道也皇犧闡天苞神禹著地符一用此道皇元混一區宇日月所照共惟帝臣開闢以來所未有制蒙古字與正朔同被暨位諸字右其開闔布置井井有截與卦畫相表裏變動周流天造神化備前古之闕遺垂億載之矩矱還淳反朴約繁就簡舉而措之天下之民謂之事業百姓日用而不知烏乎至矣乃建翰林院設學校道有提舉郡有博士置弟子貟肄業者復之業成者官之際天薄海蹈詠鼓舞初福州路學客寄儒宫校官漫不省元貞乙未江陰宋君友諒實來戶外屨滿請于公得舊廨省鞠場輦糞壤易朽腐不旬月庭堂門廡齋序庖湢悉完諸生列几研旦暮誦聲琅琅亷訪副使商公晦為扁其門曰蒙古字學君名其堂曰同文請豫書且願有述夫書學尚矣先儒論六書七音之略以音諧聲以字母部諸字雖重百譯而文義如出一口蓋唇舌喉齒牙之相須宫商角徵羽之相宣輕重髙下清濁之相錯自然之同也四方之音各殊閩又甚然而占畢之士知類通達若建瓴破竹無留難者同可知已雖然字藝也學道也精粗本末初無二致天理民彞菽粟布帛知其同而不知其所以同可乎豫將以豫所知者語子字字從子學字從子事先生則為弟子必恭事父母則為人子必孝事君父則為臣子必忠傳曰車同軌書同文行同倫今天下車同矣文同矣學於斯者其必相與薰淑扶植倫紀人人皆有士君子之行是則同周官六藝書居其一賢者能者胥此焉興此聖朝教育之意也諸君幸勉之哉宋君精敏篤實有志斯文故樂為之記而又以豫所知者告之大德元年陽月朔日記金溪縣廳壁記金溪直撫之東竟宋淳化中改鎮為邑至元丙戌豫自集賢奉詔出使道之所經目其溪山之勝邑無大川有山橫亘數里名為幕山治所所面也官署敝陋曰丙子燬於冦草創未暇完美後十有二年豫歸自閩明年十一月僉事曽侯以書言曰金溪蕞爾邑往年公過之官署之敝陋既更修矣蓋自元貞二年濟南吳君來二令與邑長協謀次年正月經始七月落成冨者助資而不為費貧者效力而不為煩治事之所壯麗顯敞於舊有加焉左典史舍右架閣吏房狴獄悉易而新又遷舊廨于後為公館若宣聖之宫社稷之壇烈女之祠亭以送往而迎來關以衛內而間外廢者具舉尉馬君實相其事僚吏士民咸樂其成願紀諸石以公之嘗至斯也敢以為請豫謂朝廷為民設官邑於民為最近於官為最難其近也行一善民遄被其福行一不善民遄被其禍其難也拘於文法迫於督責而窘於公私之供給資用故其賢者靳靳自守齪齪不敢為或受成於吏以奉文法免督責而已其不賢者招權納賂瘠民以肥妻孥虛民以實囊槖秩滿則去視官署傳舍耳而暇完美之以為方來計哉斯邑之長二能如此可謂賢矣繼至主邑簿者蕭君乂賢邑之民庶其有瘳乎昔召伯之於南國也所憩苃舍民愛之而不忘况朝夕治事之所哉凡治事於斯者其必徇今之文法而以古之循良為師避上之督責而以下之疾苦為念有所守有所為無所制於吏則民之不忘將有甚於南國之棠也諸君勉乎哉馬君名某蕭君名某吳君名某邑長名某時大德二年歲在戊戌十有二月朔具官程某記並書通真觀記道家無為又曰無不為猶之水焉無為者其止無不為者其流也昔之人由其説以之佐天下以之全身以之致時載之當年頌之後世豫郢人也郢中父老為言長森有真牧先生者持老氏之教絶江而東興瑞慶靖於九宫山孚惠先生其徒也又興夀聖靖於潯陽於今彌昌豫聞而識之既而馳驅王事往往道出江淮間見所善洞淵法師雷君又興通真靖於白沙之江滸曰此吾先師之故祠也蓋孚惠昔嘗治疫有功民德而祠之且百年而燬矣本江海故地泥沙斥鹵君畚土輦石峙板幹而基之繇至元甲申迄大德丁酉積十四年而殿堂門廡室房庖庫園田倉庾罔不畢備與九宫潯陽相髙盛矣守其教者顧可諉曰道無為而已哉然而始基也豫過之觀其煩而守之以一勞而處之以安成也又過之觀其處守無異焉然則無為無不為之旨不在茲乎嗚呼學無小大咸欲其傳也久而益非其宗至或自畔所受下至百工之事亦或然者余每竊喟焉今若雷君體無為而用無不為真老氏之徒歟噫傳真牧孚惠者雷君也傳雷君者誰乎後無有竊喟者焉斯傳矣君名希復號凝和沖妙崇正法師為通真第一代祖云髙峯書院記髙峯者勉齋黃先生晚年所以名齋也宋嘉定癸酉勉齋宰新淦六十年間流風未泯也咸淳癸酉先叔父西渠公實來為政一以勉齋為法致其尊慕以示風厲於是捐俸錢三百緡市曽氏宅一區為髙峯書院塈屋壁建門廡堂設勉齋像朱子而上别有祠歲十一月合九鄉之士行鄉飲酒禮至者二百七十有五人延致徽菴程先生若庸為諸生講説一時文物之盛觀聽之新逺近相傳以為希闊殊尤之舉次年三月創燕居堂於西以祀先聖方將請賜額儲粟以待四方之學者而不幸以憂去乃命邑士張元晉鄒奎董雲章相其成陳茂謙韓謙復相繼長之公起復佐沿江制閫又守建昌歸國朝入覲為翰林侍讀學士雖去新淦而髙峯未嘗不往來于懷也有之臨江新淦者必囑之護視書院之創也鄧氏首助田若干畝新淦為州部使者分畀賔賢貢士在官之田而歲入倍他日然猶輸民田之賦於官元貞丙申楊震仲白之當路轉聞於上而始免輸大德戊戌臨川周栖梧奉行省命來為長修廢補敝於勉齋祠側設侍讀公祠又新內外重門增塑先師四國公像更造祭器燕器百用以完相與左右者廖𢎞毅楊景囦嚴志仁張應樞楊洪張戊孫書來謁記豫昔者蓋嘗親見叔父創始之勤而慮善後者之難其人也楊君周君能若是敢不書以為來者勸雖然書院之設豈徒然哉西渠希勉齋者也勉齋希朱子者也朱子希夫子者也由勉齋之學遡朱子之學由朱子之道遡夫子之道有能一日志於斯事者乎不然居於斯遊於斯為之師者官滿而去為之弟子者食已而出今猶夫人也後猶夫人也是豈勉齋之所以學於朱子而西渠公之所以望於後人者哉大德四年八月朔日記崇陽縣社壇記鄂屬邑七崇陽為望乖崖公舊治有異政焉大德五年春余來觀風考其遺迹僅有存者而社壝窊陋最甚乃擇善地示以禮經俾之改築越三月而成其邑長來言曰下官魯不知文然鄉者宰邑江山邑中修營咸刻石記今茲之役尚不可無以寧神而非公亦無以示逺意者亦欲如江山刻石不識可乎豫曰可哉雖然張公之政非一事一物之謂也張公之政之異非求竒於撫字催科之外也為邑長於斯者尚其思之壇四在美美亭前東社西稷居前東風伯西雨師居後其制一本於晦菴朱子所定云達嚕噶齊瑪哈穆特尹李謙主簿髙義府尉孫玉翁日北至具官程某記並書承事郎僉江南湖北道肅政亷訪司事郭貫篆額鄂州路新社壇記入其都邑視其民人社稷其政可知也鄂為荆部大邦社稷之祀宜嚴以顯而顧弗然蓋自宋淳熙十年更築新安朱子為之記記石故在而地久入浮圖郡吏相承綿蕝望祭於是嵗比不登民多流冗大德四年春總管安侯祜以妙柬來首勤於民民鄉治矣則與部使者謀築新社豫為之行視得地於城東北隅髙明夷曠面勢具宜乃屬徒就事越明年成其數度悉本朱子所記且輦樹其石齋廬東又請豫記豫惟國家之所委寄者在是民人之所生息者在是可弗重歟守者衆矣侯獨能知之聖人先勤民而後致力於神侯又能承式之可尚也已謹書其事以為受民社者勸侯有風裁屢冠豸冠故所為類非俗吏所及云具官程某記並書武昌路記大德四年某月鄂州守臣安祜言祜幸甚欽承天子明命守此民社賴國家憲章修明之力所守幸以無事洪惟世祖皇帝肅將天威寧一方夏鄂率服為南國先地居上遊荆湘廣海之所走集爰建外省而州仍舊名殆非所以旌武功重方鎮也宜易州為府敢昧死請於是州上外省外省咨中書中書集學士禮官議咸曰鄂武昌故境先皇帝駐蹕之地也克集大勳實本於此請如守臣言賜名曰武昌明年冬十一月中書以聞制曰可即日改鄂州為武昌路邦人大夫士趍歡族語共慶大賜乃合樂於公堂以樂之而謁於部使者程某曰願有記謹按州本江夏郡之沙羡孫權破敵樊口因制美名曰武昌隋以為縣而即沙羡為鄂州唐之中葉鄂為節鎮假邑名以名軍而郡通為武昌矣五方雜居四面輻湊江漢間一都會也世祖皇帝受天景命肇造區宇四征弗庭罔有不服觀兵南夏首幸于鄂黃鵠山之陽有車轍馬迹焉威靈所加至今過者悸汗不敢仰視方是時東望而天吳稽首南指而祝融先驅武功之所被蓋逺矣越十有五載舉成算授元臣枕席過師尅日獻凱于闕下光嶽分而復合車書異而復同烈烈巍巍超軼今古雖至仁無敵於天下亦以伐功實始此州執其樞紐而進退之形格勢禁大江以南若運之掌矣孟子言天時人和而不遺地利者豈不以天人機括之所在非聖哲亦莫能用之歟故能臣妾覆載之內宗廟饗之子孫保之於戲之功之德可謂武而且昌矣皇帝躬仁聖纂基圖保大定功無競維烈革州為府之請慨然俞之先聖後聖其揆一也然則孫吳肇於前李唐僑於後蓋駁乎無以議為亦孰知有開必先兆見千載揚休嫓美乃在此而不在彼乎使臣雖魯嘗以文墨受簡知宣昭遺烈誼弗得辭謹再􅕥稽首為之記抑上之俞下之請豈相與誇美為快哉誠欲使自今以始無小無大凡從事於此土者體國家之勤勞念皇業之不易斷一樹殺一獸猶必思其所以生而不敢縱矧於受任保其赤子可安居自豫而無祗懼惻隱之心乎然則是尤不可以不記也具官程某記重修南陽書院記大德五年冬重修南陽書院成大成殿楚梓堂日新養正尚志立本四齋凡新屋百八十礎從祀兩廡武侯祠鄉先賢祠尊經閣凡葺屋百八十八礎木千有竒瓦甓十四萬八千工萬二千二百而殿之役最大南陽書院者宋淳祐中忠襄孟公所建也時襄漢受兵士之流徙者聚於鄂公立學館六十間以處之括田租地利以養之聘賔師陳爼豆以教之又肖祀先正諸葛武侯以表厲之故名某異時觀遊其中而知公盛心也後四十年以使事來則藩拔級夷僑祀夫子於講舍為之愀然欽惟詔書表章斯文冠軼百代宫墻宗廟休有烈光而名具實隳若此甚不稱聖天子崇儒興學化民成俗之意也且成於季世而荒茀於隆平武侯忠襄固不言諸君獨不愧於心乎乃俾亟圖之議既協有官守者輟俸以倡鄉人邑子勸趍之故不以屬吏煩民而材良工堅細大弗苟經始於暮春之初訖役於十一月之望噫事未始不可為也人秉此心此屋豈使至此今一倡而翕然悉心展力復底于成庶足以稱表章之盛矣然思往者扶攜顛沛之人一旦有所芘賴中流一柱蓋不足喻上既不鄙夷之且期以古人之事下亦相與求志達道共守所學以期無負而今之悉心展力者往往其子孫也詩云以似以續續古之人蓋似之斯能續之國家長育人材之意不在茲乎嗟夫君子之於學亦猶此屋矣知恥則學無不成滅私則事無不集悉心展力者孰無子孫尚其教告之嗚呼昔者南陽之人躬耕草廬而已是役也實賴鄉人前進士王應龍率之儒學提舉武乙昌相之餘執事者山長史時敏書之碑陰具官程某記又題名記勉勵學校使臣之職也僕受命此來思服厥事而南陽近在治所陊剝荒圯最甚乃弗獲已而一新之念創始之難因循之害伐石記其説矣然是豈一手一足之力哉協恭和衷事以克集不可忘也用紀名氏嵗月于右靚淵堂記監察御史完顔公按事海南道過武昌豫始識之承顔接辭肅而寬正而不亢知為愷悌人也時為大德四年之秋既事而返每見益親又明年奉使湖廣􅍁語者彌月前之所見益信不誣一日謂豫曰吾昆弟四人蒙恩皆綰章綬吾獨膺選任俾冠豸冠吾心常自以為非據每為之惕然懼蹙然不寧且慨然曰仕至此亦足矣尚安所求而不知止哉吾心蓋淡乎如止水之淵矣盍為我言之豫曰噫知足不辱知止不殆其言行於天下二千年于此不知者不必問知其説者亦莫能守也嘗泛觀僨臣敗子禍其身以及其國家者往往由此蓋十七八焉且人心誠若水然其不風而波或流而不返或鍾聚汙潦或孟門瞿塘態亦多變矣今君以強艾之年退然不以冨貴自驕而以為戒澄不清撓不濁誠止水之淵已乎賈太傳有云淡乎若深淵之靚其幾是耶君笑曰子善為説辭吾奚以當然吾欲構一堂以靚淵題之何如豫曰美哉夫淵之為德泓澄渟㴠蓄而不泄深故能靚靚故能照妍媸自形毫髮無隱可鑒而不可玩可親而不可犯望之者凜乎不可測而淵之為淵自若也豈非君之所以嫓美者乎詩云不競不絿不剛不柔君其有焉堂成請以是為記君小字􅕥都服勤中外多歷年所不務赫赫名不為容容計而其所就則已加於人倍蓰矣然人罕能知之海南之事近故尤著云雪樓集卷十一
