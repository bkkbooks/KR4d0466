body:
  text: 雪樓集卷二十八元程文海撰詩次韻廣西王景韓憲僉見寄江漢飄零一夢初少年心事了無餘雙鳬乗鴈妨賢路五栁孤松憶弊廬黄鶴樓前塵隔扇碧蓮峯下雨随車新詩乍見如公面有使頻將慰索居次韻郭西埜見寄二首我本山中一倦民出山猶幸挹真醇何妨共結雞豚社鬬取樽前見在身自别君来肺欲塵清泉那得取諸隣夜来夢與山靈語華子岡頭見異人次韻盧疎齋就以贈别二首百川晝夜流萬折不能止羣山勢崩奔終古乃在此人生費推輓三嘆中夜起瀟湘有佳人朗月鑑秋水思之不可見曠若隔千祀相逢在嵗晏使我寝食美又言當逺别東去數千里何由小躊躇招招彼舟子芥拾琥珀針不言自相得留君我無辭送君我無力願君加飡飯努力崇明徳江空餘深寒出入慎扶翼梅花照清頴夢寐耿玉色矯首東南雲金門幸回憶寄王寛夫侍御墨池曽别右軍來回首何時笑口開昨夜東風吹好夢故人今上鳯凰臺寄趙子敬治書二首父老猶能記福星煌煌今在太微庭五年江漢烟生土惟有甘棠一樹青南北參辰十五年狂奴狂態故依然何時握手平生事夜夜南樓月滿天寄潘景梁都事二首𣺌𣺌美人天一方思如江漢不勝長東風唤起三山夢月滿庭花㡬樹香憔悴江湖見在身十年前事只清塵鳯凰臺上闌干曲應念天涯有故人觀空軒焚蘭登上方倚策得幽觀塵心一昭曠風篠正凌亂道人欲觀空花臺對香案融融雨初潤靡靡春将半未詳姚與魏縠葉珊瑚榦豈無豪貴惜亦有子孫看風光本何有可愛不可玩殷勤道人心邀我揭柔翰故知非佛事聊用標讃嘆無根優鉢曇過眼河沙筭書成小窺簷紛紛現霄漢舜舉畫棠棃練雀霜暈棠棃臉風梳練雀翎含毫心欲醉開卷眼還醒送孟子周御史翰林逼華盖學士如堵墻我昔従東来白鷗入鵷行又如彼棲苴稊米扵太倉無補舜裳衣幸識堯文章孟氏古作者周鄒漢平昌當時梧竹間鸞鵠今髙翔瞻前忽在後復若揚粃糠相知始相識此樂殊未央非無酒與肴三嗅不肯嘗英韶發孤奏二柏失老蒼何以傲嵗寒篋笥留耿光何以慰别懐願保濟逺航送劉欽夫御史乗驄萬里行光華動南極江漢及早春草木皆喜色欽夫吾所欽握手如舊識詩書與禮樂談笑出珪璧寒亭列山尊我欲勞逺客再四招不來威鳯方覽徳使我心恧而無以見雙柏忽辭黄鶴磯遄返烏衣宅瞻言在中河杳杳浪花白天空雲水闊欲送無羽翼輕舟行順流頗以戒潮汐努力重明時夀身夀家國周耐軒總管挽詞總角誇神秀懸車見達尊雙旌傳宦學千里賴生存馬鬛山扉夜厖眉繐帳昏嵗寒留屐齒凄斷不堪論鄧中齋挽詞中齋吾所敬一别㡬飛螢栗里蔵名字歐鄉有典刑龍蛇那起起鴻鴈已㝠㝠淚眼河汾述猶占處士星送劉仲誠歸潯陽不見匡山久髙人得飽㸔遺民甘入社中允竟辭官南極光芒逼東風紫翠寒君歸煩問訊五老近平安寄郭西埜憲僉二首風净㸔花陌上塵遥知露冕正行春麻姑定向方平語三十年來第一人投林心似後棲鴉黄鶴留連老嵗華千里家山棠䕃好春風何日岸烏紗送尹生歸江西江漢秋深鴈過稀悠悠歸思夢先知輸君去住無多事顧我留行待㡬時野岸曉光千棹急平湖寒影數峯欹拍肩試向洪厓說倘有黄花覓一枝家山飛雲圖吳雲楚客两覊孤我亦先人有敝廬風雪江湖歸路逺不知誰為冩成圖次韻程文卿并束憲府諸公嵗晚江湖一舸歸故人水驛寄新詩風霜客鬢非前日氷雪梅花似舊時閩嶠十年常在望西山千里重相思喜逢官府清平日林下従今生有涯寄陳止善繡使王春煦萬宇八使来宣昭使君古徳星所至聞虞韶憶經沙羡陌弭節睠久要相望江北南鄙吝一日消漢江鴨頭緑奉以磊磈澆驪駒曲未終渺然但清颷匡山綵雲起繡衣已當霄迢迢江閩際往往山岳摇豈意桑梓間猶得親華鑣衡門劣容車聊以永今朝至今謦欬留使我神思超瞻言既匪易既見終成遥遥知按行處氣壓滄海潮繙經有晋石水底字未銷山靈知素約寤寐苦見招使君幸踐之毋謂方乗軺次韻王山仲見貽清退庵中老風流昔所親江雲猶薄暮宰木早先春文采傳家舊詩章發興新朝宗秋水在去去自知津次韻王子炎見貽每逢佳句百憂寛頗覺鷗盟尚未寒傳語烏衣兩公子頻抄新作寄人㸔西湖小景一片無情水笙歌日日春至今圖畫裏輸與眼明人送南豐曾敬齋學正歸省芹藻香中識嵗華滿懐霜橘苦思家来時賸載螺江酒要及枝南第一花畫牛觳觫春来苦羣兒未必知良工如有意好冩駕犂時張山泉自愚荘来徃仙岩曾宿喬林絶壑邉月明終夜聴山泉宫商斷續初無譜欲問張君借五絃甲辰秋三谷山房落成次人韻二首随牒年年東復西歸來結屋傍叢祠詩書何地不千載山水扵人有宿期傳後莫忘初葉祖落成恰是菊花時君㸔石上晋人字一一琳琅金薤垂書是先人屋壁蔵牙籖重理鎮山房一爐香火見尊祖百世兒孫尚肯堂著在名山期衆共向来遺愛豈民忘詩成難盡意中事石磴蒼蒼澗水長送益清陳君齒宿如何意更新黄花清露共精神絶憐康樂經行地還遇淵明行輩人樓對夕紅誰拄笏澗涵秋碧蹔垂綸區區太史占星聚不見髙陽有後陳次韻趙卿月見寄林泉遺世味幕府念平生尺玉偏勞寄雙魚不忍烹有山随李廣無酒飲公榮戯問朱簾客應知暮雨情用前韻送閻伯雍期子銷殘臘寒江水又生宦途謀北運客味厭南烹早就金門獻先㸔玉樹榮家公應問我泉石正闗情題畫屏折枝十二首牡丹天香銷卯酒國色艷朝暾無地堪池舘留㸔到子孫雞冠旌節餘空樹金錢失舊妍蕭蕭風雨夕獨立聳貂蟬棃花清香發妙質皓齒映明眸惆悵東䦨俗移來白雪樓長春生意春長在人間自四時紅衿映肉色消得簡齋詩黄葵金椀傾初日檀心颭曉風殷勤挹黄露擬進建章宫碧桃平地碧雲起明璫冠翠𬎼種時和玉露折處宴瑶池来禽婀娜骨仍瘦匀圓韻有餘折來配青李如對右軍書棃子玉屑金莖露蒙之緗色裘霜刀為發蔀内熱得真㳺枇杷磊落黄金彈梢頭萬顆饒詩人如識面未必賦椒聊木𤓰糁糁金沙面宣城出貢餘倘令和鼎食豈必愧瓊琚櫻桃百顆輸先獻圓疑火齊甘赤瑛盤裏好味不改筠籃石榴珠囊碼碯裏玉醴水晶房三嚥華池潤仙家辟糓方送章明叔相看未足又相違鴻鵠東風接翅飛兩槳吳船人易逺一篙春水鱖初肥驚心㡬度經年别握手何時萬里歸早向斯文収汗馬華岡南岸有漁磯寄陸義齋憲使闗山不碍暗香來枝北枝南樹樹開花外有人持漢節㝷詩應上越王䑓寄姚牧庵參政二首黄鶴山頭楚觀鍾唤醒陳夢欠従容歸来坐聽春林雨還憶簾前翠萬重牛斗之間氣更明三台星裏見文星滕王閣上新碑刻處處人家有素屏陳氏山居書院前剏橋名道山共說山居好烟霞幾許深架中書有種橋下水無心酒聚陳遵客花留蔣詡吟宿舂應可到吾亦慣登臨補之畫梅開卷見横枝逃禪不可期忽思霜月夜獨坐小忩時陳小庭求詩戲贈羊角峯前擬峴䑓竹林深處小庭開遥知日日吟詩苦損却空堦幾寸苔李生北行白玉堂容四海黄金臺貯千年好去江南年少薰風一路朝天麓石圖雲根無數壓溪灣萬里擕来只等閒我有澗邉蒼玉筍如何空寄夢魂間送霍可與晉卿理問素履詩書在明時獄訟稀鶯花梁苑酒金紫老萊衣外省分天縡南河近帝畿平反須作意回首是黄扉劉敬之尚書挽詞儒效通今古尚書獨邁倫風沙臣節苦禮樂國容新地隔龍泉夜庭留玉樹春曲終無限思併憶舊平津白无咎素軒下基厚地上髙天饑即加餐困即眠幾度詩成還閣筆恐將文字涴天全少陵春逰圖杜陵野客正㝷詩花栁前頭思欲迷一様東風驢背穩曲江怎似浣花溪喬達之畫江山秋晚圖三首遮日西来正暮秋買魚沽酒醉船頭如今見畫渾疑夢知是南湖第㡬洲千山木落鴈飛初樵屋漁梁路有無京國貴人真巨力盡移生計入新圖别来事事可名家獨我空添兩鬢華天際有山歸未得逺峯休着淡雲遮寄題終南遇仙宫宫在甘泉之下渼陂之上甘泉祠祀渼陂逰盛事曽傳古雍州故國風雲逢聖世化人宫殿倚髙秋神仙可學妨吾懶詩句難成愧客留聞道終南多㨗徑定應容易到崑丘李氏奉親圖髙唐李家宜入史世世順孫并孝子今人創見古㝷常養志承顔政如此春風秋月花滿川小車長耳相後先生綃二尺粉墨具中有至樂無由宣坐中親賔歌拍手宇宙之間一尊酒黄犬東門竟不歸青牛西去知存否何如我翁八十强紅顔雪鬢雙電光醉歸不怕驢自穩有兒左右扶車箱長聞貞觀開元際老大昇平飽嬉戯丹青不見見殘編好護新圖示來世鳯林李以翁教授父主簿公行實場屋知何事丘園有宿儒一官聊慰藉萬竹自蕭踈玉樹春回後黄花酒熟初典刑今益少五字當生芻文明門外劉氏野春園二首杜曲桑麻韋曲花青山遥共酒旗斜閒時也欲㝷詩去長夏門前第㡬家東風如海畫難真沁水平泉逺近鄰却是野亭春最好題詩題字有聞人石上三生圖圓澤峽猿精也其歌可見然古今皆無人及之巫峽三聲斷王城一夢回坐横牛背稳不道故人来雪騎圖都城五月已炎歊咫尺西山迹謾遥何處只今如此雪煩君小住我聨鑣張子恵院判孝顯堂日出北堂諼草緑冷艷生香䕃華屋荆花七樹樹樹髙一一種時如種玉主人今住天中央曉從西府朝明光歸来一曲塤箎合共羡張家孝顯堂寄題吳氏晚香堂櫪山有髙人樵歸得秋菊種之清溪岸繞此白雲屋華滋無早晏所貴受命獨朝来濃露下芬芳出岩谷未知叢上金何似庭際玉更欣萱草長色入眉鬢緑松桂相與榮棃棗况已熟東籬一尊酒千載有餘馥願保黄中姿餐英寄遐躅氷雪相看堂每過髙堂意颯然却疑身近廣寒邉雲霄直上無多路氷雪相看别一天勁竹喬松心有託方壺圓嶠畫難傳六街紅透炎官傘借我風櫺一榻眠次韻王寅夫尚書述懐皇家盛制作後進殊未諳眷言廓齋老有如車指南髙者秩天秩下以商周參恭惟建官百佇之錫命三君懐秋雨霽空碧何恬恬北南三十年取世亦已廉近聞鉅鹿下一騑駕兩驂復言江漢民船尾紛相衘競迎新使君使君装已嚴皆喜遇好官清介侔張堪誰知跂望久各抱空歸慙華國賴典刑潤下資流謙五字賢長城何幸獲或擔傳之寄千載雅頌俱縢緘願言隆鼎彝無窮在遷談解安卿恵紅藥嘉種風翻花藥春當堦平生謝朓縈吟懐我還于京三百日空庭枉費東風來人言秋半宜求種公籞私園勞僕従集賢解君解我心對面珍叢肯移送狂香浩態根裏蔵露珠葉葉凝恩光主人帝城東畔住一花一木都向陽知憐我屋偏城北雪早霜多禁不得行行遶徧屋西東旋為佳人覓佳宅手提井華不敢澆造次恐傷黄玉苗天公念花仍念我夜深暗雨鳴蕭蕭復疑猛洒兼繁滴拂曉来看三歎息初逢無以效殷勤佇待紅燈照瑶席胡紫山挽詞三首一尊淮海話相逢抵掌揚眉四海空落日逺山依舊紫眼前回首但霜風召節曾趨供奉班許教孤鶴綴鵷鸞鵷鸞不肯㝷常出孤鵷無端自往還太息何人似此公未輸天下頌中庸何時絮酒平生足蒿里三章一夢通贈燕恊律洞庭之野有遺音木葉蕭蕭自滿林欲向此中㝷節奏天空人逺夜雲深蒙節婦江上山頭望夫石當年顔貌誰曾識行人疑是復疑非長使徃来縁絶壁何如秦中雷寡妻少擕雙稚留空閨征夫不返頭雪白旌表在門嚢有詩牟陵陽八十陵陽先生八十時白鬚紅頰身深衣青門𤓰熟有伏臘磻溪釣直無是非門前載酒欲問字亭角倚杖方尋詩少㣲政爾光不夜髙士若匪先生誰題祁提㸃秋山圖仙人縮地古今同何處移来水外峯我與白鷗曽有約可憐相見畫圖中贈接花孟老看朱成碧酒闌珊更訪街西白牡丹今日看花人白髪接花容易接春難題髙彦敬烟嵐圖西南多連峯東北多大野大野少人耕連峯有人冩冩之紿卧逰誰為識真者獨有房山公癖山如癖馬向宦浙河干収拾不盈把雲烟何慘澹水木亦蕭洒匪徒妙丹青秀句蔚騷雅胸中殊磊磈筆底聊復且君㸔諸可翫何者獨非假削平藝稻梁庶以飽天下樺陽谷十韻樺陽谷天上官班地上行樺陽泉石託幽貞自従再踏蒼龍尾毎望西南眼倍明養浩堂不向髙堂日撃鮮歸休何以度流年紛紛移體兼移氣獨對青山養浩然向日亭寛閒何地不容光况是親扶日轂長未信城南天尺五每家亭樹對朝陽招隱亭不見朱欄十二干遶簷叢桂想團團但招雲月休招隱雲儘無心月耐看貯月溪水底空明透㡬重溪光全似水精宫可應只貯凉蟾在無限魚蝦亦見容静芳池風裳水佩錦廻環南蕩西湖六月間却是主人心更苦滿衣秋露曉凭䦨代竹園逺近蒼雲接水雲沁園花許鴈来分當時淇澳青青草千載人言是此君比徳泉泉將比徳徳無涯相暎相輝玉絶瑕一尺自渾千丈潔下寜流處莫淘沙鬬檞軒槐棘春風日夜新檻前山木老能神兩賢豈是真相厄大樹將軍此後身肄射砰觀徳仍觀絶藝希蝨懸秋髪射侯㣲従今谷口榛中石夜夜須防獵射歸三生圖三生石上性長存死别如何不斷魂開卷故人還滿眼此情今更不堪論劉單州棄官赴兄台州之䘮一手有急一手赴左不良行右須駐人心取舍有重輕所以劉侯如脫兔好官尚有兄則無死今不死孤不孤久思古人今始見我欲書之寄董狐王氏嘉遯齋東山太傅寧無意少室遺公自得名雨露四簷天尺五未應嘉遯了平生送洪子蘭奉使歸髙麗青禁虚心待上賔鋒車就遣遇庭人龍城遼東廣寧府日近歸装暖玉署花寒别夢新洗馬陳情曽有表乗軺拜慶古無倫天東嘉樹知多少喬梓如今最得春寄題韓雲卿漁莊太行之陽有盤谷别有漁莊在東麓基雲匠月三十年突兀眼前成此屋汲中明府昌黎公平生往哲将無同愛山未辦茅一把且種五栁摇髙風只今盤盤知㡬礎堂構殷勤遵雅素玉龍擎重棟梁新不數王家老槐樹門前洹水行漁舠沙平浦逺無驚濤天開圖晝屏周遭秋風蘋蓼春風桃搴芳拾翠輟所操月明舉網登銀刀侑以大白湘溪毛醉看太行首獨搔長歌欵乃清而豪聲飛于天鶴九臯唤歸羽儀萬仙曹天闗虎豹不敢嘷太清雲翳無纎毫此時此屋更突兀午橋花竹中天髙送程君儁學正歸潯陽五老催歸客天寒道路長殘冬渉易水㡬日到潯陽學見吾宗盛身随聖道昌未應嗟晚達松菊近柴桑郝氏世徳詩啓漢優三略興周冠九人王功今古在侯服嵗時新奮建名相亞臯䕫徳有隣向来忠孝傳彌覺眼前真申屠大用挽詞故人為别㡬秋風竟爾難㝷一笑同表表自能尊素學行行都憶避青驄殊亭雪捲詩初換甓社珠移事已空老我只今看宿草短章那更後諸公榮歸亭昌邑淮隂欠此亭繡衣髙暎鐵衣明至今無限遺榮在玉樹欣欣遶砌生王秋澗先生挽詞二首六藝流名舊諸生属意深雄文探虎穴妙墨過雞林不朽絲綸重無端齒髪侵故應持斧日早有挂冠心解瑟清王度馳環聚老臣江闗聲氣合輦路笑言親去住猶如夢存亡已隔塵獨餘秋澗水顧影一傷神華隱御風來往不留塵水墨何由染此身我亦平生一丘壑㡬時閒似畫中人漁翁圖漁翁牽纑漁婦紡膝上兒看掉車響溪南溪北趂冬晴水急船多欠新網祝兒休啼手正忙網成得魚如汝長枯木野樹無心緑寒鴉作意飛向來回首處疑是復疑非危橋危橋那可試獨歩更堪驚不見當時畫空懸異日情樗亭幸免斧斤厄常驚嵗月新少年欺擁腫老子愛輪囷奉賀國王太傅丞相受封龍飛天子答勲勞疊組重珪極衮褒周室同心惟吕伋漢家異姓有張敖天垣斗極星辰貴烟閣雲䑓地位髙千載國傳彞範舊好毗湯舜選伊臯宣和畫馬夜半房星下九闗渥洼龍種入天閑宣和得此渾無用神駿争雄粉墨間五王避暑圖淮南恩少難為弟有庳天回始念兄得似開元全盛日一樓華蕚友于情夀劉樗庵八十名父佳兒世所希此身端合享期頥挂冠神武聊存我序齒耆英復讓誰師吕不論千載上相周猶待十年遲新求盛事人能說文獻公家好本支寄劉中菴參政二首不得劉公一紙書酒情詩思近何如太初岩下凉多少亦有工夫燕坐無河南父老望車音早有清風慰所臨他日劇談三太息政應聊復試初心中庵詞附人至承以二絶句見貺清簡幽深情意都盡披閱諷詠如接芝宇感慰可勝言哉輙有小詞録奉一笑且以寄企嚮之意云劉敏中上短夢驚回北忩一陣芭蕉雨雨聲還住斜日明髙樹起望行雲送雨前山去山如霧斷虹猶怒直入山深處送李景山侍郎使安南北户之東旭日升容光必照破羣㝠防風後至心何在陸賈重來語可聽化洽不聞冬吠雪氣先遥想夜占星交州九郡皆王略他日殷勤話所經贈杭州開元宫王眉叟法師星宫浮逰随所躔上極𤣥始下九烟出沒無迹合自然誰能居之惟列仙虎林之宫曰開元飛光躡景與時遷我持絳節曾東騫仙人種杏邀我前翺翔接羽逰木天雲庭坐詠太一篇赤明日月如千年方平羽駕初来還黄姑去舍空瓊田超然而止開𤣥𤣥金堂玉室千萬間𤣥中正炁廻靈淵洞真神章大帝頒九刼無始環中環溪分素河月流灣至虚生白心甚閒又乗剛風九豹闗我欲従之不能攀青瑶為簡緑玉編託之胎禽寄飛軒黄庭之師為我言東行何時相後先李渙母八十詩三首乳下孤兒已了官眼前銀鹿共盤桓欲知八十年間事雪皎霜寒在鬢端髙門大扁里閭驚孝子慈孫女婦貞别有河東李渙母不曾旌表衆知名截髪供賔手斷機従来烈女有佳兒劉家中表熊家學文采風流定可知送完顔總管赴平陽汾水西南古晋州雙旌五馬漢諸侯庭無坐吏官班重地有遺民帝化留荆樹春風誇列土甘棠清䕃羡髙秋征騑莫嘆長安逺回首朝陽是薊丘送何仲韞平章赴汴省梁楚氷川大半開懸知鈞軸載春來清都雨露流中土左界星辰接上台别意謾言書數寄去思終見詔頻催安輿翼翼鳴珂引夾路人争拜老萊題盧君用所蔵手卷二首己未御書小景流落殘春筆名蹤定可知君王方旰食猶為一題詩盧學士詩卷渺渺蒲江逺年年桂樹秋空餘詩卷在天地與長留寄夀張天師母周七十雙鶴飛來堕碧牋上清金母慶希年恵風和暢先三日南極逍遥自一天星逐馬蹄催逺使露分仙掌趂初筵従今嵗月吾能測青子蟠桃色正鮮送岳州馮道録夜半黄金化石頭洞中人向玉京逰丹砂欲度三千士月斧先脩十二樓位託星辰須北拱道行江漢與東流相逢紫極崔先叟為問秋聲好在不題扇面葫蘆纏蔓急菜葉鬬花妍為問将雛鳯丹成爾亦仙踈山雲老半間三首常住元無所住非空畢竟俱空長老半間何在問他明月清風三界十方周遍千門萬户㝷常唤取雲歸管業老僧自有禪房萬嶺松杉宻宻兩闗雲氣深深㑹見重來矮佛樹生肘上成林賡牧庵與李仲元詩世祖攬天下盈庭盡瑰竒聮翩萬國士慷慨皆已知嚴嚴許文正扶道應昌期李君此時俱好學何常師駢肩謁萬乗天光煥倫彝相顧各少壮自許涅不緇别來能㡬何嵗月忽吾欺出入三十載嗟君位猶卑但聞徳日充足慰心所馳今上繼聖明左右豈一䕫君方賛南省厚禄我何禆還歸養痾瘵暫與軒冕辭忽覽古人書恍覿君子儀常恐前修業易為後世嗤君獨保厥初進退各有為君如岩上松昭質終不虧我如道旁馬筋力今已疲許公不可招諸老誰憗遺琅琅姚君篇傾倒無所疑豈獨君所知而亦我所私因風繼斯作聊用豁余思李仲元所蔵畫卷髙人意在飛鴻外使者空餘立馬心可是凉州最知己従今薤谷更須深寄夀吳閒閒二親東閣真人擁紫鸞来従帝所奉親歡番君舊里開新國吳猛天仙拜地官萬里罡風參玉佩百壺宫露輟金盤華堂未覺秋香晚氷雪相看正耐看山水圖挺挺短長烟樹嵬嵬逺近雲岑為待濟川舟楫江邉立到如今趙克敬耘庵瓮竇蓬樞慣田里雨笠風簔親耒耜汗肩龜手剪蓬蒿甌窶汙邪年髙秭不應牛角挂書策誤引鶴書招禄仕筆耕紙耨不堪煮飢啼寒號長滿耳君侯奕葉卿相家小却鑾坡弄文史民庸吏績来奏最歩玉登金不違咫便當華屋開朱門車馬駢喧誇世美胡為宴坐立名字踰我里兮折我杞大篇短章來羣公說古論今精義理老儂了不辦許事擬買烏犍歸教子遯軒錦韉金絡玉花驄血汗黄塵赤日中何似茂林脩竹裏陶家一枕北忩風畫竹生來有節照雲端蒼雪崚嶒傲嵗寒欲問平安無便鴈眼明一叚碧琅玕臨右軍帖漏痕釵脚悮無神空向墨池㝷右軍欲輟平生草𤣥手為書一幅弔藤文李庭訓御史挽詞天為斯文地胡然奪此翁士林嗟博洽言路惜公忠儒術今方貴書生命自窮箕裘有傳業積厚報須豐趙閒閒畫松自題詩詞華推哲匠才大古云難如許明堂具偏宜畫裏看答陳玉峯覔紙帳城南有詩老贈我意綿綿住久家猶客更長坐不眠来㝷白紙帳去敵紫茸氊我愧蘇司業賡酬欠酒錢寧山耆艾圖詩二首桑隂栁影團圞坐瓦鉢甆甌陸續傳名字不須排甲乙相忘相與作忘年洛下耆英吾不見香山九老昔曾摹可憐白首明光殿却羡五陵年少圖題山水便面烟水㝠迷山逺近髙山臨水更清寒畫樓迥倚風前構商舶遥従海嶠還雲起亂峯生巧思鳥飛殘照入遐觀生綃盈尺無窮意誰識經營惨淡間吏部郎中韓希賢父九十叔八十六及壮抽身下九天歸来兄弟伏生年古今人為功名老福夀天扵孝義偏松柏相看忘嵗晚芝蘭競秀喜階前二踈翻被黄金惱得似韓家二叟賢七真山洞雲觀七真之山白雲裏綘闕神宫半空起祁君有志于君成更賜雄材自天子東臨滄海西崑崙森森翠節排天門三更日射芙蓉色六月石挂氷霜痕山頭髣髴清虚府洞底隂岑太行路青苔能識六龍車明月長懸萬年樹峯盤澗復氣絪緼瑶草金芝日日新君王自有長生藥端拱無為萬國春安山朱琰聞說朱家擅二難安山山下大河干骨無踈戚還蒿里地有膏腴築杏壇種徳何曾期厚報服田猶恐抱空餐力能掩骼仍興學誰信為農却了官洞明祁真人像箬笠簑衣七尺翁掀髯猶似舊相逢只今無路随青竹自昔疑君是赤松明月在天元不老精金蔵火豈能鎔七真岩谷長春境唯有浮雲盡日封舜舉梨花折枝粉面丹心淺綘𥜗清明時候古城隅一枝獨背春風老盡日廵簷撚白鬚舜舉黄蜀葵淡黄衫子道家粧露白風清殿衆芳只有向陽心尚在紛紛紅紫任低昻送王景開長官楊栁隂隂燕子春東風萬里動游塵還将碧澗紅泉夢又送青原白鷺人子壮有才須逺噐吾衰無計乞閒身南歸若見沙鷗伴莫道遲廻忘卜隣厓雲道人家住祝融尊漭漭蒼蒼不可分何日相從青壁下焚香把酒看氤氲雪樓集卷二十八
