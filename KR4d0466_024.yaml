body:
  text: 雪樓集卷二十四元程文海撰題䟦題趙仲逺所藏韓幹三馬仲逺出三馬圖不著何人作然畫肉不畫骨奚官皆唐人大類韓幹幹以畫肉見稱吁畫馬可也相馬以是不失馬哉仲逺慎諸䟦魚山李氏社倉事後官有常平私有社倉皆所以利民也常平廢不復舉社倉之存者亦無幾矣今年春余歸母䘮於南城之南主于魚山李氏識魚山翁之子仁壽獨能嗣其翁所立社倉規制至于今不廢吁可謂難矣仁壽老猶嗜學其才足以用而隠居求志能不失其世守也豈偶然哉䟦虞子及家蔵趙千里義鶻行圖義鶻事子美得之樵夫傳至今以子美詩故使不遇子美一時且泯没無聞况可垂千年乎然則未可薄待世之人以為不鶻若也有如此鶻而名湮㓕者盖亦多矣悲夫事固繫乎其所遇也夷齊亘古今義人也遇夫子而名始彰雖然夷齊豈求名於後世哉虞子及家寳蔵此卷盖趙千里所畫至元壬辰夏五余如京師子及逺餞袖以見示與鄧聞詩吴㓜清同觀于吴城山之寓舎三復嘉禾葉侯䟦語簡而有味無庸復贅辭以子及之請也聊署紙尾而歸之時月離于畢程某識䟦魏鶴山帖鶴山翁記州縣學十数究學道之本原藥學者之痼疾黔陽其尤深切著明者也小有才則溺益深居近利則壞逾速又黔陽一篇之警䇿翁曽孫資深出示此卷乃在渠陽時與李肩吾賡韻筆精墨妙又復明掲二語以誨人惟恐後生晚進讀文字只作一場話說過也前軰喫緊教人如此三復降嘆䟦静恭楊文安公庭傑遺事昔余季父西渠翁繇淮南幕府歸省甞手文一篇愛賞不置曰此同僚見山楊公之作時余尚少未能省也及余與蜀人唐静卿同直翰苑言眉山楊氏經學文章之盛為詳盖静卿楊所自出獨余以生晚不逮前軰風流為恨則思識其子孫焉今年歸自京師㓜清来相勞苦視其箧有見山公之子焱翁所述文安公遺事與王文公遣妾事大類然一出真實無毫髪矯亢意或又過之詩曰相在爾室尚不愧于屋漏此君子慎獨之學也楊氏之世宦宜哉見山距文安六世位亦通顯矣而無緡錢鍾粟遺其子其所以遺之者盖有以也焱翁字掞卿初以父澤授法曹復以進士貢禮部今隐不仕貧甚而守益堅余未見世徳如此而有不昌者也掞卿俟之至元癸巳陽月下弦廣平程某識其末題姚抑齋送徐丞之崇仁序後夫子曰吾之於人也誰毁誰譽如有所譽者其有所試矣浮光徐君繇省從事佐望邑其行也抑齋姚端夫有贈言焉端夫正人慎許可而所以與徐君者甚厚期徐君者甚深也豈徒為是褒美而已哉君治邑未朞年而賢士大夫多稱之新一堂於公署之北名之曰相山以端夫贈言至而徴大字於余相山直邑之南髙聳特起自昔以祠欒巴巴漢良吏也所至有功徳于民與杜喬周舉諸君子並受朝命為使者行部郡縣君日坐是堂對是山追想古人之遺風而尚友之以為世良吏則其名其堂當與是山相為不朽余之字又何足為輕重乎而端夫所與所期真為不虚譽矣夫樂道人之善余與端夫同是心也既為書三大字而復識端夫贈言之末如此徐君朂哉至元三十一年嵗在甲午春分逺齋程某書書鄒次陳所蔵先世告身後余少游臨川覧郡志慕宜黄鄒公之為人公諱極登治平四年進士第元祐初提㸃江西刑獄事官滿匄祠未幾致仕時年猶未五十日與方外異人逍遥烟霞泉石間固急流勇退仙風道骨中人也然自昔賢人君子可大用而不及究者其後常有人而不知公之子孫為何如癸巳冬入閩獲與公之七世孫次陳偕叩其家世乃知公之後以名登于禮部吏部者累累有之且出公提刑告身及初任太和主簿告身示余余於是重有感也嗚呼世之為人子孫而不能保其先世所有者多矣何獨告身也哉次陳字周弼少年掇世科文學器識亦既光于前矣而所蔵先世告身又能至于今不失以為世世子孫傳家之寳則公之後豈不為常有人矣乎涪翁嘗與往還集中有曰松滋令者公伯子云至元三十一年暮春之初逺齋程某識書王西溪中丞徐容齋参政贈邵炳炎手墨後天下初一閩士邵君炳炎詣闕上書天子下其議踰年有命貳㑹府兼領一道學事未朞年去官再詣闕上書有命叅議行省為上介使海外不至而復於是君倦逰矣自北而南走諸公間以歸一時多贈言焉及昇中丞西溪王公書歸去来辭歸盤谷序以贈及叅政容齋徐公書簡齋送張仲宗歸閩中詩以贈烏乎二公之心豈特以華君之歸而已哉是誠有羨於君之歸也昔之君子之出而仕也役於人以憂人之憂者也伊尹傅説辭耕築而起若不得已然未三聘未旁求二子将終身樂其所樂而已則夫後之君子之既出而遄歸也能不役於人以憂人之憂而得以自樂其樂非天下之至樂歟余是以知二公之誠有羨於君也余備位南䑓時事二公為長故知二公為深王官將滿告歸未及遂而逝徐之心猶王之心也至今縻于浙欲歸而未可豈特二公有羨於君而已哉余亦誠有羨於君也夫以君之得以如張如李如陶而歸也余之未得以如君而得見二公之所書也不有似越流人之見其所知乎如之何其不喜而賛也雖然張之歸閩致其仕也君之歸陶之倦而還耳其遂無心以出乎哉余未去將又為君書昌黎送石處士序凡去就出處何常惟義之歸昌黎語也余於君亦云至元甲午四月晦廣平程某書于閩海憲司之繡綵堂䟦朱文公通鑑綱目槀遂良出示通鑑綱目豪一幅書建武二十六年七年事曰朱子之筆維昔道學諸儒於字畫盖不数数然也獨朱子少嘗學書而其字畫竒偉卓絶片紙流落人之好之寳之也殊尤雖然朱子之為人綱目之為書其所以可好可寳者夫豈以其字哉覧者詳焉至元甲午中秋廣平程某識題興化路學修造䟽後按莆廟學宋咸平間方著作儀所建迄今三百餘年屋老可想矣往時士大夫談所學必曰自孔氏然稽之誌載儀剏始後未聞有出一語及改作事三百年如天覆燾之澤一畆之宫輙憚其難若此而郡冷掾欲以區區之志起廢於一旦談何容易余於是且壯其志而嘉其来請也因捐鶴俸復書其後為方今士大夫學孔氏者之勸云元貞元年十一月二十三日廣平程某書于三山繡綵堂䟦山谷草書徐禧送靈源上人二詩涪翁書徐徳占贈靈源二詩豈亦喜其清新耶徳占永樂之舉欲因熏腐之餘以立功名此豈足以語方外之學者想其捋湏揚壺䘮身覆衆之狀已歴歴在源公目中矣大徳元年四月二十日白雪道人觀䟦東坡帖蘇公坐謫時有在都城見叔黨而障面者及遷儋耳鄭嘉㑹靖老乃能以海舶載書千餘卷為借亦可嘉已公和淵明贈羊長史詩以謝之有好學真伯業比肩比相如之句千載而下知有靖老士烏可不自附於青雲哉此帖言所借書収掌如法前軰借人書籍愛䕶如此皆盛徳事吾黨所當服膺䟦大慧帖大慧坐張橫浦謫衡陽僧中之豪傑也前軰謂使其冠章甫衣逢掖力量氣魄當是晦菴象山一軰人今觀與其徒作别書如此真蔡子應所謂靈岩山下大脫空者合爪起敬䟦啇季顯所蔵王鹿菴先生詩至元丙子余至京師拜承㫖鹿菴王公于玉堂之署蒼然而古雅凝然而敦厖望之肅如也既而獲近清光䝉聖眷實維公奨進汲引之力公長史館余備貟末属朝夕接緒言故知公出處為甚悉初山東反仄公豫料其敗棄妻子脫身来歸先皇帝嘉之寵以殊禮其告老也上東門祖餞榮於䟽傅兩宫錫賚特厚賜田給稍官其壻於鄉郡以奉之晚嵗雍容里閈天佚壽齒寄情賦詠蕭散閒適盖風韻似香山而忠義剛介之氣則又過之嵗月荒寒墓木已拱每念㳺從之舊未嘗不以之興懷来閩四載同寅東昌商公季顯一日示公居山東時古詩数首束祍端誦宛如侍几硯時也惟公之趣與香山同故其詩不期而同惟商公之趣與公同故所好亦不期而同余雖不知詩而知商公與公之所以同者又有出於詩之外也泛濫烟雲俛仰古今不知同余心者又何人哉大徳丁酉暢月既望謹書䟦梅花集梅花之詠萌於六朝逹於唐盛於宋以吟為事者謂無梅字為俗故有作者必曰梅何其多也然廣平一賦無傳後来傑作膾炙人人口者亦止一聮半韻耳又何寡也百十年来賦者百数家和者又数十家梅且遭矣抑有疑焉余留黄金䑓邉二十年意雪霜貿貿非江左比此花竒絶傲兀當有大賞音而諸公間不惟無一字及梅花且未睹豈北南風氣固爾殊哉余歸自閩得閩士謝君無疑百詠讀之於梅不可謂無意者属余多故未暇細論君年壯方有四方之事異時馳騁風雪中孤標雅韻挺然特出百詠當有新什余亦當為君大書特書不一書罔俾此兄笑人寂寂書何希之試䇿後宋進士試訖甲戌是年甲科余首識第二人路君萬里繼識第四人熊君朋来盖余家寓豫章二君皆豫章人也第一人王君龍澤仕國朝為監察御史始識之第六人何君希之臨川人聞其兄弟四人相繼中進士第晚嵗隐居無求翛然世外自守如澹䑓子羽之正而宰邑者每禮於其廬可謂賢已而未及識或以君所試䇿示余余讀之竟竟而歎何歎也旣往盡歸閒指㸃未来須竢别枝梧邵子云大徳己亥十月之望廣平程某書題山中白雲編梁公大莭唐一人耳太行片雲尚能感人至今因想公之忠誠所以感當世者此之充也然慈母之線每動念於游子是獨何心使其日在膝下仰睇雲浮千貌萬態亦何足芥蔕阿奴碌碌誠可羨也盱江山長嚴季安示余編詩題曰山中白雲余且有感矣曩留京師去雙親萬里嘗取逺以名齋以志逺遊之過迨今回首徒重澘然盱汝一衣帶間君且歸矣山深酒熟奉以為壽從板輿賦閒居試問天壌之内孰易此樂題長沙譚生卷臣子盡心力以為其君父本人心天理之常耳自忠孝之名立世道亦槩可知宋之靖康國之大不幸也而譚君之祖得為忠臣長沙之俘家之大不幸也而譚君之身得為孝子余覧其銘詩為之廢卷三歎古人云求忠臣必於孝子之門亦懿哉譚氏之傳家也題趙方塘作劉子逺字說後余與方塘翁同朝者餘十年别之亦十年矣来黄鶴讀所為劉子逺字說如旦莫語時也為之悵然且人生能幾十年今乃屡十不一十耶雖然自其可久者而觀則去之千萬里後之千萬世猶旦莫耳苟營營於毁譽沾沾於耳目雖名喧勢震自以為逺矣而非也然則十年夫何足歎向余築室京師題曰逺齋盖有志乎是而今吾猶故如文卿之善教子逺之善學庶其不負方塘翁之祝也喜而書其後䟦立齋字後吏以刀筆為譚仁義者所賤乆矣法選吏於儒㫖哉然冒以入者十九於聖賢立身之說如梵夾然余官中外垂三十年閱金於沙燁然而光目為之眩持莭湖右吏有朱芾者進止氣貌儒也視其言亦儒也余方以吏事責之弗暇及儒一日進請余書立齋字問之則曰小室之扁諸儒亦既銘序之矣因出諸袖間則或奨或承其言立也章矣噫立未易言也亦未易能也以其所頌者為規而不以為喜庶乎其可題楊從善卷後大徳四年秋蒙恩使湖右舟至吴城有儒其體貌者頎然迎拜曰湖右書吏楊從善與語質温而業廣意静而志勤盖稱其體貌也有字乎曰希元於是携之偕行者半月既至凡抱文書以前者余一一束以吏事嚮之頎然者亦不見其儒矣然每思盡江行未盡之語而未暇一日持卷軸来祈一言視之大夫士歌頌其讀書之竹軒余乃知所謂稱其體貌盖有本源而竹與軒特筌蹄耳又請余書大字曰中菴儒以無過不及為中法家者流輕重適平為中其義一也子方縁吏業儒倘於此勉焉日孳孳焉則余之所謂體貌特今之所見而己又豈可量哉子今遷属湘南行有日余於竹有所不暇言湘南竹鄉也有賢使君曰踈翁簡書之暇子其端拜於庭請問竹之所以為竹者五年三月晦前一日程某書于嵗寒亭重題羅生卷後後十有四年余官湖右而恭有之子將其父命来請曰僕老矣弗能游矣惟是辱公贈言今箧之如新敢介永徳以見且謁教焉向余承乏南䑓齒髪壯志氣銳下筆亹亹数百言不休字畫亦勉自振飭年運而往舊蹟觧后至前幾不自識若此卷者是也於是頋永徳曰老者豈獨而父哉詩則我既言之矣進而論其本則喜怒哀樂之未發謂之中發而皆中莭謂之和表裏二者而性情之詩其太倉稊米也豪髪無遺恨波瀾獨老成昔人評詩云爾然則老而後成是固一說也子歸而求之書趙公朂齋記後至元二十六年權奸秉政民物騷然僕以侍御史自行䑓入奏覬有所悟權奸聞而大恚請必殺之頼天子聖明屢請而屢不許諸大賢亦憐其志並加覆䕶幸免虎口而朂齋趙公當時大賢一人也覆䕶尤力盖公以忠勩發身以愷悌接物勞於王事有年權奸之時亦多故矣强者激弱者遯怯則附而公安歩徐言於其間全正氣於惡候偃巨防於横流故彼不至極而隨敗公之功為多而非獨於僕為然也然公不自為功衆亦鮮能知之晉楚離居萬里相望辱寄巨軸于武昌且命曰其為我益一辭視之朂齋記也夫公之所以名齋者胡君之言信而有徴矣僕之文不如胡公又將何辭乎雖然僕盖有所感矣是非之公固有歴千載而猶未定者毋怪乎焚林抱木之徒也然則不知而不愠者信君子矣惟朂其在我而已者斯不亦又君子矣乎僕於是而益知所勉矣抑胡君之所言或者亦僕之所知而僕之所知胡君未之見焉用告于讀斯記者至於公之所命僕盖無以復之也題象山先生遺墨後朱陸二公来往翰墨情與甚真若此帖者甚多余家亦寳数紙恨不使妄有異同者一一見之題王氏遺墨後學者僅知初竂公以文章獨歩一時不知其得所矜式見其出入宣靖不知其不肯詭隨盖公及識東坡知所慕用字畫亦儼然令尹中郎復生學者其可無見聞者嘉叟從張魏公游人品自不待論翰墨猶犖犖有竒氣逮至提刑公世雖益近而家聲則益逺矣今徳植又能自絜於洙泗材諝美茂有絶塵之姿家聲由是將益大不逺千里需余一言是豈非繩祖武之盛心乎惜吾無以助其見聞而徒黔紙尾耳雖然徳植今得庠序課最上考功金門天開穆穆布列其見聞觀感豈江海之濱之比哉固將有下堂執手以升者當是時徳植勉㫋請伸此卷淮水清王氏寧枝葉美茂他姓莫如也山長君族有三槐家有初竂所宜世濟其美今君名庭槐而字徳植濟美之志可謂决矣然徳植雙聲不利於口曷不遂曰濟羙坐客咸曰然乃書以易之題淵明圖當其時或交臂而不之識亦既逺矣乃共以筆墨追求之聊代淵明一笑書五代死莭傳後大徳五年御史詹君奉使湖廣余以官守間獲欵語聞君談忠孝大莭慷慨激烈至五代王鐵鎗事尤凛凛生風及詢家世知為緫制公之適子也緫制公宋末戰死其忠勇與彦章同其死之事又同然則惟其有之是以似之似特為君發也暇日因取彦章傳繕寫而歸之筆墨非工髙山仰止之意不能自已焉耳昔黄太史暗寫孟愽傳誤處不過三四今余展卷㝷行然後落筆而猶不能無誤人之相去何啻九牛毛哉併志余愧䟦郝仲明御史自叙至元丙戌余待罪南䑓始識今監察御史郝君仲明見其於吏事明而有㫁心竒之而未暇與語也既而余言事忤時宰羈留京師時仲明在内䑓間得與語而未知其學也戊戌余歸自閩與呉㓜清論易學則曰江西亷司經歴郝君於此用工専而且精余駭曰吾仲明耶余與之共事乆曽㣲一言及於易仲明之深蔵若虚固可喜而余之闇於知人則甚矣自是往来于胸中思一見而問焉及来湖右㑹仲明来監選事乃始扣擊一二於澹齋許君所得其自叙而讀之䟽其師授之源發其心得之藴固皆吾平昔之所未聞者益恨余之闇於知人也噫易更聖三有道四說者非一家得此者遺彼未易言也余起諸生沉埋傳註至研極則往往口㦸而舌縮仲明乃遍參諸方深造道妙如此盛哉惜方縻於公事未能難疑問荅盡發祕藏姑書此以識余過他日書成當膝行順下風以請題禊帖曩聞遊五䑓者人人言見文殊問之則或雜雲物或現光相或渺渺然山谷間又問之則曰神人其可即哉澹齋示此帖因識所聞題張君用贈行卷名爲天子耳目之司任無小大皆不可苟䑓緫於上憲列於下監察御史絡脉於其間皆所以逹聰明目䋲愆糾繆扶治本清化源也顧使庸悍詭墨之流得執簡牘以吏於中焉嘻其非矣余承乏䑓端凡再考去之十年耳今之官往往曩之吏焉者然則可弗重歟穰人張君用余来湖右所貢吏也䑓不以爲非而俾吏察院將行手一卷以進視之則陳說禮法是非蜂起余卷而謂之曰爾知禮與法乎畔于此必麗于彼合乎彼亦必合乎此未始有同異也今議迂闊者必曰儒詬深刻者必曰吏禮豈迂闊而法豈深刻哉然持衡而視其兩端若一俯一仰焉非平矣甚則權墮而衡折爾余所知也其亟行乎慎爾所持毋負所舉書鄧中齋名謝氏三子說後至元戊子余官南䑓時中齋鄧公客于昇傾盖劇談互有所發别去十五年聞其訃於武昌又明年謝君汝霖持其名三子說来讀之意覈而言慤猶若對面語也當是時汝霖齒髪彊壯意悟飄洒往来余二人之間余亦志氣方銳不知老之將至今汝霖諸子皆振振濟濟頎然出於其父歳月不問可知然少者壯壯者老老者死此天道人事之常而於中齋所謂攸好徳可勉自貽哲命可知者當惕然以思耳太上立徳其次立功其次立言此學者所願學焉者謝氏三徳倘能以中齋之訓自勵則於立功立言如木之有枝泉之有流耳然而石者泉之母也宻則清土者木之基也厚則茂未有身不立而能是三者也亦未有能是三者而身不立者也三徳其𢡟敬之故待中齋舉其二而缺其三者猶有所待也汝霖將何以復之乎題家人經傳衍義後家人之卦辭曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定齊景公問政於孔子孔子對曰君君臣臣父父子子嗚呼使君君臣臣父父子子兄兄弟弟夫夫婦婦豈有亂與亡哉夫惟聖人耐以天下爲一家故治天下之道備於家人一卦非己備也所以爲治道之備者始於此也嗚呼自天子以至於庶人皆父父子子兄兄弟弟夫夫婦婦獨非聖人之治乎予於是深有感於此書矣有問治天下之道於徳亮者請執衍義以往抑以風自火出之象推之風以動化言火以家宅言盖曰化天下必自一家始也爐鞴之說固善若曰火自風出乃可徳亮謂爲何如書桂林瑞芝圖後天地好生人亦孰不畏死而欲生然生不可必求而有或力求之者學仙是也死非所求而終若求之者囚辟是也萬死一生之際而能使之必生其惟良醫與仁恕之吏乎夫其使之必生也非能益造化之數也非敢亂章程之名也盡吾心而體天地人之心以求之耳故曰求其生而弗得則死者與我皆無憾真誥曰人能遍服五芝可絶粒輕舉本草曰凡芝皆延年起死彼學仙與醫者能言之未必得之今桂林傳舎之芝見於仁恕平反之後是則所謂芝者誠生氣之祥不死之劑乎然仙與醫雖得之未必效之果而及之衆也且仙者之求其生未若醫者之求人之生也醫之求人之生又未若仁恕者求人之生之公之溥也然則芝何足圖如王君者乃可圖耳題羅伯達卷余讀諸公贈羅伯達文序而知士之不可不求知於人也伯達譙人自湘憲改吏湖右者二載余雖知其老成歴練介然有守不激不隨同儕有疑咸咨之然亦不知其名父之子所謂介然有守不激不隨者盖淵源有所自也大徳癸卯波遷桂憲余方惜其去無以尼之將發手一卷求贈言余讀之曰嗟夫矯矯亢亢惡圎喜方者果皆晚遇耶卷中諸賢其許與不妄彼既已知之矣復何庸贅獨以垂老無罪而入瘴癘地又奪其儕之所審决者是則可念耳若曰必余言而後見知於人則人之見知者亦淺矣知不知非余之所知五嶺皆炎熱宜人獨桂林是則子所當知者題姜尚志所述祖徳卷後爲人祖考之心孰不欲其子孫之皆賢以永其家者覃之心思守之行事顯之教言至於著之彛器而祖考之術若幾窮矣子孫亦嘗以其心而反事之乎知此則知姜生尚志之心矣欲其祖考之賢聞於人顧肯甘於身之不賢而聞於人哉雖然春生秋殺孰主張是亦盡其道之當然者故造物者以無心為貴今人言濟衆之事必曰隂徳夫既曰隂徳矣何庸人知宋莒公之蟻芥出於戯劇而其所報盡於世俗之所羨慕而不可得意彼亦一橋也其用力甚易而猶若是然則尚志亦安之哉何庸人知且詩不云乎毋念爾祖聿修厥徳尚志亦安之哉書傳道集夫子曰予欲無言又曰吾無行而不與二三子者然則以言明道非得已也道至伊洛而大明逮紫陽益無餘藴凡公所著與其門弟子之記録何啻數千百萬言或不可數計唐虞以来於斯為盛今故家遺俗存十一於百千公之族𦙍亦或淪落其髙第弟子子孫徒藏其片言隻字以爲身榮以為家鎮嗚呼是亦可見道之升降矣若止齋先生清規懿學讀其宰石之志凛然平生猶足以立懦夫於百嵗之後其子孫又能世其學而不變君子之澤豈必五世而斬哉夫止齋所傳之道堯舜之道也堯舜之道孝弟而已萬君方以其學而及人其必自兹始題唐名臣言行類編人有古今不同時而合志往聞斯語今親見之余觀中齋楊侯拳拳於唐之名臣緝其行事以爲斯集其慕用之意已深夫豈以安邉境立功名而自足哉然逢時展用孰無此心今侯盛年敏志况古人所就有不足爲而又生當其時亦何所欲而不遂唐事特其土苴耳雖然房杜爲唐臣稱首而何以傳無可載之功竢侯造朝言還當相與一一評之䟦唐括子舉遺安堂記後躬貴冨而幸爵秩廣園田以遺其子孫者欲其安於貴富也處賤貧而以一經一業遺其子孫使之安於賤貧者有幾盖有之矣其子孫能安其賤貧者又有幾思徳公之言讀翰林之記而後知世固未始無也子舉家遼東昔管㓜安索居于彼者數十年聘召者屡而卒不至至使時君畫其衣冠容狀問其起居辭令以慰願見之心若㓜安者真能安矣抑誰遺之乎吾不知徳公子孫如何今子舉好學自脩安於先訓吾深有所感矣喜而書其後題翟氏貞莭柏舟之詩起於父母不明其志是故惓惓懇懇永歌嗟嘆覬於聞者閔而舎之也使若翟氏泯然自由於志莭之中内外相安無奪之者則三百五篇無此篇而二千八百餘年之後不復知有衛世子共伯之妻矣然則所遇亦有幸不幸哉抑未知夫家爵里氏名若貧賤而能然謂之知義富貴而能然謂之秉禮禮也義也古人先得我心之所同然而其流行不匱於閭閻閨閾驗之尤信䟦掲曼碩文槀余識掲曼碩不四三年初識出其詩文知於兹事必收汗馬之功自時厥後屡見屡期若王良造父之御駸駸然益逺而益未止何曼碩之敏且巧若此乎柳子有言吾之俯也滋甚題南翁編五色不蘄眩而目自眩五音不蘄感而心自感至理之中有自然者存不可以意求而力索也猶之於文三才之所生也宇宙之所馮也治忽之所徴也而或者不察置盂水而吹之曰此亦天下之至文不亦惑乎南翁深於斯道其發也如豐山之鍾其成也如匠慶之鐻吾於是而知兹事未嘗忘特猶儵之與忽不可必其相遭耳喜而識之于篇抑文章一小技於道未爲尊少陵翁謙以自貶而惰與不能者以藉口吾欲因南翁編告之書張文振實記後士有常言曰宇宙内事即已分内事此言誠是也然必志與才並時與位偕而後可行斯言往余聞文振於朝行既又識文振於閩粤知其以宇宙内事為已分内事者然猶未深悉其平生歸自湖右聞父老談張史君之美者踵相接今觀斯記所謂功崇惟志業廣惟勤者耶他人觀之未必知之知之未必信之余則固已知之而益信之矣題曰實記允非欵言雖然志也才也時也位也制於已者二而非已之所能制者亦二今文振豐於三而少嗇其一而非文振所能制也豈非制之者猶有所待乎不然翼乎如鴻毛之遇順風沛乎如巨魚之縱大壑矣何事不立哉夫制之者有所待以否余雖不知而事之有待於人者皆是也然則制之者尚何待乎題熊氏生意稾天地以生爲心聖人以天地爲心然天地之大人猶有所憾博施濟衆堯舜其猶病諸然則兼天地聖人之心以爲心者其惟醫乎醫之於人也技若賤而甚貴施若狹而甚博也俱民也而死生獨寄焉非貴乎身不必徧也而其書公焉非博乎醫之道與聖通矣臨川吳君㓜清吾所敬也熊君又㓜清所敬者焉予取熊君之書讀之其術周其說博信乎可敬也已况服膺唐虞三代之言以文之益可敬也已不逹則爲良醫熊君之志逹已乎惜予不早與㓜清從事於斯以逹其志也因志吾志書何安子四書後四書至朱子註釋精矣然朱子修改易簀未已天假之年則今本猶未爲定本也勉齋之說有朱子所未發者雙峰之說又有勉齋所未及者亦可見義理之無窮矣後之讀者於先儒之㫖曽未貫徹而或有妄肆誹議者焉一也庸一也妄其失惟均鄉貢進士何定夫能於朱子之說有所發明不阿隨又不詭異可謂善學者矣惜乎泯泯無聞於世也其子捧其父書求序引欲以傳於世余嘉之爲書其後他日當與黄饒二先生之說並傳定夫名安子自號志軒書何太虚集易象後聖人俯仰逺近取象以畫易盖不可窮也彖爻之辭說卦之賛因其所有言之耳而後之註易者曾莫之及間及者往往穿鑿傅會不出乎自然此朱子所病也故曰文辭象數或肆或拘何君太虚以彖爻所取象類而析之得之者固多矣昔余在集賢見台州一老儒日以錢布卦觀其象得之者多親切吾友吳㓜清亦言曾於古祠香爐中取炭燼畫卦於案觀之此卦通又㓕之畫他卦豁然有悟嗚呼安得三君日相聚共竟斯事哉䟦麓泉記後盱余明可工小兒醫求余書麓泉二字扁其所居之室吾友呉㓜清爲講麓泉之義而記之無餘藴矣復求余言今之術者曰醫也星命也地理也談相也星命地理與夫談相者口舌爲大耳精不精未害也惟醫不可以不精而其計效目前亦豈能如星命地理與夫談相者之迂且誕乎哉古者醫師之職嵗㑹其成十全為上十失三失四斯下矣漢詔問太倉公方伎所長及所能治病者有其書無有皆安受學受學幾何幾甞有所驗何縣里人也何病醫藥已其病之狀皆何如誠以醫者人命死生之所係要非可以虚譽求也㓜清記麓泉之義而不記其驗吾家孫子三嵗而病謁諸醫或曰驚或曰風明可一見曰此傷暑也飲以一齊而愈吾弟女子昉一嵗而病痬既苦河魚三日諸醫却立明可飲以三齊精神如常時他小児頼明可而活者復多計明可出入城市其所療所全當不可僂數惜未有記之者自今以往某病某證以某藥巳録而記之他日詔問執此以往而不在余區區者之一言也䟦韓生夢康樂字卷通於神明光于四海無所不通此孝子慈孫之能事也盖天地間惟一氣耳人生其間得是氣之全由是理之正則逺而天地近而父母推之以及人之老之幼皆是氣之流行而安有扞格而不能相通者昔之人有能由是理秉是心而貫於微顯者不可遽數已嘗試言之齧指而心痛微而顯者也見饋而泣涕顯之顯者也觀於此則韓氏子之夢寐誠可謂微而顯者矣嗚呼人於一髪膚之不若人非至痛甚害於身猶或視之恝然况夫形骸之隔哉余於是不能不深有感於斯文矣抑由古以来若韓生之爲子者未可謂無人也而或不表於世以終其身者何邪寕非有幸不幸乎然而非孝子之所務也傳不云乎親吾親也雖然孝子慈孫之心是亦可念已題李雪菴臨諸家法帖後具一隻眼然後能識又須具一隻手然後能臨今觀此卷是能以一手眼化爲千手眼者蘭奢蘭奢蘭奢華言好也雪樓集卷二十四
